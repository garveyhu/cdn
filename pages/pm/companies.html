<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AI 产品经理面试 · 公司专题 — 按公司逐家拆解的针对性备战包</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="stylesheet"
      href="https://cdn.archeruuu.com/libs/docsify/themes/vue.css"
    />
    <link rel="stylesheet" href="https://cdn.archeruuu.com/libs/katex/katex.min.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='24' width='100' height='100' fill='%231e293b'/><path d='M50 33 C43.5 28 33 27 26.5 29.5 V69 C33 66.5 43.5 67.5 50 72 C56.5 67.5 67 66.5 73.5 69 V29.5 C67 27 56.5 28 50 33 Z' fill='none' stroke='%23ffffff' stroke-width='4' stroke-linejoin='round'/><path d='M50 33 V72' stroke='%23ffffff' stroke-width='3.5'/></svg>"
    />

    <style>
      :root {
        --theme-color: #2b8fd6;
      }
      body.dark {
        background: #1e1e1e;
        color: #e8e8e8;
      }
      body.dark .sidebar {
        background: #252526;
      }
      body.dark .sidebar-toggle {
        background: transparent;
      }
      body.dark .sidebar-nav a {
        color: #aaa;
      }
      body.dark .sidebar-nav a:hover {
        color: var(--theme-color);
      }
      body.dark .markdown-section {
        color: #e8e8e8;
      }
      body.dark .markdown-section h1,
      body.dark .markdown-section h2,
      body.dark .markdown-section h3 {
        color: #e8e8e8;
      }
      body.dark .markdown-section a {
        color: var(--theme-color);
      }
      body.dark .markdown-section code {
        background: #2d2d30;
        color: #e8e8e8;
      }
      body.dark .markdown-section pre {
        background: #2d2d30 !important;
      }
      body.dark .search input {
        background: #2d2d30;
        color: #e8e8e8;
        border-color: #3e3e42;
      }
      body.dark .search {
        border-bottom-color: #3e3e42 !important;
      }
      body.dark .search input::placeholder {
        color: #888;
      }
      body.dark .search .results-panel {
        background: #252526;
        border-color: #3e3e42;
      }
      body.dark .search .matching-post {
        border-bottom-color: #3e3e42;
      }
      body.dark .search .matching-post:hover {
        background: #2d2d30;
      }
      .sidebar > h1 {
        font-size: 16px;
        padding: 0px 10px;
        margin: 0;
        text-align: center;
      }
      .sidebar-nav > ul > li > p {
        font-size: 15px;
        font-weight: 600;
        margin: 12px 15px 6px;
      }
      .sidebar-nav a {
        font-size: 13px;
        padding: 0px 15px;
      }
      .sidebar-toggle {
        margin-left: 15px !important;
      }
      .theme-toggle-btn {
        position: fixed;
        top: 15px;
        right: 20px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #fff;
        border: none;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: all 0.3s;
        padding: 0;
      }
      .theme-toggle-btn span {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .theme-toggle-btn:hover {
        transform: scale(1.1);
      }
      body.dark .theme-toggle-btn {
        background: #2d2d30;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .content {
        padding-right: 320px !important;
      }
      #right-toc {
        position: fixed;
        right: 20px;
        top: 80px;
        width: 260px;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
        padding: 20px;
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #ffffff;
        z-index: 50;
      }
      body.dark #right-toc {
        background: #252526;
        border-color: #3e3e42;
      }
      #right-toc .toc-title {
        font-weight: 700;
        font-size: 15px;
        margin: 0 0 15px 0;
        padding-bottom: 10px;
        border-bottom: 2px solid #e8e8e8;
        color: #2c3e50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }
      #right-toc .toc-title .collapse-icon {
        transition: transform 0.3s;
      }
      #right-toc.collapsed .toc-title .collapse-icon {
        transform: rotate(-90deg);
      }
      #right-toc.collapsed #toc-content {
        display: none;
      }
      body.dark #right-toc .toc-title {
        color: #e8e8e8;
        border-bottom-color: #3e3e42;
      }
      #right-toc a {
        display: block;
        padding: 5px 10px;
        font-size: 13px;
        line-height: 1.8;
        color: #5d6d7e;
        text-decoration: none;
        border-left: 0;
        transition: all 0.2s;
        border-radius: 4px;
      }
      body.dark #right-toc a {
        color: #aaa;
      }
      #right-toc a:hover {
        color: var(--theme-color);
        background: rgba(43, 143, 214, 0.1);
      }
      #right-toc a.active {
        color: var(--theme-color);
        font-weight: 600;
        background: rgba(43, 143, 214, 0.15);
      }
      #right-toc .h2 {
        padding-left: 10px;
      }
      #right-toc .h3 {
        padding-left: 20px;
        font-size: 12px;
      }
      #right-toc .h4 {
        padding-left: 30px;
        font-size: 12px;
      }
      #right-toc::-webkit-scrollbar {
        width: 6px;
      }
      #right-toc::-webkit-scrollbar-track {
        background: transparent;
      }
      #right-toc::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 3px;
        transition: background 0.3s;
      }
      #right-toc.scrolling::-webkit-scrollbar-thumb,
      #right-toc:hover::-webkit-scrollbar-thumb {
        background: #ccc;
      }
      body.dark #right-toc.scrolling::-webkit-scrollbar-thumb,
      body.dark #right-toc:hover::-webkit-scrollbar-thumb {
        background: #555;
      }
      /* Firefox：默认隐藏滚动条，滚动 / 悬停时才显示 */
      #right-toc {
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
        transition: scrollbar-color 0.3s;
      }
      #right-toc.scrolling,
      #right-toc:hover {
        scrollbar-color: #ccc transparent;
      }
      body.dark #right-toc.scrolling,
      body.dark #right-toc:hover {
        scrollbar-color: #555 transparent;
      }
      /* 左侧菜单树滚动条：与右侧目录一致 —— 默认隐藏，滚动 / 悬停才显示 */
      .sidebar::-webkit-scrollbar { width: 6px; }
      .sidebar::-webkit-scrollbar-track { background: transparent; }
      .sidebar::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; transition: background 0.3s; }
      .sidebar.scrolling::-webkit-scrollbar-thumb,
      .sidebar:hover::-webkit-scrollbar-thumb { background: #ccc; }
      body.dark .sidebar.scrolling::-webkit-scrollbar-thumb,
      body.dark .sidebar:hover::-webkit-scrollbar-thumb { background: #555; }
      .sidebar { scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color 0.3s; }
      .sidebar.scrolling,
      .sidebar:hover { scrollbar-color: #ccc transparent; }
      body.dark .sidebar.scrolling,
      body.dark .sidebar:hover { scrollbar-color: #555 transparent; }
      @media screen and (max-width: 1200px) {
        #right-toc {
          display: none;
        }
        .content {
          padding-right: 0 !important;
        }
        .theme-toggle-btn {
          right: 20px;
        }
      }
      /* 复制按钮：纯图标（无边框/无背景/无文字）—— 悬停代码块才显示；默认灰、hover 强调色、成功变绿对勾（插件 1s 后自动恢复） */
      .docsify-copy-code-button {
        top: 6px !important; right: 6px !important; bottom: auto !important; left: auto !important;
        width: 18px !important; height: 18px !important; padding: 0 !important;
        display: grid !important; place-items: center !important;
        font-size: 0 !important;
        background: transparent !important;
        color: var(--fg-mut) !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        opacity: 0 !important;
        transition: opacity .15s, color .15s !important;
        --copy-glyph: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>');
      }
      .docsify-copy-code-button > span { display: none !important; }
      .docsify-copy-code-button::before {
        content: ""; width: 14px; height: 14px; background: currentColor;
        -webkit-mask: var(--copy-glyph) center / contain no-repeat;
        mask: var(--copy-glyph) center / contain no-repeat;
      }
      .markdown-section pre:hover .docsify-copy-code-button { opacity: .65 !important; }
      .markdown-section pre .docsify-copy-code-button:hover { opacity: 1 !important; }
      .mermaid {
        cursor: zoom-in;
        transition: all 0.3s;
      }
      .mermaid:hover {
        opacity: 0.9;
      }
      /* Mermaid/图 全屏预览器：打开即居中适配屏幕，居中/光标缩放不漂移，带工具栏 */
      .iv-overlay {
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(248, 250, 252, 0.97);
        overflow: hidden; opacity: 0; transition: opacity 0.2s;
      }
      .iv-overlay.active { opacity: 1; }
      body.dark .iv-overlay { background: rgba(16, 20, 30, 0.97); }
      .iv-stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; }
      .iv-stage:active { cursor: grabbing; }
      .iv-stage img, .iv-stage svg { display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; max-width: none; }
      .iv-toolbar {
        position: fixed; top: 16px; right: 16px; z-index: 10000;
        display: flex; gap: 6px; padding: 6px;
        background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow);
      }
      .iv-toolbar button {
        width: 36px; height: 36px; border-radius: 9px; border: 1px solid transparent;
        background: transparent; color: var(--fg-soft); cursor: pointer;
        display: grid; place-items: center; transition: color .15s, background .15s;
      }
      .iv-toolbar button:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .iv-toolbar button svg { width: 18px; height: 18px; }
      .iv-toolbar .iv-sep { width: 1px; background: var(--border); margin: 5px 2px; }
      .iv-hint {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10000;
        color: var(--fg-mut); font-size: 12px; padding: 5px 14px; border-radius: 999px;
        background: var(--glass); border: 1px solid var(--border);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); opacity: .92; pointer-events: none;
      }
      .docsify-copy-code-button:hover { color: var(--accent) !important; }
      .docsify-copy-code-button.success {
        color: #16a34a !important;
        --copy-glyph: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>');
      }
      body.dark .docsify-copy-code-button { background: transparent !important; color: var(--fg-mut) !important; border: none !important; }
      body.dark .docsify-copy-code-button:hover { color: var(--accent) !important; }
      body.dark .docsify-copy-code-button.success { color: #4ade80 !important; }
    </style>

    <!-- ============================================================
         Docsify Station：仅保留「搜索右移 + 设置入口」所需的 chrome 层
         默认零视觉变化（强调色=品牌蓝；阅读偏好仅在主动改动时生效）
         ============================================================ -->
    <style id="station-chrome">
      :root {
        --bg-elev: #ffffff; --glass: rgba(255, 255, 255, 0.74);
        --border: #e2e8f3; --border-soft: #eef2f9;
        --fg: #2c3e50; --fg-soft: #5d6d7e; --fg-mut: #8893ad;
        --shadow: 0 10px 34px -16px #1a223633, 0 2px 8px -4px #1a223618;
        --a1: #2b8fd6; --a2: #5468ee; --a3: #6d5cf0;
      }
      html[data-accent='aurora'] { --a1: #5ed1ff; --a2: #a78bfa; --a3: #f472b6; }
      html[data-accent='ocean']  { --a1: #2b8fd6; --a2: #5468ee; --a3: #6d5cf0; }
      html[data-accent='forest'] { --a1: #34d399; --a2: #10b981; --a3: #06b6d4; }
      html[data-accent='sunset'] { --a1: #fbbf24; --a2: #fb923c; --a3: #f43f5e; }
      html[data-accent='mono']   { --a1: #94a3b8; --a2: #64748b; --a3: #475569; }
      :root {
        --accent: var(--a1); --accent2: var(--a2);
        --grad: linear-gradient(120deg, var(--a1) 0%, var(--a2) 52%, var(--a3) 100%);
        --grad-soft: linear-gradient(120deg, color-mix(in srgb, var(--a1) 16%, transparent), color-mix(in srgb, var(--a2) 14%, transparent));
        /* 标题专用活力渐变（蓝→紫→粉），仅用于封面/侧栏标题等展示位 */
        --title-grad: linear-gradient(120deg, var(--a1) 0%, #a78bfa 52%, #f472b6 100%);
        --theme-color: var(--accent);
      }
      body.dark {
        --bg-elev: #252526; --glass: rgba(32, 32, 34, 0.78);
        --border: #3e3e42; --border-soft: #33333a;
        --fg: #e8e8e8; --fg-soft: #bcbcbc; --fg-mut: #8a8a8a;
        --shadow: 0 12px 44px -14px #000a, 0 2px 10px -4px #0008;
      }
      /* 阅读偏好：仅非默认值作用到正文，默认与原版一致 */
      html[data-fs='s'] .markdown-section { font-size: 13.5px; }
      html[data-fs='l'] .markdown-section { font-size: 17.5px; }
      html[data-fs='xl'] .markdown-section { font-size: 19px; }
      html[data-width='compact'] .markdown-section { max-width: 680px; }
      html[data-width='wide'] .markdown-section { max-width: 1020px; }
      html[data-width='full'] .markdown-section { max-width: none; }
      html[data-leading='tight'] .markdown-section { line-height: 1.55; }
      html[data-leading='relaxed'] .markdown-section { line-height: 2.0; }
      html[data-font='serif'] .markdown-section { font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", Georgia, serif; }
      body.reduce-motion *, body.reduce-motion *::before, body.reduce-motion *::after { transition: none !important; animation: none !important; }

      /* 隐藏左上角搜索框 */
      .sidebar .search { display: none !important; }
      /* ---- 目录树（参考 Chameleon 的克制版：无 emoji，标题同色系渐变，选中低调） ---- */
      .sidebar > h1.app-name { text-align: center; margin: 14px 0 16px; padding: 0 16px; }
      .sidebar .app-name-link {
        font-size: 17px; font-weight: 800; letter-spacing: .2px;
        background: var(--title-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      /* 标题样式：纯色（主题色）—— 默认渐变，设置面板可切 */
      html[data-title='solid'] .sidebar .app-name-link {
        background: none; -webkit-background-clip: border-box; background-clip: border-box;
        -webkit-text-fill-color: var(--accent); color: var(--accent);
      }
      .sidebar-nav > ul > li > p, .sidebar-nav > ul > li > strong {
        font-size: 11.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        color: var(--fg-mut); margin: 11px 16px 4px;
      }
      /* 目录密度（设置面板可调：紧凑 / 标准 / 宽松） */
      html[data-nav='compact'] .sidebar-nav > ul > li > p, html[data-nav='compact'] .sidebar-nav > ul > li > strong { margin-top: 6px; }
      html[data-nav='compact'] .sidebar-nav a { padding-top: 3px; padding-bottom: 3px; }
      html[data-nav='roomy'] .sidebar-nav > ul > li > p, html[data-nav='roomy'] .sidebar-nav > ul > li > strong { margin-top: 22px; }
      html[data-nav='roomy'] .sidebar-nav a { padding-top: 8px; padding-bottom: 8px; }
      .sidebar-nav li { margin: 0 !important; }
      .sidebar-nav a {
        display: block; font-size: 13.5px; line-height: 1.5; color: var(--fg-soft);
        padding: 5px 12px; margin: 1px 8px; border-radius: 8px;
        transition: background .15s, color .15s;
      }
      .sidebar-nav a:hover { color: var(--fg); background: color-mix(in srgb, var(--accent) 9%, transparent); }
      .sidebar-nav li.active > a, .sidebar-nav a.active {
        color: var(--accent); font-weight: 600;
        background: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      /* ---- 收紧标题/导航上方空白 ---- */
      .content { padding-top: 0 !important; }
      .markdown-section { padding-top: 24px; }
      #right-toc { top: 28px; padding: 14px 16px; }

      .glass { background: var(--glass); -webkit-backdrop-filter: blur(16px) saturate(1.4); backdrop-filter: blur(16px) saturate(1.4); border: 1px solid var(--border); box-shadow: var(--shadow); }
      /* 性能关键：仅在浮层「可见时」启用毛玻璃，避免常驻 backdrop-filter 每帧重算背后模糊 → 滚动卡顿 */
      #station-drawer:not(.open), #station-toast:not(.show) { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }

      #read-progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--grad); z-index: 200; transition: width .1s linear; }
      body.no-progress #read-progress { display: none; }
      .progress { display: none !important; } /* 隐藏 docsify 自带顶部加载进度条 */

      /* 右上角：搜索——无边框幽灵图标，贴近角落（同左下齿轮） */
      .station-toolbar { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 80; }
      .chrome-btn {
        width: 30px; height: 30px; border-radius: 8px; cursor: pointer; color: var(--fg-mut);
        display: inline-flex; align-items: center; justify-content: center;
        background: transparent; border: none; box-shadow: none; font-family: inherit;
        transition: color .15s, transform .15s;
      }
      .chrome-btn:hover { color: var(--accent); transform: translateY(-1px); }
      .chrome-btn svg { width: 18px; height: 18px; }

      /* 左下角设置齿轮——无边框幽灵图标，贴近角落 */
      #station-gear {
        position: fixed; left: 10px; bottom: 10px; width: 30px; height: 30px;
        cursor: pointer; color: var(--fg-mut); z-index: 80; display: flex; align-items: center; justify-content: center;
        background: transparent; border: none; box-shadow: none;
        transition: color .2s, transform .3s;
      }
      #station-gear:hover { color: var(--accent); transform: rotate(30deg); }
      #station-gear svg { width: 18px; height: 18px; }

      /* 桌面端隐藏 docsify 自带汉堡折叠键（左下角那条蓝色横条 + 与齿轮冲突） */
      @media (min-width: 769px) { .sidebar-toggle { display: none !important; } }
      /* 移动端专属适配：保留 docsify 原生菜单树 toggle（左下），把设置齿轮挪到右下，二者不再重叠；正文满宽 + 左右对称内边距 */
      @media (max-width: 768px) {
        #station-gear { left: auto; right: 12px; bottom: 10px; }
        .sidebar-toggle { z-index: 81; }
        .content { padding-right: 0 !important; padding-left: 0 !important; }
        .markdown-section { max-width: 100% !important; padding-left: 18px !important; padding-right: 18px !important; }
      }

      /* 设置抽屉 */
      #station-backdrop { position: fixed; inset: 0; background: rgba(4, 8, 16, .42); z-index: 290; opacity: 0; pointer-events: none; transition: opacity .25s; }
      #station-backdrop.open { opacity: 1; pointer-events: auto; }
      #station-drawer { position: fixed; left: 0; top: 0; bottom: 0; width: 360px; max-width: 88vw; z-index: 300; transform: translateX(-104%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; border-radius: 0 18px 18px 0; }
      #station-drawer.open { transform: none; }
      #station-drawer .sd-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px 14px; border-bottom: 1px solid var(--border); }
      #station-drawer .sd-head span { font-size: 16px; font-weight: 750; color: var(--fg); }
      #station-drawer .sd-close { background: transparent; border: none; color: var(--fg-mut); cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
      #station-drawer .sd-close:hover { color: var(--fg); background: var(--bg-elev); }
      #station-drawer .sd-close svg { width: 16px; height: 16px; }
      #station-drawer .sd-body { padding: 8px 22px 22px; overflow-y: auto; }
      #station-drawer .sd-row { margin-top: 20px; }
      #station-drawer .sd-label { font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--fg-mut); margin-bottom: 9px; }
      #station-drawer .sd-toggle-row .sd-label kbd { margin-left: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0; text-transform: none; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-family: inherit; }
      #station-drawer .seg { display: flex; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 11px; padding: 3px; gap: 3px; }
      #station-drawer .seg button { flex: 1; border: none; background: transparent; color: var(--fg-soft); cursor: pointer; font-size: 13px; padding: 7px 6px; border-radius: 8px; transition: all .15s; font-family: inherit; }
      #station-drawer .seg button:hover { color: var(--fg); }
      #station-drawer .seg button.on { background: var(--glass); color: var(--accent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent); font-weight: 650; }
      #station-drawer .swatches { display: flex; gap: 10px; }
      #station-drawer .swatch { width: 30px; height: 30px; border-radius: 9px; cursor: pointer; border: 2px solid transparent; transition: transform .15s; }
      #station-drawer .swatch:hover { transform: scale(1.12); }
      #station-drawer .swatch.on { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bg-elev), 0 0 0 4px color-mix(in srgb, var(--accent) 60%, transparent); }
      .sw-aurora { background: linear-gradient(120deg, #5ed1ff, #a78bfa, #f472b6); }
      .sw-ocean  { background: linear-gradient(120deg, #2b8fd6, #5468ee, #6d5cf0); }
      .sw-forest { background: linear-gradient(120deg, #34d399, #10b981, #06b6d4); }
      .sw-sunset { background: linear-gradient(120deg, #fbbf24, #fb923c, #f43f5e); }
      .sw-mono   { background: linear-gradient(120deg, #94a3b8, #64748b, #475569); }
      #station-drawer .sd-toggle-row { display: flex; align-items: center; justify-content: space-between; }
      #station-drawer .sd-toggle-row .sd-label { margin-bottom: 0; }
      #station-drawer .switch { width: 44px; height: 25px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-elev); cursor: pointer; position: relative; transition: background .2s, border-color .2s; flex: none; }
      #station-drawer .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; border-radius: 50%; background: var(--fg-mut); transition: transform .2s, background .2s; }
      #station-drawer .switch.on { background: var(--grad); border-color: transparent; }
      #station-drawer .switch.on::after { transform: translateX(19px); background: #fff; }
      #station-drawer .sd-foot { margin-top: 26px; padding-top: 16px; border-top: 1px solid var(--border); }
      #station-drawer .sd-reset { width: 100%; padding: 9px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg-soft); cursor: pointer; font-size: 13px; font-family: inherit; transition: all .15s; }
      #station-drawer .sd-reset:hover { color: var(--fg); border-color: var(--accent); }

      /* 命令面板 */
      #station-cmdk { position: fixed; inset: 0; z-index: 400; display: none; }
      #station-cmdk.open { display: block; }
      #station-cmdk .cmdk-bg { position: absolute; inset: 0; background: rgba(4, 8, 16, .5); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
      #station-cmdk .cmdk-panel { position: absolute; left: 50%; top: 12vh; transform: translateX(-50%); width: 640px; max-width: 92vw; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; max-height: 72vh; }
      #station-cmdk-search { border-bottom: 1px solid var(--border); }
      #station-cmdk-search .search { margin: 0; padding: 0; border: none; position: static; }
      #station-cmdk-search .search .input-wrap { margin: 0; padding: 6px 10px; }
      #station-cmdk-search .search input { width: 100%; border: none; background: transparent; color: var(--fg); font-size: 16px; padding: 12px 8px; outline: none; font-family: inherit; }
      #station-cmdk-search .search input::placeholder { color: var(--fg-mut); }
      #station-cmdk-search .search .clear-button { display: none; }
      #station-cmdk-search .search .results-panel { display: none; border: none; background: transparent; }
      #station-cmdk-search .search .results-panel.show { display: block; }
      #station-cmdk-actions { padding: 8px; border-bottom: 1px solid var(--border); }
      #station-cmdk-actions .cmdk-hint { font-size: 11px; color: var(--fg-mut); padding: 4px 10px 6px; letter-spacing: .5px; text-transform: uppercase; }
      #station-cmdk-actions .cmdk-action { width: 100%; display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: none; background: transparent; color: var(--fg-soft); cursor: pointer; border-radius: 9px; font-size: 13.5px; font-family: inherit; text-align: left; }
      #station-cmdk-actions .cmdk-action:hover { background: var(--grad-soft); color: var(--fg); }
      #station-cmdk-actions .cmdk-action svg { width: 16px; height: 16px; opacity: .8; flex: none; }
      #station-cmdk-actions .cmdk-action kbd { margin-left: auto; font-size: 11px; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 5px; padding: 1px 7px; font-family: inherit; line-height: 1.5; }
      #station-cmdk .results-panel { padding: 6px; }
      #station-cmdk .matching-post { border: none !important; padding: 10px 12px !important; border-radius: 9px; cursor: pointer; }
      #station-cmdk .matching-post:hover, #station-cmdk .matching-post.sel { background: var(--grad-soft); }
      #station-cmdk .matching-post h2 { font-size: 14px !important; color: var(--fg) !important; margin: 0 0 3px !important; padding: 0 !important; border: none !important; }
      #station-cmdk .matching-post p { font-size: 12.5px !important; color: var(--fg-mut) !important; margin: 0 !important; }
      #station-cmdk .search-keyword { color: var(--accent) !important; }

      /* Toast */
      #station-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); padding: 10px 18px; border-radius: 11px; color: var(--fg); font-size: 13px; z-index: 500; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; }
      #station-toast.show { opacity: 1; transform: translateX(-50%); }

      /* 右侧目录开关 / 专注模式：释放列 */
      body.no-toc .content { padding-right: 2rem !important; }
      body.no-toc #right-toc { display: none !important; }
      body.zen .sidebar { transform: translateX(-100%); }
      body.zen .content { left: 0 !important; padding-right: 2rem !important; }
      body.zen .station-toolbar, body.zen #right-toc, body.zen .sidebar-toggle { display: none !important; }
      /* 目录树文字：无下划线（左侧栏 + 右侧悬浮目录，含 hover） */
      .sidebar-nav a, .sidebar-nav a:hover, .sidebar-nav a:focus,
      #right-toc a, #right-toc a:hover, #right-toc a:visited { text-decoration: none !important; border-bottom: none !important; }

      /* 设置面板内的搜索入口 */
      #station-drawer .sd-search { width: 100%; display: flex; align-items: center; gap: 9px; padding: 10px 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg-soft); font-size: 13.5px; font-family: inherit; cursor: pointer; transition: color .15s, border-color .15s; }
      #station-drawer .sd-search:hover { color: var(--fg); border-color: var(--accent); }
      #station-drawer .sd-search svg { width: 16px; height: 16px; }
      #station-drawer .sd-search kbd { margin-left: auto; font-size: 11px; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; }

      /* ---- Mermaid：去黄底，卡片化，质感统一 ---- */
      .mermaid {
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px;
        padding: 18px 16px; margin: 1.6em 0; text-align: center;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      }
      .mermaid svg { max-width: 100%; height: auto; }
      /* 时序图 Note：去黄底，换中性（themeVariables 对 note 不稳，CSS 强制） */
      .mermaid rect.note { fill: #eef2f9 !important; stroke: #d3def0 !important; }
      .mermaid .noteText, .mermaid .noteText tspan { fill: #334155 !important; }
      body.dark .mermaid rect.note { fill: #222c44 !important; stroke: #3a4a6b !important; }
      body.dark .mermaid .noteText, body.dark .mermaid .noteText tspan { fill: #dfe6ff !important; }

      /* ===== 正文质感（参考 Chameleon：画布氛围光 + 文字/代码/引用精修） ===== */
      body::before {
        content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
        transform: translateZ(0); /* 提升为独立合成层，避免滚动时重绘固定渐变 */
        background:
          radial-gradient(55vw 45vh at 10% -8%, color-mix(in srgb, var(--a1) 8%, transparent), transparent 60%),
          radial-gradient(50vw 42vh at 100% 0%, color-mix(in srgb, var(--a3) 7%, transparent), transparent 55%);
      }
      .markdown-section p, .markdown-section li { color: var(--fg-soft); }
      .markdown-section strong { color: var(--fg); font-weight: 650; }
      .markdown-section a { color: var(--accent); }
      .markdown-section h1 { font-size: 2.05em; font-weight: 800; letter-spacing: -.5px; line-height: 1.25; color: var(--fg); margin: .1em 0 .7em; }
      .markdown-section h2 { font-size: 1.5em; font-weight: 750; letter-spacing: -.2px; color: var(--fg); margin-top: 2.2em; padding-bottom: .35em; border-bottom: 1px solid var(--border); }
      .markdown-section h3 { font-size: 1.22em; font-weight: 700; letter-spacing: -.1px; color: var(--accent); margin-top: 1.7em; }
      .markdown-section h4 { font-size: 1.02em; font-weight: 650; color: var(--accent2); margin-top: 1.4em; }
      body.dark .markdown-section h3 { color: var(--accent); }
      /* 行内代码：强调色淡底 pill —— 仅限非 pre 内（不污染代码块） */
      .markdown-section :not(pre) > code {
        background: color-mix(in srgb, var(--accent) 9%, var(--bg-elev));
        color: var(--accent); border: 1px solid var(--border-soft);
        padding: 2px 6px; border-radius: 6px; font-size: .88em;
      }
      body.dark .markdown-section :not(pre) > code {
        background: color-mix(in srgb, var(--a1) 16%, #0e1422); color: color-mix(in srgb, var(--a1) 72%, #fff); border-color: #ffffff14;
      }
      /* 代码块：中性表面卡片，收紧内边距，去掉默认 2.2em 顶部留白与语言角标 */
      .markdown-section pre {
        background: color-mix(in srgb, var(--fg) 4%, var(--bg-elev)) !important;
        border: 1px solid var(--border); border-radius: 12px;
        padding: 15px 18px; margin: 1.4em 0; overflow: auto; position: relative;
      }
      .markdown-section pre::after { display: none; }
      .markdown-section pre > code {
        background: transparent !important; border: none; padding: 0; border-radius: 0;
        color: var(--fg); font-size: .85em; line-height: 1.65;
      }
      body.dark .markdown-section pre { background: color-mix(in srgb, #fff 5%, var(--bg-elev)) !important; border-color: var(--border); }
      body.dark .markdown-section pre > code { color: var(--fg); }
      .markdown-section blockquote {
        border-left: 3px solid var(--accent2);
        background: linear-gradient(90deg, color-mix(in srgb, var(--accent2) 9%, transparent), transparent);
        border-radius: 0 10px 10px 0; padding: 12px 18px; margin: 1.3em 0; color: var(--fg-soft);
      }
      .markdown-section blockquote p { color: var(--fg-soft); margin: 0; }
      .markdown-section blockquote p + p { margin-top: .6em; }
      /* GitHub 风格提示框 callout（> [!NOTE]/[!TIP]/[!IMPORTANT]/[!WARNING]/[!CAUTION]）—— 由 doneEach 转换 */
      .markdown-section blockquote[data-callout] {
        border-left: 3px solid var(--cc);
        background: linear-gradient(90deg, color-mix(in srgb, var(--cc) 11%, transparent), transparent);
      }
      .markdown-section blockquote[data-callout] .callout-title { color: var(--cc); font-weight: 700; font-size: .9em; letter-spacing: .03em; margin-bottom: .35em; }
      .markdown-section blockquote[data-callout='note']      { --cc: #3b82f6; }
      .markdown-section blockquote[data-callout='tip']       { --cc: #10b981; }
      .markdown-section blockquote[data-callout='important'] { --cc: var(--accent); }
      .markdown-section blockquote[data-callout='warning']   { --cc: #f59e0b; }
      .markdown-section blockquote[data-callout='caution']   { --cc: #ef4444; }
      /* 表格：圆角卡片 + 淡淡的主题色表头带（仅 6% 强调色）+ 发丝行分隔，克制不用斑马纹 */
      .markdown-section table { display: table; width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 1.5em 0; box-shadow: 0 1px 3px rgba(0, 0, 0, .04); }
      /* 宽表格：doneEach 给每个表外包一层 .table-wrap 做横向滚动，避免长内容溢出到右侧目录；
         窄表仍撑满（table width:max-content + min-width:100%）。滚动条默认隐藏、悬停才显示（同右侧目录） */
      .markdown-section .table-wrap { overflow-x: auto; margin: 1.5em 0; border-radius: 12px; scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color .3s; }
      .markdown-section .table-wrap > table { width: max-content; min-width: 100%; margin: 0; }
      .markdown-section .table-wrap:hover { scrollbar-color: #ccc transparent; }
      body.dark .markdown-section .table-wrap:hover { scrollbar-color: #555 transparent; }
      .markdown-section .table-wrap::-webkit-scrollbar { height: 8px; }
      .markdown-section .table-wrap::-webkit-scrollbar-track { background: transparent; }
      .markdown-section .table-wrap::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; transition: background .3s; }
      .markdown-section .table-wrap:hover::-webkit-scrollbar-thumb { background: #ccc; }
      body.dark .markdown-section .table-wrap:hover::-webkit-scrollbar-thumb { background: #555; }
      .markdown-section table tr, .markdown-section table tr:nth-child(2n) { border: none; background-color: transparent; }
      .markdown-section th {
        background: color-mix(in srgb, var(--accent) 6%, var(--bg-elev));
        color: var(--fg); font-weight: 650; text-align: left;
        border: none; border-bottom: 1px solid var(--border-soft); padding: 11px 16px;
      }
      .markdown-section td { border: none; border-bottom: 1px solid var(--border-soft); color: var(--fg-soft); padding: 11px 16px; }
      .markdown-section tbody tr:last-child td { border-bottom: none; }
      .markdown-section tbody tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }

      /* ---- 封面（参考 Chameleon：粒子背景 + 渐变标题 + pill + 按钮） ---- */
      section.cover { background: var(--bg-elev) !important; }
      section.cover .cover-main { position: relative; z-index: 1; color: var(--fg); }
      section.cover .cover-main > h1, section.cover .cover-main > h1 a {
        font-size: 54px; font-weight: 850; letter-spacing: -.5px; border: none;
        background: var(--title-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      section.cover blockquote { border: none; background: none; }
      section.cover blockquote p { color: var(--fg-soft); font-size: 19px; }
      .cover-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
      section.cover .cover-main .cover-btn { display: inline-block; border-radius: 12px; padding: 12px 28px; font-weight: 600; text-decoration: none; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid var(--border) !important; color: var(--fg) !important; background: var(--bg-elev) !important; -webkit-text-fill-color: var(--fg) !important; }
      section.cover .cover-main .cover-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -14px rgba(0,0,0,.25); }
      section.cover .cover-main .cover-btn-primary { background: var(--title-grad) !important; color: #fff !important; border: none !important; -webkit-text-fill-color: #fff !important; }
      section.cover .pill { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 999px; border: 1px solid var(--border); color: var(--fg-soft); background: var(--bg-elev); margin: 3px 4px; }
      section.cover .pill.hot { border-color: color-mix(in srgb, var(--a3) 45%, transparent); color: var(--a3); }
      #cover-canvas { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; pointer-events: none; }
      body:has(section.cover.show) #right-toc, body:has(section.cover.show) #read-progress { display: none; }
    </style>

    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('station-settings') || '{}');
          var r = document.documentElement;
          r.dataset.accent = s.accent || 'ocean';
          if (s.fs) r.dataset.fs = s.fs;
          if (s.width) r.dataset.width = s.width;
          if (s.font) r.dataset.font = s.font;
          if (s.leading) r.dataset.leading = s.leading;
          r.dataset.nav = s.nav || 'cozy';
        } catch (e) {}
      })();
    </script>

        <div class="sd-row">
          <div class="sd-label">动效</div>
          <div class="seg">
            <button data-set="motion" data-val="full">开</button>
            <button data-set="motion" data-val="reduced">减弱</button>
          </div>
        </div>
        <div class="sd-row sd-toggle-row">
          <div class="sd-label">专注模式 <kbd>F</kbd></div>
          <button class="switch" data-toggle="zen" aria-label="专注模式"></button>
        </div>
        <div class="sd-row sd-toggle-row">
          <div class="sd-label">菜单树 <kbd>M</kbd></div>

          <div class="sd-label">右侧目录 <kbd>O</kbd></div>

        </div>
        <div class="sd-row sd-toggle-row">
          <div class="sd-label">阅读进度条 <kbd>B</kbd></div>

    <div id="station-cmdk">
      <div class="cmdk-bg" id="station-cmdk-bg"></div>
      <div class="cmdk-panel glass">
        <div id="station-cmdk-search"></div>
        <div id="station-cmdk-actions">
          <div class="cmdk-hint">快捷操作</div>
          <button class="cmdk-action" data-action="theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            切换主题
          </button>
          <button class="cmdk-action" data-action="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M4 12h2M18 12h2M12 4v2M12 18v2"/></svg>
            打开阅读设置
          </button>
          <button class="cmdk-action" data-action="top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            回到顶部
          </button>
          <button class="cmdk-action" data-action="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 10 9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            返回首页
          </button>
          <div class="cmdk-hint">视图切换</div>
          <button class="cmdk-action" data-action="zen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
            专注模式 <kbd>F</kbd>
          </button>
          <button class="cmdk-action" data-action="sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
            收起 / 展开左侧菜单 <kbd>M</kbd>
          </button>
          <button class="cmdk-action" data-action="toc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg>
            收起 / 展开右侧目录 <kbd>O</kbd>
          </button>
          <button class="cmdk-action" data-action="progress">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h7"/><path d="M3 8h18"/><path d="M3 16h12"/></svg>
            阅读进度条 <kbd>B</kbd>

    <div id="station-toast" class="glass"></div>

    <!-- 右侧固定目录 -->
    <div id="right-toc">
      <div class="toc-title" onclick="toggleToc()">
        目录导航
        <span class="collapse-icon">▼</span>
      </div>
      <div id="toc-content"></div>
    </div>

    <script>
      // 目录收缩
      function toggleToc() {
        document.getElementById("right-toc").classList.toggle("collapsed");
      }

      // 右侧目录滚动条：默认隐藏，滚动时显示，停止 ~0.7s 后隐藏（hover 也显示）
      (function () {
        var toc = document.getElementById("right-toc");
        if (!toc || toc.__sbBound) return;
        toc.__sbBound = true;
        var t = null;
        toc.addEventListener("scroll", function () {
          toc.classList.add("scrolling");
          clearTimeout(t);
          t = setTimeout(function () { toc.classList.remove("scrolling"); }, 700);
        }, { passive: true });
      })();

      // ===== Docsify Station 设置系统（主题移入设置面板） =====
      (function () {
        var STORE = 'station-settings';
        var DEFAULTS = { theme: 'light', accent: 'ocean', fs: 'm', width: 'normal', font: 'sans', leading: 'normal', nav: 'cozy', motion: 'full', progress: false, toc: true, zen: false, menu: true, title: 'grad' };
        function read() { try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; } }
        var settings = Object.assign({}, DEFAULTS, read());
        if (!localStorage.getItem(STORE)) { var old = localStorage.getItem('theme'); if (old === 'dark' || old === 'light') settings.theme = old; }
        var mql = matchMedia('(prefers-color-scheme: dark)');
        function save() { localStorage.setItem(STORE, JSON.stringify(settings)); }
        function isDark() { return settings.theme === 'dark' || (settings.theme === 'auto' && mql.matches); }
        function $(id) { return document.getElementById(id); }
        function apply() {
          var r = document.documentElement;
          r.dataset.accent = settings.accent; r.dataset.fs = settings.fs; r.dataset.width = settings.width; r.dataset.font = settings.font; r.dataset.leading = settings.leading; r.dataset.nav = settings.nav; r.dataset.title = settings.title;
          document.body.classList.toggle('dark', isDark());
          document.body.classList.toggle('reduce-motion', settings.motion === 'reduced');
          document.body.classList.toggle('zen', settings.zen);
          document.body.classList.toggle('no-toc', !settings.toc);
          document.body.classList.toggle('no-progress', !settings.progress);
          document.body.classList.toggle('close', !settings.menu); // 左侧菜单树收起（docsify 原生 body.close）
          refresh();
        }
        function set(k, v) { settings[k] = v; save(); apply(); }
        function refresh() {
          document.querySelectorAll('#station-drawer [data-set]').forEach(function (el) { el.classList.toggle('on', settings[el.dataset.set] === el.dataset.val); });
          document.querySelectorAll('#station-drawer [data-toggle]').forEach(function (el) { el.classList.toggle('on', !!settings[el.dataset.toggle]); });
        }
        mql.addEventListener && mql.addEventListener('change', function () { if (settings.theme === 'auto') apply(); });

        function openD() { $('station-drawer').classList.add('open'); $('station-backdrop').classList.add('open'); }
        function closeD() { $('station-drawer').classList.remove('open'); $('station-backdrop').classList.remove('open'); }
        $('station-gear').addEventListener('click', openD);
        $('station-sd-close').addEventListener('click', closeD);
        $('station-backdrop').addEventListener('click', closeD);
        $('station-drawer').addEventListener('click', function (e) {
          var s = e.target.closest('[data-set]'); if (s) { set(s.dataset.set, s.dataset.val); return; }
          var t = e.target.closest('[data-toggle]'); if (t) { set(t.dataset.toggle, !settings[t.dataset.toggle]); }
        });
        $('station-sd-reset').addEventListener('click', function () { settings = Object.assign({}, DEFAULTS); save(); apply(); toast('已恢复默认设置'); });

        var tt = null;
        function toast(m) { var el = $('station-toast'); el.textContent = m; el.classList.add('show'); clearTimeout(tt); tt = setTimeout(function () { el.classList.remove('show'); }, 1800); }

        // 左侧菜单树收起/展开（settings.menu 持久化 → apply 里切 body.close；抽屉开关/快捷键/命令面板三处同步）
        function toggleSidebar() { set('menu', !settings.menu); toast(settings.menu ? '左侧菜单 已展开' : '左侧菜单 已收起'); }
        function typingInField() { var el = document.activeElement; return !!el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable); }

        // 命令面板：复用 docsify 搜索索引
        var moved = false;
        function ensure() { if (moved) return; var s = document.querySelector('.sidebar .search') || document.querySelector('.search'); if (s) { $('station-cmdk-search').appendChild(s); moved = true; } }
        function openK() { closeD(); ensure(); $('station-cmdk').classList.add('open'); var i = document.querySelector('#station-cmdk-search input'); if (i) setTimeout(function () { i.focus(); i.select(); }, 30); sync(); }
        function closeK() { $('station-cmdk').classList.remove('open'); sel = -1; }
        function sync() {
          var p = document.querySelector('#station-cmdk-search .results-panel');
          var i = document.querySelector('#station-cmdk-search input');
          var q = !!(i && i.value.trim());
          if (p) p.classList.toggle('show', q);
          var a = $('station-cmdk-actions'); if (a) a.style.display = q ? 'none' : 'block';
        }
        $('station-search').addEventListener('click', openK);
        $('station-cmdk-bg').addEventListener('click', closeK);
        $('station-cmdk-search').addEventListener('input', function () { sel = -1; clr(); sync(); });
        $('station-cmdk').addEventListener('click', function (e) { if (e.target.closest('.matching-post a, .matching-post')) setTimeout(closeK, 0); });
        $('station-cmdk-actions').addEventListener('click', function (e) {
          var b = e.target.closest('[data-action]'); if (!b) return; var a = b.dataset.action; closeK();
          if (a === 'theme') set('theme', isDark() ? 'light' : 'dark');
          else if (a === 'settings') openD();
          else if (a === 'top') window.scrollTo({ top: 0, behavior: 'smooth' });
          else if (a === 'home') window.location.hash = '#/';
          else if (a === 'zen') { set('zen', !settings.zen); toast(settings.zen ? '专注模式 开' : '专注模式 关'); }
          else if (a === 'sidebar') toggleSidebar();
          else if (a === 'toc') { set('toc', !settings.toc); toast(settings.toc ? '右侧目录 显示' : '右侧目录 隐藏'); }
          else if (a === 'progress') { set('progress', !settings.progress); toast(settings.progress ? '进度条 开' : '进度条 关'); }
        });
        var sel = -1;
        function items() { return Array.prototype.slice.call(document.querySelectorAll('#station-cmdk-search .matching-post')); }
        function clr() { items().forEach(function (i) { i.classList.remove('sel'); }); }
        function move(d) { var it = items(); if (!it.length) return; sel = (sel + d + it.length) % it.length; clr(); var e = it[sel]; e.classList.add('sel'); e.scrollIntoView({ block: 'nearest' }); }
        document.addEventListener('keydown', function (e) {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('station-cmdk').classList.contains('open') ? closeK() : openK(); return; }
          if (e.key === 'Escape') {
            if ($('station-cmdk').classList.contains('open')) { closeK(); return; }
            if ($('station-drawer').classList.contains('open')) { closeD(); return; }
            if (settings.zen) { set('zen', false); }
            return;
          }
          if ($('station-cmdk').classList.contains('open')) {
            if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
            else if (e.key === 'Enter') { var it = items(); if (sel >= 0 && it[sel]) (it[sel].querySelector('a') || it[sel]).click(); }
            return;
          }
          // 单键快捷键：无修饰键、不在输入框、命令面板/设置抽屉未开时才触发（跨平台一致，无需 Cmd/Ctrl）
          if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey || typingInField()) return;
          if ($('station-drawer').classList.contains('open')) return;
          var k = e.key.toLowerCase();
          if (k === 'f') { e.preventDefault(); set('zen', !settings.zen); toast(settings.zen ? '专注模式 开' : '专注模式 关'); }
          else if (k === 'm') { e.preventDefault(); toggleSidebar(); }
          else if (k === 'o') { e.preventDefault(); set('toc', !settings.toc); toast(settings.toc ? '右侧目录 显示' : '右侧目录 隐藏'); }
          else if (k === 'b') { e.preventDefault(); set('progress', !settings.progress); toast(settings.progress ? '进度条 开' : '进度条 关'); }
        });

        // 阅读进度条
        var pr = $('read-progress'), st = null;
        window.addEventListener('scroll', function () {
          if (st) return;
          st = setTimeout(function () {
            var s = window.scrollY || document.documentElement.scrollTop;
            var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (pr) pr.style.width = (h > 0 ? s / h * 100 : 0) + '%';
            st = null;
          }, 40);
        }, { passive: true });

        apply();
      })();

      // Docsify 配置
      window.$docsify = {
        name: "AI PM 面试 · 公司专题",
        repo: "",
        // 自包含站点：index.html 与内容同级，basePath 默认相对自身目录
        loadSidebar: "_sidebar.md",
        coverpage: "_coverpage.md",
        onlyCover: true,
        auto2top: false, // 回顶/锚点定位由 doneEach 自管（见下方导航滚动）
        maxLevel: 1,
        subMaxLevel: 0,

        search: {
          paths: "auto",
          placeholder: "搜索...",
          noData: "无结果",
        },

        copyCode: {
          buttonText: "复制",
          successText: "已复制",
        },

        pagination: {
          previousText: "上一章",
          nextText: "下一章",
        },

        zoom: {
          selector: ".mermaid svg, img",
          background: "rgba(0,0,0,0.8)",
          delay: 300,
        },

        // 右侧目录生成插件
        plugins: [
          function (hook) {
            hook.doneEach(function () {
              // 左侧菜单树滚动条：docsify 动态生成 .sidebar，首次渲染后绑定（滚动时显示，停 ~0.7s 隐藏；hover 也显示）
              (function () {
                var sb = document.querySelector(".sidebar");
                if (!sb || sb.__sbBound) return;
                sb.__sbBound = true;
                var st = null;
                sb.addEventListener("scroll", function () {
                  sb.classList.add("scrolling");
                  clearTimeout(st);
                  st = setTimeout(function () { sb.classList.remove("scrolling"); }, 700);
                }, { passive: true });
              })();
              // 导航滚动自管：有 ?id= 锚点→滚到该小节；纯切页→回顶（docsify 在本设置下不滚锚点、也会继承上页滚动位置）
              (function () {
                function go() {
                  var hash = location.hash, route = hash.split("?")[0];
                  var m = hash.match(/[?&]id=([^&]+)/);
                  if (m) {
                    var el = document.getElementById(decodeURIComponent(m[1]));
                    if (el) window.scrollTo(0, el.getBoundingClientRect().top + window.scrollY - 16);
                  } else if (route !== window.__lastRoute) {
                    window.scrollTo(0, 0); document.documentElement.scrollTop = 0;
                  }
                  window.__lastRoute = route;
                }
                go();
                if (!window.__navBound) {
                  window.__navBound = true; // 同页内点目录锚点不触发 docsify 重渲染，补监听
                  window.addEventListener("hashchange", function () { setTimeout(go, 30); });
                }
              })();
              // 高亮当前文档 + 选中项自动滚入侧栏可视区。
              // norm 取最后一个 # 之后（兼容 file:// 完整 href）、剥 ?id 与 .md、统一前导斜杠。
              // 延时补两次：盖过 docsify 内建高亮在 file://(offline.html) 下匹配失败后清空 active 的情况。
              (function () {
                function hl() {
                  var norm = function (h) {
                    h = (h || "").toString();
                    var i = h.lastIndexOf("#"); if (i >= 0) h = h.slice(i + 1);
                    h = h.split("?")[0].replace(/\.md$/i, "");
                    try { h = decodeURIComponent(h); } catch (e) {}
                    h = h.replace(/\/(readme|index)$/i, "").replace(/\/+$/, ""); // 目录索引归一：/README、/index、尾斜杠 视为同一页
                    if (h.charAt(0) !== "/") h = "/" + h;
                    return h;
                  };
                  var path = norm(location.hash), activeA = null;
                  document.querySelectorAll(".sidebar-nav a").forEach(function (a) {
                    var on = norm(a.getAttribute("href")) === path;
                    a.classList.toggle("active", on);
                    var li = a.closest("li");
                    if (li) li.classList.toggle("active", on);
                    if (on) activeA = a;
                  });
                  if (activeA) {
                    var sb = document.querySelector(".sidebar");
                    if (sb) {
                      var aR = activeA.getBoundingClientRect(), sR = sb.getBoundingClientRect();
                      if (aR.top < sR.top + 8 || aR.bottom > sR.bottom - 8) {
                        sb.scrollTop += (aR.top - sR.top) - (sR.height - aR.height) / 2;
                      }
                    }
                  }
                }
                hl(); setTimeout(hl, 0); setTimeout(hl, 80);
                if (!window.__hlBound) {
                  window.__hlBound = true;
                  window.addEventListener("hashchange", function () { setTimeout(hl, 30); });
                }
              })();

              // GitHub 风格提示框：把 > [!TYPE] blockquote 转成带标题的彩色 callout
              (function () {
                var LABEL = { NOTE: "提示", TIP: "建议", IMPORTANT: "重点", WARNING: "注意", CAUTION: "警告" };
                document.querySelectorAll(".markdown-section blockquote").forEach(function (bq) {
                  if (bq.dataset.callout) return;
                  var first = bq.querySelector("p");
                  if (!first) return;
                  var m = first.innerHTML.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br\s*\/?>)?\s*/i);
                  if (!m) return;
                  var type = m[1].toUpperCase();
                  bq.dataset.callout = type.toLowerCase();
                  first.innerHTML = first.innerHTML.slice(m[0].length);
                  if (!first.textContent.trim()) first.remove();
                  var title = document.createElement("div");
                  title.className = "callout-title";
                  title.textContent = LABEL[type];
                  bq.insertBefore(title, bq.firstChild);
                });
              })();

              // 宽表格外包一层 .table-wrap 以横向滚动（避免长内容溢出到右侧目录）
              (function () {
                document.querySelectorAll(".markdown-section table").forEach(function (t) {
                  var p = t.parentNode;
                  if (!p || (p.classList && p.classList.contains("table-wrap"))) return;
                  var w = document.createElement("div");
                  w.className = "table-wrap";
                  p.insertBefore(w, t);
                  w.appendChild(t);
                });
              })();

              const content = document.querySelector(".markdown-section");
              const tocContent = document.getElementById("toc-content");

              if (!content || !tocContent) return;

              const headings = content.querySelectorAll("h1, h2, h3, h4");
              let html = "";

              headings.forEach((heading) => {
                const level = heading.tagName.toLowerCase();
                const text = heading.textContent;
                const id = heading.id;

                if (id) {
                  const currentRoute = window.location.hash.split("?")[0];
                  const href = `${currentRoute}?id=${encodeURIComponent(id)}`;
                  html += `<a href="${href}" class="${level}">${text}</a>`;
                }
              });

              tocContent.innerHTML = html;

              const links = tocContent.querySelectorAll("a");

              function updateActive() {
                let current = "";
                for (let i = 0; i < headings.length; i++) {
                  const h = headings[i];
                  if (h.id && h.getBoundingClientRect().top <= 120) current = h.id;
                }
                if (!current) {
                  for (let j = 0; j < headings.length; j++) { if (headings[j].id) { current = headings[j].id; break; } }
                }
                let activeLink = null;
                links.forEach((link) => {
                  const linkId = decodeURIComponent((link.getAttribute("href").split("id=")[1]) || "");
                  const on = linkId === current;
                  link.classList.toggle("active", on);
                  if (on) activeLink = link;
                });
                // 仅在高亮项「变化时」滚动 TOC，且瞬时（不用 smooth）——消除滚动卡顿
                if (activeLink && current !== updateActive._last) {
                  updateActive._last = current;
                  activeLink.scrollIntoView({ block: "nearest" });
                }
              }
              // 更新器挂全局；滚动监听全站只注册一次（避免每翻一页累积监听器）
              window.__tocUpdate = updateActive;
              if (!window.__tocScrollBound) {
                window.__tocScrollBound = true;
                let ticking = false;
                window.addEventListener("scroll", function () {
                  if (ticking) return;
                  ticking = true;
                  requestAnimationFrame(function () {
                    if (window.__tocUpdate) window.__tocUpdate();
                    ticking = false;
                  });
                }, { passive: true });
              }
              updateActive();
            });
          },
        ],
      };
    </script>
