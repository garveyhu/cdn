接对应 3.4 的 parallel tool calls。\n- 工具异常 catch 住不炸 loop = Agent 容错。\n- 真要上生产，把这套换成 **LangGraph**（自带持久化状态 + HITL + 可观测），手写版只用来证明你懂底层。\n\n---\n\n## ⑨ 面试官连环追问链\n\n> **Q1（入门）：Agent 和直接调 LLM 有什么区别？**\n>\n> 标准答法：裸 LLM 有四个天花板——只会说不会做、无记忆、知识截止、不会规划。Agent 用四模块补上：工具（做事）、记忆、规划、以 LLM 为大脑，在「感知—规划—行动」循环里调工具改变外部状态并把结果反馈回上下文。关键是**控制权交给了 LLM**。\n\n> **Q2：那什么时候该用 Agent，什么时候用 Workflow？**\n>\n> 标准答法：能用 Workflow 就别用 Agent。判断准则是\"路径是否可预先确定\"——固定路径用 Workflow（可预测、低成本、易测试）；只有当步数不可知、需要模型运行时自己决定用哪些工具时才上 Agent。这是 Anthropic《Building Effective Agents》的核心立场。（顺势把\"我 Java 背景偏好确定性、能用状态机不上 Agent\"这句克制端出来。）\n\n> **Q3（深一层）：Function Calling 底层到底发生了什么？LLM 真的调用了 API 吗？**\n>\n> 标准答法：没有。LLM 只输出**结构化的调用意图**（函数名+参数 JSON），真正的执行在你的外部代码——解析 JSON、路由到本地函数、执行、把结果以 `role:tool` 回灌，模型再基于结果继续生成。一次工具调用至少两次 LLM 往返。LLM 全程没碰真实世界。\n\n> **Q4：如果模型一次返回了多个 tool_calls 怎么处理？**\n>\n> 标准答法：彼此独立就并发执行（asyncio.gather）后一次性回灌；有依赖的模型一般分轮要，但代码要做防御。关键是每个 tool 结果必须带对应 `tool_call_id`，否则模型对不上号。\n\n> **Q5：ReAct 有什么问题？你会怎么改？**\n>\n> 标准答法：三个缺陷——上下文漂移（轮数多了累积噪声、忘目标）、高延迟高成本（严格串行）、规划执行耦合（贪心走一步看一步）。改进：长任务用 Plan-and-Execute 解耦规划/执行、可重试任务加 Reflexion 反思、需回溯的难题用 ToT 思想（多候选+自评），并用 Deep Agents 的 planning tool + 文件系统外置记忆来对抗漂移。\n\n> **Q6：MCP 解决什么？为什么 2025 它火了？**\n>\n> 标准答法：解决工具集成的 N×M 地狱——工具方实现一次 MCP Server，所有 MCP 客户端即插即用，变 N+M。2025 火是因为它补齐了生产化的拼图：Streamable HTTP 传输（可远程部署）、OAuth 2.1 鉴权、官方 Registry（18000+ server）、Tasks 长任务异步，并在 2025-12 捐给 Linux Foundation 的 AAIF，从 Anthropic 私有协议变成厂商中立标准。\n\n> **Q7（安全深挖）：MCP 有什么安全风险？**\n>\n> 标准答法：核心是 Tool Poisoning——恶意 server 在工具描述/schema 里藏注入指令（描述是直接喂给 LLM 的不可信文本）。真实案例 CVE-2025-54135（CurXecute，配置实时生效→RCE）、CVE-2025-54136（MCPoison，篡改已信任配置→持久化 RCE）。防御按\"不可信外部依赖\"对待：最小权限、工具白名单、schema 强校验、敏感操作二次确认、配置变更需重新授权、审计全留。（把你的后端安全直觉端出来。）\n\n> **Q8（判断力高峰）：你会用 Multi-Agent 吗？Anthropic 说多 Agent 强 90%，Cognition 却说别建多 Agent，你怎么看？**\n>\n> 标准答法：两边都对，看任务。Anthropic 的 90.2% 提升来自并行多 Agent，但代价是 ~15x token，且 token 用量解释了 80% 性能方差——本质是用并行撑大 token 预算，只对高价值任务划算。Cognition 反对是因为多 Agent 割裂上下文导致 misalignment。Berkeley MAST（NeurIPS 2025）从 1600+ 轨迹归纳出 14 个失败模式、3 大类：系统设计 44.2%、agent 间错位 32.3%、验证缺失约 23%——而且系统设计里最大的两个模式是\"步骤重复 15.7%\"和\"不知道何时该停 12.4%\"，说明很多失败其实是终止/协调没设计好。我的收敛准则：**读多、可并行的（多路检索/信息收集）用多 Agent 吃并行红利；涉及写/改状态/要决策一致的收敛到单 Agent 串行**——因为写操作必须串行化，串行化会抵消并行收益。额外 Agent 应贡献智能而非动作。\n\n> **Q9（评估深挖）：长程 Agent 怎么评估可靠性？为什么不用 pass@1？**\n>\n> 标准答法：因为误差复利——n 步串联、每步成功率 p，整体≈pⁿ，p=0.95、n=20 只剩 0.36。pass@1 会严重高估，研究里 GPT-4 系 Agent 从 pass@1 约 60% 掉到 pass@8 约 25%。所以要用 pass@k/pass^k 衡量稳定性。降复利：减步数、每步加校验、关键步幂等可重试。\n\n> **Q10（生产落地）：真上生产你用什么框架？怎么防死循环？**\n>\n> 标准答法：LangGraph（2025-10 GA 1.0，Uber/LinkedIn/Klarna 在用），把 Agent 建成有状态图，自带 durable state 断点续跑 + human-in-the-loop，可观测可控。死循环防护：最大步数/token 熔断、(action,args) 指纹重复检测、无进展检测、单步与整任务超时。这套就是后端的超时/熔断/限流直觉迁移到 Agent。\n\n---\n\n## ⑩ 高频真题 + 参考答案\n\n**真题 1：「请解释 Agent 的核心组成，并说明它解决了 LLM 的什么问题。」**\n\n参考答案：Agent = 大脑（LLM）+ 规划 + 记忆 + 工具，对应 LLM 的四个天花板：工具解决\"只会说不会做\"、记忆解决\"无记忆 + 上下文有限\"、工具/RAG 解决\"知识截止\"、规划解决\"不会复杂任务拆解\"。它把控制权交给 LLM，在感知-规划-行动循环里运行。\n\n**真题 2：「ReAct、Plan-and-Execute、Reflexion、Tree of Thoughts 有什么区别，各自适合什么场景？」**\n\n参考答案：见 ④ 的对比表。一句话——ReAct 通用但会漂移、串行慢；Plan-and-Execute 解耦规划执行、有全局视野但开局可能错；Reflexion 失败后反思重试、适合可重试任务；ToT 树搜索找最优、适合需回溯的难题但成本指数级。\n\n**真题 3：「Function Calling 时，如果一次要调 3 个互相不依赖的接口，你怎么设计？」**\n\n参考答案：现代模型一次响应可返回多个 tool_calls。我会用 asyncio.gather 并发执行这 3 个独立调用，全部完成后把 3 个结果（各带 tool_call_id）一次性回灌给模型再续推理——既保证延迟最低，又保证模型能把结果对上号。有依赖的部分让模型分轮要，代码侧做防御性检测。\n\n**真题 4：「MCP 和 RAG 是什么关系？MCP 会取代 RAG 吗？」**\n\n参考答案：不是一个层面的东西，不存在取代。RAG 是一种**检索增强的方法**（把外部知识检索回上下文）；MCP 是一个**工具/数据接入的协议标准**。RAG 完全可以**通过** MCP 来实现——把向量检索能力封装成一个 MCP Server 的 Resource/Tool，Agent 用 MCP 统一接口去调它。MCP 让 RAG 这类能力更标准化、可复用。\n\n**真题 5：「你的 Agent 在生产上偶尔会卡住不返回，怎么排查和防护？」**\n\n参考答案：先分类——是死循环（反复调同一工具）、还是单步工具超时、还是步数膨胀。防护三层：(1) 单工具 asyncio.wait_for 超时；(2) (action,args) 指纹做重复检测，连续 N 次相同就熔断；(3) max_steps / max_token 硬上限兜底，整任务 timeout。可观测上每步打 trace（步号、工具、耗时、token），用 LangSmith 这类工具回放。长任务用 MCP Tasks 异步化，别让客户端干等。\n\n**真题 6：「Multi-Agent 系统最容易在哪里出问题？给个数据。」**\n\n参考答案：最容易在**协调与上下文对齐**上出问题，不是单体能力。Berkeley 的 MAST 研究标注 1600+ 轨迹，失败归因里系统设计占 44.2%、agent 间错位（inter-agent misalignment）占 32.3%，其中\"推理-动作不匹配\"13.2%、\"任务跑偏\"7.4%。所以我的原则是：写操作收敛单 Agent、只让额外 Agent 做并行的读/分析。\n\n---\n\n## ⑦' 项目话术钩子（嫁接你的 Agent 项目，STAR）\n\n> 把你做过的\"Agent / 工具调用 / Function Calling\"项目，按下面 STAR 模板讲，每个钩子都对应本章一个深挖点。\n\n**钩子 A：Function Calling 工程化（对应 3.4 / Q3-Q4）**\n\n- **S**：业务方要一个能查内部数据（订单、库存、知识库）的智能助手，早期版本是把所有 API 结果一股脑塞进 prompt，token 爆炸还经常调错接口。\n- **T**：我负责把它重构成基于 Function Calling 的 Agent。\n- **A**：把每个内部 API 封装成带严格 JSON schema 的 tool，做了**工具白名单**（未注册一律拒绝）、**参数强校验**、对独立工具用 asyncio.gather **并发执行**、每个结果按 tool_call_id 回灌；并用我后端的直觉给每个工具加了**超时 + 幂等键**（写类操作）。\n- **R**：平均响应延迟下降约 X%（并发工具），错误调用率从 Y% 降到 Z%（schema 校验 + 白名单），token 成本下降约 W%。\n- **深挖防御**：被问\"LLM 怎么知道调哪个\"——答 tool schema 的 description 质量决定路由准确率，我专门 A/B 调过描述措辞。\n\n**钩子 B：可靠性 / 死循环治理（对应 7.5 / 7.6 / Q10）**\n\n- **S**：Agent 上线后偶发卡死、反复调同一个搜索工具、token 失控。\n- **T**：我把可靠性当后端 SLA 来治。\n- **A**：加了 (action,args) 指纹死循环检测 + max_steps 熔断 + 单工具超时 + 全链路 trace（步号/工具/耗时/token）；把长任务改成异步轮询。还用 pass@k 思路重做了评测，发现 pass@1 虚高，针对高复利步骤加了校验。\n- **R**：卡死类工单清零，token 月成本下降约 X%，长程任务成功率（pass@5）从 A% 提到 B%。\n\n**钩子 C：判断力——没盲目上 Multi-Agent（对应 7.4 / Q8，最拉档）**\n\n- **S**：团队想把单 Agent 拆成多个专家 Agent 追热点。\n- **T**：我做了技术评估。\n- **A**：我提出按\"读/写\"分流——信息收集类（多路检索）做并行子 Agent，但**写操作（下单、改状态）坚持收敛单 Agent 串行**，理由是写必须串行化、否则 misalignment 风险（引用了 Berkeley MAST 的 32.3% 和 Cognition 的 single-writer）。\n- **R**：避免了一次过度设计，既拿到并行检索的提速，又没引入多 Agent 的协调 bug。**这段话能直接让面试官看到你不是只会堆架构。**\n\n---\n\n## ⑧' 常见失分点\n\n1. **说\"LLM 自己调用了 API\"**——硬伤。LLM 只出意图，执行在外部代码。\n2. **Agent 和 Workflow 不分**——被问\"什么时候用哪个\"答不出\"控制权位置\"这个准则。\n3. **只会背 ReAct，说不出它的缺陷**——上下文漂移/串行延迟/规划执行耦合三个必须张口就来。\n4. **Multi-Agent 一边倒**——只夸 Anthropic 90% 不提 15x token 和 Cognition 的反方，显得没读过原文、没判断力。\n5. **不知道误差复利、张口就用 pass@1 评长程**——暴露没做过真实长程 Agent。\n6. **MCP 只会说\"USB-C\"**——被深挖 Streamable HTTP / OAuth 2.1 / Tasks / 捐 Linux Foundation / Tool Poisoning CVE 就崩。\n7. **Memory 只会说\"存向量库\"**——答不出\"上下文放不下怎么办\"的四件套、说不清 RAG 和记忆的关系。\n8. **死循环检测答不上**——生产 Agent 必踩的坑，答不出熔断三件套等于没上过生产。\n9. **协议三层混淆**——把 MCP（纵向工具）、A2A（横向 Agent）、AG-UI（到前端）搞混或只知道 MCP。\n10. **不提框架 / 不提可观测**——纯讲原理不落地，显得停留在 demo 阶段；提一句 LangGraph 1.0 + trace 立刻不一样。\n\n---\n\n## ⑨' 一句话速记\n\n**Agent = LLM 大脑 + 规划 + 记忆 + 工具，在循环里把控制权交给模型；能用 Workflow 就别用 Agent；Function Calling 是 LLM 只出意图、外部代码真执行；ReAct 会漂移、串行慢、规划执行耦合；MCP 接工具（纵向，2025-12 已归 Linux Foundation）、A2A 连 Agent（横向）、AG-UI 通前端；Multi-Agent 读多写少才并行、写操作收敛单 Agent，长程用 pass@k 评因为误差会复利。**\n\n---\n\n### 参考来源\n\n- [Anthropic · Building Effective Agents](https://www.anthropic.com/research/building-effective-agents)\n- [Anthropic · How we built our multi-agent research system](https://www.anthropic.com/engineering/multi-agent-research-system)（90.2% / ~15x token / token 解释 80% 方差）\n- [Cognition · Don't Build Multi-Agents (Walden Yan)](https://cognition.ai/blog/dont-build-multi-agents)\n- [Why Do Multi-Agent LLM Systems Fail? (Berkeley MAST, arXiv:2503.13657)](https://arxiv.org/abs/2503.13657)（误差归因 44.2% / 32.3%）\n- [MCP joins the Agentic AI Foundation (2025-12-09)](https://blog.modelcontextprotocol.io/posts/2025-12-09-mcp-joins-agentic-ai-foundation/)\n- [Linux Foundation · 成立 AAIF 公告](https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation)\n- [MCP Apps：SEP-1865 交互式 UI 扩展 (2025-11-21)](https://blog.modelcontextprotocol.io/posts/2025-11-21-mcp-apps/)\n- [Cursor MCP 漏洞 CVE-2025-54135 / 54136 (The Hacker News)](https://thehackernews.com/2025/08/cursor-ai-code-editor-vulnerability.html)\n- [Tenable · CVE-2025-54135 / 54136 FAQ（CurXecute 8.6 / MCPoison 7.2）](https://www.tenable.com/blog/faq-cve-2025-54135-cve-2025-54136-vulnerabilities-in-cursor-curxecute-mcpoison)\n- [LangGraph 1.0 GA (2025-10-22)](https://www.langchain.com/blog/langchain-langgraph-1dot0)\n- [LangChain · Deep Agents](https://www.langchain.com/deep-agents)\n- [Anthropic · Effective context engineering for AI agents（context rot / compaction / 三件套）](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents)\n- [A2A vs MCP vs AG-UI 协议三层](https://a2aprotocol.ai/blog/a2a-mcp-ag-ui)\n- [Beyond pass@1: A Reliability Science Framework for Long-Horizon LLM Agents (arXiv:2603.29231)](https://arxiv.org/abs/2603.29231)\n- [Measuring Long Horizon Execution in LLMs（误差复利 / self-conditioning，arXiv:2509.09677）](https://arxiv.org/abs/2509.09677)\n", "/05-微调与对齐/README.md": "# 05 · 微调与对齐\n\n> 通关层 · **待补实操**（你简历最大的失分黑洞之一，也是高薪分水岭）\n\n## 1 · 本章在面试里的位置：高薪分水岭\n\n面试官分辨\"用过 API 的应用开发\"和\"懂模型的 AI 工程师\"，**微调这一刀切得最干净**。原因有三：\n\n1. **它是高薪分水岭**。会调 Prompt、会搭 RAG 的人遍地都是（已是基线），但能把\"什么时候该微调、LoRA 为什么 A 高斯 B 全零、QLoRA 怎么省显存、DPO 比 PPO 强在哪、GRPO 为什么敢去掉 Critic\"答到反射级的人，凤毛麟角。这一段答得透，定级和薪资直接上一档。\n2. **它是应用岗最大的失分黑洞**。很多候选人 RAG / Agent 做得不错，一到微调就只会背\"LoRA 是低秩\"，再追问\"秩 r 怎么选\"\"α/r 是干嘛的\"\"灾难性遗忘怎么缓解\"就崩。面试官知道这点，所以**专挑这里深挖**。\n3. **它考的是你的决策力，不只是手艺**。第一问几乎一定是\"**这个需求你会微调还是 RAG / Prompt？**\"——答错方向，后面技术答得再好都掉分。\n\n本章按\"决策框架 → SFT → PEFT/LoRA/QLoRA → 灾难性遗忘 → RLHF/DPO/GRPO → 数据与评估\"推进，**必杀点（LoRA 初始化、α/r、GRPO 去 Critic）给到数学层**。实操部分明确标注\"这是你要补的\"，指向 [13 · 实操实验室](13-实操实验室/)。\n\n---\n\n## 2 · 知识地图\n\n```mermaid\ngraph TB\n    classDef decision fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef stage fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef method fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef leaf fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Start{{\"需求来了：缺知识 / 缺能力？\"}}:::decision\n\n    Start -->|\"缺时效知识、要可溯源\"| RAG[\"RAG（外挂知识）\"]:::leaf\n    Start -->|\"缺格式、缺风格、缺领域能力\"| FT[\"微调（改模型权重）\"]:::stage\n    Start -->|\"只是任务描述不清\"| PE[\"Prompt 工程\"]:::leaf\n\n    FT --> SFT[\"SFT 指令微调<br/>学'怎么答'\"]:::method\n    FT --> Align[\"对齐<br/>学'答得好不好'\"]:::method\n\n    SFT --> Full[\"全参微调<br/>显存爆炸\"]:::leaf\n    SFT --> PEFT[\"PEFT 参数高效\"]:::method\n\n    PEFT --> LoRA[\"LoRA<br/>ΔW=BA 低秩\"]:::leaf\n    PEFT --> QLoRA[\"QLoRA<br/>4-bit NF4 + LoRA\"]:::leaf\n    PEFT --> Other[\"Adapter / Prefix / IA3\"]:::leaf\n\n    Align --> RLHF[\"RLHF/PPO<br/>训 Reward Model（4 模型）\"]:::leaf\n    Align --> DPO[\"DPO<br/>直接优化偏好（2 模型）\"]:::leaf\n    Align --> GRPO[\"GRPO<br/>去掉 Critic\"]:::leaf\n\n    DPO --> DPOv[\"SimPO / KTO / ORPO<br/>免 ref / 非成对 / 并入 SFT\"]:::leaf\n    GRPO --> GRPOv[\"DAPO / Dr.GRPO / GSPO<br/>修长度·难度偏置 / 序列级\"]:::leaf\n\n    Risk[\"灾难性遗忘<br/>混通用数据 / 降 lr / LoRA / 参考约束\"]:::note\n    SFT -.-> Risk\n```\n\n---\n\n## 3 · 核心原理\n\n### 3.1 决策框架：何时微调 vs RAG vs Prompt（第一道必答题）\n\n![微调vs RAG vs Prompt：缺什么用哪把钥匙](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/05-1-three-keys.png ':class=xh-illust')\n\n一句话锚点：**RAG 解决\"模型不知道\"，微调解决\"模型不会做\"，Prompt 解决\"没把任务说清楚\"。**\n\n| 维度 | Prompt 工程 | RAG | 微调（SFT/对齐） |\n|------|------------|-----|-----------------|\n| 解决什么 | 任务描述、In-Context 示例 | 缺**知识**（时效、私域、长尾事实） | 缺**能力 / 格式 / 风格 / 领域语感** |\n| 知识可更新性 | 改 Prompt 即时生效 | 更新知识库即时生效 | 要重训才更新 |\n| 可溯源 | 否 | **是**（带出处） | 否（知识焊进权重） |\n| 成本 | 最低 | 中（向量库 + 检索） | 高（数据 + 算力 + 评估闭环） |\n| 上手顺序 | **先试** | 知识类需求**优先** | 前两者顶不住才上 |\n\n**面试落地决策树（背下来）**：\n\n1. 先 Prompt + Few-shot。**80% 的\"效果不好\"是 Prompt 没写好**，不是模型不行。\n2. 任务是\"答事实 / 查资料 / 要带出处\" → **RAG**。知识天天变、要溯源、不能瞎编，微调救不了（焊进权重的知识既过时又不可溯源，还可能加剧幻觉）。\n3. 任务是\"固定输出格式 / 特定话术风格 / 领域术语理解 / 把复杂指令内化成默认行为\"、且 RAG+Prompt 已顶不住 → **微调**。典型：把 JSON schema 遵循率从 85% 拉到 99%、客服话术风格统一、医疗 / 法律领域语感。\n4. **RAG 与微调不是二选一**：常见组合是\"微调让模型学会用检索结果 + RAG 提供知识\"（先 SFT 教格式与调用习惯，再 RAG 喂事实）。知识侧怎么搭检索、怎么保溯源，见 [03 · RAG 全链路](03-RAG全链路/)。\n\n> 反例陷阱：面试官问\"用户要一个能回答公司最新规章的助手，你微调吗？\"——**不微调**。规章会更新、要溯源，这是 RAG 的活。答\"微调\"直接掉分。\n\n### 3.2 SFT / 指令微调：loss 为什么只算回答部分（高频细节考点）\n\nSFT（Supervised Fine-Tuning）= 拿 `(instruction, response)` 对，用**标准的 next-token 交叉熵**让模型学\"看到这种指令，该这么答\"。\n\n**必答细节：loss 只在 response token 上算，prompt 部分要 mask 成 `-100`。**\n\n- 训练样本是 `prompt + response` 拼成一条序列喂进去。\n- 但我们要模型学的是\"**怎么生成回答**\"，不是\"怎么复述问题\"。\n- 实现上：把 `labels` 里**对应 prompt 的所有 token 置成 `-100`**。`-100` 是 PyTorch `CrossEntropyLoss` 的默认 `ignore_index`，这些位置不进 loss、不产生梯度。\n- 同理，**padding token 也置 `-100`**。\n\n为什么这么干（追问标准答法）：\n\n1. **目标对齐**：训练目标就是提升回答质量，让梯度只来自\"生成回答\"的能力，不被\"预测问题文本\"污染。\n2. **避免学偏**：若不 mask，固定的指令模板会被反复当作学习目标，模型可能过拟合到复述 prompt，回答能力反而被稀释。\n3. **工程注意**：HF TRL 的 `DataCollatorForCompletionOnlyLM` 可自动只在 completion 上算 loss（代价是不支持 sample packing）。\n\n> 注：是否一定要 mask 有争议——当 prompt 多样、想让模型也建模指令分布时，有研究表明算上 prompt loss 也行甚至略好。但**面试默认答\"mask 掉 prompt、只算 response、用 -100\"**，这是绝大多数指令微调的标准做法，能讲清 why 就过关。\n\n### 3.3 PEFT 有哪些：为什么不全参微调\n\n全参微调（Full Fine-Tuning）= 更新所有权重。问题在显存：用 Adam 训一个 Ψ 参数的模型，显存约 **`16Ψ` 字节**（fp16 权重 2Ψ + 梯度 2Ψ + Adam 的 momentum/variance 各 fp32 共 8Ψ + fp32 主权重 4Ψ ≈ 16Ψ）。7B 模型光优化器状态就要上百 GB，单卡根本放不下。\n\n**PEFT（Parameter-Efficient Fine-Tuning）**：冻结绝大部分原权重，只训一小撮新增 / 选中的参数。主流家族：\n\n| 方法 | 做法 | 特点 |\n|------|------|------|\n| **LoRA** | 旁路注入低秩矩阵 BA，原权重冻结 | 主流；**推理可合并、零额外延迟** |\n| **QLoRA** | 基座 4-bit 量化冻结 + LoRA 适配器 | 显存杀手锏，单卡微调大模型 |\n| **Adapter** | 层间插入小 bottleneck MLP，串在主干里 | 早期方案；**推理多一层算，有延迟** |\n| **Prefix / Prompt Tuning** | 在每层 KV 前拼可训练的虚拟 token | 占用上下文长度；表达力受限 |\n| **IA³** | 学一组缩放向量去乘激活 | 参数量极小，灵活性低于 LoRA |\n\nLoRA 之所以成主流，关键是下一节的**\"推理可合并回原权重、零额外延迟\"**——这是它对 Adapter / Prefix 的核心优势。\n\n### 3.4 LoRA 原理（必杀点：数学到底）\n\n<div class=\"anim\" data-anim=\"lora-lowrank\"><\/div>\n\n**核心假设**：微调时权重的更新量 `ΔW` 具有**低\"内在秩\"（intrinsic rank）**——不需要一个满秩的 `d×d` 大矩阵去表达这次任务的改动，用两个瘦长矩阵的乘积就够。\n\n**做法**：冻结原权重 `W₀`，旁路注入一对低秩矩阵 `A`、`B`，更新量写成它们的积：\n\n$$\nW = W_0 + \\Delta W = W_0 + \\frac{\\alpha}{r}\\, B A\n$$\n\n- `W₀ ∈ ℝ^{d×k}`：原权重，**冻结，不更新**。\n- `A ∈ ℝ^{r×k}`、`B ∈ ℝ^{d×r}`：可训练，`r ≪ min(d, k)`。\n- `ΔW = BA ∈ ℝ^{d×k}`：秩最多为 `r`。\n- 前向：`h = W₀ x + (α/r)·B A x`。\n\n参数量从 `d×k` 砍到 `r×(d+k)`。以 `d=k=4096`、`r=8` 为例：`4096² ≈ 1677 万` → `8×(4096+4096) ≈ 6.5 万`，**降到约 0.4%**。\n\n#### 必杀点①：A 高斯初始化、B 全零，保证起始 ΔW = 0\n\n![LoRA：B全零起始ΔW=0，与原模型一致](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/05-2-lora-zero.png ':class=xh-illust')\n\n> 这是被深挖必问、答错就露怯的点。\n\n- **A** 用随机**高斯初始化**（小方差），**B 初始化为全零**。\n- 于是训练第一步 `ΔW = B A = 0 · A = 0`，即 `W = W₀`。\n- **意义**：模型起始与预训练基座**完全等价**，不会因为随机注入的旁路一上来就扰乱预训练学到的表征，训练从一个\"无害\"的起点平滑出发。\n- **为什么不能 A、B 都置零？** 那样梯度对称、两个矩阵收不到有效更新信号（对称破缺失败），学不动。必须一个非零（A 提供随机性打破对称）、一个零（B 保证起始 ΔW=0）。\n\n#### 必杀点②：秩 r 怎么选 + α/r 缩放\n\n**秩 r 的影响**：\n\n- `r` 是**容量旋钮**。`r` 越大，`ΔW` 可表达的更新越丰富，但参数和过拟合风险也越大。\n- 经验区间：简单任务（风格 / 格式）`r=8~16` 常够；复杂、与预训练分布偏离大的任务用 `r=32~64`；**盲目堆大 r 收益递减还易过拟合**。\n- 一句话答法：\"r 是低秩近似的秩，决定 ΔW 的表达容量；从 8/16 起步，按验证集效果上调，不是越大越好。\"\n\n**缩放因子 α / r 的作用**：\n\n- `α/r` 是 `ΔW` 的**缩放系数**，控制旁路对原模型的影响强度。原论文里 `α` 设为\"第一个尝试的 r 值\"，**不调它，只调 r**——目的是当你改 `r` 时，旁路的有效幅度不会跟着剧烈变化，**减少超参重调**。\n- 常见工程约定 **`α = 2r`**（即有效缩放 `α/r = 2`）。**关键追问：r 变了 α 怎么调？** 若沿用\"`α/r` 恒定\"的思路，**r 翻倍时 α 也翻倍**（保持 `α/r` 不变），这样有效更新幅度稳定、其他超参基本不用重调。\n- 直觉：把 `α/r` 理解成\"旁路这条支路的音量\"，`r` 调容量、`α/r` 调音量，两者解耦才好调。\n- **加分追问：大 r 收益为什么常上不去？** 原始 `α/r` 缩放在 `r` 变大时让有效幅度被\"过度压缩\"，旁路学不动——**rsLoRA（Rank-Stabilized LoRA）**把缩放改成 `α/√r`，理论上稳定了大 `r` 下的梯度尺度，**让\"堆大 r\"重新有正收益**（PEFT 里开 `use_rslora=True` 即用）。这是\"r 越大越好不成立\"背后的工程真相之一，能讲出来直接区别于背书党。\n\n#### 必杀点④（前沿加分）：初始化不止\"A 高斯 B 全零\"——PiSSA / LoRA-GA\n\n> 答完标准初始化后，能补一句\"还有更激进的初始化范式\"，立刻显出你跟到了 2024–2025 的前沿。\n\n- **标准 LoRA**：A 高斯、B 全零，起始 `ΔW=0`、与基座等价（见必杀点①）。稳，但收敛相对慢、最终效果略逊全参。\n- **PiSSA（Principal Singular Values & Vectors Adaptation, 2024）**：先对 `W₀` 做 SVD，用**前 r 个主奇异分量初始化 A、B**（即让 BA 一上来就承载 `W₀` 最\"主成分\"的部分），剩余分量冻结成残差。**起始 ΔW≠0**，但收敛更快、效果更接近全参微调。\n- **LoRA-GA（Gradient Approximation, NeurIPS 2024）**：让 LoRA 第一步的更新方向**逼近全参微调的梯度方向**来初始化，进一步追平全参。\n- **面试落地话术**：「默认用 A 高斯 / B 全零保起始等价；想更快收敛 / 更接近全参，可上 PiSSA 这类基于 SVD 主成分的初始化——代价是起始不再与基座等价、实现更重。生产里我会先用标准初始化跑通，再视效果决定是否换。」**点明边界、不盲目追新，比硬背 PiSSA 更得分。**\n\n#### 必杀点③：推理零额外延迟（可合并回原权重）\n\n- 训练完把 `ΔW = (α/r)BA` **一次性加回 `W₀`**：`W' = W₀ + (α/r)BA`，得到一个和原模型**形状完全相同**的权重矩阵。\n- 推理时直接用 `W'`，**没有任何额外的矩阵乘、没有多出来的层** → **零推理延迟**。\n- 对比 **Adapter**：bottleneck 层串在主干里，推理时每层都要多算一遍，**有延迟**（尤其小 batch / 在线服务下明显）。\n- 对比 **Prefix-Tuning**：虚拟 token 占用宝贵的上下文长度、表达力受限。\n- 额外好处：一个基座 + 多个小 LoRA 包（每个几十 MB）可热插拔切任务，**部署友好**。\n\n### 3.5 QLoRA：单卡微调大模型的显存杀手锏\n\nQLoRA = **基座 4-bit 量化冻结 + LoRA 适配器用 BF16 训练**。三件套：\n\n1. **4-bit NF4（NormalFloat4）量化**：把冻结的基座权重量化到 4-bit。NF4 是**信息论意义上对\"零均值正态分布\"最优**的 4-bit 数据类型——而预训练后的权重恰好近似零均值正态，所以 NF4 比普通 4-bit int 表达更精准。\n2. **Double Quantization（双重量化）**：连量化用的常数（scale）也再量化一次，**平均每参数再省约 0.37 bit**。\n3. **Paged Optimizers（分页优化器）**：用 CUDA 统一内存，在长序列 / 大 batch 导致的显存尖峰时把优化器状态临时换出，防 OOM。\n\n**关键澄清（高频追问）**：\n\n- 基座是 4-bit 存储、**冻结不训**；前向计算时按需**反量化到 BF16** 参与运算。\n- **梯度只流过 LoRA 适配器**（BF16），4-bit 基座不更新——所以低精度量化误差不会被反复累积放大。\n- 战绩：QLoRA 让 **65B 模型在单张 48GB GPU 上微调**，且保持接近全精度（16-bit）微调的效果。这就是\"消费级 / 单卡也能微调大模型\"的由来。\n\n> 一句话区分 LoRA vs QLoRA：LoRA 省的是**可训练参数**（基座还是 16-bit 占显存）；QLoRA 在 LoRA 基础上把**基座本身压到 4-bit**，省的是**基座的显存占用**。\n\n### 3.6 灾难性遗忘（Catastrophic Forgetting）及缓解\n\n**现象**：在窄领域数据上微调后，模型把预训练 / 之前学的通用能力\"忘了\"——通用对话、推理、其他领域明显退化。本质是新任务的梯度把承载旧能力的权重冲掉了。\n\n**缓解手段（成体系答，别只说一条）**：\n\n1. **混通用数据（Replay / Rehearsal）**：训练集里掺一定比例的通用 / 旧任务数据（真实或合成），让梯度不至于全往窄领域偏。最常用、最直接。\n2. **降学习率 + 控 epoch**：lr 调小、别训太多轮，更新幅度小，旧权重扰动小。\n3. **用 LoRA 限制更新范围**：只动低秩旁路、冻结基座，**天然更抗遗忘**。有论文（\"LoRA Learns Less and Forgets Less\"）量化对比：LoRA 学得少一些，但**遗忘也少很多**，更贴近基座分布。注意——LoRA 不是免疫，强行猛训照样遗忘。\n4. **参考模型约束（正则化）**：用 KL 散度把当前策略拉住、别偏离参考模型太远（这正是 RLHF/DPO 里 reference model 的作用）；或 EWC 用 Fisher 信息给重要权重加二次惩罚保护。\n\n> 串讲技巧：把\"reference model 约束\"和后面 RLHF 的 KL 惩罚关联起来讲，面试官会觉得你是把对齐这一整块打通了，而不是零碎背点。\n\n### 3.7 SFT vs RLHF：有了 SFT 为什么还要 RLHF\n\n- **SFT 教\"怎么答\"**：模仿标注好的正确回答（行为克隆）。但它**只见过正例**，学的是\"长得像参考答案\"，无法分辨\"A 答案比 B 答案好在哪\"\"哪些回答有害要避免\"。\n- **RLHF 教\"答得好不好\"**：用**人类偏好**（A 比 B 好）训练，让模型在\"什么是更受偏好的回答\"这个更难、更主观的维度上对齐——有用性、无害性、诚实度（3H）。\n- 直觉对比：SFT 像\"抄范文\"，RLHF 像\"老师在你写的几篇里挑出更好的那篇并告诉你为什么\"。偏好信号（排序）比\"写一篇满分范文\"**更容易标注**，也更能覆盖\"避免坏回答\"这类负向目标。\n- 标准流水线：**预训练 → SFT → 偏好对齐（RLHF / DPO / GRPO）**。SFT 是对齐的**起点和地基**（reference model 通常就是 SFT 模型），没有 SFT，RLHF 的策略和参考都无从初始化。\n\n### 3.8 RLHF / PPO 流程（clip + 为什么要 reference model）\n\n经典 RLHF 三段：\n\n1. **SFT**：得到基础策略模型。\n2. **训练 Reward Model（RM）**：拿人类偏好对 `(chosen, rejected)`，训一个打分模型 `r(x,y)`，让 `r(chosen) > r(rejected)`。\n3. **PPO 强化学习**：策略模型生成回答 → RM 打分 → PPO 用这个 reward 更新策略，最大化期望奖励。\n\n**PPO 的两个必答机制**：\n\n**① Clip（裁剪）—— 为什么需要**：PPO 优化的是带裁剪的代理目标：\n\n$$\nL^{CLIP} = \\mathbb{E}\\Big[\\min\\big(\\rho\\,\\hat{A},\\ \\text{clip}(\\rho,\\ 1-\\epsilon,\\ 1+\\epsilon)\\,\\hat{A}\\big)\\Big]\n$$\n\n其中 `ρ = π_θ(a|s)/π_old(a|s)` 是新旧策略概率比，`Â` 是优势。把 `ρ` 裁到 `[1-ε, 1+ε]`（典型 `ε=0.2`），**限制单步更新幅度**——一步走太大、策略剧变会让训练崩。Clip 取 min，使得当某动作优势很大时也不会无限增大概率（防过度激进、间接抑制 reward hacking）。\n\n**② Reference Model（参考模型）+ KL 惩罚 —— 为什么必须有**：reward 里减一个 KL 惩罚项，把策略 `π_θ` 拉住、别偏离参考模型 `π_ref`（通常就是 SFT 模型）太远：\n\n$$\n\\text{reward} = r(x,y) - \\beta\\,\\mathrm{KL}\\big(\\pi_\\theta(\\cdot|x)\\,\\|\\,\\pi_{\\text{ref}}(\\cdot|x)\\big)\n$$\n\n两个核心作用：\n\n- **防 Reward Hacking**：RM 是个有缺陷的近似打分器。没有 KL 约束，策略会去钻 RM 的漏洞——生成 RM 高分但实际是乱码 / 谄媚 / 复读的垃圾（\"reward 刷分但语言退化成 gibberish\"）。KL 把它锚在合理的语言分布里。\n- **保留预训练知识**：别为了讨好 RM 把通用能力丢了（又一次对抗灾难性遗忘）。\n\n> PPO 工程上有多少个模型？**4 个**：Policy（训）、Reference（冻结，算 KL）、Reward Model（冻结，打分）、Critic/Value（训，估计优势）。**显存与工程复杂度高**——这正是 DPO / GRPO 想砍掉的东西。\n\n### 3.9 DPO：跳过 Reward Model，直接在偏好数据上优化\n\n<div class=\"anim\" data-anim=\"rlhf-dpo\"><\/div>\n\n**DPO（Direct Preference Optimization）核心洞见**：RLHF 那套\"训 RM + RL\"可以用数学等价地**合并成一个简单的分类损失**，直接在 `(chosen, rejected)` 偏好对上优化策略，**不用训独立的 Reward Model、不用跑 RL**。\n\n损失函数：\n\n$$\n\\mathcal{L}_{DPO} = -\\,\\mathbb{E}_{(x,\\,y_w,\\,y_l)}\\Big[\\log\\sigma\\Big(\\beta\\big[\\log\\tfrac{\\pi_\\theta(y_w|x)}{\\pi_{\\text{ref}}(y_w|x)} - \\log\\tfrac{\\pi_\\theta(y_l|x)}{\\pi_{\\text{ref}}(y_l|x)}\\big]\\Big)\\Big]\n$$\n\n- `y_w` = chosen（偏好），`y_l` = rejected。\n- 直觉：**提高 chosen 相对 ref 的对数概率、压低 rejected 相对 ref 的对数概率**，两者差距经 `σ` 变成\"分对偏好\"的概率，最大化它。\n- **隐式奖励**：DPO 推导出最优策略与奖励的闭式关系，**奖励被隐式表达为** `r̂(x,y) = β·log[π_θ(y|x)/π_ref(y|x)]`——RM 没消失，而是\"内化进策略\"了。\n- `β` 控制偏离 reference 的程度（同 KL 系数的角色）。\n\n**DPO 相比 PPO 的优势（必答）**：\n\n1. **不用训 Reward Model**：少一个模型、少一道误差来源。\n2. **不用跑 RL**：就是个监督式分类损失，**稳定、好调、好复现**，工程量比 PPO 小一个量级。\n3. **显存 / 模型更少**：只需 Policy + Reference 两个模型（PPO 要四个）。\n\n**代价 / 局限**：DPO 是 off-policy、吃固定偏好数据集，没有\"在线探索\"；当偏好数据分布与策略偏离时可能不如在线 RL；对数据质量敏感。**但对绝大多数应用岗场景，DPO 是性价比最高的对齐方案**。\n\n**加分追问：DPO 之后有哪些变体？各解决什么？**（2024–2025 高频，能列清就显出跟进度）\n\n| 变体 | 关键改动 | 解决的问题 |\n|------|---------|-----------|\n| **SimPO** | **去掉 reference model**，奖励改成\"长度归一化的平均对数概率\" + margin | 免 ref（更省）、**抑制 DPO 偏好长回答的 verbosity** |\n| **KTO** | 用**非成对**的\"好 / 坏\"单条标注（受前景理论启发） | 没有成对偏好数据时也能对齐，标注更易得 |\n| **ORPO** | 把\"赔率比惩罚\"**直接揉进 SFT**，一步到位 | 免 ref、**SFT 与对齐合并成一阶段**，流水线更短 |\n\n> 落地话术：「默认 DPO；偏好数据不成对 → KTO；想省 ref、回答又老变长 → SimPO；想把 SFT+对齐压成一步 → ORPO。**选型看数据形态和工程约束，不是越新越好。**」\n\n### 3.10 GRPO：为什么敢去掉 Critic，去掉后怎么保证稳定（字节 / 通义高频卡壳点）\n\n> 这是 2025–2026 最热、也最容易被深挖崩的点。源自 DeepSeek 的 DeepSeekMath，火于 DeepSeek-R1。\n\n**GRPO（Group Relative Policy Optimization）= PPO 去掉 Critic（Value 网络）。**\n\n**为什么 PPO 要 Critic？** PPO 算优势 `Â = R - V(s)`，需要一个 Value 网络 `V` 当 baseline 来降低梯度方差。但这个 Critic：\n\n- 是和策略同样大的**第二个网络**，**显存翻倍、训练成本高**；\n- 在 LLM 上**难训准**——对一整段长文本回答估计逐 token 价值，本来就不好学，估不准反而引入偏差。\n\n**GRPO 怎么去掉 Critic、还保证稳定？** 用**组内相对奖励当 baseline**替代学习式 Value：\n\n![GRPO去掉Critic：用组内均值当尺子](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/05-3-grpo-no-critic.png ':class=xh-illust')\n\n1. 对同一个 prompt，**采样一组 G 个回答**（group，如 G=8/16）。\n2. 用 RM（或规则化奖励，如数学题答案对错）给每个回答打分 `{r₁,...,r_G}`。\n3. **组内归一化**算优势——直接拿组内均值当 baseline、组内标准差做缩放：\n\n$$\n\\hat{A}_i = \\frac{r_i - \\text{mean}(r_1,\\dots,r_G)}{\\text{std}(r_1,\\dots,r_G)}\n$$\n\n**关键追问：去掉 Critic 为什么不崩（稳定性从哪来）？**\n\n- **baseline 没丢，只是换了来源**：方差大的根因是没有 baseline，GRPO 用\"**组内均值**\"这个**无偏、无需训练**的 baseline 替代了 Critic 估的 baseline——比\"高方差的\"还是稳的，而且不引入 Critic 的估计偏差。\n- **组内归一化（减均值除标准差）**进一步把优势标准化，奖励尺度漂移被吸收，梯度尺度稳定。\n- **保留 PPO 的 clip**：概率比照样裁到 `[1-ε,1+ε]`，单步更新幅度受控。\n- **保留 KL 惩罚 / reference model**：照样把策略拉住别跑偏。\n- 所以稳定性来自\"**组相对 baseline + 归一化 + clip + KL**\"这一整套，而不是靠 Critic。\n\n**收益**：少一个 Value 网络 → **显存和算力大降**、流水线简化。DeepSeekMath 用 GRPO 把 GSM8K 82.9%→88.2%、MATH 46.8%→51.7%；DeepSeek-R1 更是把 GRPO 推到\"用规则奖励做大规模推理 RL\"的标志性实践。\n\n#### 深水追问（2025 最前沿，答出来就是天花板）：GRPO 有什么已知缺陷？后续怎么改的？\n\n> 字节 / 阿里通义 2025 起爱问这个——只会\"GRPO 去 Critic\"已经是基线，能讲清**它的两个偏置 + 改进路线**才是高分。\n\nGRPO 的两个归一化各埋一个偏置（**Dr.GRPO 2025 点破**）：\n\n1. **长度偏置（来自\"除以回答长度\"）**：GRPO 把每条回答的损失按其 token 数平均（`1/|o_i|`）。这让模型**倾向生成不必要的长回答**——长回答把优势摊到更多 token 上，单 token 梯度被稀释，反而\"划算\"。**改法**：**DAPO** 直接去掉长度归一化，所有 token 等权进梯度。\n2. **难度偏置（来自\"除以组内标准差\"）**：用组内 `std` 做缩放时，**全对 / 全错（std≈0）的题会被放大权重**，过易 / 过难的样本主导梯度，引入偏差。**改法**：**Dr.GRPO** 用更鲁棒的目标、**去掉 std 缩放**（只减组内均值当 baseline），避免方差归一化扭曲信号。\n\n更进一步的演化（**记住这条线就够答**）：\n\n- **DAPO（字节, 2025）**：去长度归一化 + 动态采样（过滤掉全对 / 全错、零梯度的 prompt）+ clip-higher 等四件套，把 GRPO 的训练稳定性和样本效率拉上去。\n- **GSPO（Group Sequence Policy Optimization, 通义 Qwen3, 2025）**：GRPO 用 **token 级**重要性比值，在 **MoE 模型 + 长训练**下会因专家激活漂移**不稳定甚至崩**。GSPO 改用**序列级**重要性比值与裁剪（对整条回答算 `(π_θ/π_old)^{1/|y|}`），方差更低、对大模型 / MoE 更稳——**Qwen3 系列就用它**。\n- 一句话定位：**GRPO 是\"PPO 去 Critic\"的起点，DAPO / Dr.GRPO 修它的归一化偏置，GSPO 把它从 token 级抬到序列级解决 MoE 稳定性。**\n\n> 答这段的姿态很重要：先讲清 GRPO 原理（baseline 换组内均值），再说\"它有长度 / 难度两个偏置，2025 的 DAPO / Dr.GRPO / GSPO 分别在修\"，**不必背全公式**，能说出\"哪个归一化导致哪个偏置、谁怎么修\"就是天花板答法。\n\n> 一句话串起来：**PPO（4 模型，Critic 估 baseline）→ DPO（2 模型，免 RM、监督式）→ GRPO（免 Critic，组内均值当 baseline，专为推理 RL）→ DAPO/Dr.GRPO/GSPO（修 GRPO 的归一化偏置与 MoE 稳定性）**——这条演化线讲清楚，对齐这块就稳了。\n\n### 3.11 数据构造与评估\n\n**数据是微调的天花板**——质量远比数量重要（\"少而精\" > \"多而杂\"，LIMA 等工作反复验证）。\n\n- **SFT 数据**：`(instruction, [input], response)`。要点：覆盖目标场景、格式统一、答案高质量、**去重去脏去 PII**、难度分布合理。几千条精标常胜过几万条噪声数据。\n- **偏好数据（DPO/RLHF）**：`(prompt, chosen, rejected)`。`chosen/rejected` 差异要有信息量（别一个满分一个全错，要\"都还行但一个更好\"），可由人标或更强模型生成 + 打分。\n- **数据配比**：领域数据 + 一定比例通用数据（防遗忘，见 3.6）。\n\n**评估（不评估的微调等于没做，呼应 [08 · Evals](08-Evals与LLMOps/)）**：\n\n- **训练侧**：train/eval loss 曲线、是否过拟合（eval loss 抬头）。\n- **能力侧**：任务专属指标（格式遵循率、领域准确率、人审通过率）+ 通用能力回归测试（MMLU 等抽测，**防遗忘掉太多**）。\n- **对齐侧**：偏好胜率（vs 基线的 win rate，常用更强模型当 LLM-as-Judge 或人审）。\n- **铁律**：**留一份微调前的基线分数**，微调后逐项对比，证明\"涨了目标能力 + 没崩通用能力\"。\n\n---\n\n## 4 · Python 工程实现（peft / trl）\n\n> 以下代码贴合真实流程，注释讲 **why**。环境：`transformers + peft + trl + bitsandbytes + datasets`。\n> ⚠️ **这是你要补的实操**——完整可跑版（含数据准备、训练、合并、vLLM 部署）在 [13 · 实操实验室](13-实操实验室/)。\n\n### 4.1 QLoRA SFT：4-bit 量化加载 + LoRA 适配器 + 只算 response loss\n\n```python\nimport torch\nfrom transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig\nfrom peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training\nfrom trl import SFTTrainer, SFTConfig\nfrom datasets import load_dataset\n\nmodel_name = \"Qwen/Qwen2.5-7B-Instruct\"\n\n# 1) QLoRA 核心：4-bit NF4 量化加载基座（基座冻结，只占 ~1/4 显存）\nbnb_config = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_quant_type=\"nf4\",          # NF4：对零均值正态权重信息论最优，强于普通 int4\n    bnb_4bit_use_double_quant=True,     # 双重量化：连量化常数也量化，每参再省 ~0.37bit\n    bnb_4bit_compute_dtype=torch.bfloat16,  # 计算时反量化到 bf16，梯度只走 bf16 适配器\n)\n\ntokenizer = AutoTokenizer.from_pretrained(model_name)\ntokenizer.pad_token = tokenizer.eos_token  # 没 pad token 时用 eos 兜底，否则 batch 报错\n\nmodel = AutoModelForCausalLM.from_pretrained(\n    model_name, quantization_config=bnb_config, device_map=\"auto\",\n)\n# 为 k-bit 训练做准备：开梯度检查点、把 LayerNorm 等关键层留 fp32 保数值稳定\nmodel = prepare_model_for_kbit_training(model)\n\n# 2) LoRA 配置：只在注意力的投影矩阵上注入低秩旁路\nlora_config = LoraConfig(\n    r=16,                # 秩=容量旋钮。简单任务 8~16，复杂任务 32~64；不是越大越好\n    lora_alpha=32,       # α=2r 约定 → 有效缩放 α/r=2。改 r 时让 α 同步翻倍保持 α/r 不变\n    lora_dropout=0.05,\n    target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\"],  # 注意力四投影是 LoRA 重灾区\n    task_type=\"CAUSAL_LM\",\n    bias=\"none\",\n)\nmodel = get_peft_model(model, lora_config)\nmodel.print_trainable_parameters()  # 典型输出：可训练 ~0.2%，省显存的本质在这\n\n# 3) 数据：ChatML 模板。response 才是要学的，prompt 部分要 mask（见下）\ndef to_chatml(example):\n    msgs = [\n        {\"role\": \"user\", \"content\": example[\"instruction\"]},\n        {\"role\": \"assistant\", \"content\": example[\"output\"]},\n    ]\n    return {\"text\": tokenizer.apply_chat_template(msgs, tokenize=False)}\n\ndataset = load_dataset(\"json\", data_files=\"train.jsonl\")[\"train\"].map(to_chatml)\n\n# 4) 训练。completion_only_loss=True → 只在 assistant 回答上算 loss，\n#    prompt token 的 label 被置 -100（PyTorch CrossEntropyLoss 的 ignore_index），\n#    不进 loss、不产生梯度——梯度只来自\"生成回答\"的能力，不被\"复述问题\"污染。\nsft_config = SFTConfig(\n    output_dir=\"./qlora-out\",\n    per_device_train_batch_size=2,\n    gradient_accumulation_steps=8,      # 等效 batch=16，小卡也能拉满有效 batch\n    learning_rate=2e-4,                 # LoRA 用比全参高的 lr；过大会加剧遗忘\n    num_train_epochs=2,                 # 别贪轮数：epoch 多 → 过拟合 + 灾难性遗忘\n    bf16=True,\n    logging_steps=10,\n    completion_only_loss=True,          # ← 只算 response loss 的开关\n)\ntrainer = SFTTrainer(model=model, args=sft_config, train_dataset=dataset)\ntrainer.train()\ntrainer.save_model(\"./qlora-adapter\")   # 只存适配器（几十 MB），不存整个基座\n```\n\n### 4.2 合并 LoRA 回原权重：推理零额外延迟\n\n```python\nfrom peft import PeftModel\nfrom transformers import AutoModelForCausalLM\n\n# 推理部署前把 ΔW=(α/r)BA 加回 W0，得到形状与原模型完全相同的权重，\n# 推理时无额外矩阵乘、无多余层 → 零额外延迟（这正是 LoRA 胜过 Adapter 的关键）\nbase = AutoModelForCausalLM.from_pretrained(model_name, torch_dtype=torch.bfloat16)\nmerged = PeftModel.from_pretrained(base, \"./qlora-adapter\").merge_and_unload()\nmerged.save_pretrained(\"./merged-model\")  # 之后可直接交给 vLLM / SGLang 部署（见第 13 章）\n```\n\n> 注意：QLoRA 训练时基座是 4-bit，**合并通常在 16-bit 基座上做**（重新加载 bf16 基座再合并），避免把适配器精度合进低精度基座造成损失。\n>\n> 合并后的同形状权重怎么交给 vLLM / SGLang 上线、量化与 KV Cache 怎么配，见 [06 · 推理优化与部署](06-推理优化与部署/)。\n\n### 4.3 DPO 偏好对齐：免 Reward Model\n\n```python\nfrom trl import DPOTrainer, DPOConfig\nfrom datasets import load_dataset\n\n# 偏好数据三件套：prompt / chosen / rejected\n# chosen 与 rejected 的差异要有信息量（都还行、但一个更好），别一个满分一个全错\npref_ds = load_dataset(\"json\", data_files=\"prefs.jsonl\")[\"train\"]\n\ndpo_config = DPOConfig(\n    output_dir=\"./dpo-out\",\n    beta=0.1,                # β 控制偏离 reference 的程度：大→更保守贴近 ref，小→更激进\n    learning_rate=5e-6,      # DPO 用很小的 lr，偏好微调动得轻\n    per_device_train_batch_size=2,\n    bf16=True,\n)\n# 不需要训 Reward Model、不跑 RL：就是个监督式分类损失，稳定好复现。\n# 只需 policy + reference 两个模型（ref 默认取训练起点的冻结副本），\n# 而 PPO 要 policy/ref/reward/critic 四个——这就是 DPO 的工程优势。\ntrainer = DPOTrainer(\n    model=model,             # 通常用 4.1 SFT 后的模型当起点\n    args=dpo_config,\n    train_dataset=pref_ds,\n    processing_class=tokenizer,\n)\ntrainer.train()\n```\n\n---\n\n## 5 · 面试官连环追问链\n\n> **Q1：这个需求你会微调还是 RAG？**\n> 先分类需求：\"缺知识、要时效 / 溯源 → RAG；缺能力 / 格式 / 风格、且 Prompt+RAG 顶不住 → 微调。\" 然后给决策树：先 Prompt、再 RAG、最后微调，并点明两者常组合（SFT 教格式 + RAG 喂事实）。\n\n> **Q2：SFT 训练时 loss 是怎么算的？**\n> \"标准 next-token 交叉熵，但**只在 response token 上算**，prompt 部分的 label 置 `-100` mask 掉——`-100` 是 PyTorch CrossEntropyLoss 默认 ignore_index，不进 loss、不产生梯度。目的是让梯度只来自'生成回答'的能力，不被'复述问题'污染。padding 同理置 -100。\"\n\n> **Q3：LoRA 的 A、B 怎么初始化？为什么？**\n> \"A 高斯初始化、B 全零，保证训练起始 `ΔW=BA=0`，模型与预训练基座等价、不扰乱已学表征。两个都置零会梯度对称学不动，必须一个非零打破对称、一个零保起点。\"\n\n> **Q4：秩 r 怎么选？α/r 是干嘛的？r 变了 α 怎么调？**\n> \"r 是容量旋钮，8/16 起步按验证集上调，不是越大越好。α/r 是旁路缩放（音量），原论文不调 α 只调 r、减少超参重调；常约定 α=2r。**r 翻倍时 α 也翻倍**，保持 α/r 不变，有效更新幅度稳定。\"\n\n> **Q5：LoRA 相比 Adapter / Prefix 好在哪？**\n> \"推理可把 ΔW 合并回原权重，得到同形状矩阵，**零额外延迟**；Adapter 串在主干里每层多算有延迟，Prefix 占上下文长度且表达力受限。还能一基座多 LoRA 热插拔。\"\n\n> **Q6：QLoRA 比 LoRA 多做了什么？基座 4-bit 了梯度怎么办？**\n> \"把冻结基座量化到 4-bit NF4（对正态权重信息论最优）+ 双重量化 + 分页优化器。前向时反量化到 bf16 计算，**梯度只流过 bf16 的 LoRA 适配器，4-bit 基座不更新**，所以量化误差不被累积放大。65B 单张 48GB 卡可训。\"\n\n> **Q7：有了 SFT 为什么还要 RLHF？**\n> \"SFT 只见正例、学'像范文'，分不清 A 比 B 好在哪、避不开坏回答。RLHF 用人类偏好（排序）在'答得好不好'这个更主观维度对齐 3H，偏好信号比写满分范文更易标、更能覆盖负向目标。\"\n\n> **Q8：PPO 里 reference model 干嘛的？没有会怎样？clip 又为什么？**\n> \"reference model 配 KL 惩罚把策略拉住别偏太远：**防 reward hacking**（RM 有缺陷，没约束会生成高分乱码/谄媚）+ 保留预训练知识。clip 把新旧策略概率比裁到 [1±ε]、限制单步幅度防训练崩。PPO 共 4 个模型：policy/ref/reward/critic。\"\n\n> **Q9：DPO 凭什么不用 Reward Model？比 PPO 强在哪？**\n> \"DPO 数学上把'训 RM + RL'等价合并成一个分类损失，奖励被隐式表达为 β·log(π_θ/π_ref)，直接在 chosen/rejected 上优化。优势：免 RM、免 RL、只需 policy+ref 两模型，稳定好复现、工程量小一个量级。代价是 off-policy、吃固定数据、对数据质量敏感。\"\n\n> **Q10（深水区）：GRPO 为什么能去掉 Critic？去掉后怎么保证稳定？**\n> \"Critic（Value 网络）在 LLM 上又大又难训准。GRPO 对同一 prompt 采一组 G 个回答，用**组内均值当 baseline、标准差做归一化**算优势——baseline 没丢，只是换成无偏、免训练的组相对 baseline。稳定性来自'组相对 baseline + 组内归一化 + 保留 clip + 保留 KL'这一整套，不是靠 Critic。收益是省一个 Value 网络、显存算力大降，专为大规模推理 RL（DeepSeek-R1）。\"\n\n> **Q11（天花板）：GRPO 有什么已知缺陷？2025 怎么改的？**\n> \"两个归一化各埋一个偏置：**除以回答长度 → 长度偏置**（模型倾向写长，DAPO 去掉长度归一化修它）；**除以组内 std → 难度偏置**（全对/全错的题被放大，Dr.GRPO 去掉 std 缩放修它）。更狠的是 GRPO 用 token 级重要性比值，在 **MoE + 长训练**下会崩——**GSPO（Qwen3）改成序列级**裁剪解决。一句话：GRPO 起点 → DAPO/Dr.GRPO 修归一化偏置 → GSPO 抬到序列级解决 MoE 稳定性。\"\n\n---\n\n## 6 · 高频真题 + 参考答案（带数字）\n\n**Q：LoRA 把可训练参数降到多少量级？举个数。**\nA：以 `d=k=4096`、`r=8` 的单个投影矩阵为例，参数从 `4096²≈1677 万` 降到 `8×(4096+4096)≈6.5 万`，约 **0.4%**。整模型典型可训练参数占比 **0.1%~1%**（具体看注入哪些层、r 多大）。\n\n**Q：全参微调一个 7B 模型用 Adam 大概要多少显存？为什么 PEFT 能省？**\nA：约 **`16Ψ` 字节**（fp16 权重 2Ψ + 梯度 2Ψ + Adam momentum/variance 共 8Ψ + fp32 主权重 4Ψ），7B 约 **112GB**，单卡放不下。PEFT 冻结基座、只训 <1% 参数，**梯度和优化器状态只为这一小撮算**，显存骤降。QLoRA 再把基座压 4-bit，进一步省基座那部分。\n\n**Q：QLoRA 能在多大显存上微调多大模型？**\nA：原论文 **单张 48GB GPU 微调 65B**，效果接近全精度 16-bit 微调。这是\"消费级 / 单卡也能微调大模型\"的标志数字。\n\n**Q：GRPO 在 DeepSeekMath 上的提升数字？**\nA：GSM8K **82.9% → 88.2%**，MATH **46.8% → 51.7%**（同时省掉 Critic 的显存与算力）。\n\n**Q：α 和 r 是什么关系？常见取值？**\nA：`α/r` 是 ΔW 的缩放系数。常见约定 **α=2r**（有效缩放 2）。原论文把 α 设为首个试的 r 值、不调 α 只调 r；改 r 时让 α 同步缩放保持 `α/r` 不变，减少超参重调。\n\n**Q：DPO 的 β 一般取多少？调大调小影响？**\nA：常用 **β≈0.1**。β 越大越保守、越贴近 reference（怕过拟合偏好时调大）；越小越激进、偏离 ref 更多（偏好信号很可信时可调小）。\n\n**Q：缓解灾难性遗忘有哪些手段？**\nA：①混通用数据 replay（最常用）②降学习率、控 epoch ③用 LoRA 限制更新（\"LoRA Learns Less and **Forgets Less**\"）④参考模型 KL 约束 / EWC 正则。成体系答，别只说一条。\n\n---\n\n## 7 · 项目话术钩子\n\n> ⚠️ **这是你要补的实操**——微调是你简历的最大黑洞之一。务必在 [13 · 实操实验室](13-实操实验室/) 跑通一次 QLoRA SFT + 合并 + vLLM 部署，把下面的话术变成\"真做过\"。**不要硬编**未跑过的数字。\n\n**钩子①：把 RAG 项目的\"格式不稳\"做成一次微调（最自然的嫁接）**\n\n> STAR：\n> - **S（情境）**：RAG 知识库问答上线后，下游要结构化抽取（JSON），但基座模型 **JSON schema 遵循率只有约 85%**，偶发字段缺失 / 多余解释文字，下游解析频繁报错。\n> - **T（任务）**：在不牺牲回答质量的前提下，把格式遵循率拉到生产可用（>98%）。\n> - **A（行动）**：判定这是\"缺能力 / 缺格式\"而非\"缺知识\"，**选微调而非继续堆 Prompt**。用 RAG 线上 badcase + 人工修正构造约 N 条 `(query+检索片段, 标准JSON)` SFT 数据；混入约 15% 通用问答防遗忘；QLoRA（4-bit NF4，r=16，α=32）单卡训 2 epoch；只在 response 上算 loss；训后合并适配器交 vLLM 部署。\n> - **R（结果）**：JSON 遵循率 **85% → 99%**，下游解析报错下降一个数量级；通用能力回归测试基本无退化（防遗忘策略奏效）；适配器仅几十 MB，可热插拔。\n>\n> （**N 和具体数字等你实操跑完后填真实值**，别编。）\n\n**钩子②：用 DPO 做话术 / 风格对齐**\n\n> 若做客服 / 助手类：用线上\"用户更满意 vs 更不满意\"的两版回答构造偏好对，**DPO 对齐话术风格**（免训 RM、稳定好复现），胜率用 LLM-as-Judge + 抽样人审验证。讲清\"为什么选 DPO 不选 PPO\"（工程量、稳定性）就是加分。\n\n**钩子③：决策力话术（即使没微调过也能答）**\n\n> \"我们评估过是否微调来解决知识时效问题，结论是**不微调走 RAG**——知识天天更新、要溯源，焊进权重既过时又不可溯源。微调我们留给'格式 / 风格 / 领域能力'这类 RAG 救不了的场景。\" —— 展示你**懂边界**，比硬说\"我微调过\"更可信。\n\n---\n\n## 8 · 常见失分点\n\n- ❌ **方向答反**：知识时效 / 溯源类需求答\"微调\"。应是 RAG。这是第一道题，错了满盘皆输。\n- ❌ **LoRA 初始化说反**：说成\"A 全零 B 高斯\"或\"两个都随机\"。正确是 **A 高斯、B 全零，保起始 ΔW=0**。\n- ❌ **α/r 讲不清**：只会说\"α 是缩放\"，答不出\"r 变了 α 同步变保持 α/r 不变\"\"不调 α 只调 r\"。\n- ❌ **把 r 越大越好**：堆大 r 收益递减还过拟合。要会说\"按验证集上调\"。\n- ❌ **QLoRA 说成\"训练也在 4-bit\"**：错。**基座 4-bit 冻结、计算反量化到 bf16、梯度只走 bf16 适配器**。\n- ❌ **SFT loss 不提 mask**：答不出\"prompt 部分置 -100、只算 response\"。\n- ❌ **说不清\"有 SFT 为何还要 RLHF\"**：只会说\"对齐人类偏好\"，讲不出\"SFT 只见正例、分不清好坏、避不开坏回答\"。\n- ❌ **PPO 漏 reference model 的作用**：忘了它是\"防 reward hacking + 保预训练知识\"，KL 锚住分布。\n- ❌ **DPO 优势只说\"简单\"**：要点名\"免 RM、免 RL、只两模型、稳定可复现\"。\n- ❌ **GRPO 卡在\"为什么稳\"**（字节 / 通义高频）：只会说\"去掉 Critic\"，答不出\"组内均值当 baseline + 归一化 + 保留 clip/KL\"。\n- ❌ **GRPO 只停在 DeepSeek，不知道后续**：被追\"它有什么缺陷 / 2025 怎么改\"答不出\"长度偏置（DAPO 修）/ 难度偏置（Dr.GRPO 修）/ MoE 不稳（GSPO 抬到序列级修）\"。\n- ❌ **不提评估 / 防遗忘**：只讲怎么训不讲怎么验，面试官会判定\"没真做过 / 没工程闭环\"。\n- ❌ **编造没跑过的微调数字**：被追问细节（数据量、收敛曲线、显存占用）立刻露馅。没做过就讲决策力，别硬编。\n\n---\n\n## 9 · 一句话速记\n\n> **RAG 补知识、微调补能力、Prompt 补描述**；SFT 只在 response 上算 loss（prompt 置 -100）；**LoRA：A 高斯 B 全零保起始 ΔW=0，ΔW=(α/r)BA，r 调容量、α/r 调音量（r 变 α 同步变），推理合并零延迟**（大 r 想有收益换 rsLoRA 的 α/√r；想更快收敛换 PiSSA 主成分初始化）；QLoRA = 基座 4-bit NF4 冻结 + bf16 适配器（单卡训 65B）；有 SFT 还要 RLHF 因为 SFT 只见正例分不清好坏；**PPO 靠 clip 限步幅、reference+KL 防 reward hacking（4 模型）；DPO 免 RM/RL 直接优化偏好（2 模型，变体 SimPO/KTO/ORPO 按数据形态选）；GRPO 去 Critic，用组内均值当 baseline + 归一化 + 保留 clip/KL 保稳定，后续 DAPO/Dr.GRPO 修长度/难度偏置、GSPO 抬到序列级解决 MoE 不稳**；防遗忘=混通用数据 + 降 lr + LoRA + 参考约束。\n\n---\n\n### 参考来源（已联网核实，2025–2026）\n\n- LoRA 原论文（A 高斯 / B 全零 / α 不调只调 r / ΔW=(α/r)BA）：[arXiv 2106.09685](https://arxiv.org/pdf/2106.09685)\n- QLoRA（4-bit NF4 / 双重量化 / 分页优化器 / 65B 单卡 48GB）：[arXiv 2305.14314](https://arxiv.org/abs/2305.14314)\n- DeepSeekMath / GRPO（去 Critic、组内 baseline、GSM8K/MATH 数字）：[arXiv 2402.03300](https://arxiv.org/html/2402.03300v3)\n- GRPO 缺陷与改进（长度偏置 / std 难度偏置、DAPO 去长度归一、Dr.GRPO 去 std）：[λ-GRPO 综述 arXiv 2510.06870](https://arxiv.org/html/2510.06870v2)\n- GSPO（序列级裁剪、解决 GRPO 在 MoE / 长训练下崩、Qwen3 使用）：[Qwen GSPO Blog](https://qwenlm.github.io/blog/gspo/)、[arXiv 2507.18071](https://arxiv.org/pdf/2507.18071)\n- LoRA 初始化前沿（PiSSA 主成分初始化 / LoRA-GA 梯度逼近 / rsLoRA α/√r）：[PiSSA OpenReview](https://openreview.net/forum?id=6ZBHIEtdP4)、[PEFT LoRA 文档](https://github.com/huggingface/peft/blob/main/docs/source/developer_guides/lora.md)\n- DPO 变体（SimPO 长度归一免 ref / KTO 非成对 / ORPO 并入 SFT）：[SimPO arXiv 2405.14734](https://arxiv.org/html/2405.14734v2)、[DPO 综述 arXiv 2410.15595](https://arxiv.org/html/2410.15595v3)\n- DPO（隐式奖励 β·log(π_θ/π_ref)、损失公式、免 RM）：[Hugging Face TRL DPO](https://huggingface.co/docs/trl/main/en/sft_trainer)、[DeepSeekMath 等综述]\n- SFT loss 掩码（prompt token 置 -100 / ignore_index）：[Sebastian Raschka: When to mask prompt tokens](https://sebastianraschka.com/faq/docs/when-mask-prompt-tokens.html)、[HF TRL SFTTrainer](https://huggingface.co/docs/trl/main/en/sft_trainer)\n- 灾难性遗忘缓解（replay / lr / LoRA forgets less / EWC）：[LoRA Learns Less and Forgets Less, arXiv 2405.09673](https://arxiv.org/html/2405.09673v2)\n- PPO clip + KL + reward hacking：[Cameron Wolfe: PPO for LLM Alignment](https://cameronrwolfe.substack.com/p/proximal-policy-optimization-ppo)\n"};

      (function () {
        function renderMermaid() {
          const mermaidBlocks = document.querySelectorAll(
            'pre[data-lang="mermaid"] code'
          );
          mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            const container = document.createElement("div");
            container.className = "mermaid";
            container.setAttribute("data-original-code", code);
            container.textContent = code;
            pre.parentNode.replaceChild(container, pre);
          });

          if (window.mermaid) {
            mermaid.init(
              undefined,
              document.querySelectorAll(".mermaid:not([data-processed])")
            );
          }
        }

        // Mermaid 全屏预览：点击 SVG 打开；打开即居中适配屏幕；缩放围绕中心/光标，不漂移
        var IV_ICON = {
          minus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>',
          plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
          fit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>',
          close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
        };
        function openViewer(svg) {
          if (!window.Panzoom) return;
          var vb = svg.viewBox && svg.viewBox.baseVal;
          var rect = svg.getBoundingClientRect();
          var natW = (vb && vb.width) || rect.width || 800;
          var natH = (vb && vb.height) || rect.height || 600;
          var blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: "image/svg+xml;charset=utf-8" });
          var url = URL.createObjectURL(blob);

          var overlay = document.createElement("div"); overlay.className = "iv-overlay";
          var stage = document.createElement("div"); stage.className = "iv-stage";
          var img = document.createElement("img"); img.src = url; img.draggable = false;
          stage.appendChild(img); overlay.appendChild(stage);

          var bar = document.createElement("div"); bar.className = "iv-toolbar";
          function mkBtn(icon, title) { var b = document.createElement("button"); b.type = "button"; b.title = title; b.setAttribute("aria-label", title); b.innerHTML = icon; bar.appendChild(b); return b; }
          var bOut = mkBtn(IV_ICON.minus, "缩小 (-)");
          var bFit = mkBtn(IV_ICON.fit, "适配屏幕 (0 / 双击)");
          var bIn = mkBtn(IV_ICON.plus, "放大 (+)");

          overlay.appendChild(hint);
          document.body.appendChild(overlay);

          function fit() {
            var s = Math.min((window.innerWidth * 0.92) / natW, (window.innerHeight * 0.84) / natH);
            img.style.width = (natW * s) + "px"; img.style.height = (natH * s) + "px";
          }
          fit();

          var pz = Panzoom(stage, { maxScale: 16, minScale: 0.4, step: 0.3, cursor: "grab" });
          stage.addEventListener("wheel", function (e) { pz.zoomWithWheel(e); }, { passive: false });
          requestAnimationFrame(function () { overlay.classList.add("active"); });

          bIn.onclick = function () { pz.zoomIn({ animate: true }); };

/* ============================================================
   AnimCore —— 动画挂载框架
   用法（markdown 内，极简单标签）：
     <div class="anim" data-anim="ioc-injection"></div>
   动画模块（一动画一文件，自带 title/caption）：
     AnimCore.register('ioc-injection',
       function (stage, host, util) { ...; return { play, reset }; },
       { title: 'IoC 依赖倒置注入', caption: '实线=import 依赖（向下）·虚线=运行时调用（向上不 import）' });
   （markdown 里若仍写 data-title / data-caption 则覆盖 JS 里的，向后兼容）
   ============================================================ */
window.AnimCore = (function () {
  var registry = {};

  function register(name, factory, meta) { registry[name] = { factory: factory, meta: meta || {} }; }

  // 读取当前主题色（从 body 读：CSS 变量会从 :root 继承，且兼容 body.dark / html[data-theme] 两种主题约定）
  function colors() {
    var s = getComputedStyle(document.body || document.documentElement);
    function v(n, d) { var x = s.getPropertyValue(n).trim(); return x || d; }
    return {
      bg: v('--bg-card', '#131a2b'),
      fg: v('--fg', '#e6ecff'),
      soft: v('--fg-soft', '#aab4d4'),
      mut: v('--fg-mut', '#6c7795'),
      border: v('--border', '#1f2940'),
      accent: v('--accent', '#5ed1ff'),
      accent2: v('--accent2', '#a78bfa'),
      accent3: v('--accent3', '#34d399'),
      warn: v('--warn', '#fbbf24'),
      danger: v('--danger', '#fb7185')
    };
  }

  function svgEl(tag, attrs) {
    var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function mountAll() {
    var list = document.querySelectorAll('.anim[data-anim]');
    Array.prototype.forEach.call(list, function (el) {
      if (el.__mounted) return;
      el.__mounted = true;
      var name = el.getAttribute('data-anim');
      var entry = registry[name];
      var factory = entry && entry.factory;
      var meta = (entry && entry.meta) || {};

      // 标题 / 说明：优先 markdown 的 data-*，否则取动画 JS 自带的 meta
      var title = el.getAttribute('data-title') || meta.title;
      var caption = el.getAttribute('data-caption') || meta.caption;
      if (caption) el.setAttribute('data-caption', caption); // 供 .anim::after 显示
      if (title) {
        var t = document.createElement('div');
        t.className = 'anim-title';
        t.textContent = title;
        el.appendChild(t);
      }
      // 舞台
      var stage = document.createElement('div');
      stage.className = 'anim-stage';
      stage.style.padding = '8px 10px 10px';
      el.appendChild(stage);

      if (!factory) {
        stage.innerHTML = '<div style="padding:24px;color:var(--fg-mut)">⏳ 动画「' + name + '」排期中（见 BUILD-PLAN 动画清单）</div>';
        return;
      }

      // 工具栏（重播）
      var bar = document.createElement('div');
      bar.className = 'anim-toolbar';
      var replay = document.createElement('button');
      replay.className = 'anim-btn';
      replay.textContent = '↻';
      replay.title = '重播';
      bar.appendChild(replay);
      el.appendChild(bar);

      var api = {};
      try {
        api = factory(stage, el, { colors: colors, svg: svgEl }) || {};
      } catch (e) {
        console.error('[anim]', name, e);
        stage.innerHTML = '<div style="padding:20px;color:var(--danger)">动画出错：' + e.message + '</div>';
        return;
      }

      replay.addEventListener('click', function () {
        if (api.reset) api.reset();
        if (api.play) api.play();
      });

      var played = false;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting && !played) {
            played = true;
            if (api.play) api.play();
          }
        });
      }, { threshold: 0.3 });
      io.observe(el);
    });
  }

  return { register: register, mountAll: mountAll, colors: colors, svg: svgEl };
})();

</script>

    <script>
/* RAG 全链路动画：一个用户 query 穿过 RAG 链路

    { cx: 246, t: 'Embedding', s: '文本→向量' },
    { cx: 396, t: '向量检索',  s: '粗召回 topK' },
    { cx: 546, t: 'Rerank',   s: '精排 topN' },

   下轨「有 cache」——历史 K/V 缓存复用（蓝=直接读），每步只算新 token 的 K/V（绿=新算），op 数 O(n)。

  function text(x, y, str, o) {

      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }

  var N = 4;                 // 演示生成 4 个 token
  var CELL = 30, GAP = 8;    // 格子尺寸/间距
  var X0 = 150;              // 格子区起点
  var rowNoY = 78, rowYesY = 196; // 两轨 y
  var labelX = 18;

  // 轨道标题
  svg.appendChild(text(labelX, rowNoY - 32, '无 Cache', { anchor: 'start', weight: 700, size: 13, fill: C.danger }));
  svg.appendChild(text(labelX, rowNoY - 16, '每步重算全部 K/V', { anchor: 'start', size: 10.5, fill: C.mut }));
  svg.appendChild(text(labelX, rowYesY - 32, '有 KV Cache', { anchor: 'start', weight: 700, size: 13, fill: C.accent3 }));
  svg.appendChild(text(labelX, rowYesY - 16, '复用历史 + 只算新', { anchor: 'start', size: 10.5, fill: C.mut }));

  // 行底标注「第 t 步」列头
  function colX(i) { return X0 + i * (CELL + GAP); }
  for (var s = 0; s < N; s++) {
    svg.appendChild(text(colX(s) + CELL / 2, 34, 'step ' + (s + 1), { size: 10.5, fill: C.soft, weight: 600 }));
  }

  // 构建格子：每行 N 个槽（每步用前 s+1 个格子表示当前序列），用网格表达「当前步处理了哪些 token 的 K/V」

  function mkRow(baseY, withCache) {
    var cols = []; // cols[step] = [cell,...]
    for (var step = 0; step < N; step++) {
      var arr = [];

        var cx = colX(step);

        var r = S('rect', { x: cx, y: cy, width: CELL, height: CELL, rx: 6,

        svg.appendChild(lbl);
        arr.push({ rect: r, lbl: lbl, tok: tok, step: step });

      cols.push(arr);
    }
    return cols;
  }
  var noCols = mkRow(rowNoY, false);
  var yesCols = mkRow(rowYesY, true);

  // 计数器
  var counterY = 296;
  var noCount = text(X0 + 6, counterY, '', { anchor: 'start', size: 12.5, weight: 700, fill: C.danger });
  var yesCount = text(X0 + 250, counterY, '', { anchor: 'start', size: 12.5, weight: 700, fill: C.accent3 });

  // 图例
  var legY = counterY;
  var lg1 = text(W - 12, legY - 36, '■ 重算(白费)', { anchor: 'end', size: 10.5, fill: C.danger });
  var lg2 = text(W - 12, legY - 20, '■ 复用(读缓存)', { anchor: 'end', size: 10.5, fill: C.accent });

  // 旁白
  var cap = text(W / 2, H - 4, '', { fill: C.accent, size: 12.5, weight: 600 });
  svg.appendChild(cap);

  function allCells(cols) {
    var out = [];

  }

  function reset() {

      x.rect.setAttribute('fill', C.bg);
      x.rect.setAttribute('stroke', C.border);

    yesCount.textContent = '有 cache 算量 ' + yesOps + ' 次 (O(n))';
    cap.textContent = '无 cache 重复白算 vs 有 cache 复用——省算力';
  }

        tl.call(function () {
          cap.textContent = '第 ' + (step + 1) + ' 步：生成 token ' + (step + 1) + '，attention 需要前 ' + (step + 1) + ' 个 token 的 K/V';
        });
        // 无 cache：整列全部「重算」——前面 step 个是重复白算，最后 1 个是必要的
        noCols[step].forEach(function (x, idx) {
          tl.call(function () {
            paint(x, C.danger);

            noCount.textContent = '无 cache 算量 ' + noOps.v + ' 次';
          });
          tl.to(x.rect, { attr: { 'stroke-width': 3 }, duration: .1, yoyo: true, repeat: 1 });
        });
        // 有 cache：前 step 个直接「复用」(蓝, 秒读)，只有最后 1 个「新算」(绿) 计入算量
        yesCols[step].forEach(function (x) {
          tl.call(function () {
            if (x.tok === step) { paint(x, C.accent3); yesOps.v++; }   // 新 token，必要
            else { paint(x, C.accent); }                                // 历史，复用不计算
            yesCount.textContent = '有 cache 算量 ' + yesOps.v + ' 次';
          });
          if (x.tok === step) tl.to(x.rect, { attr: { 'stroke-width': 3 }, duration: .1, yoyo: true, repeat: 1 });
        });
        tl.to({}, { duration: .25 });
      })(step);
    }

    tl.call(function () {
      noCount.textContent = '无 cache 算量 ' + noOps.v + ' 次 (O(n²))';
      yesCount.textContent = '有 cache 算量 ' + yesOps.v + ' 次 (O(n))';
      cap.textContent = '✓ KV Cache 把 O(n²) 重复计算压到 O(n)：用显存换算力';
    });
    return tl;
  }

  return { play: play, reset: reset };

    { k: 'improve',  t: '⑤ before/after', s: '质量提升', ang: 198 }
  ];
  var BW = 132, BH = 50;

  STEPS.forEach(function (n) {
    var rad = n.ang * Math.PI / 180;
    n.cx = CX + R * Math.cos(rad);
    n.cy = CY + R * Math.sin(rad);
  });

  var defs = S('defs');
  var mk = S('marker', { id: 'el-ar', viewBox: '0 0 10 10', refX: 9, refY: 5, markerWidth: 7, markerHeight: 7, orient: 'auto' });
  mk.appendChild(S('path', { d: 'M0,0 L10,5 L0,10 z', fill: C.mut })); defs.appendChild(mk); svg.appendChild(defs);

  // —— 循环箭头：用沿圆弧的曲线连相邻节点，最后一条回到首节点（闭环）——
  var arcs = {};
  function arcEdge(id, a, b) {
    var na = STEPS[a], nb = STEPS[b];
    // 起止点收缩到节点边缘附近，沿大圆弧走
    var a1 = Math.atan2(na.cy - CY, na.cx - CX);
    var a2 = Math.atan2(nb.cy - CY, nb.cx - CX);
    var rr = R + 6;
    var x1 = CX + rr * Math.cos(a1 + 0.36), y1 = CY + rr * Math.sin(a1 + 0.36);
    var x2 = CX + rr * Math.cos(a2 - 0.30), y2 = CY + rr * Math.sin(a2 - 0.30);
    var outer = R + 64; // 控制点推到外侧形成外凸弧
    var mid = (a1 + a2) / 2;
    var cxp = CX + outer * Math.cos(mid + 0.03), cyp = CY + outer * Math.sin(mid + 0.03);
    var d = 'M' + x1 + ',' + y1 + ' Q' + cxp + ',' + cyp + ' ' + x2 + ',' + y2;
    var p = S('path', { d: d, fill: 'none', stroke: C.border, 'stroke-width': 1.8, 'marker-end': 'url(#el-ar)' });
    svg.appendChild(p); arcs[id] = p;
  }
  arcEdge('e0', 0, 1);
  arcEdge('e1', 1, 2);
  arcEdge('e2', 2, 3);
  arcEdge('e3', 3, 4);
  arcEdge('e4', 4, 0); // 闭环：回到收集

  // 中心标注
  svg.appendChild(text(CX, CY - 8, '数据驱动', { size: 13, weight: 700, fill: C.accent2 }));
  svg.appendChild(text(CX, CY + 12, '持续闭环', { size: 13, weight: 700, fill: C.accent2 }));

  // 节点
  var rects = {};
  STEPS.forEach(function (n) {
    var r = S('rect', { x: n.cx - BW / 2, y: n.cy - BH / 2, width: BW, height: BH, rx: 11, fill: C.bg, stroke: C.border, 'stroke-width': 1.5 });
    svg.appendChild(r); rects[n.k] = r;
    svg.appendChild(text(n.cx, n.cy - 4, n.t, { size: 12.5, weight: 700 }));
    svg.appendChild(text(n.cx, n.cy + 13, n.s, { size: 10.5, weight: 500, fill: C.mut }));
  });

  var cap = text(W / 2, H - 12, '', { size: 12.5, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  var EID = ['e0', 'e1', 'e2', 'e3', 'e4'];

  function setNode(k, st) {
    var r = rects[k];
    if (st === 'run') { r.setAttribute('stroke', C.accent); r.setAttribute('stroke-width', 2.6); r.setAttribute('fill', C.bg); }
    else if (st === 'done') { r.setAttribute('stroke', C.accent3); r.setAttribute('stroke-width', 2); r.setAttribute('fill', '#34d39915'); }
    else { r.setAttribute('stroke', C.border); r.setAttribute('stroke-width', 1.5); r.setAttribute('fill', C.bg); }
  }
  function setEdge(id, st) {
    var e = arcs[id];
    if (st === 'active') { e.setAttribute('stroke', C.accent3); e.setAttribute('stroke-width', 2.4); }
    else { e.setAttribute('stroke', C.border); e.setAttribute('stroke-width', 1.8); }
  }

  function reset() {
    STEPS.forEach(function (n) { setNode(n.k, 'pend'); });
    EID.forEach(function (id) { setEdge(id, 'pend'); });
    cap.textContent = '';
  }

  function play() {
    reset();
    if (!has) {
      STEPS.forEach(function (n) { setNode(n.k, 'done'); });
      EID.forEach(function (id) { setEdge(id, 'active'); });
      cap.textContent = '（无 gsap：闭环静态终态）';
      return;
    }
    var tl = gsap.timeline();
    var D = 0.55;
    var CAPS = [
      '① 从生产真实流量收集 trace（先 tracing，后 scoring）',
      '② Error Analysis：人工过约 100 条，open/axial coding 归出失败分类',
      '③ 每类高频失败固化成一条 eval（L1 断言 / 校准过的 L2 judge）',
      '④ 钉进 CI：每次 PR 自动跑，pass rate 不达标卡 merge',
      '⑤ 同一份 eval 集对比 before/after，量化质量提升'
    ];
    STEPS.forEach(function (n, i) {
      tl.call(function () { cap.textContent = CAPS[i]; setNode(n.k, 'run'); });
      tl.to({}, { duration: D });
      tl.call(function () { setNode(n.k, 'done'); setEdge(EID[i], 'active'); });
      tl.to({}, { duration: 0.22 });
    });
    // 收尾：高亮整条闭环，强调"回到收集，持续迭代"
    tl.call(function () { cap.textContent = '↻ 回到收集：eval 集随新发现的失败不断长大——活的 PRD'; });
    tl.to(Object.keys(arcs).map(function (id) { return arcs[id]; }), {
      attr: { 'stroke-width': 3.2 }, duration: 0.3, yoyo: true, repeat: 1
    });
    tl.call(function () { cap.textContent = '✓ 数据驱动闭环：收集 → 归类 → 写 eval → CI 门禁 → before/after → 再收集'; });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*meta*/{
  title: '🔁 Eval 闭环：从生产失败到 CI 门禁的数据驱动循环',
  caption: '收集 trace → Error Analysis 归类 → 每类写一条 eval → CI 红/绿门禁 → before/after 量化提升 → 回到收集持续迭代'
});

</script>
    <script>
/* scaled dot-product attention 为何除以 √d_k：
   左「不除」—— 点积方差随 d_k 增大、score 量级被放大 → softmax 进饱和区
   退化成近似 argmax（一根独大），softmax 雅可比 p_i(1-p_i) 趋 0 → 梯度≈0；
   右「除 √d_k」—— 方差归一到 1、score 量级温和 → softmax 分布平滑、梯度健康。
   动画并排对比两种情形的 softmax 形状与梯度强弱。 */
AnimCore.register('scaled-attention', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 320;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', {
      x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle',
      'font-weight': o.weight || 600
    });
    t.textContent = str; return t;
  }

  // 五个原始 logit（同一组），左右两侧对其做不同缩放后的 softmax
  var raw = [3.1, -1.4, 4.0, 0.6, -0.9];
  var N = raw.length;

  function softmax(arr) {
    var m = Math.max.apply(null, arr);
    var ex = arr.map(function (v) { return Math.exp(v - m); });
    var s = ex.reduce(function (a, b) { return a + b; }, 0);
    return ex.map(function (v) { return v / s; });
  }
  // 「不除」：放大 score（模拟 d_k 大、方差大），softmax 饱和
  var pBig = softmax(raw.map(function (v) { return v * 6; }));
  // 「除 √d_k」：方差归一，量级温和，softmax 平滑
  var pNorm = softmax(raw.map(function (v) { return v * 1; }));

  // 雅可比对角项 p(1-p) 的最大值 → 衡量梯度健康度（越大越健康）
  function gradHealth(p) {
    return Math.max.apply(null, p.map(function (v) { return v * (1 - v); }));
  }

  // —— 两个面板布局 ——
  var PW = 320, PX_L = 36, PX_R = 404;          // 面板左上 x
  var PY = 56, PH = 184;                          // 面板顶 y、高
  var BASE = PY + PH - 28;                        // 柱状图基线
  var BAR_W = 34, BAR_GAP = 18;
  var MAXBAR = 120;                              // 概率=1 对应的柱高

  function panel(px, titleStr, sub) {
    var g = S('g');
    g.appendChild(S('rect', {
      x: px, y: PY, width: PW, height: PH, rx: 12,
      fill: C.bg, stroke: C.border, 'stroke-width': 1.4
    }));
    g.appendChild(text(px + PW / 2, PY - 14, titleStr, { size: 13.5, weight: 700 }));
    g.appendChild(text(px + PW / 2, PY + 18, sub, { size: 10.5, fill: C.mut, weight: 600 }));
    svg.appendChild(g);
    // 基线
    svg.appendChild(S('line', {
      x1: px + 20, y1: BASE, x2: px + PW - 20, y2: BASE,
      stroke: C.border, 'stroke-width': 1
    }));
    return g;
  }
  panel(PX_L, '不除 √d_k', '方差≈d_k，score 被放大');
  panel(PX_R, '除以 √d_k', '方差归一到 1，score 温和');

  // 每个面板内 N 根柱 + 概率标签
  function barsFor(px) {
    var startX = px + (PW - (N * BAR_W + (N - 1) * BAR_GAP)) / 2;
    var bars = [], labels = [];
    for (var i = 0; i < N; i++) {
      var bx = startX + i * (BAR_W + BAR_GAP);
      var r = S('rect', {
        x: bx, y: BASE, width: BAR_W, height: 0, rx: 4,
        fill: C.soft, stroke: C.border, 'stroke-width': 1
      });
      svg.appendChild(r); bars.push(r);
      var lb = text(bx + BAR_W / 2, BASE + 16, 'k' + (i + 1), { size: 9.5, fill: C.mut, weight: 600 });
      svg.appendChild(lb);
      var pl = text(bx + BAR_W / 2, BASE - 4, '', { size: 9.5, fill: C.fg, weight: 700 });
      svg.appendChild(pl); labels.push(pl);
    }
    return { bars: bars, labels: labels, startX: startX };
  }
  var L = barsFor(PX_L);
  var R = barsFor(PX_R);

  // 梯度健康指示（两面板各一条，底部）
  var GBY = PY + PH + 30;
  function gradRow(px, lbl) {
    svg.appendChild(text(px + 60, GBY, lbl, { size: 11, anchor: 'start', fill: C.mut, weight: 600 }));
    var track = S('rect', { x: px + 138, y: GBY - 10, width: 150, height: 12, rx: 6, fill: C.soft, stroke: C.border, 'stroke-width': 1 });
    svg.appendChild(track);
    var fill = S('rect', { x: px + 138, y: GBY - 10, width: 0, height: 12, rx: 6, fill: C.accent3 });
    svg.appendChild(fill);
    return fill;
  }
  var gradL = gradRow(PX_L, '梯度');
  var gradR = gradRow(PX_R, '梯度');

  // 旁白
  var cap = text(W / 2, H - 10, '', { size: 12.5, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  function setBars(side, probs, color) {
    var startX = side.startX;
    for (var i = 0; i < N; i++) {
      var h = Math.max(2, probs[i] * MAXBAR);
      side.bars[i].setAttribute('y', BASE - h);
      side.bars[i].setAttribute('height', h);
      side.bars[i].setAttribute('fill', color);
      side.labels[i].setAttribute('y', BASE - h - 5);
      side.labels[i].textContent = probs[i].toFixed(2);
    }
  }
  function clearSide(side) {
    for (var i = 0; i < N; i++) {
      side.bars[i].setAttribute('y', BASE);
      side.bars[i].setAttribute('height', 0);
      side.bars[i].setAttribute('fill', C.soft);
      side.labels[i].textContent = '';
    }
  }

  function reset() {
    clearSide(L); clearSide(R);
    gradL.setAttribute('width', 0); gradL.setAttribute('fill', C.accent3);
    gradR.setAttribute('width', 0); gradR.setAttribute('fill', C.accent3);
    cap.textContent = '';
  }

  function finalState() {
    // 终态：左饱和（warn）梯度≈0；右平滑（accent）梯度健康
    setBars(L, pBig, C.warn);
    setBars(R, pNorm, C.accent);
    var hL = gradHealth(pBig), hR = gradHealth(pNorm);  // hL≈0, hR≈0.2 量级
    gradL.setAttribute('width', Math.max(2, hL / 0.25 * 150));
    gradL.setAttribute('fill', C.danger);
    gradR.setAttribute('width', Math.max(2, hR / 0.25 * 150));
    gradR.setAttribute('fill', C.accent3);
  }

  function play() {
    reset();
    if (!has) { finalState(); cap.textContent = '左：饱和→梯度≈0  ·  右：平滑→梯度健康'; return; }

    var tl = gsap.timeline();
    var hL = gradHealth(pBig), hR = gradHealth(pNorm);

    // ① 同一组 score 进 softmax
    tl.call(function () { cap.textContent = '① 同一组 QK 点积 score，分别走两种缩放后的 softmax'; });

    // ② 左侧不除：score 放大，softmax 一根独大（饱和）
    tl.call(function () { cap.textContent = '② 不除：score 量级被放大 → softmax 退化成近似 argmax（一根独大）'; });
    var proxyL = { t: 0 };
    tl.to(proxyL, {
      t: 1, duration: 0.9, ease: 'power2.out',
      onUpdate: function () {
        var probs = pBig.map(function (v) { return v * proxyL.t; });
        setBars(L, probs, C.warn);
      }
    });

    // ③ 右侧除 √d_k：score 温和，softmax 平滑
    tl.call(function () { cap.textContent = '③ 除以 √d_k：方差归一到 1 → softmax 分布平滑、多个候选都有份'; });
    var proxyR = { t: 0 };
    tl.to(proxyR, {
      t: 1, duration: 0.9, ease: 'power2.out',
      onUpdate: function () {
        var probs = pNorm.map(function (v) { return v * proxyR.t; });
        setBars(R, probs, C.accent);
      }
    });

    // ④ 算梯度健康度 p(1-p)：左≈0（饱和区），右健康
    tl.call(function () { cap.textContent = '④ softmax 雅可比对角项 p(1−p)：饱和侧趋 0，平滑侧仍有量'; });
    tl.to(gradL, {
      attr: { width: Math.max(2, hL / 0.25 * 150) }, duration: 0.6, ease: 'power1.out',
      onStart: function () { gradL.setAttribute('fill', C.danger); }
    });
    tl.to(gradR, {
      attr: { width: Math.max(2, hR / 0.25 * 150) }, duration: 0.6, ease: 'power1.out',
      onStart: function () { gradR.setAttribute('fill', C.accent3); }
    }, '<');

    // ⑤ 强调左侧饱和：闪一下 danger 边
    tl.call(function () {
      cap.textContent = '⑤ 不除 → 梯度≈0、该层学不动；除 √d_k → 梯度健康、训得稳';
      L.bars.forEach(function (b) { b.setAttribute('stroke', C.danger); });
    });
    tl.to(L.bars, { attr: { 'stroke-width': 2 }, duration: 0.2, yoyo: true, repeat: 1 });
    tl.call(function () { L.bars.forEach(function (b) { b.setAttribute('stroke', C.border); b.setAttribute('stroke-width', 1); }); });

    tl.call(function () { cap.textContent = '✓ √d_k 把点积方差从 d_k 拉回 1，让 softmax 远离饱和区、保住梯度'; });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{
  title: '为什么要除以 √d_k：softmax 饱和与梯度对比',
  caption: '不除 → 方差≈d_k、score 放大 → softmax 退化成近似 argmax、梯度趋 0；除 √d_k → 方差归一、分布平滑、梯度健康'
});

</script>
    <script>
/* ReAct 循环动画：LLM 在「Thought → Action → Observation」三站环形流转，
   每轮 Action 调用右侧工具、Observation 把结果拉回，循环若干轮后判定 done，
   跳出环路产出 Final Answer。体现「边推理边行动」+「最终收敛」。 */
AnimCore.register('react-loop', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 330;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }

  // —— 环形三站：以 (cx,cy) 为圆心、半径 R 放 Thought / Action / Observation ——
  var cx = 300, cy = 158, R = 96;
  // 角度：Thought 顶部、Action 右下、Observation 左下（顺时针流转）
  var nodes = {
    thought: { ang: -90, t: 'Thought', s: '推理·下一步', col: C.accent },
    action:  { ang: 30,  t: 'Action',  s: '调用工具',   col: C.accent2 },
    observe: { ang: 150, t: 'Observation', s: '工具返回', col: C.accent3 }
  };
  var NW = 116, NH = 50;
  function pos(ang) {
    var r = ang * Math.PI / 180;
    return { x: cx + R * Math.cos(r), y: cy + R * Math.sin(r) };
  }
  Object.keys(nodes).forEach(function (k) { var p = pos(nodes[k].ang); nodes[k].x = p.x; nodes[k].y = p.y; });

  // —— 环形箭头（弧线）：thought→action→observe→thought ——
  var defs = S('defs');
  var mk = S('marker', { id: 'react-ar', viewBox: '0 0 10 10', refX: 8, refY: 5, markerWidth: 6, markerHeight: 6, orient: 'auto' });
  mk.appendChild(S('path', { d: 'M0,0 L10,5 L0,10 z', fill: C.mut })); defs.appendChild(mk); svg.appendChild(defs);

  function arc(a, b) {
    // 沿圆周从 a 角到 b 角画一段缩进的弧（半径略小，端点留出节点空隙）
    var pad = 34, rr = R; // 在节点连线圆周上画
    var a1 = (nodes[a].ang + pad) * Math.PI / 180;
    var a2 = (nodes[b].ang - pad) * Math.PI / 180;
    var x1 = cx + rr * Math.cos(a1), y1 = cy + rr * Math.sin(a1);
    var x2 = cx + rr * Math.cos(a2), y2 = cy + rr * Math.sin(a2);
    return { d: 'M' + x1 + ',' + y1 + ' A' + rr + ',' + rr + ' 0 0 1 ' + x2 + ',' + y2 + '', x1: x1, y1: y1, x2: x2, y2: y2 };
  }
  var arcs = {};
  [['thought', 'action', 't_a'], ['action', 'observe', 'a_o'], ['observe', 'thought', 'o_t']].forEach(function (e) {
    var g = arc(e[0], e[1]);
    var p = S('path', { d: g.d, fill: 'none', stroke: C.border, 'stroke-width': 2, 'marker-end': 'url(#react-ar)' });
    svg.appendChild(p); arcs[e[2]] = p;
  });

  // —— 三个节点框 ——
  var rects = {};
  Object.keys(nodes).forEach(function (k) {
    var n = nodes[k];
    var r = S('rect', { x: n.x - NW / 2, y: n.y - NH / 2, width: NW, height: NH, rx: 12, fill: C.bg, stroke: C.border, 'stroke-width': 1.6 });
    svg.appendChild(r); rects[k] = r;
    svg.appendChild(text(n.x, n.y - 4, n.t, { weight: 700, size: 13 }));
    svg.appendChild(text(n.x, n.y + 13, n.s, { fill: C.mut, size: 10 }));
  });

  // —— 右侧「工具」盒（Action 往这里打，Observation 从这里回）——
  var toolX = 560, toolY = 134, toolW = 130, toolH = 56;
  var toolBox = S('rect', { x: toolX, y: toolY, width: toolW, height: toolH, rx: 11, fill: C.bg, stroke: C.border, 'stroke-width': 1.5 });
  svg.appendChild(toolBox);
  svg.appendChild(text(toolX + toolW / 2, toolY + 23, '工具 / API', { weight: 700, size: 12.5 }));
  svg.appendChild(text(toolX + toolW / 2, toolY + 40, 'get_weather…', { fill: C.mut, size: 10 }));

  // Action→工具、工具→Observation 的两条横向连线
  var aToTool = S('path', {
    d: 'M' + (nodes.action.x + NW / 2 - 8) + ',' + nodes.action.y + ' C' + (toolX - 40) + ',' + nodes.action.y + ' ' + (toolX - 30) + ',' + (toolY + toolH) + ' ' + toolX + ',' + (toolY + toolH - 12),
    fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'marker-end': 'url(#react-ar)'
  });
  var toolToO = S('path', {
    d: 'M' + toolX + ',' + (toolY + 12) + ' C' + (toolX - 60) + ',' + (toolY - 6) + ' ' + (nodes.observe.x + 90) + ',' + (nodes.observe.y - 70) + ' ' + (nodes.observe.x + NW / 2 - 6) + ',' + nodes.observe.y,
    fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'stroke-dasharray': '5 4', 'marker-end': 'url(#react-ar)'

    <script>
/* gqa-kvheads —— MHA → MQA → GQA 演进：query 头与 K/V 头的连线结构 + KV Cache 体积对比。
   三栏并排：
     · MHA  —— 每个 query 头独配一份独立 K/V 头（h 份 KV），Cache 最大（1×）。
     · MQA  —— 全部 query 头共享同一份 K/V（1 份 KV），Cache 最小（1/h）但损质量。
     · GQA  —— 分组共享，8 个 query 头分 2 组、每组 1 份 K/V（这里演示 4 query 头 / 2 组），
               Cache 折中（g/h，演示砍到 1/4）。
   连线表达「哪个 query 头读哪份 KV」，底部体积条对比 KV Cache 相对大小。
   面试点：GQA 省的是 KV Cache 显存 / 带宽（解码 memory-bound），不是计算量。 */
AnimCore.register('gqa-kvheads', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 360;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', {
      x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle',
      'font-weight': o.weight || 600
    });
    t.textContent = str; return t;
  }

  // 演示用 4 个 query 头；三种方案的 KV 头映射（query 头 i → KV 头索引）
  var NQ = 4;
  var schemes = [
    { key: 'MHA', px: 26, title: 'MHA', sub: '每头独配 K/V', nkv: 4, map: [0, 1, 2, 3], ratio: 1, qcol: 'accent', kcol: 'accent3' },
    { key: 'GQA', px: 282, title: 'GQA（2 组）', sub: '组内共享 K/V', nkv: 2, map: [0, 0, 1, 1], ratio: 0.5, qcol: 'accent', kcol: 'accent3' },
    { key: 'MQA', px: 538, title: 'MQA', sub: '全部共享 1 份', nkv: 1, map: [0, 0, 0, 0], ratio: 0.25, qcol: 'accent', kcol: 'warn' }
  ];
  // 注：演示用 4 query 头时 GQA(2组)=1/2、MQA=1/4；正文里 LLaMA-2 70B 是 64 头/8 组=1/8。

  var PW = 196;            // 每栏宽
  var QY = 96;             // query 头行 y
  var KY = 232;            // KV 头行 y
  var NODE = 26;           // 头节点尺寸
  var qSlotW = 40;         // query 头横向槽宽

  // —— 每栏静态骨架 + 连线 —— 句柄存进 scheme.refs
  function buildScheme(sc) {
    var g = S('g');
    svg.appendChild(g);
    // 栏标题
    g.appendChild(text(sc.px + PW / 2, 40, sc.title, { size: 13.5, weight: 700 }));
    g.appendChild(text(sc.px + PW / 2, 58, sc.sub, { size: 10, fill: C.mut, weight: 600 }));

    // query 头横向排布
    var qStartX = sc.px + (PW - (NQ * qSlotW)) / 2 + qSlotW / 2;
    var qX = [];
    for (var i = 0; i < NQ; i++) qX.push(qStartX + i * qSlotW);
    // KV 头横向排布（按 nkv 等分整栏宽，落在 query 头跨度下方）
    var kvSpan = qX[NQ - 1] - qX[0];
    var kX = [];
    for (var j = 0; j < sc.nkv; j++) {
      kX.push(sc.nkv === 1 ? (qX[0] + qX[NQ - 1]) / 2 : qX[0] + kvSpan * j / (sc.nkv - 1));
    }

    var lines = [], qNodes = [], kNodes = [];

    // 连线（query i → 它读的 KV 头）
    for (var i2 = 0; i2 < NQ; i2++) {
      var kv = sc.map[i2];
      var ln = S('line', {
        x1: qX[i2], y1: QY + NODE / 2, x2: kX[kv], y2: KY - NODE / 2,
        stroke: C.border, 'stroke-width': 1.4, opacity: 0
      });
      g.appendChild(ln); lines.push(ln);
    }
    // query 头节点
    for (var i3 = 0; i3 < NQ; i3++) {
      var qr = S('rect', {
        x: qX[i3] - NODE / 2, y: QY - NODE / 2, width: NODE, height: NODE, rx: 6,
        fill: C.bg, stroke: C.border, 'stroke-width': 1.4, opacity: 0
      });
      g.appendChild(qr);
      var ql = text(qX[i3], QY + 4, 'Q' + (i3 + 1), { size: 9.5, fill: C.mut, weight: 700, opacity: 0 });
      g.appendChild(ql);
      qNodes.push({ rect: qr, lbl: ql });
    }
    // KV 头节点
    for (var j2 = 0; j2 < sc.nkv; j2++) {
      var kr = S('rect', {
        x: kX[j2] - NODE / 2, y: KY - NODE / 2, width: NODE, height: NODE, rx: 6,
        fill: C.bg, stroke: C.border, 'stroke-width': 1.4, opacity: 0
      });
      g.appendChild(kr);
      var kl = text(kX[j2], KY + 4, 'KV' + (j2 + 1), { size: 8.5, fill: C.mut, weight: 700, opacity: 0 });
      g.appendChild(kl);
      kNodes.push({ rect: kr, lbl: kl });
    }

    // 行标注（左栏才标，省得重复）
    if (sc.key === 'MHA') {
      svg.appendChild(text(8, QY + 4, 'Q 头', { anchor: 'start', size: 10, fill: C.mut, weight: 700 }));
      svg.appendChild(text(8, KY + 4, 'K/V', { anchor: 'start', size: 10, fill: C.mut, weight: 700 }));
    }

    // KV Cache 体积条（底部）
    var barBase = 326;
    var barMaxW = PW - 56;
    var track = S('rect', {
      x: sc.px + 28, y: barBase - 12, width: barMaxW, height: 14, rx: 7,
      fill: C.soft, stroke: C.border, 'stroke-width': 1
    });
    svg.appendChild(track);
    var bar = S('rect', {
      x: sc.px + 28, y: barBase - 12, width: 0, height: 14, rx: 7, fill: C[sc.kcol]
    });
    svg.appendChild(bar);
    var barLbl = text(sc.px + PW / 2, barBase + 18, '', { size: 10.5, weight: 700, fill: C.fg });
    svg.appendChild(barLbl);

    sc.refs = { lines: lines, qNodes: qNodes, kNodes: kNodes, bar: bar, barLbl: barLbl, barMaxW: barMaxW };
  }
  schemes.forEach(buildScheme);

  // 区块小标题
  svg.appendChild(text(W / 2, 300, 'KV Cache 相对体积', { size: 10.5, fill: C.mut, weight: 700 }));

  // 旁白
  var cap = text(W / 2, H - 8, '', { size: 12.5, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  // —— 上色 / 复位 helpers ——
  function showScheme(sc, animate) {
    var r = sc.refs;
    r.qNodes.forEach(function (q) {
      q.rect.setAttribute('opacity', 1);
      q.rect.setAttribute('fill', C[sc.qcol]);
      q.rect.setAttribute('stroke', C[sc.qcol]);
      q.lbl.setAttribute('opacity', 1);
      q.lbl.setAttribute('fill', '#fff');
    });
    r.kNodes.forEach(function (k) {
      k.rect.setAttribute('opacity', 1);
      k.rect.setAttribute('fill', C[sc.kcol]);
