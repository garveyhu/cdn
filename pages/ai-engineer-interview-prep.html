    <script>
/* 约束解码（constrained decoding）动画：生成 JSON 时逐 token 采样，
   每一步按 JSON 文法算出「合法续接集合」，把非法分支的概率 mask 成 0（logit→-∞）划掉，
   只在合法分支里采样 → 文法状态机推进 → 最终 100% 拼出合法 JSON。
   下方对照「无约束」路径：某步采到非法 token 跑偏，结构损坏。
   讲：约束解码不是靠模型「听话」，是解码器在物理上「吐不出违反 schema 的 token」——把概率问题变成确定性约束。 */
AnimCore.register('constrained-decode', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 780, H = 360;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }
  function rrect(x, y, w, h, o) {
    o = o || {};
    return S('rect', { x: x, y: y, width: w, height: h, rx: o.rx || 7,
      fill: o.fill || C.bg, stroke: o.stroke || C.border, 'stroke-width': o.sw || 1.5, opacity: o.opacity == null ? 1 : o.opacity });
  }

  // —— 列标题 ——
  svg.appendChild(text(W / 2, 18, '生成 JSON：每步先按文法 mask 掉非法 token，只在合法分支采样', { weight: 700, size: 13, fill: C.accent }));

  // —— 上排：约束解码（逐步，候选分支 = 合法绿 + 非法红×）——
  var stepX = [70, 230, 390, 550, 700];   // 五个采样步的中心 x
  var ROWY = 70;                           // 已采纳 token 链所在 y
  var TKW = 84, TKH = 32;                  // 已采纳 token 盒
  // 每步采纳的 token（最终拼成合法 JSON）
  var accepted = ['{', '"ok"', ':', 'true', '}'];
  // 每步的候选集合：legal = 合法续接（被采纳的那个标 *），illegal = 被 mask 掉的非法 token
  var cand = [
    { legal: ['{'],            illegal: ['true', ',', '5'] },
    { legal: ['"ok"'],         illegal: ['}', '42', ':'] },
    { legal: [':'],            illegal: ['"ok"', '{', 'true'] },
    { legal: ['true'],         illegal: ['"yes"', '{', ':'] },
    { legal: ['}'],            illegal: [',', 'true', '"x"'] }
  ];

  var acceptEls = [];   // 已采纳 token 盒
  var chainConns = [];  // 已采纳 token 之间的连线
  var fanGroups = [];   // 每步的候选分支（fan-out）

  // 候选分支布局：在每个采样步的下方扇出几条候选
  var CANDY = ROWY + TKH + 40;             // 候选行基准 y
  var CW = 66, CH = 24, CVGAP = 8;

  stepX.forEach(function (cx, i) {
    // 已采纳 token 盒（先隐藏）
    var box = rrect(cx - TKW / 2, ROWY, TKW, TKH, { fill: C.bg, stroke: C.border, rx: 8, opacity: 0 });
    svg.appendChild(box);
    var tk = text(cx, ROWY + 21, accepted[i], { weight: 700, size: 15, anchor: 'middle' });
    tk.setAttribute('opacity', 0); tk.setAttribute('font-family', 'ui-monospace, monospace');
    svg.appendChild(tk);
    acceptEls.push({ box: box, tk: tk });

    // 已采纳 token 之间的连线
    if (i > 0) {
      var conn = S('line', { x1: stepX[i - 1] + TKW / 2, y1: ROWY + TKH / 2, x2: cx - TKW / 2, y2: ROWY + TKH / 2,
        stroke: C.accent3, 'stroke-width': 1.8, opacity: 0 });
      svg.appendChild(conn); chainConns.push(conn);
    }

    // 该步的候选扇出：合法在上、非法在下
    var all = cand[i].legal.concat(cand[i].illegal);
    var n = all.length;
    var startY = CANDY - (n * (CH + CVGAP) - CVGAP) / 2;
    var group = [];
    all.forEach(function (label, j) {
      var legal = j < cand[i].legal.length;
      var y = startY + j * (CH + CVGAP);
      var cbox = rrect(cx - CW / 2, y, CW, CH, { fill: C.bg, stroke: C.border, rx: 6, opacity: 0 });
      svg.appendChild(cbox);
      var clab = text(cx, y + 16, label, { size: 12, anchor: 'middle', fill: C.soft });
      clab.setAttribute('opacity', 0); clab.setAttribute('font-family', 'ui-monospace, monospace');
      svg.appendChild(clab);
      // mask 掉非法分支时画的删除线
      var strike = S('line', { x1: cx - CW / 2 + 8, y1: y + CH / 2, x2: cx + CW / 2 - 8, y2: y + CH / 2,
        stroke: C.danger, 'stroke-width': 2, opacity: 0 });
      svg.appendChild(strike);
      // 从上一个已采纳 token 引一条引线到该候选（表示「下一步的可能续接」）
      var fromX = i === 0 ? (cx - CW / 2 - 30) : (stepX[i - 1] + TKW / 2);
      var fromY = i === 0 ? (ROWY + TKH / 2) : (ROWY + TKH / 2);
      var lead = S('line', { x1: fromX, y1: fromY, x2: cx - CW / 2, y2: y + CH / 2,
        stroke: C.border, 'stroke-width': 1.2, opacity: 0 });
      svg.appendChild(lead);
      group.push({ box: cbox, lab: clab, strike: strike, lead: lead, legal: legal, y: y });
    });
    fanGroups.push(group);
  });

  // —— 下排：无约束对照（同样起步，但某步采到非法 token → 结构损坏）——
  var UY = 252, UBW = 84, UBH = 30;
  var uTokens = ['{', '"ok"', ':', 'true', ',', '"ok"'];   // 第 5 个起跑偏：合法 JSON 不该再来逗号+重复 key
  var uBad = 4;   // 从第 5 个 token（index 4）起算非法
  var uEls = [], uConns = [];
  var uX0 = 70, uGap = 14;
  (function () {
    var x = uX0;
    uTokens.forEach(function (label, i) {
      var box = rrect(x, UY, UBW, UBH, { fill: C.bg, stroke: C.border, rx: 7, opacity: 0 });
      svg.appendChild(box);
      var tk = text(x + UBW / 2, UY + 20, label, { size: 13, weight: 700, anchor: 'middle' });
      tk.setAttribute('opacity', 0); tk.setAttribute('font-family', 'ui-monospace, monospace');
      svg.appendChild(tk);
      uEls.push({ box: box, tk: tk, bad: i >= uBad });
      if (i > 0) {
        var conn = S('line', { x1: x - uGap, y1: UY + UBH / 2, x2: x, y2: UY + UBH / 2,
          stroke: C.border, 'stroke-width': 1.6, opacity: 0 });
        svg.appendChild(conn); uConns.push(conn);
      }
      x += UBW + uGap;
    });
  })();
  var uTag = text(uX0, UY - 10, '无约束：采样自由 → 某步选到非法 token → 结构损坏', { size: 11.5, weight: 700, anchor: 'start', fill: C.danger });
  uTag.setAttribute('opacity', 0);
  svg.appendChild(uTag);
  var uCross = text(uX0 + (UBW + uGap) * uTokens.length + 6, UY + 20, '✗ invalid', { size: 13, weight: 800, anchor: 'start', fill: C.danger });
  uCross.setAttribute('opacity', 0);
  svg.appendChild(uCross);

  // —— 旁白 + 收口 ——
  var cap = text(W / 2, H - 30, '', { fill: C.accent, size: 13, weight: 600 });
  svg.appendChild(cap);
  var stat = text(W / 2, H - 10, '', { fill: C.accent3, size: 12.5, weight: 700 });
  svg.appendChild(stat);

  var caps = [
    '① 每生成一步，先按 JSON 文法（CFG/状态机）算出「当前哪些 token 合法」',
    '② 非法 token 的 logit 置 -∞（概率 mask 成 0）—— 物理上吐不出来',
    '③ 只在剩下的合法分支里采样，文法状态机推进一步',
    '④ 重复到结束 → 100% 拼出合法 JSON（不靠模型「听话」，靠解码器约束）'
  ];

  function resetUpper() {
    acceptEls.forEach(function (a) { a.box.setAttribute('opacity', 0); a.box.setAttribute('stroke', C.border); a.tk.setAttribute('opacity', 0); });
    chainConns.forEach(function (c) { c.setAttribute('opacity', 0); });
    fanGroups.forEach(function (g) {
      g.forEach(function (c) {
        c.box.setAttribute('opacity', 0); c.box.setAttribute('stroke', C.border);
        c.lab.setAttribute('opacity', 0); c.lab.setAttribute('fill', C.soft);
        c.strike.setAttribute('opacity', 0); c.lead.setAttribute('opacity', 0);
      });
    });
  }

  function reset() {
    if (has) gsap.killTweensOf(svg.querySelectorAll('*'));
    resetUpper();
    uEls.forEach(function (u) { u.box.setAttribute('opacity', 0); u.box.setAttribute('stroke', C.border); u.tk.setAttribute('opacity', 0); });
    uConns.forEach(function (c) { c.setAttribute('opacity', 0); });
    uTag.setAttribute('opacity', 0); uCross.setAttribute('opacity', 0);
    cap.textContent = ''; stat.textContent = '';
  }

  function staticEnd() {
    // 约束解码：全部已采纳 token 点亮 + 合法分支保留、非法分支划掉
    acceptEls.forEach(function (a) { a.box.setAttribute('opacity', 1); a.box.setAttribute('stroke', C.accent3); a.tk.setAttribute('opacity', 1); });
    chainConns.forEach(function (c) { c.setAttribute('opacity', 1); });
    fanGroups.forEach(function (g) {
      g.forEach(function (c) {
        c.box.setAttribute('opacity', c.legal ? 1 : .28);
        c.box.setAttribute('stroke', c.legal ? C.accent3 : C.danger);
        c.lab.setAttribute('opacity', c.legal ? 1 : .5);
        c.lab.setAttribute('fill', c.legal ? C.accent3 : C.mut);
        c.strike.setAttribute('opacity', c.legal ? 0 : 1);
        c.lead.setAttribute('opacity', c.legal ? .6 : 0);
      });
    });
    // 无约束对照：跑偏标红 + invalid
    uEls.forEach(function (u) { u.box.setAttribute('opacity', 1); u.tk.setAttribute('opacity', 1); u.box.setAttribute('stroke', u.bad ? C.danger : C.border); if (u.bad) u.tk.setAttribute('fill', C.danger); });
    uConns.forEach(function (c) { c.setAttribute('opacity', 1); });
    uTag.setAttribute('opacity', 1); uCross.setAttribute('opacity', 1);
    cap.textContent = '约束解码：非法分支被 mask 划掉，只走合法路径 → 100% 合法 JSON';
    stat.textContent = '把概率问题变成确定性约束：纯训练 ~93% 合规，叠加约束解码 → 100%';
  }

  function play() {
    reset();
    if (!has) { staticEnd(); return; }
    var tl = gsap.timeline();

    tl.call(function () { cap.textContent = '同样要生成一段 JSON：上＝约束解码，下＝无约束'; });

    // —— 上排：逐步 fan-out → mask → 采纳 ——
    stepX.forEach(function (cx, i) {
      var grp = fanGroups[i];
      // 该步旁白（用 4 句滚动覆盖 5 步）
      tl.call(function () { cap.textContent = caps[Math.min(i, caps.length - 1)]; });
      // 引线 + 候选盒扇出
      tl.to(grp.map(function (c) { return c.lead; }), { attr: { opacity: .5 }, duration: .18 });
      tl.to(grp.map(function (c) { return c.box; }), { attr: { opacity: 1 }, duration: .2, stagger: .04 });
      tl.to(grp.map(function (c) { return c.lab; }), { attr: { opacity: 1 }, duration: .2 }, '<');
      // mask 掉非法分支：删除线 + 变红淡出
      tl.call(function () {
        grp.forEach(function (c) {
          if (!c.legal) { c.box.setAttribute('stroke', C.danger); c.lab.setAttribute('fill', C.mut); }
        });
      });
      grp.forEach(function (c) {
        if (!c.legal) {
          tl.to(c.strike, { attr: { opacity: 1 }, duration: .12 }, '<');
          tl.to([c.box, c.lab], { attr: { opacity: .26 }, duration: .25 }, '<');
        }
      });
      // 合法分支高亮 → 采纳进 token 链
      tl.call(function () {
        grp.forEach(function (c) { if (c.legal) { c.box.setAttribute('stroke', C.accent3); c.lab.setAttribute('fill', C.accent3); } });
      });
      tl.to(grp.filter(function (c) { return c.legal; }).map(function (c) { return c.box; }), { attr: { 'stroke-width': 2.6 }, duration: .14, yoyo: true, repeat: 1 });
      if (i > 0) tl.to(chainConns[i - 1], { attr: { opacity: 1 }, duration: .14 });
      tl.to(acceptEls[i].box, { attr: { opacity: 1 }, duration: .2 });
      tl.to(acceptEls[i].tk, { attr: { opacity: 1 }, duration: .2 }, '<');
      tl.call(function () { acceptEls[i].box.setAttribute('stroke', C.accent3); });
    });

    // —— 下排：无约束对照，逐 token 出，跑偏处标红 ——
    tl.call(function () { cap.textContent = '对照：无约束时采样不受文法限制'; uTag.setAttribute('opacity', 1); });
    tl.to(uTag, { attr: { opacity: 1 }, duration: .2 });
    uEls.forEach(function (u, i) {
      if (i > 0) tl.to(uConns[i - 1], { attr: { opacity: 1 }, duration: .1 });
      tl.to(u.box, { attr: { opacity: 1 }, duration: .14 });
      tl.to(u.tk, { attr: { opacity: 1 }, duration: .14 }, '<');
      if (u.bad) {
        tl.call(function () { u.box.setAttribute('stroke', C.danger); u.tk.setAttribute('fill', C.danger); });
        tl.to(u.box, { attr: { 'stroke-width': 2.6 }, duration: .12, yoyo: true, repeat: 1 });
      }
    });
    tl.to(uCross, { attr: { opacity: 1 }, duration: .25, ease: 'back.out(2)' });

    // —— 收口 ——
    tl.call(function () { cap.textContent = '约束解码：非法分支被 mask 划掉，只走合法路径 → 100% 合法 JSON'; });
    tl.fromTo(stat, { opacity: 0 }, { opacity: 1, duration: .5,
      onStart: function () { stat.textContent = '把概率问题变成确定性约束：纯训练 ~93% 合规，叠加约束解码 → 100%'; } });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{ title: '约束解码（constrained decoding）：每步 mask 掉非法 token，只在合法分支采样', caption: '生成 JSON 时按文法把非法续接的 logit 置 -∞ 划掉，只走合法路径 → 100% 合法结构；对照无约束采样会跑偏损坏（纯训练 ~93% → +约束解码 100%）' });

</script>
    <script>
/* 混合检索 + RRF 融合动画：同一 query 走两路检索
   稠密向量检索(语义)出一个排序列表、稀疏 BM25(关键词)出另一个列表；
   RRF 按 1/(k+rank) 把两列表的排名融合成最终排序。
   动画展示：两路各自 topN → 用 RRF 公式合并 → 互补项被提上来
   （向量漏的关键词召回、关键词漏的语义召回）。 */
AnimCore.register('rrf-fusion', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 820, H = 380;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }

  var K = 60; // RRF 平滑常数

  // —— query 入口（顶部居中）——
  var QX = W / 2, QY = 32;
  var qBox = S('rect', { x: QX - 70, y: QY - 18, width: 140, height: 30, rx: 9, fill: C.bg, stroke: C.accent, 'stroke-width': 1.5 });
  svg.appendChild(qBox);
  svg.appendChild(text(QX, QY + 2, 'query', { fill: C.accent, size: 13, weight: 700 }));

  // —— 两路列表布局 ——
  var LANE_TOP = 96;     // 列表项起始 y
  var ROW_H = 30;        // 行高
  var ROW_W = 150;       // 行宽
  var DENSE_X = 150;     // 稠密路中心 x
  var SPARSE_X = 410;    // 稀疏路中心 x
  var FINAL_X = 685;     // 融合后中心 x

  // 两路各自的 topN 列表（doc 标号 + 是否互补项）
  // comp:'dense' 表示纯语义命中（关键词路漏掉）、'sparse' 表示纯字面命中（向量路漏掉）
  var denseList = [
    { id: 'D2', label: '语义续费流程', comp: 'dense' }, // 向量路靠前、BM25 路靠后 → 被融合提上来
    { id: 'D1', label: '订阅说明',     comp: null },
    { id: 'D5', label: '账户中心',     comp: null },
    { id: 'D9', label: '帮助首页',     comp: null }
  ];
  var sparseList = [
    { id: 'S7', label: '错误码 E0451', comp: 'sparse' }, // BM25 路靠前、向量路漏 → 被融合提上来
    { id: 'D1', label: '订阅说明',     comp: null },      // 两路都靠前 → 稳健共识
    { id: 'S3', label: '型号 X-200',   comp: 'sparse' },

  svg.appendChild(text(labelX, rowVerifyY + 22, '一次并行验证', { anchor: 'start', size: 10, fill: C.mut }));
  svg.appendChild(text(labelX, rowOutY + 6, '最终输出', { anchor: 'start', weight: 700, size: 13, fill: C.accent3 }));
  svg.appendChild(text(labelX, rowOutY + 22, '接受 + 重采样', { anchor: 'start', size: 10, fill: C.mut }));

  // —— 列头 ——
  for (var c = 0; c < K; c++) {
    svg.appendChild(text(colX(c) + CELL / 2, 38, 't' + (c + 1), { size: 10.5, fill: C.soft, weight: 600 }));
  }

  // —— 建一行格子 ——
  function mkRow(baseY) {
    var arr = [];
    for (var i = 0; i < K; i++) {
      var cx = colX(i);
      var r = S('rect', { x: cx, y: baseY, width: CELL, height: CELL, rx: 8,
        fill: C.bg, stroke: C.border, 'stroke-width': 1.4, opacity: 0 });
      svg.appendChild(r);
      var lbl = text(cx + CELL / 2, baseY + CELL / 2 + 4, '', { size: 13, fill: C.fg, weight: 700, opacity: 0 });
      svg.appendChild(lbl);
      arr.push({ rect: r, lbl: lbl, idx: i, x: cx, y: baseY });
    }
    return arr;
  }
  var draft = mkRow(rowDraftY);
  var verify = mkRow(rowVerifyY);
  var out = mkRow(rowOutY);

  // 草稿/验证标记（✓ 接受 / ✗ 拒绝），画在验证行下方
  var marks = [];
  for (var m = 0; m < K; m++) {
    var mk = text(colX(m) + CELL / 2, rowVerifyY + CELL + 16, '', { size: 13, weight: 800, opacity: 0 });
    svg.appendChild(mk); marks.push(mk);
  }

  // —— 加速标尺：串行 k 步 vs 投机一次 ——
  var gaugeY = rowOutY + CELL + 12;
  var gauge = text(W - 14, gaugeY, '', { anchor: 'end', size: 12, weight: 700, fill: C.accent3, opacity: 0 });
  svg.appendChild(gauge);

  // —— tokenizer 硬约束标注 ——
  var note = text(X0 - 6, gaugeY, '', { anchor: 'start', size: 11, weight: 600, fill: C.warn, opacity: 0 });
  svg.appendChild(note);

  // —— 旁白 ——
  var cap = text(W / 2, H - 8, '', { fill: C.accent, size: 12.5, weight: 600 });
  svg.appendChild(cap);

  // 草稿 4 个 token 文案；前 3 个与 target 一致(接受)，第 4 个不一致(被拒)
  var draftToks = ['the', 'cat', 'sat', 'down'];
  var fixToks   = ['the', 'cat', 'sat', 'on'];   // target 重采样后正确的第 4 个

  function paint(cell, fill, lblFill, txt) {
    cell.rect.setAttribute('opacity', 1);
    cell.rect.setAttribute('fill', fill);
    cell.rect.setAttribute('stroke', fill);
    cell.lbl.setAttribute('opacity', 1);
    cell.lbl.setAttribute('fill', lblFill || '#fff');
    if (txt != null) cell.lbl.textContent = txt;
  }

  function all() { return draft.concat(verify).concat(out); }

  function reset() {
    all().forEach(function (cell) {
      cell.rect.setAttribute('opacity', 0);
      cell.rect.setAttribute('fill', C.bg);
      cell.rect.setAttribute('stroke', C.border);
      cell.rect.setAttribute('stroke-width', 1.4);
      cell.lbl.setAttribute('opacity', 0);
      cell.lbl.setAttribute('fill', C.fg);
      cell.lbl.textContent = '';
    });
    marks.forEach(function (mk) { mk.setAttribute('opacity', 0); mk.textContent = ''; });
    gauge.setAttribute('opacity', 0); gauge.textContent = '';
    note.setAttribute('opacity', 0); note.textContent = '';
    cap.textContent = '';
  }

  function staticEnd() {
    for (var i = 0; i < K; i++) {
      paint(draft[i], C.accent, '#06283a', draftToks[i]);
      if (i < ACCEPT) {
        paint(verify[i], C.accent2, '#1a1033', draftToks[i]);
        marks[i].textContent = '✓'; marks[i].setAttribute('fill', C.accent3); marks[i].setAttribute('opacity', 1);
        paint(out[i], C.accent3, '#06291d', draftToks[i]);
      } else {
        paint(verify[i], C.danger, '#3a0c14', draftToks[i]);
        marks[i].textContent = '✗'; marks[i].setAttribute('fill', C.danger); marks[i].setAttribute('opacity', 1);
        paint(out[i], C.warn, '#3a2a05', fixToks[i]);   // target 重采样补正确
      }
    }
    gauge.textContent = '一次前向吐 ' + (ACCEPT + 1) + ' 个 token ≈ 2-3x 加速';
    gauge.setAttribute('opacity', 1);
    note.textContent = '硬约束：draft 与 target 的 tokenizer 必须完全一致';
    note.setAttribute('opacity', 1);
    cap.textContent = '草稿猜 4 → 并行验证 → 接受 3 + 重采样 1：输出分布与逐 token 解码一致(无损)';
  }

  function play() {
    reset();
    if (!has) { staticEnd(); return; }
    var tl = gsap.timeline();

    // ① draft 自回归逐个吐草稿（快）
    tl.call(function () { cap.textContent = '① Draft 小模型自回归一口气猜 ' + K + ' 个 token（快、便宜）'; });
    draft.forEach(function (cell, i) {
      tl.call(function () { paint(cell, C.accent, '#06283a', draftToks[i]); });
      tl.fromTo(cell.rect, { attr: { 'stroke-width': 3.2 } }, { attr: { 'stroke-width': 1.4 }, duration: .18 });
      tl.to({}, { duration: .12 });
    });

    // ② target 一次并行验证：同一时刻全部点亮
    tl.call(function () { cap.textContent = '② Target 大模型一次前向并行验证全部 ' + K + ' 个（compute-bound，一次过）'; });
    tl.call(function () {
      verify.forEach(function (cell, i) { paint(cell, C.accent2, '#1a1033', draftToks[i]); });
    });
    verify.forEach(function (cell) {
      tl.fromTo(cell.rect, { attr: { 'stroke-width': 3.2 } }, { attr: { 'stroke-width': 1.4 }, duration: .22 }, '<');
    });
    tl.to({}, { duration: .3 });

    // ③ 从第一个不匹配处截断：前 ACCEPT 接受、其余回退 + 重采样
    tl.call(function () { cap.textContent = '③ 从第一个不匹配处截断：接受前 ' + ACCEPT + ' 个，第 ' + (ACCEPT + 1) + ' 个被拒、回退'; });
    for (var i = 0; i < K; i++) {
      (function (i) {
        tl.call(function () {
          if (i < ACCEPT) {
            marks[i].textContent = '✓'; marks[i].setAttribute('fill', C.accent3);
            verify[i].rect.setAttribute('fill', C.accent3); verify[i].rect.setAttribute('stroke', C.accent3);
          } else {
            marks[i].textContent = '✗'; marks[i].setAttribute('fill', C.danger);
            verify[i].rect.setAttribute('fill', C.danger); verify[i].rect.setAttribute('stroke', C.danger);
          }
          marks[i].setAttribute('opacity', 1);
        });
        tl.to({}, { duration: .16 });
      })(i);
    }

    // 接受的落到输出行
    tl.call(function () { cap.textContent = '接受的 ' + ACCEPT + ' 个直接落地，被拒处由 target 重采样补出正确 token'; });
    for (var j = 0; j < ACCEPT; j++) {
      (function (j) {
        tl.call(function () { paint(out[j], C.accent3, '#06291d', draftToks[j]); });
        tl.fromTo(out[j].rect, { attr: { 'stroke-width': 3.2 } }, { attr: { 'stroke-width': 1.4 }, duration: .18 });
      })(j);
    }
    // 被拒处 target 重采样补正确（黄）
    tl.call(function () { paint(out[ACCEPT], C.warn, '#3a2a05', fixToks[ACCEPT]); });
    tl.fromTo(out[ACCEPT].rect, { attr: { 'stroke-width': 3.4 } }, { attr: { 'stroke-width': 1.4 }, duration: .26 });

    // 加速结论 + tokenizer 硬约束
    tl.call(function () {
      gauge.textContent = '一次前向吐 ' + (ACCEPT + 1) + ' 个 token ≈ 2-3x 加速';
      gauge.setAttribute('opacity', 1);
    });
    tl.to({}, { duration: .15 });
    tl.call(function () {
      note.textContent = '硬约束：draft 与 target 的 tokenizer 必须完全一致';
      note.setAttribute('opacity', 1);
    });
    tl.call(function () {
      cap.textContent = '✓ 草稿猜 4 → 并行验证 → 接受 3 + 重采样 1：一次前向多吐 token，输出分布无损';
    });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{
  title: '投机解码：草稿猜 4 → 并行验证 → 接受 3 回退 1',
  caption: '小 draft 模型一口气猜 k 个 token，大 target 模型一次前向并行验证，从首个不匹配处截断、接受匹配段、其余重采样——一次前向多吐 token(2-3x)；draft 与 target 的 tokenizer 必须完全一致'
});

</script>
    <script>
/* Lost in the Middle / Context Rot 动画：
   ① 一条长上下文（左侧横条）里埋一个"关键信息 needle"；
   ② needle 沿上下文位置滑动：开头 → 中间 → 结尾；
   ③ 右侧召回率坐标随之画出 U 形——首尾高、中间塌陷（掉 20~30 个点）；
   点明：塞满 ≠ 用好，中段信息最容易被注意力忽略。 */
AnimCore.register('lost-in-middle', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 340;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }

  // —— 左：长上下文条 ——
  var barX = 48, barY = 86, barW = 300, barH = 54;
  svg.appendChild(text(barX, barY - 16, '长上下文（haystack）', { anchor: 'start', size: 12.5, weight: 700 }));
  var frame = S('rect', { x: barX, y: barY, width: barW, height: barH, rx: 8, fill: C.bg, stroke: C.border, 'stroke-width': 1.6 });
  svg.appendChild(frame);
  // 背景"文本噪声"竖纹，营造塞满的长文感
  var n = 22;
  for (var i = 0; i < n; i++) {
    var lx = barX + 10 + i * (barW - 20) / (n - 1);
    svg.appendChild(S('line', { x1: lx, y1: barY + 10, x2: lx, y2: barY + barH - 10, stroke: C.mut, 'stroke-width': 1.4, opacity: .28 }));
  }
  // 首/中/尾位置标
  ['开头', '中间', '结尾'].forEach(function (p, k) {
    svg.appendChild(text(barX + barW * (k * 0.5), barY + barH + 18, p, { size: 10.5, fill: C.mut, weight: 600 }));
  });

  // needle（关键信息）—— 高亮小块 + 标签
  var nW = 26, nyTop = barY + 6, nH = barH - 12;
  var needle = S('rect', { x: barX, y: nyTop, width: nW, height: nH, rx: 4, fill: C.warn, stroke: C.danger, 'stroke-width': 1.6, opacity: 0 });
  svg.appendChild(needle);
  var nLbl = text(barX + nW / 2, barY - 2, 'needle', { size: 9.5, fill: C.warn, weight: 700, anchor: 'middle' });
  nLbl.setAttribute('opacity', 0);
  svg.appendChild(nLbl);

  // —— 右：召回率坐标系 ——
  var plotX = 440, plotY = 70, plotW = 272, plotH = 168;
  svg.appendChild(text(plotX, plotY - 16, '召回准确率', { anchor: 'start', size: 12.5, weight: 700 }));
  // 轴
  svg.appendChild(S('line', { x1: plotX, y1: plotY, x2: plotX, y2: plotY + plotH, stroke: C.border, 'stroke-width': 1.4 }));
  svg.appendChild(S('line', { x1: plotX, y1: plotY + plotH, x2: plotX + plotW, y2: plotY + plotH, stroke: C.border, 'stroke-width': 1.4 }));
  svg.appendChild(text(plotX - 8, plotY + 6, '高', { anchor: 'end', size: 10, fill: C.mut, weight: 600 }));
  svg.appendChild(text(plotX - 8, plotY + plotH, '低', { anchor: 'end', size: 10, fill: C.mut, weight: 600 }));
  ['开头', '中间', '结尾'].forEach(function (p, k) {
    svg.appendChild(text(plotX + plotW * (k * 0.5), plotY + plotH + 16, p, { size: 10, fill: C.mut, weight: 600 }));
  });

  // U 形：position 0/0.5/1 → 准确率 .92 / .62 / .90（中间塌陷 ~30 点）
  var pts = [
    { pos: 0.00, acc: 0.92 },
    { pos: 0.50, acc: 0.62 },
    { pos: 1.00, acc: 0.90 }
  ];
  function px(pos) { return plotX + plotW * pos; }
  function py(acc) { return plotY + plotH * (1 - acc); } // acc 1=顶 0=底

  // 中段"塌陷带"参考虚线
  var midBand = S('line', { x1: px(0.5), y1: plotY, x2: px(0.5), y2: plotY + plotH, stroke: C.danger, 'stroke-width': 1.2, 'stroke-dasharray': '4 3', opacity: 0 });
  svg.appendChild(midBand);

  // 曲线（描点连线，play 时逐段画出）
  var curve = S('polyline', { points: '', fill: 'none', stroke: C.accent, 'stroke-width': 2.4, 'stroke-linejoin': 'round', 'stroke-linecap': 'round', opacity: .95 });
  svg.appendChild(curve);
  var dots = pts.map(function (p) {
    var d = S('circle', { cx: px(p.pos), cy: py(p.acc), r: 5, fill: C.accent, stroke: C.bg, 'stroke-width': 1.6, opacity: 0 });
    svg.appendChild(d); return d;
  });

  // 旁白
  var cap = text(W / 2, H - 30, '', { size: 13, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  function setNeedleAt(pos) {
    var x = barX + (barW - nW) * pos;
    needle.setAttribute('x', x);
    nLbl.setAttribute('x', x + nW / 2);
  }

  function reset() {
    needle.setAttribute('opacity', 0);
    nLbl.setAttribute('opacity', 0);
    setNeedleAt(0);
    curve.setAttribute('points', '');
    midBand.setAttribute('opacity', 0);
    dots.forEach(function (d) { d.setAttribute('opacity', 0); d.setAttribute('fill', C.accent); });
    frame.setAttribute('stroke', C.border);
    cap.textContent = '';
  }

  function drawUpTo(k) {
    var str = '';
    for (var j = 0; j <= k; j++) str += px(pts[j].pos) + ',' + py(pts[j].acc) + ' ';
    curve.setAttribute('points', str.trim());
  }

  function play() {
    reset();
    if (!has) {
      // 静态终态：needle 居中 + 整条 U 曲线 + 中段塌陷标注
      setNeedleAt(0.5);
      needle.setAttribute('opacity', 1);
      nLbl.setAttribute('opacity', 1);
      midBand.setAttribute('opacity', .9);
      drawUpTo(2);
      dots.forEach(function (d, j) { d.setAttribute('opacity', 1); if (j === 1) d.setAttribute('fill', C.danger); });
      cap.textContent = '召回呈 U 形：首尾高、中段塌陷 20~30 点 —— 塞满 ≠ 用好';
      return;
    }

    var tl = gsap.timeline();
    var labels = ['① needle 放在开头：模型容易找到', '② 滑到中间：准确率明显塌陷', '③ 放到结尾：召回又回升'];

    tl.call(function () {
      cap.textContent = '把同一条"关键信息"放到上下文的不同位置';
      gsap.to([needle, nLbl], { opacity: 1, duration: .4 });
    });
    tl.to({}, { duration: .4 });

    pts.forEach(function (p, k) {
      tl.call(function () { cap.textContent = labels[k]; });
      // needle 滑到该位置
      tl.to(needle, { attr: { x: barX + (barW - nW) * p.pos }, duration: .55, ease: 'power1.inOut' }, '<');
      tl.to(nLbl, { attr: { x: barX + (barW - nW) * p.pos + nW / 2 }, duration: .55, ease: 'power1.inOut' }, '<');
      // 对应点亮 + 延长曲线
      tl.call(function () {
        dots[k].setAttribute('opacity', 1);
        if (k === 1) { dots[k].setAttribute('fill', C.danger); midBand.setAttribute('opacity', .9); }
        drawUpTo(k);
      });
      tl.fromTo(dots[k], { attr: { r: 5 } }, { attr: { r: 8 }, duration: .2, yoyo: true, repeat: 1 });
      tl.to({}, { duration: .35 });
    });

    // 收口：高亮 U 形
    tl.call(function () {
      cap.textContent = '召回呈 U 形：首尾高、中段塌陷 20~30 点';
      frame.setAttribute('stroke', C.accent);
    });
    tl.fromTo(curve, { attr: { 'stroke-width': 2.4 } }, { attr: { 'stroke-width': 4 }, duration: .25, yoyo: true, repeat: 1 });
    tl.to({}, { duration: .4 });
    tl.call(function () { cap.textContent = '✓ 塞满 ≠ 用好：中段信息最易被注意力忽略，重要内容放首尾'; });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{ title: 'Lost in the Middle：召回率的 U 形塌陷', caption: '关键信息 needle 在上下文里从开头滑到结尾 → 召回准确率画出 U 形：首尾高、中段掉 20~30 点；塞满≠用好' });

</script>
    <script>
/* LLM-as-judge 去偏动画：pointwise 单独打分易被 verbosity / position / self-preference 偏差污染；
   改用 pairwise 两两对比，并交换 A/B 位置各评一次。
   左侧演示 pointwise 给同一对答案各打一个绝对分（受偏差影响、不可靠）；
   右侧演示 pairwise 跑两遍——「位置 A-B」一次、「交换 B-A」一次——
   只有两次结论一致（都判同一个答案更好）才算数，从而消除 position bias。
   参考 eval-loop.js 的「节点状态 setNode + 边状态 setEdge + 时间线」写法。 */
AnimCore.register('llm-judge', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 780, H = 380;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }
  function box(x, y, w, h, o) {
    o = o || {};

      fill: o.fill || C.bg, stroke: o.stroke || C.border, 'stroke-width': o.sw || 1.5 });

  var defs = S('defs');

  mk.appendChild(S('path', { d: 'M0,0 L10,5 L0,10 z', fill: C.mut })); defs.appendChild(mk); svg.appendChild(defs);

  // ——标题区——

  svg.appendChild(S('line', { x1: W / 2, y1: 44, x2: W / 2, y2: H - 40, stroke: C.border, 'stroke-width': 1, 'stroke-dasharray': '4 5' }));

  // 两个被测答案（A 简洁、B 冗长）——pointwise 各自孤立打分
  var pA = box(LX - 130, 84, 120, 56, {});
  var pB = box(LX + 10, 84, 120, 56, {});
  svg.appendChild(pA); svg.appendChild(pB);
  svg.appendChild(text(LX - 70, 106, '答案 A', { size: 12, weight: 700 }));
  svg.appendChild(text(LX - 70, 124, '简洁正确', { size: 10, weight: 500, fill: C.mut }));
  svg.appendChild(text(LX + 70, 106, '答案 B', { size: 12, weight: 700 }));
  svg.appendChild(text(LX + 70, 124, '冗长堆砌', { size: 10, weight: 500, fill: C.mut }));

  var pScoreA = text(LX - 70, 178, '', { size: 14, weight: 700, fill: C.mut });
  var pScoreB = text(LX + 70, 178, '', { size: 14, weight: 700, fill: C.mut });
  svg.appendChild(pScoreA); svg.appendChild(pScoreB);
  var pArA = S('path', { d: 'M' + (LX - 70) + ',140 L' + (LX - 70) + ',164', fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'marker-end': 'url(#lj-ar)' });
  var pArB = S('path', { d: 'M' + (LX + 70) + ',140 L' + (LX + 70) + ',164', fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'marker-end': 'url(#lj-ar)' });
  svg.appendChild(pArA); svg.appendChild(pArB);

  var pWarn = text(LX, 218, '', { size: 11, weight: 600, fill: C.danger });

  var r1 = box(RX - 140, 82, 280, 48, {});
  svg.appendChild(r1);
  svg.appendChild(text(RX, 102, '第①轮  位置  [ A ] vs [ B ]', { size: 11.5, weight: 700 }));
  var r1v = text(RX, 119, '', { size: 10.5, weight: 600, fill: C.mut });
  svg.appendChild(r1v);

  // 第二轮：交换 B-A
  var r2 = box(RX - 140, 142, 280, 48, {});
  svg.appendChild(r2);
  svg.appendChild(text(RX, 162, '第②轮  交换  [ B ] vs [ A ]', { size: 11.5, weight: 700 }));
  var r2v = text(RX, 179, '', { size: 10.5, weight: 600, fill: C.mut });
  svg.appendChild(r2v);

  // 一致性判定块
  var rOut = box(RX - 90, 206, 180, 44, { sw: 1.8 });
  svg.appendChild(rOut);
  var rOutT = text(RX, 232, '一致性校验', { size: 11.5, weight: 700, fill: C.mut });
  svg.appendChild(rOutT);
  var rAr1 = S('path', { d: 'M' + RX + ',130 L' + RX + ',142', fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'marker-end': 'url(#lj-ar)' });
  var rAr2 = S('path', { d: 'M' + RX + ',190 L' + RX + ',206', fill: 'none', stroke: C.border, 'stroke-width': 1.6, 'marker-end': 'url(#lj-ar)' });
  svg.appendChild(rAr1); svg.appendChild(rAr2);

  // ——底部说明——
  var cap = text(W / 2, H - 14, '', { size: 12.5, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  function setBox(el, st) {
    if (st === 'run') { el.setAttribute('stroke', C.accent); el.setAttribute('stroke-width', 2.4); el.setAttribute('fill', C.bg); }
    else if (st === 'good') { el.setAttribute('stroke', C.accent3); el.setAttribute('stroke-width', 2); el.setAttribute('fill', '#34d39915'); }
    else if (st === 'bad') { el.setAttribute('stroke', C.danger); el.setAttribute('stroke-width', 2); el.setAttribute('fill', '#fb718515'); }
    else { el.setAttribute('stroke', C.border); el.setAttribute('stroke-width', 1.5); el.setAttribute('fill', C.bg); }
  }

  function reset() {
    [pA, pB].forEach(function (e) { setBox(e, 'pend'); });
    [r1, r2, rOut].forEach(function (e) { setBox(e, 'pend'); });
    pScoreA.textContent = ''; pScoreB.textContent = '';
    pScoreA.setAttribute('fill', C.mut); pScoreB.setAttribute('fill', C.mut);
    pWarn.textContent = '';
    r1v.textContent = ''; r2v.textContent = '';
    r1v.setAttribute('fill', C.mut); r2v.setAttribute('fill', C.mut);
    rOutT.textContent = '一致性校验'; rOutT.setAttribute('fill', C.mut);
    cap.textContent = '';
  }

  function finalState() {
    // pointwise：B 因冗长偏差拿到虚高分，结论被污染
    setBox(pA, 'bad'); setBox(pB, 'bad');
    pScoreA.textContent = 'A → 7.0'; pScoreA.setAttribute('fill', C.danger);
    pScoreB.textContent = 'B → 8.5'; pScoreB.setAttribute('fill', C.danger);
    pWarn.textContent = '⚠ 受冗长/位置/自我偏好偏差污染';
    // pairwise：两轮一致都判 A 更好
    setBox(r1, 'good'); setBox(r2, 'good'); setBox(rOut, 'good');
    r1v.textContent = '判定：A 更好'; r1v.setAttribute('fill', C.accent3);
    r2v.textContent = '判定：A 更好（换位后不变）'; r2v.setAttribute('fill', C.accent3);
    rOutT.textContent = '✓ 两轮一致 → 采信 A'; rOutT.setAttribute('fill', C.accent3);
  }

  function play() {
    reset();
    if (!has) {
      finalState();
      cap.textContent = '（无 gsap：去偏对比静态终态）';
      return;
    }
    var tl = gsap.timeline();
    var D = 0.6;

    // —— 左栏 pointwise ——
    tl.call(function () {
      cap.textContent = 'pointwise：让 judge 给每个答案打一个孤立的绝对分';
      setBox(pA, 'run'); setBox(pB, 'run');
    });
    tl.to({}, { duration: D });
    tl.call(function () {
      pScoreA.textContent = 'A → 7.0'; pScoreB.textContent = 'B → 8.5';
      setBox(pA, 'bad'); setBox(pB, 'bad');
      pScoreA.setAttribute('fill', C.danger); pScoreB.setAttribute('fill', C.danger);
      cap.textContent = '冗长的 B 拿到虚高分——绝对分受 verbosity / 位置 / 自我偏好偏差污染';
    });
    tl.to({}, { duration: 0.3 });
    tl.call(function () { pWarn.textContent = '⚠ 受冗长/位置/自我偏好偏差污染'; });
    tl.to({}, { duration: 0.4 });

    // —— 右栏 pairwise 第一轮 ——
    tl.call(function () {
      cap.textContent = 'pairwise 第①轮：按位置 [A] vs [B] 让 judge 二选一';
      setBox(r1, 'run');
    });
    tl.to({}, { duration: D });
    tl.call(function () {
      r1v.textContent = '判定：A 更好'; r1v.setAttribute('fill', C.accent3);
      setBox(r1, 'good');
    });
    tl.to({}, { duration: 0.3 });

    // —— 第二轮：交换位置 ——
    tl.call(function () {
      cap.textContent = 'pairwise 第②轮：交换成 [B] vs [A] 再评一次，专测 position bias';
      setBox(r2, 'run');
    });
    tl.to({}, { duration: D });
    tl.call(function () {
      r2v.textContent = '判定：A 更好（换位后不变）'; r2v.setAttribute('fill', C.accent3);
      setBox(r2, 'good');
    });
    tl.to({}, { duration: 0.3 });

    // —— 一致性校验 ——
    tl.call(function () {
      cap.textContent = '只有两轮结论一致才算数——换位不变，position bias 被排除';
      setBox(rOut, 'run');
    });
    tl.to({}, { duration: D });
    tl.call(function () {
      rOutT.textContent = '✓ 两轮一致 → 采信 A'; rOutT.setAttribute('fill', C.accent3);
      setBox(rOut, 'good');
    });
    tl.to([rOut], { attr: { 'stroke-width': 3.2 }, duration: 0.3, yoyo: true, repeat: 1 });
    tl.call(function () {
      cap.textContent = '✓ pairwise + 交换位置：换位仍一致才采信，把 judge 校准成可信的测量仪器';
    });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*meta*/{
  title: '⚖ LLM-as-judge 去偏：pairwise + 交换位置消除位置偏差',
  caption: 'pointwise 绝对分受冗长/位置/自我偏好偏差污染；pairwise 两两对比并交换 A/B 位置各评一次，只有两轮一致才采信——把 judge 校准成可信的测量仪器'
});

    <script>
/* Continuous Batching 动画：对比两种批处理调度。
   上轨「静态批（static batching）」——整批一起进，必须等批内最长的请求生成完才能放下一批；
     短请求早早生成完，但格子留在批里空转（橙=GPU 空泡 idle bubble），利用率被最长请求拖死。
   下轨「连续批（continuous batching）」——迭代级调度：token 级独立，谁生成完谁立刻离开、
     腾出的空位被排队的新请求随到随插（绿=新请求补位），GPU 步步打满（蓝=有效计算），无空泡。
   右侧累计「有效格 / 空泡格」对比，体现吞吐 2-10x。
   参考 kv-cache.js（两轨对比 + 逐步 paint + 计数器 + staticEnd 兜底）与 llm-gateway.js 写法。 */
AnimCore.register('continuous-batching', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 340;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 600 });
    t.textContent = str; return t;
  }

  // —— 布局 ——
  var SLOTS = 4;             // 一个批次 4 个并发槽位（GPU 同时跑 4 个请求）
  var STEPS = 6;             // 演示推进 6 个迭代步（token 级时间轴）
  var CELL = 34, GAP = 7;    // 格子尺寸 / 间距
  var X0 = 150;              // 时间轴格子区起点
  var rowSta = 92, rowCon = 222; // 两轨各自的顶部 y
  var labelX = 16;

  // 轨道标题
  svg.appendChild(text(labelX, rowSta - 34, '静态批', { anchor: 'start', weight: 700, size: 13, fill: C.danger }));
  svg.appendChild(text(labelX, rowSta - 18, '等整批最长的', { anchor: 'start', size: 10.5, fill: C.mut }));
  svg.appendChild(text(labelX, rowSta - 4, '请求生成完', { anchor: 'start', size: 10.5, fill: C.mut }));
  svg.appendChild(text(labelX, rowCon - 34, '连续批', { anchor: 'start', weight: 700, size: 13, fill: C.accent3 }));
  svg.appendChild(text(labelX, rowCon - 18, '随到随入', { anchor: 'start', size: 10.5, fill: C.mut }));
  svg.appendChild(text(labelX, rowCon - 4, '随完随出', { anchor: 'start', size: 10.5, fill: C.mut }));

  function colX(i) { return X0 + i * (CELL + GAP); }
  function rowSlotY(baseY, slot) { return baseY + slot * (CELL + GAP); }

  // step 列头（时间轴）
  for (var s = 0; s < STEPS; s++) {
    svg.appendChild(text(colX(s) + CELL / 2, 44, 't' + (s + 1), { size: 10.5, fill: C.soft, weight: 600 }));
  }

  // —— 请求生成长度计划 ——
  // 静态批：一批 4 个请求，长度差异大（R1 短、R4 长），整批要等到 R4 跑完（step 6）才放下一批。
  var staLen = [2, 3, 5, 6]; // 每个请求要生成的 token 步数（占第几步前为活跃）
  // 连续批：同样 4 个请求起步，谁完成谁离开、空位立刻给新请求 R5/R6/...
  var conLen = [2, 3, 5, 6];
  // 连续批的新请求：当某槽在 step e 完成（请求只跑到 step e），下一步 e 起插入一个新请求占这个槽到结尾
  // 这里用「插入事件」描述：{slot, startStep}
  var conInserts = [
    { slot: 0, start: 2, tag: 'R5' }, // R1 跑完 2 步 → step3 起 R5 补位
    { slot: 1, start: 3, tag: 'R6' }, // R2 跑完 3 步 → step4 起 R6 补位
    { slot: 0, start: 5, tag: 'R7' }  // R5 又跑完 → step6 起 R7 补位
  ];

  // —— 建格子：两轨各 SLOTS 行 × STEPS 列 ——
  function mkGrid(baseY) {
    var g = [];
    for (var slot = 0; slot < SLOTS; slot++) {
      var row = [];
      for (var step = 0; step < STEPS; step++) {
        var cx = colX(step);
        var cy = rowSlotY(baseY, slot);
        var r = S('rect', { x: cx, y: cy, width: CELL, height: CELL, rx: 6,
          fill: C.bg, stroke: C.border, 'stroke-width': 1.4, opacity: 1 });
        svg.appendChild(r);
        var lbl = text(cx + CELL / 2, cy + CELL / 2 + 4, '', { size: 10, fill: '#fff', opacity: 0 });
        svg.appendChild(lbl);
        row.push({ rect: r, lbl: lbl, slot: slot, step: step });
      }
      g.push(row);
    }
    return g;
  }
  var staGrid = mkGrid(rowSta);
  var conGrid = mkGrid(rowCon);

  // 计数器
  var counterY = 320;
  var staCount = text(X0 + 4, counterY, '', { anchor: 'start', size: 12, weight: 700, fill: C.danger });
  var conCount = text(X0 + 250, counterY, '', { anchor: 'start', size: 12, weight: 700, fill: C.accent3 });
  svg.appendChild(staCount); svg.appendChild(conCount);

  // 图例
  var legY = counterY;
  var lg1 = text(W - 12, legY - 34, '■ 有效计算', { anchor: 'end', size: 10.5, fill: C.accent });
  var lg2 = text(W - 12, legY - 18, '■ GPU 空泡(空转)', { anchor: 'end', size: 10.5, fill: C.danger });
  var lg3 = text(W - 12, legY - 2, '■ 新请求补位', { anchor: 'end', size: 10.5, fill: C.accent3 });
  svg.appendChild(lg1); svg.appendChild(lg2); svg.appendChild(lg3);

  // 旁白
  var cap = text(W / 2, H - 2, '', { fill: C.accent, size: 12.5, weight: 600 });
  svg.appendChild(cap);

  function allCells(grid) {
    var out = [];
    grid.forEach(function (row) { row.forEach(function (c) { out.push(c); }); });
    return out;
  }

  function paint(c, fill, label) {
    c.rect.setAttribute('opacity', 1);
    c.rect.setAttribute('fill', fill);
    c.rect.setAttribute('stroke', fill);
    c.lbl.setAttribute('opacity', label ? 1 : 0);
    c.lbl.textContent = label || '';
  }
  function blank(c) {
    c.rect.setAttribute('fill', C.bg);
    c.rect.setAttribute('stroke', C.border);
    c.rect.setAttribute('stroke-width', 1.4);
    c.lbl.setAttribute('opacity', 0);
    c.lbl.textContent = '';
  }

  function reset() {
    allCells(staGrid).concat(allCells(conGrid)).forEach(blank);
    staCount.textContent = '';
    conCount.textContent = '';
    cap.textContent = '';
  }

  // 静态批某步、某槽是「有效(蓝)」还是「空泡(橙)」：请求只活跃到 staLen[slot] 步；之后到本批结束(step6)都是空泡
  function staKind(slot, step) {
    return step < staLen[slot] ? 'work' : 'idle';
  }
  // 连续批某步、某槽显示什么：原请求 R1..R4 跑到 conLen[slot]；之后被新请求接管（按 conInserts）
  function conLabelAt(slot, step) {
    // 原始请求活跃？
    if (step < conLen[slot]) return { tag: 'R' + (slot + 1), kind: 'work', isNew: false };
    // 找接管这个槽且 start<=step 的最近一次插入
    var owner = null;
    for (var i = 0; i < conInserts.length; i++) {
      var ins = conInserts[i];
      if (ins.slot === slot && ins.start <= step) owner = ins; // 后者覆盖前者
    }
    if (owner) return { tag: owner.tag, kind: 'work', isNew: owner.start === step };
    return null; // 真空（连续批理论上会再补，演示里少数末尾留空）
  }

  function staticEnd() {
    var work = 0, idle = 0, conWork = 0;
    for (var slot = 0; slot < SLOTS; slot++) {
      for (var step = 0; step < STEPS; step++) {
        if (staKind(slot, step) === 'work') { paint(staGrid[slot][step], C.accent, 'R' + (slot + 1)); work++; }
        else { paint(staGrid[slot][step], C.danger, '空'); idle++; }
        var info = conLabelAt(slot, step);
        if (info) { paint(conGrid[slot][step], info.isNew ? C.accent3 : C.accent, info.tag); conWork++; }
        else { blank(conGrid[slot][step]); }
      }
    }
    staCount.textContent = '静态批：有效 ' + work + ' / 空泡 ' + idle + '（GPU 空转）';
    conCount.textContent = '连续批：有效 ' + conWork + '（几乎打满）';
    cap.textContent = '静态批等齐留空泡 vs 连续批随到随入随完随出——吞吐 2-10x';
  }

  function play() {
    reset();
    if (!has) { staticEnd(); return; }
    var tl = gsap.timeline();
    var work = { v: 0 }, idle = { v: 0 }, conWork = { v: 0 };

    for (var step = 0; step < STEPS; step++) {
      (function (step) {
        tl.call(function () {
          cap.textContent = '迭代步 t' + (step + 1) + '：GPU 跑这一列的所有活跃请求';
        });
        // 上轨：静态批——本批 4 槽里，活跃的算有效(蓝)，已生成完的占着槽空转(橙空泡)
        for (var slot = 0; slot < SLOTS; slot++) {
          (function (slot) {
            tl.call(function () {
              if (staKind(slot, step) === 'work') {
                paint(staGrid[slot][step], C.accent, 'R' + (slot + 1)); work.v++;
              } else {
                paint(staGrid[slot][step], C.danger, '空'); idle.v++;
              }
              staCount.textContent = '静态批：有效 ' + work.v + ' / 空泡 ' + idle.v;
            });
          })(slot);
        }
        // 下轨：连续批——谁完成谁离开、空位被新请求补上，整列尽量打满
        for (var cslot = 0; cslot < SLOTS; cslot++) {
          (function (cslot) {
            var info = conLabelAt(cslot, step);
            tl.call(function () {
              if (info) {
                paint(conGrid[cslot][step], info.isNew ? C.accent3 : C.accent, info.tag);
                conWork.v++;
                conCount.textContent = '连续批：有效 ' + conWork.v;
              } else {
                blank(conGrid[cslot][step]);
              }
            });
            if (info && info.isNew) tl.to(conGrid[cslot][step].rect, { attr: { 'stroke-width': 3.4 }, duration: .1, yoyo: true, repeat: 1 });
          })(cslot);
        }
        // 闪一下本步静态批里的空泡，强调"白占"
        tl.to({}, { duration: .12 });
        tl.call(function () {
          for (var k = 0; k < SLOTS; k++) {
            if (staKind(k, step) === 'idle') staGrid[k][step].rect.setAttribute('stroke', C.warn);
          }
        });
        tl.to({}, { duration: .22 });
        tl.call(function () {
          for (var k = 0; k < SLOTS; k++) {
            if (staKind(k, step) === 'idle') staGrid[k][step].rect.setAttribute('stroke', C.danger);
          }
        });
      })(step);
    }

    tl.call(function () {
      staCount.textContent = '静态批：有效 ' + work.v + ' / 空泡 ' + idle.v + '（GPU 空转）';
      conCount.textContent = '连续批：有效 ' + conWork.v + '（几乎打满）';
      cap.textContent = '✓ 连续批：token 级独立、随完随出 + 随到随入，吃掉空泡——吞吐 2-10x';
    });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{
  title: 'Continuous Batching：静态批等齐留空泡 vs 连续批随到随入',
  caption: '静态批必须等整批最长的请求生成完，短请求占着槽位空转（GPU 空泡）；连续批 token 级独立——谁生成完谁立刻离开、新请求随到随插入空位，GPU 步步打满，吞吐 2-10x'
});

</script>
    <script>
/* sampling-decode —— 解码采样四策略对比（同一组 logits → 不同的「砍候选 + 采样」方式）：
   ① greedy：直接取概率最大那根（确定但单调，无随机性）；
   ② temperature：T<1 调尖（更确定）、T>1 调平（更随机）—— 只缩放分布，不砍候选；
   ③ top-k：只留概率最高的 k 个，其余砍掉再归一化，在剩下里采样（候选数固定）；
   ④ top-p / nucleus：从高到低累加，留到累积概率刚过 p 的最小集合再归一采样（候选数随分布动态变）。
   动画用一排概率柱，逐策略演示「砍掉哪些、在剩下里采样」，体现各策略对随机性 / 质量的取舍。 */
AnimCore.register('sampling-decode', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 330;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', {
      x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle',
      'font-weight': o.weight || 600
    });
    t.textContent = str; return t;
  }

  // —— 同一组 logits（8 个候选 token），后续各策略在它之上操作 ——
  var raw = [3.2, 2.6, 2.1, 1.5, 0.9, 0.3, -0.4, -1.1];
  var N = raw.length;
  var toks = ['the', 'a', 'an', 'this', 'that', 'one', 'some', 'no'];

  function softmaxScaled(arr, scale) {
    var s = arr.map(function (v) { return v * scale; });
    var m = Math.max.apply(null, s);
    var ex = s.map(function (v) { return Math.exp(v - m); });
    var sum = ex.reduce(function (a, b) { return a + b; }, 0);
    return ex.map(function (v) { return v / sum; });
  }

  var pBase = softmaxScaled(raw, 1.0);   // T=1 基准分布
  var pSharp = softmaxScaled(raw, 1.8);  // T<1：调尖
  var pFlat = softmaxScaled(raw, 0.45);  // T>1：调平

  // —— 布局：一排柱 + 顶部策略名 + 底部旁白 ——
  var PX = 60, PY = 96, PW = W - 120, PH = 150;
  var BASE = PY + PH - 24;
  var MAXBAR = 116;                       // 概率=最大基准值时的目标柱高（自适应）
  var maxP = Math.max.apply(null, pSharp);
  var SCALE = MAXBAR / maxP;             // 柱高换算系数（按最尖分布定，保证不溢出）

    <script>
      document.addEventListener("click", function (e) {

      });
      (function () {
        var pts = null, W = 0, H = 0, raf = null;
        function frame() {
          raf = null;
          var c = document.getElementById("cover-canvas");
          if (!c) { pts = null; return; } // 不在封面：停止循环（省资源、避免与滚动争用）
          if (document.body.classList.contains("reduce-motion")) { try { var x = c.getContext("2d"); x.clearRect(0, 0, c.width, c.height); } catch (e) {} pts = null; return; }

            W = w; H = h;
