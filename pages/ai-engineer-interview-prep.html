less / 移动后端大多是 TypeScript**，AI agent 正在往「ship the web 的人」那侧渗透。\n- **判断**：你是 Python 主栈没问题，但要能说出「我知道 TS 这条线在起来，Vercel AI SDK / Mastra 是给全栈团队把 agent 直接落到产品里的——选 Python 还是 TS 取决于团队主栈和交付形态，不是信仰问题」。\n\n### 3.7 什么在贬值（2023–2024 技能的折旧表）\n\n| 正在贬值 | 为什么 | 升值的替代 |\n|---------|--------|-----------|\n| 纯 Prompt Engineering | 单 prompt 边际收益趋零、被模型自身吸收 | context engineering + evals |\n| 裸 RAG 缝合（Load→Split→Embed→stuff）| 人人会、是地板线 | 量化收益 + 路由 + 高级范式 + 治理 |\n| 「会调 API」 | 调 API 本身没壁垒 | 系统编排、成本/延迟/可靠性取舍 |\n| 「会用某个框架」 | 框架在去抽象化、半年一换 | 看穿框架做了什么、何时该不用框架 |\n\n**一条主轴一眼看穿贬值 / 升值**：**凡是模型 / 平台会替你做的，都在贬值；凡是需要人来判断、跨系统编排、对数据做验证的，都在升值。** 下面这张动画把这条「能力价值迁移」演出来——左列 2023–2024 的热门技能随时间下沉变灰（成了门票），右列需人判断的能力上浮变亮（成了护城河）：\n\n![能力价值迁移：会用贬值，会判断升值](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/10-1-value-shift.png ':class=xh-illust')\n\n<div class=\"anim\" data-anim=\"skill-shift\"><\/div>\n\n---\n\n## ④ 面试怎么用一句话亮判断力（话术模板）\n\n把判断力封装成可复用的句式。**核心结构：① 不站队/不背诵 → ② 给出取舍维度 → ③ 落到量化或边界 → ④ 收一句迁移自身后端 sense。**\n\n| 场景 | 一句话模板 |\n|------|-----------|\n| 被问选型 | 「我不默认 X，先看〔成本/延迟/规模/运维〕——在我那个场景里 ___，所以选了 Y；如果 ___ 变了，我会切到 Z。」 |\n| 被问趋势 | 「这个我看到的不是『谁取代谁』，而是『___ 正在被商品化、价值往 ___ 迁移』——具体到工程上就是 ___。」 |\n| 被问框架 | 「框架是省事的，不是理解系统的。我从最薄的 SDK 起步，只在〔状态复杂度/durable execution〕压不住时才上 LangGraph，不为没用到的抽象付调试税。」 |\n| 被问 RAG/长上下文 | 「主流是智能路由：便宜要溯源的走 RAG（~1s），需要全局推理的少数 query 才走长上下文（贵约 1250x、慢 20–60s、还要防 Lost in Middle）。」 |\n| 被问向量库 | 「已有 Postgres、千万级，默认 pgvector+pgvectorscale，省一个组件、便宜约 75%；上亿打满 QPS 再迁 Qdrant/托管。」 |\n| 收尾迁移 | 「这其实是把我后端那套〔成本治理 / 面向接口 / 可观测 / 架构演进〕的直觉，搬到 AI 系统上。」 |\n\n---\n\n## ⑤ 面试官连环追问链（开放题深挖）\n\n开放题（「你怎么看 X」）没有标准答案，面试官靠**连环追问探你判断力的厚度**。提前演练这条链：\n\n```mermaid\nsequenceDiagram\n    participant I as 面试官\n    participant C as 你\n\n    I->>C: 你怎么看 long-context 会不会取代 RAG?\n    C->>I: 不会取代，主流是智能路由（给成本/延迟/Lost in Middle）\n    I->>C: 那你怎么决定一个 query 走哪条路?\n    C->>I: 按 query 类型路由——溯源/事实走 RAG，跨文档全局推理走长上下文\n\n    alt 继续深挖成本\n        I->>C: 长上下文不是有 prompt caching 吗，成本没那么夸张吧?\n        C->>I: caching 只在命中同前缀时有效、最多拉近 5–10x，生产流量大多命不中\n    else 深挖工程\n        I->>C: 路由本身怎么实现，准不准?\n        C->>I: 轻量分类器/规则 + 可回退，路由错了的兜底是 fallback 到 RAG，并进 eval 集\n    end\n\n    I->>C: 那你为什么不直接全上 LangGraph 把这套编排做掉?\n    C->>I: 抽象要为价值买单——简单链路上 SDK，状态复杂才上图，否则是负资产\n\n    Note over I,C: 追问探的不是知识，是「取舍维度 + 边界 + 兜底」的厚度\n```\n\n**应对心法**：每被追问一层，就**多暴露一个取舍维度或一个兜底方案**，而不是改口或硬扛。被问到不懂的，诚实说「这块我没实测过，但我会这样设计验证：___」——**给方法论也是判断力**。\n\n---\n\n## ⑥ 高频开放题 + 参考答案\n\n**Q1：你觉得 2026 年 AI 应用工程师最该具备的能力是什么？哪些技能在贬值？**\n\n> 参考：底层模型能力在被商品化，价值从「会用模型」往「会判断」迁移——a16z 说 moat 是 product/process engineering，swyx 说稀缺的是 curation。具体到技能：纯 prompt engineering、裸 RAG 缝合、「会调 API / 会用某框架」在贬值；升值的是 context engineering + evals、系统编排、以及在成本/延迟/可靠性上做对取舍的能力。我自己最看重的是「**能一眼看出 AI 生成代码哪里 subtly wrong**」——底层智能越强，这层 taste 越值钱。\n\n**Q2：long-context 都百万 token 了，RAG 是不是要淘汰？**\n\n> 参考：不淘汰，2026 主流是智能路由。给三组数字：长上下文单查询成本约 RAG 的 1250x、延迟 20–60s vs RAG ~1s、且有 Lost in Middle（关键信息在中部时性能掉）。所以溯源/事实/成本敏感走 RAG，跨文档全局推理这种少数 query 才走长上下文。prompt caching 顶多拉近 5–10x 且要命中同前缀。（决策边界见 §3.4）\n\n**Q3：现在框架这么多，你怎么选？为什么不一律上 LangChain/LangGraph？**\n\n> 参考：2026 的趋势是去抽象化——LangChain 1.0 主动瘦身收敛到 create_agent + LangGraph runtime，OpenAI Agents SDK 只有五原语（Agents/Handoffs/Guardrails/Sessions/Tracing）。我的原则是抽象要为价值买单：简单链路直接 SDK，只要结构化输出用 Instructor/PydanticAI，复杂状态机 + durable execution + human-in-the-loop 才上 LangGraph。为没用到的抽象付调试税是负资产。\n\n**Q4：选向量库你会怎么决定？**\n\n> 参考：2026 共识是「有 Postgres 就默认 pgvector」。pgvector+pgvectorscale 在 5000 万向量、99% recall 下吞吐反超 Pinecone s1、自托管便宜约 75%（~$835 vs ~$3,241/月）。所以中等规模 + 已有 Postgres，我默认 pgvector，省一个组件、向量和业务同事务；要极致 QPS 用 Qdrant、要开箱混合检索用 Weaviate、不想运维超大规模用 Pinecone。\n\n**Q5：MCP / A2A 这些协议你怎么理解，对工程有什么意义？**\n\n> 参考：这是 agent 从单点走向系统编排的标准化。MCP 接工具（纵向，Anthropic，已归 Linux Foundation 治理）、A2A 接 agent（横向，Google）、AG-UI 接界面。意义是解耦：用 MCP 把工具暴露成标准接口，换 agent runtime 不用重写集成层——本质是把后端「面向接口编程」搬进 agent 时代。\n\n**Q6（反向）：你怎么保持对技术趋势的判断、你信谁？**\n\n> 参考：我有固定信源并交叉验证——swyx 的 Latent.Space（AI Engineer 视角）、a16z Big Ideas（资本/产品视角）、Anthropic / OpenAI 的工程博客（一手实践）、各框架的官方 roadmap。但我不照单全收——swyx 自己讲的就是 curation：LLM 能帮我读和总结，但**判断该信什么得自己来**。我会用「这观点有没有量化证据、有没有反例」来过滤。\n\n---\n\n## ⑦ 项目话术钩子（把判断力缝进你的项目叙事）\n\n把上面的 taste 钉到你**真实做过的项目**上，面试官才信。给几个可直接套用的钩子：\n\n- **RAG 项目**：「裸 RAG 跑通后我没停——我评估过 long-context 直接吞文档，但算下来单查询成本约 1250x、延迟 20–60s，对我们的 QPS 不划算，所以做了**按 query 类型的智能路由**，只在跨文档对比时走长上下文。」\n- **向量库选型**：「我们本来就有 Postgres，规模千万级，我没盲目上 Pinecone——选了 pgvector+pgvectorscale，**省一个独立组件的运维、便宜约 75%、向量和业务数据同事务**。预留了规模上亿迁 Qdrant 的方案。」\n- **框架克制**：「一开始想上 LangGraph，后来评估状态复杂度其实不高，**直接用了薄 SDK + Instructor 管结构化输出**，调试成本和可观测性都更好——不为没用到的抽象付税。」\n- **evals 闭环**：「我把 prompt/context 的每次改动都挂在一个 eval 回归集上，**忠实度掉了就拦住**——这是我从后端『没测试不上线』迁过来的习惯。」\n- **后端 sense 迁移**：「我用 MCP 把工具暴露成标准接口，换 runtime 不重写集成层——这就是我后端那套面向接口编程的延续。」\n\n> 反深挖加固：每个钩子都备好「**为什么没选另一个**」+「**什么条件下我会切**」，被追问时这就是判断力的厚度。\n\n---\n\n## ⑧ 常见失分点（只背不判断）\n\n- **站队而非取舍**：「RAG 过时了 / long-context 是未来」——一站队就暴露没判断力。**永远给决策边界**。\n- **报框架名当能力**：「我会用 LangChain」——2026 它在瘦身，报名字反而显得没跟上。要讲「何时用、何时不用」。\n- **趋势全是结论没有证据 / 信源**：「我觉得 agent 是未来」——空泛。要带量化（1250x、75%、20–60s）和具名信源（a16z / swyx / Anthropic）。\n- **把「贬值技能」当卖点**：上来猛吹 prompt engineering、裸 RAG——等于自曝停在 2023。\n- **数字背错 / 信源张冠李戴**：宁可说「量级上约 1000x」也别报错精确数；引用作者机构务必对得上（**swyx 的 framing 是「Scaling without Slop」+ curation，不是某个花哨缩写**）。\n- **只会 Python 还排斥别的**：被问 TS 生态一问三不知 + 流露鄙视——显得封闭。知道 Vercel AI SDK / Mastra 在起来即可。\n- **没有「我会怎么验证」**：被问到没实测过的就硬编答案。**诚实 + 给验证方法论**比假装懂更显成熟。\n- **判断力浮在嘴上、不落项目**：金句一堆但接不到自己做过的事——面试官立刻识破是背的。\n\n---\n\n## ⑨ 一句话速记\n\n**底层智能在贬值、taste 在升值（a16z：moat=product/process engineering；swyx：稀缺的是 curation）；三大位移记死——prompt→context engineering+evals、堆框架→少抽象多控制（LangChain 1.0 瘦身 / 官方 SDK 五原语 / 向量库向 Postgres 合流）、单点→协议化编排（MCP 接工具 / A2A 接 agent / AG-UI 接界面）；RAG 没死，主流智能路由（长上下文贵约 1250x、慢 20–60s、有 Lost in Middle）；面试不站队、只给取舍维度 + 量化 + 兜底 + 迁移后端 sense。**\n\n---\n\n> **信源（已联网核实，2026-06）**\n> - swyx, *Scaling without Slop*, Latent.Space, 2026-01 — [latent.space/p/2026](https://www.latent.space/p/2026)\n> - a16z, *Big Ideas 2026 (Part 1 & 2)*（执行层 / 协作即护城河）— [a16z.news/p/big-ideas-2026-part-1](https://www.a16z.news/p/big-ideas-2026-part-1)\n> - Anthropic, *Effective Context Engineering for AI Agents*, 2025-09 — [anthropic.com/engineering/effective-context-engineering-for-ai-agents](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents)\n> - Karpathy 提出 context engineering 定义（2025-06-25）— [x.com/karpathy/status/1937902205765607626](https://x.com/karpathy/status/1937902205765607626)；Gartner *Context Engineering* — [gartner.com/en/articles/context-engineering](https://www.gartner.com/en/articles/context-engineering)\n> - LangChain & LangGraph 1.0 Milestones（create_agent → StateGraph 去抽象路径）— [langchain.com/blog/langchain-langgraph-1dot0](https://www.langchain.com/blog/langchain-langgraph-1dot0)\n> - OpenAI Agents SDK 文档（五原语）— [openai.github.io/openai-agents-python](https://openai.github.io/openai-agents-python/)\n> - Tiger Data, *Pgvector vs Pinecone*（50M 向量 99% recall：p95 低 28x、吞吐高 16x、成本低 75%）— [tigerdata.com/blog/pgvector-vs-pinecone](https://www.tigerdata.com/blog/pgvector-vs-pinecone)\n> - RAG vs Long-Context 成本/延迟综述（约 1250x / 30–60s / Lost in Middle / 规则路由约 90%）— [tianpan.co 2026 production decision framework](https://tianpan.co/blog/2026-04-09-long-context-vs-rag-production-decision-framework)；arXiv *Long Context vs. RAG: An Evaluation and Revisits* — [arxiv.org/abs/2501.01880](https://arxiv.org/pdf/2501.01880)\n> - 智能路由 *Route Before Retrieve* / SELF-ROUTE — [openreview.net/forum?id=N1E7rFZJGH](https://openreview.net/forum?id=N1E7rFZJGH)\n> - context 成本结构（input ≈ output 的 300–400x 量级）— [Gartner / 业界综述](https://www.gartner.com/en/articles/context-engineering)\n> - Instructor（月下载 300 万+）— [python.useinstructor.com](https://python.useinstructor.com/)\n> - uv 采用率（约 7500 万月下载，超 Poetry 约 6600 万）— [cuttlesoft.com Python Dependency Management 2026](https://cuttlesoft.com/blog/2026/01/27/python-dependency-management-in-2026/)\n> - Mastra 1.0（周下载 30 万+ / 1300 万美元种子轮）/ Vercel AI SDK — [generative.inc Mastra Guide 2026](https://www.generative.inc/mastra-ai-the-complete-guide-to-the-typescript-agent-framework-2026)\n> - 协议栈 MCP（2025-12 归 AAIF、2026-02 月下载破 9700 万）/ A2A（2026-04 v1.0.0）/ AG-UI — [turion.ai AI Agent Protocol Stack 2026](https://turion.ai/blog/ai-agent-protocol-stack-2026/)；[dev.to MCP vs A2A 2026](https://dev.to/pockit_tools/mcp-vs-a2a-the-complete-guide-to-ai-agent-protocols-in-2026-30li)\n", "/07-Context-Engineering上下文工程/README.md": "# Context Engineering 上下文工程\n\n> **一句话定位**：Context Engineering 是 2026 年 AI 应用 / Agent 工程的**头号新学科**，也是国内面试的**蓝海考点**——大多数候选人还停留在\"写 Prompt\"，而真正的差异化在于**为整个上下文窗口做信息架构**。能把这一章答透，你和普通转岗者之间立刻拉开一个身位。\n\n---\n\n## 一、为什么这是 2026 的头号新学科 + 面试蓝海\n\n2025 年 6 月，Shopify CEO **Tobi Lütke** 一条推文带火了 \"context engineering\" 这个词；一周后 **Andrej Karpathy** 公开 +1，整个行业的话语权从 \"prompt engineering\" 平移到 \"context engineering\"。到 2026 年，它已经从一句口号长成一门**有定义、有方法论、有论文、有生产经验**的工程学科。\n\n为什么对你这个 **2 年 Java 后端 + 1 年 AI、转大厂 Agent 工程师**的候选人是蓝海：\n\n- **模型同质化**：大家都能调 GPT / Claude / 国产大模型，模型本身不再是壁垒，**怎么喂上下文**才是工程能力的分水岭。\n- **面试官缺料**：很多面试官自己也是 2025 年才补的课，问到这里能\"接得住趋势、引得出原文\"的候选人极少。\n- **天然嫁接后端**：上下文工程的内核——**缓存命中、有限资源调度、状态隔离、外部存储**——全是后端工程师的母语。你有先天优势。\n\n记住 Phil Schmid 的判词，这是本章的总纲：\n\n> **\"Most agent failures are not model failures anymore — they are context failures.\"**\n> （如今 Agent 的失败，绝大多数不是模型不行，而是上下文没喂对。）\n\n---\n\n## 二、知识地图\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef l2 fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef l3 fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    CE[\"Context Engineering 上下文工程\"]:::root\n\n    CE --> DEF[\"定义与起源\"]:::l2\n    CE --> WHY[\"为什么重要\"]:::l2\n    CE --> FRAME[\"方法论框架\"]:::l2\n    CE --> PROD[\"生产经验\"]:::l2\n    CE --> FAIL[\"失败模式\"]:::l2\n\n    DEF --> D1[\"Lütke: 提供让任务可解的全部上下文\"]:::l3\n    DEF --> D2[\"Karpathy: context=RAM, LLM=CPU, CE=OS\"]:::l3\n    DEF --> D3[\"vs Prompt Engineering\"]:::l3\n\n    WHY --> W1[\"Lost in the Middle U形退化\"]:::l3\n    WHY --> W2[\"Context Rot 远早于溢出就退化\"]:::l3\n    WHY --> W3[\"n² 注意力预算 / 上下文是稀缺资源\"]:::l3\n\n    FRAME --> F1[\"LangChain 四象限: Write/Select/Compress/Isolate\"]:::l3\n    FRAME --> F2[\"Anthropic 三件套: Compaction/Note-taking/Sub-agent\"]:::l3\n    FRAME --> F3[\"Just-in-Time 只存路径运行时加载\"]:::l3\n    FRAME --> F4[\"单 vs 多 agent 之争: Cognition 反 / Anthropic +90.2%\"]:::l3\n    FRAME --> F5[\"2025 系统综述: 1300+ 论文, 已成学科\"]:::l3\n\n    PROD --> P1[\"Manus: KV-Cache 命中率第一指标\"]:::l3\n    PROD --> P2[\"Mask-not-Remove / 文件系统当外部记忆\"]:::l3\n    PROD --> P3[\"ACE 自更新 playbook\"]:::l3\n\n    FAIL --> X1[\"Poisoning / Distraction\"]:::l3\n    FAIL --> X2[\"Confusion / Clash\"]:::l3\n    FAIL --> X3[\"工具治理: 多工具反而掉精度\"]:::l3\n\n    BRIDGE[\"后端母语: 缓存/资源调度/状态隔离/外部存储\"]:::note\n    CE -.-> BRIDGE\n```\n\n---\n\n## 三、核心原理\n\n### 3.1 定义：三位关键人物的\"标准三段论\"\n\n面试时按这个顺序引用，既显得读过原文，又层层递进。\n\n**① Tobi Lütke（命名者，2025-06-19）** —— 给出\"艺术性\"定义：\n\n> \"the **art of providing all the context** for the task to be plausibly solvable by the LLM.\"\n> （提供让任务对 LLM 看起来**可解**的全部上下文的艺术。）\n\n关键词是 **plausibly solvable**：你的职责不是\"祈祷模型聪明\"，而是把信息备齐到\"任务在 LLM 眼里看起来是可解的\"。\n\n**② Andrej Karpathy（背书者，2025-06-25）** —— 给出\"系统类比\"：\n\n> context engineering 是 \"the delicate **art and science** of filling the context window with just the right information for the next step.\"\n\n他随后把 LLM 类比成一台新型操作系统：\n\n![上下文窗口=LLM的内存，CE=内存管理OS](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/07-1-window-is-ram.png ':class=xh-illust')\n\n| 操作系统 | LLM 世界 |\n|---------|---------|\n| **CPU** | LLM 本身 |\n| **RAM（工作内存，容量有限）** | **Context Window 上下文窗口** |\n| **ROM（烧死的固件）** | 模型权重（训练时固化） |\n| **磁盘（海量、被动、需显式 load）** | 向量库 / 历史对话 / 外部文档 |\n| **OS（决定什么进 RAM）** | **Context Engineering** |\n\n这个类比是面试金句：**\"上下文窗口就是 LLM 的 RAM，而上下文工程就是替它做内存管理的操作系统。\"** 你做 Java 写过 JVM 堆管理、写过缓存淘汰——这就是同一种工程直觉。\n\n**③ Phil Schmid（落地者，2025-06-30）** —— 给出\"工程定义\"：\n\n> \"Context Engineering is the discipline of designing and building **dynamic systems** that provide the **right information and tools, in the right format, at the right time**.\"\n> （设计并构建**动态系统**，在**正确的时间**、以**正确的格式**，提供**正确的信息和工具**。）\n\n三个 \"right\"（信息 / 格式 / 时机）+ 一个 **dynamic**（动态装配，不是静态模板）是这条定义的灵魂。\n\n### 3.2 与 Prompt Engineering 的区别（必考对比题）\n\n| 维度 | Prompt Engineering | Context Engineering |\n|------|--------------------|--------------------|\n| **对象** | 一次性的文本指令 | **整个上下文窗口的信息架构** |\n| **形态** | 静态模板、措辞技巧 | **运行时即时装配（dynamic assembly）** |\n| **范围** | 单点提示 | **编排循环**（system prompt + memory + RAG + tools + 输出结构 + 历史） |\n| **失败归因** | 提示词写得不好 | **信息没到位 / 格式错 / 时机错 / 上下文被污染** |\n| **类比** | 写好一句话 | **管理一台机器的内存与 IO** |\n\n一句话收口：**\"Prompt Engineering 是 Context Engineering 的一个子集——前者管那一段文字怎么写，后者管整个窗口里放什么、何时放、放成什么格式。\"**\n\n### 3.3 为什么重要：上下文是\"有限且会腐烂\"的稀缺资源\n\n![Lost in the Middle：中间最容易漏](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/07-2-lost-in-middle.png ':class=xh-illust')\n\n不是\"窗口越大越好\"。四个机制解释了为什么**塞得越满反而越差**：\n\n**① Lost in the Middle（Liu et al., 2023, TACL）** —— **U 形退化**。\n在多文档 QA 中，把答案文档放在开头或结尾，模型能找到；**放在中间，准确率掉 20~30 个点**。后续工作在 Claude / Gemini / Llama 上复现：窗口变大，U 形依旧存在。\n\n下面这个动画把\"关键信息（needle）沿上下文从开头滑到结尾、召回率随之画出 U 形\"演一遍——这也是面试白板上解释 Lost in the Middle 最快的画法：\n\n<div class=\"anim\" data-anim=\"lost-in-middle\"><\/div>\n\n**② Context Rot（Chroma Research, 2025）** —— **远早于溢出就退化**。\nChroma 测了 18 个前沿模型（含 GPT-4.1 / Claude 4 / Gemini 2.5 / Qwen3），结论惊人：**每一个模型都随输入变长而变差**。注意区分：\n\n> Context Rot ≠ Context Overflow。溢出是超过最大 token 上限；**腐烂发生在远没到上限之前**——一个 200K 窗口的模型，可能在 50K 就开始明显退化。\n\nChroma 这份报告里有几个**反直觉**结论特别适合在面试甩出来，立刻显出你\"真读过原文\"：\n\n- **打乱顺序的 haystack 反而更准**——直觉上逻辑连贯的长文档应该更好读，实测却是 18 个模型**全部**在\"被打乱、丧失逻辑结构\"的语料上表现更好。结构化连贯文本反而以某种尚未被理解的方式干扰了注意力。寓意：**别把一大坨连贯长文一股脑塞进去**。\n- **needle–question 语义相似度越低，掉得越快**——当问题和答案没有精确字面匹配（真实业务里几乎总是如此）时，输入越长退化越剧烈。寓意：检索召回的\"相关性\"质量，直接决定长上下文能撑多远——这也是\"长上下文 vs RAG\"之争的关键：与其把全量文档硬塞进窗口赌它不腐烂，不如靠高质量检索只把最相关的片段选进来（见 [03-RAG全链路](03-RAG全链路/)，正对应四象限里的 **Select**）。\n- **干扰项（distractor）影响不均**——同样是噪声，有的模型扛得住、有的崩。其中 **Claude 系倾向\"不确定就弃权（abstain）\"，GPT 系更容易\"自信地答错\"**。寓意：换模型时要重测幻觉行为，别套用别家结论。\n- **连\"复述重复词\"这种 trivial 任务都会随长度退化**——出现位置错乱、词数对不上。说明长上下文的脆弱性是**底层通病**，不是难任务才有。\n\n**③ n² 注意力预算** —— Transformer 自注意力是 **O(n²)** 复杂度，每多一个 token，注意力要在更多对 token 间分配，**信号被稀释、预算被摊薄**。\n\n**④ 上下文是稀缺珍贵资源** —— 综合上述：上下文窗口不是免费的垃圾桶，**每一个 token 都在和任务争夺注意力**。这把上下文工程从\"能塞就塞\"逼成\"**精打细算的资源调度**\"——这正是你后端做缓存、做连接池的同款思维。\n\n### 3.4 LangChain 四象限：Write / Select / Compress / Isolate\n\n这是目前最被广泛引用的**操作框架**，务必背熟四个动词 + 各自手段。\n\n下面这个动画把\"窗口=有限 RAM、塞满会腐烂、用四象限收回高信号区\"一口气演完——面试白板上你也可以照这个顺序画：\n\n<div class=\"anim\" data-anim=\"context-budget\"><\/div>\n\n```mermaid\ngraph LR\n    classDef w fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef s fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef c fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef i fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n\n    LLM{{\"Context Window 有限\"}}\n\n    W[\"Write 写出去<br/>scratchpad / memory\"]:::w --> LLM\n    S[\"Select 选进来<br/>语义检索 + 工具选择\"]:::s --> LLM\n    C[\"Compress 压缩<br/>总结 + 剪枝\"]:::c --> LLM\n    I[\"Isolate 隔离<br/>多 agent / 沙箱 / state schema\"]:::i --> LLM\n```\n\n| 象限 | 含义 | 典型手段 |\n|------|------|---------|\n| **Write** | 把信息存到窗口**外面** | scratchpad（任务内临时草稿）、长期 memory |\n| **Select** | 把最相关的信息**拉进**窗口 | 语义检索（RAG）、工具按需选择、few-shot 挑选 |\n| **Compress** | 只保留**完成任务必需**的 token | 总结（summarization）、剪枝（pruning）。**Claude Code 在上下文接近窗口上限时触发 auto-compact**（社区常引\"约 95%\"，官方表述为\"接近可配置阈值\"） |\n| **Isolate** | 把上下文**拆开** | 多 agent 分工、沙箱执行（如 LangGraph 的 PyodideSandboxTool）、用 state schema 把数据隔离在 LLM 视野之外 |\n\n### 3.5 Anthropic 三件套（官方工程博客，2026 高频引用）\n\n来自 Anthropic《Effective context engineering for AI agents》，是最\"权威可引\"的一组实践：\n\n**① Compaction（压实）**\n对话逼近窗口上限时，**总结现有内容 → 用摘要重启一个新窗口**。Claude Code 的实现会**保留架构决策、未解决的 bug、实现细节，丢弃冗余的工具输出**，并带上\"**最近访问的 5 个文件**\"继续。\n\n**② Structured Note-taking（结构化笔记）**\nAgent 在窗口外维护持久笔记——Claude Code 维护 to-do 列表，自定义 Agent 维护 **`NOTES.md`**。经典案例：让 Claude 玩宝可梦，它能在笔记里维护\"过去 1,234 步我一直在 Route 1 练级\"这种**跨数千步的精确记账**。\n\n**③ Sub-agent 干净窗口隔离**\n主 agent 派子 agent 去深挖，**子 agent 可能烧掉几万 token 探索，但只回传一份蒸馏后的摘要（通常 1,000~2,000 token）**。主 agent 的窗口因此保持干净，专注于综合与决策。\n\n**④ Just-in-Time Retrieval（即时检索）**\n不预加载全量数据，而是**只存轻量标识符（文件路径、查询、URL）**，运行时用工具**按需把数据 load 进窗口**。这正对应 Karpathy 的\"磁盘 → RAM 显式 load\"。\n\n> 记忆锚点：**压实（省空间）+ 笔记（存窗外）+ 子 agent（隔窗口）+ 即时检索（用时再取）**。\n\n> 延伸：这套\"记忆 + 子 agent\"机制怎么落到 Agent 的工具调用循环里，见 [04-Agent与工具调用](04-Agent与工具调用/)——上下文工程是 Agent 这个执行体的\"内存管理层\"。\n\n### 3.6 2025 大辩论：单 agent vs 多 agent —— Isolate 到底该不该用？\n\n这是 2025 年最值得在面试里\"接住趋势\"的一场行业争论，本质就是 **Isolate 象限的边界之争**。答出来直接显出你在追前沿、有自己的判断，而不是背框架。\n\n**Cognition（Devin 团队）—《Don't Build Multi-Agents》（2025-06）** —— 旗帜鲜明反多 agent：\n\n> 多 agent 并行最大的坑是**上下文无法在 agent 之间充分共享**，子 agent 各自基于\"冲突的假设 / 不完整的信息\"行动，决策被打散，系统极其脆弱。失败几乎总能归因到\"**系统里缺了某段上下文**\"。\n\n他们的主张：**单线程（single-threaded）agent + 一个独立的压缩 LLM 专门做上下文管理**，比花哨的多 agent 编排更容易做到生产级可靠。两条工程原则值得背：① **共享完整上下文**（每个动作都基于全量轨迹，别只喂片段）；② **动作隐含决策，冲突的决策带来糟糕结果**（并行 agent 各做各的决策必然打架）。\n\n**Anthropic —《How we built our multi-agent research system》（2025-06）** —— 用数据回击：\n\norchestrator-worker 架构（Opus 4 当 lead、Sonnet 4 当 subagent 并行探索）在内部 research 评测上**比单 agent 基线高出 90.2%**。关键数据：\n\n- **token 用量单独就能解释 80% 的性能方差**——能力很大程度来自\"花得起更多 token 去并行探索\"；\n- 代价是约 **15× 于普通对话的 token 开销**；\n- 多 agent 之所以成立，正是因为**每个 subagent 有自己独立的窗口**，总 token 上去了，但**单个窗口不会被撑大**——这恰恰是 Isolate 象限的精髓。\n\n**怎么收口（这是加分句）**：两家其实**不矛盾，是边界问题**。\n\n| 适合多 agent（Isolate 收益大） | 适合单 agent（共享上下文优先） |\n|------|------|\n| **breadth-first**：答案要并行探索很多条独立路径，总信息量超过单窗口 | agent 间**强依赖、需共享同一份上下文**、决策环环相扣 |\n| 子任务之间**弱耦合**、可独立产出再汇总 | 例如**写代码**：每一步都依赖前文，拆开就互相打架 |\n| 例如**深度调研**：多源检索各跑各的，最后蒸馏汇总 | Cognition 主战场（编码 agent）正属此类 |\n\n> 面试金句：**\"多 agent 不是越多越好，它是 Isolate 象限的一个工具——breadth-first、子任务弱耦合时用它换干净窗口；强依赖、需共享上下文时（比如写代码）老老实实单 agent + 压缩。Anthropic 和 Cognition 看似打架，其实在说不同任务形态。\"**\n\n### 3.7 这门学科\"有论文了\"：2025 系统综述\n\n如果面试官追问\"这是不是营销概念\"，甩一篇正经综述立刻定调：\n\n**《A Survey of Context Engineering for Large Language Models》（arXiv:2507.13334，2025-07，中科院 / 北大 / 清华等）**——系统梳理 **1300+ 篇论文**，把 Context Engineering 拆成两层：\n\n- **基础组件**：Context Retrieval & Generation（检索与生成）、Context Processing（处理）、Context Management（管理）；\n- **系统实现**：RAG、Memory Systems（记忆系统）、Tool-Integrated Reasoning（工具推理）、Multi-Agent Systems（多 agent）。\n\n它点出一个**关键研究缺口**值得记：当前模型在**理解**复杂长上下文上已相当强，但在**生成**同等复杂的长篇输出上仍明显吃力——\"读得懂\"远胜于\"写得出\"。这条既显前沿，又能引出\"为什么长任务要靠外部记忆 + 压实，而不是指望模型一口气写完\"。\n\n---\n\n## 四、Python 工程实现\n\n下面三段是面试可现场口述、也可写进项目的最小骨架。**单一职责**：上下文装配（assemble）、外部记忆（store）、子 agent 隔离（isolate）各一层，互不耦合。\n\n### 4.1 Compress：上下文压缩（Compaction）\n\n```python\nfrom dataclasses import dataclass, field\n\n@dataclass\nclass Message:\n    role: str\n    content: str\n    token_count: int\n\n\nclass ContextCompactor:\n    \"\"\"当上下文逼近阈值时压实：总结旧消息，保留关键结构。\n\n    对齐 Anthropic Compaction：保留架构决策 / 未解 bug / 实现细节，\n    丢弃冗余的 tool 输出，并保留最近访问的文件。\n    \"\"\"\n\n    def __init__(self, window_limit: int, trigger_ratio: float = 0.95) -> None:\n        self._window_limit = window_limit\n        self._trigger_at = int(window_limit * trigger_ratio)  # ~95% 触发\n\n    def used_tokens(self, messages: list[Message]) -> int:\n        return sum(m.token_count for m in messages)\n\n    def should_compact(self, messages: list[Message]) -> bool:\n        return self.used_tokens(messages) >= self._trigger_at\n\n    def compact(\n        self,\n        messages: list[Message],\n        summarize: \"Summarizer\",\n        keep_recent: int = 5,\n    ) -> list[Message]:\n        \"\"\"把旧消息压成一条摘要，拼上最近 keep_recent 条原文。\"\"\"\n        if not self.should_compact(messages):\n            return messages\n\n        head, tail = messages[:-keep_recent], messages[-keep_recent:]\n        summary = summarize.run(head)  # 只总结旧的部分\n        digest = Message(role=\"system\", content=summary, token_count=summarize.estimate(summary))\n        return [digest, *tail]\n```\n\n### 4.2 Write：文件系统当无限外部记忆（NOTES.md + Just-in-Time）\n\n```python\nfrom pathlib import Path\n\n\nclass FileMemory:\n    \"\"\"把文件系统当作 unlimited / persistent 的外部记忆。\n\n    遵循 Just-in-Time：上下文里只放路径（轻量标识符），\n    需要时再用 load() 把内容拉进窗口。\n    \"\"\"\n\n    def __init__(self, root: Path) -> None:\n        self._root = root\n        self._root.mkdir(parents=True, exist_ok=True)\n\n    def write_note(self, name: str, content: str) -> str:\n        \"\"\"写出窗口外，返回路径标识符（而非内容）供上下文引用。\"\"\"\n        path = self._root / name\n        path.write_text(content, encoding=\"utf-8\")\n        return str(path)  # 上下文里只留这串路径\n\n    def load(self, path: str) -> str:\n        \"\"\"运行时按需把外部记忆 load 进窗口。\"\"\"\n        return Path(path).read_text(encoding=\"utf-8\")\n\n    def append_todo(self, item: str, todo_file: str = \"todo.md\") -> None:\n        \"\"\"Manus 式 recitation：反复复述 todo，把全局计划推回近端注意力。\"\"\"\n        path = self._root / todo_file\n        with path.open(\"a\", encoding=\"utf-8\") as f:\n            f.write(f\"- [ ] {item}\\n\")\n```\n\n### 4.3 Isolate：sub-agent 干净窗口隔离\n\n```python\nfrom typing import Protocol\n\n\nclass Agent(Protocol):\n    def run(self, task: str) -> str: ...\n\n\nclass SubAgentRunner:\n    \"\"\"子 agent 在独立窗口里探索，只回传 1000~2000 token 的蒸馏摘要。\n\n    主 agent 因此不被子任务的几万 token 中间过程污染。\n    \"\"\"\n\n    def __init__(self, summary_token_budget: int = 2000) -> None:\n        self._budget = summary_token_budget\n\n    def delegate(self, sub_agent: Agent, task: str, distill: \"Summarizer\") -> str:\n        raw = sub_agent.run(task)            # 子 agent 在自己的干净窗口里可烧几万 token\n        return distill.to_budget(raw, self._budget)  # 只把蒸馏摘要回传给主 agent\n```\n\n> 工程要点（呼应后端母语）：\n> - **`should_compact` 用阈值触发**，等同于缓存的水位线（high-watermark）淘汰；\n> - **`load()` 用时再取**，等同于懒加载 + 连接池按需取连接；\n> - **`SubAgentRunner` 的 budget**，等同于给下游服务设的响应体大小上限，防止\"中间过程\"打爆主链路。\n\n---\n\n## 五、面试官连环追问链\n\n> **面试官**：什么是 Context Engineering？和 Prompt Engineering 有啥区别？\n>\n> **你**：Prompt Engineering 管那一段指令怎么写；Context Engineering 管整个上下文窗口的信息架构——在正确时间、以正确格式、提供正确的信息和工具，而且是**运行时动态装配**而非静态模板。Karpathy 有个精确类比：上下文窗口是 LLM 的 RAM，Context Engineering 就是替它做内存管理的 OS。\n\n> **面试官**：窗口越来越大了，那是不是把资料全塞进去就行？\n>\n> **你**：恰恰相反。两个实证：Liu 2023 的 Lost in the Middle，答案放中间准确率掉 20~30 点，呈 U 形；Chroma 2025 的 Context Rot，18 个前沿模型**全部**随输入变长而变差，而且**远在窗口溢出之前**就退化。再加 Transformer 注意力是 n²，token 越多信号越稀。所以上下文是**有限且会腐烂的稀缺资源**，要调度不要堆砌。\n\n> **面试官**：那你具体怎么调度？给我一套方法论。\n>\n> **你**：用 LangChain 的四象限——**Write**（写到窗口外，scratchpad / memory）、**Select**（语义检索 + 工具按需选）、**Compress**（总结 + 剪枝，Claude Code 接近上限触发 auto-compact）、**Isolate**（多 agent / 沙箱 / state schema 隔离）。落到 Anthropic 的官方三件套就是：Compaction、结构化 NOTES.md 笔记、子 agent 干净窗口（只回传 1000~2000 token 摘要）、外加 Just-in-Time 只存路径运行时加载。\n\n> **面试官**：生产环境里，决定 Agent 成本和性能的最关键单一指标是什么？\n>\n> **你**：Manus 的经验是 **KV-Cache 命中率**。以 Claude Sonnet 为例，**缓存输入 0.30 USD/MTok，未缓存 3 USD/MTok，差 10 倍**。所以要保持 prompt 前缀稳定、上下文 append-only、序列化确定性。最反直觉的一条：要禁用某个工具时**别删工具定义**（删了破坏 cache、还让模型困惑），而是用 **logit masking 屏蔽**——Mask 而非 Remove。\n\n> **面试官**：Agent 跑着跑着就废了，你怎么定位？\n>\n> **你**：套 Drew Breunig 的四类失败——**Poisoning**（幻觉进了上下文被反复引用）、**Distraction**（上下文太长，模型过度关注历史、忽视训练所学，通常超 10 万 token 后倾向重复历史动作）、**Confusion**（无关内容/多余工具让模型硬要去用，反而拉低质量）、**Clash**（上下文内信息互相冲突）。还有个量化锚：multi-turn 对话里早期一旦走错路，平均掉 **39%**（Laban et al. 2025，\"LLMs Get Lost in Multi-Turn Conversation\"）。至于\"上下文质量到底好不好、改了之后有没有提升\"，靠的是把这四类失败做成 eval 断言、用 trace + error analysis 量化——具体方法见 [08-Evals与LLMOps](08-Evals与LLMOps/)。\n\n> **面试官**：工具是不是接得越多 Agent 越强？\n>\n> **你**：不是，工具多了会触发 Confusion。每次请求所有工具定义都要注进窗口——比如 90 个工具、每个约 200 token，光工具开销就上万 token，还没读到用户那句话。经验阈值：**超过约 10 个工具精度开始掉，OpenAI 建议控制在 20 个以内**。治理手段：按 workflow 动态挂载、合并重叠工具、用 logit masking 屏蔽而非删除。\n\n---\n\n## 六、高频真题 + 参考答案\n\n**Q1：用一句话给非技术同事解释 Context Engineering。**\nA：模型本身像 CPU，上下文窗口像它的内存（RAM）；Context Engineering 就是替它做\"内存管理\"——决定**此刻往有限的内存里放什么、何时放、放成什么格式**，好让任务在模型眼里看起来是可解的。\n\n**Q2：为什么\"上下文越长效果越好\"是错的？举两个实证。**\nA：(1) **Lost in the Middle**：答案在中间时准确率掉 20~30 点，呈 U 形，且窗口越大依旧存在。(2) **Context Rot**：Chroma 测 18 个前沿模型，全部随输入变长而退化，且发生在远未溢出之前（200K 窗口可能 50K 就退化）。根因是注意力 n² 预算被稀释——上下文是稀缺资源。\n\n**Q3：LangChain 四象限分别是什么，各举一手段。**\nA：**Write**（scratchpad / memory，写到窗外）、**Select**（语义检索 + 工具选择，拉进窗内）、**Compress**（总结 + 剪枝，如 auto-compact）、**Isolate**（多 agent / 沙箱 / state schema，拆开隔离）。\n\n**Q4：Anthropic 的子 agent 隔离为什么省上下文？**\nA：子 agent 在自己**干净的窗口**里探索，可烧掉几万 token，但**只回传 1,000~2,000 token 的蒸馏摘要**给主 agent。主 agent 的窗口因此不被子任务的中间过程污染，专注综合与决策——本质是\"用窗口换窗口\"，把噪声挡在子进程里。\n\n**Q5：Manus 说 KV-Cache 命中率是第一指标，为什么？怎么保命中率？**\nA：缓存 vs 未缓存有 **10 倍**成本差（Claude Sonnet：0.30 vs 3 USD/MTok），且命中缓存还显著降延迟。保命中三招：**prompt 前缀稳定、上下文 append-only、序列化确定性**；禁用工具时用 **logit masking 屏蔽**而非删定义（删了会让前缀变化、击穿 cache）。\n\n**Q6：什么是 Context Poisoning，怎么防？**\nA：幻觉或错误一旦写进上下文，会被后续步骤**反复引用、自我强化**。防法：对写入 memory 的内容做校验/置信度门槛；保留可回滚的结构化笔记；必要时压实（compaction）时主动剔除已知错误；以及 Manus 经验——**故意保留\"错误轨迹\"**让模型看到失败、避免重犯（这是反 Poisoning 的另一面：错误本身有信息价值，关键是别把\"幻觉\"当\"事实\"反复引用）。\n\n**Q7：单 agent 还是多 agent？Cognition 说别建多 agent，Anthropic 又在用，怎么看？**\nA：这是 **Isolate 象限的边界之争**，两家不矛盾、是任务形态不同。Cognition《Don't Build Multi-Agents》的核心顾虑是**上下文无法在 agent 间充分共享**，子 agent 基于冲突假设行动 → 决策打散 → 系统脆弱，主张**单线程 + 独立压缩 LLM**。Anthropic 的 multi-agent research 系统则比单 agent 基线高 **90.2%**，因为每个 subagent 有**独立窗口**、可并行烧 token（token 用量解释 80% 性能方差，代价约 15× token）。**收口**：breadth-first、子任务弱耦合（深度调研）用多 agent 换干净窗口；强依赖、需共享上下文（写代码）老实单 agent。多 agent 是工具不是银弹。\n\n**Q8：什么是 ACE？它解决了什么压缩的副作用？**\nA：**ACE（Agentic Context Engineering，Stanford / SambaNova / UC Berkeley，2025，arXiv:2510.04618）** 把上下文当成不断进化的 **playbook**，由 Generator / Reflector / Curator 三角色以**增量 delta** 的方式累积策略。它专门解决两个老问题：**brevity bias**（为了简洁把领域细节删没了）和 **context collapse**（反复重写把信息越改越烂）。效果：agent 任务 +10.6%、金融 +8.6%，还降了适配延迟和 rollout 成本。\n\n---\n\n## 七、项目话术钩子（嫁接你的 Agent 项目）\n\n把你做过的 Agent 项目，用上下文工程的语言**重新叙事**，每条都是\"问题 → 上下文工程手段 → 量化收益\"的结构：\n\n- **\"我把工具从 N 个收敛到 10 个以内\"**：\n  > \"上线初期我们给 Agent 挂了几十个工具，发现选错工具、瞎调用的比例很高——典型的 Context Confusion。我按 workflow 把工具分组动态挂载，常驻工具压到 10 个以内，工具选择准确率明显回升，单次请求还省下上万 token 的工具定义开销。\"\n\n- **\"我用文件系统 + NOTES.md 做外部记忆\"**：\n  > \"长任务跑到中段就开始丢早期结论。我引入 Just-in-Time：上下文里只存文件路径，运行时按需 load；关键决策写进 NOTES.md 作为外部记忆。这样既绕开 Lost in the Middle，又把窗口占用打下来。\"\n\n- **\"我做了子 agent 隔离 + 摘要回传\"**：\n  > \"检索类子任务会产生海量中间结果，污染主链路。我让子 agent 在独立窗口里跑，只回传 1~2k token 的蒸馏摘要给主 agent——主 agent 的上下文干净了，端到端稳定性和成本都改善。\"\n\n- **\"我盯 KV-Cache 命中率当核心指标\"**：\n  > \"我把 KV-Cache 命中率作为成本看板的头号指标，保持 system prompt 前缀稳定、上下文 append-only；要临时禁用工具时用 logit masking 而不是改工具定义，避免击穿缓存。缓存命中和未命中差 10 倍成本，这一项优化收益最直接。\"\n\n> 话术原则：**别说\"我写了很好的 prompt\"，要说\"我为这个 Agent 设计了上下文的写出/选入/压缩/隔离策略，并用 X 指标量化了收益\"**——这就是从 Prompt Engineer 到 Context Engineer 的话语权升级。\n\n---\n\n## 八、常见失分点\n\n- ❌ **把 Context Engineering 等同于\"写更长更细的 Prompt\"** —— 这是最致命的误解，直接暴露没读过原文。要强调**动态装配 + 整窗口信息架构**。\n- ❌ **认为\"窗口大了就没问题\"** —— 不知道 Lost in the Middle / Context Rot，会被一句\"那 1M 窗口是不是随便塞\"问穿。\n- ❌ **只会背四象限名词，举不出手段** —— 必须能对 Write/Select/Compress/Isolate 各甩一个具体技术（memory / RAG / auto-compact / sub-agent）。\n- ❌ **谈成本只会说\"用小模型\"** —— 不知道 KV-Cache 命中率、不知道缓存 10x 差价、不知道 Mask-not-Remove，生产经验分会很低。\n- ❌ **失败模式说不清** —— Poisoning / Distraction / Confusion / Clash 四个词张冠李戴，或答不出\"工具多反而掉精度\"。\n- ❌ **不知道单/多 agent 之争** —— 被问\"多 agent 是不是更强 / Cognition 为什么说别建\"时只会二选一站队，答不出\"这是 Isolate 的边界问题：breadth-first 弱耦合用多 agent、强依赖共享上下文用单 agent\"。\n- ❌ **引用含糊** —— \"好像有篇论文说……\"。要能点名 Lütke / Karpathy / Schmid / Liu 2023 / Chroma / Manus / Anthropic / ACE / Cognition，并带上一两个数字（20~30 点、39%、10x、1~2k token、90.2%、15×、1300+ 篇）。\n- ❌ **不结合自己项目** —— 通篇背书没有\"我当时怎么做的\"，拿不到工程落地分。\n\n---\n\n## 九、一句话速记\n\n> **上下文窗口是 LLM 的 RAM，Context Engineering 就是它的 OS**：用 **Write / Select / Compress / Isolate** 四象限调度这块稀缺且会腐烂的内存——**写出去、选进来、压一压、隔一隔**；生产上盯死 **KV-Cache 命中率**，记住\"**Agent 的失败大多是 context 失败，不是 model 失败**\"。\n\n---\n\n### 参考来源\n\n- Tobi Lütke 原推（2025-06-19）：<https://x.com/tobi/status/1935533422589399127>\n- Andrej Karpathy 原推（2025-06-25）：<https://x.com/karpathy/status/1937902205765607626>\n- Phil Schmid《The New Skill in AI is Not Prompting, It's Context Engineering》：<https://www.philschmid.de/context-engineering>\n- LangChain《Context Engineering for Agents》（Write/Select/Compress/Isolate）：<https://blog.langchain.com/context-engineering-for-agents/>\n- Anthropic《Effective context engineering for AI agents》（Compaction / Note-taking / Sub-agent / Just-in-Time）：<https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents>\n- Manus《Context Engineering for AI Agents: Lessons from Building Manus》（KV-Cache / Mask-not-Remove / 文件系统记忆 / todo.md recitation / 保留错误）：<https://manus.im/blog/Context-Engineering-for-AI-Agents-Lessons-from-Building-Manus>\n- Drew Breunig《How Long Contexts Fail》（Poisoning / Distraction / Confusion / Clash）：<https://www.dbreunig.com/2025/06/22/how-contexts-fail-and-how-to-fix-them.html>\n- Liu et al.《Lost in the Middle》（TACL 2023, U 形退化）：<https://arxiv.org/abs/2307.03172>\n- Chroma Research《Context Rot》（18 模型随输入变长退化）：<https://research.trychroma.com/context-rot>\n- Laban et al.《LLMs Get Lost in Multi-Turn Conversation》（平均掉 39%）：<https://arxiv.org/abs/2505.06120>\n- Stanford et al.《Agentic Context Engineering (ACE)》（自更新 playbook）：<https://arxiv.org/abs/2510.04618>\n- Cognition《Don't Build Multi-Agents》（单线程 + 独立压缩 LLM，反多 agent）：<https://cognition.ai/blog/dont-build-multi-agents>\n- Anthropic《How we built our multi-agent research system》（+90.2%、token 解释 80% 方差、约 15× token）：<https://www.anthropic.com/engineering/built-multi-agent-research-system>\n- Mei, Yao et al.《A Survey of Context Engineering for Large Language Models》（arXiv:2507.13334，1300+ 篇综述）：<https://arxiv.org/abs/2507.13334>\n", "/03-RAG全链路/README.md": "# RAG 全链路（通关层 · 重点）\n\n## ① 本章在面试里的位置\n\nRAG 是 AI 应用 / Agent 工程师面试的**绝对主战场**。几乎没有一家大厂的 AI 应用岗会跳过 RAG——它是「把 LLM 接到企业私有数据」最落地、最高频的工程问题，链路长、可优化点密集、每一环都能往深里挖。\n\n对你这条转岗路径，RAG 是「**通关层的命脉，但绝不能当成卖点的天花板**」：\n\n- **通关层视角**：你做过 RAG 知识库问答，这是你的主场。面试官会用 RAG 当抓手，连环深挖到分块策略、HNSW 参数、RRF 数学、Cross-Encoder 原理——**任何一环答得浅，都会被判定为\"只会调 LangChain 的 API 缝合工\"**。这一章的目标是让你被深挖到数学 / 源码层也不崩。\n- **拉档层视角**：裸 RAG（Load → Split → Embed → 顶层 retrieve → stuff prompt）现在是地板线，人人都会。真正拉开差距的是：**你能不能把每个优化点的量化收益说清楚**（rerank 让 top-5 命中率从 71% 提到 89%）、**能不能讲清反直觉的工程权衡**（强 embedding 上加 BM25 反而掉点）、**能不能把你 Java 后端的可靠性 / 可观测 / 成本治理直觉迁移过来**（向量库从 100 万到 1 亿怎么演进、检索延迟和召回率怎么 trade-off）。\n\n一句话：**RAG 八股答得准 = 上桌资格；RAG 优化的量化判断力 + 架构演进 sense = 你比前端 / 算法转来的人多出来的护城河。**\n\n---\n\n## ② 知识地图\n\n```mermaid\ngraph TB\n    classDef stage fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef opt fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef store fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef eval fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph Offline[\"离线索引链路\"]\n        Doc[(原始文档)]:::store\n        Parse{{文档解析}}:::stage\n        Chunk{{分块 Chunking}}:::stage\n        Embed{{向量化 Embedding}}:::stage\n        VDB[(向量库 + 索引)]:::store\n        Doc --> Parse --> Chunk --> Embed --> VDB\n    end\n\n    subgraph Online[\"在线检索生成链路\"]\n        Q([用户 Query]):::stage\n        Rewrite{{Query 改写}}:::opt\n        Retrieve{{混合检索}}:::stage\n        Rerank{{重排 Rerank}}:::opt\n        Gen{{LLM 生成}}:::stage\n        Ans([带引用的答案]):::stage\n        Q --> Rewrite ==> Retrieve ==> Rerank ==> Gen ==> Ans\n    end\n\n    VDB ==>|topK 召回| Retrieve\n    Rewrite -.->|HyDE/Multi-Query| Retrieve\n\n    subgraph Advanced[\"高级 RAG 范式\"]\n        Agentic[Agentic RAG / Search-R1]:::opt\n        Graph[GraphRAG / LazyGraphRAG]:::opt\n        Self[Self-RAG / CRAG / Adaptive]:::opt\n        Ctx[Contextual Retrieval]:::opt\n        Late[Late Chunking]:::opt\n        ColB[ColBERT / ColPali]:::opt\n    end\n\n    subgraph Quality[\"评估与治理\"]\n        Triad[RAG Triad / RAGAS]:::eval\n        Halluc[幻觉二分归因]:::eval\n        IR[Recall@K / NDCG]:::eval\n    end\n\n    Online -.-> Advanced\n    Online ==> Quality\n    Note[\"核心权衡: 召回率 ↔ 延迟 ↔ 成本 ↔ 精度\"]:::note\n    Quality -.-> Note\n```\n\n下面这条动画把在线链路压成一条主干，直观看一个 query 怎么穿过五站——重点体会 **粗召回多（topK）→ 精排少（topN）→ 才喂 LLM** 这个「漏斗」形状：\n\n<div class=\"anim\" data-anim=\"rag-pipeline\"><\/div>\n\n---\n\n## ③ 核心原理（必杀点：能推导、能手算）\n\n### 3.1 为什么不让 LLM 直接答，要套 RAG\n\n三个无法绕过的硬约束，必须张口就来：\n\n| 痛点 | 本质 | RAG 怎么解 |\n|------|------|-----------|\n| **知识截止（knowledge cutoff）** | 模型权重冻结在训练时刻，之后的事一无所知 | 检索把最新外部知识塞进 context |\n| **私有数据（private data）** | 企业内部文档从未进入预训练语料 | 检索企业知识库，权重不动 |\n| **幻觉（hallucination）** | LLM 本质是\"下一个 token 的概率最大化\"，不知道的也会流畅地编 | 给定权威 context，让模型\"抄\"而非\"编\"，并可溯源 |\n\n补一句拉档的判断：RAG **不是用来教模型新技能**（那是微调的事），而是**用来注入事实**。把\"会不会做\"和\"知不知道\"分清楚，是 RAG vs 微调选型的根基（见 §6 真题）。\n\n### 3.2 Embedding 与向量相似度（手算级）\n\n文本经 embedding 模型映射到 $d$ 维向量。检索的本质是在向量空间里找\"语义最近的邻居\"。最常用 **cosine similarity**：\n\n$$\n\\text{sim}(\\mathbf{q}, \\mathbf{d}) = \\cos\\theta = \\frac{\\mathbf{q} \\cdot \\mathbf{d}}{\\|\\mathbf{q}\\|\\,\\|\\mathbf{d}\\|} = \\frac{\\sum_{i=1}^{d} q_i d_i}{\\sqrt{\\sum q_i^2}\\,\\sqrt{\\sum d_i^2}}\n$$\n\n> **手算示例**：$\\mathbf{q}=[1,0,1]$，$\\mathbf{d}=[1,1,0]$。\n> 点积 $= 1\\cdot1 + 0\\cdot1 + 1\\cdot0 = 1$；$\\|\\mathbf{q}\\|=\\sqrt2$，$\\|\\mathbf{d}\\|=\\sqrt2$。\n> $\\cos\\theta = 1/(\\sqrt2\\cdot\\sqrt2) = 0.5$，对应夹角 $60°$。\n\n**关键洞察（被追问必杀）**：若所有向量都做了 L2 归一化（$\\|\\mathbf{v}\\|=1$），则\n$$\n\\|\\mathbf{q}-\\mathbf{d}\\|^2 = \\|\\mathbf{q}\\|^2 + \\|\\mathbf{d}\\|^2 - 2\\,\\mathbf{q}\\cdot\\mathbf{d} = 2 - 2\\cos\\theta\n$$\n即**归一化后，欧氏距离平方与 cosine 相似度严格单调等价**。所以很多向量库内部把 cosine 检索转成归一化 + 内积（IP）来算——这就是面试官问\"cosine 和 L2 在归一化后什么关系\"的标准答案。\n\n### 3.3 BM25（稀疏检索的灵魂公式）\n\n稠密检索靠语义，**稀疏检索 BM25 靠精确词项匹配**。给定 query $Q=\\{q_1,...,q_n\\}$ 和文档 $D$：\n\n$$\n\\text{BM25}(Q,D) = \\sum_{i=1}^{n} \\text{IDF}(q_i) \\cdot \\frac{f(q_i,D)\\,(k_1+1)}{f(q_i,D) + k_1\\left(1 - b + b\\,\\frac{|D|}{\\text{avgdl}}\\right)}\n$$\n\n- $f(q_i,D)$：词项 $q_i$ 在 $D$ 中的词频（TF）\n- $\\text{IDF}(q_i)=\\ln\\frac{N - n(q_i) + 0.5}{n(q_i)+0.5}+1$：逆文档频率，**罕见词权重高**\n- $k_1$（默认 ~1.2–2.0）：**词频饱和**，防止某词刷屏霸榜\n- $b$（默认 ~0.75）：**文档长度归一化**强度\n\n**必杀点**：BM25 不理解语义（\"番茄\" vs \"西红柿\"匹配不上），但对**专有名词、产品型号、代码标识符、罕见术语**这种\"必须字面命中\"的场景是稠密向量的天敌克星。这正是混合检索的动机。\n\n### 3.4 RRF（Reciprocal Rank Fusion）——为什么排名融合优于分数加权\n\n混合检索要把\"BM25 的排名\"和\"向量的排名\"合并。最朴素的做法是分数加权 $\\alpha\\cdot s_{\\text{bm25}} + (1-\\alpha)\\cdot s_{\\text{vec}}$，但**两路分数量纲完全不同**（BM25 分数可以是 0–30 任意值，cosine 是 0–1），归一化又脆弱、对异常值敏感、$\\alpha$ 难调。\n\n**RRF 只用排名、丢掉原始分数**：\n\n$$\n\\text{RRF}(d) = \\sum_{r \\in \\text{retrievers}} \\frac{1}{k + \\text{rank}_r(d)}\n$$\n\n- $\\text{rank}_r(d)$：文档 $d$ 在第 $r$ 路结果里的名次（1, 2, 3…）\n- $k$：平滑常数，**经典默认 60**，压低头部名次差距、抬高长尾\n\n> **手算示例**（$k=60$）：文档 A 在向量路排第 1、BM25 路排第 3：\n> $\\text{RRF}(A) = \\frac{1}{60+1} + \\frac{1}{60+3} = 0.01639 + 0.01587 = 0.03226$。\n> 文档 B 向量路第 2、BM25 路第 2：$\\frac{1}{62}+\\frac{1}{62}=0.03226$。两者打平——RRF 奖励\"两路都靠前\"的稳健共识。\n\n![RRF：不比分数只比名次](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/03-2-rrf-rank.png ':class=xh-illust')\n\n**为什么优于加权**：① 量纲无关，不需要跨检索器归一化；② 对单路的离群高分鲁棒；③ 几乎免调参（一个 $k$ 走天下）；④ 在两路质量参差时不会被强势一路带偏。这是 RRF 成为 Elasticsearch / 各大向量库默认融合算法的原因。\n\n<div class=\"anim\" data-anim=\"rrf-fusion\"><\/div>\n\n### 3.5 Bi-Encoder vs Cross-Encoder——为什么必须 rerank\n\n这是 rerank 的理论根基，被深挖到这里答不出就露馅：\n\n```mermaid\ngraph LR\n    classDef bi fill:#4A90D9,stroke:#2E6BA6,stroke-width:2px,color:#fff\n    classDef cross fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    subgraph BiEncoder[\"Bi-Encoder 召回 (快, 可预计算)\"]\n        Q1[Query] --> E1[Encoder] --> V1[向量 q]\n        D1[Doc] --> E2[Encoder] --> V2[向量 d]\n        V1 --> Sim[cos 相似度]\n        V2 --> Sim\n    end\n\n    subgraph CrossEncoder[\"Cross-Encoder 精排 (慢, 精准)\"]\n        QC[\"Query [SEP] Doc 拼接\"] --> EC[单个 Encoder] --> Score[相关性分数]\n    end\n\n    BiEncoder:::bi\n    CrossEncoder:::cross\n```\n\n- **Bi-Encoder（双塔，召回用）**：query 和 doc **各自独立**过编码器，doc 向量可以**离线预计算并入库**。检索时只对 query 编码一次 + 在向量库里做 ANN。代价：query 和 doc **从未在编码时交互**，深层 token 级语义对齐信息在池化成单一向量时被压扁丢失了。\n- **Cross-Encoder（交叉编码，精排用）**：把 `query [SEP] doc` **拼成一条序列**整体过 transformer，self-attention 让 query 的每个 token 和 doc 的每个 token 充分交互，输出一个相关性标量。精度显著更高，**但无法预计算**——每个 query-doc 对都要现算一次 forward。\n\n**结论（必杀）**：Cross-Encoder 精度高但 $O(N)$ 次 forward 扛不住全库规模；Bi-Encoder 快但精度有上限。所以工业界标配是**两阶段**：Bi-Encoder 先从百万级粗召回 topK（如 50–100），Cross-Encoder reranker 只对这 topK 精排取 topN（如 5）。**用召回的\"快\"换覆盖，用精排的\"准\"换最终质量**，这就是 retrieve-then-rerank 范式的全部理由。\n\n![先召回再重排：宽进严出才喂模型](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/03-1-retrieve-rerank.png ':class=xh-illust')\n\n---\n\n## ④ Python 工程实现（可运行，注释讲 why）\n\n下面是一条**最小可跑、但工程要点齐全**的混合检索 + RRF + rerank 链路。依赖 `sentence-transformers`、`rank-bm25`、`FlagEmbedding`（BGE reranker）。\n\n```python\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport jieba  # 中文 BM25 必须先分词, 英文可直接 split\nfrom rank_bm25 import BM25Okapi\nfrom sentence_transformers import SentenceTransformer\nfrom sklearn.metrics.pairwise import cosine_similarity\nfrom FlagEmbedding import FlagReranker\n\n\n@dataclass\nclass Chunk:\n    chunk_id: str\n    text: str\n\n\nclass HybridRetriever:\n    \"\"\"混合检索器: 稠密(BGE) + 稀疏(BM25), RRF 融合, Cross-Encoder 重排.\n\n    为什么这样分层:\n    - 稠密负责语义召回(\"怎么续费会员\" 命中 \"订阅续订流程\")\n    - 稀疏负责字面召回(产品型号 \"X-200\"、错误码 \"E0451\")\n    - RRF 用排名而非原始分数融合, 规避两路量纲不一致的归一化噩梦\n    - Cross-Encoder 精排, 把召回阶段被压扁的 token 级交互信息补回来\n    \"\"\"\n\n    def __init__(\n        self,\n        chunks: list[Chunk],\n        embed_model: str = \"BAAI/bge-large-zh-v1.5\",\n        rerank_model: str = \"BAAI/bge-reranker-v2-m3\",\n    ) -> None:\n        self.chunks = chunks\n        # normalize_embeddings=True: 归一化后内积==cosine, 也便于向量库统一用 IP 索引\n        self.embedder = SentenceTransformer(embed_model)\n        self.doc_vecs = self.embedder.encode(\n            [c.text for c in chunks], normalize_embeddings=True\n        )\n        # BM25 需要预先分好词的 token 列表; 中文用 jieba, 否则词项粒度是整句, 匹配失效\n        tokenized = [list(jieba.cut(c.text)) for c in chunks]\n        self.bm25 = BM25Okapi(tokenized)\n        # use_fp16: reranker 用半精度省显存/提速, 精度损失可忽略\n        self.reranker = FlagReranker(rerank_model, use_fp16=True)\n\n    def _dense_rank(self, query: str, top_k: int) -> list[int]:\n        q_vec = self.embedder.encode([query], normalize_embeddings=True)\n        scores = cosine_similarity(q_vec, self.doc_vecs)[0]\n        # argsort 降序取 top_k, 返回的是 chunk 下标按相关性排好的名次\n        return scores.argsort()[::-1][:top_k].tolist()\n\n    def _sparse_rank(self, query: str, top_k: int) -> list[int]:\n        scores = self.bm25.get_scores(list(jieba.cut(query)))\n        return scores.argsort()[::-1][:top_k].tolist()\n\n    @staticmethod\n    def _rrf_fuse(rank_lists: list[list[int]], k: int = 60) -> list[int]:\n        \"\"\"Reciprocal Rank Fusion. k=60 是论文经典默认值.\n\n        只吃排名(名次)不吃原始分数 —— 这是 RRF 比加权求和稳健的根本原因.\n        \"\"\"\n        fused: dict[int, float] = {}\n        for ranks in rank_lists:\n            for position, doc_idx in enumerate(ranks):  # position 从 0 开始, 名次=position+1\n                fused[doc_idx] = fused.get(doc_idx, 0.0) + 1.0 / (k + position + 1)\n        return sorted(fused, key=lambda i: fused[i], reverse=True)\n\n    def search(self, query: str, recall_k: int = 50, final_n: int = 5) -> list[Chunk]:\n        # 第一阶段: 两路各召回 recall_k(取大一点, 给 rerank 留筛选空间)\n        dense = self._dense_rank(query, recall_k)\n        sparse = self._sparse_rank(query, recall_k)\n        candidates = self._rrf_fuse([dense, sparse])\n\n        # 第二阶段: Cross-Encoder 对粗召回的候选精排, 只算 query 与候选的相关性\n        pairs = [[query, self.chunks[i].text] for i in candidates]\n        rerank_scores = self.reranker.compute_score(pairs, normalize=True)\n        ranked = sorted(\n            zip(candidates, rerank_scores), key=lambda x: x[1], reverse=True\n        )\n        # 最终只把 top_n 喂给 LLM —— context 越短, 生成越准、越省钱、越少 \"迷失在中间\"\n        return [self.chunks[i] for i, _ in ranked[:final_n]]\n\n\n# --- 生成阶段: 把 final_n 个 chunk 塞进 prompt, 强制溯源、强制\"不知道就说不知道\" ---\nRAG_PROMPT = \"\"\"你是企业知识库助手。只能依据下面的【参考资料】回答, 不得编造。\n若参考资料不足以回答, 必须明确回复\"根据现有资料无法回答\", 不要猜测。\n回答末尾用 [chunk_id] 标注每个论断的来源。\n\n【参考资料】\n{context}\n\n【问题】\n{question}\n\"\"\"\n\n\ndef build_prompt(chunks: list[Chunk], question: str) -> str:\n    context = \"\\n\\n\".join(f\"[{c.chunk_id}] {c.text}\" for c in chunks)\n    return RAG_PROMPT.format(context=context, question=question)\n```\n\n工程要点（面试可拿出来讲的 why）：\n- `recall_k=50 → final_n=5`：召回多、精排少（就是上面那条动画的「漏斗」）。**召回阶段宁可多捞**（漏召回是不可逆的，后面任何环节都救不回），**生成阶段宁可精简**（context 越长越贵、越容易触发 \"lost in the middle\"——关键信息落中段时性能可掉 30%+，所以宁可短而准）。\n- `normalize_embeddings=True`：归一化后 cosine 等价内积，向量库统一用 IP 索引（见 §3.2）。\n- prompt 里硬性写\"无法回答就说不知道 + 强制标注来源\"：这是**生成层抑制幻觉**的第一道闸（见 §3 与幻觉治理）。\n\n---\n\n## ⑤ 面试官连环追问链（从浅到深）\n\n> **Q1｜先讲讲你理解的 RAG 完整链路？**\n> 答法要点：离线（解析 → 分块 → 向量化 → 入库建索引）+ 在线（query 改写 → 混合召回 → 重排 → 生成 + 溯源）。一句话点出\"离线重索引质量、在线重召回与精排\"。**别只背名词，顺手带一句每环的优化空间**，显示你不是只跑过 demo。\n\n> **Q2｜你的 chunk 怎么切的？size 和 overlap 怎么定的？**\n> 答法要点：先反问\"什么文档类型\"——这是体现工程 sense 的关键。给基准：通用文本 256–512 token、overlap 取 size 的 10–20%（防语义被切断在边界）。FAQ 按问答对切、代码按函数 / 类切（用 AST 或语言感知 splitter）、表格整表或按行切并保留表头、PDF 先版面解析再切。**敢说\"固定大小是 baseline，我会上 semantic chunking 或父子块\"**。\n\n> **Q3｜既然有了语义向量检索，为什么还要 BM25 做混合检索？**\n> 答法要点：搬出 §3.3——向量懂语义但对**专有名词 / 型号 / 代码标识符 / 罕见术语**这种必须字面命中的场景弱，BM25 正好补这块。给数字：在专业术语密集的知识库上，混合检索相比纯向量召回准确率可提升约 **+25%**。\n\n> **Q4｜两路结果怎么融合？为什么用 RRF 不用加权求和？**\n> 答法要点：§3.4 全套——加权求和被两路量纲不一致击穿，归一化脆弱、$\\alpha$ 难调；RRF 只用排名、量纲无关、对离群分鲁棒、近乎免调参（$k=60$）。能手算一个 RRF 分数直接封神。\n\n> **Q5｜RRF 之后为什么还要 rerank？rerank 模型和召回模型有什么本质区别？**\n> 答法要点：§3.5 双塔 vs 交叉编码。召回是 Bi-Encoder（独立编码、可预计算、丢了 token 级交互），rerank 是 Cross-Encoder（query-doc 拼接、self-attention 充分交互、精度高但不可预计算）。所以两阶段：粗召回 topK → 精排 topN。给数字：**rerank 把 top-5 命中率从约 71% 提到约 89%**（实测区间，具体数随语料波动）。\n> **2025 选型加分**：开源 reranker 第一梯队是 `bge-reranker-v2-m3`（中英双语稳、社区默认）、**`Qwen3-Reranker`（0.6B/4B/8B，CMTEB-R 约 76）**、**`jina-reranker-v3`（0.6B，BEIR nDCG@10 约 61.9，较 v2-m3 同尺寸再涨约 5%）**；闭源走 **Cohere Rerank 3.5**（延迟约 600ms，省运维）。**反直觉点（拉档）：reranker 不是越大越好——`gte-reranker-modernbert-base`（149M）在 Hit@1 上能追平 1B 量级模型，所以要按「精度 ÷ 延迟 ÷ 显存」三维权衡，用自己的 eval 集定，而不是无脑上最大的。**\n\n> **Q6｜（反直觉深挖）是不是混合检索 + rerank 永远比纯向量好？有没有反例？**\n> 答法要点：**这题能区分调包侠和真懂的人**。诚实回答：**不一定**。SemEval-2025 有团队发现，在已经很强的 embedding 模型（如 Stella）上叠加 BM25 反而掉点——因为顶级 embedding 已经把词法 + 语义信息编码进高维表示里了，再塞稀疏信号反而引入噪声、稀释精度；只有在小模型（如 MiniLM）上 BM25 才稳定增益。**结论：是否上 BM25 取决于 embedding 的强度，要用自己的 eval 集实测，不能无脑套\"混合检索一定更好\"的教条。** 这句话直接证明你有 evals 驱动的判断力。\n\n> **Q7｜HNSW 的 M 和 efConstruction 是什么？召回率和延迟怎么 trade-off？**\n> 答法要点：§5 下面那段索引参数。M 是每个节点的最大出边数（图的连通度），efConstruction 是建图时的候选队列宽度，efSearch 是查询时的探索宽度。三者都是**调大 → 召回率↑、内存 / 延迟↑**。HNSW 是图索引、查询快、不需训练但内存大；IVF 靠聚类分桶、`nlist` 桶数、`nprobe` 探桶数，`nprobe` 越大召回越高越慢；IVF-PQ 用乘积量化压向量、省内存但有精度损失，适合上亿规模。**把\"召回率 ↔ 延迟 ↔ 内存\"的三角说清楚 = 你的后端调优直觉迁移成功。**\n\n> **Q8｜你的库从 100 万向量涨到 1 亿，架构怎么演进？**\n> 答法要点：见 §6 真题最后一道。分阶段：百万级 Flat / HNSW 单机扛得住 → 千万级上 IVF/HNSW + 量化压内存 + 考虑分片 → 亿级必须分布式（Milvus / Vespa）+ IVF-PQ 或 DiskANN + 冷热分层 + 标量过滤前置裁剪候选集。**强调\"先用 eval 测清楚每档的召回 / 延迟 / 成本曲线再决定升级时机\"——把成本治理直觉端出来。**\n\n> **Q9｜检索召回对了，模型还是编了个错答案，你怎么定位？**\n> 答法要点：§ 幻觉二分归因。先做归因二分：**检索层错**（召回的 chunk 本身不含 / 含错信息）还是**生成层错**（context 明明对了，模型却无视 context 编造，即 faithfulness 崩了）。用 RAG Triad 拆：Context Relevance 低 → 修检索（分块 / 召回 / rerank）；Faithfulness 低 → 修生成（prompt 约束 / 换模型 / 上 CRAG 这类自检）。**能把\"检索对了仍编造\"单独拎出来归到生成层，是高级答法。**\n\n![幻觉归因二分：检索层还是生成层](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/03-3-hallucination-split.png ':class=xh-illust')\n\n---\n\n## ⑥ 高频真题 + 参考答案（带量化数字）\n\n**T1｜什么时候用 RAG，什么时候用微调？怎么选？**\n\n参考答案：先抓本质——**RAG 注入\"知识\"（模型不知道的事实），微调注入\"行为 / 风格 / 格式\"（模型不会做的事）**。\n- 选 RAG：知识高频更新、需要溯源引用、私有 / 长尾事实、不想承担训练成本与数据飞轮。\n- 选微调：需要固定输出格式 / 特定语气 / 领域术语风格、需要压缩 prompt 降本、有稳定的高质量标注数据。\n- 现实大多数是**两者叠加**：微调让模型\"会用领域语言说话 + 稳定调工具\"，RAG 实时喂\"最新事实\"。\n- 反例提醒：**别用微调去记事实**——知识一更新就得重训，成本高且仍会幻觉；事实类需求几乎都该用 RAG。\n\n**T2｜完整说一下分块（chunking）的几种策略和适用场景。**\n\n参考答案：\n- **固定大小（fixed-size）**：按 token / 字符切，最简单的 baseline，缺点是硬切断语义。\n- **递归切分（recursive）**：按 `段落 → 句 → 词` 层级优先级切，尽量在自然边界断开，是通用首选。\n- **语义分块（semantic chunking）**：算相邻句的 embedding 相似度，在语义\"断崖\"处切，块内主题更聚合，代价是要多跑一遍 embedding。\n- **父子块 / small-to-large**：用**小块做检索**（精准命中），命中后**返回其所属大块 / 父文档做生成**（上下文完整）。兼顾召回精度与生成上下文，是高级 RAG 标配。\n- size/overlap：通用 256–512 token，overlap 取 size 的 **10–20%** 防边界语义割裂。\n- 按类型：PDF 先版面解析（标题 / 正文 / 表格分流）；代码按函数 / 类用 AST 切；FAQ 一问一答成块；表格保留表头、整表或按行切。\n\n**T3｜embedding 模型怎么选？bge / bce / ada-002 / 维度怎么权衡？**\n\n参考答案：\n- **中文首选开源**：`bge-large-zh-v1.5`（C-MTEB 中文榜常年高位）、`bce-embedding`（网易有道，中英双语检索强），多语言 / 长文 / 稀疏稠密一体选 **BGE-M3**（支持 100+ 语言、dense+sparse+multi-vector 一体）。选型以 **C-MTEB / MTEB 中文榜**为客观依据，再用**自己业务的 eval 集复测**——榜单不等于你的场景。\n- **2025 前沿（秀新鲜度）**：阿里 **Qwen3-Embedding** 系列（0.6B / 4B / 8B）2025-06 登顶 **MTEB 多语言榜 No.1**（8B 综合约 70.58，中文 MTEB 约 73.8、代码约 80.7），且与同系 **Qwen3-Reranker** 配套；闭源侧 **Cohere embed-v4**、**OpenAI text-embedding-3-large**、**Voyage-3** 是第一梯队。**注意 MTEB v2(2026) 与 v1 分数口径不同、不可直接比，引用榜单要说清版本。**\n- **对比 OpenAI**：`text-embedding-ada-002`（1536 维）现已被 `text-embedding-3-large`（3072 维，支持 Matryoshka 降维）超越；闭源走 API 省运维但有数据出境 / 成本 / 延迟顾虑，**企业私有库多倾向开源自托管**。\n- **维度 vs 成本权衡（必答）**：维度越高表达力越强，但**存储与内存线性增长、ANN 检索变慢**。1 亿向量 ×1024 维 ×float32 ≈ 400+ GB，必须靠量化（PQ / int8）压。新一代模型多支持 **Matryoshka 表征学习（MRL）**——一次训练、推理时按需截断到更低维（如 1024→256），用一点精度换数倍存储 / 延迟，是「维度可调」的工程抓手。**面试要点：维度不是越大越好，要在召回质量和存储 / 延迟成本间用 eval 找拐点。**\n\n**T4｜向量索引 Flat / HNSW / IVF / IVF-PQ 有什么区别？怎么选？**\n\n参考答案：\n- **Flat（暴力检索）**：全量算距离，召回 100% 但 $O(N)$，只适合**几万级以下**或要 ground-truth 基准。\n- **HNSW（图索引）**：多层小世界图，查询近 $O(\\log N)$，**召回高、延迟低、无需训练**，缺点内存大。参数：`M`（出边数）、`efConstruction`（建图宽度）、`efSearch`（查询宽度），都是调大换召回。**百万到千万级首选。**\n- **IVF（倒排 + 聚类）**：先 kmeans 分 `nlist` 个桶，查询只探 `nprobe` 个最近桶。`nprobe`↑ 召回↑延迟↑。需训练，适合**千万级以上**。\n- **IVF-PQ**：在 IVF 基础上对向量做**乘积量化（Product Quantization）**压缩，内存骤降（可压到 1/10 以下），有精度损失，**上亿级控成本的主力**。\n- 选型口诀：**小用 Flat，主用 HNSW，大且省内存用 IVF-PQ / DiskANN。**\n\n> **延伸**：把向量索引放进完整的检索服务里——分片 / 多副本 / 冷热分层 / 标量过滤前置、以及从百万到亿级的容量规划与成本治理，作为系统设计题怎么端出来见 [AI 应用系统设计章](11-AI应用系统设计/)。\n\n**T5｜query 改写有哪些手段？分别解决什么问题？**\n\n参考答案：\n- **HyDE（Hypothetical Document Embeddings）**：先让 LLM 对 query**生成一个假设性答案**，用这个\"假答案\"的向量去检索。解决**短 query 与长文档的语义鸿沟**（query 太短信息量不足）。\n- **Multi-Query**：让 LLM 把一个 query 改写成多个不同表述，**多路检索后合并去重**，提升召回覆盖、抗 query 表述偏差。\n- **RAG-Fusion**：Multi-Query + **RRF 融合**多路结果，是 Multi-Query 的增强版。\n- 共同代价：都多调了 LLM，增加延迟和成本，**要在召回增益和延迟预算间权衡**——这又是 evals 驱动取舍。\n\n**T6｜聊聊你知道的高级 RAG / 2025-2026 的新进展。**（拉档题，秀判断力）\n\n参考答案（挑 3–4 个讲透，别堆名词）：\n- **Anthropic Contextual Retrieval（2024.09）**：分块时用 LLM 给每个 chunk 生成一段\"它在全文中的上下文\"前缀再 embedding，解决 chunk 脱离上下文的丢信息问题。官方实测**检索失败率**：Contextual Embeddings 单独 **−35%**（5.7%→3.7%）→ 叠加 BM25 **−49%**（→2.9%）→ 再叠 rerank **−67%**（→1.9%）。这串数字是顶级谈资。\n- **Late Chunking（Jina, 2024.09）**：颠倒顺序——**先用长上下文模型 embedding 整篇、再切块池化**，每个块的向量都\"见过\"全文上下文，30 行代码就能改造池化层，避免传统\"先切后嵌\"的上下文丢失。\n- **GraphRAG → LazyGraphRAG（微软, LazyGraphRAG 2025.06）**：GraphRAG 用 LLM 抽实体 / 关系建知识图谱、社区摘要，擅长**全局 / 多跳问题**，但建索引贵到离谱（早期单数据集索引曾达 $33,000 量级）。**LazyGraphRAG 把社区摘要推迟到查询时按需算，索引成本砍到全量 GraphRAG 的约 0.1%（与向量 RAG 相当），全局查询成本可低 700 倍以上**——成本治理的教科书案例。\n- **Agentic RAG / Search-R1（2025.03）**：让 LLM **自主决定何时检索、检索什么、要不要多轮迭代**（不再是固定一次性检索）。Search-R1 更进一步用**强化学习训练模型学会调搜索引擎**，在 7 个 QA 数据集上比 RAG baseline 提升约 **+41%（Qwen2.5-7B）/ +20%（3B）**。\n- **Self-RAG / CRAG / Adaptive-RAG**：模型**自我反思**检索是否必要、检索质量是否够（CRAG 在召回差时触发 web 搜索兜底），按 query 难度自适应选检索策略。\n- **ColBERT / ColPali**：ColBERT 用**多向量 + late interaction**（token 级细粒度匹配），精度介于双塔和交叉编码之间；**ColPali 直接把 PDF 页面当图像做视觉检索**，跳过易错的版面解析 + OCR，对图表 / 扫描件类文档是降维打击。\n> 不确定的数字主动标\"实测区间，随语料波动\"，别硬背成绝对值。\n\n**T7｜RAG 系统怎么评估？**\n\n参考答案：分两层。\n- **检索层（IR 指标）**：`Recall@K`（前 K 个结果里召回了多少相关文档，**RAG 最关键，漏召回不可逆**）、`NDCG@K`（带位置权重的排序质量）、`MRR`、`Precision@K`。\n- **端到端（RAG Triad / RAGAS）**：三个互补维度——\n  - **Context Relevance**：召回的 context 是否相关、是否够聚焦（查检索质量）；\n  - **Faithfulness（忠实度）**：答案的每个论断能否从 context 推出（**查幻觉**，RAGAS 把答案拆成原子陈述逐条对 context 核验，算可验证比例）；\n  - **Answer Relevance**：答案是否真的回答了问题（查 prompt / 理解）。\n- 落地：**RAGAS** 框架自动化算这三件套 + `LLM-as-judge`（用强模型当裁判打分，省人工但要防裁判偏置）。**诊断价值**：Context Relevance 差 → 修检索；Faithfulness 差 → 修生成；Answer Relevance 差 → 修 prompt / query 理解。这套归因逻辑要张口就来。\n\n> **延伸**：RAG 评估只是冰山一角——评测集怎么建、trace 怎么打、LLM-as-judge 怎么防裁判偏置、线上回归与 LLMOps 闭环怎么搭，系统展开见 [Evals 与 LLMOps 章](08-Evals与LLMOps/)。\n\n**T8｜RAG 里的幻觉怎么治理？**\n\n参考答案：先**归因二分**——\n- **内在幻觉（intrinsic）/ 检索层**：召回的 chunk 本身缺失或错误，模型基于错料答错。修法：改分块、上混合检索 + rerank、Contextual Retrieval、扩召回。\n- **外在幻觉（extrinsic）/ 生成层**：**context 明明是对的，模型却无视它编造**（Faithfulness 崩）。修法：prompt 硬约束\"只依据资料、不知就说不知道、强制标注来源\"、降 temperature、换 faithfulness 更强的模型、上 CRAG / Self-RAG 自检、生成后做 NLI 校验答案是否被 context 蕴含。\n- **关键判断**：很多人一遇幻觉就猛调检索，**但\"检索对了仍编造\"必须归到生成层**——能把这两类分开诊断，是这题的拉档点。\n\n**T9｜知识库从 100 万向量演进到 1 亿，架构怎么变？**\n\n参考答案：\n- **~100 万**：单机 HNSW（或 Flat 做基准）足够，内存放得下，毫秒级延迟，先把数据质量和分块 / 召回链路打磨好。\n- **~1000 万**：HNSW 内存吃紧，开始上**量化（int8 / PQ）压内存**、考虑分片；标量过滤（按租户 / 时间）前置裁剪候选集降算力。\n- **~1 亿**：必须**分布式向量库**（Milvus / Vespa / 自建分片）+ **IVF-PQ 或 DiskANN**（向量落盘、内存只放压缩码）+ **冷热分层**（热数据 HNSW、冷数据 PQ 落盘）+ **多副本扛 QPS**。\n- 贯穿全程的工程纪律：**每升一档都先用 eval 集量出召回率 / P99 延迟 / 单位成本曲线，按 SLA 和预算决定升级时机**，而不是盲目堆硬件。把\"可观测 + 成本治理 + 容量规划\"端出来，正是你 Java 后端背景的护城河。\n\n**T10｜现在 LLM 上下文窗口都 100 万 token 了，是不是直接把所有文档塞进 prompt 就行，RAG 要被淘汰了？**（2025-2026 最高频拉档题）\n\n参考答案：**这题专门用来筛\"只会跟风\"的人，标准答案是「长上下文是 RAG 的补充，不是替代」**，理由要分四层端出来：\n- **成本与延迟**：把全库塞 prompt 是按 token 线性烧钱、烧延迟，RAG 只喂 topN，单位查询成本 / 首 token 延迟低一两个数量级。高 QPS 场景长上下文直接成本爆炸。\n- **\"lost in the middle\" 没被消灭**：2025 的研究确认——**即便是 128K+ 窗口的模型，关键信息落在上下文中段时性能仍可掉 30%+**（注意力 + RoPE 长程衰减导致首尾强、中间弱）。塞得越多噪声越大、有效信息越被稀释，纯堆窗口反而掉点。\n- **可溯源 / 可更新 / 可治理**：RAG 天然带来源引用、知识增量更新（改库不改模型）、按租户做权限 / 标量过滤——这些是\"全塞 prompt\"给不了的工程能力。\n- **二者融合才是现状**：长上下文让 RAG 可以**召回更大的块 / 父文档**（small-to-large 的\"large\"端能放更多）、容忍更粗的分块、塞更多候选给模型自己挑，**降低了对\"切得多准\"的依赖**，但检索这一步（先粗筛出相关那部分）依然不可省。**一句话收口：长上下文抬高了 RAG 的天花板，没有掀掉它的地板。**\n\n> **延伸**：\"长上下文淘汰 RAG\"这类技术跟风论怎么辨、怎么形成自己的判断框架（看成本曲线 / 看本质约束 / 不被热点带节奏），系统训练见 [技术趋势与判断力章](10-技术趋势与判断力/)。\n\n---\n\n## ⑦ 项目话术钩子（STAR 模板，嫁接你的 RAG / Agent 项目）\n\n**钩子 1：rerank 提召回（最稳的量化故事）**\n\n> **S（情境）**：我做的企业知识库问答，早期是纯向量召回直接 stuff 进 prompt，用户反馈\"答非所问、引用了不相关文档\"。\n> **T（任务）**：在不显著增加延迟的前提下把答案相关性提上去。\n> **A（行动）**：定位到召回阶段——Bi-Encoder 单向量召回丢了 query-doc 的 token 级交互。我改成两阶段：HNSW 粗召回 top-50，再用 `bge-reranker-v2-m3` Cross-Encoder 精排取 top-5。为控延迟，reranker 开 fp16、候选数从 100 收到 50 做了 latency/recall 权衡。\n> **R（结果）**：top-5 命中率从约 71% 提升到约 89%，端到端 P95 延迟只增加约 200ms，用户\"答非所问\"投诉明显下降。同时我把 RAG Triad 指标接进了离线评测，每次改链路都能量化对比。\n\n**钩子 2：混合检索救专业术语（反直觉判断力）**\n\n> **S**：知识库里大量产品型号、错误码、内部缩写，纯向量召回经常把 \"E0451\" 匹配成语义相近但完全不对的条目。\n> **T**：让字面必须命中的查询稳定召回。\n> **A**：引入 BM25 稀疏检索补字面匹配，用 RRF（k=60）融合两路——特意没用加权求和，因为两路分数量纲不一致、归一化很脆。**但我没有无脑全量上混合**：先在自己的 eval 集上对比，确认我们用的 embedding 强度下混合确实增益（专业术语类 query 准确率约 +25%）才推全量。\n> **R**：型号 / 错误码类 query 召回准确率提升约 25%，且因为是 RRF 融合，对两路质量参差更鲁棒，没有出现一路带偏的情况。\n\n**钩子 3：成本 / 规模演进（嫁接 Java 后端可靠性直觉）**\n\n> **S**：向量数据从几十万涨到千万级，单机 HNSW 内存逼近上限、P99 抖动。\n> **T**：在可控成本下支撑规模增长、稳住延迟 SLA。\n> **A**：先建了召回 / 延迟 / 内存的可观测看板，量出拐点；引入向量量化压内存、按租户做标量过滤前置裁剪候选集、规划分片方案；制定\"每档规模先 eval 再升级\"的容量规划纪律。\n> **R**：内存占用降到原来的约 1/3，P99 稳定在 SLA 内，并形成了一套可复用的扩容 checklist——把后端的容量规划 / 可观测习惯带进了 AI 链路。\n\n> 话术纪律：数字给**真实区间**并说明来源（\"我们 eval 集上\"），被追问实现细节能下钻到 §3/§4 的原理，绝不背诵空泛百分比。\n\n---\n\n## ⑧ 常见失分点\n\n1. **把 RAG 链路只背成\"切块 → 向量 → 检索 → 喂模型\"**：没有 rerank、没有混合检索、没有 query 改写、没有评估——一看就是只跑过 demo。\n2. **说不出每个优化的量化收益**：只会\"上了 rerank 效果更好\"，答不出\"top-5 从 71% 到 89%\"。**没有数字 = 没有真正调过。**\n3. **RRF 答成\"加权求和\"**：不知道排名融合为什么优于分数加权，被问量纲问题就崩。\n4. **不知道 Bi-Encoder / Cross-Encoder 的区别**：解释不了\"为什么召回模型不能直接当 rerank 用\"。\n5. **无脑教条\"混合检索 + rerank 永远更好\"**：答不出\"强 embedding 上加 BM25 可能掉点\"的反例，暴露没有 evals 驱动的判断力。\n6. **HNSW / IVF 参数张口结舌**：说不清 M / efSearch / nprobe 与召回 / 延迟的关系——后端调优直觉没迁移过来。\n7. **幻觉只会怪检索**：不会做\"检索层 vs 生成层\"二分归因，意识不到\"检索对了仍编造\"是 faithfulness 问题。\n8. **RAG vs 微调混为一谈**：用微调去\"记事实\"，没抓住\"RAG 注入知识、微调注入行为\"的本质。\n9. **评估只会说\"人工看几条\"**：不知道 RAG Triad / RAGAS / Recall@K / NDCG，没有自动化离线评测意识。\n10. **新进展只堆名词**：GraphRAG / Self-RAG / ColPali 一通报菜名，讲不出各自解决什么问题、量化收益、成本代价——拉档变减分。\n11. **\"长上下文淘汰 RAG\"跟风论**：被问\"窗口够大是不是全塞进去就行\"答不出成本 / 延迟 / lost-in-the-middle / 可溯源四层反驳（见 T10），暴露只追热点没有工程判断。\n\n---\n\n## ⑨ 一句话速记\n\n> **RAG = 离线把知识切好嵌好建好索引，在线用\"混合召回（RRF 融合稀疏+稠密）→ Cross-Encoder 精排 topN → 约束生成并溯源\"换准换稳；每个优化都拿 evals 量收益（rerank top-5 71%→89%、混合检索术语 +25%、Contextual Retrieval 失败率 −35%/−49%/−67%、LazyGraphRAG 索引成本砍到 0.1%）；幻觉先做检索层 vs 生成层二分归因；规模演进 Flat→HNSW→IVF-PQ 按召回/延迟/成本拐点升级；长上下文是补充不是替代（成本/延迟/lost-in-the-middle 中段掉 30%+/可溯源）——裸 RAG 是地板，量化判断力与成本治理才是护城河。**\n\n---\n\n### 参考来源（关键数字与 2025-2026 进展核实）\n\n- Anthropic Contextual Retrieval 失败率 −35%/−49%/−67%：[Anthropic 官方博客 / Claude Cookbook](https://platform.claude.com/cookbook/capabilities-contextual-embeddings-guide)\n- LazyGraphRAG 索引成本 0.1% / 查询成本低 700×：[Microsoft Research Blog](https://www.microsoft.com/en-us/research/blog/lazygraphrag-setting-a-new-standard-for-quality-and-cost/)\n- Search-R1 RL 训练 +41%/+20%：[arXiv:2503.09516](https://arxiv.org/abs/2503.09516)\n- Late Chunking（先嵌后切）：[Jina AI](https://jina.ai/news/late-chunking-in-long-context-embedding-models/) / [arXiv:2409.04701](https://arxiv.org/abs/2409.04701)\n- 强 embedding 上加 BM25 可能掉点：[TIFIN India SemEval-2025, arXiv:2504.16627](https://arxiv.org/pdf/2504.16627)\n- C-MTEB / BGE-M3 中文 embedding 选型：[BGE 文档](https://bge-model.com/tutorial/4_Evaluation/4.2.3.html)\n- Qwen3-Embedding 登顶 MTEB 多语言榜（2025-06，约 70.58）：[Qwen 官方博客](https://qwenlm.github.io/blog/qwen3-embedding/) / [arXiv:2506.05176](https://arxiv.org/abs/2506.05176)\n- Reranker 横评（BGE / Jina v3 / Cohere / Qwen3，含「尺寸≠质量」）：[Reranker Benchmark](https://aimultiple.com/rerankers) / [jina-reranker-v3, arXiv:2509.25085](https://arxiv.org/abs/2509.25085)\n- \"Lost in the middle\" 在 128K+ 长窗口仍存在、中段掉 30%+：[arXiv:2307.03172 原论文](https://arxiv.org/abs/2307.03172) / [2025 长上下文 RAG 综述](https://www.getmaxim.ai/articles/solving-the-lost-in-the-middle-problem-advanced-rag-techniques-for-long-context-llms/)\n- RAGAS / RAG Triad 三件套：[Ragas 官方文档](https://docs.ragas.io/en/v0.1.21/concepts/metrics/)\n", "/12-算法手撕/README.md": "# 12 · 算法手撕（刷题层）\n\n> 本章所有 PyTorch / NumPy 代码均在 `torch 2.12 + numpy 2.4` 下实际跑通，张量维度逐行注释。背景设定：2 年 Java 后端 + 1 年 AI，转大厂 AI 应用 / Agent 工程师，**Python 主栈**。\n>\n> **2025–2026 趋势更新**：手撕的「头号必考」依旧是 **MultiHeadAttention**，但近一年面经里**新晋高频**的还有 **RoPE 旋转位置编码、RMSNorm、SFT 的 shift-right loss、采样三件套（temperature/top-k/top-p）**，DeepSeek 火了之后 **MLA（Multi-head Latent Attention）** 也开始被问到（多为「讲原理 / 和 GQA 比」，手撕概率低于 MHA）。RL 对齐方向的岗位会追到 **DPO / GRPO loss** 的手写。本章已把这些补齐到 §4.6–§4.7。\n\n---\n\n## ① 一句话：手撕在面试里到底干嘛\n\n> **手撕是淘汰环节，不是拉差距环节。**\n\n它的作用是「划一条线」——线下面的人，无论项目讲得多漂亮，直接挂；线上面的人，回到项目 / 八股拉档。所以对你这个背景，手撕的目标**不是炫技，是不翻车**：\n\n- **LeetCode 部分**：应用 / LLM 应用岗的题**普遍 easy–medium**，明显低于纯算法岗（不会甩 hard DP / 计算几何）。但「做不出 medium」=直接淘汰。目标是把 **easy 做到秒杀、medium 做到 30 分钟内 bug-free + 讲清复杂度**，备约 **100+ 道**形成肌肉记忆即可，不必刷到 500 题。\n- **ML / DL 手撕部分**：这才是 AI 岗**真正的区分点**。头号高频是 **MultiHeadAttention，几乎必考**——它同时验「你懂不懂 Transformer」和「你会不会写 Python / 张量操作」。Java 背景的人最容易栽在这：理论背得出，`reshape / transpose` 维度一拆就乱。\n\n**心态**：手撕考的是「**冷静 + 边界 + 能边写边讲**」，不是「想出神仙解法」。面试官看的是你写代码时脑子清不清楚，比 AC 本身更重要。**先讲思路再下笔、边写边报维度、写完主动测一组**——这套动作本身就在加分。\n\n---\n\n## ② 知识地图\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef lc fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef ml fill:#276749,stroke:#1E5038,stroke-width:2px,color:#fff\n    classDef leaf fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n    classDef leafg fill:#9AE6B4,stroke:#68D391,stroke-width:1px,color:#1C4532\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Root([\"算法手撕（淘汰线）\"]):::root\n\n    Root ==> LC[\"LeetCode 高频<br/>easy-medium · 不翻车\"]:::lc\n    Root ==> ML[\"ML / DL 手撕<br/>真正区分点\"]:::ml\n\n    LC --> DP[\"DP（约占一半）<br/>背包 / 股票 / 子序列\"]:::leaf\n    LC --> DFS[\"DFS / 回溯 / 分治<br/>全排列 / 岛屿 / 子集\"]:::leaf\n    LC --> Tree[\"二叉树<br/>遍历 / 序列化\"]:::leaf\n    LC --> List[\"链表<br/>反转 / 重排 / 环\"]:::leaf\n    LC --> TwoP[\"双指针 / 滑窗<br/>三数之和 / 最长子串\"]:::leaf\n    LC --> Arr[\"数组字符串<br/>大量 easy\"]:::leaf\n    LC --> HeapG[\"堆 / 图 / Top-K\"]:::leaf\n    LC --> Design[\"设计题<br/>LRU / LFU\"]:::leaf\n\n    ML ==> Attn[\"Attention 家族<br/>头号高频 · 几乎必考\"]:::ml\n    ML ==> Pos[\"位置编码 / 归一化<br/>RoPE / RMSNorm（新晋高频）\"]:::ml\n    ML --> Basic[\"基础组件<br/>Softmax / CE / Sigmoid\"]:::leafg\n    ML --> Train[\"训练手撕<br/>BP / SGD / K-means\"]:::leafg\n    ML --> Decode[\"解码采样<br/>greedy / beam / top-k/p\"]:::leafg\n    ML --> Align[\"SFT / 对齐 loss<br/>shift-loss / DPO / GRPO\"]:::leafg\n    ML --> CV[\"CV 背景加分<br/>IoU/NMS/Focal/InfoNCE\"]:::leafg\n    ML --> RAG[\"LLM 应用<br/>BPE / RAG top-k\"]:::leafg\n\n    Attn --> A1[\"ScaledDotProduct\"]:::leafg\n    Attn --> A2[\"MultiHead + mask\"]:::leafg\n    Attn --> A3[\"KV Cache\"]:::leafg\n    Attn --> A4[\"MQA / GQA\"]:::leafg\n    Attn --> A5[\"MLA（DeepSeek）<br/>重讲原理\"]:::leafg\n\n    Pos --> P1[\"RoPE 旋转编码\"]:::leafg\n    Pos --> P2[\"RMSNorm / LayerNorm\"]:::leafg\n\n    N[\"LLM 应用岗：LeetCode 偏简单<br/>但 ML 手撕是真分水岭\"]:::note\n    ML -.-> N\n```\n\n---\n\n## ③ LeetCode 高频（题型 → 真题 → 代表解法）\n\n### 题型频率（应用 / LLM 应用岗经验排序）\n\n| 频率 | 题型 | 说明 | 典型难度 |\n|------|------|------|----------|\n| ★★★★★ | **DP 动态规划** | 几乎占一半，但都是入门–中等套路（背包 / 股票 / 子序列），不考状压数位 | medium |\n| ★★★★ | **DFS / 回溯 / 分治** | 全排列、子集、岛屿、组合 | easy–medium |\n| ★★★★ | **二叉树** | 遍历、最近公共祖先、序列化 | easy–medium |\n| ★★★★ | **链表** | 反转、重排、判环、合并 | easy–medium |\n| ★★★ | **双指针 / 滑动窗口** | 三数之和、最长无重复子串 | medium |\n| ★★★ | **数组 / 字符串** | 大量 easy，签到题，必须秒 | easy |\n| ★★ | **堆 / 图 / Top-K** | 第 K 大、会议室、拓扑排序 | medium |\n| ★★ | **设计题** | LRU 几乎是设计题里唯一高频 | medium |\n\n> Java 背景注意：用 Python 写时**别用 `collections` 之外的重武器**。面试官常额外要求「**手写哈希表 / 不用 STL** / 不用 `Counter`」来看你懂不懂底层——别一上来就 `dict`。\n\n### 必刷真题清单（带考点）\n\n| 题 | 考点 | 易错 / 隐藏要求 |\n|----|------|----------------|\n| 两数之和（LC1） | 哈希 | 常被追问「**手写哈希表，不用 dict/STL**」 |\n| 除自身以外数组的乘积（LC238） | 前后缀积 | **不能用除法**、O(1) 额外空间 |\n| 三数之和（LC15） | 排序 + 双指针 | 去重边界 |\n| 最长回文子串（LC5） | DP / 中心扩展 | 中心扩展更易讲清复杂度 |\n| 买卖股票 I–IV（LC121/122/123/188） | DP 状态机 | IV 的 k 笔交易状态压缩 |\n| 重排链表（LC143） | 找中点 + 反转 + 合并 | 三步组合 |\n| 数组中第 K 大（LC215） | 堆 / 快速选择 | 能讲快速选择平均 O(n) 加分 |\n| 会议室 II（LC253） | 区间 / 最小堆 | 扫描线 vs 堆两种解 |\n| 岛屿数量（LC200） | DFS / BFS / 并查集 | 三种解都要会讲 |\n| 二叉树序列化与反序列化（LC297） | 前序 + 递归 | null 占位符 |\n| 字符串全排列（LC46/剑指38） | 回溯 | 含重复元素的去重 |\n| LRU 缓存（LC146） | 双向链表 + 哈希 | 设计题代表，下面给完整解 |\n\n### 代表解法 1：除自身以外的乘积（LC238，不用除法）\n\n```python\ndef product_except_self(nums: list[int]) -> list[int]:\n    n = len(nums)\n    res = [1] * n\n    prefix = 1               # 左侧累积乘积\n    for i in range(n):\n        res[i] = prefix      # res[i] 先存「左边所有元素乘积」\n        prefix *= nums[i]\n    suffix = 1               # 右侧累积乘积\n    for i in range(n - 1, -1, -1):\n        res[i] *= suffix     # 再乘上「右边所有元素乘积」\n        suffix *= nums[i]\n    return res\n# 时间 O(n)，除输出外空间 O(1)；不用除法（题目硬约束）\n```\n\n### 代表解法 2：买卖股票含手续费 / 状态机（DP 模板）\n\n```python\ndef max_profit(prices: list[int]) -> int:\n    # 状态机：hold = 持有股票时的最大收益，cash = 不持有时的最大收益\n    hold, cash = float('-inf'), 0\n    for p in prices:\n        hold = max(hold, cash - p)   # 之前就持有 or 今天买入\n        cash = max(cash, hold + p)   # 之前就空仓 or 今天卖出\n    return cash                      # 最终一定空仓收益更高\n# I/II/III/IV 都是这套状态机的扩展（加交易次数维度 k）\n```\n\n### 代表解法 3：LRU 缓存（设计题代表，哈希 + 双向链表）\n\n```python\nclass Node:\n    def __init__(self, key=0, val=0):\n        self.key, self.val = key, val\n        self.prev = self.next = None\n\nclass LRUCache:\n    def __init__(self, capacity: int):\n        self.cap = capacity\n        self.cache: dict[int, Node] = {}\n        # 哨兵头尾，省掉空链表边界判断\n        self.head, self.tail = Node(), Node()\n        self.head.next, self.tail.prev = self.tail, self.head\n\n    def _remove(self, node: Node) -> None:\n        node.prev.next, node.next.prev = node.next, node.prev\n\n    def _add_front(self, node: Node) -> None:   # 插到头部（最近使用）\n        node.next = self.head.next\n        node.prev = self.head\n        self.head.next.prev = node\n        self.head.next = node\n\n    def get(self, key: int) -> int:\n        if key not in self.cache:\n            return -1\n        node = self.cache[key]\n        self._remove(node)\n        self._add_front(node)                   # 命中 → 移到最前\n        return node.val\n\n    def put(self, key: int, value: int) -> None:\n        if key in self.cache:\n            self._remove(self.cache[key])\n        node = Node(key, value)\n        self.cache[key] = node\n        self._add_front(node)\n        if len(self.cache) > self.cap:\n            lru = self.tail.prev                # 尾部 = 最久未用\n            self._remove(lru)\n            del self.cache[lru.key]\n# get/put 均摊 O(1)；面试官常追问：为什么双向链表？→ 删除节点要 O(1) 找前驱\n```\n\n---\n\n## ④ ML / DL 手撕（真正的区分点）\n\n> 下面的 Attention 代码采用**递进式**：先 ScaledDotProduct，再 MultiHead（含两种 mask），再端到端 forward，最后 KV Cache 与 MQA/GQA。面试常从第一段让你写起，写顺了往上加追问。\n\n### 4.1 头号高频：Attention 递进式手撕 ⭐\n\n> **先看动画建立张量直觉**：MHA 翻车的根因是「维度拆/合脑子里转不过来」。下面这张图把 MHA 的四步张量变换演一遍——**split → 各 head 并行 attention → concat → W_o 投影**，记住维度全程对齐，再去看代码就不会乱。\n\n<div class=\"anim\" data-anim=\"mha-split\"><\/div>\n\n> 看完动画的一句话锚点：`(B,S,d_model) --view+transpose--> (B,h,S,d_k)`，每个 head 在自己的 d_k 子空间里独立算 `softmax(QKᵀ/√d_k)·V`，算完 `transpose+view` 拼回 `(B,S,d_model)`，最后过 `W_o`。**多头不增加计算量，只是把表示空间拆成 h 个子空间并行**。\n\n#### Step 1 · Scaled Dot-Product Attention\n\n```python\nimport math\nimport torch\nimport torch.nn.functional as F\n\ndef scaled_dot_product_attention(q, k, v, mask=None):\n    # q, k, v: (batch, n_heads, seq, d_k)\n    d_k = q.size(-1)\n    # scores: (batch, n_heads, seq_q, seq_k)\n    scores = torch.matmul(q, k.transpose(-2, -1)) / math.sqrt(d_k)  # ← 缩放 1/√d_k\n    if mask is not None:\n        # mask 中为 0 的位置置为 -inf，softmax 后权重→0\n        scores = scores.masked_fill(mask == 0, float('-inf'))\n    attn = torch.softmax(scores, dim=-1)                            # 在 key 维归一\n    out = torch.matmul(attn, v)                                     # (batch, n_heads, seq_q, d_k)\n    return out, attn\n```\n\n**扣分点（面试官盯这几个）**：\n1. **忘记除以 √d_k**——这是最常见的当场翻车。原因：`q·k` 是 d_k 个独立项求和，方差随 d_k 线性增长，d_k 大时点积进入 softmax 的饱和区，梯度趋近 0；除 √d_k 把方差拉回 1 量级。能现场推「方差为什么是 d_k」是高分。\n2. **softmax 维度搞错**——必须 `dim=-1`（对 key 归一），不是对 query。\n3. **mask 用加法还是填充**——`masked_fill(-inf)` 干净；也可以加一个 `-1e9` 的偏置矩阵，但 `-inf` 更标准。\n\n#### Step 2 · MultiHeadAttention（含 causal mask + padding mask）\n\n```python\nimport torch.nn as nn\n\nclass MultiHeadAttention(nn.Module):\n    def __init__(self, d_model: int, num_heads: int, dropout: float = 0.0):\n        super().__init__()\n        assert d_model % num_heads == 0, \"d_model 必须能被 num_heads 整除\"\n        self.d_model = d_model\n        self.num_heads = num_heads\n        self.d_k = d_model // num_heads          # 每个 head 的维度\n        self.w_q = nn.Linear(d_model, d_model)\n        self.w_k = nn.Linear(d_model, d_model)\n        self.w_v = nn.Linear(d_model, d_model)\n        self.w_o = nn.Linear(d_model, d_model)   # 多头拼接后的输出投影\n        self.dropout = nn.Dropout(dropout)\n\n    def _split_heads(self, x, batch):\n        # (batch, seq, d_model) -> (batch, num_heads, seq, d_k)\n        return x.view(batch, -1, self.num_heads, self.d_k).transpose(1, 2)\n\n    def forward(self, query, key, value, mask=None):\n        # query/key/value: (batch, seq, d_model)\n        batch = query.size(0)\n        q = self._split_heads(self.w_q(query), batch)   # (batch, h, seq_q, d_k)\n        k = self._split_heads(self.w_k(key),   batch)   # (batch, h, seq_k, d_k)\n        v = self._split_heads(self.w_v(value), batch)\n        if mask is not None:\n            mask = mask.unsqueeze(1)                     # (batch,1,seq,seq) 广播到所有 head\n        out, _ = scaled_dot_product_attention(q, k, v, mask)  # (batch, h, seq_q, d_k)\n        # 合并多头：transpose 回来再 view，contiguous 不可省\n        out = self.dropout(out)\n        out = out.transpose(1, 2).contiguous().view(batch, -1, self.d_model)\n        return self.w_o(out)                             # (batch, seq_q, d_model)\n\n\n# 两种 mask 的构造（高频追问）\ndef causal_mask(seq_len):\n    # 下三角为 1，禁止看未来 token；shape (1, seq, seq)\n    return torch.tril(torch.ones(seq_len, seq_len)).unsqueeze(0)\n\ndef padding_mask(lengths, max_len):\n    # lengths: (batch,) 每条真实长度；返回 (batch, 1, max_len) 屏蔽 padding 位\n    idx = torch.arange(max_len)\n    return (idx[None, :] < lengths[:, None]).unsqueeze(1).long()\n```\n\n![多头注意力维度拆合：分股各算再缝回](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/12-1-mha-reshape.png ':class=xh-illust')\n\n**扣分点**：\n- **多头维度变换**：核心是 `(B, S, d_model) → view(B, S, H, d_k) → transpose(1,2) → (B, H, S, d_k)`，合并时反着来。`transpose` 后 `view` 前**必须 `.contiguous()`**，否则报错——这是 Java 转 Python 最容易漏的。\n- **每 head 维度 = d_model / num_heads**：所以参数量与单头一致，多头不增加计算量，只是把表示空间拆成多个子空间。\n- **mask 的 `unsqueeze(1)`**：让 mask 在 head 维广播，写漏会维度对不上。\n\n#### Step 3 · 端到端 SelfAttention forward（self vs cross 差异）\n\n```python\n# Self-Attention：q=k=v 都来自同一序列 x\nclass SelfAttention(nn.Module):\n    def __init__(self, d_model, num_heads):\n        super().__init__()\n        self.mha = MultiHeadAttention(d_model, num_heads)\n    def forward(self, x, mask=None):\n        return self.mha(x, x, x, mask)          # ← 三个入参同源 = self\n\n# Cross-Attention：q 来自 decoder，k/v 来自 encoder 输出（如翻译、RAG 把检索结果当 memory）\nclass CrossAttention(nn.Module):\n    def __init__(self, d_model, num_heads):\n        super().__init__()\n        self.mha = MultiHeadAttention(d_model, num_heads)\n    def forward(self, x_decoder, memory_encoder, mask=None):\n        return self.mha(x_decoder, memory_encoder, memory_encoder, mask)  # q≠k=v\n```\n\n> **self vs cross 的本质差异**（必答）：self-attention 的 q/k/v 同源，每个位置在「自己这条序列」内部建模依赖；cross-attention 的 query 来自一条序列、key/value 来自**另一条序列**，用于「把 B 序列的信息注入 A 序列」（encoder-decoder 翻译、多模态对齐）。\n\n#### Step 4 · KV Cache（推理加速，高频追问的落点）\n\n```python\nclass MHAWithKVCache(nn.Module):\n    def __init__(self, d_model, num_heads):\n        super().__init__()\n        self.h, self.d_k, self.d_model = num_heads, d_model // num_heads, d_model\n        self.w_q = nn.Linear(d_model, d_model)\n        self.w_k = nn.Linear(d_model, d_model)\n        self.w_v = nn.Linear(d_model, d_model)\n        self.w_o = nn.Linear(d_model, d_model)\n\n    def forward(self, x, kv_cache=None):\n        # 解码阶段 x 只有新生成的 1 个 token: (batch, 1, d_model)\n        b, s, _ = x.shape\n        q = self.w_q(x).view(b, s, self.h, self.d_k).transpose(1, 2)  # (b, h, s, d_k)\n        k = self.w_k(x).view(b, s, self.h, self.d_k).transpose(1, 2)\n        v = self.w_v(x).view(b, s, self.h, self.d_k).transpose(1, 2)\n        if kv_cache is not None:\n            past_k, past_v = kv_cache\n            k = torch.cat([past_k, k], dim=2)   # 拼上历史 K: (b, h, s_past+s, d_k)\n            v = torch.cat([past_v, v], dim=2)   # 拼上历史 V\n        new_cache = (k, v)                       # 缓存供下一步复用\n        scores = torch.matmul(q, k.transpose(-2, -1)) / math.sqrt(self.d_k)\n        attn = torch.softmax(scores, dim=-1)\n        out = torch.matmul(attn, v).transpose(1, 2).contiguous().view(b, s, self.d_model)\n        return self.w_o(out), new_cache\n```\n\n**要点**：自回归解码时，新 token 的 **Q 只有 1 行**，但要和**全部历史 K/V** 做注意力。把历史 K/V 缓存下来，每步只算新 token 的 K/V 再拼接，把每步 O(n²) 降到 O(n)。**显存代价**：缓存大小 `= 2 × layers × n_heads × seq × d_k × dtype`，这是长上下文显存爆炸的根因——也是 MQA/GQA 要解决的问题。\n\n#### Step 5 · MQA / GQA（减小 KV Cache）\n\n```python\nclass GroupedQueryAttention(nn.Module):\n    \"\"\"num_kv_heads=1 即 MQA；num_kv_heads=num_heads 即标准 MHA。\"\"\"\n    def __init__(self, d_model, num_heads, num_kv_heads):\n        super().__init__()\n        assert num_heads % num_kv_heads == 0\n        self.h, self.kv_h = num_heads, num_kv_heads\n        self.g = num_heads // num_kv_heads          # 每组共享 1 个 KV head 的 query 头数\n        self.d_k, self.d_model = d_model // num_heads, d_model\n        self.w_q = nn.Linear(d_model, d_model)\n        self.w_k = nn.Linear(d_model, num_kv_heads * self.d_k)  # ← KV 投影更小\n        self.w_v = nn.Linear(d_model, num_kv_heads * self.d_k)\n        self.w_o = nn.Linear(d_model, d_model)\n\n    def forward(self, x):\n        b, s, _ = x.shape\n        q = self.w_q(x).view(b, s, self.h,    self.d_k).transpose(1, 2)  # (b, h,    s, d_k)\n        k = self.w_k(x).view(b, s, self.kv_h, self.d_k).transpose(1, 2)  # (b, kv_h, s, d_k)\n        v = self.w_v(x).view(b, s, self.kv_h, self.d_k).transpose(1, 2)\n        # 每个 KV head 复制 g 份，对齐到 query head 数\n        k = k.repeat_interleave(self.g, dim=1)      # (b, h, s, d_k)\n        v = v.repeat_interleave(self.g, dim=1)\n        scores = torch.matmul(q, k.transpose(-2, -1)) / math.sqrt(self.d_k)\n        out = torch.matmul(torch.softmax(scores, -1), v)\n        out = out.transpose(1, 2).contiguous().view(b, s, self.d_model)\n        return self.w_o(out)\n```\n\n> **一句话区分**：MHA 每个 query head 配独立 KV head；**MQA** 所有 query head 共享 **1 个** KV head（KV Cache 最省，但质量损失大）；**GQA** 把 query head 分组、每组共享 1 个 KV head（折中，Llama 2/3 用它）。省的是 **KV Cache 显存与解码带宽**，不是计算量。\n\n---\n\n### 4.2 基础组件（NumPy 手撕，签到题但常错）\n\n```python\nimport numpy as np\n\n# Softmax —— 必须减 max 做数值稳定，否则 exp 溢出\ndef softmax(x, axis=-1):\n    x = x - np.max(x, axis=axis, keepdims=True)   # ← 关键：防 exp 上溢\n    e = np.exp(x)\n    return e / np.sum(e, axis=axis, keepdims=True)\n\n# Cross Entropy（多分类，labels 为类别索引）\ndef cross_entropy(logits, labels):\n    # logits: (N, C); labels: (N,)\n    probs = softmax(logits, axis=1)\n    n = logits.shape[0]\n    nll = -np.log(probs[np.arange(n), labels] + 1e-12)  # 取正确类概率的 -log\n    return np.mean(nll)\n\n# Sigmoid 及其导数（追问必考）\ndef sigmoid(x):\n    return 1.0 / (1.0 + np.exp(-np.clip(x, -500, 500)))  # clip 防溢出\ndef sigmoid_grad(x):\n    s = sigmoid(x)\n    return s * (1 - s)                                    # σ'(x) = σ(x)(1-σ(x))\n\n# 余弦相似度（RAG / 向量检索基础）\ndef cosine_similarity(a, b):\n    return np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b) + 1e-12)\n```\n\n**扣分点**：Softmax 不减 max（大 logits 直接 `inf/nan`）；CE 忘了 `+1e-12` 防 `log(0)`；Sigmoid 不 clip 在大负数时 `exp` 溢出 warning。\n\n---\n\n### 4.3 训练手撕：BP / SGD / K-means（NumPy）\n\n#### 反向传播 BP（两层 MLP，从零手算梯度）\n\n```python\ndef train_mlp(X, y, hidden=8, lr=0.5, epochs=2000):\n    # X: (N, 2), y: (N, 1) 二分类标签\n    n, d = X.shape\n    W1, b1 = np.random.randn(d, hidden) * 0.5, np.zeros((1, hidden))\n    W2, b2 = np.random.randn(hidden, 1) * 0.5, np.zeros((1, 1))\n    for _ in range(epochs):\n        # ---- 前向 ----\n        z1 = X @ W1 + b1          # (N, hidden)\n        a1 = np.tanh(z1)          # 激活\n        z2 = a1 @ W2 + b2         # (N, 1)\n        a2 = sigmoid(z2)          # 输出概率\n        # ---- 反向（BCE + sigmoid 的简化梯度）----\n        dz2 = (a2 - y) / n                  # dL/dz2 = (ŷ - y)/N\n        dW2 = a1.T @ dz2                    # (hidden, 1)\n        db2 = dz2.sum(0, keepdims=True)\n        da1 = dz2 @ W2.T                    # 链式回传到隐层\n        dz1 = da1 * (1 - a1 ** 2)          # tanh'(z) = 1 - tanh²(z)\n        dW1 = X.T @ dz1\n        db1 = dz1.sum(0, keepdims=True)\n        # ---- 更新 ----\n        W1 -= lr * dW1; b1 -= lr * db1\n        W2 -= lr * dW2; b2 -= lr * db2\n    return W1, b1, W2, b2\n# 实测在 XOR 类数据上可收敛到 ~99% 准确率\n```\n\n> **高分点**：能徒手写出 `dz2 = (ŷ - y)`（sigmoid+BCE 的梯度恰好这么干净，是因为求导项相消，能现场推算大加分）、`tanh' = 1 - tanh²`、以及链式法则的回传方向。\n\n#### SGD 线性回归\n\n```python\ndef sgd_linear_regression(X, y, lr=0.05, epochs=1000):\n    # X: (N, D), y: (N,)\n    n, d = X.shape\n    w, b = np.zeros(d), 0.0\n    for _ in range(epochs):\n        y_hat = X @ w + b\n        err = y_hat - y                  # 残差\n        w -= lr * (X.T @ err) / n        # ∂MSE/∂w = (2/N) Xᵀ(ŷ-y)，常数 2 吸进 lr\n        b -= lr * err.mean()\n    return w, b\n```\n\n#### K-means\n\n```python\ndef kmeans(X, k, iters=100, seed=0):\n    rng = np.random.default_rng(seed)\n    centers = X[rng.choice(len(X), k, replace=False)]   # 随机初始化质心\n    for _ in range(iters):\n        # 每个点到各质心的距离: (N, k)\n        dist = np.linalg.norm(X[:, None, :] - centers[None, :, :], axis=2)\n        labels = dist.argmin(axis=1)                    # 分配到最近质心\n        new_centers = np.array([\n            X[labels == j].mean(axis=0) if (labels == j).any() else centers[j]\n            for j in range(k)\n        ])\n        if np.allclose(new_centers, centers):           # 收敛即停\n            break\n        centers = new_centers\n    return labels, centers\n```\n\n> **K-means 追问**：怎么选 k（肘部法 / 轮廓系数）、初始化敏感（k-means++）、为什么会收敛（每步单调降低簇内平方和）、空簇怎么办（保留旧质心或重新随机）。\n\n---\n\n### 4.4 解码采样：greedy / temperature / top-k / top-p / beam（LLM 岗高频）\n\n```python\nimport numpy as np\n\ndef softmax_1d(x):\n    x = x - np.max(x)\n    e = np.exp(x)\n    return e / e.sum()\n\ndef sample_next_token(logits, temperature=1.0, top_k=0, top_p=1.0, seed=0):\n    rng = np.random.default_rng(seed)\n    # 1) Temperature：缩放 logits，T<1 更确定，T>1 更随机；T→0 退化为 greedy\n    logits = logits / max(temperature, 1e-8)\n    # 2) Top-K：只保留概率最高的 k 个，其余置 -inf\n    if top_k > 0:\n        kth = np.sort(logits)[-top_k]\n        logits = np.where(logits < kth, -np.inf, logits)\n    probs = softmax_1d(logits)\n    # 3) Top-P（nucleus）：保留累积概率达 p 的最小集合\n    if top_p < 1.0:\n        idx = np.argsort(probs)[::-1]          # 概率降序\n        cumsum = np.cumsum(probs[idx])\n        cutoff = np.searchsorted(cumsum, top_p) + 1\n        keep = idx[:cutoff]\n        masked = np.zeros_like(probs)\n        masked[keep] = probs[keep]\n        probs = masked / masked.sum()          # 重新归一\n    return rng.choice(len(probs), p=probs)\n\ndef greedy_decode(logits):\n    return int(np.argmax(logits))              # 直接取最大，无随机性\n\ndef beam_search(step_logprobs, beam_width=2):\n    # step_logprobs: list[np.ndarray]，每步词表的 log 概率\n    beams = [([], 0.0)]                         # (序列, 累积 log 概率)\n    for lp in step_logprobs:\n        cand = []\n        for seq, score in beams:\n            for tok in range(len(lp)):\n                cand.append((seq + [tok], score + lp[tok]))  # 累加 log 概率\n        beams = sorted(cand, key=lambda x: -x[1])[:beam_width]  # 保留 top-w\n    return beams[0]                            # 返回得分最高的序列\n```\n\n> **追问链**：temperature / top-k / top-p 的**生效顺序**（先 temperature 调分布 → 再 top-k 硬截断 → 再 top-p 动态截断 → 采样）；top-k 固定候选数 vs top-p 动态候选数的差异；beam search 为何用 **log 概率累加**（连乘会数值下溢）；代码生成场景为什么调低 temperature（0.2–0.4）。\n\n> **配合动画建立直觉**：把上面这段代码「在一排概率柱上演一遍」——同一组 logits，看每个策略**砍掉哪些候选、在剩下里怎么采样**，比死记顺序好用得多。\n\n<div class=\"anim\" data-anim=\"sampling-decode\"><\/div>\n\n![解码采样四策略：概率柱上各砍各的](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/12-3-sampling-gate.png ':class=xh-illust')\n\n> 看完动画的一句话锚点：**greedy** 永远取最大（确定但单调）；**temperature** 只缩放分布形状（T<1 调尖更确定、T>1 调平更随机），不砍候选；**top-k** 砍到固定 k 个；**top-p/nucleus** 砍到「累积概率刚过 p」的最小集合（分布越尖候选越少、越平候选越多，比 top-k 更自适应）。\n>\n> 想看这套采样背后「QKᵀ/√d_k → softmax 出 logits」的原理，回 §4.1 的 Attention 手撕；更系统的分词→注意力→softmax 概率链路见 [01-LLM基础原理/](01-LLM基础原理/)。采样参数在**推理服务**里怎么落地（vLLM / TGI 的 `temperature`/`top_p`/`top_k`、与 KV Cache / 批处理的关系）见 [06-推理优化与部署/](06-推理优化与部署/)；在 **Prompt 层**怎么用这几个旋钮控制结构化输出的稳定性（事实问答调低温、JSON 输出收紧 top-p）见 [02-Prompt工程与结构化输出/](02-Prompt工程与结构化输出/)。\n\n---\n\n### 4.5 CV 背景加分项 + LLM 应用（按需）\n\n> 你若简历有 CV 经历，下面这几个常被点名；纯 LLM 方向可略读。\n\n```python\n# IoU + NMS（目标检测）\ndef iou(b1, b2):\n    # box = [x1, y1, x2, y2]\n    x1, y1 = max(b1[0], b2[0]), max(b1[1], b2[1])\n    x2, y2 = min(b1[2], b2[2]), min(b1[3], b2[3])\n    inter = max(0, x2 - x1) * max(0, y2 - y1)\n    a1 = (b1[2] - b1[0]) * (b1[3] - b1[1])\n    a2 = (b2[2] - b2[0]) * (b2[3] - b2[1])\n    return inter / (a1 + a2 - inter + 1e-12)\n\ndef nms(boxes, scores, thr=0.5):\n    idx = scores.argsort()[::-1].tolist()      # 按置信度降序\n    keep = []\n    while idx:\n        i = idx.pop(0)\n        keep.append(i)\n        idx = [j for j in idx if iou(boxes[i], boxes[j]) < thr]  # 抑制高度重叠框\n    return keep\n\n# Focal Loss（类别不均衡）\ndef focal_loss(p, y, gamma=2.0, alpha=0.25):\n    pt = np.where(y == 1, p, 1 - p)            # 预测正确类的概率\n    a = np.where(y == 1, alpha, 1 - alpha)\n    return -np.mean(a * (1 - pt) ** gamma * np.log(pt + 1e-12))  # 易样本降权\n\n# InfoNCE（对比学习 / 检索召回）\ndef info_nce(q, k_pos, k_negs, tau=0.07):\n    q = q / np.linalg.norm(q)\n    k_pos = k_pos / np.linalg.norm(k_pos)\n    k_negs = k_negs / np.linalg.norm(k_negs, axis=1, keepdims=True)\n    logits = np.concatenate([[q @ k_pos], k_negs @ q]) / tau    # 正样本在第 0 位\n    logits -= logits.max()\n    p = np.exp(logits) / np.exp(logits).sum()\n    return -np.log(p[0] + 1e-12)               # 本质是「正样本为目标类」的交叉熵\n```\n\n```python\n# BPE 分词训练（toy 版，理解原理即可）\nfrom collections import Counter\n\ndef bpe_train(corpus, num_merges):\n    vocab = [list(w) + ['<\/w>'] for w in corpus]   # 词尾标记\n    merges = []\n    for _ in range(num_merges):\n        pairs = Counter()\n        for word in vocab:\n            for i in range(len(word) - 1):\n                pairs[(word[i], word[i + 1])] += 1  # 统计相邻 pair 频次\n        if not pairs:\n            break\n        best = max(pairs, key=pairs.get)            # 合并最高频 pair\n        merges.append(best)\n        vocab = [_merge_word(w, best) for w in vocab]\n    return merges\n\ndef _merge_word(word, pair):\n    out, i = [], 0\n    while i < len(word):\n        if i < len(word) - 1 and (word[i], word[i + 1]) == pair:\n            out.append(word[i] + word[i + 1]); i += 2\n        else:\n            out.append(word[i]); i += 1\n    return out\n\n# RAG 最简检索：向量 top-k\ndef retrieve_topk(query_vec, doc_vecs, k=3):\n    q = query_vec / np.linalg.norm(query_vec)\n    d = doc_vecs / np.linalg.norm(doc_vecs, axis=1, keepdims=True)\n    sims = d @ q                                # 余弦相似度\n    idx = np.argsort(sims)[::-1][:k]            # 取最相似的 k 个\n    return idx, sims[idx]\n```\n\n---\n\n### 4.6 位置编码与归一化：RoPE / RMSNorm / LayerNorm（2025–2026 新晋高频 ⭐）\n\n> 这一组是**近一年面经里涨得最快的手撕题**。RoPE 是现代 LLM（Llama / Qwen / DeepSeek 全系）的标配位置编码，RMSNorm 取代 LayerNorm 成为主流——面试官常用它们来区分「只会背 Transformer 论文」和「真读过现代 LLM 源码」的人。\n\n#### RoPE 旋转位置编码（高频，几乎和 MHA 绑定问）\n\n```python\nimport torch\n\ndef precompute_rope(dim: int, seq_len: int, theta: float = 10000.0):\n    # dim = head_dim（每个 head 的维度，必须偶数）\n    # inv_freq: (dim/2,) 每两维一组的旋转频率，维度越靠后转得越慢\n    inv_freq = 1.0 / (theta ** (torch.arange(0, dim, 2).float() / dim))\n    pos = torch.arange(seq_len).float()                 # (seq,)\n    freqs = torch.outer(pos, inv_freq)                  # (seq, dim/2) 每个位置×每个频率\n    emb = torch.cat([freqs, freqs], dim=-1)             # (seq, dim) 复制一份对齐 rotate_half\n    return emb.cos(), emb.sin()                         # 各 (seq, dim)\n\ndef rotate_half(x):\n    # 把后一半取负搬到前面：[x1, x2] -> [-x2, x1]，实现二维旋转\n    x1, x2 = x[..., : x.shape[-1] // 2], x[..., x.shape[-1] // 2 :]\n    return torch.cat([-x2, x1], dim=-1)\n\ndef apply_rope(q, k, cos, sin):\n    # q, k: (batch, n_heads, seq, head_dim); cos/sin: (seq, head_dim)\n    cos = cos.unsqueeze(0).unsqueeze(0)                 # (1,1,seq,head_dim) 广播\n    sin = sin.unsqueeze(0).unsqueeze(0)\n    q_rope = q * cos + rotate_half(q) * sin             # 对 q 做位置旋转\n    k_rope = k * cos + rotate_half(k) * sin             # 对 k 做位置旋转\n    return q_rope, k_rope\n# 用法：在 split_heads 之后、算 scores 之前，对 q/k 应用 apply_rope（v 不转）\n```\n\n**核心要点（必答）**：\n1. **RoPE 加在哪**：不是加在 embedding 上，而是**在 attention 内部、对每个 head 的 q 和 k 各做一次旋转**（v 不动）。所以它是「乘性」的、作用在 `(seq, head_dim)` 粒度。\n2. **为什么是「相对」位置**：旋转后 `qᵢ·kⱼ` 的结果**只依赖位置差 `i-j`**（旋转矩阵相乘 = 角度相减），所以模型天然学到相对位置关系——这是绝对位置编码做不到的。能现场说「点积只和相对位置有关」是高分。\n3. **外推性**：RoPE 对超过训练长度的序列外推能力更好；长上下文常配 **NTK-aware / 线性插值 / YaRN** 改 `theta` 或缩放频率来扩窗——这是「长上下文怎么做」追问的落点。\n4. **head_dim 必须偶数**：因为每两维配成一对做二维旋转。\n\n#### RMSNorm（现代 LLM 主流，取代 LayerNorm）\n\n```python\nimport torch.nn as nn\n\nclass RMSNorm(nn.Module):\n    def __init__(self, dim: int, eps: float = 1e-6):\n        super().__init__()\n        self.eps = eps\n        self.weight = nn.Parameter(torch.ones(dim))     # 只有缩放，没有偏置 β\n    def forward(self, x):\n        # 只用均方根归一，不减均值（比 LayerNorm 少一半统计量，更快）\n        rms = torch.rsqrt(x.pow(2).mean(dim=-1, keepdim=True) + self.eps)\n        return self.weight * (x * rms)                  # γ ⊙ (x / RMS(x))\n```\n\n#### LayerNorm（对照，传统做法）\n\n```python\nclass LayerNorm(nn.Module):\n    def __init__(self, dim: int, eps: float = 1e-5):\n        super().__init__()\n        self.gamma = nn.Parameter(torch.ones(dim))\n        self.beta = nn.Parameter(torch.zeros(dim))\n        self.eps = eps\n    def forward(self, x):\n        mean = x.mean(dim=-1, keepdim=True)\n        var = x.var(dim=-1, keepdim=True, unbiased=False)  # 注意 unbiased=False\n        return self.gamma * (x - mean) / torch.sqrt(var + self.eps) + self.beta\n```\n\n> **RMSNo
