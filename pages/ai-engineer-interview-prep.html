/* —— 主题色变量（亮色默认 + body.dark 覆盖）—— */
:root {
  --bg-card: #ffffff;
  --bg-elev: #f6f8fc;
  --fg: #1a2236;
  --fg-soft: #41506e;
  --fg-mut: #8893ad;

  --accent: #2b8fd6;
  --accent2: #7c5cf0;
  --accent3: #10a36a;
  --warn: #e0920a;
  --danger: #e11d48;
  --grad-soft: linear-gradient(120deg, #2b8fd61a, #7c5cf01a);
  --anim-shadow: 0 8px 30px -14px #1a223622, 0 2px 8px -4px #1a223615;
}
body.dark,
html[data-theme='dark'] {
  --bg-card: #131a2b;
  --bg-elev: #111726;
  --fg: #e6ecff;
  --fg-soft: #aab4d4;
  --fg-mut: #6c7795;
  --border: #1f2940;
  --accent: #5ed1ff;
  --accent2: #a78bfa;
  --accent3: #34d399;
  --warn: #fbbf24;
  --danger: #fb7185;
  --grad-soft: linear-gradient(120deg, #5ed1ff22, #a78bfa22);
  --anim-shadow: 0 8px 40px -12px #000a, 0 2px 10px -4px #0008;
}

/* —— 动画卡片 —— */
.anim {
  position: relative;
  margin: 1.8em 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--anim-shadow);
  overflow: hidden;
  min-height: 120px;
}
.anim::after {
  content: attr(data-caption);
  display: block;
  padding: 2px 16px 12px;
  font-size: 12px; color: var(--fg-mut); pointer-events: none;
}
.anim .anim-title {
  font-size: 13px; font-weight: 650; color: var(--fg);
  padding: 12px 16px 0; letter-spacing: .3px;
}
.anim .anim-stage { padding: 8px 10px 10px; }
.anim svg { display: block; width: 100%; height: auto; }
.anim-toolbar { position: absolute; top: 10px; right: 12px; z-index: 5; display: flex; gap: 8px; }
.anim-btn {
  font-size: 19px; line-height: 1; color: var(--fg-mut); background: transparent;
  border: none; padding: 2px 4px; cursor: pointer;
  transition: color .15s, transform .25s;
}
.anim-btn:hover { color: var(--accent); transform: rotate(-90deg); }

    <style id="station-chrome">

      /* 右上角：搜索——无边框幽灵图标，贴近角落（同左下齿轮） */
      .station-toolbar { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 80; }
      .chrome-btn {
        width: 30px; height: 30px; border-radius: 8px; cursor: pointer; color: var(--fg-mut);
        display: inline-flex; align-items: center; justify-content: center;
        background: transparent; border: none; box-shadow: none; font-family: inherit;
        transition: color .15s, transform .15s;
      }
      .chrome-btn:hover { color: var(--accent); transform: translateY(-1px); }
      .chrome-btn svg { width: 18px; height: 18px; }

      /* 左下角设置齿轮——无边框幽灵图标，贴近角落 */
      #station-gear {
        position: fixed; left: 10px; bottom: 10px; width: 30px; height: 30px;
        cursor: pointer; color: var(--fg-mut); z-index: 80; display: flex; align-items: center; justify-content: center;
        background: transparent; border: none; box-shadow: none;
        transition: color .2s, transform .3s;
      }
      #station-gear:hover { color: var(--accent); transform: rotate(30deg); }
      #station-gear svg { width: 18px; height: 18px; }

      /* 桌面端隐藏 docsify 自带汉堡折叠键（左下角那条蓝色横条 + 与齿轮冲突） */
      @media (min-width: 769px) { .sidebar-toggle { display: none !important; } }
      /* 移动端专属适配：保留 docsify 原生菜单树 toggle（左下），把设置齿轮挪到右下，二者不再重叠；正文满宽 + 左右对称内边距 */
      @media (max-width: 768px) {
        #station-gear { left: auto; right: 12px; bottom: 10px; }
        .sidebar-toggle { z-index: 81; }
        .content { padding-right: 0 !important; padding-left: 0 !important; }
        .markdown-section { max-width: 100% !important; padding-left: 18px !important; padding-right: 18px !important; }
      }

      /* 设置抽屉 */
      #station-backdrop { position: fixed; inset: 0; background: rgba(4, 8, 16, .42); z-index: 290; opacity: 0; pointer-events: none; transition: opacity .25s; }
      #station-backdrop.open { opacity: 1; pointer-events: auto; }
      #station-drawer { position: fixed; left: 0; top: 0; bottom: 0; width: 360px; max-width: 88vw; z-index: 300; transform: translateX(-104%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; border-radius: 0 18px 18px 0; }
      #station-drawer.open { transform: none; }
      #station-drawer .sd-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px 14px; border-bottom: 1px solid var(--border); }
      #station-drawer .sd-head span { font-size: 16px; font-weight: 750; color: var(--fg); }
      #station-drawer .sd-close { background: transparent; border: none; color: var(--fg-mut); cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
      #station-drawer .sd-close:hover { color: var(--fg); background: var(--bg-elev); }
      #station-drawer .sd-close svg { width: 16px; height: 16px; }
      #station-drawer .sd-body { padding: 8px 22px 22px; overflow-y: auto; }
      #station-drawer .sd-row { margin-top: 20px; }
      #station-drawer .sd-label { font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--fg-mut); margin-bottom: 9px; }
      #station-drawer .sd-toggle-row .sd-label kbd { margin-left: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0; text-transform: none; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-family: inherit; }
      #station-drawer .seg { display: flex; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 11px; padding: 3px; gap: 3px; }
      #station-drawer .seg button { flex: 1; border: none; background: transparent; color: var(--fg-soft); cursor: pointer; font-size: 13px; padding: 7px 6px; border-radius: 8px; transition: all .15s; font-family: inherit; }
      #station-drawer .seg button:hover { color: var(--fg); }
      #station-drawer .seg button.on { background: var(--glass); color: var(--accent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent); font-weight: 650; }
      #station-drawer .swatches { display: flex; gap: 10px; }
      #station-drawer .swatch { width: 30px; height: 30px; border-radius: 9px; cursor: pointer; border: 2px solid transparent; transition: transform .15s; }
      #station-drawer .swatch:hover { transform: scale(1.12); }
      #station-drawer .swatch.on { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bg-elev), 0 0 0 4px color-mix(in srgb, var(--accent) 60%, transparent); }
      .sw-aurora { background: linear-gradient(120deg, #5ed1ff, #a78bfa, #f472b6); }
      .sw-ocean  { background: linear-gradient(120deg, #2b8fd6, #5468ee, #6d5cf0); }
      .sw-forest { background: linear-gradient(120deg, #34d399, #10b981, #06b6d4); }
      .sw-sunset { background: linear-gradient(120deg, #fbbf24, #fb923c, #f43f5e); }
      .sw-mono   { background: linear-gradient(120deg, #94a3b8, #64748b, #475569); }
      #station-drawer .sd-toggle-row { display: flex; align-items: center; justify-content: space-between; }
      #station-drawer .sd-toggle-row .sd-label { margin-bottom: 0; }
      #station-drawer .switch { width: 44px; height: 25px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-elev); cursor: pointer; position: relative; transition: background .2s, border-color .2s; flex: none; }
      #station-drawer .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; border-radius: 50%; background: var(--fg-mut); transition: transform .2s, background .2s; }
      #station-drawer .switch.on { background: var(--grad); border-color: transparent; }
      #station-drawer .switch.on::after { transform: translateX(19px); background: #fff; }
      #station-drawer .sd-foot { margin-top: 26px; padding-top: 16px; border-top: 1px solid var(--border); }
      #station-drawer .sd-reset { width: 100%; padding: 9px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg-soft); cursor: pointer; font-size: 13px; font-family: inherit; transition: all .15s; }
      #station-drawer .sd-reset:hover { color: var(--fg); border-color: var(--accent); }

      /* 命令面板 */
      #station-cmdk { position: fixed; inset: 0; z-index: 400; display: none; }
      #station-cmdk.open { display: block; }
      #station-cmdk .cmdk-bg { position: absolute; inset: 0; background: rgba(4, 8, 16, .5); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
      #station-cmdk .cmdk-panel { position: absolute; left: 50%; top: 12vh; transform: translateX(-50%); width: 640px; max-width: 92vw; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; max-height: 72vh; }
      #station-cmdk-search { border-bottom: 1px solid var(--border); }
      #station-cmdk-search .search { margin: 0; padding: 0; border: none; position: static; }
      #station-cmdk-search .search .input-wrap { margin: 0; padding: 6px 10px; }
      #station-cmdk-search .search input { width: 100%; border: none; background: transparent; color: var(--fg); font-size: 16px; padding: 12px 8px; outline: none; font-family: inherit; }
      #station-cmdk-search .search input::placeholder { color: var(--fg-mut); }
      #station-cmdk-search .search .clear-button { display: none; }
      #station-cmdk-search .search .results-panel { display: none; border: none; background: transparent; }
      #station-cmdk-search .search .results-panel.show { display: block; }
      #station-cmdk-actions { padding: 8px; border-bottom: 1px solid var(--border); }
      #station-cmdk-actions .cmdk-hint { font-size: 11px; color: var(--fg-mut); padding: 4px 10px 6px; letter-spacing: .5px; text-transform: uppercase; }
      #station-cmdk-actions .cmdk-action { width: 100%; display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: none; background: transparent; color: var(--fg-soft); cursor: pointer; border-radius: 9px; font-size: 13.5px; font-family: inherit; text-align: left; }
      #station-cmdk-actions .cmdk-action:hover { background: var(--grad-soft); color: var(--fg); }
      #station-cmdk-actions .cmdk-action svg { width: 16px; height: 16px; opacity: .8; flex: none; }
      #station-cmdk-actions .cmdk-action kbd { margin-left: auto; font-size: 11px; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 5px; padding: 1px 7px; font-family: inherit; line-height: 1.5; }
      #station-cmdk .results-panel { padding: 6px; }
      #station-cmdk .matching-post { border: none !important; padding: 10px 12px !important; border-radius: 9px; cursor: pointer; }
      #station-cmdk .matching-post:hover, #station-cmdk .matching-post.sel { background: var(--grad-soft); }
      #station-cmdk .matching-post h2 { font-size: 14px !important; color: var(--fg) !important; margin: 0 0 3px !important; padding: 0 !important; border: none !important; }
      #station-cmdk .matching-post p { font-size: 12.5px !important; color: var(--fg-mut) !important; margin: 0 !important; }
      #station-cmdk .search-keyword { color: var(--accent) !important; }

      /* Toast */
      #station-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); padding: 10px 18px; border-radius: 11px; color: var(--fg); font-size: 13px; z-index: 500; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; }
      #station-toast.show { opacity: 1; transform: translateX(-50%); }

      /* 右侧目录开关 / 专注模式：释放列 */
      body.no-toc .content { padding-right: 2rem !important; }
      body.no-toc #right-toc { display: none !important; }
      body.zen .sidebar { transform: translateX(-100%); }
      body.zen .content { left: 0 !important; padding-right: 2rem !important; }
      body.zen .station-toolbar, body.zen #right-toc, body.zen .sidebar-toggle { display: none !important; }
      /* 目录树文字：无下划线（左侧栏 + 右侧悬浮目录，含 hover） */
      .sidebar-nav a, .sidebar-nav a:hover, .sidebar-nav a:focus,
      #right-toc a, #right-toc a:hover, #right-toc a:visited { text-decoration: none !important; border-bottom: none !important; }

      /* 设置面板内的搜索入口 */
      #station-drawer .sd-search { width: 100%; display: flex; align-items: center; gap: 9px; padding: 10px 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg-soft); font-size: 13.5px; font-family: inherit; cursor: pointer; transition: color .15s, border-color .15s; }
      #station-drawer .sd-search:hover { color: var(--fg); border-color: var(--accent); }
      #station-drawer .sd-search svg { width: 16px; height: 16px; }
      #station-drawer .sd-search kbd { margin-left: auto; font-size: 11px; color: var(--fg-mut); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; }

      /* ---- Mermaid：去黄底，卡片化，质感统一 ---- */
      .mermaid {
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px;
        padding: 18px 16px; margin: 1.6em 0; text-align: center;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      }
      .mermaid svg { max-width: 100%; height: auto; }
      /* 时序图 Note：去黄底，换中性（themeVariables 对 note 不稳，CSS 强制） */
      .mermaid rect.note { fill: #eef2f9 !important; stroke: #d3def0 !important; }
      .mermaid .noteText, .mermaid .noteText tspan { fill: #334155 !important; }
      body.dark .mermaid rect.note { fill: #222c44 !important; stroke: #3a4a6b !important; }
      body.dark .mermaid .noteText, body.dark .mermaid .noteText tspan { fill: #dfe6ff !important; }

      /* ===== 正文质感（参考 Chameleon：画布氛围光 + 文字/代码/引用精修） ===== */
      body::before {
        content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
        transform: translateZ(0); /* 提升为独立合成层，避免滚动时重绘固定渐变 */
        background:
          radial-gradient(55vw 45vh at 10% -8%, color-mix(in srgb, var(--a1) 8%, transparent), transparent 60%),
          radial-gradient(50vw 42vh at 100% 0%, color-mix(in srgb, var(--a3) 7%, transparent), transparent 55%);
      }
      .markdown-section p, .markdown-section li { color: var(--fg-soft); }
      .markdown-section strong { color: var(--fg); font-weight: 650; }
      .markdown-section a { color: var(--accent); }
      .markdown-section h1 { font-size: 2.05em; font-weight: 800; letter-spacing: -.5px; line-height: 1.25; color: var(--fg); margin: .1em 0 .7em; }
      .markdown-section h2 { font-size: 1.5em; font-weight: 750; letter-spacing: -.2px; color: var(--fg); margin-top: 2.2em; padding-bottom: .35em; border-bottom: 1px solid var(--border); }
      .markdown-section h3 { font-size: 1.22em; font-weight: 700; letter-spacing: -.1px; color: var(--accent); margin-top: 1.7em; }
      .markdown-section h4 { font-size: 1.02em; font-weight: 650; color: var(--accent2); margin-top: 1.4em; }
      body.dark .markdown-section h3 { color: var(--accent); }
      /* 行内代码：强调色淡底 pill —— 仅限非 pre 内（不污染代码块） */
      .markdown-section :not(pre) > code {
        background: color-mix(in srgb, var(--accent) 9%, var(--bg-elev));
        color: var(--accent); border: 1px solid var(--border-soft);
        padding: 2px 6px; border-radius: 6px; font-size: .88em;
      }
      body.dark .markdown-section :not(pre) > code {
        background: color-mix(in srgb, var(--a1) 16%, #0e1422); color: color-mix(in srgb, var(--a1) 72%, #fff); border-color: #ffffff14;
      }
      /* 代码块：中性表面卡片，收紧内边距，去掉默认 2.2em 顶部留白与语言角标 */
      .markdown-section pre {
        background: color-mix(in srgb, var(--fg) 4%, var(--bg-elev)) !important;
        border: 1px solid var(--border); border-radius: 12px;
        padding: 15px 18px; margin: 1.4em 0; overflow: auto; position: relative;
      }
      .markdown-section pre::after { display: none; }
      .markdown-section pre > code {
        background: transparent !important; border: none; padding: 0; border-radius: 0;
        color: var(--fg); font-size: .85em; line-height: 1.65;
      }
      body.dark .markdown-section pre { background: color-mix(in srgb, #fff 5%, var(--bg-elev)) !important; border-color: var(--border); }
      body.dark .markdown-section pre > code { color: var(--fg); }
      .markdown-section blockquote {
        border-left: 3px solid var(--accent2);
        background: linear-gradient(90deg, color-mix(in srgb, var(--accent2) 9%, transparent), transparent);
        border-radius: 0 10px 10px 0; padding: 12px 18px; margin: 1.3em 0; color: var(--fg-soft);
      }
      .markdown-section blockquote p { color: var(--fg-soft); margin: 0; }
      .markdown-section blockquote p + p { margin-top: .6em; }
      /* GitHub 风格提示框 callout（> [!NOTE]/[!TIP]/[!IMPORTANT]/[!WARNING]/[!CAUTION]）—— 由 doneEach 转换 */
      .markdown-section blockquote[data-callout] {
        border-left: 3px solid var(--cc);
        background: linear-gradient(90deg, color-mix(in srgb, var(--cc) 11%, transparent), transparent);
      }
      .markdown-section blockquote[data-callout] .callout-title { color: var(--cc); font-weight: 700; font-size: .9em; letter-spacing: .03em; margin-bottom: .35em; }
      .markdown-section blockquote[data-callout='note']      { --cc: #3b82f6; }
      .markdown-section blockquote[data-callout='tip']       { --cc: #10b981; }
      .markdown-section blockquote[data-callout='important'] { --cc: var(--accent); }
      .markdown-section blockquote[data-callout='warning']   { --cc: #f59e0b; }
      .markdown-section blockquote[data-callout='caution']   { --cc: #ef4444; }
      /* 表格：圆角卡片 + 淡淡的主题色表头带（仅 6% 强调色）+ 发丝行分隔，克制不用斑马纹 */
      .markdown-section table { display: table; width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 1.5em 0; box-shadow: 0 1px 3px rgba(0, 0, 0, .04); }
      /* 宽表格：doneEach 给每个表外包一层 .table-wrap 做横向滚动，避免长内容溢出到右侧目录；
         窄表仍撑满（table width:max-content + min-width:100%）。滚动条默认隐藏、悬停才显示（同右侧目录） */
      .markdown-section .table-wrap { overflow-x: auto; margin: 1.5em 0; border-radius: 12px; scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color .3s; }
      .markdown-section .table-wrap > table { width: max-content; min-width: 100%; margin: 0; }
      .markdown-section .table-wrap:hover { scrollbar-color: #ccc transparent; }
      body.dark .markdown-section .table-wrap:hover { scrollbar-color: #555 transparent; }
      .markdown-section .table-wrap::-webkit-scrollbar { height: 8px; }
      .markdown-section .table-wrap::-webkit-scrollbar-track { background: transparent; }
      .markdown-section .table-wrap::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; transition: background .3s; }
      .markdown-section .table-wrap:hover::-webkit-scrollbar-thumb { background: #ccc; }
      body.dark .markdown-section .table-wrap:hover::-webkit-scrollbar-thumb { background: #555; }
      .markdown-section table tr, .markdown-section table tr:nth-child(2n) { border: none; background-color: transparent; }
      .markdown-section th {
        background: color-mix(in srgb, var(--accent) 6%, var(--bg-elev));
        color: var(--fg); font-weight: 650; text-align: left;
        border: none; border-bottom: 1px solid var(--border-soft); padding: 11px 16px;
      }
      .markdown-section td { border: none; border-bottom: 1px solid var(--border-soft); color: var(--fg-soft); padding: 11px 16px; }
      .markdown-section tbody tr:last-child td { border-bottom: none; }
      .markdown-section tbody tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }

      /* ---- 封面（参考 Chameleon：粒子背景 + 渐变标题 + pill + 按钮） ---- */
      section.cover { background: var(--bg-elev) !important; }
      section.cover .cover-main { position: relative; z-index: 1; color: var(--fg); }
      section.cover .cover-main > h1, section.cover .cover-main > h1 a {
        font-size: 54px; font-weight: 850; letter-spacing: -.5px; border: none;
        background: var(--title-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      section.cover blockquote { border: none; background: none; }
      section.cover blockquote p { color: var(--fg-soft); font-size: 19px; }
      .cover-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
      section.cover .cover-main .cover-btn { display: inline-block; border-radius: 12px; padding: 12px 28px; font-weight: 600; text-decoration: none; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid var(--border) !important; color: var(--fg) !important; background: var(--bg-elev) !important; -webkit-text-fill-color: var(--fg) !important; }
      section.cover .cover-main .cover-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -14px rgba(0,0,0,.25); }
      section.cover .cover-main .cover-btn-primary { background: var(--title-grad) !important; color: #fff !important; border: none !important; -webkit-text-fill-color: #fff !important; }
      section.cover .pill { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 999px; border: 1px solid var(--border); color: var(--fg-soft); background: var(--bg-elev); margin: 3px 4px; }
      section.cover .pill.hot { border-color: color-mix(in srgb, var(--a3) 45%, transparent); color: var(--a3); }
      #cover-canvas { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; pointer-events: none; }
      body:has(section.cover.show) #right-toc, body:has(section.cover.show) #read-progress { display: none; }
    </style>

    <script>

          var s = JSON.parse(localStorage.getItem('station-settings') || '{}');
          var r = document.documentElement;
          r.dataset.accent = s.accent || 'ocean';
          if (s.fs) r.dataset.fs = s.fs;
          if (s.width) r.dataset.width = s.width;
          if (s.font) r.dataset.font = s.font;
          if (s.leading) r.dataset.leading = s.leading;
          r.dataset.nav = s.nav || 'cozy';
        } catch (e) {}
      })();
    </script>

    <!-- 右侧固定目录 -->
    <div id="right-toc">
      <div class="toc-title" onclick="toggleToc()">
        目录导航
        <span class="collapse-icon">▼</span>
      </div>
      <div id="toc-content"></div>
    </div>

    <script>
      // 目录收缩
      function toggleToc() {
        document.getElementById("right-toc").classList.toggle("collapsed");
      }

      // 右侧目录滚动条：默认隐藏，滚动时显示，停止 ~0.7s 后隐藏（hover 也显示）
      (function () {
        var toc = document.getElementById("right-toc");
        if (!toc || toc.__sbBound) return;
        toc.__sbBound = true;
        var t = null;
        toc.addEventListener("scroll", function () {
          toc.classList.add("scrolling");
          clearTimeout(t);
          t = setTimeout(function () { toc.classList.remove("scrolling"); }, 700);
        }, { passive: true });
      })();

      // ===== Docsify Station 设置系统（主题移入设置面板） =====
      (function () {
        var STORE = 'station-settings';
        var DEFAULTS = { theme: 'light', accent: 'ocean', fs: 'm', width: 'normal', font: 'sans', leading: 'normal', nav: 'cozy', motion: 'full', progress: false, toc: true, zen: false, menu: true, title: 'grad' };
        function read() { try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch (e) { return {}; } }
        var settings = Object.assign({}, DEFAULTS, read());
        if (!localStorage.getItem(STORE)) { var old = localStorage.getItem('theme'); if (old === 'dark' || old === 'light') settings.theme = old; }
        var mql = matchMedia('(prefers-color-scheme: dark)');
        function save() { localStorage.setItem(STORE, JSON.stringify(settings)); }
        function isDark() { return settings.theme === 'dark' || (settings.theme === 'auto' && mql.matches); }
        function $(id) { return document.getElementById(id); }
        function apply() {
          var r = document.documentElement;
          r.dataset.accent = settings.accent; r.dataset.fs = settings.fs; r.dataset.width = settings.width; r.dataset.font = settings.font; r.dataset.leading = settings.leading; r.dataset.nav = settings.nav; r.dataset.title = settings.title;
          document.body.classList.toggle('dark', isDark());
          document.body.classList.toggle('reduce-motion', settings.motion === 'reduced');
          document.body.classList.toggle('zen', settings.zen);
          document.body.classList.toggle('no-toc', !settings.toc);
          document.body.classList.toggle('no-progress', !settings.progress);
          document.body.classList.toggle('close', !settings.menu); // 左侧菜单树收起（docsify 原生 body.close）
          refresh();
        }
        function set(k, v) { settings[k] = v; save(); apply(); }
        function refresh() {
          document.querySelectorAll('#station-drawer [data-set]').forEach(function (el) { el.classList.toggle('on', settings[el.dataset.set] === el.dataset.val); });
          document.querySelectorAll('#station-drawer [data-toggle]').forEach(function (el) { el.classList.toggle('on', !!settings[el.dataset.toggle]); });
        }
        mql.addEventListener && mql.addEventListener('change', function () { if (settings.theme === 'auto') apply(); });

        function openD() { $('station-drawer').classList.add('open'); $('station-backdrop').classList.add('open'); }
        function closeD() { $('station-drawer').classList.remove('open'); $('station-backdrop').classList.remove('open'); }
        $('station-gear').addEventListener('click', openD);
        $('station-sd-close').addEventListener('click', closeD);
        $('station-backdrop').addEventListener('click', closeD);
        $('station-drawer').addEventListener('click', function (e) {
          var s = e.target.closest('[data-set]'); if (s) { set(s.dataset.set, s.dataset.val); return; }
          var t = e.target.closest('[data-toggle]'); if (t) { set(t.dataset.toggle, !settings[t.dataset.toggle]); }
        });
        $('station-sd-reset').addEventListener('click', function () { settings = Object.assign({}, DEFAULTS); save(); apply(); toast('已恢复默认设置'); });

        var tt = null;
        function toast(m) { var el = $('station-toast'); el.textContent = m; el.classList.add('show'); clearTimeout(tt); tt = setTimeout(function () { el.classList.remove('show'); }, 1800); }

        // 左侧菜单树收起/展开（settings.menu 持久化 → apply 里切 body.close；抽屉开关/快捷键/命令面板三处同步）
        function toggleSidebar() { set('menu', !settings.menu); toast(settings.menu ? '左侧菜单 已展开' : '左侧菜单 已收起'); }
        function typingInField() { var el = document.activeElement; return !!el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable); }

        // 命令面板：复用 docsify 搜索索引
        var moved = false;
        function ensure() { if (moved) return; var s = document.querySelector('.sidebar .search') || document.querySelector('.search'); if (s) { $('station-cmdk-search').appendChild(s); moved = true; } }
        function openK() { closeD(); ensure(); $('station-cmdk').classList.add('open'); var i = document.querySelector('#station-cmdk-search input'); if (i) setTimeout(function () { i.focus(); i.select(); }, 30); sync(); }
        function closeK() { $('station-cmdk').classList.remove('open'); sel = -1; }
        function sync() {
          var p = document.querySelector('#station-cmdk-search .results-panel');
          var i = document.querySelector('#station-cmdk-search input');
          var q = !!(i && i.value.trim());
          if (p) p.classList.toggle('show', q);
          var a = $('station-cmdk-actions'); if (a) a.style.display = q ? 'none' : 'block';
        }
        $('station-search').addEventListener('click', openK);
        $('station-cmdk-bg').addEventListener('click', closeK);
        $('station-cmdk-search').addEventListener('input', function () { sel = -1; clr(); sync(); });
        $('station-cmdk').addEventListener('click', function (e) { if (e.target.closest('.matching-post a, .matching-post')) setTimeout(closeK, 0); });
        $('station-cmdk-actions').addEventListener('click', function (e) {
          var b = e.target.closest('[data-action]'); if (!b) return; var a = b.dataset.action; closeK();
          if (a === 'theme') set('theme', isDark() ? 'light' : 'dark');
          else if (a === 'settings') openD();
          else if (a === 'top') window.scrollTo({ top: 0, behavior: 'smooth' });
          else if (a === 'home') window.location.hash = '#/';
          else if (a === 'zen') { set('zen', !settings.zen); toast(settings.zen ? '专注模式 开' : '专注模式 关'); }
          else if (a === 'sidebar') toggleSidebar();
          else if (a === 'toc') { set('toc', !settings.toc); toast(settings.toc ? '右侧目录 显示' : '右侧目录 隐藏'); }
          else if (a === 'progress') { set('progress', !settings.progress); toast(settings.progress ? '进度条 开' : '进度条 关'); }
        });
        var sel = -1;
        function items() { return Array.prototype.slice.call(document.querySelectorAll('#station-cmdk-search .matching-post')); }
        function clr() { items().forEach(function (i) { i.classList.remove('sel'); }); }
        function move(d) { var it = items(); if (!it.length) return; sel = (sel + d + it.length) % it.length; clr(); var e = it[sel]; e.classList.add('sel'); e.scrollIntoView({ block: 'nearest' }); }
        document.addEventListener('keydown', function (e) {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('station-cmdk').classList.contains('open') ? closeK() : openK(); return; }
          if (e.key === 'Escape') {
            if ($('station-cmdk').classList.contains('open')) { closeK(); return; }
            if ($('station-drawer').classList.contains('open')) { closeD(); return; }
            if (settings.zen) { set('zen', false); }
            return;
          }
          if ($('station-cmdk').classList.contains('open')) {
            if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
            else if (e.key === 'Enter') { var it = items(); if (sel >= 0 && it[sel]) (it[sel].querySelector('a') || it[sel]).click(); }
            return;
          }
          // 单键快捷键：无修饰键、不在输入框、命令面板/设置抽屉未开时才触发（跨平台一致，无需 Cmd/Ctrl）
          if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey || typingInField()) return;
          if ($('station-drawer').classList.contains('open')) return;
          var k = e.key.toLowerCase();
          if (k === 'f') { e.preventDefault(); set('zen', !settings.zen); toast(settings.zen ? '专注模式 开' : '专注模式 关'); }
          else if (k === 'm') { e.preventDefault(); toggleSidebar(); }
          else if (k === 'o') { e.preventDefault(); set('toc', !settings.toc); toast(settings.toc ? '右侧目录 显示' : '右侧目录 隐藏'); }
          else if (k === 'b') { e.preventDefault(); set('progress', !settings.progress); toast(settings.progress ? '进度条 开' : '进度条 关'); }
        });

        // 阅读进度条
        var pr = $('read-progress'), st = null;
        window.addEventListener('scroll', function () {
          if (st) return;
          st = setTimeout(function () {
            var s = window.scrollY || document.documentElement.scrollTop;
            var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (pr) pr.style.width = (h > 0 ? s / h * 100 : 0) + '%';
            st = null;
          }, 40);
        }, { passive: true });

        apply();
      })();

      // Docsify 配置
      window.$docsify = {
        name: "大厂 AI 应用/Agent 工程师 · 面试备战手册",
        repo: "",
        basePath: "/", // 站点在 docs/docsify/ 子目录，内容在 docs/* —— 从服务根(docs/)加载，访问 /docsify/
        loadSidebar: "docsify/_sidebar.md",
        coverpage: "docsify/_coverpage.md",
        onlyCover: true,
        auto2top: false, // 回顶/锚点定位由 doneEach 自管（见下方导航滚动）
        maxLevel: 1,
        subMaxLevel: 0,

        search: {
          paths: "auto",
          placeholder: "搜索...",
          noData: "无结果",
        },

        copyCode: {
          buttonText: "复制",
          successText: "已复制",
        },

        pagination: {
          previousText: "上一章",
          nextText: "下一章",
        },

        zoom: {
          selector: ".mermaid svg, img",
          background: "rgba(0,0,0,0.8)",
          delay: 300,
        },

        // 右侧目录生成插件
        plugins: [
          function (hook) {
            // 修复 marked 的 CJK 加粗 bug：中文标点紧贴 ** 紧贴 ASCII 标点时（如 转型：**"…"**）不识别加粗。
            // 渲染前在交界处插入发丝空格 U+200A（几乎不可见），跳过代码块与含行内代码的行，避免误伤。
            hook.beforeEach(function (md) {
              var CJK = '—‘-‟…　-〿㐀-鿿＀-￯';
              var AP = '"\'\\(\\[\\)\\]\\.,!?;:<>';
              var reO = new RegExp('([' + CJK + '])(\\*{1,3})(?=[' + AP + '])', 'g');
              var reC = new RegExp('([' + AP + '])(\\*{1,3})(?=[' + CJK + '])', 'g');
              var lines = md.split('\n'), inF = false, out = [];
              for (var i = 0; i < lines.length; i++) {
                var ln = lines[i];
                if (/^\s*(```|~~~)/.test(ln)) { inF = !inF; out.push(ln); continue; }
                if (inF || ln.indexOf('`') >= 0) { out.push(ln); continue; }
                out.push(ln.replace(reO, '$1 $2').replace(reC, '$1$2 '));
              }
              return out.join('\n');
            });
            hook.doneEach(function () {
              // 左侧菜单树滚动条：docsify 动态生成 .sidebar，首次渲染后绑定（滚动时显示，停 ~0.7s 隐藏；hover 也显示）
              (function () {
                var sb = document.querySelector(".sidebar");
                if (!sb || sb.__sbBound) return;
                sb.__sbBound = true;
                var st = null;
                sb.addEventListener("scroll", function () {
                  sb.classList.add("scrolling");
                  clearTimeout(st);
                  st = setTimeout(function () { sb.classList.remove("scrolling"); }, 700);
                }, { passive: true });
              })();
              // 导航滚动自管：有 ?id= 锚点→滚到该小节；纯切页→回顶（docsify 在本设置下不滚锚点、也会继承上页滚动位置）
              (function () {
                function go() {
                  var hash = location.hash, route = hash.split("?")[0];
                  var m = hash.match(/[?&]id=([^&]+)/);
                  if (m) {
                    var el = document.getElementById(decodeURIComponent(m[1]));
                    if (el) window.scrollTo(0, el.getBoundingClientRect().top + window.scrollY - 16);
                  } else if (route !== window.__lastRoute) {
                    window.scrollTo(0, 0); document.documentElement.scrollTop = 0;
                  }
                  window.__lastRoute = route;
                }
                go();
                if (!window.__navBound) {
                  window.__navBound = true; // 同页内点目录锚点不触发 docsify 重渲染，补监听
                  window.addEventListener("hashchange", function () { setTimeout(go, 30); });
                }
              })();
              // 高亮当前文档 + 选中项自动滚入侧栏可视区。
              // norm 取最后一个 # 之后（兼容 file:// 完整 href）、剥 ?id 与 .md、统一前导斜杠。
              // 延时补两次：盖过 docsify 内建高亮在 file://(offline.html) 下匹配失败后清空 active 的情况。
              (function () {
                function hl() {
                  var norm = function (h) {
                    h = (h || "").toString();
                    var i = h.lastIndexOf("#"); if (i >= 0) h = h.slice(i + 1);
                    h = h.split("?")[0].replace(/\.md$/i, "");
                    try { h = decodeURIComponent(h); } catch (e) {}
                    h = h.replace(/\/(readme|index)$/i, "").replace(/\/+$/, ""); // 目录索引归一：/README、/index、尾斜杠 视为同一页
                    if (h.charAt(0) !== "/") h = "/" + h;
                    return h;
                  };
                  var path = norm(location.hash), activeA = null;
                  document.querySelectorAll(".sidebar-nav a").forEach(function (a) {
                    var on = norm(a.getAttribute("href")) === path;
                    a.classList.toggle("active", on);
                    var li = a.closest("li");
                    if (li) li.classList.toggle("active", on);
                    if (on) activeA = a;
                  });
                  if (activeA) {
                    var sb = document.querySelector(".sidebar");
                    if (sb) {
                      var aR = activeA.getBoundingClientRect(), sR = sb.getBoundingClientRect();
                      if (aR.top < sR.top + 8 || aR.bottom > sR.bottom - 8) {
                        sb.scrollTop += (aR.top - sR.top) - (sR.height - aR.height) / 2;
                      }
                    }
                  }
                }
                hl(); setTimeout(hl, 0); setTimeout(hl, 80);
                if (!window.__hlBound) {
                  window.__hlBound = true;
                  window.addEventListener("hashchange", function () { setTimeout(hl, 30); });
                }
              })();

              // GitHub 风格提示框：把 > [!TYPE] blockquote 转成带标题的彩色 callout
              (function () {
                var LABEL = { NOTE: "提示", TIP: "建议", IMPORTANT: "重点", WARNING: "注意", CAUTION: "警告" };
                document.querySelectorAll(".markdown-section blockquote").forEach(function (bq) {
                  if (bq.dataset.callout) return;
                  var first = bq.querySelector("p");
                  if (!first) return;
                  var m = first.innerHTML.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br\s*\/?>)?\s*/i);
                  if (!m) return;
                  var type = m[1].toUpperCase();
                  bq.dataset.callout = type.toLowerCase();
                  first.innerHTML = first.innerHTML.slice(m[0].length);
                  if (!first.textContent.trim()) first.remove();
                  var title = document.createElement("div");
                  title.className = "callout-title";
                  title.textContent = LABEL[type];
                  bq.insertBefore(title, bq.firstChild);
                });
              })();

              // 宽表格外包一层 .table-wrap 以横向滚动（避免长内容溢出到右侧目录）
              (function () {
                document.querySelectorAll(".markdown-section table").forEach(function (t) {
                  var p = t.parentNode;
                  if (!p || (p.classList && p.classList.contains("table-wrap"))) return;
                  var w = document.createElement("div");
                  w.className = "table-wrap";
                  p.insertBefore(w, t);
                  w.appendChild(t);
                });
              })();

              const content = document.querySelector(".markdown-section");
              const tocContent = document.getElementById("toc-content");

              if (!content || !tocContent) return;

              const headings = content.querySelectorAll("h1, h2, h3, h4");
              let html = "";

              headings.forEach((heading) => {
                const level = heading.tagName.toLowerCase();
                const text = heading.textContent;
                const id = heading.id;

                if (id) {
                  const currentRoute = window.location.hash.split("?")[0];
                  const href = `${currentRoute}?id=${encodeURIComponent(id)}`;
                  html += `<a href="${href}" class="${level}">${text}</a>`;
                }
              });

              tocContent.innerHTML = html;

              const links = tocContent.querySelectorAll("a");

              function updateActive() {
                let current = "";
                for (let i = 0; i < headings.length; i++) {
                  const h = headings[i];
                  if (h.id && h.getBoundingClientRect().top <= 120) current = h.id;
                }
                if (!current) {
                  for (let j = 0; j < headings.length; j++) { if (headings[j].id) { current = headings[j].id; break; } }
                }
                let activeLink = null;
                links.forEach((link) => {
                  const linkId = decodeURIComponent((link.getAttribute("href").split("id=")[1]) || "");
                  const on = linkId === current;
                  link.classList.toggle("active", on);
                  if (on) activeLink = link;
                });
                // 仅在高亮项「变化时」滚动 TOC，且瞬时（不用 smooth）——消除滚动卡顿
                if (activeLink && current !== updateActive._last) {
                  updateActive._last = current;
                  activeLink.scrollIntoView({ block: "nearest" });
                }
              }
              // 更新器挂全局；滚动监听全站只注册一次（避免每翻一页累积监听器）
              window.__tocUpdate = updateActive;
              if (!window.__tocScrollBound) {
                window.__tocScrollBound = true;
                let ticking = false;
                window.addEventListener("scroll", function () {
                  if (ticking) return;
                  ticking = true;
                  requestAnimationFrame(function () {
                    if (window.__tocUpdate) window.__tocUpdate();
                    ticking = false;
                  });
                }, { passive: true });
              }
              updateActive();
            });
          },
        ],
      };
    </script>

window.__MD__ = {"/README.md": "# 大厂 AI 应用 / Agent 工程师 · 面试备战手册\n\n> 为「2 年 Java 后端 + 1 年 AI（RAG / Agent 实战）」背景量身定制 · Python 主栈 · 目标大厂 AI 应用 / Agent 工程师\n\n这不是一份\"知识点清单\"。每一章按 **核心原理 → Python 工程实现 → 面试官连环追问链 → 项目话术钩子** 组织，配真实量化数字、数学推导、可运行代码——目标是**被面试官连环深挖到数学层 / 源码层也不崩**。\n\n## 这份手册怎么帮你拿 offer：双层打法\n\n**通关层（淘汰线，必须答到反射级）** —— 答不好直接挂\n\n- [01 · LLM 基础原理](01-LLM基础原理/) — Transformer / √d_k 推导 / RoPE / GQA / KV Cache\n- [02 · Prompt 工程与结构化输出](02-Prompt工程与结构化输出/)\n- [03 · RAG 全链路 ⭐](03-RAG全链路/) — 切块 / 混合检索 / rerank / 高级 RAG / 评估\n- [04 · Agent 与工具调用 ⭐](04-Agent与工具调用/) — ReAct / Function Calling / MCP / Multi-Agent\n- [05 · 微调与对齐](05-微调与对齐/) — LoRA / QLoRA / DPO / GRPO\n- [06 · 推理优化与部署](06-推理优化与部署/) — PagedAttention / KV Cache 显存手算 / 投机解码\n\n**拉档层（差异化护城河，拿高评级 / 高薪）** —— 大多数候选人没有\n\n- [07 · Context Engineering](07-Context-Engineering上下文工程/) — 2026 头号新学科\n- [08 · Evals 与 LLMOps](08-Evals与LLMOps/) — 你 Java 背景的最强杠杆，国内蓝海\n- [09 · Agent 安全与权限工程](09-Agent安全与权限工程/) — 后端直觉直接迁移\n- [10 · 技术趋势与判断力](10-技术趋势与判断力/) — 面试里怎么\"亮判断力\"\n\n**系统设计 · 刷题 · 实操 · 收尾**\n\n- [11 · AI 应用系统设计 ⭐](11-AI应用系统设计/) — RAG 系统 / AI 客服 / LLM 网关 / 高并发服务 / 向量检索\n- [12 · 算法手撕](12-算法手撕/) — LeetCode 高频 + ML 手撕（MHA 几乎必考）\n- [13 · 实操实验室](13-实操实验室/) — 跑一次 LoRA 微调 + vLLM 部署（最大失分黑洞 → 简历资产）\n- [14 · 项目深挖与反深挖话术](14-项目深挖与反深挖话术/) — 头号淘汰原因\n- [15 · 行为面与谈薪](15-行为面与谈薪/)\n\n## 先记住这几句\n\n- **面试在考的 ≠ 行业在涨的**：RAG/Agent 八股必须滚瓜烂熟（淘汰线），但能讲\"它正往哪走\"才拿高评级。\n- **护城河公式**：后端可靠性直觉 × Evals 可证明质量 × Agent 权限安全工程。\n- **最大失分黑洞**：微调 + 部署没真做过。务必跑一次（见 [实操实验室](13-实操实验室/)）。\n\n👉 没头绪从哪开始？先读 [00 · 面试全景与冲刺策略](00-面试全景与冲刺策略/)。\n", "/06-推理优化与部署/README.md": "# 06 · 推理优化与部署\n\n> **本章在面试的位置**：这是「通关层」里**唯一能把后端老兵和八股仔区分开**的一章。RAG/Agent 谁都能背几句，但「为什么推理慢、KV Cache 占多少显存、vLLM 凭什么快 24 倍」一深挖就见功底——而你 2 年 Java 后端的「显存/吞吐/延迟/资源调度」直觉在这里是**降维优势**。面试官问到部署，本质在确认两件事：① 你懂不懂 LLM 服务的**性能瓶颈在哪**（memory-bound 还是 compute-bound）；② 你能不能**把一个开源模型真跑起来并调优**。前者靠本章手算，后者靠 [13 · 实操实验室](13-实操实验室/) 补实操（本章是「通关层·待补实操」——原理必须答到反射级，实操数字等你跑完 vLLM 回填）。\n\n---\n\n## 一、知识地图\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef mem fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef thr fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef alg fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef sys fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n\n    Root([\"推理优化与部署\"]):::root\n\n    subgraph Why[\"为什么慢\"]\n        AR[自回归逐 token]:::mem\n        MB{memory-bound?}:::mem\n        TTFT[TTFT vs TPOT]:::mem\n    end\n\n    subgraph Memory[\"显存侧优化\"]\n        KV[KV Cache]:::mem\n        Compress[压 KV<br/>GQA→MLA→KV量化→offload]:::mem\n        Paged[PagedAttention<br/>仿 OS 分页]:::mem\n        Quant[权重量化 PTQ/QAT<br/>GPTQ/AWQ/GGUF/NVFP4]:::mem\n    end\n\n    subgraph Throughput[\"吞吐侧优化\"]\n        CB[Continuous Batching]:::thr\n        Spec[投机解码<br/>EAGLE-3]:::thr\n        PC[Prefix/Prompt Caching]:::thr\n    end\n\n    subgraph Engine[\"引擎与集群\"]\n        vLLM[vLLM V1]:::sys\n        SGLang[SGLang<br/>RadixAttention]:::sys\n        TRT[TensorRT-LLM]:::sys\n        Dynamo[NVIDIA Dynamo<br/>PD 分离/KV 路由]:::sys\n    end\n\n    Root ==> Why\n    Root ==> Memory\n    Root ==> Throughput\n    Root ==> Engine\n\n    AR ==> MB\n    MB -->|是| KV\n    KV --> Compress\n    KV ==> Paged\n    Paged ==> vLLM\n    CB ==> vLLM\n    PC --> SGLang\n    Spec --> vLLM\n    Quant --> vLLM\n    vLLM -.集群扩展.-> Dynamo\n```\n\n一句话串起来：**自回归** 决定了解码阶段是 **memory-bound**（瓶颈在搬显存不是算力）→ 所以一切优化都围绕「**省显存（KV Cache/量化/PagedAttention）**」和「**把空闲算力填满（batching/投机解码）**」两条线，最后由 **vLLM/SGLang/TensorRT-LLM** 这些引擎落地，超大规模再上 **Dynamo** 做集群编排。\n\n---\n\n## 二、核心原理\n\n### 2.1 推理为什么慢：自回归 + memory-bound\n\nLLM 生成是**自回归（autoregressive）**的：第 t 个 token 必须等第 t-1 个算完才能开始。生成 N 个 token = 串行 N 次完整前向。这跟训练（一次性并行处理整段序列）完全不同。\n\n把推理拆成两个阶段，是理解一切优化的前提：\n\n| 阶段 | 干什么 | 计算特征 | 决定的指标 |\n|------|--------|----------|-----------|\n| **Prefill（预填充）** | 并行处理整个 prompt，建好 KV Cache | **compute-bound**（大矩阵乘，算力打满） | **TTFT**（首 token 延迟） |\n| **Decode（解码）** | 逐个吐 token，每步只算 1 个新 query | **memory-bound**（算力闲、带宽是瓶颈） | **TPOT**（每 token 间隔） |\n\n**为什么 decode 是 memory-bound（必杀点）**：decode 每步只处理 1 个新 token（batch=1 时），但要把**整个模型权重 + 全部 KV Cache** 从显存（HBM）搬到计算单元（SRAM）。算的量（1 个 token 的矩阵乘）远小于搬的量（几十 GB 权重）。所以 **GPU 算力大量闲置，瓶颈是显存带宽**——这正是「batching 能几乎免费提吞吐」和「量化（减少搬运量）能加速」的根本原因。\n\n![Decode是memory-bound：搬得多算得少](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/06-1-memory-bound.png ':class=xh-illust')\n\n> **手算直觉**：72B 模型 FP16 权重 = 144 GB。decode 一步要把这 144 GB 过一遍 HBM。H100 带宽约 3.35 TB/s，光搬权重就要 144/3350 ≈ **43 ms/token**（理论下限）。算力（~990 TFLOPS FP16）此时只用到零头——这就是 memory-bound。\n\n### 2.2 TTFT vs TPOT：两个指标，两套优化\n\n- **TTFT（Time To First Token）**：用户敲回车到看到第一个字。由 prefill 决定，受 **prompt 长度**主导。聊天体验关键。\n- **TPOT（Time Per Output Token，也叫 ITL）**：后续每个字的间隔。由 decode 决定。\n- **关系**：端到端延迟 ≈ TTFT + TPOT × 输出 token 数。\n\n**batch 对两者的影响相反，这是高频考点**：\n- 增大 batch → decode 从 memory-bound 往 compute-bound 移动 → **吞吐（throughput）暴涨**，但单请求 **TPOT 变长**（排队 + 算得多）。\n- prefill 本就 compute-bound → 大 batch prefill 会**拉长 TTFT**。\n\n> **一句话**：吞吐和延迟是**跷跷板**。「优化推理」必须先问「优化哪个指标」——离线批处理求吞吐（大 batch），在线对话求低延迟（小 batch + 投机解码）。\n\n### 2.3 KV Cache：解决什么\n\ndecode 第 t 步要算 attention，需要前面所有 token 的 Key 和 Value。如果不缓存，每步都要**重算前面所有 token 的 K/V**——O(N²) 的重复计算。\n\n> 不熟 attention 里 Q/K/V 怎么来、为什么 decode 每步都依赖历史 K/V 的，先回 [01 · LLM基础原理](01-LLM基础原理/) 把自注意力与自回归补到反射级——本章是它的「工程后果」。\n\n**KV Cache** 把每个 token 算过的 K、V 存下来，下一步直接读。代价是**用显存换算力**：把重复计算消掉，但 KV Cache 随序列线性增长，**长上下文 + 高并发下它会超过模型权重，成为头号显存杀手**。\n\n#### 必杀点手算①：KV Cache 显存\n\n公式（务必能默写）：\n\n```\nKV_bytes = 2 × L × n_kv × d_head × seq_len × batch × bytes_per_elem\n```\n\n- `2`：K 和 V 各一份\n- `L`：层数\n- `n_kv`：**KV 头数**（GQA 下远小于 query 头数——这正是 GQA 省 KV Cache 的原理）\n- `d_head`：每个头的维度\n- `seq_len`：上下文总长（prompt + 已生成）\n- `bytes_per_elem`：FP16 = 2\n\n**例题：Qwen2.5-72B，BS=1，输入 1024 + 输出 1024 = seq_len 2048，FP16**\n\n查 config：`L=80`，`n_kv=8`（GQA，query 头 64），`d_head=128`。\n\n```\nKV_bytes = 2 × 80 × 8 × 128 × 2048 × 1 × 2\n         = 2 × 80 × 8 × 128 × 2048 × 2\n         = 671,088,640 B\n         ≈ 640 MiB ≈ 0.625 GiB\n```\n\n**对比反衬 GQA 的威力**：如果是 MHA（n_kv=64），同样配置 KV Cache = 640 MiB × 8 = **5 GiB**。GQA 把 KV Cache 砍到 1/8——这就是为什么现代大模型几乎都用 GQA。\n\n**面试官追问「那 BS=64、seq_len=8192 呢」**：640 MiB ×（64×8192/2048）= 640 MiB × 256 = **160 GiB**——单卡 H100（80GB）放不下，KV Cache 直接成为并发上限的硬约束。**这就是 PagedAttention 要解决的问题**。\n\n> 这条「KV Cache → 并发上限」的账，正是高并发 LLM 服务做容量规划/限流/扩缩容的底层依据——从单机推理上升到整体架构怎么扛并发，见 [11 · AI应用系统设计](11-AI应用系统设计/)。\n\n#### 必杀点动画：无 cache 重算 vs 有 cache 复用\n\n<div class=\"anim\" data-anim=\"kv-cache\"><\/div>\n\n#### 压 KV Cache 的三层手段（GQA 之后的进阶，DeepSeek 是高频追问）\n\nGQA 只是「**少存几个头**」，2024-2025 还有两条更狠的线，把 KV Cache 再压一个量级——面试问完 GQA 八成接着追这个：\n\n**① MLA（Multi-head Latent Attention，DeepSeek-V2/V3 首创，必背）**\n\nGQA 是「共享 KV 头」减条数；**MLA 是「把 K/V 压到一个低秩 latent 向量再存」**——本质换了个维度省。每个 token 不再缓存完整多头 K/V，而是缓存**一个 512 维的 latent**（压缩向量），attention 时再用投影矩阵**按需解压**重建 K/V。\n\n- 实测对比：DeepSeek-V3 **每 token 仅约 70 KB** KV Cache，对比 GQA 系模型的 **192~328 KB/token**，省 **2.7~4.7x**（实测区间）。\n- **MLA vs GQA 的精度差异（加分点）**：DeepSeek-V2 消融里 GQA 比满血 MHA 略掉点，而 **MLA 不掉反略超 MHA**——这是 DeepSeek 宁愿吃 MLA 实现复杂度也要用它的根本原因。一句话：「**GQA 是减头省显存（略损精度），MLA 是低秩压缩省显存（精度反而更好），代价是实现更绕、要带解压投影**」。\n- 工程坑：MLA 与 RoPE 不天然兼容，DeepSeek 用「**解耦 RoPE**」（一部分维度走 latent、一小部分专门承载位置信息）解决——能说到这层就是真懂。\n\n**② KV Cache 量化（把 bytes_per_elem 从 2 砍到 1 甚至 0.5）**\n\n公式里 `bytes_per_elem` 直接乘进去——把 KV Cache 从 FP16(2B) 降到 **FP8(1B)** 就**直接腰斩**，INT4(~0.5B) 再砍一半。\n\n- **FP8 KV Cache**：Hopper(H100)/Blackwell(B200) 有**原生 FP8**，KV Cache 减半且对多数任务**质量损失极小**——vLLM 一个 `--kv-cache-dtype fp8` 就开，是长上下文/高并发最省事的一招。\n- INT4/2-bit（KIVI、KVQuant 等）更激进，多数模型（Llama-3.1-8B、Qwen2.5、Mistral-7B）**对低比特 KV 量化相当鲁棒**；2-bit 要配 per-channel/异常值保护才稳。\n- 区分点：**这是量化 KV Cache（运行时缓存），不是量化权重（GPTQ/AWQ）**——两套东西，别答串。\n\n**③ KV Cache offloading（显存放不下就外溢到 CPU/磁盘）**\n\n超长上下文下 KV Cache 能比权重还大——**LLaMA3-70B 服务 32 并发 × 128K 序列，KV Cache 需 >1.2 TB**（实测，比模型权重大近一个数量级）。装不下就把冷 KV 块**外溢到 CPU 内存/NVMe**，用时再搬回。瓶颈在 **PCIe 带宽**（搬运 I/O），所以要配异步预取（prefetch）藏延迟。这是「上下文长到单卡显存装不下」时的兜底，不是免费午餐。\n\n> **一句话串起来**：省 KV Cache 四级火力——**GQA（少存头）→ MLA（低秩压缩，DeepSeek）→ KV 量化（FP8/INT4 降 bytes）→ offloading（外溢 CPU）**，前三省显存、最后一招拿带宽换容量。\n\n#### 必杀点手算②：Adam 训练显存构成（常一起考，区分训练 vs 推理显存）\n\n设模型参数量 Ψ，混合精度训练（FP16 前向 + FP32 主权重）下，**每个参数**占：\n\n| 项 | 精度 | 字节/参数 |\n|----|------|----------|\n| FP16 权重副本 | FP16 | 2Ψ |\n| FP16 梯度 | FP16 | 2Ψ |\n| FP32 优化器：主权重 | FP32 | 4Ψ |\n| FP32 优化器：Adam 动量 m | FP32 | 4Ψ |\n| FP32 优化器：Adam 方差 v | FP32 | 4Ψ |\n\n合计 **2 + 2 + 12 = 16Ψ 字节/参数**（不含激活）。其中「FP32 优化器状态 12Ψ」= 主权重 4 + m 4 + v 4，是 ZeRO 要切分的大头。\n\n> 7B 模型训练显存（不含激活）= 7e9 × 16 B = 112 GB——单张 80G 卡训不动，必须 ZeRO/LoRA。**激活**另算，与 batch、序列长、层数成正比，是第 4 块（梯度检查点就是拿算力换它）。\n>\n> **一句话区分**：训练显存大头是「优化器状态 + 激活」，推理显存大头是「权重 + KV Cache」——这是两套完全不同的账本，别混。\n\n### 2.4 PagedAttention：仿 OS 分页消除碎片\n\n朴素 KV Cache 给每个请求**预留一整段连续显存**（按 max_len），问题有二：\n1. **内部碎片**：实际生成没到 max_len，预留的尾巴白占。\n2. **外部碎片 + 过度预留**：连续块难分配，利用率极低。\n\n原始 vLLM 论文实测：传统系统（如 Orca）KV Cache **实际利用率只有 20%~40%**，60%~80% 被浪费。\n\n**PagedAttention 把 OS 虚拟内存分页搬到 KV Cache**：\n- KV Cache 切成**固定大小的块（block，典型 16 个 token/块）**。\n- 块在显存里**可以不连续**，用一张**块表（block table，即页表）**把逻辑序列映射到物理块。\n- 块**按需分配**（token 来了才给块）→ 消除过度预留；最后一块外几乎无碎片 → 浪费 **< 4%**。\n\n效果：**KV Cache 利用率从 ~50% 提到 ~96%**，等价于同样显存能塞下 2~4 倍并发请求，吞吐提升 **2~4 倍**（vLLM 论文对比 baseline 最高 24x，主要来自更高并发）。块表还天然支持**写时复制（copy-on-write）**——并行采样/beam search 共享 prompt 的 KV 块，进一步省显存。\n\n```mermaid\ngraph LR\n    classDef req fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef tab fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef blk fill:#ED8936,stroke:#C66A32,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    R([\"请求逻辑序列\"]):::req\n    BT[\"块表 block table<br/>逻辑块→物理块\"]:::tab\n    B0[(物理块 7)]:::blk\n    B1[(物理块 2)]:::blk\n    B2[(物理块 9)]:::blk\n    N[\"物理块在显存里<br/>不连续 → 无外部碎片\"]:::note\n\n    R ==> BT\n    BT -->|逻辑0| B0\n    BT -->|逻辑1| B1\n    BT -->|逻辑2| B2\n    B2 -.-> N\n```\n\n### 2.5 Continuous / Dynamic Batching：吞吐 2~10x\n\n传统 **static batching**：一批请求一起进、一起出，最长的那个没生成完，短的也得干等 → GPU 大量空转。\n\n**Continuous batching（连续批处理，也叫 dynamic batching / in-flight batching）**：调度器在**每一步 decode 后**重新组 batch——谁生成完了就立刻退出、释放 KV 块，等待队列里的新请求**马上插进空位**。GPU 几乎不空转。\n\n配合 PagedAttention（退出请求秒释放块），实测吞吐相对 static batching 提升 **2~10x**。**这是 vLLM 高吞吐的另一根支柱**（PagedAttention 管显存，continuous batching 管调度）。\n\n### 2.6 量化：用精度换显存和速度\n\n把权重/激活从 FP16 降到 INT8/INT4/FP4，显存和搬运量直接减半/减四分之三 → memory-bound 场景**直接加速 + 能塞更大模型**。\n\n**两条技术路线**：\n\n| | PTQ（训练后量化） | QAT（量化感知训练） |\n|---|---|---|\n| 时机 | 训练完再量化 | 训练/微调时模拟量化误差 |\n| 成本 | 低（几百条校准数据，几分钟~几小时） | 高（要重训） |\n| 精度 | 4bit 略有损 | 更高，逼近 FP16 |\n| 用途 | **部署主流**（GPTQ/AWQ 都是 PTQ） | 极致压缩 / 4bit 还想保精度 |\n\n**量化谁**：分**只量化权重（weight-only）**和**权重+激活都量化**。权重静态、好量化；激活随输入动态变化、有离群值（outlier）、难量化——这是量化精度损失的主战场。\n\n**三个必须分清的名词（GPTQ vs AWQ vs GGUF）**：\n\n| 名字 | 是什么 | 核心思想 | 适用 |\n|------|--------|----------|------|\n| **GPTQ** | **算法**（weight-only PTQ） | 逐列量化，用 Hessian 二阶信息补偿误差 | GPU 部署，INT4 |\n| **AWQ** | **算法**（activation-aware weight-only PTQ） | 找出按激活幅度最重要的 ~1% 权重通道，先放大再量化，保护它们 | GPU 部署，校准更快、精度常更好 |\n| **GGUF** | **文件格式**（llama.cpp 系），不是算法 | 一种打包格式，支持 CPU+GPU 混合推理 | 本地/消费级、GPU-poor 场景 |\n\n> 一句话区分：GPTQ/AWQ 是「**怎么算出量化值**」的算法，GGUF 是「**怎么存这个量化模型**」的格式——问到别答串。\n\n**FP4 / NVFP4（2025 Blackwell 时代新考点）**：\n- NVFP4 是 4-bit 浮点量化，**分层缩放**：FP4 值按 16 个一组、每组配一个 **FP8 组级 scale**，再加一个 **FP32 全局 scale**——多级缩放保住动态范围，比纯 INT4 误差更小。\n- **必须混合精度**：实测「权重 FP4 + attention 走 FP8/BF16」的质量明显优于全 FP4；首尾 FFN 等敏感层保留 BF16/FP32。**纯 FP4 全量化会掉点**，这是答题加分点。\n- 内存：NVFP4 权重比 BF16 省约 3.3x，比 FP8 省约 1.5~1.8x；Blackwell（B200）有原生 FP4 Tensor Core。\n\n### 2.7 投机解码（Speculative Decoding）\n\n![投机解码：草稿猜一串，大模型一次验完](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/06-3-speculative-decode.png ':class=xh-illust')\n\n**核心思路**：用一个**小而快的 draft model（草稿模型）**一口气猜 k 个 token，再让**大的 target model 一次并行验证**这 k 个。验证是 compute-bound 的并行前向（一次过），比 target 自己串行解码 k 步快——只要草稿命中率够高，就净赚。**输出分布与大模型逐 token 解码完全一致**（用拒绝采样保证无损）。\n\n**面试必踩的坑/数字**：\n- **draft 草稿长度 3~8 个 token 最优**：太短省不了几步，太长后面命中率骤降、白算还回退。\n- **draft 与 target 的 tokenizer 必须完全相同**——否则 token 对不上，根本没法验证。这是选型硬约束。\n- **EAGLE-3（2025）**：不用独立小模型，而是训一个轻量 draft head 插进 target、复用其多层内部特征（融合早/中/晚层），加速最高约 **6.5x**（典型 3.0~6.5x，平均接受长度 τ≈4~7.5 token）。\n- **大 batch 可能反向降速**：投机解码靠「decode 是 memory-bound、算力有富余」吃红利。**batch 一大，decode 变 compute-bound，验证的额外算力没地方藏，反而更慢**——实测 batch≥8、固定草稿长 4 时甚至慢于普通解码。所以**线上必须测净收益**，高并发场景往往要动态调草稿长度甚至关掉它。\n\n```mermaid\nsequenceDiagram\n    participant U as 用户\n    participant D as Draft Model 小\n    participant T as Target Model 大\n\n    U->>D: 当前上下文\n    D->>D: 自回归猜 k 个 token（快）\n    D->>T: 草稿 [t1..tk]\n    T->>T: 一次并行验证 k 个（compute-bound）\n\n    alt 全部接受\n        T-->>U: 输出 k 个 + 免费多 1 个\n    else 第 j 个起被拒\n        T-->>U: 接受前 j-1 个，第 j 个用 target 重采样\n    end\n\n    Note over D,T: tokenizer 必须完全相同；输出分布与逐 token 解码一致（无损）\n```\n\n#### 必杀点动画：草稿猜 4 → 并行验证 → 接受 3 回退 1\n\n<div class=\"anim\" data-anim=\"speculative-decode\"><\/div>\n\n### 2.8 引擎选型与 Prompt Caching\n\n**主流引擎（按工作负载实测选，不要背死结论）**：\n\n| 引擎 | 杀手锏 | 适合 |\n|------|--------|------|\n| **vLLM V1（2025 默认架构）** | PagedAttention + continuous batching；V1 重写调度/KV 管理，**统一调度器**（prefill/decode 用一个 token 预算字典，不再硬分两阶段）、**chunked prefill 默认开**（把大 prefill 切块与 decode 拼批，平衡 compute/memory-bound）、**prefix caching 默认开**、集成 **FlashAttention 3**；整体相对 V0 吞吐约 **1.7x**（实测区间） | 通用首选、易上手、生态最全 |\n| **SGLang** | **RadixAttention**——用基数树（radix tree）做 KV 前缀的**跨请求复用**（多请求共享前缀的 KV 不重算），结构化输出强 | 共享前缀多的负载（agent/多轮/few-shot）、**DeepSeek 部署首选**，对比 vLLM 可达 ~7x 吞吐 |\n| **TensorRT-LLM** | NVIDIA 官方、编译期极致优化、kernel 最快 | 固定模型 + 追求极致延迟/吞吐、愿付编译调优成本 |\n\n> 三家没有绝对赢家，**按你的真实工作负载实测**（共享前缀比例、序列长度、并发、是否要结构化输出）。面试这么答比「vLLM 最好」高级。\n\n**Prefix Caching vs Prompt Caching**：\n- **Prefix caching**（vLLM/SGLang 引擎层）：同一前缀（如 system prompt、长文档）的 KV Cache **跨请求复用**，命中就跳过那段 prefill → 直接砍 TTFT。vLLM V1 默认开。\n- **Prompt Caching（API 层，如 Anthropic）**：开发者用 `cache_control` 标记可缓存段。**缓存读只花基础价的 10%（省 ~90% 成本）**，缓存写贵 25%；命中 2 次以上就回本，长 prompt 延迟降最高约 85%。本质同一思想（缓存不变前缀的计算），一个在自部署引擎里、一个在 API 服务里。\n\n**NVIDIA Dynamo（集群编排，超大规模才用）**：数据中心级分布式推理框架，核心是 **PD 分离（Prefill/Decode disaggregation）**——prefill 和 decode 跑在不同 worker（一个 compute-bound、一个 memory-bound，分开各自最优配比），再加 **KV-aware routing**（按 KV Cache 重叠度 + 负载把请求路由到最优 worker，最大化前缀复用），KV 传输走 NVLink/InfiniBand 直传。属于「单机 vLLM 不够用了再上」的层级。\n\n---\n\n## 三、工程实现（可运行）\n\n### 3.1 KV Cache 显存手算脚本（面试现场能口算，平时用它对答案）\n\n```python\ndef kv_cache_gib(\n    n_layers: int,\n    n_kv_heads: int,\n    head_dim: int,\n    seq_len: int,\n    batch: int = 1,\n    bytes_per_elem: int = 2,  # FP16/BF16=2, FP8=1, INT4≈0.5\n) -> float:\n    \"\"\"估算 KV Cache 显存（GiB）。\n\n    公式: 2(K&V) × L × n_kv × d_head × seq_len × batch × bytes\n    \"\"\"\n    total_bytes = 2 * n_layers * n_kv_heads * head_dim * seq_len * batch * bytes_per_elem\n    return total_bytes / (1024 ** 3)\n\n\nif __name__ == \"__main__\":\n    # Qwen2.5-72B: 80 层, GQA 8 个 KV 头, head_dim 128\n    cfg = dict(n_layers=80, n_kv_heads=8, head_dim=128)\n    print(f\"BS=1  seq=2048 : {kv_cache_gib(**cfg, seq_len=2048, batch=1):.3f} GiB\")   # ≈0.625\n    print(f\"BS=64 seq=8192 : {kv_cache_gib(**cfg, seq_len=8192, batch=64):.1f} GiB\")  # ≈160\n    # 反衬 GQA: 若 MHA(64 头)\n    mha = dict(n_layers=80, n_kv_heads=64, head_dim=128)\n    print(f\"MHA BS=1 seq=2048: {kv_cache_gib(**mha, seq_len=2048):.2f} GiB\")          # ≈5.0\n```\n\n### 3.2 Adam 训练显存构成脚本\n\n```python\ndef train_mem_gib(params_billion: float) -> dict[str, float]:\n    \"\"\"混合精度 + Adam 训练显存构成（不含激活），单位 GiB。\"\"\"\n    psi = params_billion * 1e9\n    parts = {\n        \"fp16_weights\": 2 * psi,      # 2Ψ\n        \"fp16_grads\": 2 * psi,        # 2Ψ\n        \"fp32_master\": 4 * psi,       # 优化器: 主权重\n        \"adam_m\": 4 * psi,            # 优化器: 一阶动量\n        \"adam_v\": 4 * psi,            # 优化器: 二阶方差\n    }\n    gib = {k: v / (1024 ** 3) for k, v in parts.items()}\n    gib[\"total_16psi\"] = sum(gib.values())  # ≈16Ψ\n    return gib\n\n\nif __name__ == \"__main__\":\n    for k, v in train_mem_gib(7).items():\n        print(f\"{k:14s}: {v:7.1f} GiB\")   # total ≈ 104.8 GiB(≈16×7e9, 不含激活)\n```\n\n### 3.3 vLLM 部署与压测（命令，实操跑完回填本章 → 见 [13 · 实操实验室](13-实操实验室/)）\n\n```bash\n# 1) 起服务（OpenAI 兼容）。vLLM V1 默认 prefix caching 开启\npython -m vllm.entrypoints.openai.api_server \\\n  --model Qwen/Qwen2.5-7B-Instruct \\\n  --gpu-memory-utilization 0.90 \\\n  --max-model-len 8192 \\\n  --max-num-seqs 256                 # continuous batching 的并发上限\n\n# 2) 量化版（AWQ INT4，省显存）\npython -m vllm.entrypoints.openai.api_server \\\n  --model Qwen/Qwen2.5-7B-Instruct-AWQ \\\n  --quantization awq\n\n# 3) 开投机解码（EAGLE 草稿，需匹配 tokenizer）\npython -m vllm.entrypoints.openai.api_server \\\n  --model meta-llama/Llama-3.1-8B-Instruct \\\n  --speculative-config '{\"method\":\"eagle3\",\"model\":\"<eagle3-head>\",\"num_speculative_tokens\":5}'\n\n# 4) 官方 benchmark：量 TTFT / TPOT / 吞吐（这些数字回填本章 + 简历）\nvllm bench serve \\\n  --model Qwen/Qwen2.5-7B-Instruct \\\n  --dataset-name random --num-prompts 500 \\\n  --request-rate 20\n# 关注输出: Mean TTFT(ms) / Mean TPOT(ms) / Output token throughput(tok/s)\n```\n\n> ⚠️ **待补实操**：上面 benchmark 的 TTFT/TPOT/吞吐三组数字、开关 prefix caching 与投机解码的 A/B 对比，是本章最强的简历资产。务必在 [13 · 实操实验室](13-实操实验室/) 跑一遍 7B 模型把数字填回来——「我把 7B 模型用 vLLM 部署，量化后 TTFT 从 X 降到 Y、吞吐提 Z 倍」比任何八股都值钱。\n\n---\n\n## 四、面试官连环追问链\n\n> **Q1：推理为什么慢？**\n> A：自回归——生成 N 个 token 要串行 N 次完整前向。且 decode 阶段是 memory-bound：每步只算 1 个 token，却要把整个权重 + KV Cache 过一遍 HBM，算力大量闲置，瓶颈在显存带宽。\n\n> **Q1.1（深挖）：你说 memory-bound，能算给我看吗？**\n> A：72B FP16 权重 144 GB，decode 一步至少把它过一遍 HBM。H100 带宽 ~3.35 TB/s，144/3350 ≈ 43 ms/token 是理论下限，而此时 990 TFLOPS 算力几乎没用上——典型 memory-bound。所以加大 batch 几乎免费提吞吐（把闲置算力填满）。\n\n> **Q1.2（再深挖）：那 batch 无限大就行了？**\n> A：不行。① batch 大到一定程度 decode 转 compute-bound，再加吞吐不涨了；② 大 batch 会拉长单请求 TPOT 和 prefill 的 TTFT；③ KV Cache 随 batch 线性涨，先撑爆显存。所以有个最优 batch，要按 SLA（TTFT/TPOT 目标）实测定。\n\n> **Q2：KV Cache 占多少显存，怎么算？**\n> A：`2 × L × n_kv × d_head × seq_len × batch × bytes`。以 Qwen2.5-72B（80 层、GQA 8 头、d_head 128）BS=1 seq 2048 FP16 算 ≈ 0.625 GiB；BS=64 seq 8192 直接 160 GiB，单卡放不下——这就是要 PagedAttention 的原因。\n\n> **Q2.1（深挖）：GQA 在这里起什么作用？**\n> A：n_kv 从 query 头数 64 降到 8，KV Cache 直接砍到 1/8（MHA 同配置要 5 GiB，GQA 0.625 GiB）。GQA 用「多 query 头共享一组 KV」换 KV Cache 显存，几乎不掉精度。\n\n> **Q2.2（再深挖，DeepSeek 系必问）：除了 GQA 还有什么压 KV Cache 的招？MLA 和 GQA 啥区别？**\n> A：四级火力——GQA（少存头）→ MLA（低秩压缩）→ KV 量化（FP8/INT4 降 bytes_per_elem）→ offloading（外溢 CPU）。**MLA 和 GQA 是两个维度**：GQA 是减 KV 头条数、略损精度；MLA 是把多头 K/V 压成一个 ~512 维 latent 缓存、用时投影解压，DeepSeek-V3 每 token 仅 ~70 KB（GQA 系 192~328 KB，省 2.7~4.7x），且消融里 MLA 精度不掉反略超 MHA。代价是实现更绕、要带解压投影、还要解耦 RoPE。\n\n> **Q3：PagedAttention 到底解决什么？**\n> A：朴素 KV Cache 按 max_len 预留连续显存，碎片 + 过度预留导致利用率只有 20~40%。PagedAttention 仿 OS 分页：KV 切固定块（16 token/块）+ 块表映射，块按需分配且可不连续，浪费 < 4%，利用率提到 ~96%，等价于多塞 2~4 倍并发。\n\n> **Q3.1（深挖）：它和 continuous batching 什么关系？**\n> A：互补两支柱。PagedAttention 管显存（块级分配/释放/共享），continuous batching 管调度（每步重组 batch，完成的秒退、新请求秒插）。请求退出时 PagedAttention 立刻回收块给新请求用——两者配合才有 vLLM 的高吞吐。\n\n> **Q4：投机解码为什么能加速，无损吗？大 batch 还划算吗？**\n> A：小 draft model 猜 k 个 token，大模型一次并行验证；验证是一次 compute-bound 前向，比串行解码 k 步快。用拒绝采样保证输出分布与逐 token 解码完全一致，无损。但 draft 与 target 的 tokenizer 必须相同；草稿长 3~8 最优；大 batch 时 decode 本就 compute-bound，验证算力没富余可借，反而可能更慢，必须测净收益。\n\n> **Q5：量化怎么选？FP4 直接全量化行不行？**\n> A：部署主流 PTQ（GPTQ/AWQ），要极致精度才上 QAT。GPTQ/AWQ 是算法（AWQ 保护按激活最重要的 ~1% 权重通道），GGUF 是文件格式不是算法。FP4/NVFP4 必须混合精度——权重 FP4 + attention 走 FP8/BF16、敏感层留 BF16，纯 FP4 全量化会掉点。\n\n> **Q6：线上服务用什么引擎？**\n> A：通用首选 vLLM V1（PagedAttention + continuous batching + 默认 prefix caching）；共享前缀多的负载（agent/多轮）或 DeepSeek 选 SGLang（RadixAttention 跨请求复用前缀 KV）；固定模型追极致性能上 TensorRT-LLM。三家按真实负载实测，没有绝对赢家。超大规模再上 Dynamo 做 PD 分离 + KV 路由。\n\n---\n\n## 五、高频真题 + 答案（带数字）\n\n**T1. 解释 Prefill 和 Decode 的区别，各对应什么指标？**\nPrefill 并行处理整个 prompt 建 KV Cache，compute-bound，决定 TTFT；Decode 逐 token 串行生成，memory-bound，决定 TPOT。端到端延迟 ≈ TTFT + TPOT × 输出长度。\n\n**T2. KV Cache 显存怎么算？给个例子。**\n`2 × L × n_kv × d_head × seq_len × batch × bytes`。Qwen2.5-72B（80/8/128）BS=1 seq2048 FP16 ≈ 0.625 GiB；放大到 BS=64 seq8192 = 160 GiB。\n\n**T3. PagedAttention 把 KV Cache 利用率从多少提到多少？**\n从约 20~40%（传统系统浪费 60~80%）提到 ~96%（浪费 < 4%），吞吐提 2~4x（vLLM 论文对 baseline 最高 24x）。\n\n**T4. Continuous batching 相比 static batching 提多少吞吐？**\n2~10x。原理：每步 decode 后重组 batch，完成请求秒退释放 KV、新请求秒插，GPU 不空转。\n\n**T5. 16Ψ 是什么？**\n混合精度 + Adam 训练每参数显存（不含激活）：FP16 权重 2 + FP16 梯度 2 + FP32 优化器(主权重 4 + m 4 + v 4)=12，共 16 字节。7B → ≈112 GB。\n\n**T6. EAGLE-3 加速多少？**\n最高约 6.5x（典型 3.0~6.5x），平均接受长度 τ≈4~7.5 token；用轻量 draft head 复用 target 多层特征，无需独立小模型。\n\n**T7. Anthropic prompt caching 能省多少？**\n缓存读只花基础价 10%（省约 90% 成本），缓存写贵 25%，命中 2 次回本，长 prompt 延迟降最高约 85%。\n\n**T8. SGLang 的 RadixAttention 解决什么？**\n用基数树做 KV 前缀的跨请求复用——多请求共享前缀（system prompt/few-shot/多轮历史）的 KV 不重算，对共享前缀多的负载吞吐对比 vLLM 可达约 7x，是 DeepSeek 部署首选。\n\n**T9. MLA 是什么，和 GQA 区别？省多少 KV Cache？**\nMulti-head Latent Attention（DeepSeek-V2/V3）：把多头 K/V 低秩压成一个 ~512 维 latent 缓存，用时投影解压。GQA 是减 KV 头条数（略损精度），MLA 是低秩压缩（精度反略超 MHA）。DeepSeek-V3 每 token ~70 KB，对比 GQA 系 192~328 KB，省 2.7~4.7x。坑：与 RoPE 不天然兼容，用解耦 RoPE 解决。\n\n**T10. KV Cache 量化和权重量化（GPTQ/AWQ）是一回事吗？省多少？**\n不是。GPTQ/AWQ 量化的是**模型权重**；KV Cache 量化压的是**运行时缓存**。把 KV 从 FP16→FP8 直接腰斩（H100/B200 原生 FP8、质量损失极小，vLLM `--kv-cache-dtype fp8` 一开即用），INT4/2-bit 更激进、多数模型鲁棒。超长上下文 KV 比权重还大（LLaMA3-70B × 32 并发 × 128K ≈ 1.2 TB），装不下再上 offloading（外溢 CPU/NVMe，瓶颈在 PCIe，配异步预取）。\n\n---\n\n## 六、项目话术钩子（标注待补实操 → 13 章）\n\n把下面这些「钩子」织进项目叙事，面试官一追问就能往深里带：\n\n- **「我们 RAG 服务上线后 P99 延迟高」** → 「定位到是 prefill 太重——长文档 prompt 每次重算。我开了 vLLM 的 prefix caching，把固定的 system prompt + 检索模板 KV 复用，TTFT 降了 X%。」（⚠️ **待补实操**：X 值跑 [13 章](13-实操实验室/) 回填）\n- **「显存不够跑不了目标模型」** → 「先用公式估 KV Cache 占用，发现高并发下 KV 是大头；改 AWQ INT4 量化 + 调 max-num-seqs，单卡并发从 A 提到 B。」（⚠️ 待补实操）\n- **「在线对话要降延迟」** → 「小 batch 场景开投机解码，draft 模型 tokenizer 对齐 target，草稿长设 5，TPOT 降 Y%；但大 batch 离线批处理我关掉它（会反向降速），改成大 batch 拉吞吐。」（⚠️ 待补实操）\n- **「成本压力大」** → 「Anthropic API 那条链路把不变的工具定义 + 系统提示用 prompt caching 标记，缓存读省 90% 输入成本，月账单降 Z%。」\n\n> **诚实边界（候选人当前状态）**：部署是「待补实操」。面试别硬吹「我深度调优过 vLLM 源码」。正确话术是：**「原理我能算到显存/带宽层（现场可手算 KV Cache 和 16Ψ）；实操我正在 [13 章实验室] 跑通 7B 模型的 vLLM 部署 + 量化 + benchmark，把 TTFT/TPOT/吞吐数字补齐。」** —— 既亮深度又不撒谎。\n\n---\n\n## 七、常见失分点\n\n1. **把训练显存和推理显存混账**：推理大头是「权重 + KV Cache」，训练大头是「优化器状态 16Ψ + 激活」。问推理却背 16Ψ = 露怯。\n2. **说不清 memory-bound vs compute-bound**：decode 是 memory-bound（所以 batching/量化有用），prefill 是 compute-bound（所以拉长 TTFT）。这是全章地基，答反全崩。\n3. **KV Cache 公式漏掉 GQA**：用 query 头数算会大 8 倍，被追问「GQA 呢」直接卡壳。务必用 **n_kv**。\n4. **把 GGUF 当成量化算法**：GGUF 是文件格式，GPTQ/AWQ 才是算法。\n5. **说投机解码「永远加速」**：大 batch / compute-bound 下会反向降速，必须提「测净收益、可能要关」。\n6. **忘了投机解码的 tokenizer 硬约束**：draft 和 target tokenizer 必须完全相同。\n7. **FP4 答「直接全量化」**：必须混合精度（权重 FP4 + attention FP8/BF16），纯 FP4 掉点。\n8. **引擎选型背死结论说「vLLM 最好」**：要按工作负载实测，且能说出 SGLang（共享前缀）/ TensorRT-LLM（极致）/ Dynamo（集群 PD 分离）各自的场景。\n9. **混淆 prefix caching（引擎层、跨请求复用 KV）和 prompt caching（API 层、按价计费）**：思想同源但层级不同。\n10. **吞吐和延迟当成一回事**：它俩是跷跷板，「优化推理」先问优化哪个指标。\n11. **把 MLA 说成 GQA 的变种**：两个维度——GQA 减 KV 头条数，MLA 低秩压缩成 latent 再解压。说反「MLA 就是共享头」直接露怯。\n12. **混淆权重量化（GPTQ/AWQ）和 KV Cache 量化（FP8/INT4）**：前者压权重、后者压运行时缓存，是两套独立手段，能叠加用。\n\n---\n\n## 八、一句话速记\n\n**自回归 → decode 是 memory-bound（瓶颈在带宽不在算力）→ 省显存（压 KV 四级：GQA→MLA→KV量化→offload；权重量化；PagedAttention 把利用率 50%→96%）和填算力（continuous batching 2~10x + 投机解码低 batch 才赚）两条线 → vLLM V1 默认（统一调度+chunked prefill+FA3，~1.7x V0）、SGLang 啃共享前缀、TensorRT-LLM 求极致、Dynamo 做集群 PD 分离；KV Cache 显存 = 2·L·n_kv·d_head·seq·batch·bytes，训练显存 16Ψ。**\n\n---\n\n### 联网核实来源\n\n- PagedAttention 利用率 20~40%→96%、吞吐 2~4x：[Red Hat Developer](https://developers.redhat.com/articles/2025/07/24/how-pagedattention-resolves-memory-waste-llm-systems)、[Wikipedia: PagedAttention](https://en.wikipedia.org/wiki/PagedAttention)\n- vLLM V1 默认架构、prefix caching、统一调度、chunked prefill 默认、FlashAttention 3、~1.7x V0：[vLLM Blog 2025-01-27](https://blog.vllm.ai/2025/01/27/v1-alpha-release.html)、[Red Hat: vLLM V1](https://developers.redhat.com/articles/2025/01/28/vllm-v1-a-major-upgrade-vllms-core-architecture)\n- MLA 低秩压缩、~70KB/token vs GQA 192~328KB（2.7~4.7x）、精度略超 MHA、解耦 RoPE：[DeepSeek-V3 Technical Report](https://arxiv.org/pdf/2412.19437)、[KV Cache Optimization via MLA (PyImageSearch)](https://pyimagesearch.com/2025/10/13/kv-cache-optimization-via-multi-head-latent-attention/)、[MLA 解析 (Chris McCormick)](https://mccormickml.com/2025/04/26/inner-workings-of-mla/)\n- KV Cache 量化（FP8 原生减半/INT4-2bit 鲁棒）与 offloading（LLaMA3-70B×32×128K≈1.2TB、PCIe 瓶颈、异步预取）：[Introl: KV Cache Optimization](https://introl.com/blog/kv-cache-optimization-memory-efficiency-production-llms-guide)、[KVTuner arXiv 2502.04420](https://arxiv.org/pdf/2502.04420)、[KV Offloading Bottlenecks arXiv](https://arxiv.org/pdf/2601.19910)\n- EAGLE-3 最高 6.5x、τ、多层特征融合：[EAGLE-3 arXiv 2503.01840](https://arxiv.org/abs/2503.01840)\n- NVFP4 分层缩放 + 混合精度（权重 FP4 + attention FP8/BF16）：[Red Hat Developer NVFP4](https://developers.redhat.com/articles/2026/02/04/accelerating-large-language-models-nvfp4-quantization)、[Verda: NVFP4 Explained](https://verda.com/blog/nvfp4-nvidia-blackwell-intro)\n- GPTQ/AWQ/GGUF（算法 vs 格式）：[Maarten Grootendorst: Which Quantization Method](https://newsletter.maartengrootendorst.com/p/which-quantization-method-is-right)\n- 投机解码大 batch 反向降速、最优草稿长随 batch 减小：[arXiv 2603.03251](https://arxiv.org/pdf/2603.03251)、[Together.ai blog](https://www.together.ai/blog/speculative-decoding-for-high-throughput-long-context-inference)\n- SGLang RadixAttention 跨请求前缀复用、DeepSeek 首选、~7x：[LMSYS SGLang blog](https://www.lmsys.org/blog/2024-01-17-sglang/)、[Atlas Cloud DeepSeek-R1](https://www.atlascloud.ai/blog/sg-lang-private-deployment-deepseek-r1)\n- NVIDIA Dynamo PD 分离 + KV-aware routing：[NVIDIA Dynamo Docs](https://docs.dynamo.nvidia.com/dynamo/design-docs/disaggregated-serving)\n- Anthropic prompt caching 省 90% / 写贵 25% / 延迟降 85%：[Claude API Pricing](https://platform.claude.com/docs/en/about-claude/pricing)、[Introl blog](https://introl.com/blog/prompt-caching-infrastructure-llm-cost-latency-reduction-guide-2025)\n- Qwen2.5-72B 配置（80 层 / GQA 8 KV 头 / d_head 128）：[Qwen2.5-72B-Instruct config.json](https://huggingface.co/Qwen/Qwen2.5-72B-Instruct/blob/main/config.json)\n", "/08-Evals与LLMOps/README.md": "# Evals 与 LLMOps\n\n> 拉档层 · 你的最强杠杆 · 国内蓝海\n\n## ① 一句话立场\n\n**2025 年之后，Evals（评估体系）已经从\"加分项\"变成 AI 工程的默认地基——而它恰好是你作为后端工程师天然吃得透、前端转 AI / 算法转应用的人最弱的一层。这是你这场面试里要重点经营的护城河。**\n\nHamel Husain（前 GitHub / Airbnb ML 工程师，与 Berkeley 的 Shreya Shankar 一起开了业内最火的 AI Evals 课、训练了 2000+ 工程师和 PM，学员里有 OpenAI / Anthropic 的团队）反复讲一句话：**evals 是 AI 工程师当下排第一的新技能，失败的 AI 产品几乎都源于\"没有建立稳健的评估体系\"。** 这句话的潜台词是：模型不缺、prompt 不缺、demo 不缺，缺的是\"怎么知道它到底行不行、改一版是变好了还是变坏了\"——而这正是**可靠性、回归测试、监控、CI 门禁、成本治理**这套后端工程直觉的主场。\n\n为什么是你的护城河：\n\n- **算法出身的人**习惯刷 benchmark、调 loss，但不习惯\"为一个具体业务功能从生产数据里挖失败模式、建测试集、卡 CI\"这套工程化闭环。\n- **前端 / 全栈转 AI 的人**会接 API、会做 UI，但对\"回归、门禁、灰度、可观测、SLO\"这些后端基本功是空白。\n- **你（2 年 Java 后端 + 1 年 AI）**：写过单元测试、配过 CI、看过监控大盘、被线上 P0 教育过、算过资源账单。把这些直觉平移到 LLM 上，就是 Evals 工程的核心。**这层在国内还是蓝海**，能讲清楚的人很少，讲清楚就是拉档。\n\n---\n\n## ② 知识地图\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef why fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef core fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef eng fill:#48BB78,stroke:#38A169,stroke-width:1px,color:#fff\n    classDef ops fill:#ED8936,stroke:#C66A32,stroke-width:1px,color:#fff\n\n    Root[\"Evals 与 LLMOps\"]:::root\n\n    Root --> Why[\"为什么成地基\"]:::why\n    Root --> Core[\"核心原理\"]:::core\n    Root --> Eng[\"工程实现\"]:::eng\n    Root --> Ops[\"生产 LLMOps\"]:::ops\n\n    Why --> W1[\"公开 benchmark 饱和+污染<br/>MMLU/GSM8K→GSM1K掉点<br/>2026 转 HLE/SWE-Bench/τ-bench\"]:::why\n    Why --> W2[\"Hamel：头号新技能\"]:::why\n    Why --> W3[\"Gartner：2028 观测占 50%\"]:::why\n\n    Core --> C1[\"三层评估<br/>L1 单测/L2 人工+judge/L3 A_B\"]:::core\n    Core --> C2[\"Error Analysis<br/>过 100 条 trace 归类计数\"]:::core\n    Core --> C3[\"LLM-as-judge 校准<br/>偏差/TPR-TNR/pairwise\"]:::core\n    Core --> C4[\"Agent Trajectory 评估<br/>工具序列/参数/步骤效率\"]:::core\n    Core --> C5[\"EDD<br/>eval 当活的 PRD\"]:::core\n\n    Eng --> E1[\"CI 门禁两件套<br/>promptfoo/DeepEval/Ragas\"]:::eng\n    Eng --> E2[\"平台层<br/>Braintrust/LangSmith/Langfuse/Phoenix\"]:::eng\n    Eng --> E3[\"安全审计<br/>Inspect/Petri\"]:::eng\n\n    Ops --> O1[\"在线评估抓模型偷偷降质\"]:::ops\n    Ops --> O2[\"OTel GenAI 语义约定<br/>OpenLLMetry\"]:::ops\n    Ops --> O3[\"质量/成本/延迟大盘\"]:::ops\n```\n\n---\n\n## ③ 核心原理\n\n### 3.0 为什么公开 benchmark 不再可信（先破后立）\n\n面试里如果你张口就是\"我们用 MMLU / GSM8K 评估\"，会暴露你停留在 2023 年。**2025 年的事实**：\n\n- **饱和**：GPT-5.x、Claude Opus、Gemini 3.x、Llama 4 这些前沿模型在 MMLU / GSM8K / HumanEval 上**普遍 90%+**——MMLU 2026 年初前沿系统普遍 92%+，而它本身带已知标注错误，天花板就卡在 ~95%，前沿模型之间的分差已经是统计噪声，区分不出好坏。连研究生级的 GPQA Diamond 也已逼近顶部饱和（前沿约 94%）。\n- **污染（contamination）**：这些题目大量进了训练集。Scale AI 造了 GSM8K 的同分布新变体 **GSM1K**（1250 道全新小学数学题），最差的模型掉了 ~13%，Phi / Mistral 家族出现系统性过拟合的证据——意味着相当一部分\"推理能力\"其实是背题。\n- **2026 年前沿实验室真正在 model card 上报的榜单已经换了一批**：HLE（Humanity's Last Exam）、FrontierMath、ARC-AGI 2、GPQA Diamond、SWE-Bench Verified、τ-bench / τ²-bench（工具-用户多轮对话）、BFCL v4（Berkeley 函数调用，已转向 agentic 评估）、AIME 2025、LiveBench——全是\"更难、更抗污染、更贴近真实任务\"的方向。这串名字本身就是你\"知道 2026 年发生了什么\"的信号。\n- **结论**：公开 benchmark 衡量的是\"通用智力天花板\"，**不衡量你的具体业务功能做得好不好**。一个客服 Agent 在 MMLU 上 92% 不代表它在你公司的退款流程里不胡说——哪怕它在 BFCL 上函数调用很强，也不代表它懂你家退款政策。**真正的 eval 必须是 task-specific、用你自己的数据建的。** 这就是 Hamel 反复强调的\"prefab / 通用指标（ROUGE、BERTScore、泛泛的 helpfulness 分）在最好的情况下浪费时间，最坏的情况制造一种没有根据的虚假信心\"。\n\n> 这一段就是你的开场杀招：**先证明\"拿公开榜单当验收\"是错的，再引出\"必须自建评估闭环\"**——立刻和只会刷榜的人拉开身位。\n\n### 3.1 三层评估体系（L1 / L2 / L3）\n\n这是把后端测试金字塔平移到 LLM 上，是你最好讲的框架：\n\n| 层级 | 名字 | 干什么 | 后端类比 | 触发时机 |\n|------|------|--------|----------|----------|\n| **L1** | Unit Tests（确定性断言） | 对输出做可编程的硬断言：JSON 能否解析、必含字段、格式正则、不该出现的词、工具调用参数合法 | 单元测试 | **每次代码 / prompt 变更都跑**，秒级，0 成本 |\n| **L2** | Human & Model Eval | 人工审查 trace + LLM-as-judge 对\"好不好\"打分（语气、相关性、是否幻觉） | 集成测试 / Code Review | 每次发版前、每天定时抽样 |\n| **L3** | A/B Testing | 真实流量上比两版的业务指标（留存、转化、满意度、人工申诉率） | 灰度 / 全链路压测 | 上线后在线 |\n\n**铁律**：能用 L1 解决的绝不上 L2（贵、慢、还可能不准）。很多人一上来就堆 LLM judge，其实大量失败是\"输出格式不对 / 漏字段\"这类确定性问题，L1 一个断言就抓住了。**先穷尽 L1，再上 L2，最后才 L3。**\n\n### 3.2 Error Analysis：整套体系的核心仪式\n\nHamel & Shreya 把 error analysis 称为 **\"evals 里最重要的活动\"**——比写 LLM judge 还重要。最能镇住面试官的一句数据：**他们在真实项目里把 60–80% 的开发时间花在 error analysis 和评估上，\"绝大部分精力是在看数据、理解失败，而不是搭自动检查\"。** 它是你建测试集的唯一正确起点——**不要凭空想象失败，要去生产数据里看真实失败**。下面这张动画把整个闭环跑一遍：\n\n![Error Analysis：逐条分拣真实trace](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/08-2-error-analysis.png ':class=xh-illust')\n\n<div class=\"anim\" data-anim=\"eval-loop\"><\/div>\n\n流程：\n\n```mermaid\ngraph LR\n    classDef step fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef out fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n\n    A[\"1. 采样<br/>约 100 条真实 trace\"]:::step\n    B[\"2. Open Coding<br/>每条用自然语言写下哪错了\"]:::step\n    C[\"3. Axial Coding<br/>把笔记归并成失败分类(taxonomy)\"]:::step\n    D[\"4. 计数<br/>每类出多少次\"]:::step\n    E[\"5. 每类写一条 eval<br/>按频次排优先级\"]:::out\n\n    A --> B --> C --> D --> E\n```\n\n关键工程细节（面试讲出来就是内行）：\n\n- **采样到\"理论饱和\"**：连续看约 20 条不再冒出新分类，就可以停（一般 100 条左右）。\n- **open coding（开放编码）→ axial coding（轴向编码）** 是社会科学的定性研究方法，Hamel 直接借来给 trace 归类——这个词面试官一听就知道你读过原文。\n- **计数决定优先级**：不要去追\"想象中可能出现的奇葩 case\"，**只为出现频率高的失败建 eval**。这就是后端\"按错误率 / 影响面排 backlog\"的直觉。\n- **领域专家先标注**：让懂业务的人（不是工程师）先人工标，标注结果才是 ground truth。\n\n### 3.3 LLM-as-judge 的校准（最容易翻车、也最能体现工程严谨度）\n\n用 LLM 给 LLM 的输出打分（L2 的主力），但 judge 自己一身偏差，**不校准就用 = 拿一把没标定的尺子量东西**。必须知道的偏差：\n\n![LLM-as-judge：没标定的歪秤，先校准](https://cdn.archeruuu.com/images/docsify/ai-engineer-interview/08-3-judge-calibration.png ':class=xh-illust')\n\n| 偏差 | 含义 | 后果 |\n|------|------|------|\n| **Verbosity / length bias** | 偏好更长的回答 | 啰嗦的错答案分更高 |\n| **Self-preference bias** | 偏好\"长得像自己生成的\"内容（低 perplexity） | 用 GPT 评 GPT 会偏袒 |\n| **Position bias** | pairwise 比较时倾向选**先出现**的那个 | A/B 顺序一换结论就反 |\n| **Agreeableness / sycophancy** | 顺着 prompt 的暗示走、过度宽容 | 该判 fail 的判了 pass |\n\n**校准与缓解手段（这是你和\"只会写个 judge prompt 的人\"的分水岭）**：\n\n1. **二元判定 > Likert 量表**：让 judge 输出 pass/fail（binary），不要 1–10 分。Hamel 的原话是 binary 强迫更清晰的思考、标注更一致；量表的中间值变成\"什么都往里塞\"的垃圾桶，相邻分数没有客观意义。\n2. **pairwise > pointwise**：让 judge \"在 A、B 里选更好的\"比\"给 A 独立打个绝对分\"更可靠——但**必须交换位置跑两遍**消 position bias。\n3. **用 TPR / TNR 看 judge，不看 raw agreement**：judge 要在一份人工标注的 held-out 测试集上验证。**类别不平衡时（比如 95% 都是 pass），raw agreement 95% 毫无意义**——一个永远判 pass 的傻子也能拿 95%。要看 **precision / recall（或 TPR 真阳率 / TNR 真阴率）**，确认 judge 真的能抓到那 5% 的 fail。这是后端做\"不平衡分类指标\"的直觉，直接平移。\n4. **领域专家先标、再测 judge 与人类一致性**：先让专家标 ground truth，再算 judge 和人类的一致性，达标才上线。\n5. **回归式偏差校正 / minority-veto**：把 judge 分数当带系统偏差的测量值做校正；多 judge 投票时，让\"少数否决\"——只要有一个 judge 判出严重问题就拦下（安全敏感场景）。\n\n下面这张动画把第 1、2 条最容易被追问的「pairwise + 交换位置消 position bias」跑一遍——同一对答案，pointwise 给绝对分会被偏差污染；pairwise 跑两遍（位置 A-B 一次、交换 B-A 一次），只有两轮一致才采信：\n\n<div class=\"anim\" data-anim=\"llm-judge\"><\/div>\n\n> 一句话总结这节：**judge 不是\"写个 prompt 让大模型打分\"，而是一个需要标定、需要拿 TPR/TNR 验收、需要对齐人类专家的\"测量仪器\"。** 把它当仪器看，就是工程化。\n\n### 3.4 Agent Trajectory（轨迹）评估\n\n单轮问答只看 final answer 就够了，但 **Agent 要看\"过程\"**——它调了哪些工具、参数对不对、步骤有没有绕远、有没有死循环。只看最终答案的话，\"蒙对了\"和\"一步步推对了\"分不出来，前者上生产一定塌。\n\n评估维度：\n\n- **工具调用序列（tool call sequence）**：调用的工具集合 / 顺序对不对。\n- **参数正确性（argument correctness）**：传给工具的参数对不对。\n- **步骤效率（step efficiency）**：有没有多余步骤、死循环——直接关系到**成本和延迟**（你的成本治理直觉在这里发光）。\n- **plan adherence（计划遵循度）**：实际执行是否贴合它自己定的计划。\n\n两种打法：**trajectory match（硬比对参考轨迹，确定性、快、零额外 LLM 成本，可选\"无序模式\"只校验工具集合不管顺序）** + **LLM judge 评整条轨迹**（catch 绕路 / 死循环）。**铁律：先把 tracing（全链路追踪）做好，再谈 scoring**——没有完整 trace，连\"它到底走了哪几步\"都不知道，评无可评。\n\n### 3.5 Eval-Driven Development（EDD）\n\n类比 TDD：**让 eval 先于（或并行于）功能代码，把 eval 集当成\"活的 PRD（产品需求文档）\"**——它用可执行的方式精确定义了\"什么叫做对了\"，而且会随业务演进持续更新。\n\n**但要讲出分寸（否则会被追问打穿）**：Hamel 对\"教条式 EDD（功能还没写就先把所有 evaluator 写完）\"是**审慎甚至反对**的——因为 LLM 的失败面是无限的，你**没法在写代码前就想象出所有失败**，会写一堆没用的 evaluator。正确姿势是：\n\n- **不要为\"想象中的错误\"写 eval，要为\"error analysis 里发现的真实错误\"写 eval。** Hamel 的原话很硬：教条式 EDD（先写 evaluator 再写功能）\"听起来很美，但制造的问题比解决的多\"。\n- 只有**成功标准明确、确定性强**的约束（如\"必须返回合法 JSON\"\"绝不提竞品\"），才适合真正\"先写 eval\"。\n- 落地节奏：**先跑一版 → error analysis 挖真实失败 → 把每类失败固化成 eval → 进 CI → 之后每次改动都拿这套 eval 回归。** eval 集随发现的新失败不断长大，这才是\"活的 PRD\"。\n\n**\"要不要为这类失败建自动评估\"是一道成本-收益题（讲出来就是工程脑）**：简单断言 / 正则 / 结构校验几乎零成本，发现就值得加；而**一个 LLM-as-judge 评估器是重资产**——按 Hamel 的口径需要 100+ 条人工标注样本、每周维护、还要拉上开发 / PM / 领域专家协同对齐。所以**只为\"会反复迭代、长期存在的高频问题\"养 judge，一次性或低频的失败用便宜的代码检查兜住就行**。这就是后端\"按 ROI 排技术债 backlog\"的直觉。\n\n> 把 before/after pass rate、judge 的 TPR/TNR 这些数字搬进项目自述里，就是面试官最吃的「量化收益」。怎么把它们包装成不被反深挖击穿的话术，见 [14 · 项目深挖与反深挖话术](14-项目深挖与反深挖话术/)。\n\n---\n\n## ④ Python 工程实现：在 CI 里跑的最小闭环\n\n目标：**一次代码 / prompt 变更 → CI 自动跑 eval → 不达标卡住 merge**。这正是你的后端 CI 直觉的主场。下面这套 DeepEval + Ragas 想真正上手跑通，去 [13 · 实操实验室](13-实操实验室/) 照着把最小 eval 闭环搭起来。三件工具按职责分工：\n\n| 工具 | 定位 | 强项 | 备注 |\n|------|------|------|------|\n| **promptfoo** | YAML 声明式 CI gating | prompt 回归、红队、有官方 GitHub Action | **2026-03-09 被 OpenAI 以约 8600 万美元收购**，承诺核心仍 MIT 开源、模型无关；但长期独立性需观察 |\n| **DeepEval** | pytest 风格断言 | 直接落进 pytest 测试套件，50+ 内置 metric 带解释 | Python 团队首选，CI 最顺手，永久免费 |\n| **Ragas** | RAG 专用 | faithfulness / context precision / answer relevancy | 配合 DeepEval 给检索打分，永久免费 |\n\n> 成熟团队常用其中两件套：**DeepEval（CI 断言）+ Ragas（RAG 指标）**，或 **promptfoo（prompt 回归）+ Ragas**。面试若被问到 promptfoo 被 OpenAI 收购后的选型风险，标准答法是：核心 CLI 仍开源可继续用，但\"全押注一个被巨头收购的工具\"有锁定风险，所以**门禁层尽量用 pytest 原生的 DeepEval 这种与厂商解耦的方案**。\n\n### 4.1 L1：确定性断言（DeepEval + pytest，秒级、零模型成本）\n\n```python\n# tests/evals/test_l1_deterministic.py\nimport json\nimport pytest\nfrom deepeval.test_case import LLMTestCase\nfrom deepeval.metrics import JsonCorrectnessMetric\n\n# 用真实/构造的输入跑你的应用，拿到输出\nfrom app.agent import run_refund_agent  # 你的业务入口\n\n\nREFUND_CASES: list[dict[str, str]] = [\n    {\"query\": \"我要退款，订单 A123\", \"must_have_field\": \"refund_id\"},\n    {\"query\": \"帮我查下退款进度\", \"must_have_field\": \"status\"},\n]\n\n\n@pytest.mark.parametrize(\"case\", REFUND_CASES)\ndef test_output_is_valid_json_with_required_field(case: dict[str, str]) -> None:\n    \"\"\"L1 硬断言：输出必须是合法 JSON 且含必备字段——0 成本、每次变更必跑。\"\"\"\n    raw_output: str = run_refund_agent(case[\"query\"])\n\n    # 断言 1：能解析成 JSON\n    try:\n        parsed: dict = json.loads(raw_output)\n    except json.JSONDecodeError:\n        pytest.fail(f\"输出不是合法 JSON: {raw_output!r}\")\n\n    # 断言 2：必含字段存在\n    assert case[\"must_have_field\"] in parsed, (\n        f\"缺少必备字段 {case['must_have_field']}: {parsed}\"\n    )\n\n    # 断言 3：不该出现内部错误码泄漏\n    assert \"Traceback\" not in raw_output\n    assert \"stack\" not in raw_output.lower()\n```\n\n### 4.2 L2：LLM-as-judge（DeepEval，二元判定 + 自定义业务 metric）\n\n```python\n# tests/evals/test_l2_judge.py\nimport pytest\nfrom deepeval import assert_test\nfrom deepeval.test_case import LLMTestCase, LLMTestCaseParams\nfrom deepeval.metrics import GEval\n\n# 二元判定的自定义 judge：把\"业务上什么叫做对了\"写成评分标准\n# 用 G-Eval（chain-of-thought 打分），threshold 卡 pass/fail\nrefund_correctness = GEval(\n    name=\"RefundAnswerCorrectness\",\n    criteria=(\n        \"判定回答是否正确处理退款请求：必须给出退款单号或明确进度，\"\n        \"口径与公司退款政策一致，且不得编造不存在的政策。\"\n    ),\n    evaluation_params=[\n        LLMTestCaseParams.INPUT,\n        LLMTestCaseParams.ACTUAL_OUTPUT,\n        LLMTestCaseParams.EXPECTED_OUTPUT,\n    ],\n    threshold=0.5,  # 二元化：>=0.5 视为 pass\n    model=\"gpt-4o\",  # judge 模型，建议与被测模型不同源以缓解 self-preference\n)\n\n\ndef test_refund_answer_quality() -> None:\n    test_case = LLMTestCase(\n        input=\"我要退款，订单 A123，已经发货了能退吗？\",\n        actual_output=run_refund_agent(\"我要退款，订单 A123，已经发货了能退吗？\"),\n        expected_output=\"已发货订单需先申请退货，签收后 3-5 个工作日原路退款。\",\n    )\n    assert_test(test_case, [refund_correctness])\n```\n\n校准 judge（离线一次性做，确认 judge 靠谱再用它卡 CI）：\n\n```python\n# scripts/calibrate_judge.py\n\"\"\"用人工标注的 held-out 集验证 judge：类别不平衡时看 precision/recall，不看 raw agreement。\"\"\"\nfrom sklearn.metrics import classification_report, recall_score\n\n\ndef calibrate(human_labels: list[int], judge_labels: list[int]) -> None:\n    \"\"\"human_labels / judge_labels: 1=pass, 0=fail。\"\"\"\n    # raw agreement 在不平衡数据上会骗人，所以重点看 TPR(recall on fail) / TNR\n    print(classification_report(human_labels, judge_labels, digits=3))\n\n    # TNR = 对 fail 类的 recall（能不能抓住坏样本），安全场景这个最关键\n    tnr = recall_score(human_labels, judge_labels
