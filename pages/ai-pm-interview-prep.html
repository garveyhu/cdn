    moveTo(tl, cacheX + cacheW / 2, hitY, .3);          // 上拐
    moveTo(tl, hitX, hitY, .45);                        // 快速冲到返回
    tl.call(function () { hitBox.setAttribute('stroke-width', 2.8); });
    tl.to(hitBox, { attr: { 'stroke-width': 2.8 }, duration: .22, yoyo: true, repeat: 1 });
    tl.to(pkt, { opacity: 0, duration: .2 });

    // ④ 未命中：走完整链路（召回 → 生成），路径明显更长更慢
    tl.call(function () {
      cap.textContent = '④ 未命中：才走完整链路——召回 + 生成（路径更长更慢）';
      missPath.setAttribute('opacity', 1); missTag.setAttribute('opacity', 1);
    });
    tl.set(pkt, { x: 0, y: 0 });
    tl.set(pkt, { attr: { cx: cacheX + cacheW / 2, cy: ey } });
    tl.to(pkt, { opacity: 1, duration: .2 });
    moveTo(tl, cacheX + cacheW / 2, missY, .35);        // 下拐
    moveTo(tl, chain[0].x + CW / 2, missY, .55);        // 到召回
    tl.call(function () { missRects[0].setAttribute('stroke', C.accent); missRects[0].setAttribute('stroke-width', 2.6); });
    moveTo(tl, chain[1].x + CW / 2, missY, .55);        // 到生成
    tl.call(function () { missRects[1].setAttribute('stroke', C.accent); missRects[1].setAttribute('stroke-width', 2.6); });

    // ⑤ 写回缓存
    tl.call(function () {
      cap.textContent = '⑤ 把结果写回缓存：下次同类提问就能走快速路径';
      wbLabel.setAttribute('opacity', 1);
    });
    tl.to(writeBack, { attr: { opacity: .9 }, duration: .4 });
    tl.to(pkt, { opacity: 0, duration: .2 });

    // ⑥ 收束：降的是重复计算的成本
    tl.call(function () { cap.textContent = '✓ CAG 把重复计算的成本降下来——命中越多，越省算力省时间'; });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*meta*/{ title: '成本 / 延迟 / 质量三角与 CAG 命中', caption: '三者相互拉扯只能挑两个；CAG 命中走快速路径直接返回，未命中才走完整链路并写回缓存' });

</script>
    <script>
/* 数据飞轮动画：六个环节首尾相接成一个环——用户使用 → 产生反馈 → 沉淀数据 →
   改进模型/检索 → 体验变好 → 引来更多用户，回到起点。一颗"动能点"绕环奔跑，
   每经过一个环节就点亮它；连转三圈，转速逐圈递增（飞轮越转越快），中心转速读数同步上跳，
   直观说明"闭环转起来后越转越快，是 AI 产品的护城河"。 */
AnimCore.register('data-flywheel', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 320;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', {
      x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle',
      'font-weight': o.weight || 600
    });
    t.textContent = str; return t;
  }

  // —— 环几何 ——
  var CX = 300, CY = 150, R = 112;
  var N = 6;
  var nodes = [
    { t: '用户使用', s: '更多 query' },
    { t: '产生反馈', s: '点赞/点踩·Badcase' },
    { t: '沉淀数据', s: '显式+隐式信号' },
    { t: '改进模型/检索', s: '归因→微调' },
    { t: '体验变好', s: '更准·更快' },
    { t: '引来更多用户', s: '正循环放大' }
  ];

  // 每个节点的角度（顶部起，顺时针）
  function angOf(i) { return -Math.PI / 2 + i * (2 * Math.PI / N); }
  function px(i) { return CX + R * Math.cos(angOf(i)); }
  function py(i) { return CY + R * Math.sin(angOf(i)); }

  // —— 环形底轨（虚线圆）——
  var track = S('circle', {
    cx: CX, cy: CY, r: R, fill: 'none', stroke: C.border,
    'stroke-width': 1.4, 'stroke-dasharray': '4 5', opacity: .7
  });
  svg.appendChild(track);

  // —— 弧形连接箭头：相邻节点间一段圆弧，体现"环依次驱动" ——
  var arcs = [];
  for (var a = 0; a < N; a++) {
    var a0 = angOf(a) + 0.34;
    var a1 = angOf((a + 1) % N) - 0.34;
    var rr = R;
    var x0 = CX + rr * Math.cos(a0), y0 = CY + rr * Math.sin(a0);
    var x1 = CX + rr * Math.cos(a1), y1 = CY + rr * Math.sin(a1);
    var arc = S('path', {
      d: 'M ' + x0.toFixed(1) + ' ' + y0.toFixed(1) +
         ' A ' + rr + ' ' + rr + ' 0 0 1 ' + x1.toFixed(1) + ' ' + y1.toFixed(1),
      fill: 'none', stroke: C.border, 'stroke-width': 1.6, opacity: .55
    });
    svg.appendChild(arc); arcs.push(arc);
  }

  // —— 六个节点 ——
  var dots = [], titles = [];
  for (var i = 0; i < N; i++) {
    var cx = px(i), cy = py(i);
    var d = S('circle', { cx: cx, cy: cy, r: 13, fill: C.bg, stroke: C.border, 'stroke-width': 1.8 });
    svg.appendChild(d); dots.push(d);
    svg.appendChild(text(cx, cy + 4, String(i + 1), { size: 12, weight: 700, fill: C.mut }));

    // 标签放在节点外侧
    var lx = CX + (R + 30) * Math.cos(angOf(i));
    var ly = CY + (R + 30) * Math.sin(angOf(i));
    var anchor = Math.abs(lx - CX) < 6 ? 'middle' : (lx > CX ? 'start' : 'end');
    var tt = text(lx, ly, nodes[i].t, { size: 12.5, weight: 700, anchor: anchor });
    svg.appendChild(tt); titles.push(tt);
    svg.appendChild(text(lx, ly + 14, nodes[i].s, { size: 10, weight: 500, fill: C.mut, anchor: anchor }));
  }

  // —— 中心：飞轮 + 转速读数 ——
  var hub = S('circle', { cx: CX, cy: CY, r: 34, fill: C.soft, stroke: C.border, 'stroke-width': 1.4 });
  svg.appendChild(hub);
  var hubTitle = text(CX, CY - 6, '飞轮', { size: 12, weight: 700, fill: C.fg });
  svg.appendChild(hubTitle);
  var rpm = text(CX, CY + 14, '转速 ×1', { size: 12.5, weight: 700, fill: C.accent });
  svg.appendChild(rpm);

  // —— 动能点（绕环奔跑的小球）——
  var puck = S('circle', { cx: px(0), cy: py(0), r: 7, fill: C.accent, opacity: 0 });
  svg.appendChild(puck);

  // —— 右侧旁白 ——
  var capX = 600;
  svg.appendChild(text(capX, 40, '飞轮三圈：越转越快', { size: 13, weight: 700, anchor: 'middle', fill: C.fg }));
  var lapCap = text(capX, 70, '', { size: 12, weight: 700, anchor: 'middle', fill: C.accent });
  svg.appendChild(lapCap);
  var stepCap = text(capX, 96, '', { size: 11.5, weight: 600, anchor: 'middle', fill: C.mut });
  svg.appendChild(stepCap);

  // —— 底部小结 ——
  var cap = text(W / 2, H - 12, '', { size: 12.5, weight: 600, fill: C.accent });
  svg.appendChild(cap);

  function setNode(i, on) {
    var d = dots[i];
    d.setAttribute('stroke', on ? C.accent : C.border);
    d.setAttribute('stroke-width', on ? 3 : 1.8);
    d.setAttribute('fill', on ? C.accent : C.bg);
    titles[i].setAttribute('fill', on ? C.accent : C.fg);
  }

  function reset() {
    for (var i = 0; i < N; i++) setNode(i, false);
    arcs.forEach(function (a) { a.setAttribute('stroke', C.border); a.setAttribute('opacity', .55); });
    puck.setAttribute('cx', px(0)); puck.setAttribute('cy', py(0)); puck.setAttribute('opacity', 0);
    rpm.textContent = '转速 ×1';
    rpm.setAttribute('fill', C.accent);
    lapCap.textContent = '';
    stepCap.textContent = '';
    cap.textContent = '';
  }

  // 把动能点放到环上角度 ang 处
  function moveTo(ang) {
    puck.setAttribute('cx', CX + R * Math.cos(ang));
    puck.setAttribute('cy', CY + R * Math.sin(ang));
  }

  function play() {
    reset();
    if (!has) {
      // 静态终态兜底：全部点亮 + 转速拉满 + 文案
      for (var i = 0; i < N; i++) setNode(i, true);
      arcs.forEach(function (a) { a.setAttribute('stroke', C.accent); a.setAttribute('opacity', .9); });
      puck.setAttribute('opacity', 1);
      rpm.textContent = '转速 ×3';
      rpm.setAttribute('fill', C.accent3);
      lapCap.textContent = '闭环越转越快';
      lapCap.setAttribute('fill', C.accent3);
      cap.textContent = '（无 gsap：静态终态）闭环转起来后越转越快，是 AI 产品的护城河';
      return;
    }

    var tl = gsap.timeline();
    var laps = 3;
    // 每圈耗时递减，体现"飞轮转速递增"
    var lapDur = [3.4, 2.2, 1.3];
    var lapInfo = ['第 1 圈：冷启动，最费劲', '第 2 圈：反馈回流，开始提速', '第 3 圈：惯性形成，越转越快'];

    var progress = { v: 0 }; // 0..1 当前圈内进度
    var lit = -1;

    tl.to(puck, { opacity: 1, duration: .25 });

    for (var L = 0; L < laps; L++) {
      (function (L) {
        tl.call(function () {
          lapCap.textContent = lapInfo[L];
          lapCap.setAttribute('fill', L === laps - 1 ? C.accent3 : C.accent);
          rpm.textContent = '转速 ×' + (L + 1);
          rpm.setAttribute('fill', L === laps - 1 ? C.accent3 : C.accent);
          // 新一圈：节点重置回未点亮，让点亮过程可见
          for (var k = 0; k < N; k++) setNode(k, false);
          lit = -1;
        });
        // 一圈匀速跑：progress 0→1，期间按角度点亮经过的节点
        gsap.set(progress, { v: 0 });
        tl.to(progress, {
          v: 1, duration: lapDur[L], ease: 'none',
          onUpdate: function () {
            var ang = -Math.PI / 2 + progress.v * 2 * Math.PI;
            moveTo(ang);
            var idx = Math.floor(progress.v * N + 1e-6);
            if (idx > lit && idx < N) {
              lit = idx;
              setNode(idx % N, true);
              var arc = arcs[(idx - 1 + N) % N];
              if (arc) { arc.setAttribute('stroke', C.accent); arc.setAttribute('opacity', .9); }
              stepCap.textContent = (idx + 1) + '. ' + nodes[idx % N].t;
            }
          }
        });
        // 收尾点亮第一个节点（环闭合）
        tl.call(function () { setNode(0, true); var arc = arcs[N - 1]; if (arc) { arc.setAttribute('stroke', C.accent); arc.setAttribute('opacity', .9); } });
      })(L);
    }

    tl.call(function () {
      rpm.textContent = '转速 ×3↑';
      rpm.setAttribute('fill', C.accent3);
      lapCap.textContent = '惯性 = 护城河';
      lapCap.setAttribute('fill', C.accent3);
      stepCap.textContent = '对手从外部难以硬推动';
      cap.textContent = '闭环转起来后越转越快——对手能复制数据快照，复制不了你的学习速度';
    });
    // 收尾再快跑两圈强化"加速"观感
    tl.to(progress, {
      v: 3, duration: 1.4, ease: 'power1.in',
      onUpdate: function () {
        var ang = -Math.PI / 2 + (progress.v % 1) * 2 * Math.PI;
        moveTo(ang);
      }
    });
    tl.to(puck, { opacity: 0, duration: .3 });
    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{ title: '数据飞轮：越用越好的正循环', caption: '六环节首尾相接成闭环，逐圈加速——闭环转起来后越转越快，是 AI 产品的护城河' });

</script>
    <script>
/* eval-driven：评估驱动迭代循环（类比 TDD）。
   建评估集（定义"什么叫对"）→ 改 prompt/召回/换模型 → 跑 eval 出分数 →
   分数沿一根逐步抬升的折线爬坡、柱子一根根过线 → 达标上线 →
   生产新 Badcase 回灌评估集。强调"分数上升=产品变好"取代拍脑袋。 */
AnimCore.register('eval-driven', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 300;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 400 });
    t.textContent = str; return t;
  }

  // —— 左侧：评估驱动循环的四个站点 ——
  var STX = 132;
  var nodes = [
    { y: 56,  t: '建评估集', s: '定义"什么叫对"' },
    { y: 116, t: '改系统',   s: 'prompt/召回/换模型' },
    { y: 176, t: '跑 eval',  s: '出分数' },
    { y: 236, t: '上线',     s: '达标过线' }
  ];
  var NW = 168, NH = 40;
  var rects = [];
  nodes.forEach(function (n) {
    var r = S('rect', { x: STX - NW / 2, y: n.y, width: NW, height: NH, rx: 10, fill: C.bg, stroke: C.border, 'stroke-width': 1.5 });
    svg.appendChild(r); rects.push(r);
    svg.appendChild(text(STX, n.y + 17, n.t, { weight: 700, size: 13 }));
    svg.appendChild(text(STX, n.y + 32, n.s, { fill: C.mut, size: 10 }));
  });
  // 站点之间的竖向连线
  for (var i = 0; i < nodes.length - 1; i++) {
    svg.appendChild(S('line', { x1: STX, y1: nodes[i].y + NH, x2: STX, y2: nodes[i + 1].y, stroke: C.border, 'stroke-width': 1.5 }));
  }

  // Badcase 回灌：从「上线」绕回「建评估集」的虚线
  var feedX = STX - NW / 2 - 22;
  var feedPath = 'M ' + (STX - NW / 2) + ' ' + (nodes[3].y + NH / 2) +
                 ' H ' + feedX + ' V ' + (nodes[0].y + NH / 2) + ' H ' + (STX - NW / 2);
  var feed = S('path', { d: feedPath, fill: 'none', stroke: C.accent3, 'stroke-width': 1.4, 'stroke-dasharray': '5 4', opacity: 0 });
  svg.appendChild(feed);
  var feedLbl = text(feedX - 4, (nodes[0].y + nodes[3].y) / 2 + NH / 2, '', { fill: C.accent3, size: 10, anchor: 'end', weight: 600 });
  svg.appendChild(feedLbl);
  // 沿循环移动的请求点
  var dot = S('circle', { cx: STX, cy: nodes[0].y + NH / 2, r: 6, fill: C.accent, opacity: 0 });
  svg.appendChild(dot);
  // Badcase 回灌的小方块
  var bad = S('rect', { x: STX - NW / 2 - 6, y: nodes[3].y + NH / 2 - 6, width: 12, height: 12, rx: 3, fill: C.danger, opacity: 0 });
  svg.appendChild(bad);

  // —— 右侧：hillclimb 爬坡分数图 ——
  var GX = 300, GY = 56, GW = 408, GH = 196;        // 绘图区
  var pad = 26;
  var plotX0 = GX + pad, plotX1 = GX + GW - 12;
  var plotY0 = GY + GH - pad, plotY1 = GY + 14;     // y0 底、y1 顶
  // 坐标轴
  svg.appendChild(S('line', { x1: plotX0, y1: plotY0, x2: plotX1, y2: plotY0, stroke: C.border, 'stroke-width': 1.5 }));
  svg.appendChild(S('line', { x1: plotX0, y1: plotY0, x2: plotX0, y2: plotY1, stroke: C.border, 'stroke-width': 1.5 }));
  svg.appendChild(text(GX + GW / 2, plotY0 + 18, '迭代轮次', { fill: C.mut, size: 10.5 }));
  svg.appendChild(text(plotX0 - 6, plotY1 - 4, '分数', { fill: C.mut, size: 10.5, anchor: 'middle' }));

  // 达标线（过线阈值）
  var passV = 0.86;
  var passY = plotY0 - (plotY0 - plotY1) * passV;
  svg.appendChild(S('line', { x1: plotX0, y1: passY, x2: plotX1, y2: passY, stroke: C.accent3, 'stroke-width': 1.3, 'stroke-dasharray': '6 4' }));
  svg.appendChild(text(plotX1, passY - 6, '达标线', { fill: C.accent3, size: 10.5, anchor: 'end', weight: 600 }));

  // 逐步抬升的分数序列（hillclimb）
  var scores = [0.34, 0.48, 0.57, 0.69, 0.78, 0.83, 0.91];
  var n = scores.length;
  var step = (plotX1 - plotX0) / n;
  var barW = step * 0.5;
  function bx(idx) { return plotX0 + step * idx + (step - barW) / 2; }
  function by(v) { return plotY0 - (plotY0 - plotY1) * v; }

  // 柱子
  var bars = [];
  scores.forEach(function (v, idx) {
    var b = S('rect', { x: bx(idx), y: plotY0, width: barW, height: 0, rx: 3,
      fill: C.soft, stroke: C.border, 'stroke-width': 1 });
    svg.appendChild(b); bars.push(b);
  });
  // 折线（爬坡线），用 polyline 的 stroke-dash 做"逐步画出"
  var poly = S('polyline', { points: '', fill: 'none', stroke: C.accent, 'stroke-width': 2.4,
    'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
  svg.appendChild(poly);
  // 折线节点圆点
  var pts = [];
  scores.forEach(function (v, idx) {
    var p = S('circle', { cx: bx(idx) + barW / 2, cy: by(v), r: 3.5, fill: C.accent, opacity: 0 });
    svg.appendChild(p); pts.push(p);
  });

  // 旁白
  var cap = text(W / 2, H - 8, '', { fill: C.accent, size: 12.5, weight: 600 });
  svg.appendChild(cap);

  var caps = [
    '① 建评估集：用一组真实样例定义"什么叫答对"',
    '② 改系统：调 prompt / 调召回 / 换模型',
    '③ 跑 eval：得到一个客观分数（不再拍脑袋）',
    '④ hillclimb：每轮分数往上爬，逼近达标线',
    '⑤ 分数过线 → 达标上线',
    '⑥ 生产新 Badcase 回灌评估集，飞轮越转越厚'
  ];

  function polyPointsUpto(k) {
    var arr = [];
    for (var j = 0; j <= k && j < n; j++) arr.push((bx(j) + barW / 2) + ',' + by(scores[j]));
    return arr.join(' ');
  }

  function setStatic() {
    // 静态终态：柱子全长出、折线全画出、达标点高亮、上线点亮、回灌可见
    bars.forEach(function (b, idx) {
      var v = scores[idx];
      b.setAttribute('y', by(v));
      b.setAttribute('height', plotY0 - by(v));
      b.setAttribute('fill', v >= passV ? C.accent3 : C.soft);
    });
    poly.setAttribute('points', polyPointsUpto(n - 1));
    pts.forEach(function (p) { p.setAttribute('opacity', 1); });
    rects[3].setAttribute('stroke', C.accent3);
    feed.setAttribute('opacity', 1);
    feedLbl.textContent = 'Badcase 回灌';
    bad.setAttribute('opacity', 1);
  }

  function reset() {
    if (has) { gsap.set(dot, { x: 0, y: 0 }); gsap.set(bad, { x: 0, y: 0 }); }
    cap.textContent = '';
    rects.forEach(function (r) { r.setAttribute('stroke', C.border); r.setAttribute('stroke-width', 1.5); });
    bars.forEach(function (b) { b.setAttribute('y', plotY0); b.setAttribute('height', 0); b.setAttribute('fill', C.soft); });
    poly.setAttribute('points', '');
    pts.forEach(function (p) { p.setAttribute('opacity', 0); });
    dot.setAttribute('cx', STX); dot.setAttribute('cy', nodes[0].y + NH / 2); dot.setAttribute('opacity', 0);
    feed.setAttribute('opacity', 0);
    feedLbl.textContent = '';
    bad.setAttribute('x', STX - NW / 2 - 6); bad.setAttribute('y', nodes[3].y + NH / 2 - 6); bad.setAttribute('opacity', 0);
  }

  function pulse(tl, idx) {
    tl.call(function () { rects[idx].setAttribute('stroke', C.accent); });
    tl.to(rects[idx], { attr: { 'stroke-width': 3 }, duration: .16, yoyo: true, repeat: 1 });
    tl.call(function () { rects[idx].setAttribute('stroke', idx === 3 ? C.accent3 : C.border); });
  }

  function play() {
    reset();
    if (!has) { setStatic(); cap.textContent = caps[5] + '（无 gsap：静态终态）'; return; }
    var tl = gsap.timeline();

    // 请求点沿循环：建评估集 → 改系统 → 跑 eval
    tl.to(dot, { opacity: 1, duration: .2 });
    tl.call(function () { cap.textContent = caps[0]; });
    pulse(tl, 0);
    tl.call(function () { cap.textContent = caps[1]; });
    tl.to(dot, { attr: { cy: nodes[1].y + NH / 2 }, duration: .45, ease: 'power1.inOut' });
    pulse(tl, 1);
    tl.call(function () { cap.textContent = caps[2]; });
    tl.to(dot, { attr: { cy: nodes[2].y + NH / 2 }, duration: .45, ease: 'power1.inOut' });
    pulse(tl, 2);

      });
    });

    // 过线 → 上线
    tl.call(function () { cap.textContent = caps[4]; });
    tl.to(dot, { attr: { cy: nodes[3].y + NH / 2 }, duration: .45, ease: 'power1.inOut' });
    pulse(tl, 3);
    tl.to(dot, { opacity: 0, duration: .2 });

    // 生产 Badcase 回灌评估集
    tl.call(function () { cap.textContent = caps[5]; feed.setAttribute('opacity', 1); feedLbl.textContent = 'Badcase 回灌'; });
    tl.set(bad, { opacity: 1 });
    // 沿回灌路径：先左移、再上行、再回到评估集
    tl.to(bad, { attr: { x: feedX - 6 }, duration: .35, ease: 'power1.in' });
    tl.to(bad, { attr: { y: nodes[0].y + NH / 2 - 6 }, duration: .5, ease: 'none' });
    tl.to(bad, { attr: { x: STX - NW / 2 - 6 }, duration: .3, ease: 'power1.out' });
    pulse(tl, 0);
    tl.to(bad, { opacity: 0, duration: .25 });
    tl.call(function () { cap.textContent = '✓ 分数上升 = 产品变好，取代拍脑袋判断'; });

    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{ title: 'eval-driven：用评估分数驱动迭代', caption: '建评估集定义"对" → 改系统 → 跑 eval 爬坡 → 过线上线 → Badcase 回灌，分数上升取代拍脑袋' });

</script>
    <script>
/* 设计题八步推进：八个步骤沿一条路径依次点亮，连成完整答题链。
   1澄清边界 2目标用户与痛点 3北极星与分层指标 4方案设计 5数据与评估闭环
   6技术可行性与成本 7风险与护栏 8冷启动与迭代。
   其中第 3/5/6/7 步用强调色标为"AI 专属补强层"——这四层区分资深与新手。
   节奏像走流程：旁白逐步报"我现在在做哪一步"，走完八步路径全亮。 */
AnimCore.register('design-steps', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 320;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 400 });
    t.textContent = str; return t;
  }

  // —— 八步定义：ai=true 为"AI 专属补强层"（第 3/5/6/7 步）——
  var steps = [
    { t: '澄清边界',     s: '场景·约束·真要AI吗' },
    { t: '目标用户与痛点', s: '选一个窄 segment' },
    { t: '北极星与分层指标', s: '模型层 + 产品层', ai: true },
    { t: '方案设计',     s: 'AI 在哪加价值' },
    { t: '数据与评估闭环', s: '怎么定义答对', ai: true },
    { t: '技术可行性与成本', s: 'RAG/微调 + 单位经济', ai: true },
    { t: '风险与护栏',   s: '幻觉·安全·人工兜底', ai: true },
    { t: '冷启动与迭代', s: 'MVP 砍什么' }
  ];

  // —— 网格布局：4 列 × 2 行（蛇形路径 1→4 再 5→8）——
  var COLS = 4, ROWS = 2;
  var BW = 156, BH = 62;
  var GX = (W - COLS * BW) / (COLS + 1);          // 列间隙
  var ROWY = [54, 186];                            // 两行 y
  function colOf(i) { return i % COLS; }
  function rowOf(i) { return Math.floor(i / COLS); }
  function boxX(i) { var c = colOf(i); return GX + c * (BW + GX); }
  function boxY(i) { return ROWY[rowOf(i)]; }
  function cx(i) { return boxX(i) + BW / 2; }
  function cy(i) { return boxY(i) + BH / 2; }

  function colorOf(i) { return steps[i].ai ? C.accent2 : (i === steps.length - 1 ? C.accent3 : C.accent); }

  // —— 连接路径（在节点底下，先全灰，逐段点亮）——
  // 顺序：0→1→2→3，3↓向下到 7 那一行的列尾 4，再 4→5→6→7（第二行从左往右）
  // 路径用相邻中心点连线段表示，蛇形：行1 左→右，列4 下折，行2 左→右
  var segs = []; // 每段 { line, from, to }
  function addSeg(a, b, d) {
    var ln = S('line', { x1: cx(a), y1: cy(a), x2: cx(b), y2: cy(b),
      stroke: C.border, 'stroke-width': 2.4, 'stroke-linecap': 'round' });
    if (d) { ln.setAttribute('x1', d.x1); ln.setAttribute('y1', d.y1); ln.setAttribute('x2', d.x2); ln.setAttribute('y2', d.y2); }
    svg.insertBefore(ln, svg.firstChild);
    segs.push({ el: ln, lit: false });
  }
  // 行1：0-1-2-3 横向
  addSeg(0, 1); addSeg(1, 2); addSeg(2, 3);
  // 列4 折弯：3(右上) 向下绕到 4(左下)，走一条 L 形折线用两段近似
  var bendY = (boxY(0) + BH + boxY(4)) / 2;
  addSeg(3, 4, { x1: cx(3), y1: boxY(3) + BH, x2: cx(3), y2: bendY }); // 3 向下
  addSeg(3, 4, { x1: cx(3), y1: bendY, x2: cx(4), y2: bendY });        // 横移到列0
  addSeg(3, 4, { x1: cx(4), y1: bendY, x2: cx(4), y2: boxY(4) });      // 下到 4 顶
  // 行2：4-5-6-7 横向
  addSeg(4, 5); addSeg(5, 6); addSeg(6, 7);

  // —— 步骤节点 ——
  var boxes = [], titles = [], subs = [], badges = [], nums = [];
  steps.forEach(function (st, i) {
    var x = boxX(i), y = boxY(i);
    var rect = S('rect', { x: x, y: y, width: BW, height: BH, rx: 13,
      fill: C.bg, stroke: C.border, 'stroke-width': 1.6 });
    svg.appendChild(rect); boxes.push(rect);

    // 序号圆点
    var nc = S('circle', { cx: x + 17, cy: y + 17, r: 11, fill: C.soft, stroke: C.border, 'stroke-width': 1.4 });
    svg.appendChild(nc);
    var nt = text(x + 17, y + 21, String(i + 1), { size: 12, weight: 800, fill: C.mut });
    svg.appendChild(nt); nums.push({ circle: nc, label: nt });

    var ti = text(x + 17, y + 16, st.t, { anchor: 'start', size: 12.5, weight: 700, fill: C.fg });
    ti.setAttribute('x', x + 33);
    svg.appendChild(ti); titles.push(ti);
    var su = text(x + 33, y + 33, st.s, { anchor: 'start', size: 10, weight: 500, fill: C.mut });
    svg.appendChild(su); subs.push(su);

    // AI 补强层徽标
    var bg = null;
    if (st.ai) {
      var bw = 78, bx = x + BW - bw - 8, by = y + BH - 19;
      var br = S('rect', { x: bx, y: by, width: bw, height: 15, rx: 7.5,
        fill: 'none', stroke: C.accent2, 'stroke-width': 1.2, opacity: 0 });
      var bt = text(bx + bw / 2, by + 11, 'AI 补强层', { size: 9, weight: 700, fill: C.accent2 });
      bt.setAttribute('opacity', 0);
      svg.appendChild(br); svg.appendChild(bt);
      bg = { rect: br, label: bt };
    }
    badges.push(bg);
  });

  // 起点/终点角标
  var startTag = text(cx(0), boxY(0) - 12, '起点', { size: 10, weight: 700, fill: C.mut });
  var endTag = text(cx(7), boxY(7) + BH + 16, '答完一圈', { size: 10, weight: 700, fill: C.mut });
  svg.appendChild(startTag); svg.appendChild(endTag);

  // 行进光点（沿路径走的小圆）
  var runner = S('circle', { cx: cx(0), cy: cy(0), r: 6, fill: C.accent, opacity: 0 });
  svg.appendChild(runner);

  // 旁白
  var cap = text(W / 2, H - 8, '', { fill: C.accent, size: 13, weight: 600 });
  svg.appendChild(cap);

  var caps = [
    '① 澄清边界：场景 / 约束 / 真的需要 AI 吗',
    '② 目标用户与痛点：选一个尽量窄的 segment',
    '③ 北极星与分层指标：模型层 + 产品层【AI 补强】',
    '④ 方案设计：AI 在哪加价值、在哪加摩擦',
    '⑤ 数据与评估闭环：把模糊需求写成可测【AI 补强】',
    '⑥ 技术可行性与成本：RAG/微调选型 + 单位经济【AI 补强】',
    '⑦ 风险与护栏：fallback / 人工兜底 / 置信度【AI 补强】',
    '⑧ 冷启动与迭代：MVP 砍什么 + 怎么 A/B 验证'
  ];

  function litStyle(i) {
    var col = colorOf(i);
    boxes[i].setAttribute('stroke', col);
    boxes[i].setAttribute('stroke-width', 2.4);
    nums[i].circle.setAttribute('fill', col);
    nums[i].circle.setAttribute('stroke', col);
    nums[i].label.setAttribute('fill', C.bg);
    titles[i].setAttribute('fill', C.fg);
    if (badges[i]) { badges[i].rect.setAttribute('opacity', 1); badges[i].label.setAttribute('opacity', 1); }
  }
  function dimStyle(i) {
    boxes[i].setAttribute('stroke', C.border);
    boxes[i].setAttribute('stroke-width', 1.6);
    nums[i].circle.setAttribute('fill', C.soft);
    nums[i].circle.setAttribute('stroke', C.border);
    nums[i].label.setAttribute('fill', C.mut);
    if (badges[i]) { badges[i].rect.setAttribute('opacity', 0); badges[i].label.setAttribute('opacity', 0); }
  }

  function reset() {
    if (has) gsap.killTweensOf('*');
    steps.forEach(function (st, i) { dimStyle(i); });
    segs.forEach(function (s) { s.el.setAttribute('stroke', C.border); s.el.setAttribute('stroke-width', 2.4); s.lit = false; });
    runner.setAttribute('opacity', 0);
    runner.setAttribute('cx', cx(0)); runner.setAttribute('cy', cy(0));
    startTag.setAttribute('fill', C.mut);
    endTag.setAttribute('fill', C.mut);
    cap.textContent = '';
  }

  function staticFinal() {
    steps.forEach(function (st, i) { litStyle(i); });
    segs.forEach(function (s) { s.el.setAttribute('stroke', C.accent); s.el.setAttribute('stroke-width', 3); });
    startTag.setAttribute('fill', C.fg);
    endTag.setAttribute('fill', C.accent3);
    cap.textContent = '八步走完：通用骨架 + 四个 AI 补强层（蓝紫色那四步）';
  }

  // segIndex 区间：每个目标步 i 之前需要点亮的路径段索引
  // segs: [0]0-1 [1]1-2 [2]2-3 [3]3↓ [4]横 [5]↓4 [6]4-5 [7]5-6 [8]6-7
  var segsBeforeStep = [ [], [0], [1], [2], [3, 4, 5], [6], [7], [8] ];

  function play() {
    reset();
    if (!has) { staticFinal(); return; }
    var tl = gsap.timeline();

    tl.to(runner, { attr: { opacity: 1 }, duration: .2 });

    steps.forEach(function (st, i) {
      // 走到该步前先点亮通往它的路径段 + 移动光点
      var pre = segsBeforeStep[i];
      pre.forEach(function (sIdx) {
        var seg = segs[sIdx];
        tl.call(function () { seg.el.setAttribute('stroke', C.accent); seg.lit = true; });
        tl.to(seg.el, { attr: { 'stroke-width': 3 }, duration: .12 });
      });
      if (i > 0) {
        tl.to(runner, { attr: { cx: cx(i), cy: cy(i) }, duration: .42, ease: 'power1.inOut' }, pre.length ? '<' : '+=0');
      }

      // 点亮该步
      tl.call(function () {
        cap.textContent = caps[i];
        if (i === 0) startTag.setAttribute('fill', C.fg);
        litStyle(i);
        if (st.ai) runner.setAttribute('fill', C.accent2);
        else if (i === steps.length - 1) runner.setAttribute('fill', C.accent3);
        else runner.setAttribute('fill', C.accent);
      });
      tl.to(boxes[i], { attr: { 'stroke-width': 4 }, duration: .2, yoyo: true, repeat: 1, ease: 'power1.inOut' });
    });

    // 收尾：光点归位 + 终点角标点亮 + 总结
    tl.call(function () {
      runner.setAttribute('opacity', 0);
      endTag.setAttribute('fill', C.accent3);
      cap.textContent = '八步连成一条路径：第 3/5/6/7 步是 AI 专属补强层（蓝紫色）';
    });
    tl.to({}, { duration: .4 });
    tl.call(function () { cap.textContent = '少走这四层，就显得只是把 AI 当噱头加了个按钮'; });

    return tl;
  }

  reset();
  return { play: play, reset: reset };
}, /*__META__*/{ title: '设计题八步推进', caption: '八步答题结构依次点亮成一条路径：第 3/5/6/7 步是 AI 专属补强层（指标 / 评估闭环 / 成本 / 护栏），区分资深与新手' });

</script>

    <script>

        var a = e.target.closest && e.target.closest("a.cover-btn");
        if (!a) return;

        if (href.indexOf("#") === 0) { e.preventDefault(); window.location.hash = href; }
      });
      (function () {
        var pts = null, W = 0, H = 0, raf = null;
        function frame() {
          raf = null;
          var c = document.getElementById("cover-canvas");
          if (!c) { pts = null; return; } // 不在封面：停止循环（省资源、避免与滚动争用）
          if (document.body.classList.contains("reduce-motion")) { try { var x = c.getContext("2d"); x.clearRect(0, 0, c.width, c.height); } catch (e) {} pts = null; return; }
          var w = c.clientWidth, h = c.clientHeight;
          if (w && h) {
            if (c.width !== w || c.height !== h) { c.width = w; c.height = h; }
            W = w; H = h;
            if (!pts) { var n = Math.min(70, Math.floor(w * h / 16000)); pts = []; for (var i = 0; i < n; i++) pts.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - .5) * .35, vy: (Math.random() - .5) * .35 }); }

            var dark = document.body.classList.contains("dark");
            var lineRGB = dark ? "94,209,255" : "99,102,241";
            var dotColor = dark ? "rgba(167,139,250,0.7)" : "rgba(124,92,240,0.5)";
            for (var i = 0; i < pts.length; i++) { var p = pts[i]; p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > W) p.vx *= -1; if (p.y < 0 || p.y > H) p.vy *= -1; }
            for (var a = 0; a < pts.length; a++) for (var b = a + 1; b < pts.length; b++) {
              var dx = pts[a].x - pts[b].x, dy = pts[a].y - pts[b].y, d = Math.sqrt(dx * dx + dy * dy);
              if (d < 130) { ctx.strokeStyle = "rgba(" + lineRGB + "," + (0.2 * (1 - d / 130)) + ")"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke(); }
            }
            for (var k = 0; k < pts.length; k++) { ctx.fillStyle = dotColor; ctx.beginPath(); ctx.arc(pts[k].x, pts[k].y, 1.7, 0, 6.283); ctx.fill(); }
          }
          raf = requestAnimationFrame(frame); // 仍在封面：继续
        }
        function start() { if (!raf) raf = requestAnimationFrame(frame); }
        start();
        setTimeout(start, 400); setTimeout(start, 1000); // 初始封面渲染后补启动
        window.addEventListener("hashchange", function () { setTimeout(start, 150); });
      })();
    </script>
