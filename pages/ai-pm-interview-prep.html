72%、增长掉头，到 2026 Q1 国内 MAU 已被豆包、千问反超退居第三、活跃率头部最低。原因是模型强但产品薄——没有留存抓手，用户问完即走。它给我的启发是：**模型能力是入场券，不是护城河；C 端的护城河是分发、生态和留存。**\n\n**可能的追问及答法：**\n\n- *\"那它到底算不算成功？\"* → 分层看。作为**模型和开源生态**它非常成功，渗透进千万级第三方应用、重塑了行业成本预期；作为**C 端产品**它没跑通留存。把\"模型成功\"和\"产品成功\"混为一谈，是这个案例最容易踩的坑。\n- *\"如果让你给 DeepSeek 做留存，你会做什么？\"* → 抓它唯一的差异化资产——思维链可见，把一次性的\"答得好\"做成可沉淀、可复用的\"想清楚的过程\"；同时聚焦专业人群（开发者、研究者）做深，而不是和豆包拼大众日活。\n- *\"为什么豆包能反超它？\"* → 一句话：**分发即护城河。** 豆包背靠抖音生态，用 AI 整合现有业务（电商抽佣 + 广告），不靠直接收费养活，流量和留存都有娘家撑；DeepSeek 是孤军，模型再强也补不上分发的结构性差距。\n- *\"它的 API 低价能持续吗？\"* → 谨慎说。MoE + 稀疏注意力让它成本结构确实更优，但\"545% 利润率\"是理论值，真实变现存疑、营收口径打架。低价是抢占心智的战略选择，不一定是健康的盈利模型。\n\n## 与你项目的关联\n\n你在**杭小育**里做过\"DeepSeek 模型深度适配\"，这正是把这个案例从\"看新闻\"讲成\"我一线趟过\"的支点。面试里可以这样接：你不是从财经报道认识 DeepSeek，而是真在 460 万用户的政务育儿 RAG 里用过它——你清楚它在中文长文本理解、推理任务上的实际表现，也清楚它的成本优势（CAG 降本 80% 的链路里，模型侧成本是关键一环）。这让你对\"模型强≠产品强\"\"低价 API 怎么影响产品决策\"有一线判断，而不是纸上谈兵。一句话收口：\"**我选 DeepSeek 不是因为它便宜，是因为在我的场景里，它的推理质量和成本平衡是当时最优解——这个取舍判断，才是 PM 该有的。**\"\n", "/03-案例库/01-ChatGPT.md": "# ChatGPT 拆解：对话式 AI 的范式定义者\n\n## 一句话定位\n\nChatGPT 不是\"最好的聊天机器人\"，而是**重新定义了人和软件交互方式的那个产品**——它把\"自然语言对话\"从语音助手的玩具，变成了亿级用户每天用来工作、学习、查资料的主界面。拆 AI 助手赛道，它是必须先建立的坐标系：后面所有产品（豆包、Gemini、杭小育这类问答应用）都在它定义的范式里做加减法。\n\n## 产品快照\n\n- **定位**：通用 AI 助手 / 对话式 AI 入口，OpenAI 的 C 端门面。\n- **目标用户**：从最初的开发者 / 极客，扩散到学生、白领、内容创作者、普通信息查询者——典型的\"先专业后大众\"扩散路径。\n- **关键数据**（标口径与时点，机构估算为主，OpenAI 不公开 MAU）：\n  - **9 亿周活（WAU）**：OpenAI 官方口径，2026 年 2 月确认，较 2025 年 2 月的 4 亿、2025 年 10 月的 8 亿一路翻倍。\n  - **ChatGPT App 月活破 10 亿**：Reuters 2026 年 6 月口径，号称史上最快破 10 亿 MAU 的 App。口径提示：这是 App 端月活，和\"全平台去重月活\"不是一回事，引用时讲清是哪个口径。\n  - **付费订阅约 5000 万**（全档位合计）+ 企业付费用户超 900 万：OpenAI 官方口径，2026 年 2 月。这是讲\"订阅跑通\"最硬的一组数。\n  - **网页端市场份额从约 87% 跌到约 68%**（Similarweb 七大聊天机器人网页流量口径，2025 年 1 月→2026 年 1 月），同期 Gemini 从约 5% 升到约 18%——**这是 ChatGPT 当前最值得讲的故事**。注意：网页份额跌≠用户流失，绝对周活仍在涨，份额是被对手增量稀释的。\n  - **ARR 约 200 亿美元**（2025 年末，OpenAI CFO 口径），2026 年一季度年化收入冲到约 250 亿美元；企业版收入占比已超 40% 并逼近与个人订阅持平。\n  - **Plus 半年留存约 71%**：Earnest Analytics 口径，在 AI 订阅产品里排第一（Claude Pro 约 62%、Gemini Advanced 约 60%）；对照 AI 应用年留存中位数仅约 21%，订阅黏性属顶级。\n\n> 口径提醒：国内媒体常把\"周活/月活\"、\"App 月活/全平台去重月活\"混着说，也常把不同时点的份额拼在一起讲。面试里你主动点破\"这是哪个口径、哪个时点\"，本身就是一个加分动作。\n\n## 核心体验设计：它做对了什么\n\nChatGPT 的产品功力不在某个单点功能，而在**把\"对话\"这个交互范式打磨到了大众可用**。\n\n- **零学习成本的输入框**：没有菜单、没有按钮树，一个输入框 + 一句\"你想问什么\"。这是它能从极客破圈到大众的根本——交互的认知负担接近于零。\n- **跨会话记忆（Memory）**：记住用户偏好、身份、历史上下文，让助手从\"一次性问答工具\"变成\"越用越懂你的伙伴\"。这是把工具留存往上拉的关键设计，直接对抗 AI 应用的\"用完即走\"。\n- **GPTs / 自定义助手**：让用户和开发者无需写代码就能定制专用助手，试图复制 App Store 的生态飞轮（虽然这条没真正跑成，见下文批判）。\n- **Canvas / 协作画布**：把\"对话流\"升级为\"可编辑的工作空间\"，写代码、写长文时不再被聊天气泡的线性结构困住——这是从\"问答\"走向\"生产力工具\"的关键一步。\n- **实时语音**：把延迟压到生产级，语音从\"念字幕\"变成\"能打断、能插话的真对话\"，打开了开车、做饭等无手场景。\n- **ChatGPT Agent**：从\"回答问题\"走向\"代你执行\"（订机票、查资料、操作网页），是它对 Agent 化趋势的卡位。\n\n**为什么用户买账**：它第一个让普通人感到\"AI 真的有用\"——不是 demo 惊艳，是日常能省时间。signature 体验是那种\"我随口一问，它就给了我一个能直接用的结果\"的爽感。\n\n## 技术取舍（PM 视角）\n\n不堆术语，讲取舍逻辑：\n\n- **模型档位化**：GPT-5 系做日常对话的\"快而省\"，o 系 / 推理模型做需要深度思考的\"慢而准\"。这是**成本与体验的分层**——不是所有问题都值得用最贵的推理算力，PM 视角看，这是一道把单位经济模型做正的关键工程决策。\n- **原生多模态 + 长上下文**：图、文、语音同一个模型处理，1M 级长上下文成标配。对用户的意义是\"我可以把整份文档 / 整段录音直接丢给它\"。\n- **持久记忆**：技术上要解决\"记什么、怎么检索、怎么不串台\"，本质是给无状态的大模型外挂了一层用户状态管理——这正是杭小育那类 RAG 系统也要面对的工程问题，只是 ChatGPT 把它产品化得更彻底。\n\n核心取舍：**OpenAI 押注\"模型能力领先\"作为护城河**，把绝大部分资源砸在把模型做得更强。这在能力差距大的早期很对，但当对手能力追平、且手握分发渠道时，这道护城河就开始漏水。\n\n## 商业模式\n\n```mermaid\ngraph LR\n    classDef product fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef revenue fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef risk fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Free([免费用户 海量流量]):::product\n    Plus(Plus/Pro 个人订阅):::revenue\n    API(API 开发者):::revenue\n    Ent(企业/Team 版):::revenue\n\n    Free ==>|转化 约5000万付费| Plus\n    Free -->|心智占领| API\n    Plus ==>|个人订阅大头| Rev[(ARR 约200亿美元)]:::revenue\n    API -->|开发者调用| Rev\n    Ent ==>|占比超40%且仍在升| Rev\n\n    Cost{算力成本高企}:::risk\n    Rev -.->|大幅亏损| Cost\n    N[\"订阅跑通但仍未盈利<br/>烧钱换规模\"]:::note\n    Cost -.-> N\n```\n\n- **怎么赚钱**：个人订阅（Plus / Pro）+ 企业版（Team / Enterprise）+ API 调用。早期个人订阅是大头，但企业版收入占比已超 40% 并逼近与个人订阅持平——增长引擎正从 C 端往 B 端挪。\n- **赚到没**：收入端跑通了——约 5000 万付费订阅、半年留存 71%、ARR 约 200 亿美元，这是订阅制 AI 应用里少见的成功样本（对照 AI 陪伴赛道 PMF 易、付费留存难的全面证伪）。但**整体仍大幅亏损**，算力和训练成本吞掉收入，靠融资续命换规模。\n- **卡在哪**：单位经济模型还没真正打正，且收入高度依赖\"用户主动来订阅\"——它**没有自己的分发渠道**，这是和 Google 的本质差距。\n\n## 可批判点 / 如果我来做会怎么改\n\nChatGPT 最大的软肋不是产品力，是**分发**。\n\n- **份额被 Gemini 用分发硬生生啃下来**：Gemini App 月活在 2026 年初破 7.5 亿（Q3 2025 还是 6.5 亿），靠的不是模型更强，而是搜索框、安卓系统、Gmail / Docs 全家桶的默认入口——用户不需要\"专门去用\"，AI 就出现在他们已经在的地方。ChatGPT 网页份额一年从约 87% 掉到约 68%，吃掉份额的主要就是它。这印证了一句话：**在能力趋同的时代，分发即护城河。**\n  - 但这里要会自己反驳一句（面试官爱听）：份额跌**不等于**盘子在缩——ChatGPT 绝对周活同期还在涨（4 亿→9 亿）。真正危险的不是\"现在丢了多少\"，而是\"增量大盘被对手用分发先占了\"——它守得住存量，抢不到增量，天花板被对手定。\n- **GPTs 生态没跑成**：本想复制 App Store，但创作者赚不到钱、用户也没养成\"去 GPT Store 找助手\"的习惯，飞轮没转起来。\n- **如果我来做**：第一优先级是**补分发**——要么深度绑一个高频入口（操作系统 / 浏览器 / 硬件），要么把 Agent 做成\"嵌入别人工作流\"的形态（像 ChatGPT 进了一堆第三方 App），用 API + Agent 把自己变成基础设施，而不是只守着自己那个网页输入框等用户上门。第二是把 Memory 和 Agent 拧成一个真正的\"个人 OS\"，用数据和习惯沉淀做留存护城河，对冲分发劣势。\n\n## 面试怎么用这个案例\n\n**30 秒话术（被问\"你怎么看 ChatGPT / 它的护城河\"）**：\n\"ChatGPT 定义了对话式 AI 的交互范式，产品力和订阅留存都是行业标杆，半年留存 71%。但它最大的风险不在产品，在分发——能力趋同后，Gemini 靠 Google 全家桶的默认入口一年就把它的网页份额从约 87% 啃到约 68%。所以我会说：AI 助手的下半场，胜负手从'谁模型强'转向'谁离用户更近'。ChatGPT 必须从'等用户来的网页'变成'嵌进用户工作流的基础设施'。\"\n\n**可能追问及答法**：\n- *追问：那 OpenAI 该怎么补分发？* → 三条路：绑硬件 / 操作系统入口、把 Agent 做成嵌入第三方 App 的能力层、用 Memory 做个人数据沉淀提高迁移成本。但每条都慢且重，这正是它最焦虑的地方。\n- *追问：留存这么好，为什么还危险？* → 留存高的是已转化的付费用户，但获客高度依赖品牌主动搜索；Gemini 拿到的是\"被动触达\"的增量大盘，两边争的不是同一批人。基本盘稳，但增量天花板被对手卡住。\n- *追问：GPTs 生态为什么没成？* → 缺了 App Store 飞轮的两个关键件——创作者赚钱机制和用户主动检索习惯。没有商业回报，供给端不持续；助手发现成本太高，需求端也起不来。\n\n## 与你项目的关联\n\n杭小育的政务育儿问答，本质就是 ChatGPT 对话范式在垂直场景的落地——同样要解决\"自然语言输入、上下文记忆、把模型外挂知识做准\"这套问题（杭小育准确率 97.5%、拍照营养分析 98%，正是在垂直域把\"答得准\"做到了极致）。先拆 ChatGPT 建立坐标系，面试时就能说清：你做的不是一个孤立的政务工具，而是在通用对话范式上，针对育儿这个高确定性、低容错场景，做了知识准确性和合规性的强化——这恰好是通用助手做不到、垂直产品才有的价值锚点。\n\n---\n\n**Sources（数据核证，2026-06 核对）**：\n- 900M WAU（2026-02 官方）/ 1B App MAU（2026-06 Reuters）：[ALM Corp](https://almcorp.com/blog/chatgpt-900-million-weekly-active-users/)、[DemandSage](https://www.demandsage.com/chatgpt-statistics/)\n- 约 5000 万付费订阅 + 900 万企业付费用户（2026-02）：[Roic News](https://www.roic.ai/news/openais-chatgpt-surpasses-900-million-weekly-users-50-million-paying-subscribers-02-27-2026)\n- 网页份额 87%→68%、Gemini 升至 18%（Similarweb，2025-01→2026-01）：[Vertu](https://vertu.com/lifestyle/ai-chatbot-market-share-2026-chatgpt-drops-to-68-as-google-gemini-surges-to-18-2)、[Yahoo Finance](https://finance.yahoo.com/news/chatgpt-market-share-slipping-google-155419736.html)\n- ARR 约 200 亿（2025 末，CFO 口径）/ 约 250 亿年化（2026-Q1）/ 企业版占比超 40%：[PYMNTS](https://www.pymnts.com/artificial-intelligence-2/2026/openais-annual-recurring-revenue-tripled-to-20-billion-in-2025/)、[Sacra](https://sacra.com/c/openai/)\n- Plus 半年留存 71%（Earnest Analytics）/ AI 应用年留存中位数约 21%：[PYMNTS](https://www.pymnts.com/artificial-intelligence-2/2025/report-chatgpt-plus-has-top-retention-rate-among-ai-subscription-services/)、[Arcade](https://www.arcade.dev/blog/user-retention-in-ai-platforms-metrics/)\n- Gemini App 750M MAU（2026-02）：[TechCrunch](https://techcrunch.com/2026/02/04/googles-gemini-app-has-surpassed-750m-monthly-active-users/)\n", "/03-案例库/05-AI搜索.md": "# AI 搜索拆解：夸克 / Perplexity，搜索范式的重构\n\n## 一句话定位（电梯说法）\n\nAI 搜索把搜索引擎从「给你十个蓝色链接、自己去翻」变成「直接给你一个带引用的答案」——它不是把搜索做得更好，而是**把\"检索 + 阅读 + 总结\"这三步用户原本要自己干的活，一次性替用户干完**。技术底座就是 RAG（检索增强生成）：实时检索网页 → 喂给大模型 → 生成带溯源的答案。代表选手国内是夸克（阿里），海外是 Perplexity，而真正决定行业生死的是 Google 用 AI Overviews 自我革命——因为搜索是 Google 的命根子，它动，整个内容生态都会被掀翻。\n\n## 产品快照（口径与时点已标）\n\n| 产品 | 定位 | 关键数据（标口径/时点） |\n|------|------|------|\n| 夸克（阿里） | C 端 AI 旗舰，\"AI 超级框\" | MAU 约 1.46 亿（2025.2，AI产品榜口径），是**当时**国内唯一月活破亿的 AI 应用；DAU 约 3430 万；同年 3 月升至约 1.48 亿登顶国内总榜 |\n| Perplexity | Answer engine（答案引擎） | 全平台 MAU 破 1 亿（2026.4，含 Comet 浏览器 + Computer + 企业版，CEO 口径）；ARR 约 5 亿美元（2026.4），全年目标 6.56 亿；估值约 200 亿美元（2026 初 E-6 轮 post-money） |\n| Google AI Overviews / AI Mode | 传统搜索的 AI 化自我革命 | AI Overviews 触发率约 13–25%（2025–2026，按监测机构/查询类型差异大）；含 AI Overviews 的搜索约 83% 零点击、AI Mode 约 93% 零点击（Semrush，2025.9 口径）；整体零点击约 68%（2026 初，机构差异大） |\n\n口径提示：①夸克\"唯一破亿\"是 2025 Q1（AI 产品榜口径，2025.2）的说法，到 2025 下半年豆包等已快速增长，引用时务必说\"截至 2025 年初\"。②Perplexity 早期流传的\"约 4500 万 MAU\"已过时，最新是全平台破亿（含 Comet 浏览器、Computer、企业版，CEO 口径），且要分清\"自研 App/网页\"和\"全平台总和\"两个口径。③AI Overviews 触发率各家监测差异极大（13%–25%，按查询类型/地区/桌面或移动而不同），口头流传的\"覆盖约 48% 查询\"无明确公开监测口径，**不要单独抛这个数**；要讲冲击，用\"零点击\"更稳：含 AI Overviews 的搜索约 83% 不产生点击、AI Mode 高达约 93%（Semrush，2025.9），这是对发布商最有杀伤力的口径。\n\n## 核心体验设计：它做对了什么\n\n**Perplexity 的 signature 体验是\"答案 + 行内引用 + 追问链\"。** 你问一句，它先用一段话把答案说清楚，每个关键结论后面挂一个 [1][2] 角标，点开就是原文出处；底下再给你三四个\"你可能还想问\"。它把搜索从\"自己拼凑信息\"变成了\"和一个会查资料的助理对话\"。用户买账的核心是**省掉了点链接、读长文、自己总结这一整套苦力活**，而引用溯源又给了它\"不是张口胡说\"的可信度——这是它和纯聊天机器人最大的差异点。\n\n**夸克做对的是\"超级框 + 场景化深度任务\"。** 2025 年 3 月阿里推\"新夸克\"，基于通义大模型，把搜索、网盘、文档、AI 写作全收进一个输入框，定位\"All-in-One AI 超级框\"。最值得讲的 case 是 2025 年 6 月的**高考志愿大模型**：它不只是搜索，而是一个 Agent——用户填 12 个信息点，系统走\"规划-执行-检查-反思\"链式推理，5–10 分钟产出一份 15–20 页的\"冲稳保\"志愿报告。这是搜索向\"深度任务 Agent\"跃迁的典型，而且打的是**信息平权**牌（对标线下动辄上万的志愿咨询）。一个产品判断：夸克的护城河不在搜索本身，而在阿里能把搜索嵌进高考、医疗、办公这些高价值场景，用\"超级框\"做流量入口、用 Agent 做留存。\n\n## 技术取舍（PM 视角）\n\n```mermaid\ngraph LR\n    classDef input fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef core fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef store fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef out fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Q([\"用户提问\"]):::input\n    RW{{\"查询改写/意图识别\"}}:::core\n    SE[(实时检索<br/>网页/索引)]:::store\n    RANK{{\"重排/去重/筛选\"}}:::core\n    LLM(大模型生成答案):::core\n    CITE(引用溯源对齐):::core\n    ANS([\"带引用的答案 + 追问\"]):::out\n\n    Q ==> RW\n    RW ==> SE\n    SE ==> RANK\n    RANK ==> LLM\n    LLM ==> CITE\n    CITE ==> ANS\n    N[\"核心难点：答案与引用必须严格对齐<br/>否则就是'幻觉式溯源'\"]:::note\n    CITE -.-> N\n```\n\n底层是 **RAG + 实时检索 + 引用溯源**三件套。PM 视角的几个关键取舍：\n\n- **为什么是 RAG 而不是纯大模型答**：大模型有知识截止、会编，搜索场景要的是\"实时 + 可信\"。RAG 用外部检索把\"准不准\"交给真实网页兜底，把\"会不会说人话\"交给大模型——这正是和你杭小育同源的产品思路。\n- **引用溯源是体验生命线，也是最难的地方**：答案里每句话和引用源能不能严格对上，决定了用户信不信。对不上就是\"幻觉式溯源\"——看着有出处，点开根本没这句话，这是 AI 搜索最大的信任杀手。\n- **速度 vs 深度的分层**：日常问答要秒回（轻检索），志愿报告这种要慢工出细活（多轮 Agent）。好产品会把\"快答\"和\"深度任务\"做成两档，而不是一个模型硬扛所有场景。\n\n## 商业模式：怎么赚、卡在哪\n\n**Perplexity 走的是\"直接向用户高客单价订阅\"——大厂里少有的硬气路线。** Pro 约 20 美元/月、Max 层约 200 美元/月，ARR 一年从约 2 亿冲到约 5 亿美元。增长拐点是 2025 年的 **Comet agentic 浏览器**和 2026 年 2 月的\"The Computer\"，把答案引擎推向\"能替你操作\"的 Agent。但它的成本结构很重（每次回答都要实时检索 + 大模型推理），盈利与否仍是问号。\n\n**夸克走阿里的打法：搜索做流量入口，变现靠生态。** 不指望搜索本身直接收费，而是用免费的\"超级框\"把用户圈进阿里 AI 体系，再通过会员、云、电商等下游变现——和字节\"用 AI 整合现有业务\"是同一逻辑。这也呼应了行业的**中美分裂**：美国订阅跑得通（用户愿为答案付费），中国主流还是广告 + 电商抽佣，直接向 C 端收费的留存和付费意愿都偏弱。\n\n## 可批判点 / 如果我来做会怎么改\n\nAI 搜索最尖锐的三个问题，2025–2026 全有实锤：\n\n1. **幻觉与虚假归因**：纽约时报 2025 年 12 月起诉 Perplexity，诉状直接点名\"虚假归因\"——AI 把不存在的话安到某家媒体头上。这比单纯说错更危险，因为它**伤的是被引用方的信誉**。\n2. **版权**：Perplexity 成了众矢之的——CNN 于 2026 年 5 月起诉，指其未经授权抓取超 1.7 万篇新闻、并借 Comet Plus 让用户绕开付费墙拿到 CNN 付费内容（讽刺的是 CNN 本身就是 Comet Plus 签约方，照样开告）；道琼斯（《华尔街日报》）、纽约邮报（News Corp 旗下）、大英百科、韦氏词典等也接连发难。\n3. **对内容生态的破坏（最有数据的批判）**：Pew 控制实验（6.8 万次查询）显示，出现 AI Overviews 时点击相对下降约 47%；含 AI Overviews 的搜索约 83% 零点击、AI Mode 约 93% 零点击（Semrush，2025.9），等于答案就地消化、用户不再点出去；食谱、健康、how-to 这类信息型内容受冲击最重。**AI 搜索在吃内容创作者的奶，却不给他们回流量**——这是整个生态的死结。\n\n**如果我来做**，会把\"溯源可信度\"做成产品级硬约束，而不是靠模型自觉：答案生成后做一道\"引用回验\"，每句结论必须能在引用源里找到原文锚点，找不到就降级为\"综合多来源\"而不是硬挂一个假出处。商业上我会认真做**出版商分成**——这恰恰是 Perplexity 已经在补的：2025 年 8 月它推出 Comet Plus 订阅层（5 美元/月）、拨款约 4250 万美元、把订阅收入的 80% 分给签约出版商，已签 CNN、Condé Nast、Fortune、《华盛顿邮报》、《洛杉矶时报》、Le Monde 等。这是对\"破坏生态\"批判的直接回应，也是 AI 搜索能不能长期活下去的关键——不和内容方分钱，迟早被诉讼和屏蔽拖死。值得注意的是：CNN 一边签 Comet Plus 一边起诉，说明\"分成\"远未真正抚平利益冲突。\n\n## 面试怎么用这个案例\n\n**被问\"你怎么看 AI 搜索 / 重新设计搜索\"的 30 秒话术：**\n\"AI 搜索的本质不是搜索更准，而是把用户原本要自己做的'检索-阅读-总结'三步一次干完，底层就是 RAG。它的体验生命线是引用溯源——答案要带可信出处，否则就是幻觉式溯源，信任直接崩。商业上海内外分裂：Perplexity 靠高客单价订阅、夸克靠阿里生态变现。但它有个根本矛盾——吃内容创作者的流量却不回馈，AI Overviews 让新闻站 CTR 掉了近一半，所以谁先解决和内容方的利益分配，谁才能长期赢，Perplexity 给出版商分 80% 新订阅收入就是这个信号。\"\n\n**可能追问及答法：**\n- *\"AI 搜索和聊天机器人（豆包/ChatGPT）有什么区别？\"* —— 答：核心差在\"实时检索 + 强溯源\"。聊天机器人靠模型内部知识、会过时会编；AI 搜索每个答案挂真实网页引用，主打\"准 + 可信\"。但边界在模糊，豆包、ChatGPT 也都接了联网检索，未来是融合。\n- *\"AI 搜索怎么赚钱？广告还塞得进去吗？\"* —— 答：订阅是当下最干净的（Perplexity 路线），但天花板有限。广告难点在于答案是一段连续文本、没有十个链接位可卖，硬塞会毁可信度。更可能的是\"答案内的赞助溯源\"和电商分成，但都得先过用户信任这关。\n- *\"幻觉问题怎么解？\"* —— 答：纯靠大模型解不了，要做产品级约束：引用回验（每句结论锚定原文）、低置信度时主动降级表述、把\"快答\"和\"深度核查\"分档。不是让模型更聪明，是给它套缰绳。\n\n## 与你项目的关联\n\nAI 搜索本质就是 **RAG 产品化**，和你的杭小育（C 端政务育儿 RAG，准确率 97.5%）完全同源——你能从技术取舍角度讲透别人讲不透的点：为什么用 RAG 不用纯大模型、检索和生成怎么分工、引用溯源为什么是体验生命线、幻觉到底卡在哪一环。面试时可以这样接：\"夸克高考志愿那个 Agent，从搜索升级成'规划-执行-检查-反思'的深度任务，逻辑和我们 SAGE-AI 取数的推理链路可视化是一脉相承的——都是把 AI 的'黑盒过程'摊开给用户看，用过程可信换结果采纳率。\" 这样既证明你懂大众产品，又把自己的垂直经验嫁接成了通用 sense。\n", "/03-案例库/09-AIGC创作.md": "# AIGC 创作拆解：即梦 / 可灵 / Midjourney，多模态创作工具\n\n> 本篇所有版本号、榜单、收入数据均标注快照时点。这条赛道半年内可灵从 2.6 走到 3.0、即梦发了 Seedance 2.0、Midjourney 上了 V8.1——**面试讲案例不标时点会被一句\"现在还是这样吗\"戳穿**。核证时点：2026-06-13。\n\n## 一句话定位（电梯说法）\n\nAIGC 创作工具就是\"把一句话变成一张图、一段视频\"的生产力引擎。Midjourney 把图像生成做成了审美标杆；可灵和即梦则在文生视频上正面对撞——前者靠 API + 订阅 + 短剧生态把 ARR 冲到近 5 亿美元（2026-03 时点），后者背靠字节生态走短剧降本路线。这条赛道当前不是\"一家独大\"，而是**多强专精、按场景混用**。\n\n## 产品快照\n\n| 产品 | 母公司 | 主打 | 关键数据（标口径与时点） |\n|------|--------|------|--------------------------|\n| 可灵 Kling | 快手 | 文/图生视频 | MAU 突破 1200 万（2026-01-20）；全球用户超 1 亿、企业客户近 5 万家（2026-06 初，快手官方）；2025 全年收入约 1.4 亿美元（约 10.4 亿元），2026-Q1 收入超 6.5 亿元、同比 +300%，2026-03 ARR 近 5 亿美元（快手 Q1 财报，2026-05-27 发布）；快手拟分拆可灵、约 200 亿美元估值接洽 Pre-IPO |\n| 即梦 Dreamina | 字节跳动 | 文/图生视频、短剧 | Seedance 2.0（2026-02-10 发布）在 Artificial Analysis Video Arena 得 1269 分，超 Veo 3 / Sora 2 / Runway Gen-4.5 登顶；支持 2K、最长约 15 秒多镜头序列 + 原生音频；走字节生态分发（抖音、豆包打通） |\n| Midjourney | Midjourney Inc. | 文生图（已切入视频） | 注册用户峰值约 2100 万（Discord，2025-06）、2026-01 约 1980 万；2025 全年营收 5 亿美元（同比 +66.7%）；V8 于 2026-03 发布、V8.1 于 2026-04 底替换 V8（HD 默认、约 1/3 成本）；约 100–160 人团队，人均营收约 500 万美元 |\n\n口径提醒：可灵\"$14 亿年化\"是**误写**。正确是 2025 全年收入约 **1.4 亿美元**（约 10.4 亿元），或 2026-03 时点 **ARR 近 5 亿美元**——两者一个是已实现年收入、一个是单月年化推算，别混用（ARR = 当月收入 ×12，会显著高于已实现年收入，引用时务必说清是哪个）。增长引擎也不是\"直播\"——快手 Q1 直播收入同比 -13.5%，可灵靠的是 API（企业客户近 5 万家）+ App 订阅 + 短剧分账生态。\n\n## 核心体验设计：它们做对了什么\n\n**Midjourney——把\"出图\"做成了审美默认值。** 它的 signature 体验是\"随便打几个词都能出一张有质感的图\"。底层做了大量审美调优，让模型自带一套高级感，普通用户不用懂 prompt 工程也能出片。V7 引入 Draft Mode（草稿快速迭代）和 Omni Reference（角色/物体一致性控制），解决了 AIGC 最痛的\"同一个角色换个场景就变脸\"；2026-03 起的 V8 / V8.1 又把 HD 设为默认、速度提到早期的数倍、成本压到约 1/3。它的克制在于：**只做图像审美这一件事做到极致**，迟到视频赛道也不慌。\n\n**可灵 / 即梦——把\"视频可控性\"作为竞争核心。** 文生视频的体验难点不在\"能不能动\"，而在\"动得对不对\"：镜头运动、人物表演、唇形同步、多镜头连贯。可灵 2.6 的 Motion Control（运动控制）被业内评为突破性；即梦 Seedance 2.0 用 DB-DiT 双分支架构、一次前向同时生成画面与音频，单条可出约 15 秒的**多镜头序列 + 原生音频**，音画/唇形/情绪对齐。**用户买账的本质是\"从玩具变生产工具\"**——能直接进短剧、广告、电商素材的生产线，而不只是发个朋友圈。\n\n```mermaid\ngraph LR\n    classDef input fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef model fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef control fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef output fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph In[\"输入层\"]\n        T(文本 prompt):::input\n        I(参考图/首帧):::input\n    end\n\n    subgraph Engine[\"生成引擎\"]\n        M{{扩散模型 Diffusion}}:::model\n        C(可控生成模块):::control\n    end\n\n    subgraph Ctrl[\"可控性手段\"]\n        Ref(一致性/参考):::control\n        Mo(运动控制):::control\n        Au(原生音画同步):::control\n    end\n\n    subgraph Out[\"产出\"]\n        V([视频/图像]):::output\n    end\n\n    T & I ==> M\n    M --> C\n    C --> Ref & Mo & Au\n    Ref & Mo & Au ==> V\n    N[\"可控性=AIGC从玩具到生产工具的分水岭\"]:::note\n    C -.-> N\n```\n\n## 技术取舍（PM 视角）\n\n底层都是**扩散模型（Diffusion）+ Transformer 架构**。早期扩散模型擅长出图，但视频要解决帧间一致性、长镜头、音画同步——所以演进方向是把扩散和 Transformer 缝合（如即梦的 DB-DiT 双分支），用一个分支管画面、一个分支管音频，再做联合对齐。\n\nPM 该理解的取舍有三层：**质量、成本、吞吐三角，没法同时拉满**。Veo 3.1 真 4K 但贵、慢；Sora 2 物理模拟最强但商业前景已变（**OpenAI 已宣布 Sora 独立 App 于 2026-04-26 关停、API 2026-09-24 关停，仅 ChatGPT Pro/Plus 内保留模型**——面试别再把它当\"在售一线产品\"讲）；可灵 3.0 约 0.5 美元一个 clip，性价比打规模；开源的 Wan 2.6 免费、主导高吞吐低成本场景。**结论：2026 年实战是按场景/阶段混用多模型**——精修镜头用 Veo，批量铺量用可灵或开源。这恰恰说明：单一模型的可控性还不足以独立覆盖全工作流。Sora 2 的退场本身就是个 PM 教训：模型再强，扛不住推理成本和合规风险也会被砍。\n\n## 商业模式：怎么赚钱、卡在哪\n\n三条路径清晰分化：\n\n- **Midjourney——纯订阅**（Basic $10 / Standard $30 / Pro $60 / Mega $120 每月）。最干净、最早跑通的 AIGC 商业模式，靠审美壁垒和创作者粘性。2025 全年营收 5 亿美元、同比 +66.7%，几乎没烧投放，人均营收行业顶级。\n- **可灵——订阅 + API + 短剧分账**。to C 订阅打底，to B 卖 API（企业客户近 5 万家），再吃短剧生态分账。ARR 从 2026 年初约 3 亿冲到 3 月近 5 亿美元（去年 3 月仅 1 亿，一年 4 倍），是当前增速最猛的样本。\n- **即梦——生态战略，不直接靠收费**。字节的逻辑和豆包一致：用 AIGC 给抖音电商、短剧、广告供给降本增效（行业宣传口径称 AI 视频可把短剧演员/场地/摄制成本降数成乃至 90%+，幅度随内容形态差异极大、别当硬数据引用），赚的是生态的钱，不是工具订阅费。\n\n卡点：增长可持续性存疑。快手 2026-Q1（财报 2026-05-27）经调整净利 34 亿元、同比 **-26.1%**，毛利率从 54.6% 降到 51.2%（AI 算力成本上升），主站直播 -13.5%——可灵的高 ARR 增长 vs 主站基本盘承压、AI 反而拉低毛利，正是\"AI 到底能不能真拉动公司增长\"的争议焦点。\n\n## 可批判点 / 如果你来做会怎么改\n\n1. **版权是悬在头上的刀。** Seedance 2.0 因预装疑似盗版角色库触发迪士尼、派拉蒙争议，字节 2026-03-15 暂停部分全球推广、加安全限制。这是 2026 最鲜活的\"版权 × 可控性\"案例——**生成能力越强，越要在生成端做版权护栏**。如果我来做，会把版权过滤前置到生成约束层（而非事后下架），并提供商用授权的素材底座作为差异化卖点。\n2. **可控性仍是半成品。** 全行业靠\"多模型混用\"凑工作流，反过来证明任一模型都还不能独立交付全流程。我会赌\"工作流编排\"而非\"单点模型炼丹\"——做一个能调度多模型、按镜头分配最优引擎的创作台。\n3. **同质化。** 四强能力快速趋同（都补齐了原生音频、长镜头、唇同步），差异退化到价格/分发/生态。纯比模型分数没意义，**胜负手在分发和工作流深度**——这正是字节和快手的结构性优势。\n\n## 面试怎么用这个案例\n\n**被问\"你怎么看 AIGC 视频赛道 / 你来做一款文生视频产品会怎么做\"，30 秒话术：**\n\n\"AIGC 视频在 2026 年已经过了'能不能动'的阶段，进入'可控性 + 工作流'的竞争。可灵靠 API+订阅+短剧把 ARR 做到近 5 亿美元，即梦走字节生态降本——胜负手不在模型分数，而在分发和能不能进生产线。如果我来做，我不赌单点模型，赌工作流编排：让用户按镜头调度最优引擎，再把版权护栏前置到生成层，因为 Seedance 2.0 被迪士尼叫停已经证明，可控性和合规才是规模化的真门槛。\"\n\n**可能追问及答法：**\n\n- \"**为什么是混用多模型而不是一个最强的？**\" 因为质量、成本、吞吐是不可能三角。精修镜头用 Veo 3.1 真 4K，批量铺量用可灵或开源 Wan，快速预览用海螺这类秒级出片的，单模型拉满任一维度都会牺牲另两个。而且供给本身在动——OpenAI 都把 Sora 独立 App 关了，更说明谁也不能假设\"押一个最强模型躺赢\"，工作流编排层反而更稳。\n- \"**可灵 ARR 5 亿很猛，你看好吗？**\" 增速确实是当前最猛的，但要看口径和时点——那是 2026-03 的 ARR 推算，不是已实现年收入；而且快手主站 Q1 净利同比 -26.1%、直播 -13.5%，AIGC 增长能不能对冲基本盘承压，还要观察留存和付费的持续性。\n- \"**AIGC 创作工具最大的风险是什么？**\" 短期是版权合规（Seedance 被叫停是信号），中期是同质化导致的价格战，长期是留存——AIGC 应用普遍年留存偏低，创作工具要靠工作流深度和素材资产沉淀把用户锁住。\n\n## 与你项目的关联\n\n杭小育的拍照营养分析是多模态\"**理解\"**——把一张餐盘图片解析成营养结构（准确率 98%）；这一篇是多模态**\"生成**\"——把文字/参考图变成图像和视频。两者合起来，正好补全你对多模态的完整 sense：理解侧你已经有实战，生成侧用这套案例素材补上。面试被问\"你怎么理解多模态产品\"时，可以这样收口：理解和生成是一体两面，杭小育让我看到了多模态理解在垂直场景的落地约束（准确率、降本），而 AIGC 创作让我看到生成侧的核心命题是可控性和合规——两端我都能讲到产品判断层面。\n", "/03-案例库/06-AI陪伴.md": "# AI 陪伴拆解：Character.AI / 星野，情感赛道的 PMF 与证伪\n\n## 一句话定位\n\nAI 陪伴是整个 AI 应用里\"最容易做出 PMF、最难做出生意\"的赛道——用户来得快、走得也快，留存薄、付费难、合规重，是一个值得被当作\"证伪样本\"反复研究的反面教材。\n\n电梯说法：**情感陪伴证明了\"AI 能让人上头\"，但还没证明\"人愿意为上头长期付钱\"——拉新易、留存付费难，这条裂缝就是整个赛道的命门。**\n\n## 产品快照（标口径与时点）\n\n| 维度 | 内容 |\n|------|------|\n| 定位 | 情感陪伴 / 角色扮演（虚拟角色对话、人设扮演、互动叙事） |\n| 代表产品 | 海外 Character.AI；国内星野（MiniMax）、猫箱（字节，云雀大模型） |\n| Character.AI 规模 | MAU 自 2024 年中约 2800 万峰值回落，2025 年初约 2000 万级（口径混乱，见下方提醒）；ARR 约 \\$32M（这是 **2024 年** ARR，多家媒体沿用到 2025 报道，2025-08 口径约 \\$30M+，年底自报冲 \\$50M）；付费转化率 <2%，单用户付费贡献极低 |\n| 国内下滑实证 | 苹果端月下载（点点数据，36氪/2025-07）：星野 486 万（2025-01）→ 93 万（2025-05），暴跌约 8 成；猫箱 264 万 → 61 万。同期 DAU：星野基本持平（96 万 → 97 万），猫箱 59 万 → 49 万——**拉新塌方但存量盘没崩，说明掉的是投流增量，不是核心用户** |\n| 收缩 / 关停样本 | 冒泡鸭（阶跃星辰）2024 末起停止大范围投入、团队并入主线，2025-06 正式确认停运，公司 All in 模型与终端 Agent；异世界回响（Soul）等一批早期产品同样退场（异世界回响关停时点缺权威源，表述谨慎） |\n| 赛道定性 | 市场增速高但商业化未跑通，投资人多定性为\"伪需求\"或\"弱需求\" |\n\n> 口径提醒：陪伴赛道的用户数是 AI 应用里**最不可信**的一类。Character.AI 同期能搜到\"4500 万活跃用户\"\"2.33 亿注册\"\"1500 万移动 MAU\"等互相打架的数字，本质是注册量、MAU、移动端、月访问被混用。任何\"X 万 MAU\"的论断都必须标口径与时点，**这本身就是赛道叙事注水的体现**。\n\n## 核心体验设计：它做对了什么\n\n陪伴产品的 signature 体验，不在某个功能，而在\"**它记得你、它有自己的性格、它情绪连续**\"这三件事叠起来制造的拟人幻觉。用户买账的不是信息，是**关系感**。\n\n它做对的几点：\n\n- **人设一致性**：每个角色有稳定的口吻、立场、背景设定，不会今天温柔明天暴躁。一致性是\"它是一个角色\"而非\"一个聊天框\"的前提。\n- **情感连续性**：能接住上一句的情绪，顺着用户的状态走——你难过它会安慰，你调情它会回应。这种\"被接住\"的感觉是上头的核心。\n- **长期记忆**：记得你叫什么、上次聊过什么、你们的\"关系进展\"。记忆是把\"一次性对话\"变成\"一段关系\"的关键资产。\n- **零评判、高响应、永远在线**：不会已读不回、不会嫌你烦——这正是真实关系里稀缺的东西，也是陪伴的真需求内核。\n\n但要诚实说清楚：**这套体验的\"上头\"是真的，\"留存\"却是假的。** 36氪实证显示，用户跟每个角色的平均建联时长只有 5~7 天，之后基本不再聊；按 QuestMobile 数据（2024 上半年），主流 AI 情感陪伴应用月均使用天数普遍低于 5 天。新鲜感是有保质期的，幻觉一旦\"穿帮\"（重复、失忆、人设崩），关系感瞬间瓦解。\n\n## 技术取舍（PM 视角，不堆术语）\n\n陪伴产品的技术难点，和通用助手完全不同——它不追求\"答得对\"，追求\"演得像、记得住、不出事\"。三件事：\n\n- **角色一致性**：靠强 system prompt + 角色设定卡 + 微调，把模型\"锁\"在人设里。难点是长对话里人设会漂移，越聊越不像自己。这是产品体验的生命线，也是最难稳定的一环。\n- **长期记忆**：上下文窗口装不下几个月的对话，于是要做\"记忆系统\"——把关键事实抽取、向量化存库、对话时检索回填。这其实和 RAG 是同一套工程思路，只是检索的不是知识，是\"你们的关系\"。\n- **安全护栏**：这是陪伴赛道独有的、被早期叙事系统性低估的成本。模型不能教唆自残、不能对未成年人输出不当内容、不能\"擦边\"。护栏做松了出人命、做紧了体验崩，是个两难。\n\n一个关键取舍：**拟人度和安全是天然对立的。** 越能接住用户情绪、越敢顺着用户走，就越上头，但也越容易在脆弱用户身上失控。Character.AI 的悲剧正是这条线没守住——下一节细说。\n\n## 商业困境与安全红线（这个赛道真正的故事）\n\n```mermaid\ngraph TB\n    classDef good fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef bad fill:#C53030,stroke:#9B2C2C,stroke-width:2px,color:#fff\n    classDef risk fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    PMF[\"拟人体验上头：拉新极易\"]:::good\n    RET[\"新鲜感保质期 5-7 天：留存崩塌\"]:::bad\n    PAY[\"付费转化率不到 2%：付费难\"]:::bad\n    INV[\"投流 ROI 从未打正：饮鸩止渴\"]:::bad\n    SAFE[\"未成年人安全争议：诉讼与监管整改\"]:::risk\n    DEAD[\"被迫上广告 / 关停 / 禁未成年\"]:::risk\n    N[\"真需求 vs 伪需求：用户更愿发展真实关系\"]:::note\n\n    PMF ==> RET\n    RET ==> PAY\n    PAY --> INV\n    PMF -.-> SAFE\n    RET --> DEAD\n    PAY --> DEAD\n    SAFE ==> DEAD\n    INV -.-> N\n```\n\n**怎么赚、赚到没、卡在哪：**\n\n- **订阅是主路，但收不动。** Character.AI 的 c.ai+ 是 \\$9.99/月，但付费转化率不到 2%，按 \\$32M ARR ÷ 约 2000 万 MAU 折算，单用户年付费贡献只有 \\$1~2 量级。一个用户\"上头\"不等于愿意掏钱——情感这东西，免费版已经够\"接住\"他了。\n- **投流 ROI 从未打正。** 36氪（2025-07《\"年营收千万美金\"是这条 AI 应用赛道的最大谎言》）揭露：头部出海陪伴产品的真实营收远低于对外宣传的\"年营收千万美金\"（行业里非头部产品月流水普遍只在四到八万美元区间），但每季度投放支出却高达数千万美元，**ROI 从来没打正过**，是典型的\"饮鸩止渴\"式增长。次日留存靠推广能冲高，但很快回落到 20%~30%。\n- **被迫上广告。** Character.AI 2025 年推出社交 feed 并开始接品牌广告（Yelp、Webtoon 等），2026 年初进一步把广告做进对话内（出现打断沉浸的全屏广告）——订阅养不活，只能靠广告补。这是赛道头部\"商业化失血\"最直接的信号。\n- **安全是生死线，不是边角料。** 2025 年多起诉讼（含 14 岁男孩自杀的 Megan Garcia 案、德州两家庭案）把 Character.AI 逼到墙角：2025-10-29 宣布禁 18 岁以下用户使用开放式聊天，先限 2 小时/天，**2025-11-25 全面禁止**，改导向\"Stories\"互动叙事，并上线生物识别 / 政府 ID 年龄验证。国内同样：2025 年上半年头部 AI 陪伴 App 因\"擦边\"陷入合规争议、内容被集中整改下架，冒泡鸭 2025-06 确认停运、异世界回响等早期产品相继退场。\n\n一句话：**这个赛道不是没需求，是需求的\"价值密度\"撑不起获客成本，而它的风险密度又高到能直接把产品干死。**\n\n## 可批判点 / 如果我来做会怎么改\n\n1. **别把\"上头\"当 PMF。** 拉新易是这个赛道最大的幻觉。投资人把它定性为\"伪需求\"或许过重，但核心判断没错——用户更愿意发展真实关系，AI 陪伴在很多人那里是\"过渡品\"而非\"替代品\"。我会先把北极星指标从\"新增 / DAU\"换成\"30 天留存\"和\"关系深度\"，逼自己直面真问题。\n2. **新鲜感保质期是核心矛盾，要正面打。** 用户 5~7 天就腻，根因是体验\"穿帮\"——记忆断、人设漂、对话重复。我会把资源砸在**长期记忆和人设一致性**这两个\"反穿帮\"能力上，而不是砸在投流上。让用户感到\"它真的在和我一起长大\"，而不是每天重置的玩偶。\n3. **安全要前置成产品设计，不是事后打补丁。** Character.AI 是出了人命才全面禁未成年人，代价惨烈。我会在 day 1 就做强年龄分层、危机识别（自残 / 自杀倾向触发人工 / 热线干预）、情感依赖预警。这不只是合规，也是产品长期信任的地基。\n4. **重新定义变现，别死磕通用陪伴的订阅。** 通用情感陪伴几乎无法收费。我会往**有明确场景和付费意愿**的窄口子打：语言学习陪练、心理疗愈辅助（需医疗合规）、互动叙事 / 乙女向内容（为剧情和角色付费，更接近内容消费而非关系消费）。把\"为关系付费\"转成\"为内容 / 为功能付费\"，才有定价权。\n5. **承认它可能就是个\"小而美\"赛道。** 不是所有赛道都该追规模。与其用投流硬撑出一个伪现象级，不如做一个留存高、付费深、合规稳的小盘子——这在大厂体系里不性感，但是更诚实的产品判断。\n\n## 面试怎么用这个案例\n\n**被问\"你怎么看 AI 陪伴 / 重新设计一个情感陪伴产品\"——30 秒话术：**\n\n> AI 陪伴是 AI 应用里最典型的\"PMF 易、留存付费难\"样本。它靠拟人度、记忆和情感连续性，很容易让用户上头、拉新极快——但新鲜感只有 5 到 7 天，月均使用天数普遍低于 5 天，投流 ROI 从未打正，Character.AI 付费转化率不到 2%、被迫上广告，国内星野猫箱下载暴跌八成、冒泡鸭这类产品被迫停运。所以我看这个赛道，第一不把\"上头\"误当 PMF，第二会把资源砸在长期记忆和人设一致性这种\"反穿帮\"能力上、而不是投流，第三把安全和合规当 day 1 的产品设计，第四在变现上往有付费场景的窄口子打——内容化、工具化，而不是死磕通用陪伴的订阅。\n\n**可能的追问及答法：**\n\n- *\"那 AI 陪伴到底有没有真需求？\"* → 有，但要拆。\"被接住、零评判、永远在线\"是真需求内核，戳中了现代人的孤独。但**真需求 ≠ 高价值密度需求**——它的付费意愿低、获客成本高，导致商业上跑不通。需求真假和生意成不成，是两个问题，别混。\n- *\"你说的长期记忆，技术上和 RAG 是一回事吗？\"* → 工程思路高度一致：抽取关键事实、向量化存库、对话时检索回填上下文。区别在检索的对象——RAG 检索知识，陪伴检索\"你们的关系\"。我在杭小育做政务育儿 RAG 时就在趟这套召回和上下文管理的工程，迁移过来是同一套底层能力。\n- *\"为什么大厂都没在陪伴上做出现象级、反而通用助手赢了？\"* → 因为陪伴的护城河太浅、风险太高。拟人体验可被通用模型平替（Character.AI 下滑就明确归因于\"更强更便宜的通用聊天机器人兴起\"），而安全合规的天花板又压得很低。大厂的资源更愿意投在分发和留存都更稳、能整合现有业务的通用助手上。\n- *\"如果非让你做，你怎么守住未成年人安全？\"* → 三层：强年龄分层（生物识别 / ID 验证，对未成年人关闭开放式陪聊、只给受控叙事）、实时危机识别（自残自杀倾向触发干预和热线）、情感依赖预警（识别过度沉迷并主动降温）。这不是加分项，是入场券——Character.AI 的诉讼证明了守不住的代价。\n\n## 与你项目的关联\n\n这个案例补的正是你最弱的那块——**通用 C 端、情感向产品的 sense**，而情感产品的体验设计又是大厂面试的高频开放题。你的三个项目（杭小育、孤独症筛查、SAGE-AI）都偏垂直、偏工具理性，没碰过\"关系感\"\"上头\"\"留存崩塌\"这类纯 C 端命题，这一篇就是给你补的弹药。\n\n但你有一个别人没有的接口：**长期记忆这件事，你在杭小育的 RAG 链路里真的趟过。** 陪伴产品的\"记忆系统\"和你做的检索召回、上下文管理是同一套工程，你可以从\"我做过记忆和召回的工程实现\"切进去聊体验设计，比纯纸上谈兵可信得多。一句话收口：\"**陪伴产品的难点表面是情感，底层是工程——长期记忆、人设一致性、安全护栏，这三件事我在政务 RAG 里至少趟过前两件的技术原型，所以我谈它的体验设计，不是从需求文档里抄的。**\"\n", "/00-总览/02-面试考核维度地图.md": "# 大厂 AI PM 面试考核维度地图\n\n> 面试官第一句潜台词往往是：「我想知道你是不是**理性看待 AI，而不是为了 AI 而 AI**。」\n> 把这句话刻在脑子里——它会反复出现在技术追问、设计题、商业题里。本篇先帮你建立全局认知：**大厂 C 端 AI PM 面试到底考什么、各维度多重、最常翻在哪、我该翻本站哪一章去补。**\n\n读完这一篇，你应该能回答两个问题：\n\n1. 一场面试由哪几块拼成，分别在测我什么能力？\n2. 我现在哪块强、哪块弱，对应去本站哪一章补？\n\n---\n\n## 一、底层只有三根支柱，再细分出 7 个考核维度\n\n不管面试官问得多花，大厂 C 端 AI PM 的考核都站在三根支柱上：\n\n- **技术深度**——你能不能听懂算法团队在说什么、理解你产品依赖的模型/检索/评估机制，做出有依据的判断。不是要你写代码，是要你**能对话、能拍板**。\n- **产品思维**——你能不能从真实用户痛点出发，设计出有价值的 AI 产品，而不是堆功能、套框架。\n- **商业落地**——你能不能算清这件事值不值得做：ROI、成本、和传统方案比的增量在哪。\n\n把这三根支柱细化，就是大厂面试实际会逐项打分的 **7 个考核维度**。下面这张地图是本篇的核心，建议存到手机随时翻：\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef pillar fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef dim fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    ROOT([\"大厂 C 端 AI PM 能力模型\"]):::root\n\n    P1(技术深度):::pillar\n    P2(产品思维):::pillar\n    P3(商业落地):::pillar\n\n    ROOT ==> P1\n    ROOT ==> P2\n    ROOT ==> P3\n\n    D1[\"AI 技术认知 · 约18%\"]:::dim\n    D2[\"AI 产品方法论 · 约17%\"]:::dim\n    D3[\"案例与竞品 sense · 约15%\"]:::dim\n    D4[\"开放设计与估算题 · 约12%\"]:::dim\n    D5[\"个人项目 STAR · 约20%\"]:::dim\n    D6[\"商业战略判断 · 约12%\"]:::dim\n    D7[\"行业热点 sense · 约6%\"]:::dim\n\n    P1 --> D1\n    P2 --> D2\n    P2 --> D3\n    P2 --> D4\n    P2 --> D5\n    P3 --> D6\n    P3 --> D7\n\n    TIP[\"权重为综合面经频率的相对参考<br/>非官方比例，用于排优先级\"]:::note\n    ROOT -.-> TIP\n```\n\n权重不是官方数字，是综合多家大厂面经的「出现频率 + 决定性」做的相对排序——**用来帮你排复习优先级，不是用来精算分数**。可以看到：个人项目（必问、第一高频）和 AI 技术认知（C 端尤重）是两块最该先吃透的硬骨头。\n\n---\n\n## 二、7 维度逐项拆解：考什么 / 多重 / 怎么翻车 / 我去哪章补\n\n| 维度 | 考什么 | 权重 | 最常见翻车点 | 本站对应章节 |\n|------|--------|------|--------------|--------------|\n| **AI 技术认知** | 大模型/Transformer/RAG/Agent/微调的原理与边界；模型怎么评估（准召、幻觉、A/B） | 约18% | 术语堆砌却讲不清「为什么、什么时候用」；说不出模型如何被评估 | [01·AI技术速通](01-AI技术速通/README.md)（重点 [RAG](01-AI技术速通/06-RAG检索增强.md)、[微调vsRAGvsPrompt](01-AI技术速通/07-微调vsRAGvsPrompt.md)、[模型评估与幻觉](01-AI技术速通/10-模型评估与幻觉.md)、[黑话词典](01-AI技术速通/12-面试黑话词典.md)） |\n| **AI 产品方法论** | 概率性体验、数据飞轮、评估即新 PRD、人机协同信任、AI 的 PRD 怎么写 | 约17% | 方法论空转、套框架不落到具体用户痛点 | [02·AI产品方法论](02-AI产品方法论/README.md)（[AI vs 传统产品](02-AI产品方法论/01-AI产品vs传统产品.md)、[概率性体验设计](02-AI产品方法论/02-概率性产品的体验设计.md)、[评估体系](02-AI产品方法论/04-AI评估体系（方法论视角）.md)） |\n| **案例与竞品 sense** | 主流 AI 产品（豆包/Kimi/DeepSeek/AI 搜索/陪伴）拆得透不透，能不能说「为什么这么做」 | 约15% | 竞品分析只罗列功能、讲不出背后的取舍与逻辑 | [03·案例库](03-案例库/README.md)（[豆包](03-案例库/02-豆包.md)、[DeepSeek](03-案例库/04-DeepSeek.md)、[AI 陪伴](03-案例库/06-AI陪伴.md)、[横向对比与拆解模板](03-案例库/10-横向对比与拆解模板.md)） |\n| **开放设计与估算题** | 现场给一个模糊命题（「设计一个 AI 学习助手」），看你怎么澄清需求、拆解、给方案；费米估算 | 约12% | 上来就给方案、不先澄清边界（缺「先听懂题」这一步） | [04·设计题万能框架](04-高频题与答题框架/01-设计题万能框架.md)、[估算与费米题](04-高频题与答题框架/07-估算与费米题.md)、[设计题实战](05-模拟面试/04-设计题实战.md) |\n| **个人项目 STAR** | 你过往项目的真实贡献与可量化成果，能不能扛住深度追问 | 约20% | 只讲 Situation/Action，Result 没有量化数据；追问到原理就崩 | [06·个人经历改造](06-个人经历改造/README.md)（[STAR 改造法](06-个人经历改造/01-STAR与AI语言改造法.md)、[深度追问预案](06-个人经历改造/05-深度追问预案.md)、[数据闭环与指标包装](06-个人经历改造/06-数据闭环与指标包装.md)） |\n| **商业战略判断** | 理性看 AI、不为 AI 而 AI、算 ROI、和传统方案对比、技术选型的代价 | 约12% | 为 AI 而 AI；给不出 ROI 与传统方案的对比 | [02·AI产品的成本账](02-AI产品方法论/08-AI产品的成本账.md)、[C端增长与商业化](02-AI产品方法论/10-C端增长与商业化.md)、[商业与战略类高频题](04-高频题与答题框架/06-商业与战略类高频题.md) |\n| **行业热点 sense** | 对 2026 行业趋势的认知，能不能谈出趋势对自己产品的启示 | 约6% | 只知名词不知影响，谈不出对业务的具体启示 | [07·2026行业热点速递](07-临场速记与热点/03-2026行业热点速递.md) |\n\n读这张表的方法：**先看「最常见翻车点」自检——哪一条戳中你，就先去对应章节。** 不要从 01 顺读到 07，要按你的弱项跳着补。\n\n---\n\n## 三、为你做的维度校准\n\n把上面 7 维套到你身上，强弱很清楚——这决定了你应该把时间砸在哪：\n\n- **AI 技术认知（你的隐性强项，但易被追问击穿）**：你不是功底薄，是 RAG 多路召回、粗排精排、Rerank、CAG 降本、向量索引、Text2SQL Agent、Badcase 评估闭环全都**亲手做过**——这比很多科班候选人只会背概念强得多。风险在「讲不清为什么」：非科班出身，被追问「为什么用 Rerank 而不是直接扩大召回」「CAG 和 RAG 的本质差异」时容易卡。这一维**优先级最高**，去 [模型评估与幻觉](01-AI技术速通/10-模型评估与幻觉.md)、[RAG](01-AI技术速通/06-RAG检索增强.md)、[微调vsRAGvsPrompt](01-AI技术速通/07-微调vsRAGvsPrompt.md) 把「为什么」补成体系，再用 [深度追问预案](06-个人经历改造/05-深度追问预案.md) 做护身符。\n\n- **个人项目 STAR（你的王牌，要把它打成王牌）**：杭小育 460W 用户、日活 21.5W、准确率 97.5%、CAG 降本 80%，孤独症筛查投诉率降 85%，SAGE 取数采纳率 97.5%——**数据量化扎实，这正是大厂数据驱动文化最吃的**。要做的是把三个项目用 STAR 讲到「Result 必带数据 + 能反推原理」。直接去 [项目1-杭小育](06-个人经历改造/02-项目1-杭小育.md)、[项目2-孤独症筛查](06-个人经历改造/03-项目2-孤独症筛查.md)、[项目3-SAGE取数](06-个人经历改造/04-项目3-SAGE取数.md)。\n\n- **商业战略判断（你的差异化优势）**：你有强 ROI 与成本意识（CAG 降本 80% 就是证据），C/B/G 三端经验让你对「值不值得做」有天然敏感。把它显性化，去 [AI产品的成本账](02-AI产品方法论/08-AI产品的成本账.md) 武装话术。\n\n- **案例与通用 C 端 sense（你的短板）**：经验偏垂直健康/政务，通用大众 C 端 sense 偏弱。这是面试官最可能发现的缺口。重点补 [03·案例库](03-案例库/README.md)，尤其 [豆包](03-案例库/02-豆包.md)、[AI 陪伴](03-案例库/06-AI陪伴.md) 这类大众 C 端产品，练到能讲「它为什么这么做」。\n\n- **开放设计题（要靠框架兜住）**：现场压力题没法临时学，靠一套框架兜住 80% 的 product sense。先吃透 [设计题万能框架](04-高频题与答题框架/01-设计题万能框架.md)，再用 [设计题实战](05-模拟面试/04-设计题实战.md) 练手感。\n\n一句话定调：**你的底子（实操 + 数据 + 成本意识）足够进大厂，缺的是「把为什么讲成体系」和「通用 C 端的视野」。本站就是为补这两块设计的。**\n\n---\n\n## 四、两把主力武器，钉死在两章\n\n大厂面试的开放回答，80% 能被两套框架兜住——记住它们各自管哪一维：\n\n- **STAR**（Situation-Task-Action-Result）→ 管「个人项目」维度。所有行为题、项目题都用它组织，**Result 一定带量化数据**。详见 [STAR 与 AI 语言改造法](06-个人经历改造/01-STAR与AI语言改造法.md)。\n- **设计题八步框架**（先澄清需求边界，再给方案）→ 管「开放设计与估算」维度，覆盖约 80% 的 product sense 题。核心是**别上来就给方案，先把题听懂**。详见 [设计题万能框架](04-高频题与答题框架/01-设计题万能框架.md)。\n\n两把武器练熟，开放题就不会慌。剩下的技术认知、案例、商业、热点四维，是靠平时积累的「子弹」——框架负责怎么打，子弹负责打什么，两者缺一不可。\n\n---\n\n## 五、用这张地图驱动你的复习\n\n地图的真正用法，是把它当作**索引**而不是读物：\n\n1. **第一遍**：对照「最常见翻车点」一栏给自己打分，标出 2-3 个最弱维度。\n2. **冲刺期**：按弱维度跳读对应章节，不要从头顺读——你时间不多，要打靶不要扫射。\n3. **模拟面试后**：每次模面（[05·模拟面试](05-模拟面试/README.md)）暴露出的问题，回到这张表定位是哪一维出了问题，再回对应章补。\n\n本篇第三节已经把你的优势短板诊断到位；复习的具体节奏（哪一周补哪一维、每天练什么），见 [30 天复习计划](00-总览/04-30天复习计划.md)。\n\n> **记住开篇那句话**：理性看待 AI，而不是为了 AI 而 AI。无论被问到哪一维，能把「为什么是 AI、值不值得、效果怎么衡量」讲清楚的人，永远比只会堆名词的人更像一个合格的 AI PM。这正是你实操背景的天然优势——把它讲出来。\n", "/00-总览/01-使用指南.md": "# 使用指南：这套备战包怎么用\n\n这不是一本\"AI 知识百科\"，是一套**为你定制的面试作战系统**。在动手读之前，先记住一个判断——这套资料从头到尾都建立在它之上：\n\n> **你不是 AI 功底薄，是讲不成体系。**\n\n你手里有 460W+ 用户、日活 21.5W 的 C 端 RAG 项目（杭小育），多路召回、粗排精排、Rerank、CAG 降本、Text2SQL Agent、Badcase 评估闭环都是你亲手做过的全链路实操——**这种深度，很多工作更久的候选人也只停在\"调用过 API\"的层面**。你真正的短板有两个：被深度追问\"为什么这么做\"时容易卡在原理层；把垂直健康政务的经验翻译成通用大众 C 端的语言时不够顺。所以这套包的全部设计意图，就是帮你**把已有的实操讲成体系、扛住追问、补上通用 C 端 sense**。\n\n下面告诉你这套包有什么、按什么顺序读、不同时间档怎么取舍、怎么配合站点功能用。\n\n---\n\n## 一、全站地图：8 章各管一件事\n\n| 章 | 一句话定位 | 什么时候用 |\n|----|-----------|-----------|\n| **00 总览** | 入口与作战总纲，建立全局认知 | 现在；后续随时回看复习节奏 |\n| **01 AI 技术速通** | 用人话补齐大模型原理（12 篇） | 最先补，给\"技术理解\"维度打地基 |\n| **02 AI 产品方法论** | AI 产品区别于传统产品的方法论（10 篇） | 紧接 01，把经验拔到\"产品高度\" |\n| **03 案例库** | 主流 AI 产品拆解 + 万能拆解模板（10 篇） | 扩通用 C 端 sense，攒谈资和对比弹药 |\n| **04 高频题与答题框架** | 各题型万能答题骨架（9 篇） | 练答题结构与表达，主战场之一 |\n| **05 模拟面试** | 一面 / 二面 / HR / 设计题全真演练（4 篇） | 学完框架后实战检验 |\n| **06 个人经历改造** | 把简历 3 个项目改造成 AI 语言（7 篇） | 练讲故事，**你的最高优先级** |\n| **07 临场速记与热点** | cheatsheet + 当天速记 + 热点 + 雷区（4 篇） | 面试前一天 + 当天 |\n\n各章的篇目入口：\n\n- **00 总览**：本篇之外，还有三篇——[面试考核维度地图](00-总览/02-面试考核维度地图.md)（大厂 C 端 AI PM 到底考什么：3 根支柱拆出 7 个考核维度 + 各维度最常见翻车点 + 该翻本站哪一章）、[候选人画像与提分策略](00-总览/03-候选人画像与提分策略.md)（基于你简历的优势/短板逐项诊断 + 四条提分策略 + 分岗位火力分配）、[30 天复习计划](00-总览/04-30天复习计划.md)（按周拆解的逐天节奏表）。**先读维度地图建立全局，再读画像篇对焦自己，最后用复习计划排进度。**\n- **01 AI 技术速通**：从 [大模型本质](01-AI技术速通/01-大模型本质.md)、[Transformer 与注意力](01-AI技术速通/02-Transformer与注意力直觉.md)、[训练三段式](01-AI技术速通/03-训练三段式.md)、[Token 与关键参数](01-AI技术速通/04-Token与关键参数.md)、[Prompt 与上下文工程](01-AI技术速通/05-Prompt与上下文工程.md)、[RAG 检索增强](01-AI技术速通/06-RAG检索增强.md)、[微调 vs RAG vs Prompt](01-AI技术速通/07-微调vsRAGvsPrompt.md)、[Agent 与工具调用](01-AI技术速通/08-Agent与工具调用.md)、[多模态](01-AI技术速通/09-多模态.md)、[评估与幻觉](01-AI技术速通/10-模型评估与幻觉.md)、[成本延迟质量三角](01-AI技术速通/11-成本延迟质量三角.md)，到 [面试黑话词典](01-AI技术速通/12-面试黑话词典.md)。\n- **02 AI 产品方法论**：[AI 产品 vs 传统产品](02-AI产品方法论/01-AI产品vs传统产品.md)、[概率性产品的体验设计](02-AI产品方法论/02-概率性产品的体验设计.md)、[数据飞轮与冷启动](02-AI产品方法论/03-数据飞轮与冷启动.md)、[AI 评估体系](02-AI产品方法论/04-AI评估体系（方法论视角）.md)、[幻觉与安全治理](02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)、[人机协同与信任设计](02-AI产品方法论/06-人机协同与信任设计.md)、[AI 产品 PRD 怎么写](02-AI产品方法论/07-AI产品PRD怎么写.md)、[AI 产品的成本账](02-AI产品方法论/08-AI产品的成本账.md)、[从 0 到 1 与 1 到 N](02-AI产品方法论/09-从0到1与1到N.md)、[C 端增长与商业化](02-AI产品方法论/10-C端增长与商业化.md)。\n- **03 案例库**：[ChatGPT](03-案例库/01-ChatGPT.md)、[豆包](03-案例库/02-豆包.md)、[Kimi](03-案例库/03-Kimi.md)、[DeepSeek](03-案例库/04-DeepSeek.md)、[AI 搜索](03-案例库/05-AI搜索.md)、[AI 陪伴](03-案例库/06-AI陪伴.md)、[Cursor](03-案例库/07-AI编程Cursor.md)、[Notion AI](03-案例库/08-NotionAI.md)、[AIGC 创作](03-案例库/09-AIGC创作.md)，以及最该背熟的 [横向对比与拆解模板](03-案例库/10-横向对比与拆解模板.md)。\n- **04 高频题与答题框架**：[设计题万能框架](04-高频题与答题框架/01-设计题万能框架.md)、[评估题框架](04-高频题与答题框架/02-评估题框架.md)、[技术理解类高频题](04-高频题与答题框架/03-技术理解类高频题.md)、[方法论类高频题](04-高频题与答题框架/04-方法论类高频题.md)、[案例分析类高频题](04-高频题与答题框架/05-案例分析类高频题.md)、[商业与战略类高频题](04-高频题与答题框架/06-商业与战略类高频题.md)、[估算与费米题](04-高频题与答题框架/07-估算与费米题.md)、[反问环节话术](04-高频题与答题框架/08-反问环节话术.md)、[压力追问应对](04-高频题与答题框架/09-压力追问应对.md)。\n- **05 模拟面试**：[一面专业面](05-模拟面试/01-一面专业面.md)、[二面交叉总监面](05-模拟面试/02-二面交叉总监面.md)、[HR 与行为面](05-模拟面试/03-HR与行为面.md)、[设计题实战](05-模拟面试/04-设计题实战.md)。\n- **06 个人经历改造**：[STAR 与 AI 语言改造法](06-个人经历改造/01-STAR与AI语言改造法.md)、[项目1 · 杭小育](06-个人经历改造/02-项目1-杭小育.md)、[项目2 · 孤独症筛查](06-个人经历改造/03-项目2-孤独症筛查.md)、[项目3 · SAGE 取数](06-个人经历改造/04-项目3-SAGE取数.md)、[深度追问预案](06-个人经历改造/05-深度追问预案.md)、[数据闭环与指标包装](06-个人经历改造/06-数据闭环与指标包装.md)、[自我介绍脚本](06-个人经历改造/07-自我介绍脚本.md)。\n- **07 临场速记与热点**：[前一天 cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md)、[当天 30 分钟速记](07-临场速记与热点/02-当天30分钟速记.md)、[2026 行业热点速递](07-临场速记与热点/03-2026行业热点速递.md)、[常见忌语与雷区](07-临场速记与热点/04-常见忌语与雷区.md)。\n\n---\n\n## 二、推荐阅读顺序：先补认知，再练表达\n\n不要从头到尾一篇篇硬啃。正确的路径是**先把\"理解\"和\"高度\"补齐，再把\"案例感\"扩开，最后集中火力练\"怎么讲\"**——这个顺序是专门针对你\"讲不成体系\"这个症结设计的：把补原理和练表达穿插起来，而不是纯刷知识。\n\n```mermaid\ngraph LR\n    classDef base fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef sense fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef main fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef live fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A[\"01 技术速通\"]:::base --> B[\"02 产品方法论\"]:::base\n    B --> C[\"03 案例库\"]:::sense\n    C --> D[\"04 答题框架\"]:::main\n    D --> F[\"06 经历改造\"]:::main\n    F --> E[\"05 模拟面试\"]:::main\n    E --> G[\"07 临场速记\"]:::live\n    H[\"00 总览随时回看\"]:::note -.-> A\n    H -.-> G\n```\n\n- **第一段 · 补认知（01 → 02）**：先把大模型原理用人话搞懂，再上一层把它接到 AI 产品方法论上。这两章打地基，决定你被追问\"为什么\"时能不能接得住。\n- **第二段 · 扩 sense（03）**：你的经验偏垂直健康政务，通用大众 C 端手感偏弱。案例库就是来补这块的——看主流产品怎么做，攒对比弹药和谈资。\n- **第三段 · 练讲故事（04 → 06 → 05）**：这是你的提分主战场。先学万能答题框架（04），再把简历三个项目讲成结构清楚、追问扛得住的 AI 故事（06），最后用模拟面试把框架和故事一起拉到全真场景里检验（05）。这个顺序和 [30 天复习计划](00-总览/04-30天复习计划.md) 的 Week3 改造、Week4 模拟一致。**04/05/06 是这套包的核心，时间不够也要保住它们。**\n- **第四段 · 临场（07）**：面试前一天和当天用。\n- **00 总览**：不是读一次就完——复习到一半节奏乱了，回来对一遍 [30 天复习计划](00-总览/04-30天复习计划.md) 的进度；不确定精力该往哪压，回 [维度地图](00-总览/02-面试考核维度地图.md) 和 [提分策略](00-总览/03-候选人画像与提分策略.md) 重新对焦。\n\n---\n\n## 三、不同时间档怎么用：一个月 / 两周 / 一周\n\n按你距离面试还剩多久，砍掉不同的部分。**越临近，越聚焦\"背框架 + 改简历 + 临场\"，越早，越舍得花时间补原理。**\n\n```mermaid\ngraph TB\n    classDef month fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef two fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef week fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    subgraph M[\"一个月系统版\"]\n        M1[\"第1周 01+02 补原理\"]:::month --> M2[\"第2周 03+04 案例+框架\"]:::month\n        M2 --> M3[\"第3周 06 改造+追问预案\"]:::month\n        M3 --> M4[\"第4周 05模拟+07临场+查漏\"]:::month\n    end\n\n    subgraph T[\"两周精简版\"]\n        T1[\"第1周 01重点+02全+03模板\"]:::two --> T2[\"第2周 04全+06全+05挑1-2套+07\"]:::two\n    end\n\n    subgraph W[\"一周冲刺版\"]\n        W1[\"04框架+06改造 必做\"]:::week --> W2[\"07 cheatsheet+速记+忌语\"]:::week\n    end\n```\n\n**一个月 · 系统打底版**——全章走一遍，直接照 [30 天复习计划](00-总览/04-30天复习计划.md) 的节奏表执行（那篇是逐天版，这里只给骨架）：第 1 周 01+02 补原理，第 2 周 03+04 扩案例学框架，第 3 周 06 改造三个项目 + 磨追问预案，第 4 周 05 模拟掐表 + 07 临场 + 定向查漏。这是最理想的版本，能把你的两个短板（被追问原理接不住、通用 C 端 sense 偏弱）真正补上。\n\n**两周 · 精简版**——01 只读重点篇（[大模型本质](01-AI技术速通/01-大模型本质.md)、[Prompt 与上下文工程](01-AI技术速通/05-Prompt与上下文工程.md)、[RAG](01-AI技术速通/06-RAG检索增强.md)、[Agent](01-AI技术速通/08-Agent与工具调用.md)、[评估与幻觉](01-AI技术速通/10-模型评估与幻觉.md)、[黑话词典](01-AI技术速通/12-面试黑话词典.md)），02 全读，04 全练，06 全做，05 挑 1–2 套模拟，07 临场。03 砍掉精读，只看 [横向对比与拆解模板](03-案例库/10-横向对比与拆解模板.md)。\n\n**一周 · 冲刺版**——别再贪。直接抓 **04 答题框架**（背骨架）+ **06 个人经历改造**（必做，把三个项目讲顺）+ **07**（[cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md)、[当天速记](07-临场速记与热点/02-当天30分钟速记.md)、[忌语雷区](07-临场速记与热点/04-常见忌语与雷区.md)）。01 只啃 [黑话词典](01-AI技术速通/12-面试黑话词典.md)，03 只看 [对比模板](03-案例库/10-横向对比与拆解模板.md)。原则：背模板、改简历、临场速记，**放弃系统补原理**——一周补不完，把已有硬货讲顺收益更高。\n\n---\n\n## 四、配合站点功能用\n\n这是一个 docsify 站，三个功能能让它从\"一摞文档\"变成\"随身查询工具\"：\n\n- **全文搜索（⌘K / Ctrl+K）**：临场忘了某个概念——\"数据飞轮\"是啥、\"幻觉率\"怎么定义、CAG 和 RAG 区别——直接按 ⌘K 搜关键词，秒跳对应篇。模拟练习时遇到答不上的题，也用它快速定位到框架页。\n- **左下角齿轮设置**：切换深色 / 浅色主题等阅读偏好（搜索图标在右上角，齿轮在左下角）。长时间复习护眼，按自己习惯调。\n- **cheatsheet 可打印**：[前一天 cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md) 是按\"可打印 / 导出\"设计的。面试前一天用浏览器打印成一页纸，随身带，进场前最后扫一遍——比在手机上翻靠谱。\n\n---\n\n最后再说一遍这套包的用法精髓：**它不是让你变成 AI 专家，是让你把已经是的那个实战派，讲得让面试官信。** 你的硬货够了，缺的是结构和表达。从 01 开始，按顺序走，遇到卡点回 00 对焦。开始吧。\n", "/00-总览/03-候选人画像与提分策略.md": "# 候选人画像与提分策略\n\n全站其余章节是通用内容，这一篇专门告诉你：哪些是你的加分项要重点打磨，哪些是命门必须补，面到不同岗位时精力怎么分配。\n\n先把诊断说在前面。你手里握着一个 460 万用户、日活 21.5 万的 C 端 RAG 项目，全链路（多路召回 / 粗排精排 / Rerank / CAG 降本 / 向量索引 / Text2SQL Agent / 推理链路可视化 / Badcase 评估闭环）都亲手做过——这种经历密度在工作一年的候选人里少见。你的问题不是没东西讲，而是讲的时候底层\"为什么\"接不上、通用 C 端 sense 不够厚、转型背景让自己心里发虚。一句话：**你不是 AI 功底薄，是把已经实操过的东西讲得不成体系。** 这三件事，一个月可以系统补上。\n\n## 一、优势清单：这些是你的牌，别藏着\n\n| 优势 | 它在面试里值多少 | 怎么用 |\n|------|------------------|--------|\n| 460 万用户、日活 21.5 万的真 C 端项目 | 大厂最看重\"真实落地 + 数据驱动\"，量级本身就是信任状 | 自我介绍第一句就抛量级把注意力锚到主场；但角色要按 [杭小育](06-个人经历改造/02-项目1-杭小育.md) 实情说\"2.0 接手优化\"，不贪从零起盘的功 |\n| RAG / Agent / 评估 / 降本全链路实操 | 这是\"技术判断力\"最硬的证据，多数人只读过没做过 | 把每个环节都准备成\"问题→方案→为什么这么选→结果\"的小故事 |\n| 强 ROI / 成本意识（CAG 降本 80%） | 对应\"成功指标定义\"维度，是能做成方法论亮点的强项 | 用[成本延迟质量三角](01-AI技术速通/11-成本延迟质量三角.md)和[成本账](02-AI产品方法论/08-AI产品的成本账.md)把它理论化 |\n| 评估闭环（Badcase → 迭代） | \"evals 是新 PRD\"是 2026 的核心叙事，你恰好做过 | 用[评估体系](02-AI产品方法论/04-AI评估体系（方法论视角）.md)把零散动作上升为\"我有一套评估方法论\" |\n| C / B / G 三端 + 健康民生垂直深度 | 跨端经验证明你能跨职能对齐、能啃硬场景 | 在协作类、复杂场景题里调用，证明你不是温室里的 PM |\n| 设计背景带来的体验 / 信息架构敏感 | 直接对应\"面向 AI 体验的用户研究 / 产品设计\"维度 | 讲概率性产品体验、人机协同信任时，这是你独有的切入角 |\n\n把这六条记牢：**面试不是考你会不会，是考你能不能让面试官信。** 你的实操经历是最强的\"信\"，关键是讲法。详见 [STAR 与 AI 语言改造法](06-个人经历改造/01-STAR与AI语言改造法.md)。\n\n## 二、短板清单：这些是命门，藏不住要正面补\n\n| 短板 | 面试官会怎么戳 | 补法所在章节 |\n|------|----------------|--------------|\n| 非科班（设计），被追问原理易讲不清\"为什么\" | \"多路召回为什么比单路好\"\"Rerank 解决了 BM25 解决不了的什么\" | [01 全章](01-AI技术速通/README.md)反向补原理 + [深度追问预案](06-个人经历改造/05-深度追问预案.md) |\n| 工作约一年，资历偏浅 | \"你只做了一年，凭什么撑大厂的活\" | 用\"经历密度\"对冲\"时长\"，见本篇第四节 |\n| 经验偏垂直健康政务，通用大众 C 端 sense 弱 | \"如果让你做一款全民级 AI 助手，你怎么想\" | [03 案例库](03-案例库/README.md)系统扩 sense + [设计题框架](04-高频题与答题框架/01-设计题万能框架.md) |\n| 简历未覆盖 AI 伦理 / 偏见 / 负责任 AI | \"你的育儿建议如果有偏见 / 误导怎么办\" | [幻觉与安全治理](02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)补盲区 |\n\n短板不可怕，可怕的是被戳到时慌。这四条里前两条是\"心理战\"——你越想藏，面试官越觉得你心虚；不如主动承认 + 立刻用事实翻盘（见第四节话术）。后两条是\"知识战\"，靠复习硬补就能填平。\n\n## 三、维度强弱图：在通用考点上，你各维度站在哪\n\n[面试考核维度地图](00-总览/02-面试考核维度地图.md) 已经定好了全站统一的七个考核维度和它们的相对权重（那篇权重是综合面经频率的参考排序，不是官方数字）。本节不另起一套维度，只做一件事：**把那七维套到你身上，标出你的强弱，告诉你精力往哪压。** 下图沿用那七维，颜色表示你当前的强弱状态。\n\n```mermaid\ngraph TB\n    classDef strong fill:#276749,stroke:#1E5038,stroke-width:2px,color:#fff\n    classDef mid fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef weak fill:#C05621,stroke:#9C4221,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph Core[\"七大考核维度（强弱标注，权重以维度地图为准）\"]\n        D1[\"AI技术认知<br/>实操全有，原理讲不透\"]:::weak\n        D2[\"AI产品方法论<br/>概率体验有设计背景切入\"]:::mid\n        D3[\"案例与竞品sense<br/>通用大众C端是缺口\"]:::weak\n        D4[\"开放设计与估算题<br/>靠框架兜，需练手感\"]:::mid\n        D5[\"个人项目STAR<br/>数据扎实，王牌主场\"]:::strong\n        D6[\"商业战略判断<br/>强ROI成本意识\"]:::strong\n        D7[\"行业热点sense<br/>临考补即可\"]:::mid\n    end\n\n    M1[\"反向补为什么<br/>追问预案护身\"]:::note\n    M3[\"案例库系统扩sense\"]:::note\n    M5[\"三个项目数据齐<br/>讲到追问不倒\"]:::note\n    M6[\"CAG降本80%做证据\"]:::note\n\n    D1 -.-> M1\n    D3 -.-> M3\n    D5 -.-> M5\n    D6 -.-> M6\n```\n\n绿色（D5 项目、D6 商业）是你天然占优的，要打成\"亮点武器\"主动输出；蓝色（D2 方法论、D4 设计题、D7 热点）够得着、稍加打磨就稳；橙色（D1 技术原理、D3 通用 C 端 sense）是两块命门，复习重心压这里。对应弹药：原理补强 → [01 技术速通](01-AI技术速通/README.md)（重点 [RAG 检索增强](01-AI技术速通/06-RAG检索增强.md)）；通用 sense → [03 案例库](03-案例库/README.md)；项目主场 → [深度追问预案](06-个人经历改造/05-深度追问预案.md)；商业账 → [AI 产品的成本账](02-AI产品方法论/08-AI产品的成本账.md)。\n\n## 四、四条提分策略：把劣势讲成优势\n\n**策略一 · 把零散实操上升成方法论。** 你做过多路召回、CAG、Badcase 闭环，但如果只是流水账地复述，面试官只会觉得\"你是个执行者\"。要的是抽象：把\"我做了 Badcase 评估\"讲成\"我建立了一套'离线评估集 + 线上抽检 + 归因迭代'的评估闭环方法论，这套方法论换个产品照样能用\"。每个项目都按 [数据闭环与指标包装](06-个人经历改造/06-数据闭环与指标包装.md) 重新提炼一遍。\n\n**策略二 · 反向补底层原理，专攻\"为什么\"。** 你的复习顺序要反着来——不是从原理学到应用，而是从你做过的应用倒推原理。读 [RAG 检索增强](01-AI技术速通/06-RAG检索增强.md) 时，边读边把杭小育的每个环节往框架里对位，读到能回答\"我为什么选 Rerank 而不是只靠向量召回\"为止。深度只需\"够用即可\"——补到能把技术翻译成用户 / 商业价值，不必死磕数学推导。追问预案见 [深度追问预案](06-个人经历改造/05-深度追问预案.md)。\n\n**策略三 · 用案例库扩通用 C 端 sense。** 你最缺的是\"全民级产品手感\"。系统过一遍 [03 案例库](03-案例库/README.md)，重点是 [ChatGPT](03-案例库/01-ChatGPT.md)、[豆包](03-案例库/02-豆包.md)、[AI 陪伴](03-案例库/06-AI陪伴.md) 这类大众 C 端，每个都练一句\"如果我是 PM，下一步做 X 因为 Y\"，逼自己有判断而非复述。准备 3–5 个能随场景调用的拆解案例，设计题就不会发虚。万能拆法见 [横向对比与拆解模板](03-案例库/10-横向对比与拆解模板.md)。\n\n**策略四 · 把\"转型 + 短工龄\"讲成优势。** 这是心理战的核心话术：\n- 被问转型：\"**设计训练了我对信息架构和体验的敏感，这恰恰是 AI 产品最稀缺的能力——概率性产品的体验难做，而我天生关注'用户怎么感知不确定性'。**\"\n- 被问资历浅：\"**我工作一年，但这一年的密度很高——RAG 全链路、Text2SQL Agent、评估闭环、CAG 降本我都从 0 到 1 亲手做过，不是螺丝钉式参与。我用经历的密度补时长的不足。**\"\n\n自我介绍把这两句揉进去，见 [自我介绍脚本](06-个人经历改造/07-自我介绍脚本.md)。忌语雷区见 [常见忌语与雷区](07-临场速记与热点/04-常见忌语与雷区.md)。\n\n## 五、分场景微调：面不同岗位，火力重分配\n\n| 场景 | 侧重维度 | 你要主动输出什么 | 重点章节 |\n|------|----------|------------------|----------|\n| 字节系（抖音 / 豆包等） | C 端大体量落地 + 数据驱动 | 突出 460 万用户量级、数据驱动迭代、强成本约束下的提质降本。**别讲\"从 0 到 1 主导\"——你是 2.0 接手优化，按 [杭小育](06-个人经历改造/02-项目1-杭小育.md) 的真实角色措辞讲，免得深挖时对不上** | [从 0 到 1 与 1 到 N](02-AI产品方法论/09-从0到1与1到N.md)、[C 端增长](02-AI产品方法论/10-C端增长与商业化.md) |\n| C 端 Agent 岗 | 概率系统产品直觉 + Agent 理解 | 把 SAGE Text2SQL Agent 当主菜，讲工具调用与可控性 | [Agent 与工具调用](01-AI技术速通/08-Agent与工具调用.md)、[豆包拆解](03-案例库/02-豆包.md) |\n| 增长 / 商业化向 | 成功指标 + 增长商业化 | 21.5 万日活、覆盖率 +34%、CAG 降本 80% 的 ROI 叙事。**注意：你的增长经验是垂直健康政务，被追问通用大众拉新留存打法时别硬撑，老实说\"我的增长打法主要在垂类沉淀，通用 C 端我在系统补\"** | [C 端增长与商业化](02-AI产品方法论/10-C端增长与商业化.md)、[商业与战略类高频题](04-高频题与答题框架/06-商业与战略类高频题.md) |\n| 评测 / 质量向 | 评估迭代 + 数据驱动 | Badcase 闭环、准确率 97.5% 的评估方法论（你的最强主场） | [评估题框架](04-高频题与答题框架/02-评估题框架.md)、[评估体系](02-AI产品方法论/04-AI评估体系（方法论视角）.md) |\n\n通用底线：无论面哪类岗，自我介绍都以\"460 万用户的 C 端 RAG 项目\"开场锚定主场，再根据岗位把上表对应的料往前提。面前先确认岗位 JD 偏哪个方向，临时调一次侧重——别拿同一套话术打所有岗。\n\n## 六、下一步：从这里去哪\n\n本篇做完诊断，接着按节奏推进：\n\n1. 先看 [使用指南](00-总览/01-使用指南.md)，建立全站章节地图与阅读顺序。\n2. 再按 [30 天复习计划](00-总览/04-30天复习计划.md) 排进度——补认知 → 扩 sense → 讲故事 → 模拟冲刺，严格按周走。\n3. 复习中随时回到本篇核对：精力是否压在了短板维度和目标岗位上。\n\n记住那句开篇的判断：**你不是 AI 功底薄，是讲不成体系。** 这一个月要做的，就是把已经握在手里的牌，打成一套让大厂面试官信服的牌路。\n", "/00-总览/README.md": "# 00 · 总览\n\n本章是整个备战包的入口与导航，先读这里建立全局认知，再按复习计划推进。\n\n## 计划文件\n\n- `01-使用指南.md` — 怎么用这套资料、全站 8 章定位、推荐阅读顺序、不同时间档怎么取舍\n- `02-面试考核维度地图.md` — 大厂 AI PM 面试到底考什么（3 支柱拆出 7 个考核维度 + 各维度翻车点 + 去哪章补）\n- `03-候选人画像与提分策略.md` — 基于简历的优势/短板逐项诊断 + 四条提分策略 + 分岗位火力分配\n- `04-30天复习计划.md` — 按周拆解的逐天复习节奏表（系统打底版）\n\n## 定制发力点\n\n- 开篇就把「她不是 AI 功底薄，是讲不成体系」这个判断讲透，扭转候选人的自我设限。\n- 复习计划要兼顾「补原理」和「练表达」，而不是单纯刷知识。\n", "/00-总览/04-30天复习计划.md": "# 30 天复习计划表（系统打底版）\n\n这份计划是写给你一个人的。你的时间窗在一个月以上，所以不走\"考前一周突击\"那条路——突击适合\"知识都会、只差临场\"的人，而你的核心命题是**把已经实操过的东西，重新讲成有体系、追问不倒的样子**。这靠的是间隔练习（隔几天回头重练同一块）加反复内化，不是临阵猛背。30 天刚好够把四件事逐层叠起来：补认知 → 扩 sense → 讲故事 → 模拟冲刺。\n\n如果你的窗口短于一个月，别硬套本表——回 [使用指南](00-总览/01-使用指南.md) 里的两周精简版 / 一周冲刺版选路线。\n\n## 一、总纲：四周对应四个考核簇\n\n大厂 C 端 AI PM 面试不是考单点，是多维度综合考核。把业内通行的考点归并一下，正好是四大簇，和本站七章、本计划四周一一对齐：\n\n| 考核簇 | 它在考你什么 | 对应章节 | 主攻周 |\n|--------|--------------|----------|--------|\n| 技术理解 | 大模型/RAG/Agent 原理，AI 产品上线全流程认知 | [01 · AI 技术速通](01-AI技术速通/README.md) | Week 1 |\n| 产品方法论 + 商业 sense | 概率体验、数据飞轮、成本账、增长商业化、竞品判断 | [02 · 方法论](02-AI产品方法论/README.md)、[03 · 案例库](03-案例库/README.md) | Week 1–2 |\n| 结构化表达 | 答案是否清晰、有框架、不绕、不堆废话 | [04 · 答题框架](04-高频题与答题框架/README.md)、[05 · 模拟](05-模拟面试/README.md) | Week 2–4 |\n| 个人经历 + 软素质 | 项目讲不讲得透、深度追问扛不扛得住、沟通协作 | [06 · 个人经历改造](06-个人经历改造/README.md)、[07 · 临场速记](07-临场速记与热点/README.md) | Week 3–4 |\n\n四簇是**叠加**关系不是并列：没有 Week1 的原理底子，Week3 讲项目就会被追问 \"为什么用 Rerank 不用别的\" 问倒；没有 Week2 的通用 C 端 sense，Week4 模拟设计题就会暴露你\"只会健康政务\"的短板。所以严格按周走，别跳。\n\n## 二、复习时间线\n\n```mermaid\ngraph LR\n    classDef w1 fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef w2 fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef w3 fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef w4 fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n    classDef final fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    W1([\"Week1 补认知<br/>01技术+02方法论<br/>每天2-3篇+自测\"]):::w1\n    W2([\"Week2 扩sense练框架<br/>03案例+04框架<br/>开始用框架作答\"]):::w2\n    W3([\"Week3 讲故事<br/>06经历改造<br/>磨追问预案+录音\"]):::w3\n    W4([\"Week4 模拟冲刺<br/>05模拟掐表+07速记<br/>定向查漏\"]):::w4\n    F3{{\"考前3天<br/>收口\"}}:::final\n    F1{{\"考前1天<br/>轻量\"}}:::final\n    D0{{\"当天<br/>调状态\"}}:::final\n\n    W1 ==> W2 ==> W3 ==> W4 ==> F3 --> F1 --> D0\n```\n\n## 三、Week 1 · 补认知（系统打底）\n\n**目标**：把你实操过但讲不出\"为什么\"的原理，补成能口述的体系。你不是不懂 RAG，你是被追问\"多路召回为什么比单路好\"\"Rerank 解决了什么 BM25 解决不了的问题\"时讲不利索。这周专治这个。\n\n**节奏**：每天 2–3 篇，读完立刻合上文档**口述自测**（对自己讲一遍核心结论，讲不顺就回去重读）。\n\n- 第 1–2 天：[大模型本质](01-AI技术速通/01-大模型本质.md)、[Transformer 直觉](01-AI技术速通/02-Transformer与注意力直觉.md)、[训练三段式](01-AI技术速通/03-训练三段式.md)、[Token 与关键参数](01-AI技术速通/04-Token与关键参数.md)。这四篇是地基，\"为什么会幻觉\"\"温度调高调低差别\"都从这里来。\n- 第 3 天：[Prompt 与上下文工程](01-AI技术速通/05-Prompt与上下文工程.md)、[RAG 检索增强](01-AI技术速通/06-RAG检索增强.md)。RAG 这篇你要读到能反过来对照杭小育，把你的多路召回/粗排精排/CAG 在这套框架里定位清楚。\n- 第 4 天：[微调 vs RAG vs Prompt](01-AI技术速通/07-微调vsRAGvsPrompt.md)、[Agent 与工具调用](01-AI技术速通/08-Agent与工具调用.md)。Agent 这篇直接对应你的 SAGE Text2SQL。\n- 第 5 天：[多模态](01-AI技术速通/09-多模态.md)、[模型评估与幻觉](01-AI技术速通/10-模型评估与幻觉.md)。评估篇是你的强项（Badcase 闭环），重点是把它和方法论的 evals 概念打通。\n- 第 6 天：[成本延迟质量三角](01-AI技术速通/11-成本延迟质量三角.md)、[面试黑话词典](01-AI技术速通/12-面试黑话词典.md)。成本三角是你的强 ROI 意识的理论外衣，务必讲熟。\n- 第 7 天：方法论收口——[AI 产品 vs 传统产品](02-AI产品方法论/01-AI产品vs传统产品.md)、[概率性产品的体验设计](02-AI产品方法论/02-概率性产品的体验设计.md)、[数据飞轮与冷启动](02-AI产品方法论/03-数据飞轮与冷启动.md)、[AI 评估体系](02-AI产品方法论/04-AI评估体系（方法论视角）.md)。\n\n**本周自检**：合上资料，能否对\"RAG 为什么能降幻觉\"\"微调和 RAG 怎么选\"\"成本怎么算\"各讲 2 分钟。讲不出就回头补，别往下推。\n\n## 四、Week 2 · 扩 sense + 练框架\n\n**目标**：补你最缺的通用大众 C 端 sense，同时第一次把答案\"装进框架\"。这周开始，所有作答都要走结构，不再想到哪说到哪。\n\n- 第 8 天：读完方法论剩余六篇——[幻觉与安全治理](02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)、[人机协同与信任设计](02-AI产品方法论/06-人机协同与信任设计.md)、[AI 产品 PRD](02-AI产品方法论/07-AI产品PRD怎么写.md)、[成本账](02-AI产品方法论/08-AI产品的成本账.md)、[从 0 到 1 与 1 到 N](02-AI产品方法论/09-从0到1与1到N.md)、[C 端增长与商业化](02-AI产品方法论/10-C端增长与商业化.md)。\n- 第 9–11 天：案例库主攻通用 C 端，每天 3–4 个——[ChatGPT](03-案例库/01-ChatGPT.md)、[豆包](03-案例库/02-豆包.md)、[Kimi](03-案例库/03-Kimi.md)、[DeepSeek](03-案例库/04-DeepSeek.md)、[AI 搜索](03-案例库/05-AI搜索.md)、[AI 陪伴](03-案例库/06-AI陪伴.md)、[Cursor](03-案例库/07-AI编程Cursor.md)、[Notion AI](03-案例库/08-NotionAI.md)、[AIGC 创作](03-案例库/09-AIGC创作.md)。每个案例练一句话：\"如果我是 PM，下一步我会做 X，因为 Y。\"逼自己有判断，不只是复述。\n- 第 12 天：[横向对比与拆解模板](03-案例库/10-横向对比与拆解模板.md) + [设计题万能框架](04-高频题与答题框架/01-设计题万能框架.md) + [评估题框架](04-高频题与答题框架/02-评估题框架.md)。把框架背到能默写八步。\n- 第 13–14 天：四类高频题精读 + 用框架作答——[技术理解类](04-高频题与答题框架/03-技术理解类高频题.md)、[方法论类](04-高频题与答题框架/04-方法论类高频题.md)、[案例分析类](04-高频题与答题框架/05-案例分析类高频题.md)、[商业与战略类](04-高频题与答题框架/06-商业与战略类高频题.md)，再扫一遍[估算费米题](04-高频题与答题框架/07-估算与费米题.md)。每类挑 2 题，掐 3 分钟出声答。\n\n**本周自检**：随便给一道设计题，能否 30 秒内拉出框架骨架。这周末顺手把你**最弱的一类题**（大概率是通用 C 端设计题）标记下来，Week4 要回头定向重练。\n\n## 五、Week 3 · 讲故事（最关键的一周）\n\n**目标**：把三个项目讲成追问不倒的故事。这是你最容易拉分、也最容易翻车的地方——简历亮眼，深度追问却会问到原理层。重点不是背稿，是**录音回放**：脑内默念发现不了卡壳和废话，录下来回看才能改。\n\n- 第 15 天：[STAR 与 AI 语言改造法](06-个人经历改造/01-STAR与AI语言改造法.md) + [自我介绍脚本](06-个人经历改造/07-自我介绍脚本.md)。先把自我介绍打磨到 90 秒能背、能录、听着不像念稿。\n- 第 16–18 天：三个项目逐个改造打磨，每个一天——[杭小育](06-个人经历改造/02-项目1-杭小育.md)、[孤独症筛查](06-个人经历改造/03-项目2-孤独症筛查.md)、[SAGE 取数](06-个人经历改造/04-项目3-SAGE取数.md)。每个项目录一段 3 分钟主述 + 自己回放，专挑三件事：① 角色措辞诚不诚实（杭小育是 **2.0 接手优化**，不是从 0 主导，按文档原话讲，别贪从零起盘的功，免得深挖对不上）；② 有没有把执行讲成\"我做的判断\"；③ 数字有没有说清口径（34% 是金标准集上 AB 测出来的，不是拍脑袋）。\n- 第 19–20 天：**深度追问预案花两天磨，这是你最容易被击穿的地方**——[深度追问预案](06-个人经历改造/05-深度追问预案.md) + [数据闭环与指标包装](06-个人经历改造/06-数据闭环与指标包装.md)。把每个项目能被追问的\"为什么\"列清楚、备好答案，并和 Week1 的原理对上号——被追问 RAG 细节时，能调出 [RAG 检索增强](01-AI技术速通/06-RAG检索增强.md) 里的概念回答，而不是甩给\"这块是算法同学做的\"。\n- 第 21 天：连起来全演一遍——自我介绍 + 一个项目深讲 + 接受三轮追问，全程录音回放。\n\n**本周自检**：三个项目各能否扛住三连追问。被问到原理时能否自然衔接，而不是\"这块是算法同学做的\"。\n\n## 六、Week 4 · 模拟冲刺 + 查漏补缺\n\n**目标**：全真掐表实战。业内通行做法是真实面试前 1–2 周做 3–5 场 mock，每场录音回放，复盘三件事：**结构清不清、时长超没超、废话多不多**。\n\n- 第 22 天：[一面专业面](05-模拟面试/01-一面专业面.md)——掐表全程模拟，录音。\n- 第 23 天：[二面交叉总监面](05-模拟面试/02-二面交叉总监面.md)——重点练\"被挑战不慌\"。\n- 第 24 天：[HR 与行为面](05-模拟面试/03-HR与行为面.md) + [反问环节话术](04-高频题与答题框架/08-反问环节话术.md)。\n- 第 25 天：[设计题实战](05-模拟面试/04-设计题实战.md) + [压力追问应对](04-高频题与答题框架/09-压力追问应对.md)——这两块直击你的短板，认真录。\n- 第 26 天：**定向查漏**——不是泛泛重读，而是把 Week2 标记的最弱题型挑 3 题重做一遍，和当时的录音对比：是不是更清晰、更有结构、废话更少了。\n- 第 27–28 天：热点 + 雷区收尾——[2026 行业热点速递](07-临场速记与热点/03-2026行业热点速递.md)、[常见忌语与雷区](07-临场速记与热点/04-常见忌语与雷区.md)，再混合难度补 1–2 场模拟。\n\n## 七、临考收口节奏\n\n不临阵磨枪。这三天的原则是**收口、不啃新内容、调状态**。\n\n- **考前 3 天**：停止学新东西。每天过一遍框架默写 + 三个项目主述各一遍。读 [前一天 cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md) 做减法，只留最高频的。\n- **考前 1 天**：只做轻量复习。把 cheatsheet 再扫一遍，自我介绍录最后一遍确认顺口，早睡。不要再开新章节、不要刷新题——过载只会增加焦虑。\n- **当天**：开考前 30 分钟用 [当天 30 分钟速记](07-临场速记与热点/02-当天30分钟速记.md) 激活状态：框架骨架默念一遍、三个项目一句话钩子各想一遍、深呼吸。进场前提醒自己一句——\"我不是功底薄，我是把实操讲成了体系\"。\n\n---\n\n**一句话总纲**：四周逐层叠加，Week1–2 把原理和 sense 打底，Week3–4 内化成讲得出、扛得住的表达，临考只收口不冲刺。节奏乱了，回 [使用指南](00-总览/01-使用指南.md) 对焦全局，或回 [候选人画像与提分策略](00-总览/03-候选人画像与提分策略.md) 核对精力是否压在了短板上。\n", "/07-临场速记与热点/04-常见忌语与雷区.md": "# 常见忌语与雷区：哪些话千万别说\n\n> 心法（先记这一句）：**忌语的本质不是话术问题，是真懂不懂。** 面试官追问的不是\"你会不会说话\"，是\"换个角度问你，你这套说法还站得住吗\"。所以\"改说 Y\"的前提是真的理解——否则换个说法照样被一句追问击穿。本篇是前 6 章的反向提炼：把\"说错就扣分/出局\"的点逐条列成 `别说 X → 改说 Y`，进场前过一遍。\n\n> 用法：扫读左栏\"别说 X\"，凡是你嘴里冒过的句式，立刻把右栏\"改说 Y\"练成肌肉记忆。第 ⑤ 节（转型者雷区）对你 ROI 最高，重点背。\n\n---\n\n## ⑤ 转型者特有雷区（你的最高优先级，先看这一节）\n\n非科班、工作约 1 年——这些标签不是问题，**主动暴露它们才是问题**。下面每条左栏都是无意自爆点，右栏是更稳的版本。底层原则：**用\"交付过什么 + 闭环 + 取舍\"说话，弱化身份标签。**\n\n| 别说 X（自爆点） | 为什么是雷 | 改说 Y（稳的版本） |\n|---|---|---|\n| \"我是设计转行的，自学的，没做过真正的 AI 产品\" | 主动给自己贴\"业余\"标签，面试官顺着往下挖你最弱的地方 | \"我用杭小育、孤独症筛查、SAGE 三个项目，完整跑通了从需求到上线再到效果评估的闭环\" |\n| \"我不太懂技术，这块得问算法\" | 把\"PM 不该回避的技术边界\"也推掉了，显得没判断力 | \"我能和算法对齐到判断方案可行性和成本的程度——不用我会写模型，但要会问对问题、看懂权衡\" |\n| \"这个我没接触过 / 我们没这个量级\" | 把\"没做过\"当终点，显得不可迁移 | \"我没直接做过 X，但它的原理和权衡我理解是…，迁移过来我会先从 Y 切入\" |\n| 反复说\"小公司 / 外行 / 试试看 / 摸索\" | 这些词每说一次都在削自己的可信度 | 用结果和数字说话：\"杭小育做到 460 万用户、日活 21.5 万、准确率 97.5%\" |\n| 把\"我很热爱 AI / 对 AI 很有热情\"当主要卖点 | 热情是入场券不是差异化，谁都能说 | 热情落到地：\"我做过、我懂取舍、我有方法论\"——拿项目和判断证明 |\n| 编造没做过的项目细节撑场面 | 转型者最忌编，一追问技术/数据来源就穿帮，比承认\"没做过\"伤十倍 | **真实的小项目 > 虚构的大项目**；没做过就说可迁移逻辑，绝不编 |\n| \"我工作时间不长，经验还比较浅\" | 替面试官把\"经验短\"这刀递过去了 | 不主动提时长；被问到就答\"我一年里密度很高，独立负责过 3 个上线项目，跑通了完整闭环\" |\n\n---\n\n## ① 技术忌语（把原理讲错最致命——面试官多为技术背景）\n\n一个基础概念说错，往往就是一票否决。**拿不准的概念宁可不主动提，绝不硬编原理。**\n\n| 别说 X | 为什么是雷 | 改说 Y |\n|---|---|---|\n| \"RAG 就是把文档塞进 prompt 让模型读\" | 抹掉了检索环节，暴露不懂\"召回→排序→生成\"分层 | \"RAG 是先检索把相关片段召回，再作为上下文喂给模型生成，**检索质量决定效果上限**\" |\n| \"推荐/搜索的粗排就是关键词匹配\" | **把粗排说成关键词检索**是经典硬伤。召回→粗排→精排是漏斗式多级排序；关键词匹配（BM25/倒排）只是召回的一路，与向量召回并列 | \"召回先从大库捞回几千条（关键词+向量双路），粗排用轻量模型砍到几百，精排用重模型精算排序\" |\n| \"微调能让模型学到新知识\" | 混淆微调（改风格/格式/对齐）与知识注入（应走 RAG/继续预训练） | \"注入实时/私域知识优先 RAG；微调主要改输出风格和指令遵循\" |\n| \"幻觉我们能彻底修掉 / 上线前清零\" | **承诺消灭幻觉=不懂原理**。幻觉是生成式模型的统计内生属性，只能压制不能根除 | \"幻觉无法清零，只能用 RAG 溯源、引用展示、置信度兜底、拒答机制压到可接受区间，并持续评估\" |\n| \"Agent 就是给大模型套个循环，接几个工具就行\" | 低估了规划、记忆、工具可靠性、错误恢复 | \"Agent 难点不在调工具，在任务规划、长程记忆、失败重试和可控性\" |\n| \"用最新/参数最大的模型，效果自然最好\" | 唯参数论，忽视场景适配、成本、延迟 | \"选型看任务-成本-延迟的平衡，小模型+好工程往往更优——比如我用 CAG 把成本降了 80%\" |\n| \"AI / 大模型能解决这个问题\"（无边界） | **\"AI 能解决一切\"是态度+技术双重雷**，显得没有边界感 | \"大模型擅长泛化、生成、长尾理解，不擅长精确计算、强一致、可解释；这个场景适合/不适合是因为…\" |\n| 把 token / 上下文窗口 / temperature / embedding 等概念用混 | 基础名词说错，一票否决 | 拿不准的概念**不主动提**；被问到就坦诚\"这块我的理解是…，更深的我还没深入\" |\n\n---\n\n## ② 产品忌语（最能区分\"真 PM\"和\"AI 票友\"）\n\n| 别说 X | 为什么是雷 | 改说 Y |\n|---|---|---|\n| \"我们 DAU 涨了 X%\"（只报这一个） | **虚荣指标（vanity metric）**只显示活动量，不解释用户行为与业务影响 | 报**可行动指标**：留存（D1/D7/D30）、任务完成率，组合呈现并说清归因——\"日活 21.5 万的同时，准确率 97.5%、响应从 7 秒压到 2 秒\" |\n| \"下载量/注册数/曝光量很高\" | 下载≠激活≠留存，典型虚荣指标 | \"激活率、次留、核心动作转化率分别是…\" |\n| \"这个项目是我做的\"（团队功劳全揽） | **贪功**，一追问细节当场穿帮 | \"我负责 X 部分，和设计/算法/运营协作完成 Y，我的具体贡献是 Z\" |\n| 通篇不提钱 | **不谈成本=不懂 AI 产品经济学**（token/推理成本） | \"我会算单次调用成本，用缓存/小模型分流/prompt 压缩控成本——SAGE 我用 CAG 降本 80%，核心是 ROI 不是堆调用\" |\n| 通篇不提怎么衡量好坏 | **不谈评估=最大产品硬伤**，AI 产品没评估等于蒙着开车（evals 已是\"AI 产品新 PRD\"） | \"我会建评估集（人工标注+自动指标+线上 A/B），分准确性/安全性/满意度多维度看\" |\n| \"我想给产品加个 AI 功能 / 接个大模型\" | **为 AI 而 AI**，没从用户问题出发 | \"用户真实痛点是 X，AI 因为擅长 Y 所以是更优解；规则能解决我不会硬上 AI\" |\n| \"这个需求所有用户都需要\" | 缺乏分层和取舍意识 | \"核心场景是…，我先服务高价值人群再扩——孤独症筛查我先打 1600+ 机构端\" |\n\n---\n\n## ③ 行为忌语（HR 面、直属上级面尤其敏感）\n\n| 别说 X | 为什么是雷 | 改说 Y |\n|---|---|---|\n| \"前公司/前老板/前同事很烂、不专业\" | **说坏话=情绪化、不职业**，面试官会代入\"将来你也会这样说我们\" | \"那段经历让我意识到我更适合 X 环境，所以想换到更…的团队\" |\n| 还没聊价值就先抛薪资期望 | **薪资开口过早**显得只看钱、议价位置差 | 先充分展示价值，薪资留到 HR/offer 环节；被问到给区间+\"可谈\" |\n| 报一个虚高、无依据的薪资数字 | **薪资开虚**，被追问当前包和涨幅逻辑会崩 | 基于市场行情+当前包给合理区间，讲清涨幅理由 |\n| \"我每段经历都只待了几个月 / 想多尝试\" | 显得**不稳定**，AI 行业尤其看重沉淀 | 短经历归因为外部因素（项目结束/组织调整）+强调对长期投入的渴望 |\n| \"我没什么缺点 / 硬要说就是太追求完美\" | 套路答案，显得不真诚 | 给一个真实、正在改进、且不致命的缺点+具体改进动作 |\n\n---\n\n## ④ 态度忌语（隐性扣分，比知识盲区更伤）\n\n| 别说 X | 为什么是雷 | 改说 Y |\n|---|---|---|\n| 不懂的概念现场硬编原理瞎讲 | **硬编原理**一被追问立刻崩，还暴露不诚实 | \"我了解到的是…，更深的实现细节我没深入，但我的理解逻辑是…\"——或直接坦诚不知道 |\n| 对所有问题都\"非常自信、绝对、一定\" | **过度自信**显得没敬畏、不懂 AI 的不确定性 | 用\"我倾向于…因为…，但需要数据验证\"的概率化表达 |\n| 全程讲方法论/正确的废话，无具体案例 | **泛泛而谈=没真打过仗** | 每个观点用 STAR（情境-任务-行动-结果）挂一个项目+数字 |\n| \"AI 一定会取代 XX / 颠覆一切\" | 宏大叙事、空，显得不落地 | 谈具体场景的渐进式价值，不做宏大预言 |\n\n---\n\n## 进场前 30 秒自检（命中任意一条，立刻改口）\n\n- [ ] 我有没有主动说过\"自学 / 转行 / 外行 / 经验浅 / 小公司\"？\n- [ ] 报指标时是不是只甩了一个 DAU / 下载量？有没有配留存、准确率、成本？\n- [ ] 说项目时是不是全揽成\"我做的\"，没分清个人贡献？\n- [ ] 有没有承诺\"幻觉能修掉\"\"AI 能解决一切\"？\n- [ ] 有没有把粗排说成关键词检索、把微调说成学知识？\n- [ ] 有没有不懂硬编、对答案一律\"绝对/一定\"？\n- [ ] 有没有讲了一堆方法论却没挂一个具体项目+数字？\n- [ ] 有没有吐槽前公司、过早提薪资？\n\n---\n\n## 数字肌肉记忆（被追问就报，别含糊）\n\n| 项目 | 关键数字 |\n|---|---|\n| 杭小育 | 460 万用户、日活 21.5 万、准确率 97.5%、检索覆盖率 +34%、CAG 降本 80%、响应 7 秒→2 秒、拍照营养分析 98% |\n| 孤独症筛查 | 1600+ 家产生筛查记录的医疗机构（7600+ 接入访问，别混口径）、工单投诉率 -85%（相对铺开初期基线，前后对比非 AB） |\n| SAGE 取数 | 采纳率 97.5%、TTFT<2 秒、出数从 3 天→分钟级 |\n\n---\n\n## 三条已核证的底层事实（被深挖时撑得住，截至 2026.6）\n\n1. **幻觉不可根除**：幻觉是大模型生成机制的统计内生属性；OpenAI《Why Language Models Hallucinate》（2025.9）指出主流评测奖励\"猜测\"而非\"拒答\"，模型被训得倾向蒙答案——行业共识是\"缓解/压制\"而非\"消除\"。支撑技术忌语\"别承诺修掉幻觉\"。\n2. **虚荣 vs 可行动指标**：下载量、单看 DAU 只显示活动量；可行动指标（留存、转化、任务完成率）关联具体行为、能响应产品改动、能指导决策。延伸到 AI 产品，**evals 已被业界称为\"新 PRD\"**（用可量化的评估集把\"什么算好\"写成验收标准）——会建评估集是 AI PM 的核心硬技能。支撑产品忌语\"别只报 DAU、别不谈评估\"。\n3. **召回/粗排/精排多级架构**：信息检索与推荐系统的标准漏斗式设计（top-document retrieval 先粗筛、重模型再精排）；关键词匹配（BM25/倒排）只是召回的一路，与向量召回并列。支撑技术忌语\"别把粗排说成关键词检索\"。\n", "/07-临场速记与热点/01-前一天cheatsheet.md": "# 面试前一天 Cheatsheet：一页纸过完核心\n\n> 全站六章压成一页。考前一晚、进场前各过一遍即可。极简、可扫读、可打印。\n> 用法：①②⑤ 是肌肉记忆（必背），③ 是你的弹药库（口径要顺），④⑥ 是开场与收尾。\n> 一句总纲：**框架先出声 → 每步钉一个项目数字 → 任何百分比随口报口径。**\n\n---\n\n## ① 核心答题框架速记\n\n### 设计题八步（普通设计题 + 3 个 AI 补强层）\n\n| 步 | 动作 | 一句话要点 |\n|----|------|-----------|\n| 1 | 澄清边界 | 含\"真的需要 AI 吗\"，30 秒不能省 |\n| 2 | 用户与痛点 | 选**窄** segment，别贪大 |\n| 3 | 北极星 + 分层指标 ★ | 一个北极星 + 离线/在线/护栏三轴 |\n| 4 | 方案设计 ★ | 讲清\"AI 在哪加价值 / 在哪加摩擦\" |\n| 5 | 数据与评估闭环 ★ | 把模糊需求写成**可测** |\n| 6 | 技术可行性 + 成本 ★ | RAG/微调/Prompt 选型 + 单位经济 |\n| 7 | 风险与护栏 ★ | fallback 降级 + human-in-the-loop + 置信度 + escape hatch |\n| 8 | 冷启动与迭代 | MVP 明确**砍了什么** |\n\n★ = AI 补强层。最区分资深/新手的三层：**评估闭环 / 失败兜底 / 单位经济**。\n口诀：**先定位 → 八步出声走 → 每步钉一个项目数字 → 收尾说清 MVP 砍了什么。**\n\n### 评估题五步（分层）\n\n1 先定北极星（先问场景：高风险还是娱乐）→ 2 三轴分层指标 → 3 评测方法各管一摊 → 4 主动讲取舍（\"离线涨≠在线涨\"）→ 5 收在闭环（Badcase 回流）。\n\n| 层 | 指标 | 谁判定 |\n|----|------|--------|\n| **离线** | 准确率 / 相关性 / 忠实度 | 金标准集 + 代码校验 + LLM-judge |\n| **在线** | 采纳率 / 留存 / 负反馈率 / 人工介入率 / 覆盖率 | A/B + 真实流量 |\n| **护栏（不可越线）** | 幻觉率 / 引用覆盖率 / 策略违规率 | 检测器 + 人工 |\n\n三个金句认知：① **准确率与幻觉率是独立两轴**（高风险场景同报准确率/幻觉率/弃权率三个数）；② 护栏是\"不可越线\"非\"越高越好\"，不上谈判桌；③ **behavioral lift（行为提升量）比绝对值更可信**。\n\n### 改良版 STAR 弧\n\nS 情境(~15s) → T 任务(~10s) → **冲突/取舍(~20s：本可以 A，但代价是 B，所以选 C)** → A 行动(~50s 重头戏，全程用\"我\") → R 结果(~20s，给基线对比 X→Y) → 反思/迭代(~5s 可选加分)。\n铁律：**背景+任务 < 1/4，行动+取舍 > 1/2。**\nAI 项目必答六问：解决了什么不确定性 / 数据闭环 / 评估体系 / 成本 ROI / 技术取舍 / 你不可替代的贡献。\n\n---\n\n## ② AI 黑话一句话速查（高频 20 个：人话 + 面试钩子）\n\n| # | 术语 | 一句话 + 钩子 |\n|---|------|--------------|\n| 1 | **LLM** | 靠\"预测下一个 token\"生成的网络；钩子：别谈参数量，谈任务匹配度+数据质量 |\n| 2 | **Token** | 模型最小处理单位（英≈0.75 词），输入输出都按它计费；成本/延迟随它线性 |\n| 3 | **Embedding** | 文本/图转高维向量，语义近则向量近；RAG 召回上限由 embedding 模型+分块决定 |\n| 4 | **MoE** | 每次只激活一小部分专家（如 8 选 2），总参数大、激活参数小；DeepSeek/Mixtral 用它 |\n| 5 | **RAG** | 先检索再喂模型基于事实答；**没死、与长上下文互补**；是\"召回+重排+生成\"工程链路 |\n| 6 | **向量数据库** | 存高维向量做 ANN 检索；生产标配 = 混合检索(向量+BM25)+RRF 融合 |\n| 7 | **Chunking** | 长文档切片再 embedding；按字数切已过时、按语义切；进阶：父子分块、late chunking |\n| 8 | **召回/Rerank** | **召回保覆盖（双塔各自编码），重排保精度（cross-encoder 联合打分）**；两段式最划算 |\n| 9 | **CAG** | 缓存的是 **KV-cache 不是问答结果**，绕开重复检索/生成，省钱压首字延迟；只适合语料小且静态 |\n| 10 | **微调/SFT** | 教说话方式/任务格式；**微调不教新知识，要更新事实用 RAG** |\n| 11 | **LoRA/QLoRA** | 只训极少新增参数（比全参少约 99%）；谈微调成本可控时甩 |\n| 12 | **RLHF/DPO** | 从\"会说\"到\"说人想听的\"；现在很多团队用更省的 DPO |\n| 13 | **Agent** | LLM+工具+记忆+规划循环；落地难点在可靠性和成本 |\n| 14 | **Function Calling** | 按 JSON-schema 输出结构化参数交外部执行；schema 校验比自由文本幻觉低 |\n| 15 | **ReAct** | Thought→Action→Observation 循环，用真实观察纠偏；比纯 CoT 抗幻觉/抗漂移 |\n| 16 | **幻觉** | 看似合理实则编造；**不可能归零**，靠 RAG 溯源+人工兜底+置信度提示管理 |\n| 17 | **上下文窗口** | 单次最大 token；**标称≠有效**，有\"lost in the middle\"，塞满更贵更慢 |\n| 18 | **Evals** | 系统化测试集+指标；\"没 evals 的 AI 产品在裸奔\"；LLM-judge 有位置/长度偏见需人工校准 |\n| 19 | **数据飞轮** | 用→数据→更好体验→更多用户；护城河不是模型，是专有数据飞轮 |\n| 20 | **TTFT** | 首 token 延迟，决定\"卡不卡\"第一印象；流式输出就是在压它 |\n\n备选可换：**MCP** = AI 的 USB-C，解决工具对接 N×M；**PMF** = 持续验证非一次性事件。\n\n---\n\n## ③ 三个项目关键数字 + 口径一句话（肌肉记忆表）\n\n### 杭小育（C 端政务育儿 RAG，主场）\n\n| 数字 | 口径一句话（破折号紧跟数字，临场扫读） |\n|------|------|\n| **460 万用户 / 日活 21.5 万 / 服务全市 95 万家长** | 窄场景 PMF 已验证，体量本身是数据飞轮 |\n| **检索覆盖率 +34%** | 500 个线上点踩 Bad Case + 医生标金标准 + 优化前后 A/B 相对提升；分母=500 |\n| **回答准确率 97.5%** | 判对条数÷测试集总条数，人工抽检为主、LLM-judge 辅助再人工校准；\"检索准\"≠\"生成忠实\" |\n| **拍照营养分析 98%** | 是**食物类别识别**准确率；**营养素摄入分析 85%+**（份量估算更难）——两数绝不混说 |\n| **推理成本降约 80%** | **复合**结果（意图分类前端拦截 + 分层检索 + CAG 缓存 KV + DeepSeek 适配），非单招 |\n| **平均响应 7s→2s，TTFT 3 秒级** | 路由分流 + CAG 省检索 + 流式输出 + 并行化精简 |\n| **23.1 万+ 向量索引** | 2 万+ 文档 × 平均每份 chunk 数 |\n| 幻觉率卡安全基线内 | 测忠实度，设不可逾越红线，新版本须不劣化才放量 |\n\n### 孤独症筛查（B/G 端，诚实定位：协助/参与）\n\n| 数字 | 口径一句话 |\n|------|------|\n| **1600+ 机构 / 16.5 万(165164)筛查 / 投诉率 -85% / 初筛效率 +63%** | 价值不在 AI，在**驾驭国家级民生项目的多级 B/G 端业务**（卫健委监管线+省市县街道）+ 量表(M-CHAT-R/Gesell/CARS)数字化；主动说\"AI 不是主角\"反而加分 |\n\n### SAGE（G 端 Text2SQL 取数 Agent，主场）\n\n| 数字 | 口径一句话 |\n|------|------|\n| **业务采纳率 97.5%** | 靠**推理链路可视化**（SQL+CoT+工具调用前端透明）→ 信任→可校验→敢用；北极星用采纳率，因 Execution Accuracy 也会误判 |\n| **取数 3 天→分钟级** | Text2SQL 取数智能体 |\n| 是真 Agent 的判据 | **执行反馈 + 自纠正闭环**（非套大模型）；安全落在**执行层**（只读权限+执行前审查+限流），不靠 prompt |\n\n---\n\n## ④ 自我介绍要点骨架（1 分钟版四件事）\n\n**你是谁**（设计专业 + 一家 AI 公司 AI PM 一年多 + 健康民生 C/B/G 三端）→ **你在做什么** → **最牛一件事**（杭小育一句话 + 三数字：460 万 / 日活 21.5 万 / 准确率 97.5% / 降本约 80%）→ **为什么来**（把模型能力落成几百万人在用的产品）。\n\n| 维度 | 要点 |\n|------|------|\n| 三条纪律 | ① 结构一耳朵拎清；② 主动埋接得住的钩子；③ 不给自己挖坑（孤独症一句定位不展开） |\n| 两短板讲成优势 | **设计转产品** = 空间/信息架构直觉 + 用户同理心（锚点：杭小育首页信息架构亲手重做）；**工作约一年** = 讲密度不讲时长（C/B/G 三端全链路），主动认局限 + 指向大厂补足 |\n| 时间线对死 | AI 岗 2025.3 入职、本科 2024.6 毕业，统一口径\"做 AI 产品一年多\"，别说成\"毕业后一直做 AI\" |\n| 三种面试官换档 | 专业面=压硬实操（金标准集/CAG/Rerank/可视化信任）；HR 面=动机+稳定性；总监面=判断力+选型 sense（\"我知道什么时候**不该**用 CAG\"） |\n| 高频忌语（别说→改说） | \"我只做了一年\"→\"一年内跑通 C/B/G 三端全链路\"；\"我不是科班\"→\"我从设计转产品，带着信息架构和用户视角\"；\"我负责整个项目\"→分清\"我主导 X / 参与 Y\"；\"这个我不会\"→\"没直接做过，思路是…，会从…补\"；\"准确率 97.5%\"别裸报→紧跟分母+谁判定 |\n\n---\n\n## ⑤ 追问应对口径三件套（任何百分比随口报）\n\n| 件 | 问自己 | 杭小育示例 |\n|----|--------|-----------|\n| 1 **分子/分母** | 这个数怎么算的 | 34% = 召回到金标准文档的题数 ÷ 500 |\n| 2 **哪个测试集** | 离线还是在线 | 金标准集 / 线上流量 / 安全集 |\n| 3 **谁判定对错** | 人 / 模型 / 代码 | 医生标金标准 / 人工抽检 / LLM-judge（需人工校准） |\n\n配套两条铁律：**主导 vs 参与分清楚**（不贪功）；**真不懂就承认 → 给推理/类比 → 给学习路径**（绝不硬编原理）。\n\n防穿三个高危记忆点：\n- **CAG 缓存的是 KV-cache，不是问答结果。**\n- **粗排 = 双塔向量召回；精排 = cross-encoder 联合打分**（别说成关键词、或\"再向量一次\"）。\n- **Text2SQL 主指标 = Execution Accuracy**（执行结果对，非 SQL 字面 Exact Match）。\n\n---\n\n## ⑥ 当下最该记的行业热点关键词（6 个，数据核证至 2026-06）\n\n| # | 关键词 | 一句话 | 标签 |\n|---|--------|--------|------|\n| 1 | **evals 是\"新 PRD\"** | 十年来 PM 第一个新硬技能；\"没 evals 的 AI 产品在裸奔\" | 角色趋势 |\n| 2 | **上下文工程 > 提示工程** | 重心从写 prompt 转向组织上下文（RAG/记忆/工具/窗口管理） | 角色趋势 |\n| 3 | **MCP 走向中立治理** | Anthropic 2025-12-09 把 MCP 捐给 Linux 基金会新设的 AAIF（OpenAI/Block 共建）；官方披露月约 9700 万次 SDK 下载、1 万+ 活跃 server；配讲 A2A：MCP 接工具、A2A 接 Agent，标准在收敛 | 生态 |\n| 4 | **Agent-first / 输入框消失** | 交互从对话框转向 Agent 主动执行多步任务 | 交互趋势 |\n| 5 | **Gartner：40%+ Agentic AI 项目 2027 年底前被砍** | 因成本失控/价值不清/风控不足；当下多是 PoC，存\"agent washing\" | 冷静派弹药 |\n| 6 | **AI 应用\"赚得多但留不住\"** | RevenueCat《2026 订阅应用报告》(2026-03)：AI 应用每付费用户营收 +41%，但年留存仅 21.1% vs 非 AI 30.7% | C 端 sense 金句 |\n\n> 一句话点评弹药（数据截至 2026Q1，QuestMobile/Similarweb 口径）：国内通用助手是**双寡头**——豆包约 3.45 亿 MAU（DAU 1.4 亿）国内第一 + DeepSeek 约 1.35 亿，断层领先其后梯队。全球看：ChatGPT 月活破 10 亿但聊天网页流量份额从约 87% 跌到约 6 成（Gemini 蚕食），Gemini 靠 Google 分发冲到约 7.5 亿月活——\"**分发即护城河**\"。最被验证赛道是 **AI 编程**（Cursor ARR 约 $2B 起、年内仍在翻倍），AI 陪伴**证伪**（留存付费难、多产品关停）。\n\n---\n\n## 进场前 30 秒自检\n\n- [ ] 设计题八步 / 评估题三轴能出声背\n- [ ] 黑话 20 个里至少 RAG / CAG / 召回 Rerank / Evals / 幻觉能脱口\n- [ ] 三个项目关键数字 + 口径一句话张口就有\n- [ ] 自我介绍四件事 + 时间线口径对死\n- [ ] 口径三件套（分子分母 / 测试集 / 谁判定）成习惯\n- [ ] 6 个热点关键词各能讲一句\n\n> 你是真做过的人。把已经发生的事，按口径讲清楚就行。\n", "/07-临场速记与热点/README.md": "# 07 · 临场速记与热点速递\n\n面试前一天和当天看的东西。把全站精华压缩成可快速过的速记，再补上最新行业 sense。\n\n## 计划文件\n\n- `01-前一天cheatsheet.md` — 一页纸：核心框架 + 黑话 + 项目数据 + 自我介绍要点\n- `02-当天30分钟速记.md` — 进场前最后过一遍的浓缩版\n- `03-2026行业热点速递.md` — 最新模型、Agent、多模态、落地与监管大事件\n- `04-常见忌语与雷区.md` — 哪些话不能说、哪些坑别踩\n\n## 定制发力点\n\n- 热点速递保证「新」——面试 sense 不能停在半年前，需联网更新到面试临近时点。\n- cheatsheet 把她三个项目的关键数字（460W、+34%、降本 80%、97.5%）做成肌肉记忆。\n", "/07-临场速记与热点/03-2026行业热点速递.md": "# 2026 AI 行业热点速递：面试 sense 不能停在半年前\n\n> 这一篇不是速记，是**弹药库**。专治\"行业洞察题\"\"你最近关注什么 AI 进展\"\"怎么看 XX 赛道\"这类开放题。\n> 核证时点：**2026 年 6 月**。每条都标了口径与时点，引用时把口径带上（\"据 XX 口径，截至 2026 年 X 月，约……\"），不确定的降级成\"据报道\"。\n> 用法：进场前扫一遍六个板块各记 1-2 条最稳的，把\"面试可以这么提\"那句变成自己的话。**不要背数字背到死**——记住趋势判断、把数字当佐证，比报菜名高级得多。\n> 给你的提醒：你工作刚满一年、非科班，**最容易被质疑的就是\"行业 sense 跟不跟得上\"**。这一篇就是补这个短板的。但切记——**别堆术语充专家**，热点是用来佐证你的产品判断的，不是用来炫的。每抛一个热点，最后都要落回\"所以做产品我会怎么想\"。\n\n---\n\n## 总览：六个板块一句话\n\n| 板块 | 一句话判断（面试可直接用） |\n|------|------|\n| ① 模型 | 前沿模型同质化，智能指数差距收窄到个位数，竞争转向产品 / Agent / 价格层 |\n| ② Agent | 真问题不是模型能力，是 ROI 与治理；Gartner 预测 2027 年底 40%+ 项目被砍 |\n| ③ C 端格局 | 国内豆包断层第一，海外 ChatGPT 破 10 亿、Gemini 借搜索狂追，核心差异是**分发渠道** |\n| ④ 商业化 | 主线从\"拉新\"转\"变现\"，留存悖论提醒：日活 ≠ 留存 ≠ 付费，三者分开看 |\n| ⑤ 赛道 | AI 编程最确定、视频技术领先但商业未跑通、陪伴高时长但变现两极、眼镜爆发 |\n| ⑥ 监管 | 2026 是\"执法元年\"：EU AI Act 8 月生效、版权\"先用后赔\"时代结束 |\n\n---\n\n## ① 最新模型与能力：同质化与价格战\n\n> 一句话：**百万上下文 + 原生多模态已是 2026 新旗舰标配**，智能指数榜单前几名差距收窄到个位数——前沿模型在\"卷参数\"之后，正在转向\"卷产品、卷 Agent、卷价格\"。\n\n### 智能指数榜单（Artificial Analysis 口径，截至 2026-06）\n\n| 模型 | 厂商 | 智能指数 | 发布 | 备注 |\n|------|------|---------|------|------|\n| **Claude Opus 4.8** | Anthropic | **61.4**（全球第一） | 2026-05-28 | 较 Opus 4.7 +4.1，领先 GPT-5.5 1.2 分；agentic coding（SWE-Bench Pro 69.2%）强 |\n| **GPT-5.5** | OpenAI | 60.2 | 2026 Q2 | 紧追 Opus 4.8、差约 1.2 分 |\n| **Gemini 3.1 Pro** | Google | 57 | 2026-02 | 数据分析 / 推理类评测领先；分发靠 Google 搜索 + 安卓 |\n| **Grok 4.3** | xAI | 53 | 2026-04 | — |\n\n> 口径提醒：智能指数是**单一榜单**（Artificial Analysis v4.0，聚合 10 项评测），仅供相对排序参考，不等于\"实际产品体验最好\"。面试时这么说更稳：\"**据 Artificial Analysis 这一个榜单，Opus 4.8 暂列第一，但前三名差距只有个位数。**\"\n\n### 国产侧版本（2026 上半年）\n\n| 模型 | 厂商 | 关键点 | 时点 |\n|------|------|--------|------|\n| **DeepSeek-V4-Preview** | DeepSeek | V4-Pro（1.6 万亿参数 / 49B 激活）、V4-Flash，均支持 **1M 上下文** | 2026-04-24 |\n| **通义千问 3.7** | 阿里 | 阿里云峰会发布，国产第一、全球前十（LMArena 口径）；推理成本约 GPT-5.5 的 1/25 | 2026-05-20 |\n\n- **DeepSeek 价格战延续**：2026-05-22 宣布 V4-Pro API **永久降价**（促销后维持原价 25%），同时停售 Coding Plan。\n\n**面试可以这么提**：\n> \"2026 年模型层最大的信号是**同质化**——智能指数榜单前几名差距收窄到个位数，百万上下文（DeepSeek-V4、通义都到 1M）和原生多模态都成了标配。这意味着竞争已经从'谁家模型强'转向'谁把模型用进产品里更好'。**对我做 C 端的启示是：模型能力不再是壁垒，体验、闭环、可信度才是。** 我在杭小育上做的 Badcase 闭环和 97.5% 准确率验证，本质就是在'模型差不多'的前提下，靠工程化把体验做出差异。\"\n\n> 给你的避坑：**别去比谁家模型 benchmark 高几分**——那是研究员视角，C 端 PM 不靠这个吃饭。要落到\"模型同质化 → 产品层定胜负\"这个判断上，再接你的项目。\n\n---\n\n## ② Agent 进展：从 demo 到工程化\n\n> 一句话：2026 年 Agent 的真问题**不是模型能力，是 ROI 与治理**。computer-use 已是生产类目，MCP / A2A 双层协议标准化，但落地依然难。\n\n### computer-use 已生产化\n\n- ChatGPT Agent、Claude Computer Use、Manus 等已是可用的\"能操作电脑 / 浏览器替你干活\"的产品类目，不再是 demo。\n\n### 协议两层分工成共识（截至 2026-04）\n\n| 协议 | 定位 | 采用情况 |\n|------|------|---------|\n| **MCP**（Model Context Protocol） | 纵向：agent ↔ 工具 | 企业采用率约 78%；已部署 1 万+ 企业服务器、SDK 下载 9700 万+ |\n| **A2A**（Agent-to-Agent） | 横向：agent ↔ agent 协作 | 150+ 组织生产环境采用（如 SAP Joule） |\n\n- **生产化现实**：完整多 agent 系统（角色权限 + schema 校验 + 编排）通常需 **12-20 周** 落地——\"想用\"和\"能上生产\"之间存在巨大 gap。\n\n### Gartner 40% 取消论（务必记牢，开放题神器）\n\n> **据 Gartner（原文 2025-06-25 发布，基于 3400+ 组织调研），到 2027 年底，40%+ 的 agentic AI 项目将被取消**，原因是成本失控、价值不清、风控不足；并点名 **\"agent washing\"（贴牌包装）**——数千家自称 agentic 的厂商中，估算仅约 130 家是真的。\n\n**面试可以这么提**：\n> \"Agent 是 2026 最热的方向，但我更关注它的'退潮信号'——Gartner 预测到 2027 年底 40%+ 的 agentic 项目会被砍，核心不是模型不行，是 **ROI 算不过来、风控兜不住**。配合 MCP / A2A 协议标准化，这其实说明行业正从'做 demo'转向'做工程'。**做 C 端 Agent 我会特别警惕两件事：一是最后一公里的可靠性（用户不容忍 agent 把事办砸），二是单次任务成本（Agent 调用比一次对话贵得多）。** 这也是为什么我在 SAGE 取数平台上把'可信度呈现'做成核心——让用户知道结果可不可信，比让 agent 多干一步更重要。\"\n\n---\n\n## ③ C 端格局最新动态：分发即护城河\n\n> 一句话：**国内豆包断层第一、海外 ChatGPT 破 10 亿、Gemini 借搜索狂追**——中美格局的核心差异不是模型，是**分发渠道**。\n\n### 国内（QuestMobile 口径，2026 Q1 / 3 月，最权威）\n\n| 产品 | MAU | 用户粘性（使用率） |\n|------|-----|------|\n| **豆包** | **3.45 亿**（国内第一） | 约 33.5% |\n| **通义千问** | 1.66 亿 | 约 17.1% |\n| **DeepSeek** | 1.27 亿 | 约 21% |\n\n- 演变线索：2025 年 12 月豆包 2.26 亿 / DeepSeek 1.35 亿\"双寡头\"；**2026 Q1 豆包与通义高速增长、DeepSeek 相对走平**（增长见顶，转向技术口碑 / API）。\n- 通义春节投流凶猛环比反弹，超过 DeepSeek 升到第二；**元宝、Kimi、智谱、MiniMax 在通用助手赛道掉队**。\n- AI 原生 App 大盘 Q1 约 4.4 亿 MAU，单季净增超 1.3 亿。\n\n### 海外（第三方统计博客口径，2026 年 5-6 月，非官方财报）\n\n| 产品 | 量级 | 时点 / 口径 |\n|------|------|------|\n| **ChatGPT** | WAU 破 **10 亿**（2026-05）、App **MAU 破 10 亿**（2026-06，史上最快） | WAU 官方口径，MAU 据第三方统计 |\n| **Gemini** | App MAU 7.5 亿（官方 Q4'25，2026-02 财报）→ 约 9 亿（第三方 2026-05）；经 Google Search AI Overviews 触达 20 亿+/月 | 官方 + 第三方混合 |\n\n- 大盘背景：聊天机器人**网页**份额从约 87% 跌到约 68%，Gemini 靠 Google 分发冲到约 18% 份额——\"**分发即护城河**\"。\n\n> 口径提醒：海外 MAU / WAU 均来自第三方统计博客（demandsage / sqmagazine / fatjoe 等），**非官方财报，各源数字有出入**。面试务必表述\"据第三方统计，约……\"。\n\n**面试可以这么提**：\n> \"国内外 C 端格局，我看到的最大共性是**分发决定胜负**。国内豆包靠字节的流量 + 硬件分发断层领先（QuestMobile 口径约 3.45 亿 MAU），DeepSeek 增长见顶后转向技术口碑和 API；海外 ChatGPT 和 Gemini App MAU 都摸到 10 亿量级，而 Gemini 还借 Google 搜索的 AI Overviews 多触达 20 亿+。**中美差异的核心不是模型强弱，是分发渠道——国内拼超级 App 流量，海外拼搜索 / OS 入口。** 这对我做产品的启示是：再好的 AI 能力，没有分发就是空气，所以选场景时我会优先看'能不能借到现成的流量入口'。\"\n\n---\n\n## ④ 商业化：从拉新到变现\n\n> 一句话：2026 商业化主线是**从\"拉新\"到\"变现\"**。豆包付费 = 国内大厂首次系统性试水订阅；留存悖论提醒 PM——**日活 ≠ 留存 ≠ 付费**。\n\n### 豆包付费试水（标志性事件，2026-05-04）\n\n- 字节豆包在 App Store 上线三档订阅：**标准版 68 元 / 月、加强版 200 元 / 月、专业版 500 元 / 月**；免费版保留日常对话，付费聚焦 PPT 生成、数据分析、视频生产等**复杂 / 生产力场景**；付费服务预计 2026 年 6 月下旬上线。\n\n### 留存悖论（数字要点）\n\n| 指标 | 口径 |\n|------|------|\n| AI 应用年留存 | 约 **21%** vs 非 AI 应用约 30.7% |\n| 付费用户 | 收入更高（约高 41%），但渗透率低 |\n| 美国订阅样本 | ChatGPT Plus 半年留存约 71%（订阅模式跑通） |\n| 中国变现 | 靠广告 + 电商抽佣 + API，订阅刚起步；豆包早期付费版曾流失约 600 万 |\n\n- **AI 编程定价转向**：到 2026 年中，Claude Code / Cursor / Copilot / Windsurf 等普遍从\"不限量月费\"转向 **按量\"Agentic Hours\" + token 池** 计费——侧面印证 **Agent 单次成本高**。\n\n**面试可以这么提**：\n> \"2026 商业化的主线是从'拉新'转'变现'，最标志性的事件是 **2026 年 5 月豆包上线 68-500 元三档订阅**——这是国内大厂首次系统性试水订阅，付费功能聚焦 PPT、数据分析这类生产力场景，因为日常对话用户不愿付钱。这背后是个'留存悖论'：**AI 应用的年留存（约 21%）反而低于非 AI 应用（约 30.7%），但付费用户收入更高。** 中美差异也在这——美国订阅意愿成熟（ChatGPT Plus 半年留存约 71%），国内更靠广告 + 硬件 + 免费走量。**我做产品会把日活、留存、付费三个指标分开看**——很多团队拿日活当遮羞布，但日活高不代表留得住，更不代表付得起。\"\n\n> 给你的发挥点：你杭小育有 460W 用户、21.5W 日活的真实数据。被问商业化时可以接：\"**我也踩过只看日活的坑，后来更关注次日 / 7 日留存和真实使用深度**\"——把行业洞察落回自己的实操，比空谈留存悖论可信得多。\n\n---\n\n## ⑤ 爆发与证伪赛道：分清\"用得久\"和\"付得起\"\n\n> 一句话：**AI 编程最硬、视频技术领先但商业未跑通、陪伴高时长但变现两极分化、眼镜爆发**。做 C 端要分清\"用得久\"和\"付得起\"。\n\n| 赛道 | 状态 | 关键事实（时点 / 口径） |\n|------|------|------|\n| **AI 编程** | 爆发 · 最确定 | 工具高度集中（Claude Code / Cursor / Copilot / Windsurf / Antigravity）；定价转 Agentic Hours，反证需求真实、用量大 |\n| **AI 视频** | 技术狂飙 · 商业坎坷 | **OpenAI 关停 Sora**：Web/App 2026-04-26 下线、API 2026-09-24 停服，明星产品上线约半年即终结（算力成本 + 版权双杀）；国内可灵、即梦（字节）接管下半场；Veo 3.1 单镜头近以假乱真，但\"讲完整故事即露馅\" |\n| **AI 眼镜 / 硬件** | 爆发 | Meta 智能眼镜 H2'25 市占约 82%（Counterpoint）；据 Bloomberg，Meta + 依视路陆逊梯卡把年产能目标翻倍到约 2000 万台/年（2026 年底），H2'26 望售约 1000 万台；AI 手机 / 眼镜拉动 DRAM / NAND，成大厂变现新载体 |\n| **AI 陪伴** | 高时长 · 强证伪 | Character.AI 月活约 2000 万、日均时长约 75 分钟、月聊天分钟数 20 亿+（互动深度全品类领先），但 Plus 仅 $9.99/月；全球陪伴市场约 5000 万活跃 / 5 亿+ 美元年营收，**头部 10% 吃掉约 89% 营收，仅 33 款 App 终身流水破百万美元**（口径：第三方统计/行业报告，2025-2026） |\n\n**面试可以这么提**：\n> \"2026 的 C 端赛道我会分三层看：**AI 编程是最硬的'有用'赛道**——工具高度集中，定价从月费转向按量计费，恰恰反证需求真实、用量大；**AI 视频是技术领先但商业模式没跑通**——OpenAI 4 月关停 Sora App 是个警钟，单镜头能以假乱真但讲不了完整故事，渲染成本又太高；**AI 陪伴是典型的'高时长但变现两极分化'**——Character.AI 用户日均时长约 75 分钟，但头部 10% 吃掉约 89% 营收，长尾极度贫瘠。**这正好印证留存悖论的极端样本：用得久 ≠ 付得起。** 所以我选赛道会优先看'有没有刚需价值锚点'，而不是看时长好不好看。\"\n\n> 给你的避坑：**陪伴别一棍子打死说\"证伪\"**——准确说法是\"变现两极分化、规模化难\"。说\"叫好不叫座\"比说\"陪伴已死\"更显成熟。\n\n---\n\n## ⑥ 监管 / 版权：2026 是\"执法元年\"\n\n> 一句话：2026 年监管从\"立法\"进入\"执法\"——**EU AI Act 8 月生效是悬顶之剑**，版权侧\"先用后赔\"时代结束，合规成本将内化进模型成本。\n\n### 近月大事件（2026 年 5-6 月，可重点引用的锚点）\n\n| 事件 | 时点 | 要点 |\n|------|------|------|\n| **EU AI Act 透明度义务生效** | 2026-08-02 | Article 50：用户须被告知在与 AI 交互 / 内容为 AI 生成；AI Omnibus（2026-05）将已上市系统的机器可读标记宽限到 2026-12-02 |\n| **OpenAI Frontier Governance Framework** | 2026-05-28 | 主动对齐 EU GPAI 行为准则与加州 Transparency in Frontier AI Act；GPAI 准则已约 24 家签署 |\n| **Bartz v. Anthropic 版权和解** | 听证 2026-05-14 | 美史上最大版权和解，约 15 亿美元，覆盖约 50 万部作品（约 $3000/部）、涉约 12 万作者 |\n| **CNN 起诉 Perplexity** | 2026-05-28 | 指控抓取 1.7 万+ CNN 内容用于训练并生成实质相似输出；Perplexity 已面临 NYT、Reddit、道琼斯等多起诉讼 |\n| **GEMA v. OpenAI**（欧洲） | 2026 | 欧洲 AI 侵权方向标志性案件 |\n\n**面试可以这么提**：\n> \"2026 监管最大的变化是从'立法'进入'执法元年'。最临近的是 **EU AI Act 透明度义务 8 月 2 日生效**——所有 AI 生成内容要可被标记、可被识别，这是悬在所有出海产品头上的剑。版权侧更标志性：**Anthropic 15 亿美元的史上最大版权和解 + CNN 5 月起诉 Perplexity**，意味着'先抓数据训练、出事再赔'的时代结束了，合规成本会被内化进模型成本。**对我做 C 端的启示是两条：一是数据来源要合规，二是生成内容要能溯源 / 加标记。** 在高敏感场景（比如我做过的孤独症筛查），合规和伦理边界本来就是产品设计的一部分，不是事后补丁。\"\n\n> 给你的发挥点：你做过孤独症筛查这种**高敏感、强伦理**的场景。监管题是你的主场——别只复述新闻，要接到\"我在筛查产品里怎么处理伦理边界和数据合规\"，把热点变成你的差异化优势。\n\n---\n\n## 收尾：怎么把热点用得\"像内行\"而不是\"像背书\"\n\n| 别做（背书生） | 改做（产品人） |\n|------|------|\n| 一口气报五个模型 benchmark 分数 | 抛\"模型同质化\"这一个判断，用一个数字佐证 |\n| 复述新闻\"OpenAI 关了 Sora\" | 接判断\"视频技术领先但商业没跑通，所以我选赛道看刚需\" |\n| 堆术语 MCP / A2A / computer-use | 用一句话点出\"Agent 真问题是 ROI 与治理\"，再落到产品取舍 |\n| 说\"陪伴已死\"\"DeepSeek 不行了\" | 说\"陪伴变现两极分化\"\"DeepSeek 增长见顶转向 API\"——留余地、显成熟 |\n| 热点讲完就停 | 每个热点最后一句都拐回\"所以我做产品会怎么想\" |\n\n> 三个万能句式，背熟任选其一收口：\n> 1. \"这说明竞争从模型层转到了产品 / 工程层，而这正好是我擅长的——\" 接项目。\n> 2. \"对我做 C 端的启示是……\" 接一个具体的产品判断。\n> 3. \"我会把这个趋势落到指标 / 取舍上：……\" 接你怎么权衡。\n\n> 最后的最后：**这一篇是弹药，不是剧本。** 面试不是看你知道多少热点，是看你能不能用热点支撑产品判断。记不住数字没关系，记住\"趋势判断 + 落回自己的项目\"这个动作，就赢了一大半。\n", "/07-临场速记与热点/02-当天30分钟速记.md": "# 面试当天：进场前 30 分钟最后过一遍\n\n> 这一篇比 cheatsheet 更短，只管「临门一脚」。不展开、不讲原理，全部一句话级肌肉记忆。\n> 进场前把六个板块各扫一遍即可：**开口第一句 → 三个钩子 → 五题要点 → 节奏铁律 → 急救 → 反问**。\n> 求稳不求全。背不下来没关系，把 ① ④ 记牢就够了。\n> （③ 第 4 题的行业口径核到 2026-06：Agent-first、上下文工程 > 提示工程、\"模型差距收敛、拼工程化\"均为当下主流共识。）\n\n---\n\n## ① 自我介绍：开口第一句（背到张口就来）\n\n> \"面试官好，我是【你的名字】。过去一年我专注 C 端 AI 应用产品，**接手优化过一个 460 万+ 用户**的政务育儿智能体『杭小育』，亲手做过 RAG 检索改造、Badcase 闭环和取数 Agent。今天想重点聊我怎么把模型能力，落成用户真正在用的产品。\"\n\n| 要点 | 怎么做 |\n|------|--------|\n| 第一句三件套 | 身份 + 量级数字（460W）+ 一句钩子（\"落成用户在用的产品\"） |\n| 防贪功用词 | 杭小育是 **2.0 接手优化**，说\"接手优化/我负责\"，**别说\"主导/从 0 搭\"**（一深挖就和真实角色对不上） |\n| 专业背景 | 设计**不主动提**，被问到再坦然接，别开口就自爆短板 |\n| 时长 | 30 秒收住第一段，整段自我介绍 ≤ 2 分钟 |\n| 心态 | 开口稳、语速放慢、第一句说完停半秒，给面试官接的余地 |\n\n---\n\n## ② 三个项目：各一句话钩子\n\n| 项目 | 一句话（是什么 + 我的价值） | 钩子词（引导追问） |\n|------|------|------|\n| **杭小育智能体** | 460 万+ 用户的 C 端政务育儿智能体，2.0 接手优化，我负责从 RAG 检索改造到 Badcase 闭环，把\"能答\"做到\"答得准、用户敢信\" | 召回 / Badcase |\n| **孤独症筛查** | 全省民生底座，我主导把医学量表转成带防呆的数字化表单引擎、协助理顺多级业务流转；**AI 含量不高、主动诚实定位**，硬核是驾驭复杂 B/G 端业务 | 量表数字化 / 复杂业务驾驭 |\n| **SAGE 取数 Agent** | G 端 Text2SQL 智能体，核心是解决\"信任\"——推理链路可视化让用户敢用 + 两层安全护栏兜政务红线，采纳率做到 97.5% | Text2SQL Agent / 信任设计 |\n\n> 技巧：每句话故意留一个钩子词，把面试官往你最熟的地方引。\n\n### 关键数字（报出来即定胜负，张口就有）\n\n| 项目 | 必背数字 |\n|------|----------|\n| 杭小育 | 460W 用户 · 日活 21.5W · 准确率 97.5% · 检索覆盖率 +34% · CAG 降本 80% · 响应 7s→2s · 拍照营养分析 98% |\n| 孤独症筛查 | 1600+ 机构 · 16.5 万筛查 · 投诉率 -85% · 初筛效率 +63% |\n| SAGE 取数 | 采纳率 97.5% · TTFT <2s · 出数 3 天→分钟级 |\n\n---\n\n## ③ 最可能被问的 5 题：答题要点（一句话提示，不展开）\n\n| # | 问题 | 答题要点（开口方向） |\n|---|------|---------------------|\n| 1 | 自我介绍 / 讲一个代表项目 | 用②的杭小育钩子，**STAR**（背景-我的任务-动作-数据结果），90 秒收口 |\n| 2 | RAG 怎么做 / 为什么多路召回 + 粗排精排 | 多路召回**提全** → 粗排**降算力**（轻量模型砍候选集）→ 精排 + Rerank **提准**（只算 Top-N） |\n| 3 | 怎么衡量 AI 产品好不好 / 你怎么定指标 | **evals 是新 PRD**：先定义\"好的回答长什么样\"，再做离线评测集 + 在线 Badcase 闭环，别只报满意度 |\n| 4 | C 端 AI 当下机会 / 格局怎么看 | 交互在从\"填输入框\"转向 **Agent-first**；**上下文工程 > 提示工程**；模型差距在收敛，竞争核心是工程化——落地难点是\"**可信 + 成本 + 留存**\"，不是模型本身 |\n| 5 | 非科班 / 技术深度质疑（原理追问） | 别硬扛装懂；承认知识边界 + 立刻给\"**我怎么补**\"的学习路径 + 拉回\"我落地过、踩过坑\"的实操优势 |\n\n---\n\n## ④ 节奏与心态：四条铁律（最重要，只记这块也行）\n\n| 铁律 | 一句话 |\n|------|--------|\n| **准备只占 20%** | 背稿只是底；80% 靠现场对接面试官真正关心什么，别硬塞 |\n| **让他话多、你少说** | 每答完留钩子 + 反问\"这块您更关心 X 还是 Y\"，把答辩变对话 |\n| **报口径三件套** | 任何结论带「**指标 + 数字 + 对比/基线**」（如\"覆盖率 X→Y，相比旧方案\"），杜绝空形容词 |\n| **不懂就承认 + 给路径** | \"这块我没深入做过，但我的理解是…，上手我会先从 X 验证\"——非科班最佳防守，硬编必崩 |\n\n> 忌语速查（别说 X 改说 Y）见同目录 [`04-常见忌语与雷区`](/07-临场速记与热点/04-常见忌语与雷区.md)——尤其转型者那节，进场前过一遍。\n\n---\n\n## ⑤ 临场急救：卡壳 / 被质疑 / 被打断\n\n| 状况 | 怎么接（嘴不能停太久） |\n|------|------|\n| **卡壳** | 先复述问题抢 2 秒（\"您是想问 X 对吧\"）→ 用框架开口（\"我分两层看：第一…第二…\"）。**框架比内容先出。** |\n| **被质疑** | 不防御不顶嘴：先认同合理性（\"这个质疑很对\"）→ 补你的前提/数据 → 给\"如果重做我会怎么改\"，把质疑转成成长叙事 |\n| **被打断** | 立刻停，顺他的新方向走（打断=他想听别的）。别坚持讲完原稿；答完再问\"刚那点要我补吗\" |\n\n---\n\n## ⑥ 反问：备好 2-3 个（择机问，体现双向选择 + 懂行）\n\n1. **业务侧**：\"这个岗位接下来 6-12 个月，团队最想突破的一个 AI 产品指标是什么？\"\n2. **协作侧**：\"你们 AI 产品的 evals / 效果评估，现在是产品定还是算法定？产研怎么分工？\"\n3. **成长侧**：\"有 C 端落地实操经验的人进来，在你们团队最容易出彩在哪、又最该补哪块？\"（别在反问里自贴\"非科班\"标签）\n\n> 避免问：薪资福利、\"我表现怎么样\"、官网能查到的基础信息。\n\n---\n\n## 进场前 30 秒自检\n\n- [ ] 开口第一句（① 定稿）能脱口而出\n- [ ] 三个项目钩子 + 关键数字（②）张口就有\n- [ ] 口径三件套（指标 + 数字 + 对比）形成习惯\n- [ ] 一句\"不懂就承认 + 给路径\"的句式备好\n- [ ] 2-3 个反问选好\n\n> 深呼吸。你是真做过的人，把已经发生的事讲清楚就行。\n", "/05-模拟面试/02-二面交叉总监面.md": "# 二面（交叉 / 总监面）模拟：系统思维与判断\n\n> 一面验证你\"做没做过、讲不讲得清\"；二面后段到总监面，换了一把尺子量你——**不再问\"你做了什么、怎么做的\"，而是问\"你为什么这样做、它的长期影响是什么\"。** 很多有经验的产品经理恰恰挂在这一轮，根因不是知识不够，是**能力维度错位**：只会讲执行细节，讲不出战略视野、商业判断、跨赛道的宽度。\n>\n> 这一篇正是要把你训练到那个维度。它覆盖**二面后段（系统设计）到总监面（战略 / 判断 / 团队）的跨度**——真实流程里，系统设计题偏二面、战略与团队题偏三面，本篇合并成一场高压模拟，让你一次把\"宽度信号\"练出来。\n>\n> 对你来说这一轮风险点很明确：垂直深度够，但**通用 C 端 sense 偏弱、宽度没系统讲过**。所以本篇五道题共用一条主线——每答一题，都要让总监接到三个信号：**① 技术边界判断力（知道 AI 能干什么、不能干什么）；② 业务可落地深度（设计可持续方案，不是堆功能）；③ 跨赛道宽度（对不同商业模式、不同赛道有系统认知）。**\n\n---\n\n## 〇、先看清这一轮的\"尺子\"\n\n总监面是一场**维度错位的筛选**。专业面问\"做什么 / 怎么做\"，你答得出来；总监面把问题往上抬一层——\"为什么是这个方案、不是另一个\"\"这事三年后会怎样\"\"换一个赛道你还做得了吗\"。能力维度对不上，履历再漂亮也过不了。\n\n```mermaid\ngraph TB\n    classDef axis fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef sig fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef trap fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A1[\"专业面的尺子<br/>做什么 / 怎么做\"]:::axis\n    A2[\"总监面的尺子<br/>为什么这样做 / 长期影响\"]:::axis\n\n    A2 --> S1[\"信号一<br/>技术边界判断力\"]:::sig\n    A2 --> S2[\"信号二<br/>业务可落地深度\"]:::sig\n    A2 --> S3[\"信号三<br/>跨赛道宽度\"]:::sig\n\n    A1 --> T[\"只会讲执行细节<br/>= 维度错位 = 挂\"]:::trap\n    N[\"五道题共用这三个信号锚<br/>每题至少命中两个\"]:::note\n    N -.-> S1\n```\n\n这一篇五道题的排布，从最硬（系统设计，证据最足、最能展示工程思维）走到最虚但最能拉开差距（行业判断、能力迁移）。建议你按真实节奏练：**每题先掐 2 分钟讲主答案，再让\"面试官\"追问 1-2 轮**。系统设计题可以给到 8-10 分钟，那是这一轮的硬仗。\n\n---\n\n## 第一题 · 系统设计：为一个高频 C 端场景设计一个\"生产可用\"的 AI 助手\n\n**题目（面试官口播）：**\n\n> \"假设让你为一个大体量的 C 端 App 设计一个 AI 智能助手——你可以自己挑场景，比如电商导购、生活服务、内容平台都行。我不要你画一个'调用大模型'的框就完事，我要听**生产可用**的架构：分层怎么分、每一层为什么这么设计、你做了哪些取舍。开始吧。\"\n\n这道题是全篇最硬、给分最实的一题。**题眼就两个字：生产可用。** 生产可用的 AI 系统**绝不能让大模型裸跑**——必须分层。回答的第一秒就要把这句立场亮出来，然后给一套清晰的分层骨架，每层配一个取舍。\n\n### 参考答案要点（口语，她可据此组织作答）\n\n**第 0 步先定场景、再亮立场（30 秒，别省）：**\n\n> \"我先挑个具体场景——就以**生活服务 App 的 AI 助手**为例，用户问'我家附近评分高、能带娃的餐厅'这种半结构化需求。我先说一句方法论：一个生产可用的 AI 助手，核心不是大模型本身，而是**围绕大模型搭的那一圈工程**——大模型只是其中一层，它会幻觉、会超时、会乱花钱，所以我会按**分层架构**来设计，让每一层各管一件事、可独立优化、可独立兜底。\"\n\n**第 1 步给分层骨架（这是给分主体）：**\n\n> \"我会分五层，从用户进来到结果出去：\n>\n> 1. **接入层**——接住用户输入（文字 / 语音 / 拍照），做意图识别和敏感词前置过滤。这一层决定哪些请求根本不该进大模型。\n> 2. **对话管理层**——管多轮上下文、管会话状态、管记忆。用户说'再便宜点的'，得知道'的'指的是上一轮那家餐厅。\n> 3. **Agent 核心层**——大模型在这里做规划和决策：判断该查数据库、该调地图 API、还是直接回答。复杂请求拆成多步。\n> 4. **工具层**——真正干活的地方：检索（RAG 查知识 / 查商户库）、调外部 API（地图、评分、库存）、执行动作（下单、预约）。**大模型负责'决定调什么'，工具层负责'真把数据拿回来'。**\n> 5. **输出管控层**——结果回给用户前的最后一道闸：事实核查、置信度校验、合规过滤、必要时降级或转人工。\"\n\n**第 2 步主动埋三个高频追问的答案**（面试官几乎一定会问，主动讲完直接加分）：\n\n> \"这套架构有三个地方是生产环境真正的难点，我主动说一下：\n>\n> - **记忆怎么设计**——分两层。**短期记忆放 Redis 加过期时间**，存当前会话的上下文；**长期记忆放向量库**，存用户画像和历史偏好，下次进来能召回'这个用户上次找过亲子餐厅'。\n> - **幻觉怎么防**——不能只靠 RAG 一招，要多重机制叠加：**RAG 检索增强**（让模型基于真实商户数据回答而不是编）+ **置信度校验**（低置信度不直接抛给用户）+ **事实核查**（关键字段如营业时间、价格回查数据源）+ **人工复核兜底**（高风险动作如下单前确认）。\n> - **稳定性怎么保**——大模型推理会超时，所以要有**超时控制 + 降级策略**（大模型挂了退回规则化的兜底回答或人工）+ **全链路监控告警**（延迟、错误率、成本异动实时盯）。\"\n\n```mermaid\ngraph TB\n    classDef io fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef core fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef guard fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef store fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    U([\"用户输入<br/>文字 / 语音 / 拍照\"]):::io\n    L1[\"接入层<br/>意图识别 + 敏感词前置过滤\"]:::io\n    L2[\"对话管理层<br/>多轮上下文 + 会话状态 + 记忆\"]:::core\n    L3[\"Agent 核心层<br/>规划 / 决策 / 任务拆解\"]:::core\n    L4[\"工具层<br/>RAG 检索 + API 调用 + 动作执行\"]:::core\n    L5[\"输出管控层<br/>事实核查 + 置信度 + 合规 + 降级\"]:::guard\n    R([\"回给用户\"]):::io\n\n    M1[(\"短期记忆<br/>Redis + 过期\")]:::store\n    M2[(\"长期记忆<br/>向量库画像\")]:::store\n\n    U ==> L1 ==> L2 ==> L3 ==> L4 ==> L5 ==> R\n    L2 -.-> M1\n    L2 -.-> M2\n    L3 -.->|超时降级| L5\n    N[\"每层一个取舍 是给分关键<br/>不是层越多越好\"]:::note\n    N -.-> L3\n```\n\n### 加分点\n\n- **每层配一句\"我为什么不选另一条路\"**——这是这道题的评分核心。例如：\"工具层我会把**意图路由做成规则 + 小模型分类，而不是全交给大模型判断**，因为大模型每次都跑路由又慢又贵，而生活服务的意图就那么十几类，小模型分类够用——这是用一点点准确率换大幅成本和延迟。\"\"记忆我**不会把全部历史都塞进 context**，那样 token 成本爆炸还容易让模型分神，我用 sliding window 控长度 + 关键信息提取，只把真正相关的捞回来。\"\n- **上下文管理讲到底**——多轮对话上下文会溢出、Agent 会偏离目标，应对手段：**上下文压缩、关键信息提取、定期总结、sliding window 控长度，每步做目标对齐 + 定期反思**。能讲出这套，说明你真趟过多轮 Agent 的坑。\n- **把效果数据接上自己的项目**——讲完架构补一句：\"这套分层不是空谈，我在杭小育的 RAG 系统里就是这么干的——检索层走粗排加精排的两阶段漏斗、管控层做缓存和路由，两层分开优化，推理成本复合压降约 80%、回答准确率做到 97.5%，靠的就是不把检索和管控混在一起\"（口径与原理见 [第 06 章第 05 篇](/06-个人经历改造/05-深度追问预案.md) RAG 追问预案）。**用真实项目坐实架构，比纯讲设计高一档；但记住成本和准确率是两根独立的轴，别说成\"因为分层所以准确率 97.5%\"。**\n\n### 雷区\n\n- **只画一个\"用户 → 大模型 → 返回\"的框**——这是这道题最大的死法，直接判定为\"没做过生产系统\"。\n- **幻觉只说一句\"用 RAG\"**——面试官要的是多重机制（RAG + 置信度 + 核查 + 人工），单点回答说明你没踩过 RAG 也会一本正经胡说的坑。\n- **全程不讲取舍**——背完五层架构却一个\"为什么不选另一条路\"都没有，听起来像背八股。这一轮取舍讲得比架构本身还重要。\n- **稳定性 / 降级只字不提**——生产系统不谈超时、监控、降级，等于没谈生产。\n\n> 这道题与 [第 04 章第 01 篇设计题框架](/04-高频题与答题框架/01-设计题万能框架.md) 的八步骨架互补：那篇教\"从澄清到 MVP 的产品全流程\"，这道题专攻\"架构分层与工程取舍\"——同一道设计题，二面会把你往**工程纵深**这一头逼。\n\n---\n\n## 第二题 · 商业战略：build vs buy 与赛道格局判断\n\n**题目（面试官口播）：**\n\n> \"你们公司想给主 App 加一个 AI 能力。摆在你面前两条路——自己训一个模型，还是直接调供应商的 API？你怎么判断？另外，你怎么看现在这个赛道的格局？\"\n\n这是总监面的标志性宽度题。考的不是你站哪边，是你**会不会算账、能不能分阶段、对不确定性诚不诚实**。**绝对不要给二元结论。**\n\n### 参考答案要点（口语）\n\n**第 1 步：先立判据，不急着选边。**\n\n> \"build vs buy 我不会直接给结论，先定一个核心判据——**这个 AI 能力，是不是我们业务的战略差异化？是，就倾向 build；不是、而上线速度又关键，就 buy。** 比如它只是给 App 加个客服问答，那不是差异化，buy 最优；如果它是产品的核心壁垒，比如我们独占的数据能训出别人训不出的效果，那才值得 build。\"\n\n**第 2 步：算成本拐点（量化加分点）。**\n\n> \"然后算账。低到中等用量下，**调托管 API 的总拥有成本（TCO）通常更划算**——因为自建的真成本不只是 GPU，还有 1.5 到 2 个全职工程师的人力和持续运维，那往往比卡还贵。拐点在哪取决于你拿自建对标哪档 API：对标便宜模型（比如 DeepSeek、mini 档），大概月用量到几千万 token 量级才划算自建；对标前沿模型，几百万 token 就够了。还有两个非成本维度要叠上——**数据合规**（涉敏感数据、跨境受限就得本地部署，这一条可能直接逼你 build）和 **API 依赖风险**（供应商涨价、限流、下线）。\"\n\n**第 3 步：给四选项 + 分阶段（这是资深档的答法）。**\n\n> \"所以我的标准答法是给四个选项——**Build / Buy / Partner / Hybrid**——再分阶段：**现阶段用 API 快速验证 PMF**，等用量过了成本拐点、或合规收紧，**再迁到 fine-tune 的 Hybrid**；纯自研前沿大模型这一步对绝大多数应用层公司直接排除，那是基础模型公司的活。\"\n\n**第 4 步：赛道格局判断（亮宽度）。**\n\n> \"格局上我有个判断：**这个赛道其实已经分成三层了——做基础模型的、做模型工程的、做 AI 应用的。** 基础模型那层是少数巨头的游戏，烧钱、烧卡、烧数据，普通公司挤不进去也不该挤；真正的机会在**应用层和工程层**——把模型能力变成可靠、可落地、能算平账的产品。所以对一家应用层公司，build 自己的基础模型几乎永远是错的资源配置，把钱花在工程化和场景纵深上回报高得多。\"\n\n```mermaid\ngraph TB\n    classDef q fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef opt fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Q1{\"是业务战略差异化吗\"}:::q\n    Q2{\"用量过成本拐点 /<br/>合规要本地化吗\"}:::q\n    B1([\"Buy<br/>调 API 验证 PMF\"]):::opt\n    B2([\"Hybrid<br/>fine-tune + 部分自建\"]):::opt\n    B3([\"Build / 本地部署\"]):::opt\n    P([\"Partner<br/>深度绑定供应商\"]):::opt\n\n    Q1 -->|否 + 要快| B1\n    Q1 -->|是| Q2\n    Q2 -->|否| B1\n    Q2 -->|是 部分| B2\n    Q2 -->|是 强需求| B3\n    Q1 -->|生态互补| P\n    N[\"不给二元结论<br/>给四选项 + 拐点 + 分阶段\"]:::note\n    N -.-> B2\n```\n\n### 加分点\n\n- **能报真实数字区间**：LLM API 价格这两年断崖式下跌，**2025 年初到 2026 年初大盘降了约 80%**，曾经 5 美元/百万 token 现在不到 1 美元——所以\"定价和 build/buy 判断都是动态的，不是一锤子买卖\"。\n- **会算\"自建真成本\"**：主动点破\"自建贵的不是 GPU 是人\"（1.5-2 个 FTE + 运维），这一句立刻显出你算过账。\n- **引一个真实商业化案例**：可提\"MiniM
