n、输出 500 token，按某主流模型输入 $1、输出 $3 / 百万 token 算——单次 ≈ 2000÷100万×1 + 500÷100万×3 ≈ $0.0035，约 2.5 分钱。100 万 DAU、人均每天 3 次，日成本 ≈ $0.0035×300 万 ≈ $1.05 万，月 ≈ $31.5 万。**关键不是这个数本身，而是马上接一句：这还只是理想路径，乘上 1.7–2 倍的重试 / 编排损耗，真实账单逼近 $50–60 万/月——这才是要拿去对商业模式的数。**\n\n**第三步，反推单请求成本，对照商业模式**：算出来后立刻问一句——**这个单请求成本，能被这个用户带来的收入（订阅 / 广告 / 抽佣）覆盖吗？** 覆盖不了，三条路：砍成本、改商业模式、或者承认这个功能压根不该做成 AI。\n\n更进一步，把这套推演做成产品约束，我称之为 **Token 预算法**：给每个功能的单次调用预设三个上限——**最大输入 token、最大输出 token、目标单次成本**。这三个数字会反过来倒逼设计：上下文塞不进去就得做检索裁剪，输出太长就得限定格式。**先定预算，再做设计**，而不是做完了再心疼账单。\n\n## 方法论框架三：降本的六板斧（PM 怎么排优先级、省多少、红线在哪）\n\n> 这里讲的是**PM 视角的取舍排序**——哪个手段先上、能省多少、红线划在哪。每个手段背后的工程原理（KV 缓存、FP8/INT8、TTFT 构成、RouteLLM、chunked prefill）在《01-AI技术速通 / 11-成本延迟质量三角》里讲透，本篇不重复机制，只回答\"作为 PM 我怎么用它算账、做决策\"。\n\n为什么推理是降本主战场？因为账主要花在这里：**Gartner 测算 2026 年约 55% 的 AI 专用 IaaS 支出流向推理（2029 年超 65%），而推理占一个生产级 AI 系统全生命周期成本的 80–90%**（口径：单个生产系统全生命周期，非全行业；训练是偶发投入、推理常态运行）。**推理成本随用户线性增长**——用户翻倍，推理账单就翻倍；Agentic 架构下单个用户动作要跑多步，推理成本还会再放大数倍。所以降本就是降推理。\n\n```mermaid\ngraph LR\n    classDef cache fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef route fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef model fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    Q([\"用户请求进来\"]):::cache --> C1{\"命中缓存？\"}:::cache\n    C1 -->|\"语义缓存命中\"| Hit[\"直接返回历史答案<br/>零推理成本\"]:::cache\n    C1 -->|\"未命中\"| R{\"问题复杂度路由\"}:::route\n    R -->|\"简单问题\"| Small[\"小模型 / 便宜模型\"]:::route\n    R -->|\"复杂问题\"| Big[\"大模型 + 前缀缓存\"]:::model\n    Small --> Out([\"返回结果\"]):::route\n    Big --> Out\n```\n\n| 手段 | 机制（人话） | 节省幅度 |\n|---|---|---|\n| **前缀缓存（Prompt Caching）** | 把固定不变的 system prompt、长上下文缓存起来，下次不重复算 | 缓存命中可降约 90% 输入成本、85% 延迟（首次写有约 25% 溢价）；部分厂商默认开启省约 50% |\n| **语义缓存（CAG / Semantic Cache）** | 把问题向量化，遇到\"意思差不多\"的老问题直接复用答案 | 论文（GPT Semantic Cache, arXiv 2411.05276）实测命中率 61–69%、最高减约 68.8% API 调用 |\n| **小模型路由 / 模型分流** | 简单问题走小模型，复杂问题才上大模型——别杀鸡用牛刀 | 在成本、延迟、能力间取平衡，是性价比最高的一招 |\n| **量化（Quantization）** | 把模型精度从 32 位降到 8 位，几乎不掉效果 | 模型体积缩约 50–75% |\n| **批处理（Batching）** | 多个请求合并一起算 | 后台高并发任务可降本约 3–5 倍 |\n| **Prompt 压缩** | 压掉冗余提示词 | 客服场景 prompt 从 800 压到 40 token，输入成本降约 95% |\n\n**组合拳才是真功夫**：前缀缓存（缓存 70%+ 输入 token）叠加语义缓存（命中 30%+ query），综合下来能省 80%+——这正是杭小育做到的量级。\n\n> 一个必须讲清楚的坑：**缓存不是免费午餐**。语义缓存靠\"相似度\"命中，存在\"相似但不相同导致答错\"的风险（业界已有针对语义缓存的攻击研究）。所以缓存阈值要调、要有兜底，**降本不能以错误率失控为代价**。这恰恰是 PM 的活——定那条\"省到这就不能再省\"的红线。\n\n## 落到产品的取舍：ROI 不是\"上最贵的模型\"\n\n行业里有组扎心数字：**Gartner（2026）测算只有约 28% 的 AI 项目真正达到 ROI 预期；McKinsey 称约 68% 的项目两年内没达到预期 ROI**。原因往往不是技术不行，而是**产品侧的成本/效果取舍没做好**。三组核心权衡，每个 AI PM 都要在脑子里随时拉：\n\n```mermaid\ngraph TB\n    classDef axis fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A[\"准确率 vs 速度/成本\"]:::axis\n    B[\"复杂模型 vs 易维护\"]:::axis\n    C[\"数据质量 vs 数据量\"]:::axis\n\n    N[\"PM 最大盲点：<br/>没人定义'足够好（good enough）'的质量线<br/>默认上最贵模型 = 过度工程\"]:::note\n\n    A -.-> N\n    B -.-> N\n    C -.-> N\n```\n\nPM 最该补的一课，是**主动定义\"足够好（good enough）\"的质量线**，并在上线后持续守住它。准确率从 95% 提到 97.5% 可能要换更大的模型、成本翻几倍，但对用户体验的提升可能微乎其微——**这 2.5% 值不值，是产品决策，不是技术决策**。默认上最贵的模型，就是过度工程。\n\n同时别忘了那些藏在水下的隐性成本：**数据采集、清洗、校验、存储，以及把 AI 集成进现有工作流的成本**，往往比模型调用费更大、更被低估。\n\n## 为什么 AI 产品商业化这么难（成本视角的收尾）\n\n把镜头拉远，AI 产品商业化难，根子在成本结构：\n\n**第一，毛利结构性偏低。** 成熟 SaaS 毛利 75–85%，而据 ICONIQ《2026 State of AI》，AI 原生产品平均毛利约 52%（已从 2024 年 41%、2025 年 45% 逐年爬升，但仍比 SaaS 低 23–33 个百分点），**规模期 B2B AI 公司推理成本平均吃掉营收的约 23%**——每做 100 万美元 AI 营收，约 23 万美元在工程师、销售拿到钱之前就被推理成本花掉了。\n\n**第二，\"推理成本悖论\"（杰文斯悖论的 AI 版）。** 这是最反直觉的一点：据行业测算，过去两年同等能力下单 token 价格暴跌约两个数量级（约 280 倍 / 99%+），但企业实际 AI 总支出不降反升约 3 倍（全球生成式 AI 支出 2024→2025 仍同比涨 70%+，据 Gartner）。**单价崩塌移除了财务门槛，用量（尤其 Agentic 多步调用）却爆炸式增长，总成本不降反升。** 越便宜，大家用得越凶——所以指望\"等模型降价\"来解决成本是幻觉。\n\n**第三，越成功越亏 + 广告难插。** 据行业报道，头部模型公司在重度套餐上\"单个用户每月倒亏数万美元\"——定价没覆盖推理成本，**越是高活跃的重度用户越烧钱**。而对话式、Agent 式界面缺乏传统广告位，变现路径天然窄。这也解释了**中美 C 端商业化的分裂**：美国靠订阅勉强跑通，中国跑不通——2026 年 5 月豆包上线付费版后，月活（MAU，据 Aicpb.com 口径）从约 3.36 亿单月降至约 3.30 亿、净流失约 610 万，是它自 2023 年上线以来首次明显收缩；国内主流只能靠广告 + 电商抽佣硬扛高企的推理成本。\n\n结论很清楚：**对 C 端 AI 产品，成本控制不是\"锦上添花\"，是\"能不能活下去\"的生死线。** 谁能用更低的单位成本撑起同样的体验，谁就有定价权和生存空间。\n\n## 「你简历里的这些，就是成本方法论的实战」\n\n这一篇几乎是为你量身定的——**成本意识是你最被低估的强项，要主动讲出来：**\n\n- **杭小育 CAG 降本 80%**：这不是一句口号，是上面\"组合拳\"的真实落地——前缀缓存 + 语义缓存叠加，在 460 万用户、日活 21.5 万的体量下把推理账单砍掉八成。这就是\"低成本支撑百万用户\"的答案。\n- **SAGE-AI 的\"小模型路由 + 向量检索 + 缓存增强\"**：正是降本六板斧里\"模型分流 + 语义缓存\"的组合——简单取数走小模型，复杂的才上大模型，把单位成本压到能规模化采纳（97.5%）的程度。\n- **拍照营养分析 98%、准确率 97.5%**：你天然有\"定义 good enough 质量线\"的意识——知道效果守在哪条线上、不盲目堆模型。\n\n把这些从\"我做过\"上升成\"我有一套 ROI 导向的成本方法论\"，是这一篇要帮你完成的体系化跃迁。\n\n## 面试怎么说（30 秒口播）\n\n> \"AI 产品和传统软件最大的不同，是它没有边际成本递减——每次调用都在烧推理算力，用户越活跃公司可能越亏。所以我做 AI 功能会先算三笔账：单次 token 成本、放大到百万用户的规模成本、以及能不能被商业模式覆盖。在杭小育，我用前缀缓存加语义缓存的 CAG 组合，在 460 万用户体量下把推理成本降了 80%；在 SAGE 取数，我用小模型路由让简单问题走便宜模型。我的核心方法论是：**先定 Token 预算和 good enough 质量线，再反推产品设计**，让成本意识贯穿功能设计，而不是上线后才心疼账单。\"\n\n## 可能的追问及答法\n\n**Q1：怎么算一个 AI 功能划不划算？**\nA：三步——先算单次成本（输入 token ÷ 100 万 × 单价 + 输出同理），再乘日请求数 × 30 得月度规模成本，最后对照这个用户带来的收入能不能覆盖单请求成本。关键有两个坑：一是要对裸 token 成本乘 1.7–2 倍覆盖重试和编排放大，二是别忘了数据标注、人工兜底这些隐性成本。覆盖不了，就要么降本、要么改商业模式、要么这功能不该用 AI 做。\n\n**Q2：AI 产品怎么控成本？**\nA：主战场是推理，因为它占全生命周期成本 80–90% 且随用户线性增长。我会按优先级出招：先上缓存（前缀缓存省固定 prompt、语义缓存复用相似问答），再做模型分流（简单问题走小模型），后台批量任务上批处理，必要时量化和 prompt 压缩。组合起来能省 80%+。但有红线：语义缓存有\"相似不相同\"答错的风险，降本不能让错误率失控，这个阈值是 PM 要拍板的。\n\n**Q3：为什么 AI 产品商业化这么难？**\nA：根子在成本结构。一是毛利低，AI 原生产品毛利约 52%（ICONIQ 2026），而成熟 SaaS 是 75–85%，光推理就吃掉营收约 23%。二是推理成本悖论——单 token 价格两年降了约两个数量级，但用量爆炸，企业 AI 总支出反而涨了约 3 倍。三是越活跃的重度用户越烧钱，而对话式界面又难插广告。所以中美走了两条路：美国靠订阅勉强跑通，中国订阅跑不通（豆包上付费版单月 MAU 净流失约 610 万）就转广告 + 电商抽佣。对 C 端来说，谁的单位成本低，谁才有活下去的底气。\n\n**Q4：低成本支撑百万用户，具体怎么做到？**\nA：这正是杭小育的实战。460 万用户、日活 21.5 万，扛住成本的核心是 CAG 组合拳：育儿政务问答里大量问题高度重复，我把固定的 system prompt 做前缀缓存、把高频相似问题做语义缓存，两层叠加缓存掉大部分 token 和 query，整体推理成本降 80%。本质是：**识别出高重复、低变化的请求模式，用缓存把它们从\"每次都算\"变成\"算一次复用多次\"**，这是 C 端高并发场景降本的通用解法。\n\n**Q5：缓存命中率上不去怎么办？会不会答错？**\nA：两个层面。命中率靠调相似度阈值和优化向量检索——阈值太严命中率低、太松会误命中。误命中正是答错风险的来源，所以我会设置阈值红线 + 关键场景兜底（高风险问题强制走实时生成不吃缓存），并通过 Badcase 闭环持续监控缓存答错率。降本和准确率是一组权衡，PM 的价值就是定那条平衡线，而不是一味追命中率。\n\n**Q6：什么样的需求其实不该用 AI、纯属浪费成本？**\nA：判断标准是看问题性质。真 AI 需求是规则模糊、动态演进、海量变量、依赖人类经验的（比如育儿问答、自然语言取数）；伪 AI 需求是能用 if-else、规则引擎、阈值告警解决的（比如订单状态流转）。给一个本可以用规则引擎搞定的需求\"加个 AI 赋能\"，就是白烧推理成本还更不稳定。**敢于质疑伪 AI 需求、把钱花在刀刃上，本身就是 PM 成本方法论的一部分。**\n", "/02-AI产品方法论/04-AI评估体系（方法论视角）.md": "# AI 评估体系：用评估驱动产品迭代（evals 是新 PRD）\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-04-eval-hillclimb.png\" alt=\"小黑配图：推分数爬坡\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n> 本篇是**方法论章**，不讲\"评估指标怎么算、幻觉是什么\"——那在第 01 章第 10 篇《模型评估与幻觉》里讲过。本篇讲一件事：**作为 PM，你怎么把\"评估\"当成一套方法论，用它驱动整个产品的迭代节奏。** 这是 2026 年大厂面试官最想听、也最少有人讲清楚的能力。\n\n---\n\n## 一句话定义（电梯说法）\n\n**在 AI 产品里，evals（评估集）正在取代 PRD，成为 PM 定义\"什么叫做对\"的新契约——也是这一波 AI PM 最该补的新硬技能。** 这不是我一个人的判断：OpenAI CPO Kevin Weil 的原话是 \"Writing evals is going to become a core skill for product managers\"（写评估正在成为产品经理的核心技能）；评估课作者 Hamel Husain 把它列为\"产品经理头号最重要的新技能\"（the number one most important new skill for product managers）；YC CEO Garry Tan 则说 \"Evals are emerging as the real moat for AI startups\"（评估正成为 AI 创业公司真正的护城河）。三个人从 PM 技能、稀缺性、护城河三个角度，指向同一件事。\n\n所以这一篇，本质上是在教你一句面试金句背后的完整方法论：\"**PRD 在 Google Doc 里积灰，eval 套件在每次提交时运行。**\"\n\n---\n\n## 一、直觉解释：为什么传统 PRD 在 AI 产品里失灵了\n\n先用类比把\"为什么需要换工具\"讲透。\n\n**传统软件像装修房子。** 你写一份 PRD（产品需求文档），规定\"客厅放沙发、厨房装抽油烟机\"，工人照着做，做完一对照，对就是对、错就是错。因为传统系统是**确定性**的——同样的输入，永远是同样的输出，PRD 可以**提前把期望行为完整规约清楚**。\n\n**AI 产品像养一个实习生。** 你跟实习生说\"回答要专业、简洁、有帮助\"，这话等于没说——什么叫专业？多短算简洁？而且你问他同一个问题三次，他可能给三个不同答案（AI 的**概率性**，见本章第 02 篇）。这时候 PRD 里那句\"be helpful and concise\"，既**无法执行**、也**无法验证**。\n\n那怎么管实习生？你不会写一份《实习生行为规约》，你会**给他出一套测验题**：这 50 个真实问题，他答得怎么样，你逐题打分。Kevin Weil 把 eval 精准地类比成\"a quiz for a model\"——**给模型出的一套小测验**。\n\n这就是核心转变：\n\n| 传统 PRD（确定性世界） | Evals（概率性世界） |\n|---|---|\n| 提前规约\"应该长什么样\" | 用一组真实样例定义\"什么叫答对\" |\n| 上线前人工验收一次 | 每次提交自动跑、持续运行 |\n| 文档，写完就积灰 | 可执行资产，是产品质量的天花板 |\n| \"专业简洁有帮助\"（无法验证） | \"格式对 / 食材全列 / 句子短可扫读\"（逐项可度量）|\n\n一句话：**你能度量多好，模型就只能优化到多好。** Eval 的质量，直接给 AI 产品的质量封顶。\n\n---\n\n## 二、方法论框架：eval-driven development（评估驱动开发）\n\n把它类比成工程师都懂的 **TDD（测试驱动开发）**：先写测试、再写代码，让\"测试通过\"定义\"做完了\"。AI 产品的版本是——**先建评估集和评分卡，再去调 prompt / 调召回 / 换模型，让\"eval 分数上升\"定义\"产品变好了\"。**\n\n整个开发循环从传统的 `规约 → 设计 → 开发 → 上线`，变成：\n\n```mermaid\ngraph LR\n    classDef stage fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef loop fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef ship fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    P((\"发现问题\")):::stage\n    E[\"建评估集<br/>定义什么叫对\"]:::stage\n    H[\"Hillclimb<br/>调 prompt/召回/模型<br/>让分数往上爬\"]:::loop\n    S((\"上线\")):::ship\n\n    P ==> E\n    E ==> H\n    H ==>|\"分数过线\"| S\n    H -.->|\"分数没过, 继续迭代\"| H\n    S -.->|\"生产新 badcase 回流\"| E\n```\n\n给工程团队的指令也被极度简化成一句话：\"**这是评估集，把这个数字搞上去。**\"（Here is the eval. Make this number go up.）PM 负责定义\"对\"，团队负责\"爬坡\"，目标清晰、可量化、不扯皮。\n\n<div class=\"anim\" data-anim=\"eval-driven\"><\/div>\n\n### 落到 PM 日常的每周节奏\n\n评估不是一次性动作，而是一套**每周循环**（Braintrust 提出的节奏，可以直接抄进你的工作周报）：\n\n- **周一到周二**：捞生产里的真实对话记录（trace），把失败案例整理成新的评估用例\n- **周三**：跑一遍完整评估套件\n- **周四**：基于评估数据做上线决策（而不是基于\"我感觉还行\"）\n- **周五**：把这周的新发现沉淀回评估集，让飞轮转得更快\n\n这套节奏的价值在于：**\"产品有没有变好\"每周都有客观答案**，而不是靠 PM 拍脑袋或老板的主观感受。\n\n---\n\n## 三、评估体系四层 + error analysis 闭环（PM 最该亲手做的环节）\n\n很多人一上来就想搭一个炫酷的评估 dashboard、或者直接套个 LLM 当裁判——**这恰恰是最大的错误**。正确的起点是 PM 亲自动手做 error analysis（错误分析）。\n\n### 评估的三类裁判（按失败类型分层）\n\n不是所有东西都要用 AI 来评，先想清楚\"这个错误用什么裁判最划算\"：\n\n```mermaid\ngraph TB\n    classDef judge fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A[\"代码裁判<br/>算法/规则确定性检查\"]:::judge\n    B[\"LLM 裁判<br/>LLM-as-judge\"]:::judge\n    C[\"LLM 裁判 + 人类对齐<br/>需人工金标准校准\"]:::judge\n\n    A --- N1[\"格式对不对 / 长度 / 字符串匹配<br/>例: 短信里有没有渲染出多余的星号\"]:::note\n    B --- N2[\"模糊质量: 语气/连贯性<br/>需用样例先校准裁判\"]:::note\n    C --- N3[\"高度主观的判断<br/>需要人类 ground truth 兜底\"]:::note\n```\n\n原则：**能用代码规则判的，绝不动用 LLM**（又贵又慢又不稳定）；只有\"语气好不好、连不连贯\"这种模糊质量才上 LLM 裁判，且必须先用人工标注的样例把裁判校准对齐。\n\n### Error analysis 闭环：PM 把\"品味\"注入产品的唯一入口\n\n这是整套方法论里**最反直觉、也最关键**的一环。Shreya Shankar 有句话值得你背下来：\"如果你不做这个过程，你就没法把你自己、或你公司的品味注入到产品里。\" 流程四步：\n\n```mermaid\ngraph LR\n    classDef step fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef out fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    S1[\"1. 开放编码<br/>约30秒看一条 trace<br/>只记录现象, 不分析根因\"]:::step\n    S2[\"2. 看够样本<br/>看100条, 预期发现约40个错<br/>(课程教学案例比例)\"]:::step\n    S3[\"3. 轴向编码<br/>归并成5-6个可执行类别<br/>避免'时序问题'这种模糊词\"]:::step\n    S4[\"4. 计数排序<br/>统计每类错误频次<br/>定优先级\"]:::out\n\n    S1 --> S2 --> S3 --> S4\n    S4 -.->|\"驱动下一轮迭代\"| S1\n```\n\n**为什么 PM 必须亲自做、不能外包？** 因为亲手翻几百条真实对话、给错误归类的过程，就是你把\"领域 know-how 和审美\"沉淀进产品的过程。外包出去，你就把产品的护城河和领域专长一起外包掉了。Hamel 甚至说：\"把 prompt 和 PM 分开几乎是一种悲剧，因为 prompt 就是用英语（自然语言）写的\"——**评估和 prompt 都是用大白话写的\"什么叫对\"的契约，天然就该归 PM 管。**\n\n### 评估成熟度飞轮：组织能力的四个阶段\n\n这张图可以当你\"在团队里推动评估文化\"的路线图：\n\n| 阶段 | 状态 | 特征 |\n|---|---|---|\n| Stage 0 | Vibes（凭感觉） | 上线前手动抽查几条，全靠\"感觉还行\" |\n| Stage 1 | 按需测试集 | 出了线上事故才被动补几个用例 |\n| Stage 2 | 接入 CI/CD | 评估自动化，每次提交自动跑、回归门禁 |\n| Stage 3 | 生产数据持续回流 | 真实 badcase 自动进评估集，形成可持续护城河 |\n\n飞轮的内循环是：**观察（看生产 trace）→ 分析（error analysis）→ 评估（跑评估集）→ 改进（调系统）→ 再观察**。Stage 3 才是真正的数据飞轮（与本章第 03 篇呼应）——你的评估集会随着真实用户的边界 case 越长越厚，别人很难追上。\n\n---\n\n## 四、落到产品的取舍：离线指标 vs 在线业务指标\n\n这是面试高频追问，也是 PM 真正的判断力所在。评估分高 ≠ 业务就好，要警惕两个坑：\n\n- **Goodhart 定律**：\"一个指标一旦变成目标，它就不再是好指标。\" 团队会不自觉地去**刷分**——为了让 eval 通过而过拟合评估集，而不是真的让用户满意。所以 PM 要盯**真实结果**（用户留没留下、任务有没有完成），eval 分只是手段。\n- **别只看\"准确率/一致率\"**：在不平衡数据里它会骗你。如果 95% 的 case 本来就该\"通过\"，一个永远输出\"通过\"的傻裁判也能拿 95% 准确率。要看真阳率 / 真阴率（抓没抓住真正的坏 case）。\n\n**正确的平衡姿势**：离线 eval 做\"快速、低成本的迭代闸门\"（每次提交都跑，挡住明显的退步），在线 A/B + 业务北极星指标做\"最终裁决\"（覆盖率、采纳率、留存、投诉率）。离线指标涨了但在线没涨，说明你的评估集没对齐真实用户价值——**这恰恰是又一轮 error analysis 的信号**。\n\n这里要补一个面试官爱戳的 C 端商业化 sense：2026 年 RevenueCat《State of Subscription Apps》报告显示，**AI 应用转化好但留存差**——按**年度订阅留存**口径，AI 应用约 21.1%，明显低于非 AI 应用的约 30.7%；用户退订年订阅的速度比非 AI 快约 30%（中位数），但每付费用户收入高约 41%。这意味着 C 端 AI 产品**不能只看\"答得准不准\"，更要把\"用户为什么第二个月不来了\"做进评估闭环**。这正是离线指标无法独自回答、必须靠在线留存数据反哺评估集的地方。\n\n---\n\n## 五、回链你的简历：你早就在做评估，只是没讲成方法论\n\n这一篇几乎是为你量身定做的——**你简历里那些零散动作，串起来就是一套完整的评估驱动方法论**，缺的只是这个\"框架名字\"和体系化表达：\n\n- **杭小育**里你建的**金标准集 + A/B 实验 + Badcase 闭环**，本质就是 eval-driven development：金标准集 = 你的评估集，A/B = 你的在线裁决，Badcase 闭环 = 生产数据回流到 Stage 3 飞轮。准确率做到 97.5%、覆盖率 +34%，正是\"让这个数字往上爬\"的结果。\n- **SAGE-AI 取数**里你做的 **Badcase 标准化闭环**，几乎就是 error analysis 的开放编码 → 轴向编码 → 计数排序四步；采纳率 97.5%、出数从 3 天压到分钟级，就是评估驱动迭代爬出来的坡。\n- **浙江孤独症筛查**里**投诉率降 85%**，背后一定是你在持续看坏 case、归类、改进——这就是 error analysis 闭环在 B/G 端的样子。\n\n**所以你的强项被严重低估了**：在\"评估被业界公认是 AI PM 头号新技能\"的当口，你不是\"会用评估\"，你是**已经独立跑通过一整套评估驱动的产品迭代闭环、且有 460W 用户量级验证**。面试时要把这点从\"我做了 badcase 闭环\"这种执行层描述，**升维成\"我有一套用评估驱动产品迭代的方法论\"**。\n\n**要补的短板**：① 把它讲成体系（这篇给你框架）；② 补 C 端商业化视角——你的评估闭环过去都对着\"准确率/覆盖率\"，要练习把\"留存/付费转化\"也纳入评估闭环来谈，这是你从垂直 G 端走向通用 C 端的关键一跃。\n\n---\n\n## 六、面试怎么说（30 秒口播话术）\n\n> \"我的核心方法论是**用评估驱动产品迭代**——现在业界讲 evals 是新的 PRD，因为 AI 是概率性的，传统 PRD 那套'提前规约清楚'失效了，你得用一组真实样例定义'什么叫答对'。我在杭小育就是这么做的：先建金标准集定义对错，每次迭代不靠感觉、靠评估分数说话，再用 A/B 做在线裁决，最后把线上 badcase 标准化回流进评估集，形成飞轮。我自己会亲手做 error analysis——一条条翻真实对话、归类错误、排优先级，因为这是把领域 know-how 注入产品的唯一入口，外包不得。这套方法让杭小育准确率做到 97.5%、覆盖率提升 34%。简单说，我不是写完 PRD 就交付，**我交付的是一套能持续衡量、自动跑、随用户增长越长越厚的评估资产**。\"\n\n---\n\n## 七、可能的追问及答法\n\n**Q1：你具体怎么用评估驱动产品迭代？给个完整链路。**\nA：五步闭环。① 发现问题；② 建评估集定义\"什么叫对\"，把\"专业有帮助\"这种模糊目标拆成可度量信号（格式对/信息全/可扫读）；③ 团队 hillclimb——调 prompt、调召回、换模型，让评估分往上爬；④ 分数过线 + 在线 A/B 验证后上线；⑤ 把生产里的新 badcase 回流进评估集。我把它做成每周节奏：周一周二捞 trace 整理用例，周三跑评估，周四基于数据做上线决策，周五沉淀回流。关键是**每周都有客观答案**，不靠拍脑袋。\n\n**Q2：evals 和 PRD 到底什么关系？是替代还是补充？**\nA：在确定性的传统功能上，PRD 仍然有用；但在 AI 的概率性输出上，evals 替代了 PRD 里\"验收标准\"那部分核心职能。映射很清楚：PRD 的功能需求 → 评估场景，验收标准 → 评分量规，路线图优先级 → 回归阈值，上线就绪 → CI 门禁。最大区别是：**PRD 是写完积灰的文档，eval 是每次提交都跑的可执行资产**。而且评估和 prompt 都是用自然语言写的，本质是 PM 在定义\"什么叫对\"，天然属于 PM，不该外包给工程。\n\n**Q3：离线评估指标和在线业务指标怎么平衡？只看 eval 分会不会翻车？**\nA：会，所以要分工。离线 eval 做\"快速低成本的迭代闸门\"，每次提交都跑，挡住明显退步；在线 A/B + 业务北极星（留存、采纳率、投诉率）做最终裁决。要警惕两个坑：一是 Goodhart 定律，团队会为刷分而过拟合评估集，所以我盯的是真实结果不是分数本身；二是别只看准确率，不平衡数据里它会骗人，得看有没有真抓住坏 case。如果离线涨了在线没涨，说明评估集没对齐真实价值——这本身就是下一轮 error analysis 的信号。C 端尤其要把\"留存\"做进闭环，因为 AI 应用普遍转化好但留存差，光答得准留不住人没用。\n\n**Q4：怎么在团队里推动评估文化？大家一开始都凭感觉，你怎么落地？**\nA：我用成熟度飞轮分四阶段渐进推，不一步到位。Stage 0 大家凭感觉抽查；我先做 Stage 1，把每次线上事故沉淀成固定用例，让团队看到\"原来错误是有模式的\"；接着推 Stage 2，把评估接进 CI，每次提交自动跑、设回归门禁，让\"分数往上爬\"成为团队共同目标——给工程的指令简化成一句\"把这个数字搞上去\"，目标清晰不扯皮；最后到 Stage 3，让生产 badcase 自动回流进评估集，形成护城河。推动的关键抓手是**我自己先亲手做 error analysis 给团队打样**，用真实数据说话，比讲一百遍道理都管用。\n\n**Q5：error analysis 听起来很重，PM 真要一条条看几百条对话？不能自动化吗？**\nA：起步阶段必须亲手看，且这恰恰是 PM 不可替代的价值。Hamel 团队的经验是看 100 条 trace、大概能发现 40 个错误，然后归并成 5-6 个可执行类别。最常见的错误就是跳过这步直接套现成指标或搭裁判——那样你永远不知道你的产品到底错在哪、也没法把自己的品味注入产品。自动化是后面的事：等你手工归出稳定的错误类别后，再针对高频类别建对应裁判（代码规则的优先、模糊质量的上 LLM 裁判并用人工样例校准），把重复劳动交给机器，但\"定义什么算错\"这件事始终是人说了算。\n\n**Q6（C 端 sense 追问）：C 端 AI 产品的评估，和你做的 G 端有什么不一样？**\nA：G 端我过去主要对着\"准确率、覆盖率、采纳率\"这类任务完成度指标，因为政务场景对\"答得对不对\"零容忍。C 端不一样，光答得准远远不够——2026 年 RevenueCat 的数据是 AI 应用转化好但留存差，年订阅留存只有约 21%，比非 AI 的约 31% 低近 10 个点。所以 C 端的评估闭环必须把\"用户为什么第二个月不来了\"做进去：除了答案质量，还要评估首次体验是否惊艳、是否解决了真需求（而不是被'加个 AI'的伪需求骗了）、是否形成使用习惯。我会把留存归因也纳入 error analysis——翻流失用户的最后几条对话，找系统性的体验断点，这跟我在杭小育做 badcase 闭环是同一套方法，只是把评判标准从\"准不准\"扩展到\"留不留得住\"。\n\n---\n\n**参考来源**：Braintrust《Evals Are the New PRD》（\"evals 是新 PRD\"框架、PRD→eval 映射、每周节奏、成熟度飞轮的原创出处）；Lenny's Newsletter 对 OpenAI CPO Kevin Weil 的访谈（\"核心 PM 技能\"原话、\"quiz for a model\"类比）；Lenny's Newsletter 对 Hamel Husain & Shreya Shankar 的访谈与其 AI evals 课程（\"头号新技能\"定位、error analysis 开放编码/轴向编码方法、Nurture Boss 教学案例、100 trace ≈ 40 错误比例）；Garry Tan（YC CEO）\"evals are the real moat\" 表述；RevenueCat《State of Subscription Apps 2026》（AI 应用年留存 21.1% vs 非 AI 30.7%、退订快约 30%、每付费用户收入高 41%，年度订阅口径）。本篇核心数字与引语已于 2026-06 核实；面试前请再快速复核时效。\n", "/02-AI产品方法论/10-C端增长与商业化.md": "# C 端 AI 产品的增长与商业化：留存悖论与变现破局\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-10-growth-bucket.png\" alt=\"小黑配图：漏桶接客\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义（电梯说法）\n\nC 端 AI 产品的增长与商业化，是回答\"用什么把用户拉进来、靠什么把人留下来、凭什么让人掏钱\"这三件事——而它和传统互联网最大的不同，是 AI 把\"获客\"做到了历史最容易、却把\"留存\"和\"付费\"做成了历史最难。这套结构性的别扭，业内叫**留存悖论**，是 2025-2026 年所有 C 端 AI 产品的共同命题。\n\n> 一句话给面试官记住：**AI 产品不缺新用户，缺的是回头客和会买单的人。**\n\n## 直觉解释：网红餐厅与社区食堂\n\n把 C 端 AI 产品想象成开餐厅。\n\n过去开一家餐厅，最难的是把第一批人吸引进门——要选址、要打广告、要排队炒人气。AI 时代反过来了：一个 DeepSeek、一个 Sora，一篇刷屏文章就能让几千万人涌进门，**获客这道传统天堑被填平了**。\n\n但门一打开你就发现真问题：来的人尝个鲜、拍张照、发个朋友圈，然后再也不来了。RevenueCat《2026 订阅应用现状》里有组扎心数字（基于 10 亿+ 笔交易）——AI 应用**取消年度订阅比非 AI 快约 30%**（中位数口径），年留存只有约 21%（非 AI 约 31%）。悖论的另一面是：留下来的人很值钱——AI 应用**单付费用户一年贡献的收入比非 AI 高约 41%**。所以这不是\"没人买单\"，是\"买单的人留不住\"——典型的网红餐厅宿命：开业三天排长队，三个月后冷清。\n\n而真正赚钱的，是**社区食堂**——它不靠刷屏，靠的是\"你每天都来\"。ChatGPT 的 DAU/MAU 约 36%，几乎是 Gemini（约 21%）的两倍；ChatGPT Plus 的半年留存约 71%，是订阅赛道天花板。它们赢在让用户养成了习惯。**增长与商业化的全部功夫，就是把网红餐厅改造成社区食堂。**\n\n## 方法论框架：三层引擎模型\n\n我把 C 端 AI 产品的增长与商业化拆成三层独立引擎——**获客、留存、变现各是一套独立机器，不能用一台机器的成绩去糊弄另一台**。这是很多 PM 翻车的地方：把\"现象级获客\"当成了成功。\n\n```mermaid\ngraph TB\n    classDef acq fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef ret fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef mon fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph Acq[\"第一层 获客引擎\"]\n        A1(投流大战):::acq\n        A2(母体生态导流):::acq\n        A3(口碑刷屏):::acq\n    end\n\n    subgraph Ret[\"第二层 留存引擎\"]\n        R1(有观点的界面):::ret\n        R2(工作流嵌入):::ret\n        R3(行为闭环与习惯):::ret\n    end\n\n    subgraph Mon[\"第三层 变现引擎\"]\n        M1(订阅):::mon\n        M2(广告与电商抽佣):::mon\n        M3(增值与按结果计费):::mon\n    end\n\n    A1 & A2 & A3 ==> Ret\n    R1 & R2 & R3 ==> Mon\n    N1[\"获客好不等于留存好<br/>留存好才撑得起变现\"]:::note\n    Ret -.-> N1\n```\n\n### 第一层：获客引擎——填平的天堑与新的内卷\n\n获客在 AI 时代不再稀缺，于是竞争退化成**投流大战 + 母体生态**。国内最典型：豆包靠字节的流量与场景，MAU 从 2025Q1 的约 9980 万一路涨到 Q4 的约 2.27 亿（QuestMobile 2025 年报口径），成为首个 DAU 破亿的 AI 原生应用，2026 春节后进一步破 3 亿；通义靠 2026 年春节一波猛投流（阿里、腾讯、字节三家合计烧约 90 亿元拉新），MAU 从两三千万级别冲到约 2.03 亿、增速约 +552% 居全球第一，杀回第一梯队。投流能买来下载，但买不来回头率——一个春节日活的获客成本据测算高达约 144 元，这就是它的天花板。\n\n### 第二层：留存引擎——真正的护城河（最重要）\n\na16z 把留存来源总结成三件事，我直接拿来当方法论小标题：\n\n1. **有观点的界面**：NotebookLM、Suno、Gamma 这些\"专而精\"的产品，靠一个聚焦的场景赢过大模型公司的\"大而全\"。**克制的产品定位本身就是留存力。**\n2. **工作流嵌入**：ChatGPT 接 Google、Notion、Slack，把自己焊进用户的日常流程，切换成本越焊越高。\n3. **行为闭环与习惯**：缺了这个，再精致也留不住——Sora 打磨得再好，30 日留存也 <8%。\n\n国内的反面教材是 DeepSeek：R1 爆红后下载量在一个季度暴跌约 72%，被豆包反超。**现象级获客不等于留存**，这句话要刻进脑子。而豆包全年平均 30 日留存约 44.5%，远高于行业均值，靠的正是母体生态 + 场景化把习惯做厚。\n\n### 第三层：变现引擎——四种模式与一条迁移趋势\n\n```mermaid\ngraph LR\n    classDef now fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef future fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S(订阅<br/>统一费率):::now\n    U(用量计费<br/>按token按分钟):::now\n    AD(广告与电商抽佣):::now\n    O(按结果计费<br/>outcome-based):::future\n\n    S ==>|长期迁移| U\n    U ==>|长期迁移| O\n    N[\"当下主流仍是订阅与广告<br/>但贴合AI可变成本的<br/>用量与结果计费在崛起\"]:::note\n    O -.-> N\n```\n\n- **订阅**：美国跑通的主路，ChatGPT Plus 是标杆。但别神化它——据 The Information 援引 OpenAI 内部预测，$20 的 Plus 订阅数会从 2025 年约 4400 万降到 2026 年约 900 万（-80%），靠 $8 的 ChatGPT Go 廉价档承接，付费总盘子反而冲约 1.22 亿，但人均月收入从约 $23 跌到不足 $12。这说明即便是订阅天花板，单一高价订阅也在被\"降价走量 + 重新接广告\"取代——可持续性正被拷问。\n- **广告 + 电商抽佣**：中国主路。因为国内付费意愿弱、大模型推理成本高（豆包日均 token 调用量已破 120 万亿，2026Q1 口径，业内反推年算力支出在数百亿元级别）、广告又难插进对话流，所以主流靠母体生态导流 + 广告 + 电商抽佣变现。\n- **增值（freemium）**：免费转付费率，行业把约 3%–5% 算\"及格\"（AI 类略高，6%–8% 算好），ChatGPT 自身约 2%–5%，靠限量、限速、高级模型解锁拉付费。注意 AI 免费用户烧 token，养免费池比传统 SaaS 贵得多。\n- **按结果计费（outcome-based）**：方向明确但落地尚早——截至 2025 年中仅约 12% 的 AI 原生公司采用，但约 40% 在试验。它最贴合 AI\"可变成本 + 价值交付\"的本质：\"成功解决一张工单才收费\"，长期看是 Agent 时代的定价归宿。\n\n## 落到产品的取舍\n\n| 取舍维度 | A 选项 | B 选项 | 判断依据 |\n|---------|--------|--------|---------|\n| 优先级 | 先冲获客规模 | 先打磨留存闭环 | 缺闭环时，规模越大越漏；**先有桶再灌水** |\n| 变现路径 | 全民订阅 | 广告 + 增值 + 抽佣 | 看用户付费意愿与母体生态——**中美不能互抄** |\n| 产品形态 | 大而全助手 | 专而精场景 | 没有母体流量时，**专而精的留存更可控** |\n| 定价 | 按席位/统一费率 | 按用量/按结果 | 成本可变、价值可量化时往结果计费靠 |\n\n核心判断有两条：**第一，别用获客数据掩盖留存窟窿**——日活涨了不代表赢，要看 DAU/MAU 和 N 日留存。**第二，商业化模式必须匹配本地商业基础设施**——美国订阅跑得通是因为付费意愿 + 工作流嵌入，中国跑不通是因为底层不同，硬抄豆包付费版那样的事会流失用户（行业普遍认为国内独立订阅难，需谨慎；具体流失数字以官方口径为准）。\n\n## 回链：你简历里的这部分就是这个\n\n**这是你目前最该补的 sense，但你也有别人没有的硬资产。**\n\n- **硬资产**：杭小育 460W+ 用户、日活 21.5W+，这是真实的 C 端规模。很多候选人连\"日活\"是什么量级的产品都没碰过，你碰过——面试谈留存、谈 DAU/MAU、谈用户习惯养成时，你是有体感的人，不是纸上谈兵。CAG 降本 80%、准确率 97.5% 这些，本质就是在压**单位推理成本**（变现的成本侧）、守**留存的质量地基**（答不准用户就流失）。这两件事正好踩在本篇\"成本 × 留存\"的核心矛盾上。\n- **短板要诚实**：你的项目偏政务、健康、G/B 端，**通用 C 端商业化（订阅设计、广告变现、增长投放）你没亲手操盘过**。所以这一篇你不是来背数字的，是来补\"商业 sense\"的——面试谈商业化时，你要用\"三层引擎模型\"把思路讲成体系，再用杭小育的规模做佐证，**把短板用方法论补成不露怯**。\n\n## 面试怎么说（30 秒口播）\n\n> \"我把 C 端 AI 产品的增长拆成三层独立引擎：获客、留存、变现。AI 时代获客的天堑被填平了——一篇刷屏文就能来几千万人，所以真问题是**留存悖论**：转化快但留得差，AI 应用年留存只有约 21%，取消订阅比非 AI 快约三成。留存靠三件事：有观点的界面、工作流嵌入、行为闭环。变现上中美是分裂的——美国靠订阅跑通，ChatGPT Plus 半年留存约 71%；中国付费意愿弱、推理成本高，主流靠广告和电商抽佣。我自己做杭小育，460 万用户、日活 21 万，所以对'获客容易留存难'这件事是有真实体感的：CAG 降本、提准确率，本质都是在守留存的地基。\"\n\n## 可能的追问及答法\n\n**Q1：C 端 AI 产品到底怎么商业化？**\nA：分两步。先判断这是不是\"社区食堂\"——有没有留存地基，没留存谈变现是空中楼阁。有了再选模式：高频刚需且付费意愿强走订阅；流量大但付费弱走广告 + 电商抽佣；价值可量化的 Agent 类往按结果计费走。当下国内主流是广告 + 增值，订阅在国内独立跑通很难，所以更现实的是**靠母体生态导流 + 广告变现 + 高价值场景做增值**。\n\n**Q2：为什么国内 AI 产品付费这么难？**\nA：三个结构性原因。一是用户付费心智——国内长期被免费 + 广告养大，独立订阅天然阻力大。二是成本与变现错配——大模型推理成本高（豆包日均 token 调用量已破 120 万亿，年算力支出业内反推数百亿元级别），但对话流里又难插广告，赚钱的口子比烧钱的口子窄。三是寡头格局——豆包、DeepSeek 双寡头吃掉大半份额（QuestMobile 2025 年报口径豆包约 2.27 亿、DeepSeek 约 1.35 亿 MAU；2026 春节投流后豆包已破 3 亿、通义冲到约 2 亿），背靠字节、阿里的母体生态，独立产品很难靠付费突围。所以国内不是\"不会变现\"，是**商业基础设施决定了订阅这条路在国内不好走**。\n\n**Q3：怎么看 AI 产品的留存问题？**\nA：留存悖论是真问题但不是无解。证据两面看：一面是 Sora 30 日留存 <8%、DeepSeek 下载暴跌约 72%，说明\"现象级获客 + 没闭环\"必死；另一面是豆包 30 日留存约 44.5%、ChatGPT 半年约 71%，说明有生态、有闭环、有习惯就能破局。所以我看留存只看三个抓手：界面够不够聚焦、有没有嵌进用户工作流、有没有形成行为闭环让人养成习惯。**功能速度不等于留存**——大厂上一堆新功能，没几个真在留存上跑出来。\n\n**Q4：让你给一个 C 端 AI 产品定增长策略，你怎么做？**\nA：我会按三层引擎倒着想。**先定留存地基**：这个产品的\"行为闭环\"是什么、用什么高频场景让用户每天回来，没想清楚不开闸放量。**再设计变现**：判断本地付费意愿，选订阅还是广告 + 增值，把定价和单位推理成本对齐——成本压不下来，规模越大越亏。**最后才打获客**：投流和母体导流是放大器，地基没打好之前放大的是漏水的桶。落地我会盯一组北极星——次日 / 7 日 / 30 日留存 + DAU/MAU，而不是看下载量；并用 Badcase 闭环把高频流失场景持续修掉，这就是我在杭小育做的事，把它从\"质量手段\"用成\"留存抓手\"。\n\n**Q5（深挖非科班 sense）：你项目偏政务，凭什么相信你懂通用 C 端商业化？**\nA：我坦白通用商业化我没亲手操盘过，这是我要补的。但有两点：一是我有真实的 C 端规模体感，460 万用户、日活 21 万不是 demo，留存、转化、成本这些我天天面对；二是我把它上升成了方法论——三层引擎、留存三抓手、中美变现差异，我能讲成体系而不是碎片。我缺的是某一种变现模式的实操经验，这个进来就能补；但\"对用户、对数据、对成本的判断力\"是更难补的，那个我有。\n\n**Q6：什么样的 AI 需求是伪需求，和商业化有什么关系？**\nA：真 AI 需求是规则模糊、动态演进、海量变量、依赖人类经验的场景；能用 if-else、规则引擎、阈值告警解决的是伪需求。这跟商业化强相关——伪 AI 需求即使包装成\"AI 赋能\"也撑不起付费，因为用户感知不到 AI 带来的增量价值，留存和付费都起不来。PM 的核心价值之一就是敢于质疑\"加个 AI\"的伪需求，**把有限的成本投在真能形成留存与变现闭环的地方**。\n", "/02-AI产品方法论/README.md": "# 02 · AI 产品方法论（核心武器库）\n\n这是传统 PM 转 AI PM 最该补、也最能在面试里拉分的一章。把零散实操提炼成可表达的方法论框架。\n\n## 计划文件\n\n- `01-AI产品vs传统产品.md` — 7 个本质差异（概率性、效果不确定、数据飞轮…）\n- `02-概率性产品的体验设计.md` — 不确定性下怎么做交互、兜底、降级\n- `03-数据飞轮与冷启动.md` — 数据闭环怎么转起来，冷启动怎么破\n- `04-AI评估体系.md` — 离线评估 / 在线指标 / 人工评测 / 用户反馈闭环\n- `05-幻觉与安全治理.md` — 产品侧的幻觉治理与安全手段（对应 SAGE 可视化、权限分层）\n- `06-人机协同与信任设计.md` — 可控、可解释、可纠错\n- `07-AI产品PRD怎么写.md` — 与传统 PRD 的差异，评估标准怎么写进 PRD\n- `08-AI产品的成本账.md` — 一个 AI 功能的账怎么算（路由、缓存、模型选型）\n- `09-从0到1与1到N.md` — AI 产品的冷启动、验证、规模化\n- `10-C端增长与商业化.md` — C 端 AI 产品的留存、付费、商业模式\n\n## 定制发力点\n\n她简历里其实已经在做「Badcase 闭环」「金标准评估集」「成本路由」——这章把这些上升成**方法论语言**，让她能主动讲出「我有一套 AI 产品的评估/降本方法论」，而不是停在项目描述。\n", "/02-AI产品方法论/01-AI产品vs传统产品.md": "# AI 产品 vs 传统产品：7 个本质差异\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-01-vs-traditional.png\" alt=\"小黑配图：装修房 vs 养孩子\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义（电梯说法）\n\n> 传统产品是「写规则、控结果」——输入确定、输出确定，验收通过就交付完；AI 产品是「给能力、控边界」——输入相同输出也可能不同，你管理的不是一个静态功能集，而是一套「数据 → 模型 → 评估 → 体验」持续逼近的概率系统。**转型 PM 最大的坑，就是用做传统功能的思路去答 AI 题。**\n\n如果只让我说一句区别：**传统产品的核心交付物是 PRD，AI 产品的核心交付物是 evals（评估集）。** 这句话被 OpenAI、Anthropic 的 CPO 和一众 AI 产品布道者反复强调——evals 被称为「AI 产品的新 PRD」，是继 SQL、Excel 之后 PM 十年来第一个必须新学的硬技能。\n\n## 直觉解释（一个类比）\n\n传统产品像**装修一套房**：图纸定了、施工完成、验收签字，这套房子就「做完了」，之后只是偶尔修补。\n\nAI 产品像**养一个孩子 / 带一个新员工**：你没法给他写死「遇到 A 必须说 B」，你只能给他知识（数据）、教他判断（模型）、给他考试（评估）、看他犯错再纠正（Badcase 闭环），他每天都在变好或变差，永远没有「养完了」这一天。\n\n传统 PM 习惯当「监工」，AI PM 必须学会当「教练 + 考官」。\n\n## 七个本质差异（可复述的方法论框架）\n\n| # | 维度 | 传统产品 | AI 产品 |\n|---|------|----------|---------|\n| 1 | 输出特性 | 确定性：输入 A → 规则 → 必得 B | 概率性：同一输入可能给不同答案 |\n| 2 | 交付模式 | 一次性完美交付，季度路线图 | 持续迭代逼近，路线图高度动态 |\n| 3 | 设计起点 | 先定方案、画原型、定交互 | 先想清「让机器识别什么、用什么数据和模型、准确率阈值多少」 |\n| 4 | 数据角色 | 后台资产，做完功能再说 | sprint 级依赖：采集 / 清洗 / 标注前置参与 |\n| 5 | 质量验收 | 二元 pass/fail，测试一次性通过 | 多维概率评估，必须建 eval 体系并持续监控 |\n| 6 | PM 角色 | 需求与方案的翻译官 | 模型能力与用户需求的**双向翻译官** |\n| 7 | 需求结构 | 主要是功能需求 | 同时处理**数据 / 模型 / 评测 / 功能**四类需求 |\n\n```mermaid\ngraph LR\n    classDef trad fill:#A0AEC0,stroke:#718096,stroke-width:2px,color:#fff\n    classDef ai fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph \"传统产品：线性可控\"\n        TI([输入]):::trad --> TR{确定规则}:::trad --> TO([确定输出]):::trad --> TD([验收交付]):::trad\n    end\n\n    subgraph \"AI 产品：概率闭环\"\n        AD[(数据)]:::ai --> AM{概率模型}:::ai\n        AM --> AO([不确定输出]):::ai\n        AO --> AE{评估体系}:::ai\n        AE -.->|Badcase 回流| AD\n        AE ==>|达标才上| AU([用户体验]):::ai\n        AU -.->|反馈数据| AD\n    end\n\n    N[\"AI 产品没有终点线，只有不断收紧的概率边界\"]:::note\n```\n\n### 把七点拧成三个底层认知\n\n1. **从「控制输出」到「管理概率」**（覆盖差异 1、5、6）。传统 PM 写规则控制结果；AI PM 必须接受「你无法完全控制 AI 的输出」，转而用**置信度阈值、兜底策略、评估门槛**来管理风险。PRD 里写「准确的回答」毫无意义，除非你定义「准确」在这个场景里量化成什么——这就是 evals 取代 PRD 的根本原因。\n\n2. **从「一次交付」到「数据飞轮」**（覆盖差异 2、4）。AI 产品的护城河不是某个功能，而是**数据飞轮**：用户使用 → 产生反馈 → 模型改进 → 体验提升 → 更多用户。Agent-in-the-loop 能把再训练周期从数月压到数周，谁的飞轮转得快谁赢。\n\n3. **从「功能需求」到「四类需求」**（覆盖差异 3、7）。这是最硬核的支撑框架，建议背下来：\n\n```mermaid\ngraph TB\n    classDef root fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef branch fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef leaf fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n\n    R[AI 产品需求]:::root\n    R --> D[数据需求]:::branch\n    R --> M[模型需求]:::branch\n    R --> E[评测需求]:::branch\n    R --> F[功能需求]:::branch\n\n    D --> D1[质量 / 数量 / 偏差]:::leaf\n    M --> M1[能力边界 / 准确率区间]:::leaf\n    E --> E1[评估集 / 指标 / 监控]:::leaf\n    F --> F1[如何呈现概率化输出]:::leaf\n```\n\n## 落到产品的取舍\n\n理解了本质，AI PM 的取舍就和传统 PM 完全不同：\n\n- **不追求 100% 正确，追求「错得起 + 可兜底」。** 传统功能 bug 必须清零；AI 输出天然有错误率，关键是把高风险场景挡在阈值外、给用户可纠错的交互（如来源引用、二次确认）。\n- **不做「加个 AI 赋能」的伪需求。** PM 的核心价值之一是敢于质疑：这事用 if-else / 规则引擎能不能解决？**真 AI 需求 = 规则模糊 / 动态演进 / 海量变量 / 依赖人类经验；伪 AI 需求 = 订单状态流转、阈值告警这种确定性逻辑。** 给确定性问题套大模型，是又贵又不稳的负优化。\n- **商业化算账方式变了。** 传统订阅看留存即可；AI 订阅出现「留存悖论」——据 RevenueCat《State of Subscription Apps》：2025 版口径下 AI 应用年留存约 21.1%、显著低于非 AI 的 30.7%（差近 10 个点）；2026 版进一步指出 AI 应用退订年订阅的速度比非 AI 快约 30%（中位数），但 ARPU 已是「前 AI 时代」的约 2 倍。一句话——**AI 应用拉新快、变现狠、流失也快**。这意味着 AI 产品的商业模型要么吃「高 ARPU 短周期」，要么死磕「靠数据飞轮把留存拉起来」。中美还分裂：美国靠订阅跑通；国内订阅渗透低，主流走「免费 + 广告 + 电商抽佣」——豆包 2025 年 MAU 翻倍到 2.26 亿成国内第一大 AI 应用后，2025 下半年起接入抖音商城、做「对话即购物」，订阅（68–500 元分档）只是分层变现的一条线。这些通用 C 端变现 sense 是你偏弱的，必须补。\n\n## 你简历里的哪些点，就是这套方法论\n\n这一篇几乎能给你简历里每个动作「找到理论坐标」，把零散实操升维成体系：\n\n- **概率性 + 评估体系（差异 1、5）**——你在杭小育做的 **Badcase 标准化闭环、准确率 97.5%、拍照营养分析 98%**，在 SAGE-AI 做的 **采纳率 97.5%**，本质就是「用 evals 定义 good、持续监控」。你不是「碰巧测了准确率」，你是**在为概率系统建评估基础设施**。\n- **数据深度参与（差异 4）**——你的 **CAG 缓存降本 80%、多路召回 + 粗排精排 + Rerank、向量索引**，全是「数据作为 sprint 级依赖」在工程上的落地。覆盖率 +34% 就是数据飞轮转起来的结果。\n- **PM 是双向翻译官（差异 6）**——SAGE-AI 的**推理链路可视化解决信任问题**、Text2SQL 把 3 天压到分钟级，正是「把模型能力翻译成用户能信任的价值」的教科书案例；浙江孤独症项目把医学量表数字化、投诉率降 85%，是「把领域专家经验翻译给模型」的反向翻译。\n- **四类需求（差异 7）**——你同时处理过数据需求（召回 / 缓存）、模型需求（能力边界）、评测需求（Badcase 闭环）、功能需求（链路可视化 / 拍照入口），**只是过去没用这个框架讲出来**。\n\n**这正是你要补的最大短板**：你的功底足够深，但「讲不成体系、答 AI 题时退回传统思路」会让面试官低估你。这一篇就是你的「翻译器」——把实操翻译成方法论语言。\n\n## 面试怎么说（30 秒口播话术）\n\n> 「我理解 AI 产品和传统产品最本质的区别是从**确定性走向概率性**。传统产品输入确定、输出确定，PRD 写清楚、验收通过就交付完了；AI 产品同一个输入都可能给不同答案，所以我不能只写功能需求，而要同时处理**数据、模型、评测、功能四类需求**，核心交付物从 PRD 变成了 evals 评估集。落到我自己的项目，比如杭小育，我不是做完一个问答功能就结束，而是建了 Badcase 标准化闭环持续逼近 97.5% 的准确率，用 CAG 缓存把成本降 80%，靠数据飞轮把覆盖率拉高 34%——AI 产品没有终点线，PM 的角色也从监工变成了**模型能力和用户需求之间的双向翻译官**。」\n\n## 可能的追问及答法\n\n**Q1：AI 产品和传统产品最大的区别是什么？**\nA：一句话——**从控制输出到管理概率**。传统 PM 写规则控结果，AI PM 必须接受输出不可完全控制，改用置信度阈值、兜底和评估门槛来管理风险。最直接的体现是交付物变了：PRD 里写「准确的回答」是没意义的，除非你定义「准确」在这个场景量化成多少——所以 evals 取代了 PRD。我在 SAGE-AI 取数里就是先定「采纳率」这个可量化门槛，再谈交互怎么设计。\n\n**Q2：你觉得做 AI 产品最不一样的地方是什么？**\nA：是**工作的「重心」变了——从「定义功能」变成「定义『什么叫做对了』并持续逼近它」**。传统 PM 三件套是 Discovery、Delivery、Outcomes；AI 产品必须加第四项 **Evaluation**，而且它不是上线前测一次，是贯穿始终的多维度持续监控。换句话说，我交付的不再是一份写死行为的 PRD，而是一套「好的标准 + 评估集 + 迭代闭环」。怎么从 0 搭这套评估体系、四根支柱怎么咬合、Badcase 闭环具体怎么转，我在评估那一篇里能展开讲（指向 01 章「评估与幻觉」）；在这一题里我想强调的是认知层面的转变——**这是区分「把 AI 当功能做」和「把 AI 当概率系统运营」的分水岭**。\n\n**Q3：为什么传统 PM 的方法论在 AI 上会失灵？**\nA：因为传统方法论是**为可预测的软件设计的，套在概率性产品上会失效**。三个具体点：① 静态 PRD + 季度路线图，对应不了「输出会随数据分布漂移、路线图必须高度动态、靠快速实验演进」；② 二元验收测试，测不了概率化的多维输出；③ 只管功能需求，漏掉了数据、模型、评测需求。我转型时踩过这个认知坑，所以现在我做 AI 项目会先问「让机器识别什么、用什么数据和模型、准确率阈值定多少」，而不是先画原型。\n\n**Q4：怎么判断一个需求该不该用 AI？**\nA：看它是不是「确定性问题」。**真 AI 需求是规则模糊、动态演进、海量变量、依赖人类经验**的，比如育儿问答、医学量表判读、自然语言取数；**伪 AI 需求是能用 if-else 或规则引擎搞定的**，比如订单状态流转、阈值告警。给确定性问题硬套大模型，又贵、又慢、又不稳，是负优化。PM 的价值之一就是敢质疑「加个 AI 赋能」这种伪需求。Gartner 也预测到 2027 年底超 40% 的 agentic AI 项目会因价值不清、成本失控被取消——很多就是伪需求。\n\n**Q5：AI 产品的护城河是什么？**\nA：**数据飞轮**。功能可以被抄，但「用户使用 → 反馈数据 → 模型改进 → 体验提升 → 更多用户」这个闭环转起来后，越用越好、对手越难追。Agent-in-the-loop 能把再训练周期从数月缩到数周。我在杭小育靠 460W 用户、日活 21.5W 的真实反馈反哺 Badcase 闭环，覆盖率提升 34% 就是飞轮的产出。\n\n**Q6（商业化追问）：AI 产品商业化和传统 App 有什么不同？**\nA：最大的不同是「留存悖论」——AI 应用拉新快、变现狠，但流失也快。据 RevenueCat 的订阅报告，2025 年口径下 AI 应用年留存约 21% 对非 AI 的约 31%，差近 10 个点；2026 年口径下 AI 应用退订速度比非 AI 快约 30%，但 ARPU 已是前 AI 时代的约 2 倍。说明 AI 产品要么吃「高 ARPU 短周期」，要么靠数据飞轮把留存补起来。中美还分裂：美国订阅跑得通；国内订阅渗透低，主流走免费 + 广告 + 电商抽佣——比如豆包，2025 年 MAU 翻倍到 2.26 亿成国内第一后，重心放在接抖音商城、做「对话即购物」，订阅只是分层变现的一条线。我自己的项目偏政务和医疗垂直，通用 C 端变现这块我在主动补，思路是先看清「这个赛道的钱从哪来、留存怎么算」再设计变现，而不是默认上订阅。\n", "/02-AI产品方法论/07-AI产品PRD怎么写.md": "# AI 产品 PRD 怎么写：和传统 PRD 的差异\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-07-ai-prd.png\" alt=\"小黑配图：多出一半的 PRD\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n> 本篇是方法论章里\"动手层\"的一篇：把前面几篇的概念（概率性、评估、护栏、信任）落进**一份能让工程和算法照着干的需求文档**。和邻篇切干净：第 04 篇《AI 评估体系》讲的是\"怎么搭一套 eval 体系\"（error analysis → axial coding → LLM-as-judge → 监控）——那是**评估工程本身**；本篇讲的是\"怎么把评估标准、数据需求、成本预算、护栏**写进 PRD**\"——这是**文档表达**。被同时问到时这么切：eval 怎么建引 04 篇，PRD 怎么写落本篇；本篇把 evals 当 PRD 的一个必填章节来用。\n\n## 一句话定义（电梯说法）\n\nAI 产品 PRD，是在传统 PRD\"系统做什么\"之外，**额外把\"系统做得多好\"\"绝不能做什么\"\"成本和延迟花多少\"\"出错了怎么兜底\"这四件事写成可验收的硬约束**。一句话：**传统 PRD 定义功能，AI PRD 还要定义\"质量分布\"\"失败边界\"和\"运营预算\"——因为你管的不再是一个确定的程序，而是一个会出错的概率系统。**\n\n## 直觉解释：从\"验收一个零件\"到\"验收一名新员工\"\n\n传统 PRD 像验收一个机械零件：图纸标好尺寸公差，装上去要么严丝合缝（pass），要么装不上（fail），二元、确定、同一个零件每次都一样。\n\nAI PRD 更像**验收一名刚入职的新员工**。你不能要求他\"每次回答都 100% 正确\"——人会出错，模型也会。你能做的是：\n\n- 定一个**合格线**：\"九成的客诉他能答对\"（概率目标，不是绝对值）。\n- 划几条**绝对红线**：\"涉及医疗诊断，必须转人工，一次都不能自己拍板\"（refusal 规范）。\n- 算一笔**用人成本**：\"他平均每单耗时多久、人力成本多少，划不划算\"（延迟与 token 预算）。\n- 想好**他搞砸了怎么办**：\"答不上来时说不知道并转人工，而不是瞎编\"（失败兜底）。\n\n这就是 AI PRD 比传统 PRD 多出来的那一半。最常被引用的一句话把这个差异讲透了：传统 PRD 写\"用户问 X，AI 必须回答 Y\"；AI PRD 必须改写成 \"**95% 的情况下，用户问 X，AI 应给出类似 Y 的内容**\"（注：95% 是示例阈值，由 PM 按场景设定，下同）。从\"必须等于\"到\"大概率接近\"，整份文档的写法都得跟着变。\n\n## 方法论框架：AI PRD 多出来的七块\n\n我把\"AI PRD 比传统 PRD 多出来的部分\"拆成七块，正好对应需求评审时算法和工程会追着你问的七个问题。\n\n```mermaid\ngraph TB\n    classDef base fill:#A0AEC0,stroke:#718096,stroke-width:2px,color:#fff\n    classDef core fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef item fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph S0[\"传统 PRD 已有 照写\"]\n        T1(背景 目标 用户故事):::base\n        T2(功能范围 交互流程):::base\n        T3(普通产品指标):::base\n    end\n\n    subgraph S1[\"AI PRD 额外补的七块\"]\n        A1(1 evals 验收即评估):::core\n        A2(2 数据需求):::item\n        A3(3 模型选型与能力边界):::item\n        A4(4 失败模式与兜底):::item\n        A5(5 成本与延迟预算):::item\n        A6(6 提示词与上下文设计):::item\n        A7(7 安全护栏与拒答规范):::core\n    end\n\n    subgraph S2[\"上线后\"]\n        L1(监控阈值 + 迭代触发器):::item\n    end\n\n    S0 ==> S1\n    A1 --> L1\n    A4 --> L1\n    A5 --> L1\n    A7 --> L1\n\n    N1[\"传统 PRD 上线即归档 AI PRD 是活文档\"]:::note\n    L1 -.-> N1\n```\n\n### 1. evals：把验收标准写成\"评估标准\"（最核心）\n\n这是 AI PRD 的题眼。传统 PRD 的\"验收标准（acceptance criteria）\"是二元的——做到了打钩，没做到打叉。AI PRD 必须升级成\"**评估标准（evaluation criteria）**\"，写法是**概率目标 + 测量方法 + 测试集规模**三件套：\n\n- 反例（传统写法，对 AI 无效）：\"AI 必须正确回答用户的育儿问题。\"\n- 正例（AI 写法）：\"在 **1 万条人工标注测试集**上准确率 **≥90%**，幻觉率 **<2%**（经 RAG 验证），不当输出以 **98% 精确率**拦截。\"（均为示例阈值）\n\n为什么要这么写？因为不给测量方法和测试集，\"准确率 90%\"就是一句空话——算法没法验收，上线后也没法判断退化。配套要写清三类评估测试：**Benchmark（跑测试集对阈值）、Red-team（主动攻击和对抗输入）、A/B（AI 输出 vs 人类等价输出比准确率/速度/偏好）**。\n\n还有一个排期上的颠覆：**Eval-First**。传统是先写功能再补测试；AI 产品要**先定评估、再写功能**——第 1 周先攒 50–100 对黄金数据集（Golden Dataset），搭好评估管线，之后每次改 prompt、调 RAG、换模型都重跑评估，上线前锁死阈值，上线后每周续跑。一句广为流传的话：\"**没有 evals，你就是在蒙眼飞行（flying blind）。**\" 也正因为这个分量，OpenAI CPO Kevin Weil 把\"写 evals\"称为**产品经理的核心新技能**（\"Writing evals is going to become a core skill for product managers\"）——eval 就是\"AI 产品的新 PRD\"。这套话术的方法论本体在第 04 篇展开，本篇只用它的一个推论：evals 是 PRD 里必须填的一章。\n\n### 2. 数据需求（传统 PRD 几乎不写的新章节）\n\nAI 功能本质是\"数据喂出来的\"，所以 PRD 要替算法把数据的事说清楚，至少三项：\n\n- **数据源清单**：每个数据源的类型、量级、访问方式（API/数据库/对象存储）、负责人。别写\"在内部 wiki 里\"这种模糊话，工程要的是确切的接口。\n- **数据时效（freshness）**：能容忍多大滞后——实时 / 天级 / 周级 / 月级，配业务理由和同步触发方式。\n- **权限继承（permission inheritance）**：把用户角色映射到数据访问边界，检索时按权限过滤。漏了这条，\"**模型可能把敏感数据泄露给不该看的用户**\"。\n\n### 3. 模型选型与能力边界：定义\"盒子\"，不点名厂商\n\n新手常犯的错是直接在 PRD 里写\"用 GPT-4\"。正确做法是**不指定具体模型，而是定义一个约束盒子**收窄可选范围：部署要求（私有化/云、数据驻留区域）、成本上限（如单次查询 <0.01 美元）、能力要求（如需要 100k+ 上下文窗口、function calling）、合规要求（SOC2/HIPAA/金融合规）、版本策略（自动升级可接受 or 需评审）。\n\n配套是**能力映射（capability mapping）**而不是功能清单：别写\"加个 chatbot\"，把它拆成离散的语义任务——分类（Classify）/ 摘要（Summarize）/ 生成（Generate）/ 抽取（Extract）/ 检索（Retrieve），每个任务配独立的质量门槛。这也呼应了\"真伪 AI 需求\"的判断：能 if-else 解决的别硬塞模型。\n\n### 4. 失败模式与兜底（每条非happy-path都要有定义）\n\n核心原则一句话：**\"No mystery states\"——没有任何一个未定义的异常状态。** 用一张决策表把每个失败路径的兜底写死：\n\n| 失败模式 | 兜底方案 | 用户感知 |\n|---|---|---|\n| API 超时 / 5xx | 重试或返标准错误 | \"请稍后重试\" |\n| 没检索到相关上下文 | 诚实说\"我不知道\" + 给下一步 | 转人工 |\n| 触发安全/政策红线 | 触发预审过的拒答文案 | 看到预设话术 |\n| 检测到疑似幻觉 | 静默重试 + 收紧约束 | 拿到更保守的回答 |\n\n经典案例：Shopify 的 Auto Write 在 API 故障时直接给一个**置灰禁用态**，而不是让用户对着转圈的按钮干等。\n\n### 5. 成本与延迟预算（运营指标进 PRD）\n\n传统 PRD 偶尔提一句性能；AI PRD 必须把**单位经济**写进去，因为 token 是真金白银。\n\n- **Token 经济公式**：`(输入 token + 输出 token) × 单价 × 月调用量 = 成本`。举例（单价取示例值、输入输出分开计）：单次约 2400 token、按主流中端模型 blended 价约 0.002–0.004 美元/千 token 算，1 万次/月 ≈ 48–96 美元/月。注意真实账单还要乘 1.7–2.0 倍的重试与编排损耗（详见第 08 篇）。算出来毛利为负，三条对策：换更小的模型 / 砍 token（更短上下文、更简输出）/ 换更高价值场景。\n- **延迟用百分位 + 首 token 时间，不用单一均值**：TTFT（首 token 时间，如 95% <800ms）、总响应时间（如 95% <5s）、**P99**（最差 1% 用户，企业 SLA 用它）。运营指标清单：p50/p95/p99 延迟、单次查询成本、模型可用性、上下文窗口利用率。\n\n### 6. 提示词与上下文设计（系统提示词是产品需求，不是设计细节）\n\n一个常见误解：把 system prompt、persona、tone 当成\"设计同学顺手调一下的细节\"。错。**系统提示词是核心产品需求，要走 Legal 评审**——它决定了 AI 的人格、口径、红线，写错一句可能就是合规事故。PRD 要给：每个用例 5–10 个示例 query、可复用的 prompt 模板、空状态引导文案、首次使用引导序列。注意行业风向：**上下文工程（context engineering）正在取代提示工程**——DataHub《2026 State of Context Management》口径，82% 的数据/IT 负责人认同\"光靠提示工程已不足以让 AI 规模化\"，所以 PRD 越来越多要写\"喂给模型什么上下文\"（检索、记忆、工具结果），而不只是\"怎么措辞\"。\n\n### 7. 安全护栏与拒答规范（取代传统的\"验收标准\"位）\n\n传统 PRD 这个位置是\"Acceptance Criteria\"，AI PRD 换成 \"**安全与对齐护栏（Safety & Alignment Guardrails）**\"。两个硬产出：\n\n- **拒答规范（Refusal Spec）**：给 Top 5–10 个拒答类别（医疗、法律、竞品情报…）写**确切的拒答文案**，它是产品/工程/法务三方之间的\"合同\"。\n- **幻觉容忍度按用例分级**——这是 AI PRD 最该有的一张表：\n\n| 用例 | 可接受错误率（示例） | 缓解手段 |\n|---|---|---|\n| 金融建议 | <0.1% | 人工复核 |\n| 医疗主张 | <0.5% | 免责声明 + 专家复核 |\n| 客服分类 | <2% | 每周抽检 |\n| 创意写作 | 5–10% | 设定用户预期 |\n\n配套写**红队计划**（攻击类型、每类 5–10 条对抗 prompt、谁测/多久测一次/上线后升级流程）和 **HITL 协议**（触发条件、复核 SLA、复核人资质、反馈回训、升级路径）。\n\n## 落到产品的取舍：两类指标都要写，活文档而非归档\n\n写 AI PRD 最大的单点错误，是**只写传统产品指标（DAU、转化、留存）而忘了 AI 质量指标，或反过来只写质量指标忘了商业指标**——两类必须同时写。这恰好是补\"通用 C 端 sense\"的关键：AI 产品的留存比传统应用更脆弱（RevenueCat《2026 State of Subscription Apps》口径，统计基于超 10 亿笔应用内交易：AI 应用年留存 21.1%，非 AI 应用 30.7%，AI 应用订阅取消快约 30%），所以质量指标好不等于商业能跑通——海外靠订阅勉强跑通，国内订阅普遍跑不通（2026 年 5 月豆包在月活约 3.5 亿时试推付费版，当月月活反而环比减少约 610 万、降幅约 1.8%），主流仍靠广告 + 电商抽佣。PRD 里如果只盯着\"准确率 97.5%\"而不写清\"这个准确率怎么转化成留存和收入\"，就是把工程做漂亮了、商业没想明白。\n\n第二个取舍：**AI PRD 是活文档（living document），不是上线即归档。** 要在 PRD 里就写好上线后的监控阈值和迭代触发器，例如：踩踏率 >15% → 48 小时内模型评审；拒答率 >10% → 护栏与 UX 审计；幻觉率 >2% → 暂停新功能、重训或调 RAG；延迟 p95 漂移 >1.2 倍预算 → 回滚上一版；单次 token 成本 >1.25 倍预算 → 成本优化 sprint（均为示例阈值）。再配一张签字表：法务签拒答规范、工程签延迟预算、财务签 token 经济——责任落到人，文档才不会变成没人维护的摆设。\n\n**一个可直接套用的 AI 功能 PRD 骨架**（合并自 OpenAI PM 与资深 PM 两套模板）：① 概率性影响说明 → ② 战略与商业价值 → ③ 数据策略 → ④ 模型行为与技术需求（evals + 延迟 + 模型约束 + fallback）→ ⑤ 交互与不确定性 UX → ⑥ 安全/风险/红队 → ⑦ 生命周期与协作流程。比传统 PRD 多出来的，就是 ③④⑥⑦ 这几块的密度。\n\n## 你简历里的项目，就是这套模板的现成案例\n\n你写过 PRD，但面试要的不是\"我写过文档\"，而是\"我写得出有 AI 味、能被算法照着落地的文档\"。好消息是——**你这三个项目，几乎能把上面七块逐条填满**，这是你\"实操深\"的优势可以直接打出去的地方。\n\n- **evals**：\"杭小育\"的准确率 97.5%、拍照营养分析 98%、覆盖率 +34%，以及 SAGE 的采纳率 97.5%，本质都是你给 AI 功能定的**评估阈值**——你只是当时没用\"evals 即 PRD\"这套话术包装它。面试时把\"我们准确率做到 97.5%\"升级成\"我在 PRD 里就把准确率门槛、测试集和测量方法定死了，迭代每一版都重跑\"。\n- **数据需求 + 权限继承**：SAGE 的**权限分层**就是教科书级的\"permission inheritance\"——按用户角色限定能取哪些数，正是为了防止把敏感数据泄露给不该看的人。\n- **失败模式 + 安全护栏**：SAGE 的**执行前审查、脱敏、审计**对应\"拒答规范 + 兜底决策表 + 红队\"；浙江孤独症筛查把投诉率降 85%，背后也是把\"答错了怎么办\"的兜底想清楚了。\n- **成本预算**：\"杭小育\"的 **CAG 缓存降本 80%** 就是 token 经济的真实落地——你做的就是\"算出毛利、用缓存砍 token\"这件 PRD 该写的事。\n- **提示词/上下文**：你实操过的 RAG 多路召回、Rerank、向量索引，就是\"喂什么上下文给模型\"的上下文工程，正好接住\"提示工程不够、要做上下文工程\"的风向。\n\n**短板要诚实补**：你的 PRD 经验集中在 G/B 端和垂直健康/政务场景，那里\"准确率、合规、审计\"是天然第一优先级，所以你的护栏和评估写得很扎实；但**通用 C 端 PRD 还要回答\"商业怎么跑通\"**——留存、付费转化、广告变现这一面，是你需要主动补的。面试时把这点说成\"我擅长把 AI 质量指标写进 PRD，也清楚 C 端必须同时写商业指标，这是我正在补的\"，比藏着掖着强。\n\n## 面试怎么说（30 秒口播）\n\n> \"AI 产品的 PRD 比传统 PRD 多出来一半。传统 PRD 假设系统是确定的，同一输入同一输出，验收是二元的对错。但 AI 是概率系统，同一输入可能给不同输出，所以我的 PRD 会额外写七块：第一也是最核心的，是把验收标准写成评估标准——不写'必须答对'，而写'在一万条测试集上准确率不低于 90%、幻觉率低于 2%'，给目标、测量方法、测试集规模；然后是数据需求、模型能力边界、失败模式兜底、成本和延迟预算、提示词与上下文设计、安全护栏和拒答规范。我做'杭小育'和 SAGE 时，准确率 97.5% 这种数字其实就是我在 PRD 里先定死的评估阈值，CAG 降本 80% 就是 token 成本预算的落地，权限分层就是数据权限继承。一句话——**传统 PRD 定义功能，AI PRD 还要定义质量分布、失败边界和运营预算**，而且它是个活文档，上线后还要按监控阈值持续迭代。\"\n\n## 可能的追问及答法\n\n**Q1：AI 产品的 PRD 和普通 PRD 到底有什么不一样？**\nA：最根本的差异是从确定性到概率性。普通 PRD 假设同一输入同一输出，验收是 pass/fail；AI 功能同一输入可能给不同输出，\"正确\"不是一个点而是一个分布。所以我的 AI PRD 会比普通 PRD 多七块：evals（验收即评估）、数据需求、模型选型与能力边界、失败模式兜底、成本与延迟预算、提示词/上下文设计、安全护栏与拒答规范。还有一个心态差异：普通 PRD 上线就归档，AI PRD 是活文档，要在文档里就写好上线后的监控阈值和迭代触发器，因为模型会随数据、随版本漂移。\n\n**Q2：PRD 里怎么定义 AI 功能的验收标准？**\nA：用\"概率目标 + 测量方法 + 测试集规模\"三件套，绝不写\"必须答对\"。比如我会写\"在一万条人工标注测试集上准确率不低于 90%，幻觉率低于 2%，不当内容以 98% 精确率拦截\"。光有百分比不够，必须配测量方法和测试集——否则算法没法验收、上线后也判断不了退化。配套还要写三类测试：跑测试集对阈值（benchmark）、主动攻击对抗输入（red-team）、AI 输出对比人类输出（A/B）。我自己的习惯是 Eval-First：写功能之前先攒五十到一百对黄金数据集、搭好评估管线，改 prompt、换模型每次都重跑。没有 evals 就是蒙眼飞行。如果面试官追问\"90% 这个阈值凭什么定\"，我的答法是：阈值不是拍脑袋，是三件事的交集——一是基线（人工或旧方案现在能做到多少，新功能至少不能更差）、二是业务可容忍的错误代价（错一条客诉 vs 错一条医疗建议，红线完全不同）、三是当前模型在小规模 eval 上的实测上限。先定一个能交付的下限，再在迭代里往上抬。我项目里 97.5% 的准确率，就是这么先定基线、再迭代逼出来的，不是 PRD 里凭空写个好看的数。\n\n**Q3：怎么把\"不确定性\"写进需求文档？**\nA：三个层面。第一，验收标准本身就写成概率区间而不是绝对值，承认它会错。第二，给每个失败模式写明确兜底——我有一张\"失败模式→兜底→用户感知\"的决策表，原则是\"没有任何一个未定义的异常状态\"，比如检索不到就诚实说不知道并转人工，而不是瞎编；触发红线就给预审过的拒答文案。第三，把不确定性传达给用户的 UX 也写进 PRD：置信度标签、引用来源、AI 生成内容的复核提示。再加幻觉容忍度分级表——金融场景容忍度可能要低于千分之一并人工复核，创意写作五到一成都能接受。把\"它会错\"明明白白写进文档，工程才知道该兜哪些底。\n\n**Q4：你 PRD 里为什么不直接写用哪个模型？**\nA：因为点名模型会过早锁死、也不专业。我写的是一个\"约束盒子\"——部署是私有化还是云、成本上限是多少、需不需要长上下文或 function calling、要满足哪些合规、版本能不能自动升级。这个盒子自然收窄到几个可选模型，具体选哪个交给算法在 eval 上比。配套我会做能力映射，把\"做个助手\"拆成分类、摘要、抽取、检索这些离散任务，每个任务单独定质量门槛。这样模型换代了 PRD 不用重写，盒子和门槛还在。\n\n**Q5：写这么多评估、护栏、成本，会不会太重，把需求拖慢？**\nA：会有这个风险，所以要分场景定颗粒度，而不是每个功能都拉满。高风险场景——比如 SAGE 的政务取数、孤独症筛查——护栏和评估必须写厚，因为错一次代价很大。但 C 端轻量功能，我会抓重点：先把核心评估阈值、最关键的几条失败兜底、token 成本这三样写清楚，护栏按\"先覆盖 Top 几个高危拒答类别\"来，不追求一上来就滴水不漏。判断标准还是回到风险和可逆性。而且这些不是额外负担——把验收标准、成本、失败兜底想清楚，本来就是产品经理该替工程和算法挡在前面的事，省了后面返工。\n", "/02-AI产品方法论/05-幻觉与安全治理（产品侧）.md": "# 幻觉与安全治理：产品侧的护栏设计\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-05-guardrail.png\" alt=\"小黑配图：悬崖装真护栏\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义 / 电梯说法\n\n> 幻觉与安全治理，是给一个本质上\"会一本正经胡说、会被一句话骗走数据\"的概率系统，在产品侧装上一圈不可越线的护栏——用 RAG 接地、引用溯源、置信度兜底治幻觉，用权限限定、执行前审查、脱敏、审计治安全，并把安全指标设成\"破了就阻断发布、不论增长\"的红线。\n\n注意和第 01 章「幻觉的成因与评估」那篇的分工，别讲重了：那篇是**技术原理层**——幻觉为什么发生（模型按概率续写、训练数据噪声、检索-生成错配）、怎么量化评（事实一致性、忠实度、评测集）；这篇是**产品/安全治理层**——拿到那套诊断后，产品侧怎么把它治住、怎么把护栏立起来（治理组合拳、护栏工程栈、不可越线指标）。两篇是\"诊断\"和\"开方\"的关系，被同时问到时这么切：成因与评测引第 01 章，治理与护栏落本篇。\n\n## 直觉解释（类比）\n\n把 AI 产品想成一座**修在悬崖边的观景台**。\n\n观景台主体（模型能力）越来越漂亮，但悬崖（幻觉、越权、数据泄露、被注入攻击）一直在那。你不能因为护栏会挡住一点视野，就不装护栏——**护栏不是体验的减分项，是上桥的前提**。\n\n更关键的认知：护栏要装在**观景台外面的栏杆和地基上**，不能只写一张\"请勿靠近悬崖\"的告示牌贴在墙上。很多产品经理以为\"我在 system prompt 里写一句'不要泄露内部信息'就安全了\"——这就是那张告示牌，风一吹（一句精心构造的提问）就掉了。**真正的护栏是 LLM 之外的确定性系统**：权限校验、输入输出过滤、人工审批，这些不能交给一个概率模型自觉遵守。\n\n## 方法论框架\n\n### 第一套拳：幻觉治理的三层组合（接地 → 溯源 → 兜底）\n\n学界把幻觉治理方法归为三类——**检测型 / 预防型 / 纠正型**。落到产品上，是这样一条从\"少出错\"到\"出错也能兜住\"的链路：\n\n```mermaid\ngraph LR\n    classDef ground fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef cite fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef floor fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Q([\"用户提问\"]):::ground\n    R[(\"检索可信语料\")]:::ground\n    G[\"RAG 接地<br/>只许用 context 内内容\"]:::ground\n    C[\"引用溯源<br/>强制标注来源槽位\"]:::cite\n    T{\"置信度<br/>是否过阈值\"}:::floor\n    A[\"正常作答 + 引用\"]:::cite\n    F[\"兜底拒答<br/>证据不足就说不知道\"]:::floor\n    N[\"拒答不是失败<br/>是产品功能开关\"]:::note\n\n    Q ==> R ==> G ==> C ==> T\n    T ==>|过阈值| A\n    T ==>|不过阈值| F\n    F -.-> N\n```\n\n1. **RAG 接地（grounding）**：把生成约束在检索到的可信语料里，要求模型只引用 context 内的内容。这是预防型的主力。\n2. **引用溯源（citation）**：在 prompt 里留显式\"引用槽位\"，强制模型标注来源，让用户能自己核验——这是检测型，把核对成本转移给可核对的链路。\n3. **置信度兜底（confidence floor）**：检索得分弱时，助手必须回答\"我没有足够的证据\"，而不是硬编一个答案。这是纠正型的最后一道闸。\n\n**一个必须纠正的产品误解：RAG 不是万能药。** 检索失败、模型误读了检索到的文本、或者引用了正确事实但归因错位，照样会幻觉。所以三层要叠着用，不能指望\"上了 RAG 就不幻觉\"。\n\n### 第二套拳：安全治理的权威框架（OWASP Top 10 for LLM 2025）\n\n这是面试里能瞬间立住专业度的锚点。2025 版针对 agentic AI 的爆发做了重排，最该记住三条：\n\n- **LLM01 提示注入（Prompt Injection，连续两版排第一）**：根因是 LLM 把\"指令\"和\"数据\"放在同一个通道里、无法天然区分，攻击者构造的输入被当成新指令执行。分**直接注入**（用户直接改行为）和**间接注入**（网页、文件、邮件等外部内容里藏指令触发）。\n- **LLM02 敏感信息泄露**：PII、财务、专有逻辑被套出来。\n- **LLM07 系统提示泄露（2025 新增）**：真实事件证明 system prompt（含内部规则、过滤标准、权限结构）极易被提取。**永远不要把 system prompt 当密钥，更不能拿它做鉴权或权限隔离**——这些必须放在 LLM 之外的确定性系统里。\n\nOWASP 给的七条缓解措施，本身就是一张可抄的护栏 checklist：① system prompt 约束角色与边界 ② 校验输出格式 ③ 输入输出语义过滤 ④ 最小权限（限制 API token 能力）⑤ 高危操作需人工审批 ⑥ 隔离外部内容 ⑦ 持续红队对抗测试。一句话总纲：**外部护栏优于 prompt 内嵌**。\n\n### 护栏工程栈：现成的轮子有哪些\n\nPM 不必自己造护栏，但要知道市面上有什么、护栏该分几层。当前主流的全链路安全栈（从入口到出口）大致是：\n\n```mermaid\ngraph LR\n    classDef ingress fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef inline fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef llm fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef egress fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    I[\"入口脱敏<br/>剥离 PII\"]:::ingress\n    P[\"注入检测<br/>拦直接/间接注入\"]:::inline\n    D[\"对话策略编排<br/>四类 rail\"]:::inline\n    M([\"大模型生成\"]):::llm\n    O[\"输出内容分类<br/>有害内容拦截\"]:::egress\n    S[\"结构校验<br/>格式与字段合规\"]:::egress\n\n    I ==> P ==> D ==> M ==> O ==> S\n```\n\n其中 NVIDIA NeMo Guardrails 的 **rail 分层** 对 PM 设计护栏最有用：**input rails（管入参）/ output rails（管出参）/ dialog rails（管对话走向）/ retrieval rails（管检索内容）**，再加一道 **execution rails（管工具/动作执行）**——共五类。前四类是面试里最常被引用的，第五类 execution rails 正好对应\"高危动作执行前先拦一道\"，记住它能让你把 SAGE 的\"执行前审查\"直接挂到工业框架上（被追问时不慌）。配合 Meta Llama Guard 4（2025 年 4 月发布的 120 亿参数多模态内容安全分类器）、Prompt Guard 2（注入检测），以及 Amazon Bedrock Automated Reasoning 用形式化验证核对回答是否符合策略——把\"事实正确\"从概率变成可证明，这是 2025 治理前沿。谈\"治理体系\"时还可以引 NIST AI RMF 做背书。\n\n> 一句话记忆口诀：**入口脱敏 → 注入检测 → 对话编排 → 模型生成 → 输出分类 → 结构校验**，六个动作就是一条从入口到出口的护栏流水线，对着背就行。\n\n## 落到产品的取舍\n\n**取舍一：覆盖率 vs 安全——高风险场景，宁可拒答也不瞎说。** 兜底拒答会降低\"什么都能答\"的覆盖感，但在政务、医疗、金融这类场景，一个编造的错误答案带来的法律和品牌风险，远大于\"答不上来\"的体验损失。\n\n**取舍二：护栏强度 vs 体验流畅——拒答之后要给下一步。** 学界把这形式化为\"从拒答到恢复（Refusal to Recovery）\"：光拒答会伤体验，拒答后要给用户可行的下一步（转人工、换个问法、给相关线索），让护栏不至于变成死胡同。\n\n**取舍三：安全指标不参与增长权衡。** 这是本篇的立论核心——**把安全指标设成护栏指标（guardrail metrics），和增长指标分开放两块看板**。注入拦截率、PII 泄露率、有害内容逃逸率、无依据回答率，任一项破阈值就阻断发布，不能为了转化率、留存而让步。增长指标是\"越高越好、可以权衡\"的；护栏指标是\"破线即停、不许交易\"的红线。\n\n这里有个 C 端的现实依据——**Air Canada 聊天机器人案（Moffatt v. Air Canada, 2024 BCCRT 149）**：用户依据航司机器人关于丧亲票价的错误建议行事，加拿大 BC 省民事仲裁庭以\"过失性失实陈述\"判公司负责，共赔 812.02 加元（其中票差 650.88 加元，余为仲裁费），并明确驳回了航司\"聊天机器人是独立法律实体、自负其责\"的抗辩，认定\"官网信息无论来自静态页还是聊天机器人，公司都要负责\"。**ToS 里写一句\"AI 可能出错\"挡不住责任**。这就是\"安全是不可越线护栏\"的判例级证据（金额不大，但确立了责任归属的判例意义，面试引用时强调后者）。再叠加 **EchoLeak（CVE-2025-32711，CVSS 9.3）**——业界公认的首个生产级 LLM 系统零点击（zero-click）间接注入漏洞：攻击者只需给目标发一封邮件，把指令藏在页脚里，Microsoft 365 Copilot 读到就会自动把 SharePoint、OneDrive、Teams 里的数据外泄，全程不需要用户点任何东西。这证明攻击者无需用户配合就能套出数据，护栏这事没有侥幸空间。\n\n## 你简历里的 SAGE，就是教科书级的 AI 安全护栏\n\n这一节是你的**强项**，要敢于点名。\n\n你在 SAGE-AI 取数智能体里做的**四层安全策略——权限范围限定 + 执行前审查 + 结果脱敏 + 全程审计**，几乎是 OWASP 七条缓解措施的对号入座版：\n\n- **权限范围限定** = OWASP 的最小权限（LLM06 过度代理的解药），把 Text2SQL 能碰的库表权限卡死在 LLM 之外的确定性系统里——这正是\"安全逻辑不放 prompt 里\"的正确做法。\n- **执行前审查** = 高危操作人工/规则审批，对应 OWASP 的\"高危动作需 human-in-the-loop\"、也正是 NeMo 的 execution rails——生成的 SQL 先过审再执行，不让模型直接跑，从根上掐住 LLM06 过度自主（excessive autonomy）。\n- **结果脱敏** = LLM02 敏感信息泄露的护栏，对应全链路安全栈的 egress 出口脱敏。\n- **全程审计** = 可追溯、可复盘，是治理体系的地基，也是 NIST AI RMF 强调的\"可管理\"。\n\n加上你在杭小育把**幻觉率卡在安全基线下**——这就是护栏指标思维：政务育儿是高风险场景，幻觉率是红线，不论覆盖率怎么涨都不能破。你不是\"做过几个安全功能\"，你是**无意识地把护栏指标和分层治理都做对了**——面试要做的，是把它从\"我当时这么做了\"升级成\"我有一套护栏方法论\"。\n\n而你的**短板**也要心里有数：你的安全实操集中在 B/G 端（取数、政务），**通用 C 端 GenAI 的安全场景**（开放域闲聊的内容安全、UGC 注入、未成年人保护、舆情敏感词）接触少。被问到 C 端时，用 Air Canada 案 + OWASP 框架把\"原理我懂\"立住，再诚实说\"C 端开放域我会重点补内容安全分类和红队对抗\"。\n\n## 面试怎么说（30 秒口播话术）\n\n> \"AI 产品的安全，我拆成两套护栏。幻觉这边是'接地—溯源—兜底'三层：RAG 把回答接地到可信语料、引用溯源让用户能核对、置信度不够就兜底拒答——拒答是产品功能，不是 bug。安全这边我对着 OWASP Top 10 for LLM 来做，核心是一条原则：安全逻辑必须放在大模型之外的确定性系统里，绝不靠 system prompt 自觉，因为 system prompt 是会泄露的。最关键是我把安全指标设成护栏指标——注入拦截率、泄露率、无依据回答率这些，和增长指标分开看板，破阈值就阻断发布，不参与任何增长权衡。我在 SAGE 取数智能体里做的权限限定、执行前审查、结果脱敏、全程审计这四层，本质就是这套护栏的落地。\"\n\n## 可能的追问及答法\n\n**Q1：C 端 AI 产品怎么保证安全？**\nA：我会分三层答。第一层是输入侧：入口做 PII 脱敏和提示注入检测，尤其防间接注入——用户贴进来的网页、文件里可能藏指令，EchoLeak 那种零点击漏洞就是这么来的。第二层是模型侧：用内容安全分类器（像 Llama Guard 这类）过有害输出，开放域闲聊还要叠未成年人保护和敏感词。第三层是制度侧：把注入拦截率、有害内容逃逸率设成护栏指标，破线就阻断发布。C 端比 B 端更要命的是 Air Canada 那个判例——免责声明挡不住法律责任，所以安全在 C 端是红线不是体验项。\n\n**Q2：幻觉从产品侧怎么治理？**\nA：三层组合拳：RAG 接地把回答约束在检索语料里、引用溯源让用户能核对、置信度兜底——证据不足就拒答。但我要强调一个常被误解的点：RAG 不是万能药，检索失败、模型误读检索文本、或者归因错位照样幻觉，所以三层得叠着用。再往上是把\"无依据回答率\"做成可监控的护栏指标，持续盯。我在杭小育就是靠这套把准确率做到 97.5%，同时把幻觉率压在安全线下。\n\n**Q3：AI 会越权访问、泄露数据怎么防？**\nA：核心原则是最小权限 + 安全逻辑外置。绝不能把权限控制写进 system prompt，因为 system prompt 会泄露（OWASP 的 LLM07），泄露后权限结构就被看穿了。正确做法是把权限校验放在大模型之外的确定性系统里。我在 SAGE 就是这么做的：权限范围限定把能碰的库表卡死、执行前审查让生成的 SQL 先过审再跑、结果脱敏在出口剥敏感字段、全程审计留痕可追溯。高危操作一定要人工审批这道闸，不交给模型自己判断。\n\n**Q4：什么是护栏指标？和普通指标有什么区别？**\nA：普通增长指标，比如转化率、留存、采纳率，是\"越高越好、可以互相权衡\"的。护栏指标是\"破了就停、不许交易\"的红线——比如幻觉率、注入拦截率、PII 泄露率。区别在决策逻辑：增长指标参与 trade-off，护栏指标只有一个动作，破阈值就阻断发布。我会把它们放在两块独立看板上，避免有人拿\"这次能涨 5% 转化\"去换\"幻觉率破一点点线\"。安全不参与增长权衡，这是底线。\n\n**Q5：在 system prompt 里写好规则不就安全了吗？**\nA：这是最常见的误区。system prompt 有两个根本问题：一是它会泄露，OWASP 2025 专门新增了 LLM07 系统提示泄露，真实事件里内部规则、权限结构都被套出来过；二是它是概率约束，不是确定性强制，一句精心构造的注入就能绕过。所以行为约束必须由 LLM 之外的外部系统强制执行——外部护栏优于 prompt 内嵌。system prompt 可以用来设角色和语气，但绝不能当鉴权、当权限隔离、当密钥。\n\n**Q6：拒答太多会不会很伤体验？**\nA：会，所以拒答不能是死胡同。学界把这叫\"从拒答到恢复\"——拒答之后要给用户可行的下一步：转人工、换个问法、或者给相关线索。我的取舍逻辑是看场景风险：政务育儿、医疗这种高风险场景，宁可多拒答也不能瞎说，因为一个错误答案的代价远大于答不上来；开放域低风险场景可以把阈值放松、多答一点。关键是拒答率本身也要进看板监控，不能为了好看就偷偷调低阈值放幻觉过去。\n\n**Q7（容易被深挖的硬追问）：护栏指标的阈值到底怎么定？凭什么是这个数？**\nA：诚实说——阈值不是拍脑袋，是\"风险定级 + 数据校准 + 红队压测\"三步出来的。第一步按场景定级：高风险（医疗、政务、金融、未成年人）阈值卡到接近零容忍，低风险开放域可以宽。第二步用历史 badcase 数据反推：先离线跑评测集量出当前真实水位（比如无依据回答率现在 3%），再结合一次事故的代价（赔偿、合规处罚、品牌）定能接受的上限。第三步红队对抗持续压：注入拦截率这类对抗性指标，靠红队不断造新攻击样本来探真实逃逸率，阈值随攻击演化收紧。我在 SAGE 就是用标准化 badcase 闭环喂这条校准链路的——这也是为什么\"全程审计\"是地基，没有留痕就没有数据来定阈值。补一句：阈值定了不是一锤子，要随模型迭代、攻击手法、监管口径定期复校。\n", "/02-AI产品方法论/03-数据飞轮与冷启动.md": "# 数据飞轮与冷启动：AI 产品越用越好的护城河\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-03-flywheel.png\" alt=\"小黑配图：推数据飞轮\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义（电梯说法）\n\n**数据飞轮，就是让产品形成一个会自我加速的闭环：用户用得越多 → 产生越多真实反馈数据 → 这些数据回流去改进模型和检索 → 体验变得更好 → 吸引更多用户、沉淀更多数据。** 转一圈，产品就比上一圈更聪明一点；转得越多越快，对手越追不上。记住一句 2025–2026 行业越来越认的判断：\"**护城河不在于你拥有多少数据，而在于你能多快从拿到的数据里学习**\"（the moat is the speed at which you learn, not the data you own）。静态的数据资产会被复制，**持续学习的速度和用户给你的信任回路，复制不了**。\n\n<div class=\"anim\" data-anim=\"data-flywheel\"><\/div>\n\n## 直觉解释：磨刀石 vs 一次性工具\n\n把普通软件想成一把买来就定型的菜刀——出厂多锋利，用三年还是那么锋利，不会自己变好。\n\nAI 产品该是另一种东西：**一块越用越利的磨刀石**。每一次用户点踩、每一次重新提问、每一次放弃会话，都是在告诉产品\"这里钝了\"。如果你设计了回流机制，这些信号会自动被收集、归因、修复，下一个用户就用到了更锋利的版本。\n\n这就是\"飞轮\"这个词的精髓——**飞轮很重，从静止推到第一圈最费劲（这就是冷启动），但一旦转起来，每一圈都给下一圈续力，最后形成一个对手很难从外部硬推动的惯性。** 特斯拉 Autopilot 是教科书案例：每次司机接管或退出辅助驾驶，车辆都在悄悄记录这个边缘场景回流给神经网络——对手没有这几百万辆车在路上跑，就拿不到这些数据，这道护城河几乎不可复制。\n\n要警惕一个常见误区：**\"收集了用户数据\"不等于有飞轮**。行业里大量产品攒了一堆日志却从没转起来，差的就是\"行动层\"——把学到的东西真正变成模型/检索的改进。光收集不回流，那是仓库，不是飞轮。\n\n## 方法论框架：飞轮三要素 + MAPE 四步闭环\n\n一个真正转得起来的飞轮，必须同时具备三个要素，缺一个就是死轮子：\n\n1. **闭环反馈（closed feedback loop）**：反馈能采集、能回到系统里，不是单向流出。\n2. **领域专属信号（domain-specific signals）**：通用点赞不够，要采到你这个场景特有的\"对/错\"信号（育儿问答里\"家长是否追问了第二遍\"就是强信号）。\n3. **行动层（action layer）**：把学习实时或准实时变成模型/检索的更新——这是最多人漏掉、却最决定成败的一环。\n\n工程上怎么把这三要素落地？2026 年 NVIDIA 在自家 3 万员工内部知识助手 NVInfo 上跑通了一套可直接复用的 **MAPE 四步控制回路**，强烈建议背下来当方法论骨架：\n\n```mermaid\ngraph LR\n    classDef monitor fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef analyze fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef plan fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef execute fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    M((\"Monitor 监控<br/>显式+隐式信号\")):::monitor\n    A((\"Analyze 分析<br/>错误归因\")):::analyze\n    P((\"Plan 规划<br/>数据策展+策略\")):::plan\n    E((\"Execute 执行<br/>微调+分阶段部署\")):::execute\n\n    M ==> A ==> P ==> E\n    E ==>|更好体验<br/>引来更多用户| M\n\n    N[\"缺任意一步, 飞轮就停转\"]:::note\n    A -.-> N\n```\n\n- **Monitor 监控**：同时盯显式反馈（点赞点踩）和隐式信号（重新提问、会话放弃、停留时长）。\n- **Analyze 分析**：对反馈做**错误归因**——这一条到底错在路由、检索、重排、还是幻觉？归不了因，收了也白收。\n- **Plan 规划**：针对归因出来的失败模式，做有针对性的数据策展和微调策略。\n- **Execute 执行**：模型微调 + 渐进式分阶段部署，跑完一轮再回到 Monitor。\n\n这套方法论最反直觉、也最该讲给面试官听的硬数据：**NVInfo 服务 3 万多员工，3 个月只收集到 1224 条反馈（729 赞 / 495 踩），仅靠这 495 条负反馈，就把路由模型从 700 亿参数蒸馏到 80 亿参数（体积缩小 10 倍）、延迟降 70%，准确率还保持 96% 不掉；改写模块准确率从 73.8% 提到 77.5%。** 这一个案例同时击碎了两个误解：飞轮不需要海量数据才能转（几百条精准负反馈就够）；飞轮的产出不只是\"准一点\"，还能把又大又贵的模型蒸馏成又快又便宜的小模型。\n\n## 反馈采集设计：别指望点赞点踩\n\n这是 PM 最该想清楚、也最容易做错的一环。一个反直觉但极其重要的事实：**不到 1% 的交互会产生显式反馈**（用户基本不点赞不点踩）。如果你的飞轮设计只依赖点赞点踩，那它 99% 的时间是空转的。\n\n所以正确的采集策略是**两条腿走路，重仓隐式信号**：\n\n| 信号类型 | 具体形态 | 特点 |\n|---|---|---|\n| 显式 explicit | 点赞点踩、星级、主动纠错、采纳重写建议 | 信号强但覆盖率 <1%，稀缺 |\n| 隐式 implicit | 重新提问、会话放弃、复制答案、点击引用来源、停留时长 | 信号弱但海量，覆盖率高 |\n\n落地三原则：① **把隐式行为信号当一等公民来埋点**，而不是只做一个点踩按钮就收工；② **每条反馈都要能归因到具体失败模式**（路由/检索/重排/幻觉），否则回流无门；③ **显式与隐式互相印证**——用户重新问了三遍同一个问题，比一次点踩更能说明这答案没解决问题。\n\n## 冷启动怎么破：把飞轮从静止推到第一圈\n\n飞轮最难的是第一圈——这就是**冷启动悖论**：AI 需要用户交互产生的信号才能变好，但没变好之前又吸引不来用户产生交互。这是个先有鸡还是先有蛋的循环依赖。四把破局的钥匙，从易到难：\n\n```mermaid\ngraph TB\n    classDef rule fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef seed fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef syn fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef human fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    R[\"规则兜底<br/>用 if-else/知识库/决策树<br/>先把体验托到能用\"]:::rule\n    S[\"小数据起步<br/>专家给种子样本<br/>少量真实数据起跑\"]:::seed\n    Y[\"合成数据扩充<br/>LLM 造 query+标签<br/>把小数据集撑大\"]:::syn\n    H[\"专家标注+HITL<br/>LLM 预标注 人工校正<br/>保证 ground truth\"]:::human\n\n    R ==> S ==> Y ==> H\n    H ==>|有了第一批可用数据| Flywheel((\"飞轮起转\")):::seed\n\n    N[\"合成数据会引发 model collapse<br/>必须 HITL 把关\"]:::note\n    Y -.-> N\n```\n\n1. **规则兜底**：飞轮还没转时，用显式知识（规则、本体、决策树、人工知识库）先把体验托到\"能用\"，再让数据驱动逐步接管。这也是判断真伪 AI 需求的试金石——如果规则就能解决，那本就不该硬上 AI。\n2. **小数据起步**：让领域专家先给一批高质量\"种子样本\"，哪怕只有几百条，飞轮也能起跑（参见 NVInfo 495 条就够）。\n3. **合成数据扩充**：在种子样本基础上，用 LLM 自动造 query、造相关性标签，把有限的私有数据撑大。比如 Algolia 的做法：客户没有真实 query，就让系统从已有记录自动生成 query 和相关性标签，全程后台无人值守。\n4. **专家标注 + Human-in-the-Loop**：用 LLM 做预标注（公开评测里 **LLM 预标注与人工专家的一致率大致在 85%–94% 区间**，任务越规整越高），人工只做校正而非从零标——把领域专家当\"精度工具\"而非\"批量劳力\"。注意这是\"省成本\"不是\"零人工\"：一致率没到 100%，剩下的错标恰恰最需要专家兜。\n\n要平衡地讲一个风险，别单边鼓吹合成数据：**合成数据用过头会引发 model collapse（模型坍缩）**，越训越差，必须用 HITL review 把质量关，否则会污染你的 ground truth。\n\n## 反馈如何回流：闭环的最后一公里\n\n采集到的反馈，回流路径有两条，对 RAG 产品尤其要讲清第一条：\n\n- **回流到 RAG 检索链路**：把负反馈做错误归因 → 定位失败点（路由/改写/检索/重排/幻觉/引用，哪一环出错就修哪一环）→ 针对性补数据、微调 → 分阶段部署。这里你需要一块\"飞轮仪表盘\"来读 Analyze 这一步的结果——忠实度、上下文精确率、答案相关性、召回率这几个 RAG 评估指标各自怎么算、防幻觉为什么盯忠实度，属于技术原理，01 章《模型评估与幻觉》已经讲透，这里只用一句话定位：**它们是你给飞轮装的转速表，归因和回流靠读这些表来决定修哪一环，不是另起一套评估学**。\n- **回流到模型/对齐**：从反馈训练模型，常见四种形式——基于标签、基于奖励、基于示范、基于偏好对比（最后一种就是 RLHF 那一支）。人类反馈 + AI 反馈双源（RLHF / RLAIF）持续校准模型行为。对 PM 来说，这里要拎清的不是算法细节，而是一个判断：**反馈量小、失败模式清晰就走\"补数据 + 小模型微调\"（NVInfo 那条路），别一上来就动对齐——RLHF 成本高、周期长，是攒够偏好数据后的后手。**\n\n## 你简历里的\"Badcase 闭环\"就是数据飞轮的雏形\n\n这一节是你这章最该拔高的地方。你简历里那套 \"**埋点采集 → Badcase 捕获 → 归因复盘 → 迭代优化**\"，逐字对应的就是 MAPE 四步：埋点采集 = Monitor，Badcase 捕获 + 归因复盘 = Analyze，迭代优化 = Plan + Execute。**你不是\"做过一个 Badcase 流程\"，你是\"设计并跑通了一套数据飞轮\"——这是护城河级别的能力，措辞一升级，分量完全不同。**\n\n三个项目逐个对号入座，帮你把零散实操串成体系：\n\n- **杭小育**：460W 累计用户、日活 21.5W（讲的时候把口径说清——是累计注册和 DAU，不是 MAU，免得被追问时露怯）的真实流量本身就是飞轮的燃料；检索覆盖率 +34%、准确率 97.5%，正是\"反馈回流到 RAG 检索链路\"持续优化的结果；CAG 缓存降本 80%，则是飞轮\"把高频稳定问答沉淀下来省算力\"的副产物。这就是你的**强项**——你手里有大多数候选人没有的东西：一个真在转的 C 端飞轮。\n- **SAGE-AI 取数**：**Badcase 标准化闭环**是你飞轮方法论最硬的证据；采纳率 97.5% 是闭环奏效的量化结果；推理链路可视化则同时在采集\"用户信任与否\"这个领域专属隐式信号。\n- **浙江孤独症筛查**：投诉率降 85%，背后是医学量表数字化后持续根据专家反馈迭代——这是\"专家标注 + HITL\"破冷启动的现实样本。\n\n要补的**短板**也直说：你的飞轮经验偏垂直（健康/政务），通用 C 端的商业化飞轮你接触少。面试时主动把这点补上——讲清\"数据飞轮转得好，留存和单用户价值才立得住\"，把技术飞轮和商业飞轮接上，才显得你有通用 C 端 sense（见下方追问 Q4）。\n\n## 面试怎么说（30 秒口播）\n\n> \"AI 产品和传统软件最大的不同，是它能越用越好——我把这套叫数据飞轮：用户用得越多产生越多真实反馈，反馈回流去改进模型和检索，体验变好又吸引更多用户。它的护城河不是你攒了多少数据，而是你从数据里学习的速度，以及用户给你的信任回路，这两样对手复制不了。我自己在 SAGE 取数项目里跑通过一套 Badcase 闭环——埋点采集、Badcase 捕获、归因复盘、迭代优化，正好对应业界讲的 Monitor-Analyze-Plan-Execute 四步。一个关键经验是：别指望点赞点踩，显式反馈覆盖率不到 1%，真正的主力是重新提问、会话放弃这些隐式行为信号。\"\n\n## 可能的追问及答法\n\n**Q1：AI 产品的护城河到底是什么？**\n不是模型——基座模型大家都能调 API，不是壁垒；也不是静态数据——数据会被买、被爬、被复制。真正的护城河是**数据飞轮：一个在你产品里持续转动、把用户反馈变成体验改进的闭环**。它复制不了，因为对手能复制你的数据快照，却复制不了\"你用户此刻正在产生的、且只回流给你的反馈\"，更复制不了用户在你身上积累的信任。行业共识已经从\"谁数据多\"转向\"谁学得快\"——护城河是学习速度，不是数据存量。配合垂直领域的专属信号和用户信任，三者叠起来才是真壁垒。\n\n> 追问\"大厂资源多、学得也快，飞轮护城河还成立吗？\"——成立，但护城河的形态不同。大厂赢在通用域的规模飞轮；垂直/专属场景里，护城河来自**领域专属信号 + 数据可及性**：育儿、医疗这种高敏域的真实反馈和专家标注，不是有钱有模型就能拿到的，得有合规资质、机构关系、用户信任才采得到。我做杭小育、孤独症筛查的价值正在这——**我手里的飞轮燃料，是大厂用通用打法短期内灌不进来的**。\n\n**Q2：怎么让产品越用越好？是不是数据多了自然就好？**\n不会自然变好，**数据多只是燃料，没有回流机制就是一堆躺在数据库里的日志**。要让它越用越好，得搭一条闭环：先把显式和隐式反馈都采上来（重点采隐式，显式覆盖率不到 1%）；再对反馈做错误归因，定位到底错在路由还是检索还是幻觉；然后针对失败模式补数据、微调；最后分阶段灰度上线，跑完一轮再循环。NVIDIA 那个案例很说明问题——3 个月就 495 条负反馈，靠归因精准，把路由模型缩到十分之一大小、延迟降 70% 还不掉准确率。所以关键不是数据量，是**归因的精度和回流的闭环**。\n\n**Q3：数据飞轮怎么从 0 转起来？冷启动没数据怎么办？**\n四步推：①先用**规则兜底**，规则、知识库、决策树把体验托到能用，别让冷启动期的用户直接被劝退；②让领域专家给一批**种子样本**，几百条就能起跑；③用 **LLM 造合成数据**把种子样本撑大——没有真实 query 就让系统自动生成 query 和标签（Algolia 在搜索冷启动里就这么干，全程后台无人值守）；④**LLM 预标注 + 人工校正**，LLM 和人工专家的一致率大致 85%–94%，专家只做校验不从零干，省成本——但一致率不到 100%，剩下的错标得专家兜。合成数据有两个坑要主动点出来：一是**用过头会 model collapse**，越训越差，必须有 HITL 把关；二是**合成 query 会复制造它那个模型的偏见**，覆盖不到真实用户的长尾问法，所以它只是\"撑过第一圈\"，真实反馈一接上就要尽快把权重让给真实数据。\n\n落到我自己：杭小育冷启动靠的就是这套——先用政务育儿的权威知识库 + 规则兜底把\"能用\"托住，再用专家整理的高频育儿问答做种子，真实流量进来后立刻切到 Badcase 驱动；孤独症筛查则是国家级课题里专家把医学量表数字化、给足 ground truth 种子，本质是\"重专家标注、轻合成\"的破法——这两个场景告诉我：**冷启动没有银弹，规则兜底 + 专家种子是地基，合成数据是放大器，真实反馈才是终局，四步该用哪几步看你这个域的专家知识有多稠密。**\n\n**Q4：飞轮转得好，对 C 端的留存和商业化有什么用？（这题补你的通用 C 端 sense）**\n非常关键。2026 年 RevenueCat《订阅应用现状》报告（口径：覆盖 11.5 万+ 应用、160 亿美元营收的订阅类 App，是订阅留存不是 MAU 留存）有个\"留存悖论\"：AI 应用转化好但留存差——**订阅满一年的留存率 21.1% vs 非 AI 30.7%**（流失快约 30%），但**每付费用户全年收入高约 41%**（30.16 vs 21.37 美元/付费用户），结论是\"AI 卖得动但留不住\"。**为什么留不住？很多就是因为产品不会越用越好——用户三个月后发现它还是开通时那个水平，自然就走了。** 数据飞轮恰恰是治留存的药：让产品对老用户越来越懂、越来越准，制造\"换一个产品就得重新调教\"的迁移成本。再叠加 a16z 2026 讲的趋势——消费级 AI 正从\"Help Me\"转向\"See Me\"，从服务\"平均用户\"转向超个性化，**而个性化的燃料正是这个用户在你产品里沉淀的飞轮数据**。所以技术飞轮和商业飞轮是一回事：飞轮 → 体验变好 + 越来越懂你 → 留存上来 + 迁移成本变高 → 付费和 LTV 才立得住。\n\n**Q5：什么样的需求才值得搭飞轮？（真伪 AI 需求 × 飞轮）**\n真伪 AI 需求的判断标准（规则模糊 / 动态演进 / 海量变量 / 依赖人类经验 = 真，if-else 能搞定 = 伪）我在《AI 产品 vs 传统产品》那章已经展开讲过，这里只接飞轮的角度回答：**只有真 AI 需求才值得搭飞轮**。因为真 AI 需求的\"对错\"无法穷举成规则、只能靠持续反馈逼近，飞轮才有转的意义；伪需求场景规则本身就是最优解，再搭一套采集-归因-回流是杀鸡用牛刀，徒增成本和不确定性。反过来也成立——**判断一个 AI 功能是不是伪需求，可以问一句\"它有飞轮可转吗\"：如果反馈回流不会让它变好（因为它本就该是确定性逻辑），那这个 AI 大概率不该上。**\n\n**Q6：飞轮采反馈，隐私和合规怎么平衡？尤其你做的是政务和医疗。**\n这恰恰是我做垂直 C 端/G 端的优势——合规这根弦一直绷着。几个抓手：①隐式信号尽量采**行为而非内容**（采\"是否重新提问\"而非问题原文），降低敏感信息留存；②回流前做**脱敏**，我在 SAGE 项目里就有脱敏 + 权限分层 + 执行前审查 + 全程审计这套；③标注环节用 HITL 时，专家只看脱敏后的样本；④给用户明确的反馈授权和退出机制。合规不是飞轮的对立面——在政务医疗这种高敏场景把合规做扎实，本身就是别人难以逾越的护城河，这也是我从垂直领域带出来的、能复用到通用 C 端的能力。\n", "/02-AI产品方法论/02-概率性产品的体验设计.md": "# 概率性产品的体验设计：在不确定性里做交互\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-02-probabilistic-ux.png\" alt=\"小黑配图：可改的铅笔草稿\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义（电梯说法）\n\n传统产品的体验是确定的——点这个按钮，必然弹那个窗；AI 产品的体验是概率的——同样一句话，模型这次答对、下次可能答错、再下次答个似是而非。**概率性产品的体验设计，就是承认\"模型一定会出错\"这个前提，然后用交互手段，让用户在享受自动化的同时，随时能看穿它、接管它、纠正它。** 核心一句话：好的 AI 体验不是把出错率压到零（做不到），而是让出错\"可被发现、可被兜住、可被纠正\"。\n\n## 直觉解释：从\"自动门\"到\"副驾驶\"\n\n传统产品像一扇**自动门**：你走近，它开；你离开，它关。逻辑是 `if 有人 → 开门`，确定、可预测，没人会怀疑它\"心情不好今天不开\"。\n\nAI 产品像一个**新手副驾驶**：大部分时候开得又快又稳，但偶尔会把\"停\"看成\"行\"。你不会因为它偶尔失误就把它赶下车——前提是，**你手里得有方向盘，脚下得有刹车，而且它得在快要犯错时给你打个招呼**。\n\n确定性产品设计的是\"门怎么开\"；概率性产品设计的是\"人和一个会犯错的智能体如何共处\"。这是两种完全不同的设计哲学。业界有个精准的说法：为 AI 做设计，像是\"没有控制权的 UX（UX without control）\"。而设计的目标，就是把这份失控感，重新还给用户一部分掌控感。\n\n> 一条贯穿全文的原则：**移除用户掌控感（agency）的系统让人觉得\"有风险\"，邀请用户协作的系统才让人觉得\"可信\"。**\n\n> **和\"评估与幻觉\"那篇怎么分工**（被追问时主动说清，避免显得重复）：01 章「评估与幻觉」讲的是**技术治理层**——幻觉为什么发生、怎么用 RAG / 微调 / 评估体系把错误率从源头压下去；本篇讲的是**体验交互层**——错误率永远压不到零，那么**在 UI 上**怎么让用户发现它、兜住它、纠正它。一句话：上一篇管\"怎么让模型少出错\"，这一篇管\"模型出错了，界面怎么不让用户翻车\"。同一个\"引用溯源\"，在上一篇是降幻觉手段，在这一篇是信任交互——视角不同，不是重复。\n\n## 方法论框架：用\"时间线\"组织体验\n\n最权威的骨架是微软 2019 年 CHI 论文提出的《Guidelines for Human-AI Interaction》（业界简称 HAX，18 条准则），它把人和 AI 的交互按**时间线**切成四段。我把它和落地手段揉成下面这张图——这就是我做概率性产品体验的总框架。\n\n```mermaid\ngraph TB\n    classDef phase fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef method fill:#2B6CB0,stroke:#1E5090,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph S1[\"交互前：设定预期\"]\n        A1(讲清能做什么):::method\n        A2(讲清做得多好):::method\n    end\n    subgraph S2[\"交互中：让用户看懂、可控\"]\n        B1(置信度展示):::method\n        B2(引用溯源):::method\n        B3(流式输出与等待):::method\n        B4(置信不足时澄清反问):::method\n    end\n    subgraph S3[\"出错时：兜住、可纠\"]\n        C1(可编辑可纠错):::method\n        C2(优雅降级与兜底):::method\n        C3(拿不准时缩小服务范围):::method\n    end\n    subgraph S4[\"长期：学习与控制权\"]\n        D1(从行为中学习):::method\n        D2(给用户全局方向盘):::method\n        D3(数据飞轮):::method\n    end\n\n    S1 ==> S2 ==> S3 ==> S4\n    N[\"核心：让用户既能享受自动化，又随时能接管纠偏\"]:::note\n    S3 -.-> N\n```\n\n下面拆开讲每一段的关键手段。\n\n### 一、交互前——预期管理（别让用户以为它无所不能）\n\n用户对 AI 的信任崩塌，往往不是因为它错了，而是因为它**在用户以为它不会错的地方错了**。所以第一件事是把能力边界讲在前面：这个功能擅长什么、不擅长什么、什么场景请人工复核。入口处一句\"AI 生成内容仅供参考\"不是免责声明走过场，而是把用户的心理预期从\"标准答案\"调成\"高质量草稿\"。**预期对齐了，同样的错误，体感伤害小一个量级。**\n\n### 二、交互中——让用户看懂、可控\n\n这是概率性产品最密集的设计区，四个抓手：\n\n1. **置信度展示（Confidence UI）。** 四种落地法：数值分数（\"我有 85% 把握\"）、视觉指示（红黄绿色阶 / 进度条 / 字重）、低置信时主动给替代选项、以及显式说明\"我为什么不确定\"。\n2. **引用溯源。** 把答案的来源摊在用户面前——内联来源链接、引用卡片、hover 看推理依据。这是\"高质量草稿\"能被信任的物质基础：用户不必信你这句话，他能点开看出处自己判断。\n3. **流式输出与等待体验。** 把\"一长段空白等待\"转成\"持续可感知的进度\"。ChatGPT 逐字吐字、Perplexity 边搜边把引用列出来，本质都是用流式把焦虑稀释掉——让用户感觉\"它在为我工作\"，而不是\"它卡死了没\"。\n4. **置信不足时澄清反问。** 不确定就别锁死一个答案，反问消歧：\"你说的是法国巴黎，还是美国得州的巴黎？\" 一次反问，胜过十次自信地答错。\n\n### 三、出错时——兜住、可纠（最考验功力）\n\n模型一定会错，这一段决定产品翻不翻车：\n\n- **可编辑可纠错。** \"可编辑性（editability）\"是被反复验证的**强信任信号**——让用户能 review、能改、能推翻 AI 的输出，比单纯甩一个置信度数字更能建立信任：前者给的是真实掌控权，后者只是一个让用户自己消化的数字。AI 出草稿，人做决策。\n- **优雅降级与兜底（Fallback）。** 五种模式：给清晰的错误信息 + 替代路径、引导用户改写或换种方式浏览、留人工升级通道、诚实承认\"部分成功\"、把这次失败喂回系统去改进。\n- **拿不准时缩小服务范围（scope service when in doubt）。** 这是 HAX 里降级兜底的祖训：与其勉强给一个可能错的完整答案，不如缩小到一个有把握的小范围。**宁可少答、拒答，也不要自信地答错。**\n\n### 四、长期——控制权与数据飞轮\n\n- 把可逆动作（生成草稿、改内部状态）和不可逆动作（发送、下单、删除）分级：可逆的让 AI 直接做、留可回滚日志；**不可逆的才设审批闸**。人不该是\"每个动作的看门人\"，而是把监督嵌进工作流，只在高风险节点保留决策权。\n- 给用户一个**全局方向盘**：随时能关掉某项 AI、能撤销、能调偏好。\n- 用户的纠错行为本身就是数据——喂回去形成**数据飞轮**，让模型越用越准。这是 AI 产品长期的护城河。\n\n## 落到产品的取舍：三个反直觉点\n\n做这套体系，有三个地方最容易想当然，恰好也是和面试官拉开差距的点：\n\n1. **别把置信度数值当真理。** 2026 年的最新警告是：你拿来做阈值的那个\"置信度\"本身就不可信——经过 RLHF 训练的模型存在系统性\"误校准\"，**模型口头表达的最高自信，往往恰恰对应它答错的时候**。所以不能只靠\"低于 X% 就降级\"的简单阈值，必须叠加外部校验和溯源。\n2. **别让 AI 包办整屏。** NN/g 连续两年的评测结论：窄而专的工具（改一句文案、重命名图层、总结一段笔记）真省时间；\"帮我设计整个页面\"这种大包大揽的工具普遍令人失望——它会忽略流程、边界 case 和各种约束。**克制 > 奇观，AI 做草稿、人做决策。**\n3. **\"承认不确定\"是加分项不是减分项。** 哥伦比亚大学 Tow Center 2025 年 3 月的研究，对 8 个生成式搜索工具各测 200 条、合计 1600 次查询：整体超过 **60% 的回答给了错误引用**，Perplexity 最低也有 37%，ChatGPT Search 错 67%（200 题错 134 题），Grok-3 高达 94%。最扎心的细节是——ChatGPT 那 134 个错误回答里，**只有 15 个用了\"我不太确定\"这类含糊措辞，其余全是斩钉截铁地答错**。研究的结论是：这些工具的通病是用\"盲目自信\"的口吻掩盖不确定性。所以反过来，**敢于暴露 AI 的可错性，本身就是一种信任设计**。\n\n## 简历回链：你做的这些，就是概率性体验设计\n\n你做过的东西已经把这套方法论实践得很到位，只是过去没把它讲成\"原则\"。回链一下：\n\n- **SAGE-AI 取数的\"推理链路可视化\"**——这就是上面说的\"引用溯源 + 推理过程渐进式披露\"。Text2SQL 这种高风险场景，用户凭什么信一句自动生成的 SQL？因为你把它怎么推出来的、查了哪些表、用了什么口径，全摊开给用户看。这直接把采纳率做到了 97.5%。\n- **SAGE 的\"SQL 可审、可改 + 执行前审查\"**——这就是\"可编辑可纠错 + 不可逆动作设审批闸\"。你没让 AI 直接执行，而是把生成和执行拆成两步，人在中间保留决策权。这是 HITL 设计的标准答案。\n- **杭小育的\"兜底拒答 + 准确率 97.5%\"**——这就是\"拿不准时缩小服务范围\"。政务育儿问答，宁可拒答也不能编，你做了拒答兜底，这正是 scope service when in doubt 的祖训。\n- **Badcase 标准化闭环**——这就是\"失败喂回系统 + 数据飞轮\"。\n\n**把这些串起来，你就不是\"做过几个功能\"，而是\"有一套面对不确定性的体验设计方法论\"。** 这恰好补足你\"讲不成体系\"的短板——同样的实操，换种讲法，量级完全不同。\n\n**强项（敢主动展开）**：高风险场景下的信任设计你是真做过的——推理链路可视化、执行前审查、兜底拒答，这些是 B/G 端高风险产品里最硬的体验功夫，比一般 C 端候选人\"做过聊天框 UI\"扎实得多。被问到\"怎么让用户信会犯错的 AI\"，这就是你的主场。\n\n**弱项（提前想好怎么接）**：① 你的体验设计经验集中在**政务 / 医疗这类高风险垂直场景**，那里的默认基调是\"宁可拒答也不出错、控制权交给用户\"；但**通用 C 端娱乐 / 工具场景**（如 AI 写作、AI 陪伴）的体验权衡不一样——那里更要在\"自动化爽感\"和\"控制权\"之间偏向前者，拒答太多反而劝退用户。被追问\"你这套在抖音这种 C 端能直接用吗\"，**别硬撑说能**，要答：原则一致（让错误可发现、可纠正），但**阈值要重调**——低风险场景把控制权折叠进渐进式披露、默认让 AI 多做一点，把\"方向盘\"做成随手可得而非时时挡路（见 Q6）。② 通用 C 端的留存 / 商业化 sense 偏弱，这块走 01 章商业化部分补，面试里不主动往这个方向引。承认边界本身就是这一篇的核心论点——用在自己身上同样成立。\n\n## 面试怎么说（30 秒口播）\n\n> \"AI 产品和传统产品最大的体验差异，是从确定性变成了概率性——模型一定会出错，所以体验设计的目标不是把错误压到零，而是让错误可被发现、可被兜住、可被纠正。我一般按交互时间线来设计：交互前管理预期，把它定位成高质量草稿而不是标准答案；交互中做置信度展示、引用溯源和流式输出，让用户看得懂；出错时给可编辑、可降级、可拒答的兜底；长期上把可逆和不可逆动作分级，给用户全局方向盘。我在 SAGE 取数里做的推理链路可视化和 SQL 可审可改，在杭小育做的兜底拒答，本质都是这套原则——让用户既能享受自动化，又随时能接管纠偏。\"\n\n## 可能的追问及答法\n\n**Q1：模型一定会出错，产品到底怎么设计才不翻车？**\nA：三道防线。第一道是预期管理，提前把它定位成草稿，降低出错的体感伤害；第二道是过程透明，置信度 + 溯源 + 流式，让用户在错误酿成后果前就能发现；第三道是兜底，可编辑、可降级、可拒答，并且把不可逆动作（发送、下单）拦在审批闸后面。翻车几乎都发生在\"用户没预期 + 过程黑盒 + 错误直接生效\"三者叠加时，把任意一道防线做实，就不会翻车。\n\n**Q2：怎么让用户信任一个会犯错的 AI？**\nA：反直觉的答案是——**靠暴露它的可错性，而不是掩盖**。Tow Center 的研究证明，\"盲目自信\"恰恰是 AI 搜索最大的信任杀手。所以我会做三件事：一是溯源，让用户能自己核验，不必信我的结论只需信我给的出处；二是置信度展示，该说\"我不太确定\"就说；三是可编辑，让用户能改、能推翻——给真实掌控权比给一个置信度数字更能建立信任。信任不是来自\"它从不犯错\"，而是来自\"它犯错时我能看见、能兜住\"。\n\n**Q3：AI 答错了，体验上具体怎么兜？**\nA：分场景。低风险场景（内容推荐、文案草稿）——给替代选项、让用户一键重试或编辑，把纠错成本降到最低。高风险场景（取数、医疗、政务）——拿不准时缩小服务范围甚至拒答，绝不勉强给完整答案；同时把不可逆动作设审批闸，错了也只错在\"建议\"层面，不会直接造成后果。所有兜底都要做\"承认 + 路径\"：诚实承认这次没做好，并立刻给用户下一步该怎么办，而不是甩一个冷冰冰的报错。\n\n**Q4：置信度低于某个阈值就降级，这套阈值兜底靠谱吗？**\nA：方向对，但不能只靠它。有个重要发现：RLHF 训练出来的模型存在系统性\"误校准\"，模型嘴上最自信的时候，反而常常是它答错的时候。**为什么会这样**——RLHF 用人类偏好训奖励模型，而人类打分时天然偏爱\"语气笃定、读起来更可信\"的回答，于是奖励模型把\"自信的措辞\"和\"答得好\"绑在了一起，模型就学会了无论对错都把话说满。所以单纯\"低于 X% 就降级\"会漏掉一大批\"自信的错误\"。我的做法是把模型自报的置信度，叠加**外部校验**——比如溯源结果能不能对得上、关键字段做规则校验、高风险动作强制人工复核。置信度是信号之一，不是唯一裁判。这也是为什么我在 SAGE 取数里不靠模型自评，而是把生成的 SQL 摊开让用户和规则一起验。\n\n**Q5：流式输出只是个动画效果，有那么重要吗？**\nA：它不是装饰，是**等待焦虑的解法**。概率性产品天然要花时间思考、检索、生成，这段等待如果是一片空白，用户会怀疑\"是不是卡死了\"。流式把\"长等待\"转成\"持续可感知的进度\"——逐字吐字让用户感到它在工作，边搜边显引用让用户提前看到证据在累积。它降低的是不确定性带来的心理成本，这对概率性产品恰恰是刚需。\n\n**Q6：给用户太多控制权（一堆置信度、溯源、编辑入口），会不会反而让产品变复杂、变笨重？**\nA：会，所以要用渐进式披露（progressive disclosure）。默认界面保持干净，把溯源、推理过程、置信度细节折叠在\"展开看详情\"后面——低风险场景用户不看也不影响，高风险场景或用户起疑时一点就能展开。控制权要\"随手可得但不挡路\"。这也呼应 NN/g 的结论：体验好的 AI 是窄而克制的，不是把所有能力和信息一股脑铺在用户脸上。\n\n---\n\n**信源**：\n\n- [Microsoft HAX Toolkit · Guidelines for Human-AI Interaction](https://www.microsoft.com/en-us/haxtoolkit/ai-guidelines/)（CHI 2019，18 条准则，按\"初次交互 / 交互中 / 系统出错时 / 长期\"四阶段组织，即本文时间线框架的出处）。\n- [Tow Center / Nieman Lab：AI 搜索引用准确性研究](https://www.niemanlab.org/2025/03/ai-search-engines-fail-to-produce-accurate-citations-in-over-60-of-tests-according-to-new-tow-center-study/)（2025-03，8 个工具各测 200 题、合计 1600 次查询。口径：整体错误引用 60%+ / Perplexity 37% / ChatGPT Search 67%＝200 题错 134 题、其中仅 15 题用了含糊措辞 / Grok-3 94%）。\n- RLHF\"误校准 / 口头过度自信\"：[Taming Overconfidence in LLMs: Reward Calibration in RLHF](https://arxiv.org/abs/2410.09724)（arXiv 2410.09724）及 2026 年关于 verbalized confidence 膨胀的后续研究。\n- NN/g \"窄而专 > 大包大揽\"：[Scope in Generative AI Features](https://www.nngroup.com/articles/scope-ai-features/) 与 [AI Design Tools Are Marginally Better: Status Update](https://www.nngroup.com/articles/ai-design-tools-update-2/)（窄范围 AI 功能被真实采纳、省时间；生成整页 / 整套设计的工具仍普遍令人失望）。可逆性分级、渐进式披露等观点综合自 HITL 设计实践，具体数字以原始研究为准。\n", "/docsify/README.md": "# AI 产品经理面试备战\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/cover.png\" alt=\"小黑配图：背着备战包闯关 offer\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n> 大厂 C 端 AI 应用方向 · 系统化面试备战 —— 为你量身定制\n\n一套从 AI 原理打底、到产品方法论、到主流产品拆解、再到把你自己的项目讲成打动面试官的故事的完整备战包。不是知识堆砌，而是「认知升级 + 可临场套用的答题框架 + 个人故事改造」的一体化体系。**全站 8 章 60 篇、约 1 万行，全部完成。**\n\n## 看什么 / 给谁 / 怎么用\n\n- **看什么**：8 大模块，从大模型原理到模拟面试与临场速记。\n- **给谁**：传统 / 转型 PM 冲刺大厂 C 端 AI 产品岗。\n- **怎么用**：先补认知（01 / 02），再扩行业 sense（03），再练表达与讲故事（04 / 05 / 06），临场看 07；总览 00 随时回看。新手先读 [使用指南](00-总览/01-使用指南.md) 和 [30 天复习计划](00-总览/04-30天复习计划.md)。\n\n## 模块导航\n\n| 模块 | 内容 |\n|------|------|\n| [00 · 总览](00-总览/01-使用指南.md) | 使用指南 · 考核维度地图 · 候选人提分策略 · 30 天计划 |\n| [01 · AI 技术速通](01-AI技术速通/01-大模型本质.md) | PM 视角讲透大模型 / RAG / Agent / 评估 / 成本（12 篇） |\n| [02 · AI 产品方法论](02-AI产品方法论/01-AI产品vs传统产品.md) | 概率性产品 / 数据飞轮 / 评估驱动 / 商业化（10 篇） |\n| [03 · 案例库](03-案例库/01-ChatGPT.md) | 豆包 / Kimi / DeepSeek / Cursor 等深度拆解（10 篇） |\n| [04 · 高频题与答题框架](04-高频题与答题框架/01-设计题万能框架.md) | 设计题 / 评估题 / 估算题框架 + 四类高频题（9 篇） |\n| [05 · 模拟面试](05-模拟面试/01-一面专业面.md) | 一面 / 二面 / HR 面 / 设计题实战（4 篇） |\n| [06 · 个人经历改造](06-个人经历改造/01-STAR与AI语言改造法.md) | 三个项目 STAR 改造 + 深度追问预案（7 篇，差异化核心） |\n| [07 · 临场速记与热点](07-临场速记与热点/01-前一天cheatsheet.md) | 一页纸 cheatsheet + 2026 行业热点（4 篇） |\n\n## 怎么读本站\n\n- 按 **⌘K / Ctrl+K** 全文搜索任意概念。\n- 左下角 **齿轮** 调阅读设置（深浅色 · 字号 · 正文宽度 · 目录密度）。\n- 面试临近时重点过 [前一天 cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md) 与 [深度追问预案](06-个人经历改造/05-深度追问预案.md)。\n", "/docsify/_coverpage.md": "<canvas id=\"cover-canvas\"><\/canvas>\n\n# AI 产品经理面试备战\n\n> 大厂 C 端 AI 应用方向 · 系统化面试备战\n>\n> **从 AI 原理到答题框架到个人故事，一套打到 offer 的备战包**\n\n<span class=\"pill hot\">C 端 AI 产品<\/span> <span class=\"pill\">技术速通<\/span> <span class=\"pill\">产品方法论<\/span> <span class=\"pill\">案例库<\/span> <span class=\"pill\">模拟与追问<\/span>\n\n<p class=\"cover-actions\">\n  <a class=\"cover-btn cover-btn-primary\" href=\"#/docsify/README\">开始阅读 →<\/a>\n  <a class=\"cover-btn\" href=\"#/01-AI技术速通/06-RAG检索增强\">RAG 检索增强 →<\/a>\n<\/p>\n", "/docsify/_sidebar.md": "- 开始\n  - [文档首页](docsify/README.md)\n- 00 · 总览\n  - [使用指南](00-总览/01-使用指南.md)\n  - [大厂 AI
