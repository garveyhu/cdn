.md)\n- 05 · 模拟面试\n  - [一面（专业面）模拟](05-模拟面试/01-一面专业面.md)\n  - [二面（交叉 / 总监面）模拟](05-模拟面试/02-二面交叉总监面.md)\n  - [HR 与行为面模拟](05-模拟面试/03-HR与行为面.md)\n  - [完整设计题实战](05-模拟面试/04-设计题实战.md)\n- 06 · 个人经历改造\n  - [STAR 框架 + AI 产品语言改造法](06-个人经历改造/01-STAR与AI语言改造法.md)\n  - [项目1 ·「杭小育」智能体（C 端 RAG 旗舰，主打这个）](06-个人经历改造/02-项目1-杭小育.md)\n  - [项目改造·孤独症筛查（B/G 端民生，诚实定位）](06-个人经历改造/03-项目2-孤独症筛查.md)\n  - [项目改造 · SAGE-AI 取数（Text2SQL Agent，AI 主场）](06-个人经历改造/04-项目3-SAGE取数.md)\n  - [深度追问预案](06-个人经历改造/05-深度追问预案.md)\n  - [数据闭环与指标包装](06-个人经历改造/06-数据闭环与指标包装.md)\n  - [自我介绍脚本](06-个人经历改造/07-自我介绍脚本.md)\n- 07 · 临场速记与热点\n  - [面试前一天 Cheatsheet](07-临场速记与热点/01-前一天cheatsheet.md)\n  - [面试当天](07-临场速记与热点/02-当天30分钟速记.md)\n  - [2026 AI 行业热点速递](07-临场速记与热点/03-2026行业热点速递.md)\n  - [常见忌语与雷区](07-临场速记与热点/04-常见忌语与雷区.md)\n", "/04-高频题与答题框架/08-反问环节话术.md": "# 反问环节：问什么显得专业、有思考\n\n面试最后那句\"你有什么想问我的吗\"，不是客套，是面试的最后一道题。很多面试官会把这一轮当作判断\"候选人到底想不想来、有没有产品 sense\"的隐性观察点。你张口一句\"暂时没有了\"，传递的信号是\"我没那么在意这家公司\"——前面答得再好，也会被这句话削掉一截好感。\n\n对你尤其重要：你功底深但容易被人觉得\"不成体系、通用 sense 偏弱\"。反问环节是整场面试里唯一由你主导节奏、能反向展示产品 sense 的窗口——问对一个问题，往往比多答对一道题更能扭转印象。这一篇给你一套可临场套用的打法。\n\n## 一、先想清楚加分逻辑\n\n反问加分的本质就一句话：**产品经理的本职是\"好奇 + 会提问\"，反问环节让面试官直接看到你的思考方式。** 大多数候选人只准备答题、忽略提问；而\"只有想清楚了的人才问得出来\"的问题，本身就在展示你的战略思维、跨职能协作意识、以及你对\"什么叫成功\"的理解。\n\n四条要记牢的原则：\n\n1. **先听懂对面是谁，再选问题。** 同一个问题问错层级会显得没分寸——业务战略去问 HR、薪资假期去问总监，都掉分。下面按面试官层级给你三个问题池。\n2. **问题里嵌入\"我做过功课\"的信号。** 问\"过去一年你们的产品 / GTM 策略有什么变化\"远胜于\"你们公司是做什么的\"。\n3. **2-3 个为宜，留一个\"接话型\"问题。** 根据这一轮面试官刚才提到的内容现场追问，最能体现你在听、在想。\n4. **收尾把球踢回给自己。** 问一句\"以我今天展现的情况，您觉得我和这个岗位还有哪些 gap 需要补强\"，既要到反馈，又显坦诚。\n\n**临场三步公式**（脑子空白时就按这个走）：\n\n1. **定层级**——先想这轮是谁：直属 leader / 一线 PM → 问怎么干活；总监 / 业务负责人 → 问战略和取舍；HR → 问成长和文化。\n2. **抛 1 个准备好的 + 1 个接话型**——从对应问题池挑一个背好的，再从这轮聊过的内容里现挖一个追问（\"您刚提到在重做评估体系，现在卡在哪一步？\"）。\n3. **收尾要反馈**——用第 8 个范例把球踢回自己，要一句对你的评价。\n\n一套完整示范（对方是一线 leader）：\n\n> \"想问两个。第一，你们现在主要靠哪些数据来判断一个新功能上线算不算成功？——我自己做 RAG 问答时是用准确率和检索覆盖率两条线来定的，想了解你们这边的口径。第二，您前面提到团队最近在调迭代节奏，是遇到了什么具体的瓶颈吗？……最后想厚脸皮问一句，以我今天聊下来的状态，您觉得我跟这个岗位之间还有哪些 gap 是我得补的？\"\n\n```mermaid\ngraph TB\n    classDef start fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef tip fill:#90CDF4,stroke:#63B3ED,stroke-width:1px,color:#1A365D\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A([\"听到 你有什么想问我的\"]):::start\n    B{\"判断对面是谁\"}:::step\n    C[\"一线 PM / 直属 leader\"]:::tip\n    D[\"总监 / 业务负责人\"]:::tip\n    E[\"HR\"]:::tip\n    F[\"团队 / 迭代节奏 / 评估体系\"]:::step\n    G[\"业务战略 / AI 投入与取舍\"]:::step\n    H[\"成长路径 / 团队文化\"]:::step\n    I([\"收尾 要反馈 把球踢回自己\"]):::start\n    N[\"每轮只问 2-3 个 留一个接话型\"]:::note\n\n    A --> B\n    B --> C --> F\n    B --> D --> G\n    B --> E --> H\n    F & G & H ==> I\n    B -.-> N\n```\n\n## 二、按面试官层级的问题库\n\n### 对一线 PM / 直属 leader——问团队、迭代节奏、评估体系怎么搭\n\n这一档面试官最懂干活细节，问\"how it actually works\"最对路。\n\n- **评估体系怎么搭**：\"你们现在主要用哪些数据来驱动产品决策？怎么定义一次新功能上线算成功？怎么衡量用户满意度？\"——这正好是你 AI 项目的强项延伸，对方答完你能自然接一句你在杭小育是怎么定准确率 97.5% 和覆盖率这两条指标的。\n- **迭代节奏**：\"团队大概的迭代节奏是怎样的？过去一年里，bug 修复 / 维护 / 新功能开发的精力分配大致是几比几？\"\n- **协作关系**：\"Product 和研发 / 设计 / 数据团队现在的协作关系怎么样？信息一般怎么流动、有没有什么协作上的痛点？\"\n- **需求优先级机制**：\"新想法主要从哪来？backlog 里怎么排优先级？不同来源的需求会被区别对待吗？\"——对方多半会讲\"按影响面 × 影响深度、对核心指标的影响\"来排，你可以顺势聊你做孤独症筛查时是怎么权衡 B/G 端多方诉求的。\n\n### 对总监 / 业务负责人——问业务战略、AI 投入与取舍判断\n\n这一档别问执行细节，要问战略和判断力。**取舍类问题最显水平，因为它其实是在\"考面试官\"。**\n\n- **战略清晰度（自带红旗探测）**：\"这个产品 / 业务线接下来一年的 vision 是什么？它和公司整体目标怎么咬合？\"——如果对方一两句话讲不清，这本身就是个组织信号，你能借此判断要不要来。\n- **取舍判断力**：\"能不能讲一个你们最近砍掉的功能、或者对重要客户说'不'的决定？背后的取舍是什么？\"或者\"上一次做了个上线后证明是错的功能，你们学到了什么？\"\n- **AI-PM 专属取舍（你的差异化武器）**：把 AI-PM 面试的高频考点反过来变成你的反问，最能显专业——\n  - \"团队怎么判断一个 AI 能力该自研模型、调供应商 API、还是先做轻量验证（wizard-of-oz）跑通需求？\"\n  - \"模型效果不达预期时，产品侧的兜底 / 降级策略一般怎么定？\"\n  - \"在数据飞轮 / 数据质量上，你们目前最大的瓶颈是什么？\"\n\n  这三个问题分别对应 AI 产品的 build vs buy、工程兜底、数据资产三大命门。问出来，对方会立刻觉得你是懂 AI 落地、不是只会背概念的人。注意措辞要\"问判据\"而不是\"下断言\"——是问\"团队怎么判断\"，不是替对方说\"自研更好\"。\n- **商业价值锚点**：\"这块业务是怎么为公司创造长期可持续价值的——盈利模式、市场价值、还是战略卡位上的定位？\"\n\n### 对 HR——问成长路径、团队文化\n\n- **成长路径**：\"在你们这里，做得好的 PM 通常有哪些共同特质？这个岗位往后一两年的成长路径大概是怎样的？新 PM 怎么 onboarding？\"\n- **团队文化**：\"公司怎么认可个人和团队的成绩？团队的透明度和信息同步做得怎么样？\"\n- **真实挑战（显成熟）**：\"在你们这里做 PM，最难的部分是什么？\"\n\n## 三、可直接背的高质量范例（8 个）\n\n1.（总监·战略，自带红旗探测）\"这个业务线接下来一年的 vision 是什么？它和公司整体目标怎么咬合？\"\n2.（总监·取舍）\"能讲一个你们最近砍掉的功能、或对重要客户说'不'的决定吗？背后的取舍是什么？\"\n3.（总监·AI 取舍，你的专属武器）\"团队怎么判断一个 AI 能力该自研模型、调 API、还是先做轻量验证？模型效果不达预期时产品侧怎么兜底？\"\n4.（一线·评估体系）\"你们现在主要用哪些数据驱动产品决策、怎么定义一次新功能上线算成功？\"\n5.（一线·迭代节奏）\"团队的迭代节奏大概怎样？过去一年 bug 修复 / 维护 / 新功能开发的精力分配大致几比几？\"\n6.（一线·协作）\"Product 和研发 / 设计 / 数据团队现在协作得怎么样？信息一般怎么流动、有没有协作上的痛点？\"\n7.（HR / 直属·成长）\"在你们这里做得好的 PM 通常有哪些共同特质？这个岗位往后一两年的成长路径大概怎样？\"\n8.（收尾·要反馈）\"以我今天展现的情况，您觉得我和这个岗位之间还有哪些主要 gap 是我需要补强的？\"\n\n**为你定制的 C 端 AI 方向问题**（去 C 端 AI 岗时优先用）：\n\n- \"你们在 C 端 AI 功能上，怎么平衡'回答更准'和'响应更快 / 成本更低'？有没有踩过 token 成本失控的坑？\"——你在杭小育做过 CAG 降本 80%，对方答完你能自然带出这段。\n- \"C 端用户对 AI 的信任怎么建？你们有没有专门衡量'用户是否信任 AI 输出'的指标？\"——这是 C 端 AI 的核心难题，问出来显得你想得比一般候选人深。\n\n## 四、忌讳清单（命中任意一条就掉分）\n\n- **张口只问薪资 / 假期 / 私人问题**——这是大忌，把面试官最后的好感直接消耗掉。薪资留给 HR 在 offer 阶段谈。\n- **说\"没有了 / 暂时没有\"**——白白浪费这个最佳机会，等于自我减分。哪怕没准备，也要从对方刚才讲的内容里现场抓一个点追问。\n- **问官网就能查到的表层信息**——\"公司是做什么的\"\"组织架构怎样\"这种，暴露你没做功课。\n- **问太基础 / 套模板的鸡毛蒜皮**——比如\"加班多不多\"\"午饭怎么解决\"放在第一个问，显得格局小。\n- **问错层级**——业务战略问 HR、团队文化 / 成长路径问总监，都会让对方觉得你没分寸。\n\n## 五、临场加分小技巧\n\n反问的思路其实贯穿整场面试，不只在结尾用：\n\n- **用反问把开放题收窄**。听到\"介绍下自己\"时，可以先反问一句\"您想重点了解我哪方面——是某个项目的细节，还是我整体的能力结构？\"；答完一段再追\"我这样回答有没有切中您想问的？\"。把单向陈述变成双向互动，能避免你因为\"讲不成体系\"而跑偏。注意分寸：这招点到为止，反问完别等对方答太久、自己接着讲就好；连珠炮式地反问会显得你在回避正面回答。\n- **接话型反问最值钱**。提前准备的问题是 60 分，能根据对方刚说的话现场生成的问题是 90 分。比如对方提到\"我们最近在重做评估体系\"，你立刻接\"那现在用的主指标是什么、为什么要重做\"——这才是面试官眼里的\"会思考\"。\n\n记住一句话收尾：**反问环节，你不是在求一份工作，你是在判断这家公司值不值得你来。** 带着这个心态去问，姿态、问题质量、和对方的对话感，都会自然到位。\n", "/04-高频题与答题框架/07-估算与费米题.md": "# 估算与费米题：量级拆解套路\n\n> 估算题（费米题）考的从来不是你能不能算准，而是**你的拆解逻辑合不合理、假设说不说得清**。面试官出\"估算一个 AI 功能上线后的日成本\"\"这个产品潜在有多少用户\"\"准确率提升 5% 但成本涨 30% 你怎么权衡\"——他想看的是你脑子里有没有一张结构化的拆解图，敢不敢把假设摆到台面上。\n>\n> 本篇给你：**一套四步通用拆解法 → AI 特有的成本估算公式与锚点 → 三个从头走一遍的完整范例 → trade-off 追问的应对结构 → 真题清单 + 加分点 + 雷区**。\n>\n> 这一类题正好能让你把 CAG 降本 80%、token 估算、小模型路由这些成本意识落到一道题里——估算题最想听到的就是这种\"会算账\"的本能。\n\n---\n\n## 一句话先记住定位\n\n**估算题 = 把一个算不出来的大数，拆成几个能用常识锚定的小数，再乘回去。**\n\n最核心的一句加分话术，开场就说出来：\"**我拆解的原则是，绝不把一个未知数拆成另一个未知数，要一直拆到能用生活经验或已知数据锚定的元素为止。**\" 这一句话，面试官立刻知道你懂费米估算的精髓。\n\n记住：**说出假设 > 算准数字。** 你把假设摆明白，面试官可以替你修正某个参数；你闷头报一个数，他无从判断你是蒙的还是推的。\n\n---\n\n## 四步通用拆解法\n\n```mermaid\ngraph TB\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef key fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S1[\"1 明确问题定边界<br/>口径/含哪些不含哪些\"]:::step\n    S2[\"2 选切入维度<br/>需求端 or 供给端\"]:::step\n    S3[\"3 MECE拆公式<br/>拆到能锚定为止\"]:::key\n    S4[\"4 分项估算+合理性检验<br/>量级自检/交叉验证\"]:::key\n\n    S1 ==> S2 ==> S3 ==> S4\n    N[\"核心：不重不漏<br/>不把未知拆成新的未知\"]:::note\n    N -.-> S3\n```\n\n**第 1 步 · 明确问题、定边界（别急着算）。** 先把口径问清楚：\"日成本\"是只算推理，还是含训练分摊、含人工审核？\"用户量\"是注册数、DAU 还是付费用户？口径不清就算下去，方向错了白费。这一步主动澄清，本身就是加分动作。\n\n**第 2 步 · 判断切入维度。** 两条路：**需求端**（人口 × 渗透率 × 频次）或**供给端**（产能 × 工时 × 数量）。C 端 AI 产品的用户量、收入题几乎都走需求端；成本题走\"调用量 × 单次成本\"的供给逻辑。\n\n**第 3 步 · MECE 拆解列公式。** 把大数拆成几个可解决的已知变量，**不重不漏**。这一步的纪律是：每拆一层，问自己\"这个数我能用常识或已知数据锚定吗？\"不能就继续拆。分人群、分场景时盯紧边界（按年龄段、按 free/付费 拆，别漏别重）。\n\n**第 4 步 · 分项估算 + 合理性检验。** 三个检验手法当场用：① **量级自检**——结果落在合理数量级吗（日活百万的产品，日成本不可能是十块钱也不可能是一个亿）；② **锚点反推**——人均、家庭规模这类参数不能凭空设，要有数据或生活经验支撑；③ **交叉验证**——换一个维度重算一遍对一对。\n\n---\n\n## AI 特有：成本估算公式与锚点\n\n这是 AI PM 估算题最高频、也最能秀专业度的子类。把下面这套公式和锚点背下来。\n\n**推理日成本主公式（直接写出来）：**\n\n```\n日成本 ≈ DAU × 人均调用次数 × 单次平均 token 数 × token 单价\n```\n\n**进阶版（想显深度就用这个）：**\n\n```\n真实成本 ≈ (token 成本 + 延迟成本 + 错误成本 + 人工审核成本) ÷ 任务成功率\n```\n\n后半句很关键——AI 的成本不只是 token 钱，答错要返工、要人工兜底，这些都摊进单位成本；除以任务成功率，是因为失败的调用也烧了钱却没产出价值。\n\n**Token 单价锚点（2025-2026 量级，随时变，面试当锚点用，别当报价）：**\n\n- 低端小模型：约 **$0.05–0.1 / 百万 input token**（Gemini Flash-Lite ~$0.1、GPT 系 Nano ~$0.05）。\n- 前沿旗舰 / 推理 Pro 档：可达 **$30 / 百万 input token**（顶配档，输出更贵）——和小模型差了约两个数量级，这正是模型路由的价值所在。\n- **输出比输入贵**：output:input 中位约 4×，部分模型 8×。估算时输入输出要分开或取混合价。\n- **预估时乘 1.7–2.0×**：覆盖 system prompt、重试、多轮上下文累积。\n- **中文场景必提的隐性成本**：在**英文系模型**（GPT/Claude 的 BPE 分词器）上，同义中文约多一倍 token（国产模型如 Qwen/DeepSeek 优化过反而更省，按你实际用的分词器估）；推理模型有 thinking token；多轮对话历史 token 线性累积。\n\n**GPU / 自建锚点：**\n\n- H100 租用约 **$1.5–4/GPU·小时**（2025 年从 ~$7 降到大厂 ~$3–4、低价平台 ~$1.5；竞价更低）。\n- **自建 vs 调 API 的盈亏平衡**：量级锚点是 **≥50 万 token/日**起开始接近平衡、**到几百万 token/日**自建才明显划算。但一定要补一句——**平衡点取决于你拿谁当基准**：跟前沿大模型 API 比，几百万 token/日就能划算；跟已经规模化、薄利的开源模型 API 商（如 Together）比，门槛会拉到 **几千万 token/日**。而且自建还有 DevOps、闲置 GPU、运维这些隐性成本，**多数量级下的产品其实调 API 更划算**——这句话能挡住\"那你直接自建啊\"的追问。\n\n---\n\n## 范例一：估算一个 C 端 AI 问答功能的日成本\n\n你临场可直接套这个结构。\n\n**第 1 步 · 定边界。** \"我先确认口径——这里算的是上线后的**推理日成本**，不含训练摊销和服务器固定成本，对吗？我按纯 API token 成本估，再补一句人工审核的摊销。\"\n\n**第 2 步 · 切入维度。** \"走供给端：日成本 = 调用量 × 单次成本。\"\n\n**第 3 步 · 拆公式、列假设。** \"假设 DAU 500 万，人均每天问 3 次；单次对话含 system prompt 和一两轮上下文，原始约 800 token，我**乘 2 倍膨胀系数**覆盖重试和上下文累积，按 1500 token 估；混合输入输出单价我取 **$0.3 / 百万 token**。\"\n\n**第 4 步 · 算 + 检验。** \"算一下：500 万 × 3 × 1500 = 225 亿 token/天，× $0.3/百万 ≈ **$6750/天**，量级约每天几千美金、每月二十来万。**合理性检验**：500 万 DAU 的产品月成本二十万美金，占大厂一个 C 端业务的盘子是合理的，量级站得住。\"\n\n**加分收尾（亮成本意识）：** \"这个数还能砍——我在杭小育就用 **CAG 缓存增强把成本降了 80%**：高频育儿问题命中缓存就不重复推理。再叠一层**模型路由**——简单问题走便宜小模型、复杂或失败的才升级到大模型，对 460 万用户、日活 21.5 万的体量，这两招是毛利的生死线。所以真实成本会比这个 baseline 低一大截。\"\n\n---\n\n## 范例二：估算潜在用户量 / 收入\n\n需求端拆解的标准打法。\n\n**拆公式：** \"潜在付费收入 = 目标人群 × 渗透率 × 付费转化率 × ARPU。\"\n\n**分层估（free/付费 两层别混）：** \"假设目标人群 2000 万，产品渗透率 10%（200 万 DAU），其中付费转化 5%（10 万付费用户），付费档 ARPU 假设每月 30 元——年收入 ≈ 10 万 × 30 × 12 ≈ **3600 万/年**。\"\n\n**合理性检验（交叉验证）：** \"换个维度验：200 万 DAU、5% 付费率在工具类 C 端是偏乐观但不离谱的区间；如果付费率压到 2%，收入掉到一千多万，量级仍在'一个早期 C 端 AI 产品年收入几千万'的合理带里。我会把渗透率和付费率标成**最敏感的两个假设**，提示这两个数的真实区间决定结论。\"\n\n---\n\n## 范例三：trade-off 追问——\"准确率 +5% 但成本 +30%\"\n\n这类追问越来越高频，本质是估算题 + 决策题的合体。用这套五步结构。\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A[\"1 澄清假设<br/>5%落在哪/30%花在哪\"]:::step\n    B[\"2 锚定上位目标<br/>北极星是什么\"]:::step\n    C[\"3 拆根因<br/>提升与成本的来源\"]:::step\n    D[\"4 给行动+优先级<br/>能否子集化/算净收益\"]:::step\n    E[\"5 给结论<br/>净收益判断\"]:::step\n    A ==> B ==> C ==> D ==> E\n```\n\n**走一遍（你的口径）：** \"先澄清两件事——这 5% 准确率提升落在哪类问题上？是均匀提升，还是集中在高价值的诊断类问题？30% 成本是花在换更大模型，还是加了一道审核？\n\n接着锚定上位目标：如果北极星是'问题一次解决率'，那准确率直接挂钩它，5% 不小。\n\n关键判断是**能不能不全量吃这 30%**：我不会对所有请求都升级到大模型，而是用**模型路由**只对那 5% 受益的高价值子集升级，成本增量就从 30% 摊薄到可能 5%-8%。\n\n再算净账：AI 的成本不只 token——准确率 +5% 意味着**错误成本和人工审核成本下降**，这部分省的钱可能把模型成本涨的那部分对冲掉甚至净省。我会当场用一笔**净收益账**——增量收益（少返工、少人工、转化/留存的提升）减增量成本（多花的那部分模型钱）——看正负。\n\n结论：如果 5% 落在高价值场景、且能用路由把成本增量控制在 10% 以内、且省下的错误/人工成本可观，这笔我做；否则我会把它降级、先验证子集效果再全量。\"\n\n这套答法把\"成本+Y%\"翻译成了\"花在哪、买到什么、能不能只对子集花、净账划不划算\"——这就是面试官想听的工程化决策。\n\n---\n\n## 真题清单（2025-2026）\n\n**AI 成本估算类：**\n- 上线前如何 size 一个 AI 功能的影响（用户/收入/成本三维）\n- 每次查询 / 每 token 的成本怎么估算\n- GPU 推理成本怎么算（常以 trade-off 追问出现）\n- 自建模型 vs 调供应商 API（build vs buy）的盈亏平衡在哪\n\n**trade-off 追问类（最高频）：**\n- \"效果提升 X% 但成本增加 Y%，你怎么权衡\"\n- \"cheaper 还是 better、延迟低还是准确率高，怎么选\"\n- \"离线 ML 指标好但线上业务指标没动，怎么办\"（衔接第 02 章评估题）\n\n**通用费米类：**\n- 估算某 AI 产品的潜在用户量 / 年收入\n- 估算某城市一天打多少次车 / 一栋楼一天用多少电（经典练手题，练拆解纪律）\n\n---\n\n## 加分点（强答案信号）\n\n- **开口先定口径、说假设**——\"我假设 DAU 是 X、人均 Y 次\"，把每个数标出来。\n- **报量级，不报精确数**——\"每天几千美金、每月二十来万\"比\"$6750.00\"更专业；老旧的精确数字反而扣分。\n- **当场做合理性检验**——量级自检 + 换维度交叉验证，主动说\"我验一下这个数站不站得住\"。\n- **AI 成本算到 token 以外**——延迟成本、错误成本、人工审核成本、除以任务成功率，这一句拉开档次。\n- **trade-off 主动给降本手法**——模型路由、缓存命中、Token FinOps（像管云账单一样管 token：谁消耗最多、哪些任务输出过长、缓存命中率）。\n- **用项目数据钉死**——\"CAG 降本 80%\"\"拍照识别 98%\"\"采纳率 97.5%\"，把估算落到真做过的事上。\n\n## 雷区（命中就掉分）\n\n- ❌ 不问口径直接开算，最后发现算的不是面试官要的东西。\n- ❌ 把一个未知数拆成另一个未知数（比如\"人均次数\"又靠\"假设每人很活跃\"硬设，没锚定）。\n- ❌ 拆解中途偷换数值的真实范围、凭空设一个离谱参数（家庭规模设成 10 人）。\n- ❌ 闷头报一个精确数字，从不说假设，面试官无从修正。\n- ❌ AI 成本只算 token 单价，忽略输出比输入贵、多轮累积、重试膨胀，以及中文在**英文系模型**上约多一倍 token（国产模型分词器优化过中文反而更省，别一刀切说\"中文费 token\"）。\n- ❌ trade-off 题给\"我会综合权衡\"这种和稀泥答案，不下判断、不给量化框架。\n- ❌ 算完不做合理性检验，结果差了两个数量级也浑然不觉。\n\n> 临场口诀：**先定口径 → 选维度 → 拆到能锚定为止 → 分项乘起来 → 量级自检。** AI 成本题再补一句\"token 之外还有错误成本和人工成本，除以任务成功率\"，trade-off 题再补一句\"能不能用路由只对受益子集花这笔钱\"。说清假设、报对量级，这一类题就稳了。\n", "/04-高频题与答题框架/04-方法论类高频题.md": "# 方法论类高频题 + 参考答案\n\n方法论题考的不是名词，是「你是不是真用 AI 产品的脑子在思考」。面试官最烦两种回答：一种是把 AI 名词背一遍但落不到产品上，另一种是用做传统功能的思路套 AI——同输入同输出、上线即终态、PRD 写死。这章给你 8 道高频题，每道一个 30-60 秒可直接背的口语答案，再加一句把回答从「背诵档」拉到「资深档」的升华。本篇口径与第 01 章第 10 篇《模型评估与幻觉》、第 02 章第 01/04/07/09 篇完全一致，追问到深处可向那几篇借弹药。\n\n答这类题有个通用开场：**先讲「同」再讲「异」**——底层都是用产品方案满足需求、达成业务目标，先把这句说出来，避免显得只会背 AI 黑话；再用「概率性、数据闭环、评估体系」这三把刀切出 AI 的不同。能用项目佐证就立刻佐证，定量说效果（「提升 34%」而不是「效果很好」），主动讲取舍和踩过的坑。\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef proof fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A([\"先讲同：都是满足需求达业务目标\"]):::step ==> B([\"再讲异：概率/闭环/评估三把刀\"]):::step\n    B ==> C([\"框架答：分层说清逻辑\"]):::step\n    C ==> D([\"项目佐证：定量+讲取舍\"]):::proof\n    A --- N[\"开场认同传统功底，避免被'你只会背词'的预设击中\"]:::note\n```\n\n---\n\n## 1. AI 产品和传统产品最大的区别是什么？\n\n**参考答案（背）**：底层是一样的——都是用产品方案满足用户需求、达成业务目标，这点 AI PM 和传统 PM 没区别。但有三个地方被彻底击穿了。第一，确定性变了：传统产品同输入同输出，AI 是概率性的，同一句话问两遍可能给不同答案，这一条会反过来击穿体验、评估、PRD 全套。第二，交付形态变了：传统是「写规则、控结果」，上线即终态；AI 是「给能力、控边界」，上线是起点，靠数据闭环持续逼近。第三，协作变了：传统需求一次宣讲就能开工，AI 需求要和算法多轮对齐，而且我没法给一个确定的 ROI，只能给目标区间。一句话：**传统产品的核心交付物是 PRD，AI 产品的核心交付物是 evals。**\n\n> 升华：传统产品上线即终态，AI 产品上线是起点。这句话能让面试官立刻判断你不是「把 AI 功能当普通功能做」的转型 PM。\n\n---\n\n## 2. AI 产品的护城河是什么？什么是数据飞轮？\n\n**参考答案（背）**：在大模型时代，「能调通模型」本身不是护城河——别人也能调。真正的护城河是数据飞轮加场景嵌入。数据飞轮是一个正反馈：更多用户带来更多真实数据，数据让模型/检索效果更好，效果好体验就好，体验好又带来更多用户。但有个关键前提常被忽略：**数据要能形成标注信号才叫飞轮，单纯堆日志不是。** 最理想的是「用户行为即标注」——用户点采纳、重新生成、点踩，这些动作天然就是免费的训练/优化信号，既降标注成本又加速飞轮。护城河往往是叠加的：数据飞轮 + 工作流嵌入（切换成本）+ 迭代速度。\n\n> 项目佐证：在杭小育，用户对回答的采纳/重生成行为回流进 Badcase 池，直接驱动下一版检索和知识库优化，覆盖率累计提升 34%——这就是「行为即标注」让飞轮转起来的实例。\n\n---\n\n## 3. 概率性产品怎么设计体验？（高区分度）\n\n**参考答案（背）**：核心就一个词——**给用户控制感**。AI 会出错是必然，体验设计的目标不是消灭错误，是让用户在错误发生时不失控。我一般做四件事。第一，预期管理：让用户知道这是 AI、可能出错，关键信息标置信度和出处。第二，给控制权：提供重新生成、编辑、撤销这些机制，别让 AI 的唯一输出锁死用户。第三，容错降级：低置信度时降级到确定性方案或给候选答案，别硬给一个唯一解。第四，分场景定激进度：低风险场景可以让 AI 直接执行，高风险、强合规的场景必须人来确认，绝不让 AI 在高风险动作上自动执行。\n\n> 升华：区分「低风险可激进、高风险必确认」是这题的资深感来源。能讲到「用户控制感是概率性体验的第一命题」，比单纯说「加个重新生成按钮」高一档。\n>\n> 项目佐证：杭小育拍照营养分析做到 98% 准确率，但剩下 2% 在育儿场景是不能赌的，所以结果带出处、可追问、关键建议引导用户核对，而不是直接当结论推给家长。\n\n---\n\n## 4. AI 产品的 PRD 怎么写？和传统 PRD 有什么不一样？\n\n**参考答案（背）**：传统 PRD 那套（背景、目标、功能、交互）照常写，AI 的特殊性是在上面叠几个专属段落。一是算法目标和边界：明确这个能力做什么、明确不做什么。二是评估指标体系：判别类写精确率/召回率/F1，生成类写人工评分、满意度、采纳率，并且一定要挂到业务指标上。三是数据：训练和评测数据从哪来、标注规范、冷启动数据怎么搞。四是不确定性和降级：Badcase 怎么处理、兜底逻辑、灰度策略。最关键的差别——**指标写「目标区间」而不是「确定值」**，并且写清楚「离线指标达标不等于能上线，必须 A/B 验证业务指标」。\n\n> 升华：把「与算法团队多轮对齐」这个协作过程写进 PRD，体现你懂 AI 需求不是一次宣讲。术语别说错：精确率是预测为正里真的为正的比例，召回率是真的为正里被找出来的比例，F1 是两者的调和平均。\n\n---\n\n## 5. 一个 AI 产品从 0 到 1 怎么落地？\n\n**参考答案（背）**：我会按七段流水线走，比传统多两段。需求定义 → 方案设计 → **算法预研/可行性验证**（PoC，先确认技术上能不能稳定做到）→ 数据准备和模型构建 → **离线评估**（评估前置，不达标不往下走）→ 工程开发 → **灰度上线 + 在线评估 + 数据闭环**。比传统流程多出来的关键就是「算法预研」和「评估前置」这两段——传统是先画原型，AI 得先问技术可行性。还有一条经验：先挑一个小而清晰的场景把飞轮跑通，再往外扩，别一上来追求大而全。\n\n> 升华：能讲清「每个节点的产出物和上下游」是加分点。PoC 阶段产出是「可行性结论 + 指标天花板预估」，离线评估阶段产出是「过没过准入门槛」。\n>\n> 项目佐证：浙江孤独症筛查系统就是先把量表数字化和初筛到确诊的链路在有限范围跑通，再往全省 1600+ 机构铺开、累计 16.5 万人次筛查——典型的「小场景跑通流程再放量」。（注意诚实定位：这个项目 AI 含量低，主线是医学量表数字化和多级流转，被追问技术深度别硬往 AI 上靠。）\n\n---\n\n## 6. 怎么判断一个需求该不该用 AI？（真伪需求）\n\n**参考答案（背）**：我会问三个问题。第一，价值-成本：AI 方案对比规则方案，把算力、标注、维护成本都算进去，ROI 是不是正的。第二，技术边界：当前模型能力能不能稳定覆盖这个场景，场景的容错率有多高。第三，概率容忍度：这个场景能不能接受不确定输出——要求 100% 准确、强合规、高风险的场景就要慎用 AI。决策结论一句话：**能用规则解决的别上 AI，AI 只在「模糊、长尾、需要泛化」的问题上有不可替代的价值。** 「为了 AI 而 AI」是最典型的伪需求。\n\n> 升华：主动举一个「看起来该上 AI 但其实规则更优」的例子，比一味说「AI 好」更显产品 sense。比如一个固定话术的客服自动回复，规则就够了，硬上大模型反而引入幻觉风险和成本。\n\n---\n\n## 7. 怎么做 AI 产品的数据闭环？\n\n**参考答案（背）**：五个环节，采集 → 标注 → 回流 → 迭代 → 监控。采集分显式和隐式：显式是点赞/点踩/采纳/重新生成，隐式是停留、复制、二次编辑这些行为。然后把反馈转成可训练或可评测的标注信号，理想情况是「用户行为即标注」省掉人工标注成本。回流之后按固定节奏迭代：重训或者调 prompt、调检索，再评估、再灰度。监控这环很重要——线上效果、Badcase 实时捕捉、指标漂移告警都要有。整条链路还要做数据隐私和脱敏合规，C 端尤其不能马虎。\n\n> 升华：能说出「Badcase 自动捕捉回流」和「用户行为即标注降低标注成本」这两个点，就跟第 2 题的数据飞轮打通了，体现你的方法论是成体系的，不是零散背的。\n>\n> 项目佐证：杭小育的「点踩/反馈 → 进 Badcase 池 → 影响下一版检索」就是一条完整闭环，准确率稳定在 97.5%、覆盖率持续涨，靠的就是这条链路在转。\n\n---\n\n## 8. 怎么给 AI 产品搭一套评估体系？（高区分度）\n\n**参考答案（背）**：我分三层加两种方法。三层指标：模型层——判别类用精确率/召回率/F1，生成类用相关性、忠实度，还要单独盯幻觉率，注意准确率和幻觉率是两根独立的轴，不是 1 减 1 的关系；业务层——采纳率、留存、负反馈率、人工介入率；护栏层——安全违规、幻觉率这类不可越线的红线指标，它不参与和别的指标做 trade-off。两种方法：离线用金标准集跑，挡明显退步；在线用 A/B 看真实业务指标，做最终裁决。生成类没法直接算准召，能代码判定的（格式、数字、SQL 跑不跑得通）写断言，判不了的主观题才上 **LLM-as-Judge**——用大模型当裁判按 rubric 打分。但 LLM-as-Judge 是台有偏的测量仪器，有三个学界反复证实的系统性偏差：冗长偏差（偏爱长答案）、位置偏差（偏爱排在前/后的回答）、自我增强偏差（偏爱自己生成的内容），必须用人类金标准持续校准，所以它能提效但不能当唯一标准。最关键的一句：**离线指标好不等于线上业务好，必须 A/B 落到业务指标。**\n\n> 升华：能主动点出 LLM-as-Judge 的三个偏差并说「它是有偏的测量仪器，要拿人类金标准校准」，而不是把它当银弹，是这题最强的资深信号；把准确率/幻觉率/弃权率三个数一起报，而不只看准确率，也是这题的资深感来源。\n>\n> 项目佐证：SAGE-AI 取数的业务采纳率 97.5% 就是典型的「业务层评估」——离线 Text2SQL 准确率再高，我最终盯的是用户对生成结果「直接采用、不返工」的比例，因为采纳才代表真实价值，这也呼应了取数从 3 天压到分钟级的效率提升。\n\n---\n\n## 这些题的真实出处（别被「某公司原题」骗）\n\n方法论题不像设计题有那么多可考据的逐字真题，它们是**跨公司高度重合的题型**，换个壳反复出。下面按「常考问法」整理，标清是「通用题型」还是「特定考点」，别把题型当成某家的逐字原题去背。\n\n| 题 | 类型 | 答题抓手 |\n|---|---|---|\n| AI 产品和传统产品最大的区别 | 通用必考（几乎逢转型 PM 必问） | 先同后异 + 「交付物从 PRD 变 evals」 |\n| AI 产品的护城河 / 什么是数据飞轮 | 通用高频 | 数据飞轮 + 行为即标注 + 工作流嵌入 |\n| 概率性产品怎么设计体验 | 体验向高区分度题 | 用户控制感四件套 + 分风险定激进度 |\n| AI 的 PRD 和传统 PRD 有什么不同 | 通用高频 | 叠四个专属段落 + 指标写区间 + Eval-First |\n| 一个 AI 产品从 0 到 1 怎么落地 | 通用高频 | 七段流水线，比传统多「算法预研 + 评估前置」 |\n| 怎么判断一个需求该不该用 AI | 真伪需求高频 | 价值-成本 / 技术边界 / 概率容忍度三问 |\n| 怎么做数据闭环 / 怎么搭评估体系 | 通用高频，常与设计题连考 | 采集-标注-回流-迭代-监控 + 三层指标 |\n\n> 诚实提醒：面试里若有人说「这是 XX 公司原题」，多半是题库二手转述。**重要的是题型和答题骨架，不是它姓什么。** 这些题型的考点在 2026-06 仍是 AI PM 面试主流，但面试前请再快速感知一下热点漂移（比如 Agent、评估、成本会越来越重）。\n\n---\n\n## 加分点与雷区（每题通用）\n\n**主动做的加分点：**\n- **先同后异开场**：第一句先认同传统产品功底，再切 AI 差异——非科班最容易被「你只会背词」的预设击中，这句话直接拆掉它。\n- **定量 + 讲取舍**：说「准确率 97.5%、覆盖率 +34%」不说「效果挺好」；不等追问就说「离线高不代表线上好」「能用规则别上 AI」。\n- **三个数一起报**：评估题把准确率 / 幻觉率 / 弃权率一起给，瞬间区别于只会背准确率的人。\n- **收在闭环**：把方法论缝回「Badcase 回流 → 飞轮」，体现成体系而非零散背的。\n\n**命中就掉分的雷区：**\n- **只讲异、不讲同**：上来就甩 AI 黑话，显得不懂产品本质，也接不住「那这和做普通功能有啥区别」的反问。\n- **术语说反**：精确率/召回率讲反、把幻觉率当成「1 − 准确率」、把 LLM-as-Judge 当客观真理——这是硬伤，一错全盘崩。\n- **纯理论不带项目**：「我会做数据闭环和评估」这种话谁都会说，没有杭小育的 97.5%、SAGE 的采纳率佐证，等于没答。\n- **指标写死值**：AI 的 PRD/目标写「必须 100% 准确」是外行——要写目标区间 + 测量方法 + 测试集。\n- **为 AI 而 AI**：判断真伪需求时只会说「AI 好」，举不出「该用规则的场景」，反而暴露没有产品 sense。\n- **把孤独症项目硬吹成 AI 大项目**：被追问技术深度会露馅，诚实定位反而显成熟。\n\n---\n\n## 答这章的三条底线\n\n1. **每题双段式**：框架答完立刻挂项目佐证，不要纯讲理论，非科班最怕被追问「你实际怎么做的」。\n2. **术语别说错**：精确率/召回率/F1/混淆矩阵/RAG/数据飞轮/LLM-as-Judge 这些已在第 01、02 章对齐口径，按那套说，别现编。\n3. **被追问深一层时往工程走**：架构分层、监控告警、降级兜底、Badcase 回流——能聊到工程细节，就把「方法论好听」变成「真的落过地」。这是把功底「讲成体系」的关键，也正是你最需要补的临场能力。\n", "/04-高频题与答题框架/06-商业与战略类高频题.md": "# 商业与战略类高频题 + 参考答案\n\n商业战略题是大厂三面（价值观/产品深度面）的主战场，也是非科班候选人最容易暴露「通用 C 端 sense 偏弱」的地方。面试官在这里考四件事：会不会做 build-vs-buy 判断、能不能把成本和 ROI 量化、护城河推理够不够具体、对不确定性诚不诚实。这章 8 道高频题，每道一个 30-60 秒可直接背的口语答案，再加一句把回答从「背诵档」拉到「资深档」的升华。本篇口径与第 02 章第 08 篇《AI 产品的成本账》、第 10 篇《C 端增长与商业化》、第 03 章（豆包付费风波、留存悖论）对齐，追问到深处去那几篇借弹药。\n\n答这类题有个通用骨架，每道战略题都按它走一遍——**B-U-S 框架**，三步：\n\n1. **B（Business 业务上下文）**：先 ground——公司是 AI-native 还是 AI-augmented？有什么独占数据 / 流量 / 合规资产？时间窗和预算约束是什么？\n2. **U（User 用户需求）**：用户要多强的 AI？关键是——用户不总需要最强模型，要看付费意愿和信任 / 合规需求。\n3. **S（Solution 方案）**：给 Build / Buy / Partner / Hybrid 里的组合，且**分阶段、不给二元结论**——「现在怎么做、到什么拐点（用量 / 合规 / 能力）切换」。\n\n套用范例（以 build vs buy 为例）：「B——这是家 AI-augmented 的内容公司，有海量用户行为数据但没前沿研究团队、还有版权约束；U——用户要的是够用且稳定，不是 SOTA；S——所以现阶段 Buy 调 API 快速验证 PMF，到月用量过成本拐点、或合规收紧时，再走 fine-tune 的 Hybrid，自研前沿模型这一步直接排除。」一句话把三步串起来，比报一个结论高一档。\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef key fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A([\"B 业务上下文：先 ground 公司 AI 站位与数据资产\"]):::step ==> B([\"U 用户需求：要多强的 AI、付费意愿、信任需求\"]):::step\n    B ==> C([\"S 方案：Build/Buy/Partner/Hybrid 四选项\"]):::step\n    C ==> D([\"分阶段建议 + AI 专属指标 + 风险配缓解\"]):::key\n    A --- N[\"禁:把通用战略贴个 AI 标签就交差\"]:::note\n```\n\n> 全篇通用加分点：定量说话（「约降 80%」而非「便宜很多」）、主动讲取舍、对不确定性诚实、用 AI 专属指标（cost per inference、win rate、latency、fine-tune ROI）替掉纸面 DAU。通用扣分项：反射式推荐自研、不量化就说「API 太危险」、明明「快便宜够用」却推荐最强模型、护城河只甩名词不解释壁垒。以下数字均截至 2026 年，会过时，但趋势稳。\n\n---\n\n## 1. 一个 AI 产品要在半年内盈利，你选什么商业模式？\n\n**参考答案（背）**：我会先反问「为什么是半年」——这个时间窗本身就是约束条件，它直接排除了需要长期市场教育的纯 C 端订阅。原因是国内 C 端付费还在早期教育阶段、独立订阅转化率普遍偏低（行业把 AI 类免费转付费 6%–8% 算「做得好」），半年靠裸 C 端订阅回本不现实。所以半年盈利我优先看三条路，按付费链路从短到长排：一是 B 端 / API 按 token 计费，需求明确、决策方理性、付费链路最短；二是垂类 SaaS 订阅，绑定一个高价值工作流（如法律、客服、取数）；三是按效果付费（outcome-based）——成功解决一张工单 / 一次取数才收费，给结果而非给技术收费，最贴合 AI 的可变成本结构。结论一句话：**半年盈利在国内更应该走 B 端或垂类变现，而不是裸 C 端订阅。**\n\n> 升华：能说出「最成功的 AI 公司为完成的工作、解决的问题收费，而不是为技术本身收费」这句，立刻显出商业 sense。别忘了把时间窗当成约束条件去推方案，而不是直接报一个模式。\n\n---\n\n## 2. 给一个 AI API 定价，你会考虑哪三个核心维度？\n\n**参考答案（背）**：第一是成本结构——单位经济模型必须算清楚，按 token 计费的产品定价要盖住推理成本还留出毛利，这是底线。第二是价值定义和跨职能对齐——定价不是 PM 拍脑袋，要 product、finance、sales、GTM 先对齐「我们到底为客户创造了什么价值」，再倒推价格。第三是市场与竞品锚点——LLM API 价格这两年是断崖式下跌，从 2025 年初到 2026 年初**大盘降了约 80%**，曾经 5 美元/百万 token 现在不到 1 美元，定价必须盯住这条曲线动态调。补一个趋势判断：定价正从「按 token」往「按结果」迁移，这是下一阶段的方向。\n\n> 升华：给出真实数字区间最能加分——2026 年大致是从预算模型约 0.1 美元/百万输入 token，到前沿推理模型约 30 美元/百万输入 token，跨度三个量级。能讲「价格在快速下跌，所以定价是动态而非一锤子」比只说「考虑成本竞品」高一档。\n\n---\n\n## 3. 自建模型还是直接调供应商 API？（build vs buy）\n\n**参考答案（背）**：这题我不给二元结论，按四个选项加分阶段答。先定核心判据：**AI 是不是这个业务的战略差异化——是就倾向 build，不是、而 time-to-market 又关键就 buy**。然后看成本拐点，这是量化加分点：低到中等用量下，托管 API 的总拥有成本（TCO）通常更优——拐点具体在哪要看你拿自建对标哪档 API，对标便宜模型（DeepSeek、mini 档）大致月用量到几千万 token 量级才划算，对标前沿模型几百万 token 就够了；而且自建的「真成本」不止 GPU，工程团队（1.5–2 个 FTE）和运维往往比卡贵。再叠两个维度：数据主权与合规（调 API 可能涉及跨境数据违规，自建可本地部署满足监管），以及 API 依赖风险（供应商涨价、限流、下线）。所以标准答法是给四个选项——Build、Buy、Partner、Hybrid——再分阶段，比如「现在用 API 快速验证 PMF，等用量过成本拐点或合规收紧，再迁 fine-tune 或自建」。\n\n```mermaid\ngraph TB\n    classDef q fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef opt fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Q1{\"AI 是战略差异化吗\"}:::q\n    Q2{\"用量过成本拐点 / 合规要本地化吗\"}:::q\n    B1([\"Buy: 调 API 快速验证\"]):::opt\n    B2([\"Hybrid: fine-tune + 部分自建\"]):::opt\n    B3([\"Build: 自建/本地部署\"]):::opt\n\n    Q1 -->|否, 重 time-to-market| B1\n    Q1 -->|是| Q2\n    Q2 -->|否| B1\n    Q2 -->|是| B2\n    B2 ==>|长期演进| B3\n    N[\"禁:反射式推荐自研显厉害<br/>禁:不量化就说 API 太危险\"]:::note\n    Q1 --- N\n```\n\n> 升华：能引一个具体案例最稳——比如 Spotify 是 AI-augmented 不是 AI-native、有版权许可约束、没有前沿研究团队但有海量用户行为数据，所以正确解是排除自研前沿模型、走 fine-tune + hybrid。把判断落到「这家公司的具体禀赋」上，而不是泛泛谈利弊，就是护城河推理的具体性。\n\n---\n\n## 4. C 端 GenAI 产品的安全策略你会怎么做？\n\n**参考答案（背）**：我按「分类分级、纵深防御」来搭，不是一刀切。第一层是输入和输出审核——红线内容拦截、敏感问题降级到安全话术，挂靠监管的负面清单。第二层是未成年人保护——C 端绕不开，要有年龄识别和未成年人模式。第三层是可解释和信任——关键结论给出处、标置信度，让用户能核对而不是盲信。第四层是生成内容标识——按规定给 AI 生成内容打标，这是 2025 年后的硬合规要求。底层逻辑是国内《生成式人工智能服务管理暂行办法》定的调子：**包容审慎、分类分级**，高风险场景必须人来兜底，低风险场景才放开。\n\n> 项目佐证：杭小育是政务育儿 RAG，育儿建议这种场景容错率极低，所以我们做了三道：回答带知识库出处可追溯、关键医疗营养建议引导家长核对而不是当结论推、低置信度直接降级到人工/官方口径。安全在这种民生场景不是加分项是准入门槛。\n\n---\n\n## 5. AIGC 的版权和合规风险，你怎么看、怎么防？\n\n**参考答案（背）**：我把它拆成「输入侧」和「输出侧」两个维度，各有真实判例。输入侧是训练数据：必须用合法来源，《生成式人工智能服务管理暂行办法》第七条明确要求训练数据来源合法。这条线的标杆案在国内还没终审——2025 年小红书旗下 AI 绘画产品「Trik AI」被四位插画师起诉，指控未经授权用其美术作品训练模型并生成高度相似图片，被视为国内「训练数据侵权」第一案，但截至 2025 年中仍在审理、未出终判，所以我只把它当「悬而未决的风向标」讲，不当成定论。输出侧是生成内容：标志性的是奥特曼系列案——2024 年广州互联网法院判出全国首例 AIGC 侵权案，认定平台生成与奥特曼实质性相似的图片构成侵权；同年杭州互联网法院另一案判平台帮助侵权、判赔 3 万元。司法口径很清楚：**AI 生成内容只要和他人作品在独创性表达层面实质性相似，平台就要担责**（上海知产等法院 2025 年也持此口径）。再补一个常被问的点——生成内容自身的版权归属：美国版权局 2025 年初的报告说得很清楚，**版权只保护人类作者的原创表达，纯 AI 生成、仅靠 prompt 的材料不受保护**。防的动作三件：训练数据合规审查 + 输出查重 / 版权过滤 + 按规定给生成内容打标。\n\n> 升华：能背出具体判例（奥特曼案是国内首例 AIGC 侵权、Trik AI 训练数据案仍在审、美版权局 2025 报告）是这题最强的加分料，瞬间和「只会说要注意版权」的候选人拉开档。但务必如实——训练数据侵权国内还没终判，别把它说成已判赔的定案，被懂行的面试官追问会翻车。强调一句：合规不是上线后补的，是 PRD 阶段就要设计进去的前置约束。\n\n---\n\n## 6. 怎么避免掉进 AI hype trap（炒作陷阱）？\n\n**参考答案（背）**：我有几条自检。第一，不为了炫技推荐最强最贵的模型——「快、便宜、够用」永远优先，能用小模型解决就不上前沿模型。第二，不把通用战略贴个 AI 标签就当 AI 战略，要问「不用 AI 这件事能不能做、AI 到底带来了什么不可替代的增量」。第三，对不确定性诚实，不画 PMF 大饼。第四，用 AI 专属指标替掉纸面繁荣——看 cost per inference、win rate、latency、fine-tune ROI，而不是只报一个好看的 DAU。最后一条最重要，是需求错配的警惕：**国内 C 端用户的核心需求偏便利和娱乐，而当前 AI 重应用主要在办公提效，这个错配会让产品看着热闹但留不住人。**\n\n> 升华：「需求错配——用户要娱乐，产品给办公」这句记忆点能直接戳中 hype trap 的本质。能把抽象的「别跟风」落到「指标层面怎么识破」和「需求层面错在哪」，就是产品判断力。\n\n---\n\n## 7. AI 领域的 PMF（产品市场契合）有什么特殊性？\n\n**参考答案（背）**：传统 PMF 是找到一个稳定的点，AI 的 PMF 是个移动靶，有四个特殊性。第一，模型能力快速漂移——API 一年降价 80%、能力一次跃迁就能重塑可行边界，今天的 PMF 明天可能被新模型直接吃掉或抬高。第二，成本结构特殊——按 token 计费，单位经济随推理成本变，所以 AI 的 PMF 必须包含「毛利可持续」这个维度，不然规模越大亏越多。第三，质量是概率性不是确定性，要用 win rate、human eval 这类新评估去判断「到底契合没契合」。第四，信任、可解释、合规是前置门槛——尤其受监管场景，过不了这关谈不上 PMF。一句话：**AI 的 PMF 不是一次命中，是在能力漂移和成本曲线上持续校准。**\n\n> 升华：能讲「PMF 来自工作流嵌入而非单点能力」最显深度——业界公认最硬的 PMF 信号是「用户开始绕过你的 UI、自己写脚本 / 接 API / 装插件把你焊进日常流程」（a16z、Bessemer 都这么说）。落到本站案例：ChatGPT 接 Notion、Slack 把自己焊进工作流，NotebookLM 靠聚焦单场景而非大而全留住人——真正的契合是嵌进用户工作流，不是单点功能强。别硬背没出处的「留存提升 X 倍」，讲清「嵌入 → 切换成本 → 留存」这条因果链就够分量。\n\n---\n\n## 8. 为什么国内 C 端 AI 付费这么难？（留存悖论 / 中美差异）\n\n**参考答案（背）**：核心结论一句话——**美国大模型在 C 端靠订阅「赚大钱」，中国大模型在 B 端「抢地盘」、C 端靠流量打仗**。注意是付费难、不是没量——豆包 DAU 已破亿、MAU 三亿级，量根本不缺，缺的是会掏钱的人。难在三点：第一是付费心智，国内用户长期被免费 + 广告养大，独立订阅天然阻力大；第二是需求错配，C 端核心要的是便利和娱乐，当前 AI 重应用却主要在办公提效，这个错配让产品看着热闹却留不住人；第三是成本与变现错配，推理成本高（豆包日均 token 调用已破百万亿级），可对话流里又难插广告，烧钱的口子比赚钱的口子宽。这就是业内说的留存悖论：AI 把获客做到史上最容易，却把留存和付费做成史上最难。佐证一个真实信号：豆包 2026 年 5 月上线付费版后单月 MAU 净流失数百万，国内独立订阅这条路确实难走。但拐点也在冒头——用户正从「能蹭就蹭」转向「为效率买单」，Kimi 付费用户曾跑出月增速过百的爬升。\n\n> 升华：记忆点是「美国 C 端赚钱、中国 B 端抢地盘 + 需求错配（要娱乐、给办公）」。能在悲观结论后给一个有依据的展望（付费拐点正在出现），比一味唱衰更显格局——面试官想看的是判断力，不是情绪。\n", "/04-高频题与答题框架/01-设计题万能框架.md": "# 「设计一个 AI XX 产品」开放设计题万能框架\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/04-design-steps.png\" alt=\"小黑配图：八步台阶通关\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n> 这是整个面试里**权重最高、也最能拉开差距**的一类题。Meta 让你\"为打车 App 设计一个 AI 产品\"、TikTok 让你\"为内容审核设计一个 RAG 系统\"、OpenAI 让你\"把 text-to-music 能力产品化\"——形式千变万化，但好的答法只有一套骨架。\n>\n> 本篇给你：**一套八步可套用的答题结构 → 用杭小育从头走一遍的完整范例 → 设计题真题清单 → 加分点与雷区**。背熟结构，临场把空填进去就行。\n\n---\n\n## 一句话先记住定位\n\n**AI 设计题 = 一道普通的产品设计题 + 三个 AI 专属补强层。**\n\n普通产品设计题考的是：澄清需求、选用户、定指标、出方案、划 MVP。这套你本来就会。AI 设计题额外要你补三层，少一层就显得\"只是把 AI 当噱头加了个按钮\"：\n\n1. **评估闭环**——你怎么定义\"答得对\"、怎么持续度量（对应本站第 02 章第 04 篇）。\n2. **失败兜底**——AI 一定会出错，你怎么管理预期、怎么人工兜底（对应第 02 章第 05/06 篇）。\n3. **单位经济**——每次调用多少 token、多少钱，毛利打不打得平（对应第 01 章第 11 篇、第 02 章第 08 篇）。\n\n开场就把这句话说出来，面试官立刻知道你不是把 AI 当魔法的小白。\n\n---\n\n## 八步答题结构\n\n不要一上来就讲方案。按这个顺序走，每一步都先出声\"我现在在做哪一步\"，让面试官看到你的结构。\n\n```mermaid\ngraph TB\n    classDef base fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef ai fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef ship fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S1[\"1 澄清边界<br/>问清场景/约束/为何用AI\"]:::base\n    S2[\"2 目标用户与痛点<br/>选一个具体segment\"]:::base\n    S3[\"3 北极星与分层指标<br/>模型层+产品层\"]:::ai\n    S4[\"4 方案设计<br/>AI能力具体怎么用\"]:::ai\n    S5[\"5 数据与评估闭环<br/>怎么定义答对\"]:::ai\n    S6[\"6 技术可行性与成本<br/>RAG/微调选型+单位经济\"]:::ai\n    S7[\"7 风险与护栏<br/>幻觉/安全/人工兜底\"]:::ai\n    S8[\"8 冷启动与迭代<br/>MVP砍什么+怎么验证\"]:::ship\n\n    S1 ==> S2 ==> S3 ==> S4 ==> S5 ==> S6 ==> S7 ==> S8\n    N[\"3/5/6/7 是AI专属补强层<br/>区分资深与新手\"]:::note\n    N -.-> S3\n```\n\n<div class=\"anim\" data-anim=\"design-steps\"><\/div>\n\n**第 1 步 · 澄清边界（30 秒，但绝不能省）。** 问三件事：场景与约束（C 端还是 B 端？免费还是付费？延迟容忍多少？）、成功长什么样、**真的需要 AI 吗**。最后一问是隐藏加分项——主动说一句\"我先确认 AI 是不是这里的最优解，而不是默认要上 AI\"，立刻和只会堆模型的人拉开。\n\n**第 2 步 · 目标用户与痛点。** 选一个**尽量窄**的 segment，越具体越好。不要说\"所有用户\"，说\"第一胎、孩子 0-3 岁、半夜遇到突发状况、不知道该不该去医院的新手妈妈\"。痛点要能一句话戳到。\n\n**第 3 步 · 北极星与分层指标（AI 补强层）。** 这一步最容易暴露专业度。**指标必须分两层**：\n- 模型层：准确率、P99 延迟、**幻觉率**、拒答率（refusal rate）。\n- 产品层：任务完成率、**编辑后采纳率**（用户信任的硬信号）、下游任务表现——**不要只报 DAU/engagement 这种虚荣指标**。北极星建议挂\"7 日留存\"或\"任务完成率\"，而不是 DAU（过滤掉猎奇新鲜感流量）。\n\n**第 4 步 · 方案设计（AI 补强层）。** 走一遍用户流程 + AI 交互细节，重点说清\"**AI 在哪里加价值、在哪里反而加摩擦**\"。别停在\"加个 AI 助手\"，要讲：输入怎么来、AI 怎么处理、结果怎么呈现、用户怎么纠错。给 2-3 条**设计原则**统领（如\"宁可拒答不可瞎答\"\"每个回答都给溯源\")。\n\n**第 5 步 · 数据与评估闭环（AI 补强层）。** 说你会建一套 **eval 套件**：自建评测集 + 自动化指标。把模糊需求写成**可测**的——参考写法：\"摘要在评测集上 ≥95% 案例评分≥4 分、对 100% 越界请求拒答、不超过 200 token\"。能点名一种幻觉评估法（如 Knowledge-F1、entailment 蕴含判断）就更显深度。\n\n**第 6 步 · 技术可行性与成本（AI 补强层）。** 三要素：模型可得性、数据 readiness、延迟约束。选型表态：**RAG vs 微调 vs Prompt 选哪个、为什么**（口径见第 01 章第 07 篇）。再算一笔粗账：每次查询多少 token、按 token 单价乘 DAU，毛利打不打得平。\n\n**第 7 步 · 风险与护栏（AI 补强层）。** 核心命题是\"为失败而设计\"。传统软件要么对要么崩，AI 是\"总是 sort of right\"。三件套：**fallback 降级、human-in-the-loop（检测到低置信触发人工）、置信度提示**。再加用户控制：**escape hatch**（用户能一键退出 AI 建议、转人工）。高风险场景（医疗/金融）要点出 **asymmetric harm**（错误代价不对称）。\n\n**第 8 步 · 冷启动与迭代。** 圈定 MVP，**明确说你砍掉了什么、为什么砍**（这是最被点名的加分动作）。讲冷启动怎么破（种子数据/灰度/邀请制），讲怎么用 A/B 验证你的成功假设。\n\n---\n\n## 完整范例：设计一个 C 端 AI 育儿问答助手\n\n下面用你最熟的杭小育场景，把八步从头走一遍。临场可直接套这个结构换场景。\n\n**第 1 步 · 澄清。** \"我先明确边界：这是 C 端、免费、面向家长的育儿问答，对吗？延迟我假设要 3 秒内首字。先确认一点——育儿问答里 AI 的价值在哪：传统是关键词搜索 + 人工客服，痛点是新手家长**不会用专业词搜、半夜没人答**。这正是 AI 该上的地方：自然语言理解 + 7×24 即时回答。所以我判断 AI 是这里的最优解，而非噱头。\"\n\n**第 2 步 · 用户与痛点。** \"我聚焦**孩子 0-3 岁的新手父母**。痛点：遇到发烧、过敏、辅食这类问题，半夜搜不到权威答案、又怕耽误。他们要的不是一篇科普长文，是'我现在该怎么办'。\"\n\n**第 3 步 · 指标。** \"北极星我挂**问题解决率**（用户问完是否不再追同一问题/不再转人工），不挂 DAU。分两层——模型层：回答准确率（杭小育做到了 97.5%）、P99 延迟、**幻觉率**（育儿场景必须压到极低）、越界拒答率；产品层：一次解决率、追问转化、满意度。\"\n\n**第 4 步 · 方案。** \"三条设计原则：① **每个回答必给权威溯源**（出自哪份指南/哪家医院）；② **宁可拒答转人工，不可瞎答**；③ **多模态降低输入门槛**。流程：家长用大白话提问或**拍照**（比如拍一餐辅食、拍孩子的疹子），系统走 **RAG** 检索权威育儿知识库，生成带溯源的回答；不确定就给'建议就医'并转人工。我在杭小育做过**拍照营养分析**，食物识别准确率 98%——这正是 AI 在'家长说不清、但拍得出'场景下加价值的点。\"\n\n**第 5 步 · 评估闭环。** \"我会建一套育儿问答 eval 集：找儿科医生标注 500 道高频真题做金标准，自动化跑准确率和幻觉率。把需求写死成可测标准——'答案事实必须 100% 可溯源到知识库、对超出范围的医疗诊断类问题 100% 拒答'。生产里的 badcase 持续回流进评测集，这套 eval 就是我们质量的天花板。\"（呼应第 02 章\"evals 是新 PRD\"）\n\n**第 6 步 · 可行性与成本。** \"选型上我用 **RAG 而不是微调**：育儿政策和指南会更新，RAG 改知识库即可、可溯源、还能压幻觉；微调成本高又难溯源。成本上，我在杭小育用 **CAG（缓存增强）把成本降了 80%**——高频问题命中缓存不重复推理，这对 460 万用户、日活 21.5 万的体量是生死线。\"\n\n**第 7 步 · 风险护栏。** \"育儿是 **asymmetric harm** 场景——答错可能伤到孩子，代价极高。所以护栏要重：① 诊断/用药类问题强制拒答 + 免责 + 转人工；② 低置信度触发 human-in-the-loop，由客服或合作医生兜底；③ 回答带置信度与溯源，给用户判断权；④ escape hatch——任何时候一键转人工。我在浙江孤独症筛查项目里搭的就是'初筛 + 机构复核'的人机协同链路——高风险结论一定有专业人兜底，这套兜底逻辑可以直接迁移过来。\"\n\n**第 8 步 · 冷启动与迭代。** \"MVP 我**只做 0-3 岁 + 文字问答**，先砍掉拍照和大龄段——因为 0-3 岁问题最高频、最焦虑、最能验证价值。冷启动靠政务渠道导入种子用户和权威知识库。验证：灰度 10%，A/B 对比'有 AI vs 原搜索'的一次解决率和 7 日留存。我在杭小育就是靠这套金标准集 + A/B，把**检索覆盖率提升了 34%**（同一套题、只换检索配置测出来的相对提升）。\"\n\n走完这一圈，你已经把通用骨架 + 三个 AI 补强层（评估闭环 / 失败兜底 / 单位经济）+ 三个真实项目的数据缝在了一起。\n\n---\n\n## 设计题真题清单（2025-2026，按场景练）\n\n**纯开放\"设计一个 AI X\"类：**\n- Meta：为打车 App 设计一个 AI 产品（Design an AI product for a ride sharing app）\n- TikTok：为内容审核设计一个 RAG 系统检测虚假信息\n- OpenAI：有了 text-to-music 能力怎么产品化 / 为可代用户执行动作的 AI 设计安全护栏 / 让模型输出更有创意 / \"人类能和动物对话了，你做什么产品\"\n- Stripe：为儿童设计一款沟通工具\n- 中文 100 题：面向老年人的 AI 健康监测交互、跨境电商智能选品、把\"智能客服情绪识别\"用户需求转成 AI 技术需求\n\n**落地到现有产品类（最贴 C 端实战，重点练）：**\n- 给 Gmail 撰写框加 AI 写作助手 / 给 Notion 加 AI search / 设计 Zoom 会议助手\n- Build a document Q&A interface（≈ 你最熟的 C 端问答场景，建议拿来反复练）\n- 做能在多模型 provider 间切换的 AI chatbot 界面\n\n**设计后常被连环追问的取舍题：**\n- \"用户说模型自信但答错，你怎么修？\" / \"RAG vs 微调 vs Prompt，选哪个为什么？\"\n- \"新上线一个 embedding API，你的 top 3 成功指标是什么？\"\n- \"你的 chatbot 上周回答质量掉了 15%，怎么排查？\"（数据漂移/版本/基建）\n\n**国内大厂（字节/百度/腾讯/讯飞/蚂蚁）口径：** 设计题原文公开少，更常以\"深挖你的 AIGC 项目→用了什么模型→是否上线→个人贡献→调研维度\"出现；高阶题考医疗合规、伦理风险、监管突变应对。这正是你三个真实项目的主场。\n\n---\n\n## 加分点（强答案信号）\n\n- **指标说\"幻觉率/P99/编辑采纳率\"，而不是\"engagement\"**——这一条直接区分专业与业余。\n- **主动表态、有产品品味**——不要走完流程却不下判断；面试官要听你的观点，不要\"平衡综述\"。\n- **主动讲取舍**：RAG 还是微调、cheaper 还是 better、proactive 还是 user-control，自己点出来。\n- **显式做\"为失败设计\"**：escape hatch + human-in-the-loop + 置信度提示三件套。\n- **MVP 明确砍范围**：说清砍掉了什么、为什么砍，比堆功能更显成熟。\n- **用项目数据佐证**：\"准确率 97.5%\"\"成本降 80%\"\"投诉率降 85%\"——定量永远胜过\"效果很好\"。\n\n## 雷区（命中就掉分）\n\n- ❌ 把\"框架\"当答案：机械走流程、全程不表态、不下判断。\n- ❌ \"加个 AI 写作按钮\"式表面回答，把 AI 当魔法、不讲机制。\n- ❌ 跳过澄清直接上方案；不区分\"用 AI 做产品\"和\"做 AI 产品\"。\n- ❌ 只报 DAU/活跃度这种虚荣指标，绝口不提幻觉、延迟、成本。\n- ❌ 忽略失败模式：不讲幻觉兜底、不讲超时降级、不讲人工 fallback。\n- ❌ MVP 越铺越大、什么都想做，从不说\"我砍掉了什么\"。\n\n> 临场口诀：**先定位（普通设计题 + 三个 AI 补强层）→ 八步出声走 → 每步用一个项目数据钉死 → 收尾说清 MVP 砍了什么。** 这一套走完，深度追问也很难把你问住。\n", "/04-高频题与答题框架/05-案例分析类高频题.md": "# 案例分析类高频题：拆产品、诊断问题怎么答\n\n> 这一篇治的是面试里最像「真功夫」、也最藏不住的一类题：「你怎么看豆包/Kimi/DeepSeek」「如果重新设计 Kimi 你会改什么」「举一个失败的 AI 产品复盘一下」「AI 客服用量低你怎么诊断」。这类题没有标准答案，考的就是你脑子里有没有一套**拆任何产品、诊断任何问题的稳定框架**，以及有没有一个**有立场的判断**。\n>\n> 对你来说，这一篇尤其关键。你的项目偏垂直、偏 B/G 端，**通用 C 端大众产品的手感是公认的短板**。这篇不让你去硬背豆包的功能列表——背了也会被问穿——而是给你两把万能钥匙（拆解 + 诊断），让你临场套上去也能说成体系。本篇的拆解套路直接复用第 03 章第 10 篇的万能框架，只是把它**收成口语可背的话术 + 范例答案**。\n\n---\n\n## 一、先认清这类题在考什么\n\n字节 AI PM 三面里，三面专考「产品思维深度 + 反直觉洞察 + 用户价值」，这一篇的题大多落在那。面试官把一个产品甩给你、或抛一个异常现象，**不是要听你复述功能，是看两件事**：\n\n1. **你有没有结构**——能不能不慌不乱按一条线把它拆完，而不是想到哪说到哪。\n2. **你有没有立场**——能不能给一个有依据、敢站队的判断，而不是「各有优劣、看场景」这种和稀泥。\n\n所以这类题的得分公式很简单：**框架兜底（不语无伦次）+ 一个有立场的判断（不平庸）+ 数字与口径（不空泛）**。下面两套框架，一套管「拆产品」，一套管「诊断问题」，背熟就够用。\n\n---\n\n## 二、套路一：拆解/评价任何产品（五步口诀）\n\n不管问的是豆包、Kimi 还是一个你压根没用过的产品，都按这五步走。口诀记死：**定位—数据—护城河—商业—判断**。\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef key fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n\n    S1[\"1 定位<br/>替谁解决什么\"]:::step\n    S2[\"2 关键数据<br/>带口径与时点\"]:::step\n    S3[\"3 护城河<br/>别人抄不抄得走\"]:::key\n    S4[\"4 商业模式<br/>怎么赚、赚到没\"]:::step\n    S5[\"5 你的判断<br/>有立场的预测\"]:::key\n\n    S1 --> S2 --> S3 --> S4 --> S5\n```\n\n- **定位**：一句话——它替谁解决了什么问题，本质对手是谁。说不清定位的产品，往往真没想清楚。\n- **关键数据带口径**：这条是结构性加分点。报数必带**口径 + 时点 + 来源**。国内 MAU 各机构口径差异极大（有的算 App、有的算全端、有的含小程序），裸报一个「几亿用户」会被一句「哪家口径、什么时点」打穿。说不准就降级为「据报道大致……」。\n- **护城河**：往「别人抄不抄得走」上追。一条核心判断要刻进脑子——**C 端通用助手的护城河不是模型，是分发**。模型能力会被快速追平，渠道才抄不走。\n- **商业模式**：中美彻底分裂——美国订阅跑通，中国走广告 + 电商抽佣。点出这层显视野。\n- **你的判断**：给一个有立场的预测或反直觉观点。这一步把「分析者」升级成「决策者」，是资深和背稿最大的分水岭。\n\n> 记不全时，至少抓住后三个：**护城河、商业、判断**——最能体现产品判断。\n\n---\n\n## 三、套路二：诊断任何指标异常/用量低（三段式）\n\n「AI 客服用量低」「DAU 突然掉了」「新功能没人用」这类诊断题，吃的是另一套框架——标准数据分析排查法，加上 AI 专属补强。\n\n```mermaid\ngraph TB\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef ai fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S1[\"1 先验真伪与口径<br/>真跌还是埋点坏/定义变\"]:::step\n    S2[\"2 大盘-外部-内部 三分<br/>先排大盘再看内部\"]:::step\n    S3[\"3 下钻定位到最小单元<br/>分维度切+提假设+给验证\"]:::step\n    S4[\"AI补强三层<br/>质量/幻觉 延迟 成本\"]:::ai\n\n    S1 --> S2 --> S3\n    S4 -.-> S3\n    N[\"先说我会先看大盘<br/>是面试官最爱的系统思考信号\"]:::note\n    N -.-> S2\n```\n\n- **第一段 · 先验真伪**：先问「数据怎么来的、指标怎么定义的」。是真下降，还是埋点坏了、口径变了？一上来先质疑数据本身，是高分动作。\n- **第二段 · 大盘 → 外部 → 内部 三分法**：\n  - **大盘/季节**：是不是行业整体在跌（2026 年 DeepSeek、Kimi 的 C 端流量普遍在掉）、节假日、春节投流退潮。\n  - **外部**：竞品动作、政策、应用商店/投流渠道变化。\n  - **内部**：再按「用户漏斗 + 产品改动」拆——哪个环节、哪类用户、哪个时点开始掉，对齐到某次具体发版或改价（豆包 2026.5 推付费版后月活环比掉约 610 万，就是典型的「内部改动」点）。\n- **第三段 · 下钻定位**：按新/老用户、渠道、机型、地区、时段切，定位到最小可解释单元，再提假设、给 A/B 验证方案。\n\n关键加分点：**先说「我会先看是不是大盘问题，再看内部」，绝不一上来就猜功能 bug**——这是面试官最想看到的系统思考信号。\n\n**AI 专属补强（让你像 AI PM 而非普通 PM）**：诊断 AI 产品，普通漏斗之外要额外查三层——**回答质量/幻觉率、响应延迟（首 token + 整段生成）、单位经济/成本**。这三层正是「字节三面反直觉答案」的落点，下面第四节范例 4 会完整走一遍。\n\n---\n\n## 四、四个范例答案：直接背，临场改字\n\n### 范例 1：「你怎么看豆包、Kimi、DeepSeek 的差异？」\n\n用套路一，但不要三个平摆——挑一条主线串起来。这题的主线就是「**护城河来源不同**」。\n\n> 「我会从护城河来源切，这三家走的是三条完全不同的路。**豆包是分发型**——MAU 约 3.45 亿，QuestMobile 2026 一季度口径国内第一，但它赢不是因为模型多强，是字节的流量分发加极致低价加抖音全家桶整合，护城河是渠道，别人抄不走。**Kimi 是单点能力型，C 端掉队但在开发者侧打了翻身仗**——长文本起家、一度冲到千万 MAU，但长文本是‘能力’不是‘壁垒’，巨头一跟进就抹平，C 端 MAU 一年腰斩（2025 年从两千多万掉到九百万上下）；它没坐以待毙，2026 上半年转去做开源 K2 加 agentic coding，靠海外 API 把 ARR 半年做到约 2 亿美元、估值冲到两百亿美元以上——是‘换赛道求生’而不是死掉。**DeepSeek 是生态型**——MAU 一亿出头但连续下滑，它真正的价值不在 C 端那点流量，而在开源加极致低成本，被国内外大量 App 和云厂商接入。\n>\n> 所以如果面试官追问‘谁会赢’，我的判断是：**C 端通用助手这一仗，分发决定生死，豆包的位置最稳；但豆包刚因为推付费版（68/200/500 元三档）月活环比掉了约 610 万，同期千问反而逆势涨了约 1300 万，说明国内一收费就掉用户，商业化和增长是它真正的矛盾**。而 Kimi 和 DeepSeek 都在用同一招回答这道题——**不靠 C 端变现，把价值押在模型能力和生态上**，这恰恰反过来证明了：C 端流量不等于公司价值。」\n\n升华一句：「这三家其实印证了一个判断——**国内 C 端模型能力已经基本追平，竞争的胜负手早从‘模型强不强’转到了‘有没有分发或生态’**。豆包靠分发，DeepSeek 和 Kimi 靠开源生态，谁都没在‘模型本身’上建起壁垒。」\n\n### 范例 2：「如果重新设计 Kimi，你会改什么？」\n\n「重新设计」最忌讳答成堆功能。**必须先给一个取舍立场**，再围绕立场展开。\n\n> 「先说一句背景，免得答偏：Kimi 2026 上半年其实已经在自救——转去做开源 K2 和 agentic coding，主战场挪到了开发者和海外。所以这题我答的是‘在 C 端这一侧，如果让我重做，怎么把长文本这个看家本领变成搬不走的护城河’，而不是空谈一个它没做的方向。\n>\n> 我先表态：我不会再去通用助手的正面战场跟豆包拼分发——那是 Kimi 用流量打不赢、还把自己看家本领稀释掉的死局。核心动作是**战略收敛**：把 C 端 Kimi 重新定位回‘长文本 + 垂直专业人群’的刚需场景，目标用户收窄到研究员、行业分析师、咨询顾问、研究生这类**重度读资料的人**——长文本处理对这群人近乎刚需。\n>\n> 但只收窄人群还不够，长文本本身是‘能力’不是‘壁垒’，迟早被追平。**关键是趁还有千万 MAU 时，把‘读得长’延伸成一个搬不走的工作流闭环**：上传一摞资料 → 自动产出结构化综述和跨文档对比 → 每个结论都能引用定位到原文页码做溯源 → 沉淀进一个可复用的个人知识库。**用户一旦把半年的资料和笔记都沉在这里，迁移成本就高了，这才是锁住专业用户的点——比单纯比谁的上下文更长有壁垒得多。** 定价也跟着场景走，做专业版订阅，而不是在免费内卷里耗死。一句话，我宁可要一百万个肯付费、且数据搬不走的研究员，也不要一千万个薅免费就走的泛用户。」\n\n升华一句：「重新设计一个掉队产品，**第一步永远是‘敢放弃什么’，不是‘再加什么’——找到那个别人抢不走、自己又最强的窄口子。**」\n\n### 范例 3：「举一个失败的 AI 产品，复盘一下原因。」\n\n这是确认的 ★★★ 高频题。雷区有二：举一个无人知晓的小产品（面试官没法验证）、归因停在「营销没做好」这种浅层。**好答案要落到「赛道证伪 vs 执行失误」的归因层级**。\n\n> 「我举 AI 陪伴这条赛道，Character.AI 是最典型的样本。它失败的不是产品力——它的 PMF 来得特别快，角色扮演的体验做得很好，MAU 一度冲到一两千万。**它栽在赛道的根本性问题：留存和付费跑不通。** 用户图新鲜来得快、走得也快，长期留存撑不住；愿意为‘陪聊’持续付费的人远比想象中少。结果是 Character.AI 被迫上全屏广告补订阅收入，国内的星野、猫箱在下滑，冒泡鸭、异世界回响相继关停——**整条赛道是一起被证伪的，这不是单个团队执行不力。**\n>\n> 我的复盘归因分两层：**赛道层，AI 陪伴的价值不可量化、付费意愿天然弱，这是先天的；对比 AI 编程，效果即时可量化、开发者愿意为省时间付费，Cursor 的 ARR 从一亿美元做到二十亿只用了大约一年，同样是 AI 产品，赛道选对了执行的回报是天壤之别。执行层**才是该不该早做留存验证、该不该在 PMF 早期就盯付费曲线而不是只看注册增长。」\n\n升华一句：「失败复盘的功力，**在于能分清是‘赛道证伪’还是‘执行失误’——把所有失败都归到执行，是新手；能看出有些产品是赛道一开始就错了，才是有判断。**」\n\n### 范例 4：「某 AI 客服用量越来越低，你怎么诊断？」（字节三面反直觉题）\n\n这题的陷阱在于：直觉答案是「肯定是回答不准」，而这恰恰是被反问的点。**反直觉答案：先查的不是准确率，是响应速度——用户根本没等到答案就走了，准确率压根没机会被检验。**\n\n> 「我先不预设是‘答得不准’，先验真伪和口径——是真用量降，还是埋点坏了、入口改了。确认是真降之后，我会按 AI 客服专属的漏斗下钻：**进入率 → 首字延迟（TTFT） → 单轮/多轮完成率 → 转人工率 → 解决率与满意度**。\n>\n> **我会重点先看延迟和放弃曲线，而不是先质疑准确率**——这是个反直觉但很关键的点。LLM 客服推理吃 GPU，多轮对话还要反复带上历史上下文，prefill 阶段一长首字就慢；而用户一旦等不到反馈就直接退出流失了，**答案准不准根本没机会被检验**。正常情况下 AI 客服首字能做到一两秒、比人工排队的几十秒快得多，所以速度未必是天生瓶颈；但只要某次发版把模型换大了、上下文塞长了，把首字延迟拉高，放弃率就会陡增——这才是用量下滑最容易被忽略的真因。更细一层，我会分清是**首 token 延迟**（用户感知慢，上流式输出、prompt 缓存就能救）还是**整段生成延迟**（吐字慢，靠量化、小模型分流）——这是两套不同的优化方向。\n>\n> 把延迟排除后，再往后看：是不是转人工的口子太难找、或复杂问题解决率太低（标准化问题往往能答好，一到非标的、要查工单/订单的复杂问题就明显掉下来），导致用户用一次失望就不再用。最后才回到回答质量和幻觉。整个过程我都会对齐到具体发版和用户分层去验证，比如新用户和老用户、不同入口、改版前后分别看放弃率。」\n\n升华一句：「**AI 产品的体验是‘速度、质量、成本’三个轴，新手只盯质量。能想到‘用户在第几秒流失’、能分清首 token 和整段延迟，是 AI PM 和普通 PM 的分界线。**」\n\n---\n\n## 五、高频真题清单（2025-2026，按出现频率排）\n\n- 你怎么看豆包/Kimi/DeepSeek/通义/元宝的差异？（★★★，第一层知识储备题，常点名要你比逻辑能力差异）\n- DeepSeek 和豆包在逻辑能力上的差异？（★★★，套范例 1，落到「能力已追平、胜负手在分发」）\n- 举一个失败的 AI 产品并分析原因。（★★★，套范例 3）\n- 如果重新设计 Kimi/某产品，你会改什么？（★★★，套范例 2，必须先给取舍立场）\n- 你怎么看 AI 对产品行业的影响？（★★★，开放题，给有立场的判断 + 自身使用洞察）\n- 分析 ChatGPT 对行业生态的冲击与机会。（★★，冲击=重定义入口与心智、网页份额从约 87% 跌到约 68% 被 Gemini 稀释；机会=套壳层/垂直 Agent/被稀释出的差异化缝隙）\n- 某 AI 功能/客服用量低，怎么诊断？（★★★，套范例 4 + 三段式）\n- 如何应对 AI 技术泡沫化风险/避免 hype trap？（★★★★，失败复盘的延伸，落到「价值可量化、ROI 算得清才做」）\n- 你平时用哪些 AI 工具？有没有真实用 AI 提效的案例？（★★，第二层实际应用题，准备一个你自己的真实使用故事）\n\n---\n\n## 六、加分点与雷区\n\n**加分点**\n\n- 报数带**口径 + 时点 + 来源**（「QuestMobile 2026 一季度口径」比「三亿多用户」高一个段位）。\n- 诊断题**先判大盘再判内部**，把系统思考喊出声。\n- 给**有立场的判断**而非「各有优劣」——哪怕赌错，也比和稀泥强。\n- AI 题补「质量/延迟/成本」三层，尤其延迟这层，最能区分 AI PM。\n- 高星开放题**主动画框架、给数字推演**——高星题面试官本就会要求你画流程图或详细推演，主动做就是结构性加分。\n- 失败复盘要落到**「赛道证伪 vs 执行失误」**的归因层级。\n\n**雷区**\n\n- 裸报一个 MAU 不带口径——一被追问就崩。\n- 诊断一上来就猜功能 bug，不看大盘。\n- 评价产品只夸「模型强、体验好」，不谈分发与商业化——那是用户的话，不是 PM 的话。\n- AI 客服题落到「就是答得不准」这种直觉答案——恰恰是被反问的点。\n- 「重新设计」答成堆功能、没有取舍立场。\n- 失败复盘举一个无人知晓的小产品，或归因停在「营销没做好」这种浅层。\n\n---\n\n## 七、和你项目的关联：把案例库变成答题能力\n\n你已经在第 03 章把这些产品逐个拆透了——这一篇只是教你**临场怎么把那些素材按框架吐出来、还带上立场**。两点提醒：\n\n第一，**你的弱项是 C 端手感，强项是垂直深度**。被问通用产品时套框架兜住即可（不丢分）；但只要能把话题往「护城河本质」「评估闭环」「单位经济」拐，你就能用杭小育、SAGE-AI 的真功夫反客为主——比如聊护城河，你能立刻举「杭小育的护城河是政务数据壁垒加场景独占，不是模型」，这比空谈豆包的分发更有说服力。\n\n第二，**你的项目本身就是这两套框架的活教材**。诊断题的「先验真伪、再分维度下钻」，正是你做 Badcase 回流、把杭小育准确率摁到 97.5% 的日常；失败复盘的「赛道 vs 执行」归因，你可以反衬自己——「我做的是政务育儿这种价值可量化、刚需明确的赛道，所以努力有回报」。**用框架反过来讲自己的项目，你会讲得比对手更结构化**，这才是这两把钥匙对你真正的价值。\n", "/04-高频题与答题框架/README.md": "# 04 · 高频题与答题框架\n\n面试的开放题最怕「答得散」。这章给每类题一套可套用的结构，让回答有骨架、有层次。\n\n## 计划文件\n\n- `01-设计题万能框架.md` — 「设计一个 AI XX 产品」怎么答（场景→用户→方案→评估→风险）\n- `02-评估题框架.md` — 「如何衡量这个 AI 功能好不好」（北极星→分层指标→评测方法）\n- `03-技术理解类高频题.md` — 原理类追问 + 参考答案（衔接第 01 章）\n- `04-方法论类高频题.md` — 方法论类题 + 参考答案（衔接第 02 章）\n- `05-案例分析类高频题.md` — 拆解/批判类题（衔接第 03 章）\n- `06-商业与战略类高频题.md` — 商业模式、护城河、行业判断\n- `07-估算与费米题.md` — 量级估算题的拆解套路\n- `08-反问环节话术.md` — 问面试官什么显得专业、有思考\n- `09-压力追问应对.md` — 被连环追问、被质疑时怎么稳住\n\n## 定制发力点\n\n每个框架都配一个「用她自己项目作答」的范例，把框架和个人经历缝在一起。\n", "/04-高频题与答题框架/09-压力追问应对.md": "# 压力追问与连环逼问应对（方法篇）\n\n> 这一篇和第 06 章 [《深度追问预案》](/06-个人经历改造/05-深度追问预案.md) 是一对：那篇是针对你三个项目里每个术语、每个百分比的**具体**追问，逐条把口径写死；这篇是**通用方法论**——当面试官连珠炮追问、当场质疑你、把你打断、甚至问到你确实不会的，你怎么稳住节奏、怎么优雅地接住。\n>\n> 先把这一篇的立论钉死：**你准备好的那段 2 分钟答案，只占整道题分数的 20%，剩下 80% 全在追问里。** 一段漂亮的 STAR 在今天只是\"开胃菜\"，后面通常跟着 5 个追问——\"具体多少？\"\"你怎么确认自己是对的？\"\"上线你会改什么？\"。面试官刷追问不是要你秒答对，是在**压力测试你的思维过程和稳定性**。看清这点，你就不会被追问吓住——它考的不是知识检索，是你拆问题、扛压力、随机应变的能力。\n\n---\n\n## 一、心态先立住：追问不是为难，是在看你怎么想\n\n非科班最容易在追问里慌，根因是把追问当\"突袭考试\"——以为答错一个就完了。其实面试官的视角完全不同：他抛出一道开放题只是搭个台子，真正想看的是你被往下挖三层时，**思路会不会塌、情绪会不会乱、能不能边想边讲**。\n\n记住三件事，慌的时候在心里过一遍：\n\n1. **追问是常态，不是事故。** 被追问说明对方对你这段有兴趣、值得往深里挖，是好信号。答完一段就停、对方不追，反而可能是已经判你出局、懒得问了。\n2. **承认推理过程 > 装作什么都懂。** 面试官全程在干一件事——\"how do you know that, prove it\"（你凭什么这么说，证给我看）。你能展示\"我怎么得出这个结论\"，比你给出一个标准答案更值钱。\n3. **每一句都要能自辩。** 你讲出来的每个结论、每个数字，都要建立在你能逐层兜住的推理上。**凡是你自己兜不住的漂亮话，一追就塌**——所以宁可讲得朴素但每句都站得住，也别为了好听抛一个你接不住的概念。\n\n---\n\n## 二、被打断 / 被质疑 / 被逼到不确定时，怎么稳住节奏\n\n这是临场最实用的一节，三个高频场景，每个给你可以直接套的动作。\n\n```mermaid\ngraph TB\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef key fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    A[\"被连环追问 / 打断 / 质疑\"]:::step\n    B[\"1 先停半秒 争取思考时间<br/>这是个好问题 我想一下\"]:::step\n    C[\"2 钻进细节 不打口水仗<br/>用具体口径替代模糊辩论\"]:::key\n    D[\"3 不确定就给有原则的推进<br/>带性能门槛的分阶段灰度\"]:::key\n    E[\"接住追问 把对峙变建设性对话\"]:::step\n\n    A ==> B ==> C ==> D ==> E\n    N[\"脱口而出 永远不如<br/>停半秒给个深思熟虑的回答\"]:::note\n    B -.-> N\n```\n\n**场景一：连珠炮追问，脑子一时空白。** 不要硬挤话，先停半秒争取时间。标准话术：\"这是个好问题，让我想一下（That's a great question, let me think for a second）。\"——用几秒钟换一个想清楚的回答，永远好过脱口而出一句兜不住的。听不清追问的边界时，先反问澄清再答：\"您是想问 A，还是 B 这个角度？\"\n\n**场景二：被当场质疑（\"我觉得这个方案不行 / 这个数据没说服力\"）。** 最容易掉分的反应是泛泛辩论——\"我觉得还是挺有效果的\"。**正确动作是钻进细节，用具体口径把模糊对峙变成建设性对话。** 比如对方质疑\"模型还没准备好上线\"，别空对空，要落到\"它在代表 4% 用户的边缘场景上还有 12% 错误率，所以我建议先灰度这部分场景\"。**具体数字一摆，对峙就变成了协作**——这是顶级加分动作。\n\n**场景三：被逼到\"数据不全 / 不确定怎么办\"。** 千万别冻住、别说\"那就没法决策\"。给一套**有原则的推进方式**，用结构化决策替代僵住。模板答法：\"在信息不全的情况下我不会赌，我会做带明确性能门槛的分阶段灰度——先放 5% 流量，盯住准确率和负反馈率两条线，达到门槛再扩，不达标就回滚。\"这答法等于告诉对方：你不全知道，但你知道**怎么在不全知的情况下安全地往前走**——这正是 AI PM 的核心能力。\n\n---\n\n## 三、\"prove it\" 式追问：报口径三件套（最硬的内功）\n\n只要你报了任何一个数字（杭小育的准确率 97.5%、SAGE 的采纳率 97.5%、孤独症筛查的投诉率降 85%——这三个分属三个项目、口径各不相同，别在嘴上混成一个数），面试官几乎必追\"这个数怎么来的\"。接不住，前面全白讲。把这三件套练成肌肉记忆，任何指标都能随口拆：\n\n1. **分子 / 分母（口径）**——这个百分比到底拿什么除以什么。比如准确率是\"评测集里答对的条数 ÷ 总条数\"。这里要顺带亮一手 AI sense：**precision（查准）是\"所有判为正的里有多少真的对\"，recall（查全）是\"所有真实正例里找回了多少\"，两者通常此消彼长**——误报代价高（如安全告警）就优化 precision，漏报代价高（如疾病筛查）就优化 recall。你能主动说出这个取舍，对方立刻知道你不是只会背一个\"准确率\"。\n2. **测试集（在哪测的）**——主动交代\"在哪个金标准集 / 标注集上测的、多少条、怎么抽样的\"。一句话点透它的作用：准确率回答的是\"给定带标注的数据集，模型多大程度复现了 ground truth\"，AI PM 用它来对比模型版本、抓回归（catch regressions）、决定值不值得拿去做用户测试。\n3. **谁判定（裁判是谁）**——是人工标注、自动指标、还是 LLM-as-judge？**这里有个必须带上的限定，漏了会被技术追问打穿：LLM 当评委经常和人类判断不一致，目前还无法稳定地把幻觉这类打分打到人类水平（它是台\"有偏的测量仪器\"，得用人类金标准持续校准）。** 所以高风险场景的关键事实判定，不能只靠单个 LLM judge 给一个分，要叠人工抽审或多重校验（开发期评测 + 回归测试 + 生产监控三道）。你主动讲出这个局限，比把 LLM judge 吹成万能更显专业。（precision/recall、LLM-as-judge 三类偏差的底层口径见第 01 章 [《模型评估与幻觉》](/01-AI技术速通/10-模型评估与幻觉.md)。）\n\n> 报口径升一层的结构（被追\"那你到底看哪些指标\"时用）：**模型层**（precision / recall / F1，生成式加忠实度、人评）→ **信任与可靠性层**（用户对输出是采纳还是忽略、人工介入率 human-intervention rate）→ **业务层**（任务完成率、节省时间、成本 / 推理、收入）。收一句立场：\"技术指标是输入，业务结果才是真正被 ship 出去的东西。\"\n\n**你的项目随手就能套这套：**\n\n> 追问：\"杭小育那个 97.5% 准确率，凭什么可信？\"\n> 你：\"分子分母是这样——我们建了一个覆盖高频育儿政策问题的金标准集（多少条、怎么抽的我能展开），准确率是这套集上人工判定为'答对且不编造'的条数除以总条数。判定主体是人工标注，不是模型自己打分——因为这是政务场景、答错要出事，我不敢让 LLM 当唯一裁判，LLM judge 和人审在边界 case 上经常不一致。另外我会同时盯幻觉率和拒答率，不是只看准确率一个数，否则会被'自信瞎猜'骗过去。\"\n\n这一段把三件套 + 取舍意识 + 工程兜底全带出来了，**对方基本不会再往下追**——因为他想确认的东西你全主动交代了。\n\n---\n\n## 四、确实不会的，怎么优雅接住（承认 + 推理 + 学习路径）\n\n非科班一定会遇到答不上的题。死法只有一种：**硬编原理**。面试官就是在 prove it，你编一个错的，当场被识破，比承认\"这块我没深入\"难看十倍，而且会让他怀疑你前面讲的真假。\n\n正确的是三段式，按卡住程度选：\n\n- **半懂、能推**：\"我不是 100% 确定，但我会这样推导……\"然后真的推一遍。即便结论不准，**展示你怎么 tackle 问题，本身就在得分**——证明你不轻易放弃。\n- **彻底没接触过**：\"这个我之前没接触过，但我挺想搞懂的，您能带我走一遍吗？\"——把不会转成好奇和求学欲，比尴尬地杵着强得多。面试官看重的恰恰是 honesty + adaptability。\n- **听过但不深**：承认边界 + 给学习路径：\"我知道它大概解决什么问题，但底层细节我还没钻透，最近在补的是 XX，预计能补上。\"——展示你有自我迭代的机制。\n\n**两条红线**：① 绝不编造——录用后被发现更麻烦；② 别表现出明显的不安、慌乱、自我否定。承认不会本身不掉分，慌才掉分。语气要平稳，像在陈述一个事实，不是在认错。\n\n---\n\n## 五、怎么展示\"反直觉洞察\"还站得住\n\n面试到高阶（尤其字节这类偏好开放题、压力面的厂），面试官想看你有没有**和别人不一样、但站得住脚**的判断。但反直觉最怕的是\"为不同而不同\"——一追就塌。安全亮反直觉的公式是**先证据、再结论**：\n\n> 先抛具体口径 / 数据 → 再给反直觉的结论 → 主动说出你为它放弃了什么。\n\n例子（评估题里最经典的反直觉）：\n\n> \"衡量这个 C 端 AI 功能，我不会把 DAU 当北极星——这反而是个陷阱。新功能上线初期 DAU 会被猎奇和新鲜感冲高，看着很美但留不住。我会盯 7 日留存和编辑后采纳率：留存过滤掉一次性猎奇流量，采纳率是用户真信任输出的硬信号。代价是这两个数前期会比 DAU 难看得多，但它们不会骗我。\"\n\n这段之所以站得住，是因为每一句背后都有逻辑兜底（为什么 DAU 会虚高、为什么留存能过滤、采纳率信号在哪），而且你主动认了取舍（\"前期难看\"）。**反直觉 + 能自辩 + 敢认代价**，这三件凑齐，才是面试官眼里的\"有 sense\"，而不是\"嘴硬\"。\n\n同理还有：把安全设成**不可越线的护栏指标**（如无依据回答率、有害内容逃逸率破阈值就阻断发布），明确说\"它和增长指标分开两块看板、不参与任何 trade-off，我不能用多留一个用户去换一次安全事故\"——这就是一个有立场、又站得住的反直觉表态。（护栏指标口径见第 02 章 [《幻觉与安全治理（产品侧）》](/02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)。）\n\n---\n\n## 六、高频追问真题清单（2025-2026，带追问语义）\n\n这些题本身就是\"为了往下追\"而设计的，每道后面我标了它真正想逼出什么：\n\n1. \"你怎么为一个 AI 功能定义成功指标？\"（→ 必追 prove it：分子分母 / 测试集 / 谁判定）\n2. \"讲一次你因为模型没 ready 而砍掉或大幅推迟功能的经历。\"（→ 追\"凭什么判定它没 ready\"，等你报评估门槛）\n3. \"你和数据科学家在模型是否可上线上有分歧时怎么处理？\"（→ 对立 / 反直觉场景，等你落到具体口径而非情绪化坚持）\n4. \"怎么向一个不懂技术的高管解释模型的局限？\"（→ 承认边界 + 翻译能力）\n5. \"讲一次你在数据不全的情况下做产品决策的经历。\"（→ 有原则的结构化推进）\n6. \"离线 ML 指标和在线业务指标怎么平衡？\"（→ 追\"离线涨在线没涨怎么办\"）\n7. \"你怎么衡量用户对 AI 输出的信任？\"（→ 采纳率 / 人工介入率，别只报 DAU）\n\n---\n\n## 七、加分点与雷区\n\n**加分点（追问里能拉开差距的动作）：**\n\n- **定量说话**——\"提升 15%\"\"4% 用户上 12% 错误率\"，而不是\"效果不错 / 有点问题\"。具体数字是追问场最值钱的硬通货。\n- **不等追问就主动报口径、主动讲取舍**——把对方想追的提前交代了，他就没得追，节奏始终在你手里。\n- **展示工程思维**——被追\"上线会出什么问题\"时，主动讲幻觉、超时、降级、监控告警，证明你想过 AI 落地的真实坑。\n- **诚实承认边界 + 给学习路径**——这是非科班把\"知识短板\"转成\"成长型人设\"的唯一正解。\n\n**雷区（命中任意一条，追问当场扣分）：**\n\n- **硬编不会的原理**——最致命，被识破后连带否定你前面的可信度。\n- **被质疑就泛泛辩论 / 情绪化坚持**——不落具体口径的反驳，等于没反驳。\n- **被追到不确定就冻住、说\"那就没法决策\"**——AI PM 的价值恰恰是在不确定里安全推进。\n- **只报虚荣指标（DAU / engagement）当成功标准**——一追\"那留存呢、采纳呢\"就露馅。\n- **明显的慌乱、不安、连续自我否定**——承认不会不掉分，慌才掉分。\n\n最后记住这一篇的总纲：**面试真正考你的，从来不是你背了多少答案，而是答案讲完之后、被往下挖三层时，你还稳不稳。** 把口径三件套练成本能、把\"承认 + 推理 + 学习路径\"练成条件反射，你就把非科班最怕的追问场，变成了最能展示思维质量的主场。\n", "/04-高频题与答题框架/03-技术理解类高频题.md": "# 技术理解类高频题：被问到怎么答\n\n> 这一篇是第 01 章《AI 技术速通》的「应试浓缩版」。第 01 章讲透了「为什么」，这里只解决一件事：**面试官把一个技术名词甩到你脸上，你 30-60 秒怎么答得既准又像 PM。**\n>\n> 技术理解类约占整场面试的 1/4，是非科班最容易被追问问住的雷区，也是讲清楚就能立刻拉开身位的地方。对你来说，难点从来不是「不懂」——你在杭小育、SAGE-AI 里这些都真刀真枪干过——而是「讲不成体系、被深问就慌」。本篇的每道题都给你一段口语可背的话，背熟它，深问来了你有锚点往回收。\n\n---\n\n## 一、先记死这条「PM 答技术题」的评分标准\n\n这是全篇最重要的一段，所有题都套它。面试官问技术题，**不是要听你背定义，是看你会不会把技术翻译成产品判断**。工程师答「它内部怎么算」，PM 答「它对用户和业务意味着什么、代价是什么」。\n\n有句话可以直接当开场立意：**「一个 PM 如果不能推理一项技术的取舍，他就不是 AI 产品的 PM。」** 你的答案要让面试官看到你在权衡，而不是在复读。\n\n每道题统一套这个 30-60 秒结构：\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef plus fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    S1[\"1 一句人话定义<br/>说人听得懂的\"]:::step\n    S2[\"2 怎么工作/为什么<br/>一句机制\"]:::step\n    S3[\"3 产品场景或取舍<br/>成本/延迟/准确率/失败模式\"]:::step\n    S4[\"4 加分点<br/>案例/最新进展/坑\"]:::plus\n\n    S1 --> S2 --> S3 --> S4\n```\n\n还有一条贯穿多题的骨架——**选型决策链**：先 Prompt，不行再 RAG，最后才微调。多数问题是 Prompt 问题；需要私有/最新/动态数据才上 RAG；只有 Prompt+RAG 都搞不定特定格式或行为，才动微调。把这条链挂在嘴边，「RAG vs 微调」「Prompt 工程」这类题就有了统一答案。\n\n---\n\n## 二、十一道高频题 + 可直接背的参考答案\n\n### 1. RAG 是什么？什么时候用？\n\n> 「RAG 是检索增强生成，简单说就是让模型回答前**先去知识库查资料**，再带着查到的内容生成答案，而不是凭记忆瞎编。链路是：文档分块、向量化、存进向量库；用户提问时检索最相关的几段，拼进 Prompt，再让模型基于这些资料作答。它最大的价值是**用外部知识给答案做事实背书，从而压幻觉**，特别适合知识频繁更新、要可溯源的 C 端场景，比如客服、政务问答。我在杭小育做的就是 RAG，育儿政策一变，更新知识库就行，不用重训模型，准确率做到了 97.5%。」\n\n加分点：主动点一句深水区——「召回不准不能只靠改 Prompt 救，得从分块策略、embedding 模型、检索 topK、要不要加 rerank 多个维度排查。」这句话直接把你和只会背定义的人区分开。\n\n### 2. RAG vs 微调，怎么选？\n\n> 「先说我不会二选一。我的默认决策链是**先 Prompt、再 RAG、最后微调**——多数问题 Prompt 就能解决，需要私有或实时知识才上 RAG，只有连风格、格式都要固化才动微调。具体选型我看四个维度：**数据新鲜度、成本、延迟、准确率天花板**。要实时更新、要可溯源、不想重训，选 RAG；要固化输出风格、要垂直领域高精度、要更低推理延迟，选微调。生产里其实常常是 RAG 加微调一起上——RAG 管它‘知道什么’，微调管它‘是什么样’。」\n\n加分点：用一句金句收口——「**RAG 供知识，微调塑形。**把这两个当成可互换，是最常见的架构错误。」这跟第 01 章第 07 篇口径完全一致。\n\n### 3. 幻觉怎么处理？\n\n> 「先纠一个常见误解：**幻觉不是能彻底修掉的 bug，它是大模型训练机制的必然产物**——模型本质是‘预测下一个词’，而评测又普遍惩罚‘我不知道’（答错和弃权都算 0 分），等于在系统性地奖励它‘自信瞎猜’而不是承认不确定。所以产品上只能治理、降低，不能根除。我会打组合拳：**RAG 做事实 grounding 是第一招**，再加 Prompt 约束‘只能基于资料回答’、降低 temperature、关键场景上人在环路审核、必要时偏好微调、用结构化输出收敛。」\n\n加分点（这是 PM 区别于工程师的关键，一定要说）：「但作为 PM，我更关注两件工程师不一定管的事——一是把**可见性和可纠错设计进产品**，展示来源、给置信度、不确定时就老实说‘我不确定’兜底；二是**建一套评测集持续度量**，而且要把**准确率、幻觉率、弃权率三个数一起看**——它们是独立的轴，只盯准确率会被‘自信瞎猜’骗过去。政务育儿是高风险场景，宁可拒答也不能瞎说。杭小育就是靠金标准集加 Badcase 回流把幻觉摁住的。」\n\n### 4. 调整 context window 有什么影响？\n\n> 「context window 是模型一次能‘看到’的最大 token 数，相当于它的短期记忆，现在主流旗舰已经做到 100 万 token，标准款也有 20 万量级。窗口大，能记更长的对话、能塞更长的文档进去；但代价是**算力和成本随之上涨，延迟也会变高**——而且有个关键认知：**广告容量不等于有效容量**，号称 100 万的模型往往到六七十万就开始召回不可靠了，所以不是越大越好。」\n\n加分点：「而且有个反直觉的坑叫 **Lost in the Middle**——模型对开头和结尾更敏感，塞在中间的信息容易被忽略。所以与其无脑加长窗口，不如做**滑动窗口、摘要压缩、按重要性过滤**，把真正关键的信息放在它注意力最强的位置。」\n\n### 5. Prompt 工程有哪些方法？\n\n> 「核心就几条：**说清楚、给上下文、显式指定输出格式、复杂任务拆步骤、给少样本示例（few-shot）、消除歧义**。它是整条优化链里**成本最低的第一选择**，能用 Prompt 解决就别急着上 RAG 或微调。」\n\n加分点：「对 C 端产品我会特别强调 **Prompt 的稳定性和可复现性**——同一个问法不能今天一个样明天一个样，所以我倾向用结构化输出（比如约定 JSON 字段）来保证下游工程能稳定解析。再往上就接思维链，让它分步推理来提准。」\n\n### 6. Agent 是什么？ReAct 和 CoT 又是什么？\n\n> 「Agent 是一个能**自主感知、决策、调用工具、执行任务**的系统。它和普通 Chatbot 或固定 Workflow 的本质区别，是它有三样东西：**规划循环（自己边想边做地推进）、Memory（记忆）、Tools（能调外部工具）**。ReAct 和 CoT 都是让它‘怎么想’的方法，区别在接不接外部反馈：**CoT 思维链是让模型把推理步骤显式写出来再答，只在自己脑子里推，不看外部结果，所以仍会幻觉；ReAct 是 Reasoning 加 Acting 交替——想一步、调一次工具、看真实结果再想下一步，靠观察纠偏，更抗漂移**。我在 SAGE-AI 取数做的就是 Text2SQL Agent，本质就是 ReAct：理解意图、选表、写 SQL、执行、看结果再修正，还把这条推理链路可视化给用户看，采纳率做到了 97.5%。」\n\n加分点（把落点放在 PM 最该懂的「可靠性」上）：「做 Agent 产品，难的从来不是‘让它能做’，是‘让它别乱做’。它会幻觉、会选错工具、会死循环、会一步错步步错。所以我会主动讲兜底：链路可视化把黑盒变白盒、高风险动作前置人工确认、设步数和重试上限、给只读权限收窄破坏面、Badcase 进闭环。一句话——**高风险动作不许 Agent 独自拍板，这是 Agent 产品的底线设计。**」\n\n### 7. Transformer 和 RNN 有什么区别？\n\n> 「最关键的区别是**并行 vs 串行**。RNN 是一个 token 一个 token 顺序处理的，训练慢，而且离得远的信息容易丢，记不住长依赖。Transformer 靠**自注意力机制让所有 token 一次性并行处理**，既能高效捕捉长程依赖，训练又能大规模并行。」\n\n加分点：「一句话总结它为什么是大模型的基石——**正是这种并行能力，才让超大规模预训练在工程上变得可行**，没有它就没有今天的 scaling。」\n\n### 8. 什么是过拟合？\n\n> 「过拟合就是模型**把训练数据背下来了，而不是学到能泛化的规律**——表现就是训练集上分很高，一上新数据就拉胯。经典防治手段有正则化、Dropout、早停、加数据或数据增强、降低模型复杂度。落到微调场景还会多两招：用 LoRA 这类只动少量参数的方式天然不容易过拟合，以及新旧数据混合训练防止灾难性遗忘。」\n\n加分点（PM 视角）：「从产品角度我会强调一句：**线上表现不等于离线指标**。过拟合常常是离线分很漂亮、上线就翻车，所以必须靠**贴近真实分布的评测集加 A/B 监控**才能发现它。」\n\n### 9. LoRA 是什么原理？\n\n> 「LoRA 是低秩适配，属于**参数高效微调（PEFT）**。它的做法是**冻结原模型权重不动，只在 Transformer 层里插入一组很小的可训练矩阵**去学新任务。好处是省显存、训练快、还能保住基座的通用能力，而且可以挂多个不同任务的 adapter。」\n\n加分点：「它真正的产品意义是**把微调的门槛打下来了**——以前微调是大厂专属的烧钱活，LoRA 让中小团队也负担得起，而且一张卡可以挂多个 adapter，特别适合多业务线复用同一个基座。」\n\n### 10. AI、ML、DL 是什么关系？\n\n> 「是包含关系：**AI 包含 ML，ML 包含 DL**。AI 是‘让机器变聪明’这个大目标；机器学习 ML 是其中一条路——用数据学规律；深度学习 DL 又是 ML 里用深层神经网络的那个子集，大模型就属于 DL。」\n\n加分点（这题真正的考点不是定义）：「但我觉得作为 PM，重点不在背这三层，而在**把对的技术匹配到对的问题**——不要为了用 DL 而用 DL。规则系统能解决的事就别上模型，能 Prompt 解决的就别微调，技术选型永远服务于问题本身，这才是 AI sense。」\n\n### 11. 知识蒸馏和量化是什么？\n\n> 「这俩都是给大模型**降本提速**的手段。**知识蒸馏**是用一个大模型当老师，去训一个小模型当学生，让小模型用更少参数逼近大模型的效果。**量化**是降低权重的数值精度——比如从 FP16 降到 INT8 甚至 INT4，省显存、加速推理，代价是损失一点点精度。」\n\n加分点（把技术接回业务）：「它俩都服务于同一个产品目标——**把大模型的成本打下来好落地**，尤其是端侧部署、低延迟这些场景常组合着用。要点明区别：蒸馏换的是更小的模型、量化压的是权重精度，都是在‘模型本身’上省；而我在杭小育做的 CAG 降本 80% 是在‘推理链路’上省——把高频稳定的知识预先缓存、命中时跳过重复检索。抓手不同，但终点是一个：让产品跑得起、用得起。」\n\n---\n\n## 三、被深问时的通用兜底\n\n非科班最怕的是「答完一层，面试官再往下钻一层你就空了」。给你三句保命话术，诚实但不露怯：\n\n- **承认边界再给路径**：「这一层的数学细节我没深究，但我理解它对产品的影响是 X，如果要做决策我会拉上算法同学一起对齐。」——诚实承认知识边界并给学习路径，是明确的加分项，远好过硬编瞎说。\n- **往取舍上收**：被问到答不上的细节，把话头拉回到「不管底层怎么实现，对产品来说它的取舍是成本 / 延迟 / 准确率之间的平衡」——这是你永远的安全区。\n- **用项目兜底**：「这个我在 SAGE-AI / 杭小育里实际踩过，当时的情况是……」——真实经历是最难被问倒的。\n\n---\n\n## 四、雷区清单（自查）\n\n- **只背概念没案例**：每道题答完都要有一句「我在 X 项目里……」，否则就是空中楼阁。\n- **答成工程师版**：堆模型内部术语、不落到产品。记住落点永远是用户价值和取舍。\n- **不提失败模式**：不讲幻觉、超时、降级、Lost in the Middle 这些坑，会被判定为「没真做过」。\n- **被动不讲 trade-off**：不等追问就主动抛取舍，是这类题最大的加分动作。\n- **定性不定量**：说「效果很好」不如说「准确率 97.5%、CAG 降本 80%」——你手里全是数字，别浪费。\n", "/04-高频题与答题框架/02-评估题框架.md": "# 评估题框架：「如何衡量这个 AI 功能好不好」\n\n> 这是一类几乎逢面必考的题。形式很多：「你怎么衡量这个 AI 功能成功？」「上线后你看什么指标？」「离线指标和在线业务指标怎么平衡？」「怎么测用户对 AI 的信任？」——本质都是同一道题：**你能不能把「好不好」这种模糊判断，拆成一套有层次、可度量、有取舍的指标体系。**\n>\n> 这道题对你是送分题：你在杭小育跑过完整的金标准集 + A/B + Badcase 闭环，本来就是答案本体。问题只是要把它讲成框架，而不是讲成「我做过什么」。本篇的口径与第 01 章第 10 篇《模型评估与幻觉》、第 02 章第 04 篇《AI 评估体系》完全一致，互为表里——那两篇讲透「为什么」，这篇教你「面试 5 分钟怎么答」。\n\n---\n\n## 一、为什么这道题能筛掉一半人\n\n面试官问这道题，不是想听指标名词。他在分三层看你：\n\n- **会不会分层**——只会蹦「准确率」「用户满意度」的，第一层就出局。好答案一定是**离线 / 在线 / 护栏**三轴铺开。\n- **懂不懂取舍**——能不能主动说「离线分高不代表业务好」「准确率会被自信瞎猜骗过」，这是 AI sense 的分水岭。\n- **接不接业务**——能不能把模型指标翻译成业务结果（留存、采纳、投诉）。AI PM 的核心价值，就是弥合「技术上惊艳」和「商业上有价值」之间的鸿沟。\n\n一句话记住业界公认的拆解骨架：**衡量一个 AI 功能 =「解决的问题成功了吗」+「用的模型成功了吗」两条线并行**。前者下钻到业务北极星，后者下钻到模型质量与护栏。缺任何一条，都是残答案。\n\n---\n\n## 二、五步答题结构（可临场套用）\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef guard fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S1[\"1 定北极星<br/>这功能为谁解决什么\"]:::step\n    S2[\"2 分层指标<br/>离线 + 在线 + 护栏\"]:::step\n    S3[\"3 评测方法<br/>金标准/judge/AB/人工\"]:::step\n    S4[\"4 讲取舍<br/>离线vs在线 怎么平衡\"]:::guard\n    S5[\"5 闭环迭代<br/>Badcase 回流\"]:::step\n\n    S1 --> S2 --> S3 --> S4 --> S5\n    S1 --- N1[\"先问场景: 高风险还是娱乐<br/>错了护栏口径全不同\"]:::note\n```\n\n**第一步：先定北极星，别急着报指标。** 开口先反问 / 锚定场景：这功能为谁解决什么问题？是政务问答（错了出事）还是娱乐生成（猎奇就行）？场景决定了后面所有指标的权重。北极星只能有一个——它回答「这功能存在的根本理由是否被满足」，比如杭小育是「家长有没有真的拿到准确的育儿政策答案」。\n\n**第二步：分层指标，三轴铺开。** 这是答案主体（下一节展开）：离线模型质量、在线业务/体验、护栏不可越线。\n\n**第三步：说清每层用什么方法测。** 金标准集、LLM-as-judge、A/B、人工抽审，各管一摊，不能混。\n\n**第四步：主动讲取舍。** 不等追问就说「离线涨不代表在线涨」——这是最大的加分动作。\n\n**第五步：收在闭环上。** 衡量不是一次性打分，是「捞 Badcase → 归因 → 回灌金标准集」转起来的趋势。\n\n---\n\n## 三、分层指标：答案的主体（背熟这张表）\n\n| 层 | 看什么 | 典型指标 | 谁是裁判 |\n|---|---|---|---|\n| **离线（上线前）** | 模型/答案质量 | 准确率、相关性、忠实度（幻觉的反面） | 金标准集 + 代码校验 + LLM-as-judge |\n| **在线（上线后）** | 真实业务与体验 | 采纳率、留存、负反馈率、人工介入率、覆盖率 | A/B 测试 + 真实流量 |\n| **护栏（不可越线）** | 安全与信任 | 幻觉率（grounded）、引用覆盖率、策略违规率、过滤器误报漏报、事故平均解决时长 | 检测器 + 人工 |\n\n三个关键认知，讲出来就显专业：\n\n1. **准确率和幻觉率是两根独立的轴，不是 `幻觉率 = 1 − 准确率`。** 一个功能可以「准确率高、幻觉率也高」——它知道得多但拒绝承认无知，不确定也硬答。所以高风险场景必须**同时报准确率 / 幻觉率 / 弃权率三个数**，只看一个会被「自信瞎猜」骗过。\n\n2. **护栏是「不可越线」的护栏指标，不是「越高越好」的优化指标。** ChatGPT 那个经典强答案就是这个逻辑：把 safety 设成不可触碰的红线（比如 safety incidents < 1%），它不参与和别的指标做 trade-off——你不能用「多留一个用户」去换「多一次安全事故」。\n\n3. **行为提升量（behavioral lift）比绝对值更可信。** 搜索类、个性化类功能尤其如此：与其报「相关性 4.5 分」，不如报「用户的重复查询减少了 X%、query 改写减少了 Y%」——用户用脚投票，比任何打分都硬。\n\n---\n\n## 四、评测方法：每层用什么测\n\n- **离线金标准集**：领域专家标的「题 + 标准答案」，是整个体系的地基。每次改 prompt、换模型、调召回都跑一遍，分数涨跌一目了然。能代码精确判定的（格式、数字、SQL 能不能跑通）写断言；判不了的主观题（语气、连贯）才上 LLM-as-judge。\n- **LLM-as-judge**：可扩展、能解释，但它是**有偏的测量仪器**——有冗长偏差（偏爱长答案）、位置偏差、自我增强偏差，必须用人类金标准持续校准，报分带置信区间。这句话一说，面试官就知道你真落地过。\n- **A/B 测试**：在线最终裁决。新旧版本对照，看采纳率、留存、负反馈这些真实业务指标。**先建 baseline 再测相对 lift，并按用户分群看组间差异**（新用户的猎奇流量和老用户的真实使用，反应往往相反）。\n- **人工抽审 + 用户点踩**：领域专家定期抽审兜底，用户点赞点踩是最廉价的线上反馈源。\n\n---\n\n## 五、三个高频追问的标准答法\n\n**离线指标 vs 在线业务指标怎么平衡？**\n分工，不是二选一。离线 eval 做「快速、低成本的迭代闸门」——每次提交都跑，挡住明显退步；在线 A/B + 业务北极星做「最终裁决」。警惕两个坑：一是 **Goodhart 定律**（指标一旦成了目标就会被刷分，团队会过拟合评估集而不是真让用户满意），所以盯的是真实结果不是分数；二是别只看准确率，不平衡数据里它会骗人（95% 的 case 本就该通过，一个永远输出「通过」的傻裁判也能拿 95%）。**离线涨了在线没涨，恰恰是下一轮错误分析的信号——说明评估集没对齐真实价值。**\n\n**怎么测用户对 AI 的信任？**\n信任不是单一指标，**客观 + 主观双轨**。客观侧看可观测指标：grounded 任务上的幻觉率、引用覆盖率、策略违规率——答得有据可查、可溯源，信任才有地基。主观侧看用户行为：满意度评分、采纳率、功能的 opt-in 留存率、负反馈率。信任的产品因果链是：**可溯源 → 用户敢用 → 采纳率上去 → 留存上去**。所以我把「引用溯源 + 置信度信号 + 兜底拒答」当成可量化的信任工程，而不是一句空话。\n\n**个性化 AI 功能怎么做 A/B？**\n四个要点。① 先建 baseline，测的是**相对 lift** 不是绝对值；② 必须**分群看**——个性化对重度用户和新用户的影响常常相反，整体均值会把信号洗没；③ 评估口径用**行为提升量**（重复查询减少、停留时长、完成率），别用绝对相关性分；④ 长期挂着**模型漂移监控**——个性化模型会随数据分布变化而退化，A/B 赢了不等于一劳永逸。\n\n---\n\n## 六、完整范例：用杭小育走一遍\n\n> 假题：「拿你的杭小育举例，你怎么衡量这个育儿问答功能做得好不好？」\n\n「我分四步答。\n\n**第一，先定北极星。** 杭小育是 C 端政务育儿 RAG，460 万用户、日活 21.5 万。它的存在理由是『家长能不能拿到准确、可信、覆盖得到的育儿政策答案』——所以我的北极星不是 DAU，是**问题解决率**：用户问的，到底有没有被准确回答、且他认了。\n\n**第二，分层指标。** 离线我建了金标准集，量三个维度：**准确率**（关键政策数字、结论对不对，能代码校验的就断言）做到 97.5%，拍照营养分析 98%；**相关性**（答的是不是他问的，主观，上 LLM-as-judge 按 rubric 打分）；**忠实度**（有没有超出检索材料瞎编）。在线我跑 A/B，盯**采纳率、负反馈率、人工介入率**，检索**覆盖率提升了 34%** 就是 A/B 量出来的。\n\n**第三，护栏不可越线。** 政务育儿是高风险场景，宁可拒答也不能编错一个补贴政策。所以幻觉率是不可触碰的红线——我用 RAG 接地 + 引用溯源 + 兜底拒答把它压在安全基线下，**同时报准确率、幻觉率、弃权率三个数**，绝不只拿 97.5% 一个数糊弄。\n\n**第四，闭环。** 我把线上 Badcase 标准化捞回来、做归因、回灌金标准集，让评估集随用户量越长越厚。所以『好不好』对我不是一个静态分数，是这套闭环转出来的趋势。\n\n**最后我会补一句取舍**：离线 97.5% 不等于业务就好。C 端我特别警惕『答得准但留不住』——RevenueCat 2026 报告的数据是 AI 应用每用户营收比非 AI 高 41%、但流失快 30%（年留存 21% vs 31%），转化好不代表留得住，所以我会把留存归因也做进 Badcase 闭环，翻流失用户最后几条对话找体验断点。」\n\n这套答完，分层、取舍、定量、闭环、C 端 sense 全齐了，且全程用自己的项目佐证。\n\n---\n\n## 七、高频真题清单（按出处）\n\n| 题 | 出处 / 类型 | 答题抓手 |\n|---|---|---|\n| 如何为一个 AI 功能定义成功指标？ | Perplexity（考点，非逐字真题） | 问题线 + 模型线双轴下钻 |\n| 你上线一个新 embedding 模型 API，top 3 成功指标是什么？ | AI 基础设施 PM 题型（考点） | 区分技术指标（accuracy/latency/throughput）与业务指标（adoption/retention/revenue） |\n| 离线 ML 指标 vs 在线业务指标怎么平衡？ | 通用高频 | 闸门 vs 裁决分工 + Goodhart |\n| 个性化 AI 功能怎么做 A/B？ | 通用高频 | baseline + 相对 lift + 分群 + 漂移监控 |\n| 如何衡量用户对 AI 功能的信任？ | 通用高频 | 客观护栏指标 + 主观行为指标双轨 |\n| 语义搜索功能怎么衡量成功？ | Teal 题库 | 行为提升量（重复查询/改写减少） |\n| 上线后模型不及预期，你看什么、怎么定位？ | 行为面高频 | 在线指标下跌 → 捞 Badcase → 错误分析归因 |\n\n---\n\n## 八、加分点（主动做，不等追问）\n\n- **定量说效果**：说「准确率 97.5%、覆盖率 +34%」，不说「效果挺好」。数字是 AI PM 的信用货币。\n- **主动讲取舍**：不等问就说「离线高不代表在线好」「护栏不参与 trade-off」——展示判断力。\n- **三个数一起报**：准确率 / 幻觉率 / 弃权率同时给，瞬间区别于只会背准确率的人。\n- **接业务**：把模型指标翻译成留存、采纳、投诉。技术指标涨了对生意意味着什么，你得说得出。\n- **收在闭环**：「衡量是趋势不是快照」，把指标和 Badcase 飞轮缝起来。\n\n## 九、雷区（命中就掉分）\n\n- 只报一个准确率就完事——被「准确率高、幻觉率也高」一追问就崩。\n- 把 safety 当成可优化指标去和留存做 trade-off——安全是红线，不上谈判桌。\n- 离线在线不分，把金标准集分数当成业务好坏的最终证据。\n- 个性化 A/B 只看整体均值，不分群——信号被洗没。\n- 泛泛而谈不带项目——「我会看用户满意度和留存」这种话谁都会说，没有杭小育的 97.5% 和 +34% 佐证，等于没答。\n- 忘了讲闭环——只答「怎么打分」不答「分数怎么驱动迭代」，缺了 AI PM 最值钱的那块。\n\n---\n\n**口径互参**：本篇与第 01 章第 10 篇《模型评估与幻觉》（准确率/幻觉率独立轴、LLM-as-judge 三大偏差、金标准集怎么建）、第 02 章第 04 篇《AI 评估体系》（eval 是新 PRD、错误分析闭环、Goodhart、C 端留存）共用同一套口径，追问到深处随时可向那两篇借弹药。真题题型与考点已于 2026-06 核证（Teal / Exponent / Aakash Gupta AI PM Playbook / Fiddler AI 护栏指标 / RevenueCat《State of Subscription Apps 2026》：AI 应用每用户营收 +41%、流失快 30%，年留存 21.1% vs 30.7%）；标注为「考点」的题为强佐证题型而非逐字真题，面试前请再快速复核时效。\n"};

    <script>
      // Mermaid 渲染插件
      (function () {
        function renderMermaid() {
          const mermaidBlocks = document.querySelectorAll(
            'pre[data-lang="mermaid"] code'
          );
          mermaidBlocks.forEach((block, index) => {
            const pre = block.parentElement;
            const code = block.textContent;
            const container = document.createElement("div");
            container.className = "mermaid";
            container.setAttribute("data-original-code", code);
            container.textContent = code;
            pre.parentNode.replaceChild(container, pre);
          });

          if (window.mermaid) {
            mermaid.init(
              undefined,
              document.querySelectorAll(".mermaid:not([data-processed])")
            );
          }
        }

        // Mermaid 全屏预览：点击 SVG 打开；打开即居中适配屏幕；缩放围绕中心/光标，不漂移
        var IV_ICON = {
          minus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>',
          plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
          fit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>',
          close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
        };
        function openViewer(svg) {
          if (!window.Panzoom) return;
          var vb = svg.viewBox && svg.viewBox.baseVal;
          var rect = svg.getBoundingClientRect();
          var natW = (vb && vb.width) || rect.width || 800;
          var natH = (vb && vb.height) || rect.height || 600;
          var blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: "image/svg+xml;charset=utf-8" });
          var url = URL.createObjectURL(blob);

          var overlay = document.createElement("div"); overlay.className = "iv-overlay";
          var stage = document.createElement("div"); stage.className = "iv-stage";
          var img = document.createElement("img"); img.src = url; img.draggable = false;
          stage.appendChild(img); overlay.appendChild(stage);

          var bar = document.createElement("div"); bar.className = "iv-toolbar";
          function mkBtn(icon, title) { var b = document.createElement("button"); b.type = "button"; b.title = title; b.setAttribute("aria-label", title); b.innerHTML = icon; bar.appendChild(b); return b; }
          var bOut = mkBtn(IV_ICON.minus, "缩小 (-)");
          var bFit = mkBtn(IV_ICON.fit, "适配屏幕 (0 / 双击)");
          var bIn = mkBtn(IV_ICON.plus, "放大 (+)");
          var sep = document.createElement("div"); sep.className = "iv-sep"; bar.appendChild(sep);
          var bClose = mkBtn(IV_ICON.close, "关闭 (Esc)");
          overlay.appendChild(bar);

          var hint = document.createElement("div"); hint.className = "iv-hint";
          hint.textContent = matchMedia("(pointer: coarse)").matches ? "双指缩放 · 单指拖动 · 双击适配" : "滚轮缩放 · 拖拽平移 · 双击适配 · Esc 关闭";
          overlay.appendChild(hint);
          document.body.appendChild(overlay);

          function fit() {
            var s = Math.min((window.innerWidth * 0.92) / natW, (window.innerHeight * 0.84) / natH);
            img.style.width = (natW * s) + "px"; img.style.height = (natH * s) + "px";
          }
          fit();

          var pz = Panzoom(stage, { maxScale: 16, minScale: 0.4, step: 0.3, cursor: "grab" });
          stage.addEventListener("wheel", function (e) { pz.zoomWithWheel(e); }, { passive: false });
          // 移动端：双指捏合缩放（panzoom 默认不接管 pinch，这里补上；单指拖动平移仍交给 panzoom）
          var _pd = 0, _ps = 1;
          stage.addEventListener("touchstart", function (e) {
            if (e.touches.length === 2) { var a = e.touches[0], b = e.touches[1]; _pd = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); _ps = pz.getScale(); }
          }, { passive: false });
          stage.addEventListener("touchmove", function (e) {
            if (e.touches.length === 2 && _pd) { e.preventDefault(); var a = e.touches[0], b = e.touches[1]; var d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); var s = Math.max(0.4, Math.min(16, _ps * d / _pd)); pz.zoomToPoint(s, { clientX: (a.clientX + b.clientX) / 2, clientY: (a.clientY + b.clientY) / 2 }); }
          }, { passive: false });
          stage.addEventListener("touchend", function (e) { if (e.touches.length < 2) _pd = 0; });
          requestAnimationFrame(function () { overlay.classList.add("active"); });

          function doFit() { fit(); pz.reset({ animate: true }); }
          bIn.onclick = function () { pz.zoomIn({ animate: true }); };
          bOut.onclick = function () { pz.zoomOut({ animate: true }); };
          bFit.onclick = doFit;
          stage.addEventListener("dblclick", doFit);
          window.addEventListener("resize", doFit);

          function close() {
            overlay.classList.remove("active");
            document.removeEventListener("keydown", onKey);
            window.removeEventListener("resize", doFit);
            setTimeout(function () { try { pz.destroy(); } catch (e) {} overlay.remove(); URL.revokeObjectURL(url); }, 200);
          }
          bClose.onclick = close;
          overlay.addEventListener("click", function (e) { if (e.target === overlay) close(); });
          function onKey(e) {
            if (e.key === "Escape") close();
            else if (e.key === "+" || e.key === "=") pz.zoomIn({ animate: true });
            else if (e.key === "-" || e.key === "_") pz.zoomOut({ animate: true });
            else if (e.key === "0") doFit();
          }
          document.addEventListener("keydown", onKey);
        }
        function setupPanzoom() {
          document.querySelectorAll(".mermaid svg").forEach((svg) => {
            if (svg._panzoomBound) return;
            svg._panzoomBound = true;
            svg.style.cursor = "zoom-in";
            svg.addEventListener("click", function () { openViewer(svg); });
          });
        }

        if (window.$docsify) {
          window.$docsify.plugins = [].concat(
            window.$docsify.plugins || [],
            function (hook) {
              hook.doneEach(function () {
                setTimeout(function () {
                  renderMermaid();
                  // 等 Mermaid 渲染完 SVG 后再绑定 Panzoom
                  setTimeout(setupPanzoom, 500);
                }, 50);
              });
            }
          );
        }
      })();
    </script>

    <script>
/* ============================================================
   AnimCore —— 动画挂载框架
   用法（markdown 内，极简单标签）：
     <div class="anim" data-anim="ioc-injection"></div>
   动画模块（一动画一文件，自带 title/caption）：
     AnimCore.register('ioc-injection',
       function (stage, host, util) { ...; return { play, reset }; },
       { title: 'IoC 依赖倒置注入', caption: '实线=import 依赖（向下）·虚线=运行时调用（向上不 import）' });
   （markdown 里若仍写 data-title / data-caption 则覆盖 JS 里的，向后兼容）
   ============================================================ */
window.AnimCore = (function () {
  var registry = {};

  function register(name, factory, meta) { registry[name] = { factory: factory, meta: meta || {} }; }

  // 读取当前主题色（从 body 读：CSS 变量会从 :root 继承，且兼容 body.dark / html[data-theme] 两种主题约定）
  function colors() {
    var s = getComputedStyle(document.body || document.documentElement);
    function v(n, d) { var x = s.getPropertyValue(n).trim(); return x || d; }
    return {
      bg: v('--bg-card', '#131a2b'),
      fg: v('--fg', '#e6ecff'),
      soft: v('--fg-soft', '#aab4d4'),
      mut: v('--fg-mut', '#6c7795'),
      border: v('--border', '#1f2940'),
      accent: v('--accent', '#5ed1ff'),
      accent2: v('--accent2', '#a78bfa'),
      accent3: v('--accent3', '#34d399'),
      warn: v('--warn', '#fbbf24'),
      danger: v('--danger', '#fb7185')
    };
  }

  function svgEl(tag, attrs) {
    var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function mountAll() {
    var list = document.querySelectorAll('.anim[data-anim]');
    Array.prototype.forEach.call(list, function (el) {
      if (el.__mounted) return;
      el.__mounted = true;
      var name = el.getAttribute('data-anim');
      var entry = registry[name];
      var factory = entry && entry.factory;
      var meta = (entry && entry.meta) || {};

      // 标题 / 说明：优先 markdown 的 data-*，否则取动画 JS 自带的 meta
      var title = el.getAttribute('data-title') || meta.title;
      var caption = el.getAttribute('data-caption') || meta.caption;
      if (caption) el.setAttribute('data-caption', caption); // 供 .anim::after 显示
      if (title) {
        var t = document.createElement('div');
        t.className = 'anim-title';
        t.textContent = title;
        el.appendChild(t);
      }
      // 舞台
      var stage = document.createElement('div');
      stage.className = 'anim-stage';
      stage.style.padding = '8px 10px 10px';
      el.appendChild(stage);

      if (!factory) {
        stage.innerHTML = '<div style="padding:24px;color:var(--fg-mut)">⏳ 动画「' + name + '」排期中（见 BUILD-PLAN 动画清单）</div>';
        return;
      }

      // 工具栏（重播）
      var bar = document.createElement('div');
      bar.className = 'anim-toolbar';
      var replay = document.createElement('button');
      replay.className = 'anim-btn';
      replay.textContent = '↻';
      replay.title = '重播';
      bar.appendChild(replay);
      el.appendChild(bar);

      var api = {};
      try {
        api = factory(stage, el, { colors: colors, svg: svgEl }) || {};
      } catch (e) {
        console.error('[anim]', name, e);
        stage.innerHTML = '<div style="padding:20px;color:var(--danger)">动画出错：' + e.message + '</div>';
        return;
      }

      replay.addEventListener('click', function () {
        if (api.reset) api.reset();
        if (api.play) api.play();
      });

      var played = false;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting && !played) {
            played = true;
            if (api.play) api.play();
          }
        });
      }, { threshold: 0.3 });
      io.observe(el);
    });
  }

  return { register: register, mountAll: mountAll, colors: colors, svg: svgEl };
})();

</script>
    <script>
/* 自回归生成动画：给定前文「今天天气真」，模型对下一个词输出概率分布
   （好0.6 / 不错0.2 / 冷0.1…），采样选中一个追加到序列，再以新序列预测下一个，
   循环数步；结尾点出「它在猜统计上最可能的下一个词，不是查真相——这正是幻觉的根源」。 */
AnimCore.register('autoregressive', function (stage, host, util) {
  var C = util.colors();
  var S = util.svg;
  var has = !!window.gsap;

  var W = 760, H = 300;
  var svg = S('svg', { viewBox: '0 0 ' + W + ' ' + H, width: '100%' });
  stage.appendChild(svg);

  function text(x, y, str, o) {
    o = o || {};
    var t = S('text', { x: x, y: y, fill: o.fill || C.fg, 'font-size': o.size || 12,
      'font-family': 'ui-sans-serif, system-ui', 'text-anchor': o.anchor || 'middle', 'font-weight': o.weight || 400 });
    t.textContent = str; return t;
  }

  // —— 序列区（顶部）：已生成的 token 链 ——
  var seqY = 40, tokH = 34, gap = 8, padX = 12;
  var seqLayer = S('g', {});
  svg.appendChild(seqLayer);

  // —— 概率分布区（底部）：候选词 + 概率条 ——
  // 每一步的候选分布（按概率降序）
  var STEPS = [
    { ctx: ['今天', '天气', '真'], cands: [ { w: '好', p: 0.6 }, { w: '不错', p: 0.2 }, { w: '冷', p: 0.1 }, { w: '热', p: 0.06 } ], pick: 0 },
    { add: '好', cands: [ { w: '，', p: 0.45 }, { w: '啊', p: 0.3 }, { w: '呢', p: 0.15 }, { w: '。', p: 0.07 } ], pick: 1 },
    { add: '啊', cands: [ { w: '，', p: 0.5 }, { w: '！', p: 0.32 }, { w: '…', p: 0.12 } ], pick: 1 }
  ];

  var barX = 250, barY0 = 150, barRowH = 30, barMaxW = 300, labelX = 200;
  var distLayer = S('g', {});
  svg.appendChild(distLayer);
  svg.appendChild(text(labelX, barY0 - 22, '下一个词的概率分布', { anchor: 'end', fill: C.mut, size: 11.5, weight: 600 }));

  // 旁白
  var cap = text(W / 2, H - 14, '', { fill: C.accent, size: 13, weight: 600 });
  svg.appendChild(cap);

  // —— 工具：测量文本宽度（用临时 text 估算，回退按字数）——
  function tokWidth(str) {
    return Math.max(46, str.length * 15 + padX * 2);
  }

  // 渲染序列为一排 token，返回每个 token 的 {rect,label,x,w}
  function renderSeq(tokens) {
    while (seqLayer.firstChild) seqLayer.removeChild(seqLayer.firstChild);
    var x = padX, items = [];
    tokens.forEach(function (tk) {
      var w = tokWidth(tk.text);
      var r = S('rect', { x: x, y: seqY, width: w, height: tokH, rx: 9,
        fill: tk.fresh ? C.soft : C.bg, stroke: tk.fresh ? C.accent3 : C.border,
        'stroke-width': tk.fresh ? 1.8 : 1.4 });
      seqLayer.appendChild(r);
      var lab = text(x + w / 2, seqY + 22, tk.text, { weight: 700, size: 14,
        fill: tk.fresh ? C.accent3 : C.fg });
      seqLayer.appendChild(lab);
      items.push({ rect: r, label: lab, x: x, w: w });
      x += w + gap;
    });
    return items;
  }

  // 渲染某一步的候选分布，返回行数组 {bar,wln,nameNode,pNode,p,w}
  function renderDist(cands) {
    while (distLayer.firstChild) distLayer.removeChild(distLayer.firstChild);
    var rows = [];
    cands.forEach(function (c, i) {
      var y = barY0 + i * barRowH;
      var name = text(labelX, y + 14, c.w, { anchor: 'end', weight: 700, size: 13 });
      distLayer.appendChild(name);
      // 轨道
      var track = S('rect', { x: barX, y: y + 3, width: barMaxW, height: 14, rx: 7, fill: C.soft, opacity: .5 });
      distLayer.appendChild(track);
      // 概率条（初始宽 0）
      var fullW = barMaxW * c.p;
      var bar = S('rect', { x: barX, y: y + 3, width: 0, height: 14, rx: 7, fill: C.accent });
      distLayer.appendChild(bar);
      var pTxt = text(barX + 6, y + 14, '', { anchor: 'start', fill: C.mut, size: 11, weight: 600 });
      distLayer.appendChild(pTxt);
      rows.push({ name: name, track: track, bar: bar, pTxt: pTxt, p: c.p, fullW: fullW, y: y });
    });
    return rows;
  }

  var seqItems = [];

  function reset() {
    var base = STEPS[0].ctx.map(function (w) { return { text: w, fresh: false }; });
    seqItems = renderSeq(base);
    renderDist([]);
    cap.textContent = '';
    cap.setAttribute('fill', C.accent);
  }

  function staticFinal() {
    // 兜底：直接给最终序列 + 第一步分布的终态
    var tokens = [
      { text: '今天', fresh: false }, { text: '天气', fresh: false }, { text: '真', fresh: false },
      { text: '好', fresh: true }, { text: '啊', fresh: true }, { text: '！', fresh: true }
    ];
    renderSeq(tokens);
    var rows = renderDist(STEPS[0].cands);
    rows.forEach(function (r) {
      r.bar.setAttribute('width', r.fullW);
      r.pTxt.textContent = r.p.toFixed(2);
    });
    cap.textContent = '逐词接龙：每步挑统计上最可能的词，不是查真相——这是幻觉的根源';
  }

  function play() {
    reset();
    if (!has) { staticFinal(); return; }

    var tokens = STEPS[0].ctx.map(function (w) { return { text: w, fresh: false }; });
    var tl = gsap.timeline();

    tl.call(function () { cap.textContent = '① 给定前文「今天天气真」，问：下一个词是什么？'; });

    STEPS.forEach(function (step, si) {
      // 第 2、3 步：先把上一步选中的词作为「已确定」追加进序列
      if (si > 0) {
        tl.call(function () {
          tokens = tokens.map(function (t) { return { text: t.text, fresh: false }; });
          tokens.push({ text: step.add, fresh: false });
          seqItems = renderSeq(tokens);
          cap.textContent = '② 以新序列为前文，再预测下一个词';
        });
        tl.to({}, { duration: .35 });
      }

      // 渲染该步分布并逐条「长出」概率条
      var rowsRef = { rows: null };
      tl.call(function () {
        rowsRef.rows = renderDist(step.cands);
        cap.textContent = si === 0
          ? '② 模型对下一个词输出一个概率分布'
          : '② 又是一组候选概率（上下文变了，分布也变了）';
      });
      tl.add(function () {
        var rows = rowsRef.rows;
        rows.forEach(function (r) {
          gsap.to(r.bar, { attr: { width: r.fullW }, duration: .5, ease: 'power2.out' });
          gsap.to(r, { p: 0, duration: .5, ease: 'power2.out',
            onUpdate: function () { r.pTxt.textContent = (r.fullW / barMaxW).toFixed(2); } });
          r.pTxt.textContent = r.p.toFixed(2);
        });
      });
      tl.to({}, { duration: .65 });

      // 采样：高亮选中的候选行
      tl.call(function () {
        var rows = rowsRef.rows;
        rows.forEach(function (r, i) {
          var on = (i === step.pick);
          r.bar.setAttribute('fill', on ? C.accent3 : C.accent);
          r.bar.setAttribute('opacity', on ? 1 : .35);
          r.name.setAttribute('fill', on ? C.accent3 : C.mut);
        });

    { w: '了',   wt: 0.08 },

    { w: '它',   wt: 0.00 },   // 当前正在生成 / 理解的词

/* 准确率与幻觉率是两根独立的轴：

    <script>
/* 成本/延迟/质量三角与 CAG 命中：

   命中走绿色快速路径直接返回（跳过召回+生成），未命中才走完整链路并写回缓存。
   对比两条路径的长短，点出"CAG 降的是重复计算的成本"。 */
AnimCore.register('cost-triangle', function (stage, host, util) {
  var C = util.colors();

  edge(0, 1); edge(1, 2); edge(2, 0);

  // 顶点圆 + 标签
  var verts = [];
  V.forEach(function (v) {
    var c = S('circle', { cx: v.x, cy: v.y, r: 30, fill: C.bg, stroke: C.accent, 'stroke-width': 2 });
    svg.appendChild(c); verts.push(c);
    svg.appendChild(text(v.x, v.y + 1, v.t, { weight: 700, size: 14, fill: C.fg }));
    svg.appendChild(text(v.x, v.y + 17, v.s, { fill: C.mut, size: 9.5 }));

  svg.appendChild(text(TX, 232, '挑两个，舍一个', { fill: C.mut, size: 11, weight: 600 }));

  /* ============ 右侧：CAG 缓存命中路径 ============ */

  svg.appendChild(qBox);

  svg.appendChild(text(qx + 46, ey + 12, '一次提问', { fill: C.mut, size: 9.5 }));

  svg.appendChild(cacheBox);
  svg.appendChild(text(cacheX + cacheW / 2, ey - 4, '查 KV 缓存', { weight: 700, size: 12, fill: C.fg }));
  svg.appendChild(text(cacheX + cacheW / 2, ey + 12, '命中？', { fill: C.accent3, size: 9.5, weight: 600 }));

  svg.appendChild(writeBack);
