判断权交还给用户：用户看得懂 SQL，就能自己判断对不对，信任建立在\"我自己看见了\"，而不是\"系统说它对\"。本质是把用户从被动的操作者变成主动的监督者——这也是为什么它能直接拉高采纳率，因为用户审得动、才敢采纳。\n\n**Q3：采纳率 97.5% 怎么来的？是不是 SQL 语法跑得通的比例？**\n\nA：不是语法跑得通——**语法跑得通离业务价值还差很远**。一条 SQL 可能能执行，但选错了表、用错了口径，结果是错的。所以我的核心评估指标不是字符串层面的匹配，是**执行准确率（结果集对不对）加上人工采纳反馈**。采纳率衡量的是\"模型给的结果，用户最终直接拿去用、不返工\"的比例。这是个闭环指标：线上每次取数都留痕，用户采没采纳、改没改 SQL 都进数据，再回灌优化。所以 97.5% 是\"执行准确 + 人工真的认可\"两个一起达标的比例，比单看 SQL 能不能跑更接近业务真值。\n\n> 补一句加分的：评 Text2SQL 千万别用\"和参考 SQL 的字符串相似度（exact match）\"当主指标——那东西分数虚高、但结构可能有缺陷、执行准确率反而低。要用**执行准确率（Execution Accuracy，结果集是否一致）**为主。这是高频加分点，也是新手最容易答错的坑。（评估口径呼应第 01 章 [《模型评估与幻觉》](/01-AI技术速通/10-模型评估与幻觉.md)。）\n\n**Q4：schema linking 你怎么做的？是不是把整个库的表都丢给模型让它挑？**\n\nA：不能那么干，那是个常见误区。**塞太多无关表 / 列，准确率会掉、token 还爆**；但漏掉一个必需的列，生成的 SQL 必错——哪怕它能跑。这两类错的代价不对称：多塞几张表，模型还有机会自己忽略；漏一张，就一定错。所以 schema linking 是\"**召回优先、精度其次**\"的权衡——先保证相关表一张都不漏，再尽量把无关表筛掉，而不是\"把整库 schema 一股脑喂进去\"。我的做法是先做相关表的召回，只把跟这个 query 真正相关的表结构喂给模型——既省成本，又提准确率。这跟我在杭小育做 RAG 多路召回是同一套思路：先低成本缩小范围，再精准定位。\n\n> 想再加分可以提一句前沿认知：现在强推理模型时代，schema linking 的重要性在变化，业界有\"上下文感知的双向检索\"这类新方案——体现你在跟领域，而不是停在老方案上。\n\n**Q5：你说低成本，具体怎么省的？小模型路由是什么意思？**\n\nA：两条主线。第一是**按 query 复杂度分级路由**——简单、高频的取数请求，路由到小模型就够了，又快又便宜；只有复杂 query 才升级到大模型。这不是 hack，是有论文支撑的成本优化方向（小模型 + 执行反馈做 Text2SQL）。第二是**缓存**——高频的结果和 SQL 缓存起来，命中就直接返回，连模型都不用调。再加上提示词策略优化，把无效 token 压下去。三者合起来，让我在有限的政务预算里撑住了百万级用户、日均万级检索。核心理念是：**用执行准确率兜底质量，用路由和缓存压成本，而不是无脑堆大模型堆算力**。\n\n**Q6：两层安全护栏，限权限死了，会不会影响用户正常取数的自由度？**\n\nA：不会，因为两层管的是不同的事。第一层限权，限的是**这个用户本来就无权访问的数据**——他自己手工去查也查不到，AI 当然也不该能查到，这不影响他权限内的取数自由度。第二层执行前审查，拦的是**非查询的危险动作**（改写、删除）和注入特征，正常的查询 SQL 该放行就放行。所以限权和自由度不冲突——它锁死的是\"越权\"和\"恶意\"，不是\"正常查询\"。真要说有成本，是执行前那道审查会加一点点延迟，但对政务这种错一个数后果很重的场景，这点延迟换合规和安全，完全值。\n\n**Q7：脱敏规则谁定的？AI 会不会绕过脱敏？**\n\nA：脱敏规则是**确定性系统定的，不交给模型自觉**——这是关键。我做安全的底层原则是：**真正的护栏必须是 LLM 之外的确定性系统**，不能写一句\"不要泄露身份证号\"在 prompt 里就指望模型听话（那张\"告示牌\"一句话就能被绕过）。所以脱敏是在结果返回那一层、由确定性的规则按字段敏感度强制掩码（身份证、手机号这类 PII），跟模型生成什么无关——模型就算想吐全量数据，也过不了这道确定性的脱敏闸门。再叠加全程审计留痕，谁在什么时候取了什么数事后都查得到。（护栏栈对应第 02 章 [《幻觉与安全治理》](/02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)。）\n\n**Q8：这是政务 / G 端项目，你做的信任设计能迁移到 C 端吗？**\n\nA：逻辑能迁，但**颗粒度要调**——这点我想清楚了。G 端用户愿意为正确性花时间，所以我把推理链路全展开让他审。但 C 端用户要的是轻、快、不打扰，你把一大段 SQL 和 CoT 怼他脸上，反而劝退。所以 C 端的做法是\"**默认折叠、按需展开**\"：平时只给结论加一句话依据，用户想深究再点开看完整链路。核心不变——可解释是为了让人**敢用又不盲信**；变的是把它做成\"可选的信任凭证\"，而不是\"强制的阅读负担\"。这也是我从 G 端经验往 C 端迁移时必须做的取舍。\n\n**Q9：作为 PM，你在这个项目里到底做了什么决策？（防\"传话工程师\"）**\n\nA：三个核心决策都是产品判断，不是工程实现。第一，**定义问题**——我把这个项目的核心矛盾从\"AI 能不能取数\"重新定义成\"人凭什么敢信 AI 取的数\"，这一步决定了后面所有设计方向。第二，**定关键指标**——我没用\"SQL 语法通过率\"这种工程指标，而是定了\"业务采纳率\"做北极星，因为它才衡量真实业务价值。第三，**划协作边界**——Badcase 闭环里产品、算法、工程谁接哪类问题，是我定的分发机制。至于 SQL 怎么生成、路由怎么实现，那是和算法、工程一起定方案、我推动落地的，但\"为什么要可视化、安全停在哪一档、用什么指标衡量成功\"这些判断，是 PM 该拍的板，也是我拍的。\n\n**Q10：如果让你重做一遍，哪里会做得不一样？（诚实加分题）**\n\nA：两点。一是**评估体系应该更早建**——我们是上线后才把 Badcase 闭环系统化的，如果重来，我会在立项阶段就先把评估集和采纳率口径定下来，用\"评估驱动开发\"的思路，让\"采纳率上升\"从一开始就定义\"产品变好了\"，而不是先做后补。二是**后门 / 投毒这类威胁我当时覆盖得不够**——我的两层护栏主要防越权和注入，但 Text2SQL 还有一类隐蔽威胁是微调数据被投毒、埋触发器，这块如果重来我会在数据供应链上再加一道校验。能说出这条，说明我知道安全的威胁面不止我做过的那两层。\n\n---\n\n## 七、可量化成效清单（背一遍，随时能调取）\n\n按\"价值 / 性能 / 成本 / 工程化\"四组记，讲的时候挑相关的报，别一口气全念完：\n\n- **业务价值**：SQL 与推理步骤可视化使数据分析结果业务采纳率提升至 **97.5%**；把平均 **3 天人工取数缩短到分钟级**，数据口径一致。\n- **性能**：TTFT 稳定 **2 秒内**；扛住政务高并发、**日均万级检索**。\n- **成本**：验证\"小模型路由 + 向量检索 + 缓存增强\"低成本路径，在有限预算下支撑**百万级用户**；定义提示词策略 + 缓存机制协助工程降低 Token 消耗。\n- **工程化 / 合规**：适配国产信创，支撑多租户细粒度权限的政务数据查询；实现从 0 到 1 的 AI 场景工程化闭环。\n\n---\n\n## 八、一分钟收尾金句（结束这个项目时甩出去）\n\n> \"SAGE 这个项目让我真正想明白一件事：**Agent 产品最难的从来不是让它能做，是让用户敢让它做。** 能做是工程问题，敢让它做是产品问题——靠的是把黑盒打开（可视化建立信任）、把红线兜住（两层护栏保证安全）、把错误收敛（Badcase 闭环持续纠错）。采纳率 97.5%、3 天到分钟级这些数字背后，真正的产品功夫全在'信任'这两个字上。这也是我理解的 AI 产品经理在 Agent 时代最该会的事。\"\n\n---\n\n## 附：本篇与其他章节的交叉引用（被串着问时怎么接）\n\n- 问到\"**Agent 是什么、ReAct、Function Calling 原理**\" → 引第 01 章 [《Agent 与工具调用》](/01-AI技术速通/08-Agent与工具调用.md)，SAGE 就是那篇的落地案例。\n- 问到\"**评估、采纳率口径、为什么不用字符串匹配**\" → 引第 01 章 [《模型评估与幻觉》](/01-AI技术速通/10-模型评估与幻觉.md) 与第 02 章 [《AI 评估体系》](/02-AI产品方法论/04-AI评估体系（方法论视角）.md)，本篇 Badcase 闭环就是评估驱动开发的实践。\n- 问到\"**安全护栏怎么搭、脱敏审查的细节**\" → 引第 02 章 [《幻觉与安全治理》](/02-AI产品方法论/05-幻觉与安全治理（产品侧）.md)，本篇两层护栏对应那篇的护栏栈。\n- 问到\"**人和 AI 怎么分工、控制权怎么交**\" → 引第 02 章 [《人机协同与信任设计》](/02-AI产品方法论/06-人机协同与信任设计.md)，可视化解决可解释、执行前审查解决可控。\n- 横向对比：\"**杭小育**证明我会 RAG、会降本，**孤独症筛查**证明我能驾驭复杂 B/G 端业务，**SAGE** 证明我会做 Agent、懂信任与安全\"——三个项目的差异化定位，别讲重了。\n\n---\n\n## 九、自检清单（讲这个项目前过一遍）\n\n- [ ] 第一句有没有把它\"定性\"成 Text2SQL Agent，并说出 Agent = 有执行反馈自纠正闭环？\n- [ ] 讲可视化时，有没有讲成\"因果抉择链\"（为什么不用置信分），而不是罗列功能？\n- [ ] 讲安全时，有没有点出\"注入面在模型输出、传统参数化查询兜不住\"这个特殊性？\n- [ ] 采纳率 97.5% 有没有讲成\"执行准确率 + 人工采纳\"，而不是 SQL 语法通过率？\n- [ ] 被问 schema linking，有没有讲成\"召回全 + 精度高的双向权衡\"，而不是\"整库丢进去\"？\n- [ ] 评估口径有没有守住\"用执行准确率，不用字符串 exact match\"？\n- [ ] 主导 vs 参与有没有分清——工程实现说\"和工程一起 / 我推动\"，产品判断说\"我主导\"？\n- [ ] 结尾有没有收口到\"Agent 难在让用户敢让它做，这是 PM 的题\"？\n\n全部能打钩，这个项目你就能讲得既亮眼、又一深挖也塌不了——**这是你对标 Agent 岗最锋利的一张牌。**\n", "/06-个人经历改造/03-项目2-孤独症筛查.md": "# 项目改造·孤独症筛查（B/G 端民生，诚实定位）\n\n> 浙江省儿童心理行为发育数字化管理系统 —— 浙江省十大民生实事、全省 0-6 岁儿童孤独症筛查的数字化底座。\n\n这个项目和杭小育、SAGE 不一样，**它的 AI 含量相对低**，主线是\"医学量表数字化 + 全省多级业务流程驾驭 + 国家级民生落地\"。\n\n很多人下意识会把所有项目都往 AI 上硬靠，结果一被追问\"你这块 AI 到底解决了什么、用的什么技术\"就露馅。这个项目你要反过来用——**诚实定位，恰恰显成熟**：你能讲清自己接手的是一个\"全省 1600+ 机构、累计 16 万多人次筛查\"的复杂系统，把医学筛查标准转成跑得通的数字化引擎，把多级业务流转梳理顺，这本身就是一个产品经理极硬的能力，根本不需要靠\"硬吹 AI\"来撑场子。\n\n记住这章的底层心法：**会区分\"主导\"和\"参与/协助\"、会诚实定位一个项目的真实价值，是面试官判断你是不是\"靠谱的资深苗子\"的核心信号。** 贪功夸大，一深挖就崩；诚实归位，反而稳。\n\n---\n\n## 一、先校准：这个项目你的真实角色\n\n讲之前先把\"你做了什么\"在脑子里分三档摆清楚，免得讲嗨了把\"参与\"说成\"主导\"。\n\n| 你的真实贡献 | 角色定级 | 讲述用词（务必匹配） |\n|---|---|---|\n| 协助重梳\"卫健委监管线\"与\"省市县街道业务线\"流转规则 | **协助 / 共同推进** | \"我协助理顺了……\"\"我参与梳理了……\" |\n| 搭建基于医学量表（M-CHAT-R/Gesell/CARS）的结构化评估表单引擎 | **主导（这块是你的实操主场）** | \"我主导把……转成了……\"\"这套表单引擎是我搭的\" |\n| 理顺高并发 C 端（浙里办扫码）与 B/G 端多级联动 | **参与** | \"我参与了……的设计\" |\n| 参与国家级科研课题（科技部·课题四），推动健康数据数字化建模、参与智能推荐功能、主导智能问答引擎接入 | **参与课题 / 主导其中的问答接入** | \"我作为阶段性负责人，确保课题成果上线\"\"智能问答引擎的接入是我主导的\" |\n\n> **这张表是你的\"防翻车底线表\"。** 面试官问\"这个是你做的还是团队做的\"时，你照这张表答，不抢功也不妄自菲薄。当你能主动说出\"这块是我协助的，主导的是另一块\"，面试官对你诚信度的打分会直接拉满——因为大多数候选人不敢这么讲。\n\n---\n\n## 二、STAR 骨架（一图看懂怎么讲）\n\n```mermaid\ngraph TB\n    classDef s fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef t fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef a fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef r fill:#9F7AEA,stroke:#7C5CC4,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S[\"S 情境<br/>浙江十大民生实事 全省孤独症早筛<br/>纸质表单不互通 录入慢 统计费时<br/>系统上线后 1600+ 机构铺开 协同混乱\"]:::s\n    T[\"T 目标<br/>把医学量表数字化 串起初筛-复筛-确诊<br/>理顺多级业务流转 支撑全省多级筛查<br/>降基层投诉 提初筛效率\"]:::t\n    A[\"A 行动<br/>1 协助重梳监管线+业务线流转规则<br/>2 主导医学量表转可配置防呆表单引擎<br/>3 参与国家级课题 主导智能问答接入\"]:::a\n    R[\"R 结果<br/>基层工单投诉率降 85%<br/>总筛查 165164 人次 初筛效率+63%<br/>帮 964 个家庭抢黄金干预期<br/>支撑全省 1600+ 机构多级协同\"]:::r\n\n    S ==> T ==> A ==> R\n\n    N[\"诚实定位锚点<br/>这是B/G端复杂业务驾驭+国家级民生<br/>不是纯AI项目 AI部分如实讲参与/主导接入\"]:::note\n    A -.-> N\n```\n\n---\n\n## 三、三档版本（可直接背）\n\n> 三档的用法：一句话用于自我介绍带过、被问\"还做过什么\"时点一句；30 秒用于面试官说\"挑一个 B/G 端项目讲讲\"；2 分钟用于面试官明确说\"详细说说这个孤独症筛查系统\"。**张嘴前先判断对方要哪档，别用 2 分钟去答一句话的问题。**\n\n### 版本 A · 一句话（约 15 秒，电梯版）\n\n> \"我还做过浙江省儿童孤独症筛查的数字化系统，这是浙江十大民生实事之一、全省 0-6 岁孩子早筛的数字化底座。我主要做的是把 M-CHAT-R、Gesell 这些医学筛查量表转成线上可配置、带逻辑防呆的数字化表单引擎，还协助理顺了全省 1600 多家医疗机构的多级业务流转。系统上线后基层投诉率降了 85%，总共筛查了 16 万多人次。\"\n\n**为什么这么设计**：第一句先给\"国家级民生实事\"的分量，第二句立刻**用\"我主要做的是\"把自己的真实贡献圈出来**（表单引擎=主场，业务流转=协助，用词精准），最后一句甩两个最硬的数字收口。全程没有一个字往\"我做了个 AI 大项目\"上硬靠——这就是诚实定位。\n\n### 版本 B · 30 秒（标准版）\n\n> \"这个项目是浙江省儿童心理行为发育数字化管理系统，背景是浙江把全省 0-6 岁儿童孤独症筛查列进了十大民生实事，要做早筛早干预。原来全靠纸质表单，数据不互通、录入慢、统计费时，机构也难管。\n>\n> 系统上线后，我是在全省往 1600 多家医疗机构铺开、暴露出大量多级协同问题的阶段接手的。我做了两块：一块是协助重新梳理'卫健委监管线'和'省市县街道业务线'两条线的流转规则，把浙里办扫码的高并发 C 端和 B/G 端的多级联动理顺；另一块、也是我主导的，是把 M-CHAT-R、Gesell、CARS 这些成熟的医学筛查量表，转成线上可配置、带逻辑防呆的数字化表单引擎，把初筛、复筛、确诊几个数据节点串起来。\n>\n> 结果是基层工单投诉率降了 85%，总筛查 16 万多人次，单例初筛效率提升 63%，帮 964 个家庭抢回了黄金干预时间。\"\n\n**为什么这么设计**：\"我是在……阶段接手的\"这句话很关键——**它诚实交代了你不是从 0 搭这个系统的人**，主动消解\"那 0-1 是你做的吗\"这个追问。然后\"我做了两块，一块协助、一块主导\"，角色边界画得干干净净。\n\n### 版本 C · 2 分钟（深聊版，按 STAR 走）\n\n> **（S 情境，约 25 秒）**\n> \"浙江省把全省 0-6 岁儿童的孤独症筛查列进了十大民生实事，目标是早筛早干预——孤独症有个'黄金干预期'，越早发现干预效果越好。但传统模式全靠纸质量表：家长在机构填表、医生人工判读、再逐级上报，数据不互通、录入慢、统计极其费时，省里想看全局数据很难，机构也难管理。这个系统就是要做这件事的数字化底座，它还是国家科技部一个项目下'课题四·儿童心理板块'的一部分，要推生长发育、心理、喂养、视力等七个模块。\n>\n> **（T 目标，约 15 秒）**\n> \"我接手时，系统已经上线、正在往全省 1600 多家医疗机构铺开，铺开过程暴露了大量多级协同的痛点。阶段目标很清楚：把医学量表真正数字化、把初筛到确诊的链路串通，同时理顺多级业务流转，让这套系统能稳定支撑全省 1600 多家机构的多级筛查。\n>\n> **（A 行动，约 55 秒——这段是重点，讲清你做的三件事和角色边界）**\n> \"我主要做了三件事。\n>\n> 第一，**协助重梳两条业务线的流转规则**。这个系统有两条线交织：一条是卫健委的监管线，一条是省、市、县、街道的业务线。1600 多家机构一铺开，谁该在哪个节点录入、数据往上怎么汇、监管口径怎么对齐，全乱了。我协助把这两条线的流转规则重新梳理清楚，同时理顺了浙里办扫码这种高并发 C 端入口和 B/G 端多级联动的衔接。这块我是协同推进，不是我一个人定的。\n>\n> 第二，**这是我主导的——把医学量表转成数字化表单引擎**。我把 M-CHAT-R、Gesell、CARS 这些国际成熟的儿童筛查量表系统梳理了一遍，然后把它们转成线上可配置、带逻辑防呆的表单引擎，串起初筛、复筛、确诊几个数据节点。这里有个原则我守得很死：**量表本身的题目和计分逻辑我一个字都不能动**，我做的是'忠实地数字化加自动计分加质控'，不是去'优化'量表——因为这是有医学信效度的标准工具，产品越界改它就是医疗事故。\n>\n> 第三，**参与国家级科研课题**。我参与把视觉、喂养这些健康数据做数字化建模、推动智能推荐功能落地，并且主导了智能问答引擎的接入，作为阶段性负责人保证课题成果按时上线。AI 这部分我是实打实参与、问答接入是我主导，但我不会把整个项目说成一个 AI 项目——它的核心价值其实是把一个超复杂的 B/G 端业务跑通了。\n>\n> **（R 结果，约 25 秒）**\n> \"结果上，基层工单投诉率骤降了 85%——这是流转理顺最直接的体现；总筛查 165164 人次，单例初筛效率提升 63%，帮 964 个家庭抢回了黄金干预时间。系统现在稳定支撑全省 1600 多家机构的多级协同和持续筛查。\n>\n> 对我自己来说，这个项目最大的收获不是 AI，是**学会了怎么驾驭一个多级、多方、高合规要求的复杂民生系统**——怎么把医学标准、监管要求、基层操作三方拉到一张产品设计里。\"\n\n**为什么这么设计**：A 段用\"第一/第二/第三\"的口播节奏，**每件事都贴了角色标签**（协助 / 我主导 / 参与并主导接入），面试官一听就知道你边界清晰。结尾那句\"最大的收获不是 AI\"是点睛之笔——主动承认它不是 AI 项目，反而把\"复杂业务驾驭能力\"这个更稀缺的卖点立住了。\n\n---\n\n## 四、为什么\"诚实定位\"反而是加分项（这套话术心法务必内化）\n\n很多候选人怕一说\"这块我是协助的\"就显得自己弱。**恰恰相反。** 面试官每天听几十个候选人，对\"什么都是我主导的、什么都是我从 0 做的\"早就免疫了，他们真正在找的信号是：**这个人讲的能不能信、深挖会不会塌。**\n\n当你主动说出：\n\n- \"这个项目我是中途接手的，不是从 0 搭的\"\n- \"业务流转梳理我是协助，主导的是表单引擎这块\"\n- \"它的 AI 含量其实不高，核心是复杂业务驾驭\"\n\n你传递的是三个高级信号：**① 你有清晰的自我认知和边界感；② 你不靠夸大撑场，说明你对'被深挖'有底气；③ 你能客观评估一个项目的真实价值，这是 PM 最核心的判断力。**\n\n> 一句可以直接用的收口话术：\"**这个项目我不会包装成一个 AI 大项目，它的硬核其实是怎么把一个全省 1600 多家机构、两条业务线交织的复杂系统跑通。AI 那部分我是实打实参与和主导接入的，但我更想让您看到的是我驾驭复杂 B/G 端业务的能力。**\"\n\n---\n\n## 五、关键技术点的诚实讲法（被追问时守得住）\n\n这个项目的技术追问大概率落在**表单引擎和量表数字化**上，而不是 RAG 主链路。下面是几个高频点的\"准确且诚实\"的答法。给错原理会当场翻车，这几条要背准。\n\n### 5.1 \"你把医学量表数字化，具体数字化了什么？产品有没有改量表？\"\n\n> **标准答法**：\"我数字化的是**录入、计分、流转、质控**这四层，**量表本身一个字没动**。M-CHAT-R 也好、Gesell、CARS 也好，它们都是有标准题目、标准计分规则和标准切分点（cut-off）的、经过信效度验证的医学工具。我做的是把它从纸上搬到线上：把题目结构化、把答案做成可配置的选项、把计分逻辑写成规则引擎让系统自动算分、再加逻辑防呆——比如某题没填不让提交下一题、某些题之间有依赖关系做联动校验。核心原则是**忠实数字化 + 自动计分 + 质控，绝不碰量表的科学性**。产品越界去改量表的题目或计分，那是医疗合规红线。\"\n\n**为什么这么答**：这一答，你同时证明了三件事——懂医学量表是\"标准化工具\"（信效度概念）、懂产品在医疗场景的边界、懂合规红线。这比硬说\"我用 AI 智能判读量表\"高级得多，也经得起医生背景的面试官深挖。\n\n### 5.2 \"逻辑防呆具体怎么做的？\"\n\n> **标准答法**：\"主要是三类规则。一类是**完整性校验**，必填项不填不让进下一步，避免半截数据上报；一类是**逻辑一致性校验**，比如题目之间有依赖关系的，前面选了 A 后面某些选项就该置灰或联动；还有一类是**计分边界校验**，自动算出的分数落在哪个风险区间、要不要触发转复筛，这些都按量表的标准 cut-off 配进规则里，不让人工判读出错。（像 M-CHAT-R 本身就是低/中/高三档风险分层，中风险还要走随访问卷再判，我就是把这套官方分层逻辑原样配进系统，不自己改阈值。）本质是把原来靠医生经验和纸面核对的环节，固化成系统规则。\"\n\n### 5.3 \"1600 多家机构、两条业务线，数据怎么打通的？\"（多级流转追问）\n\n> **标准答法**：\"核心是**数据标准化**。机构那么多、层级那么深，数据要能跨级汇上去、监管口径要对齐，前提是大家说同一套'数据语言'。所以要统一几样东西：**患者/儿童的唯一标识**（同一个孩子在不同机构不能变成两条记录）、**筛查结果的字段和单位标准**、**诊断和编码的规范**，再加数据清洗去重去噪。把这套'数据字典'统一了，省市县街道才能在一条链路上流转，卫健委监管线才看得到一致的全局数据。这块我是协助梳理流转规则，数据标准的落地是和团队一起推的。\"\n\n> **诚实标记**：这里再次用\"我是协助……和团队一起推的\"主动归位。**追问越深，你越要稳住角色边界，绝不顺着面试官的'这都是你做的吧'就往身上揽。**\n\n### 5.4 \"你说主导了智能问答引擎的接入，那是 RAG 吗？讲讲。\"（防止把 RAG 讲错）\n\n如果面试官把话题引到 AI 这块，你可以如实讲\"接入\"，但**别把自己包装成从 0 设计 RAG 架构的人**，同时原理要讲准：\n\n> **标准答法**：\"智能问答这块我主导的是**接入和产品侧的落地**，把问答能力嵌进这个健康管理系统里，让家长和基层能问一些发育、喂养相关的问题。它底层是 RAG 的思路——回答前先去知识库检索相关资料，再连同问题给模型生成，这样能控住幻觉、答案可溯源，也不用把私域医疗数据拿去训练，安全性更好。不过我得诚实说，这个项目里 AI 的深度和我做杭小育那个 RAG 旗舰项目没法比——杭小育那边我是从文档切分、多路召回到 Rerank 精排、金标准评估集全链路实操的；这个项目我更多是把成熟的问答能力接进来、保证它在民生场景里能用、合规。\"\n\n> **原理别讲错的雷点（背准）**：\n> - **Rerank（精排）是对\"已经召回回来的候选\"做二阶段精排，不是召回本身，更不是替代召回。** 标准链路是\"多路召回（向量 + 关键词）→ 去重合并 → Rerank 精排 → 给模型\"。别把\"向量召回 top-k\"直接说成最终结果。\n> - **RAG 不等于\"喂数据微调\"。** RAG 是\"开卷检索\"，知识在外部库、即时更新、可溯源；微调是改模型本身。被问\"为什么用 RAG 不直接训模型\"，标准动因是五个：**控幻觉、可溯源、补专业知识、数据安全（私域不上传）、知识时效性**。\n> - 详细口径见本站 [`01-AI技术速通/06-RAG检索增强`](/01-AI技术速通/06-RAG检索增强.md)、[`01-AI技术速通/10-模型评估与幻觉`](/01-AI技术速通/10-模型评估与幻觉.md)。\n\n---\n\n## 六、数据指标的\"口径 + 归因\"备注（应对真实性追问）\n\nB/G 端项目的追问最爱验证\"数字是真的吗、怎么统计的\"。**每个数字你都要能往下答一层**，只给结果不给口径会被一问就空。下面把四个核心数字的\"基线 + 口径 + 归因\"备好。\n\n| 指标 | 怎么统计的（口径） | 归因（为什么能降/升） | 被追问时怎么补一层 |\n|---|---|---|---|\n| **基层工单投诉率降 85%** | 系统内基层机构提交的工单/投诉量，对比铺开初期混乱阶段与流转规则梳理后的稳定阶段 | 主因是**两条业务线流转规则理顺 + 表单防呆减少录入返工**，投诉大多来自\"不知道该谁录、录错要重来\" | \"85% 是相对铺开初期协同混乱那段的基线，主要归因是流转梳理和防呆，不是单一某个功能\" |\n| **总筛查 165164 人次** | 系统累计完成初筛/复筛的记录数（去重后按人次口径） | 全省 1600+ 机构 + 浙里办扫码 C 端入口铺开后的累计量 | \"这是全省累计、按筛查人次算的，不是我个人项目周期内的\" |\n| **单例初筛效率提升 63%** | 单个孩子从开始填表到出初筛结论的耗时，纸质流程 vs 数字化表单引擎流程对比 | **自动计分 + 防呆免返工 + 流转免人工上报**，省掉了人工判读和逐级纸面上报的时间 | \"63% 是单例耗时口径，对照的是原来纸质填表+人工判读+逐级上报那套\" |\n| **帮 964 个家庭抢黄金干预期** | 系统筛出初筛阳性、进入复筛/确诊/干预通道的家庭数 | 早筛把\"发现得晚\"的孩子提前捞出来，链路串通让转干预更快 | \"964 是进入干预通道的家庭数，黄金干预期是孤独症早干预的医学概念，越早效果越好\" |\n| **架构韧性：扛住 7600+ 机构日均高并发、支撑全省百万级人口动态普查** | 系统接入访问的机构总数与日均并发，对比筛查业务机构数（1600+ 是产生筛查记录的医疗机构，7600+ 是接入系统访问的机构口径） | 系统平稳跑在国产化信创环境下，验证了产品的高可用 | \"1600+ 是做筛查的医疗机构，7600+ 是接入系统访问的机构总数，两个口径别混；信创高可用这块是和工程团队一起扛的，不是我一个人的功劳\" |\n\n> **用法**：面试官问\"这 85% 怎么来的\"，你绝不能只说\"系统数据显示降了 85%\"。要答\"它是相对哪个基线、按什么口径、主要归因是什么\"——**有基线、有口径、有归因，这个数字才立得住。**\n>\n> **1600+ vs 7600+ 别讲混**：1600+ 是产生筛查记录的医疗机构（用在\"全省多级协同\"的口径），7600+ 是接入系统访问的机构总数（用在\"架构韧性\"的口径）。被问规模时拣对口径，别张冠李戴；信创高可用主动归因到\"和工程团队一起扛\"。\n\n---\n\n## 七、这个项目能证明的能力标签（面试官视角）\n\n讲完别让面试官自己总结，**你主动收口告诉他\"这个项目证明了我什么\"**：\n\n```mermaid\ngraph LR\n    classDef cap fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef proof fill:#48BB78,stroke:#38A169,stroke-width:1px,color:#fff\n\n    C1[\"驾驭复杂B/G端业务\"]:::cap --> P1[\"1600+机构两条线流转梳理\"]:::proof\n    C2[\"医学/合规场景产品力\"]:::cap --> P2[\"量表数字化守住信效度红线\"]:::proof\n    C3[\"国家级民生落地经验\"]:::cap --> P3[\"十大民生实事+科技部课题阶段负责\"]:::proof\n    C4[\"诚实的自我认知\"]:::cap --> P4[\"主动区分主导/协助/参与\"]:::proof\n```\n\n一句收口话术（背下来，2 分钟版讲完顺势带出）：\n\n> \"**这个项目给我的，是在一个高合规、多层级、多方协同的民生场景里，把医学标准、监管要求和基层操作捏进同一套产品设计的能力。AI 我会做，但我觉得能把这种复杂度的 B/G 端业务跑通，是更难、也更值钱的本事。**\"\n\n---\n\n## 八、自检清单（讲这个项目前过一遍）\n\n- [ ] 我有没有把\"协助/参与\"说成\"主导\"？（对照第一节那张表）\n- [ ] 我有没有主动交代\"这是中途接手、不是从 0 搭的\"？\n- [ ] 我有没有把它硬吹成\"AI 大项目\"？（不该吹，主线是复杂业务驾驭）\n- [ ] 讲量表数字化时，有没有强调\"绝不碰量表本身、守信效度红线\"？\n- [ ] 被问 AI/RAG 时，Rerank 有没有讲成\"对召回结果的精排\"而不是\"召回本身\"？\n- [ ] 每个核心数字，我能不能往下答一层\"基线+口径+归因\"？\n- [ ] 结尾有没有主动收口\"这个项目证明了我什么能力\"？\n\n全部能打钩，这个项目你就能讲得既动人、又一深挖也塌不了。**诚实是这一篇唯一的、也是最强的武器。**\n", "/06-个人经历改造/README.md": "# 06 · 个人经历改造工作坊\n\n全站最具差异化的一章——别人抄不走。把她简历里的三个真实项目，改造成面试官爱听、经得起深挖的 STAR 故事。\n\n## 三个项目素材（来自简历）\n\n1. **善育在杭 2.0 -「杭小育」智能体** — C 端政务育儿 RAG 问答，460W+ 用户、日活 21.5W+；检索覆盖率 +34%、CAG 降本 80%、准确率 97.5%。\n2. **浙江省儿童心理行为发育数字化管理系统** — B/G 端孤独症筛查，1600+ 机构、165164 筛查人次、投诉率降 85%；医学量表数字化、国家级课题。\n3. **SAGE-AI 数据问答平台** — G 端 Text2SQL 取数智能体，推理链路可视化解决信任、采纳率 97.5%、3 天→分钟级；Badcase 标准化闭环。\n\n## 计划文件\n\n- `01-STAR与AI语言改造法.md` — 把项目「翻译」成 AI 产品故事的方法\n- `02-项目1-杭小育.md` — 完整 STAR 改造 + 一句话/30 秒/2 分钟三档版本\n- `03-项目2-孤独症筛查.md` — 完整 STAR 改造\n- `04-项目3-SAGE取数.md` — 完整 STAR 改造\n- `05-深度追问预案.md` — 针对每个项目预判 10+ 个「为什么」追问 + 标准答法\n- `06-数据闭环与指标包装.md` — 怎么讲清楚数据飞轮、指标口径、归因\n- `07-自我介绍脚本.md` — 1 分钟自我介绍模板 + 多版本\n\n## 定制发力点\n\n**追问预案是重中之重**：她实操过但可能讲不清原理，比如「粗排+精排为什么降成本」「CAG 和普通缓存什么区别」「34% 覆盖率怎么测出来的」「金标准集怎么建的」——这章逐条备好滴水不漏的答法。\n", "/06-个人经历改造/05-深度追问预案.md": "# 深度追问预案：把\"实操过但讲不清\"逐条补成滴水不漏（重中之重）\n\n> 这一章是你的护身符。前面几章教你把项目\"讲成故事\"，这一章解决一个更要命的问题——**故事讲完之后，面试官会往下追问。**\n>\n> 你要先记住一个事实：在大厂的 AI 产品经理面试里，你那个准备好的 2 分钟 STAR 答案，**只占整道题分数的 20%**。剩下 80% 全在面试官接下来的追问里——\"具体多少？\"\"你怎么知道这个数是对的？\"\"证明给我看。\"亚马逊有候选人复盘说得很直接：第一个问题答完，真正的考核才开始，面试官全程在干一件事——**\"how do you know that, prove it\"（你凭什么这么说，证给我看）**。\n>\n> 所以这一章不是教你背更多漂亮话，而是把你简历里每一个术语、每一个百分比，逐条补成\"知其所以然 + 立刻能报口径\"。读完你要达到的状态是：**别人随便挑一个数字往下挖三层，你都接得住。**\n\n---\n\n## 〇、先把心法立住：追问的本质 + 三条铁律\n\n面试官追问你，不是为了为难你，是为了分辨两件事：**这个项目到底是不是你做的；你对它的理解到底有多深。**\n\n非科班最容易死在两个地方：一是**把别人做的说成自己做的**，往下一问角色就露馅；二是**只记得结果数字，说不出这个数字怎么来的**。这两条恰好是追问最爱打的点。\n\n### 三条铁律（每次开口前在心里过一遍）\n\n```mermaid\ngraph TB\n    classDef rule fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef trap fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    R1[\"铁律一<br/>主导和参与分清楚\"]:::rule\n    R2[\"铁律二<br/>每个数字都能报口径\"]:::rule\n    R3[\"铁律三<br/>不懂就承认 + 给学习路径\"]:::rule\n\n    R1 --> T1[\"不贪功 不夸大角色<br/>避免被追问拆穿\"]:::trap\n    R2 --> T2[\"分子分母 / 测试集 / 谁判定<br/>三件套随口报得出\"]:::trap\n    R3 --> T3[\"编造原理上场翻车<br/>是最致命的死法\"]:::note\n```\n\n- **铁律一：主导和参与分清楚。** 你简历里有线索——杭小育、SAGE 是你主场，可以\"我主导/我设计\";孤独症筛查项目你更多是\"协助梳理、参与课题、阶段性负责\",就老老实实说\"我负责的是其中 XX 部分\"。**不贪功反而显成熟**，面试官见多了往自己脸上贴金的人。\n- **铁律二：任何百分比，都要能立刻报出\"分子/分母 + 在哪个测试集 + 谁判定对错\"。** 这是非科班最容易被一击穿的死穴。下面每一节我都帮你把口径写死了。\n- **铁律三：被问到确实不懂的，承认 + 给推理 + 给学习路径。** 千万别硬编原理，面试官就是在 \"prove it\"，你编一个错的，当场被识破，比承认\"这块我没深入\"还难看。这一节最后专门讲怎么优雅地说\"我不会\"。\n\n---\n\n## 一、RAG 类追问（杭小育主场，这块问得最细，必须答到底层）\n\n杭小育是你的旗舰项目，\"准确搜到知识的比例提升 34%\"\"231000+ 向量索引\"\"粗排+精排\"\"多路召回\"这些词全写在简历上了。**写出来就要扛得住问。** 这一节把每个词都补成\"知其所以然\"。\n\n### 追问 1：你说的\"粗排+精排\"漏斗，为什么能在提升覆盖率的同时把成本压下来？\n\n**面试官想验证的：** 你是真懂两阶段检索的原理，还是只会背名词。\n\n**标准答法（口语版，可以直接念）：**\n\n> \"两阶段检索的本质是'用便宜的扫全库，用贵的只精修一小撮'。\n>\n> 第一阶段叫粗排，用的是双塔模型——query 和文档**各自独立编码**成向量，文档向量我离线就能全算好存进向量库，线上只做一次向量相似度比对，又快又便宜，但精度比较粗。\n>\n> 第二阶段叫精排，用的是交叉编码器——它是把 query 和候选文档**拼成一条输入，一起过模型联合打分**，所以精度高很多，但代价是贵。它贵就贵在不能对全库每条都跑，那样成本会爆炸。\n>\n> 所以漏斗就出来了：先用便宜的双塔从几十万条里粗筛出 top 几十条候选，再用贵的交叉编码器只对这几十条做精排，排出 top 几条喂给大模型。这样既保住了覆盖率（粗排阶段宁可多召一点），又把贵的那一步的计算量压到极小——成本就是这么降的。\"\n\n**加分点：**\n- 能说出\"候选数 L（粗排放给精排多少条）是成本和质量之间的调参旋钮\"——L 越大召回越全但精排越贵。\n- 能点出\"向量相似度（cosine）是个钝器，它判断不了细微的语义差别，所以才需要交叉编码器来补这一刀\"。\n\n**雷区（千万别踩）：**\n- 别把粗排说成\"关键词检索\"、精排说成\"再向量一次\"——**全错**。粗排=双塔向量召回，精排=交叉编码器联合打分，两者编码方式不同才是关键。\n- 别把 \"rerank\" 说成\"只是个排序算法\"——它是一个**模型**在重新打分，不是 sort。\n\n### 追问 2：你的 Rerank 用的是什么模型？\n\n**标准答法：**\n\n> \"用的是交叉编码器类的重排模型。业界常见的有 Cohere 的 Rerank、开源的 BGE-reranker，比如 bge-reranker-base 或 large。我们的场景对成本敏感，会优先选能私有化部署的开源重排模型。\"\n\n**加分点：** 能点名具体模型（bge-reranker / Cohere Rerank）就比只说\"重排算法\"强一截。如果你还知道 ColBERT，可以提一句\"也有 ColBERT 这种晚交互（late interaction）的折中方案，介于双塔和交叉编码器之间\"——但别硬把 ColBERT 说成纯交叉编码器，它严格说是 late interaction。\n\n**雷区：** 一个模型名都说不出、只会说\"重排算法\"，会让面试官觉得你没真碰过。\n\n### 追问 3：那个\"提升 34%\"是怎么测出来的？金标准集谁建的、谁标的？\n\n**这是全章最重要的一题。** 简历里所有百分比里，这个最容易被 \"prove it\"。你简历里其实已经把答案写全了，只是要会组织。\n\n**标准答法（把简历里的事实串成口径）：**\n\n> \"这 34% 是在一个金标准检索测试集上、用 AB 测试测出来的，我说一下完整链路：\n>\n> 第一步建测试集——我们从线上**被用户点踩的 Bad Case** 里，抽了 500 个高频、有代表性的真实问题。为什么从点踩里抽？因为这些是系统真实答错、最值得优化的长尾。\n>\n> 第二步标金标准——这 500 题不是我们自己标，是请**业主方的医生**来标，标的是'每道题的标准答案应该出自知识库哪一段文档'。医生标的段落就是这道题的'正确检索目标'。\n>\n> 第三步定指标——覆盖率的口径是：**能正确召回到那段金标准文档的题数 ÷ 500**。\n>\n> 第四步做 AB——优化前的检索方案和优化后的方案，在同一批 500 题上各跑一遍，对比这个比例。优化后比优化前提升了 34%。\n>\n> 所以这个 34% 是有明确分子分母、有专家标的金标准、有对照组的，不是拍出来的。\"\n\n**加分点：**\n- 主动区分\"离线评估 vs 在线评估\"：这 34% 是**离线**在金标准集上验证的；上线后我们还有**线上埋点**持续看真实表现。\n- 能说出\"为什么从 Bad Case 抽题而不是随机抽\"——因为要优化的就是长尾难题，随机抽会被大量简单题稀释、看不出真实提升。\n\n**雷区：** 说不出分子分母、说不出谁标的——面试官立刻知道这个数你只是听来的。\n\n### 追问 4：文档切分策略你怎么定的？为什么要多路召回？231000 个向量怎么来的？\n\n这三个是工程细节，给原则就行，但要答得稳。\n\n**文档切分：**\n\n> \"切分的核心矛盾是'语义完整 vs 召回粒度'。chunk 切太大，一段里塞太多不相关内容，召回时噪声大；切太小，上下文断裂，模型读不懂。所以我们做的是**语义切分**——尽量让一个 chunk 是一个能独立回答的语义单元，相邻 chunk 之间留一点重叠（overlap）防止边界信息被切断。简历里写的'语义切分减少无效 Token 存储'就是这个意思：按语义切而不是按固定字数硬切，能少存很多没用的碎片。\"\n\n**为什么多路召回：**\n\n> \"单一向量召回有个硬伤——遇到长尾问题、或者要精确匹配人名、政策编号、专业术语时，纯语义向量容易漏召。所以我们叠了多路：向量召回管语义相似，再配关键词类召回管精确匹配，两路结果融合。召回阶段的原则就是'宁可多召，靠后面的精排去噪'。\"\n\n**231000 向量怎么来：**\n\n> \"口径很简单：知识库 20000+ 份文档，每份按语义切成若干 chunk，每个 chunk 编码成一条向量，乘起来就是 23.1 万条向量索引，存在向量库里建近似最近邻索引来加速检索。\"\n\n**雷区：** 被问向量数量时支支吾吾——其实就是\"文档数 × 平均每份的 chunk 数\"，记住这个反推口径就不慌。\n\n---\n\n## 二、评估类追问（准确率、幻觉率、安全基线、AB——非科班最易被击穿）\n\n你简历里准确率 97.5%、幻觉率\"卡在安全基线内\"——这些都要能报口径。\n\n### 追问 5：回答准确率 97.5% 是怎么算的？\n\n**标准答法：**\n\n> \"口径是判对的条数除以测试集总条数。具体说：我们有一个人工标好标准答案的测试集，模型答完之后判定每一条对不对，对的条数 ÷ 总条数 = 97.5%。判定上我们是人工抽检为主，量大的时候会用模型辅助判（LLM-as-judge），但模型判的结果一定再做人工校准，不能全交给模型。\"\n\n**加分点：** 主动说清\"准确\"在 RAG 场景拆成两层——一层是**检索准不准**（有没有召回到对的文档），一层是**生成忠不忠实**（faithfulness，答案有没有忠于召回的内容、有没有编上下文里没有的东西）。能区分这两层，面试官会觉得你真懂 RAG 评估。\n\n**雷区：** 说\"97.5% 就是准确率\"然后没了——必被追问\"哪个测试集、多少条、谁判的\"。把这三件套焊死在嘴边。\n\n### 追问 6：幻觉率你怎么测？怎么卡\"安全基线\"？\n\n**标准答法：**\n\n> \"幻觉在 RAG 里主要测**忠实度**——答案里有没有出现知识库上下文里根本没有的内容。我们的做法是：在测试集上跑出答案，逐条比对答案里的每个关键事实能不能在召回的文档里找到出处，找不到出处的就算幻觉。\n>\n> '卡在安全基线内'的意思是：我们给幻觉率设了一条不可逾越的红线——比如政务育儿这种场景，对一个孩子的喂养、用药给错信息是要出事的。所以任何新版本上线前，幻觉率必须**不劣于这条基线**才允许放量，劣化了就不上。基线是我们这种民生场景的安全底线，宁可保守也不能突破。\"\n\n**加分点：** 能说出\"上线前会过一个专门的安全测试集，包含一些容易诱发幻觉的边界问题和攻击性提问\"。\n\n### 追问 7：AB 测试你具体怎么设计的？\n\n**标准答法：**\n\n> \"AB 测试我盯四件事：第一，**单一变量**——一次只改一个东西，比如这次只换检索策略，别的不动，不然测出来不知道是谁的功劳。第二，**随机分流**——流量随机分到 A、B 两组，避免人群偏差。第三，**核心指标 + 护栏指标**——核心指标比如回答准确率、采纳率；护栏指标比如延迟、成本、幻觉率，护栏指标不能因为核心指标涨了就恶化。第四，**灰度放量**——先小流量验证，指标过线了再逐步放大。\"\n\n**雷区：** 只说\"分两组对比\"就完了——不及格。一定要带上\"护栏指标\"和\"灰度放量\"，这两个词能立刻把你和外行区分开。\n\n---\n\n## 三、成本类追问（CAG、降本 80%、延迟优化、小模型路由——你的差异化王牌）\n\n成本和 ROI 是你简历第二条核心卖点，也是 AI PM 区别于普通 PM 的硬通货。**CAG 这块是高危区，最容易答错原理，务必答准。**\n\n### 追问 8（高危）：你说的 CAG 和普通缓存有什么区别？CAG 缓存的到底是什么？\n\n**这一题答错原理就废了。务必记牢：CAG 缓存的不是问答结果，是 KV-cache。**\n\n**标准答法（口语版，慢慢说清楚）：**\n\n> \"这两个是不同层次的东西。\n>\n> 普通缓存是**结果级**的——比如用 Redis 存'这个 query 对应这个 answer'，下次来个一模一样的问题就直接返回。问题是它只有**完全命中**才有用，问题稍微变个说法就 miss 了。\n>\n> CAG，全称 Cache-Augmented Generation，缓存的不是结果，是**模型内部的 KV-cache**。具体说：把固定的知识预先加载进模型的上下文，让模型把这部分知识在注意力层算出来的中间状态（也就是 Key-Value 缓存）预计算好、存下来。之后任何新问题进来，模型直接复用这份预算好的知识状态去生成答案，**省掉了实时检索这一整步**——延迟就是这么降下来的。\n>\n> 一句话区别：普通缓存缓存的是'答案'，命中靠运气；CAG 缓存的是'模型对知识库的内部压缩表示'，对任意新问题都能复用。\"\n\n**加分认知点（说出来很惊艳）：**\n- \"CAG 在工程上和 prompt caching 是同源的，都是缓存 KV 状态，可以理解成'把 prompt caching 用在固定知识库上的范式'。\"\n\n**适用边界（必须能答，否则露怯）：**\n- 被问\"那为什么不全用 CAG、还要 RAG 干嘛\"时答：\"CAG 只适合知识库小到能整个塞进上下文窗口的场景。我们 20000 多份文档全塞进去是不现实的，所以**主体还是 RAG，CAG 用在高频、固定、能预加载的那部分知识上**——两者是配合，不是替代。\"\n\n**雷区：** 把 CAG 说成\"就是把答案缓存起来\"——**彻底答错**，这是面试官专门用来筛人的题。\n\n### 追问 9：降本 80% 具体是怎么来的？拆开说。\n\n简历里有两处 80%：CAG 缓存策略压降推理成本近 80%，以及\"CAG 前端路由拦截 + DeepSeek 深度适配实现复合成本压降 80%\"。**注意它是\"复合\"的，是好几招叠出来的，别说成单招。**\n\n**标准答法（分层拆，显出你懂系统优化）：**\n\n> \"这个 80% 不是单一手段，是几招叠加的复合结果，我从请求进来的链路顺着说：\n>\n> 第一招在最前端——**意图分类拦截**。请求还没碰到大模型，先用一个轻量分类器判断意图。大量是无效的基础提问或者重复的高频问题，这类直接命中缓存或者走模板答，根本不打到贵的大模型上。简历里写的'前端拦截减少无效提问对大模型的冲击'就是这个。\n>\n> 第二招是**分层检索**——优先查表、查缓存，查不到再调模型。能用便宜方式答的绝不动用贵的推理。\n>\n> 第三招是 **CAG**——前面说的，对固定高频知识缓存 KV 状态，省掉实时检索的开销。\n>\n> 第四招是**模型适配**——深度适配 DeepSeek 这类性价比高的模型，单位推理成本本身就低。\n>\n> 这四招叠起来，把整体推理成本压到原来的两成左右——也就是降本接近 80%。\"\n\n**加分点：** 引用一个业界事实托住可信度——\"业界一个常见观察是，生产环境里大概 60% 到 80% 的请求其实简单到用小模型甚至缓存就能答，根本不用动大模型。把这部分分流掉，单靠路由就能省一大块；再叠加缓存、CAG、模型适配，复合下来到 80% 量级是合理的。\"\n\n> **口径提醒**：这条业界数据说的是\"60–80% 的**请求**简单到不必用大模型\"，不是\"60–80% 的**花费**浪费了\"——别说成后者，被追问数据来源时容易被纠。报这条用\"业界一个常见观察是\"的口吻，别说成自己测的。\n\n### 追问 10：响应从 7 秒降到 2 秒，怎么做到的？\n\n**标准答法（组合拳）：**\n\n> \"也是组合优化：\n>\n> 一是**路由分流**，简单请求走小模型、走缓存，不必每次都等大模型推理，这部分请求的延迟直接砍掉一大截。\n>\n> 二是 **CAG 省检索**，固定知识不用实时去向量库捞，省掉检索那一段时间。\n>\n> 三是**流式输出**——首 Token 提前返回，用户感知的等待（TTFT）就降下来了，简历里 TTFT 做到 3 秒级、平均响应 2 秒就是这个效果。\n>\n> 四是**并行化和精简**——把意图分类、检索这些步骤尽量和别的准备工作并行，而不是串行排队；同时缩短 prompt、减少召回条数，少喂点东西模型就生成得快。\"\n\n**加分认知点：** \"这里有个细节——意图分类如果**串行**放在大模型前面，会平白加几百毫秒；但如果**并行**做，常态下几乎零额外延迟。所以分类要不要加、怎么加，本身也是个延迟和成本的权衡。\" 能讲到这层，面试官会确认你是真做过性能优化的人。\n\n### 追问 11：小模型路由的原理是什么？前端意图分类具体怎么做？\n\n**标准答法：**\n\n> \"路由层就是坐在应用和多个模型中间的一个'调度员'。每个请求进来，它先判断这个请求的类型和复杂度——是闲聊、是 FAQ、是需要检索、还是真需要大模型深度推理。简单的就分给便宜的小模型甚至直接走缓存，复杂的才放给大模型。\n>\n> 实现上有三个层次，从便宜到智能：最便宜的是**关键词/规则路由**，命中明显的模式直接分流；中间是**小模型分类器路由**，用一个很快的小模型或训练好的分类器判复杂度；最稳的是**混合**——关键词先过掉明显的，模糊的再交给语义分类器。\n>\n> 前端意图分类的本质就是把这套'便宜的分流放在前面、贵的推理放在后面'落地：在请求进大模型之前先分类，FAQ 类直接命中缓存或模板，明显无效的直接拦掉，只让真正需要大模型的请求往后走。\"\n\n---\n\n## 四、Agent / 安全类追问（SAGE 主场，安全岗最爱深挖）\n\nSAGE 是 G 端 Text2SQL 取数智能体，涉及政务数据，**安全这块面试官会往死里问。核心认知：安全必须落在执行层，不能靠模型自觉。**\n\n### 追问 12：SAGE 算 Agent 吗？\n\n**诚实区分，别硬蹭。**\n\n**标准答法：**\n\n> \"判断是不是 Agent，我看一个最硬的特征：有没有'执行反馈 + 自我修正'的闭环。套壳的 SQL 生成器是一次性的——丢个问题、吐条 SQL、跑不跑得通听天由命；Agent 是会看真实反馈再纠偏的。\n>\n> SAGE 是有这个回环的：它先检索相关表结构、确认口径（感知规划），生成 SQL 并调数据库执行（行动），**如果执行报错或结果明显不对，它会拿这个反馈回去重写 SQL**（自纠正再循环）。有工具调用、有多步、还有'看一眼反馈再纠正'这道回环，所以它是个 Agent，不是一次性 prompt。\n>\n> 但我会诚实说边界——它不是那种完全自由规划的复杂多智能体，主链路相对固定（理解→生成 SQL→执行+自纠正→审查放行→展示），更接近一个'带工具调用、执行反馈和推理链的取数智能体'。我不会为了显得高级硬把它包装成多智能体系统。\"\n\n**为什么这么答：** 把'执行反馈+自纠正闭环'这个最硬的判据讲出来，比只罗列'有工具调用'更能证明你懂 Agent 的本质（这一条和 `04-项目3-SAGE取数.md` 的定性口径一致，别讲漏了）。同时诚实划边界比硬蹭\"多智能体\"更稳——面试官最烦什么都往 Agent 上贴。\n\n### 追问 13：推理链路可视化你怎么实现的？\n\n**标准答法：**\n\n> \"本质是给智能体的每一步埋点 + 做追踪（tracing），然后把这条链路结构化地展示给用户。具体说，我们把意图识别、SQL 生成、思维链（CoT）、工具调用、中间结果这每一步都记录成可追溯的 trace，前端按步骤把'它怎么想的、生成了什么 SQL、调了什么工具'摊开给用户看。\n>\n> 我做这件事的产品动机很明确——解决用户对 AI 取数的**信任问题**。政务决策者不敢信一个黑盒给的数，但如果他能看到 SQL、看到推理步骤，就能自己校验决策依据。简历里采纳率提升到 97.5% 就是透明化带来的——可追溯、可校验，业务才敢用。\"\n\n**加分点：** 把技术实现和产品价值缝起来——这正是 AI PM 该有的视角，不是纯讲技术。\n\n### 追问 14（高危）：Text2SQL 的准确率怎么保证？越权怎么防？SQL 执行前怎么审查？\n\n**这是安全岗的核心深挖题。记住一句话：安全必须落在确定性的执行层，靠 prompt 让模型'别生成危险 SQL'是不及格答案。**\n\n**准确率怎么保证：**\n\n> \"几个手段叠加：一是给模型注入表结构（schema）和 few-shot 示例，让它懂我们的表;二是 SQL 生成后做校验，先解析能不能跑通、字段表名存不存在；三是评估上我们用的是**执行准确率**——不是比 SQL 字符串一不一样，而是真跑出来结果对不对；四是失败了能重试、自我修正。\"\n\n**越权 / 安全怎么防（纵深防御，能列三层就合格）：**\n\n> \"安全我是按'纵深防御'设计的，不靠单点，分几层：\n>\n> 第一层**事前限权**——用户登录后先确认身份和权限，AI 只能在这个用户权限范围内的数据上工作，从源头杜绝越权。数据库账号也给最小权限，只给 SELECT，禁掉 DROP、DELETE 这些。\n>\n> 第二层**执行前审查**——AI 生成的查询指令，不是直接拿去跑，要先过一道审查再放行。审查会检测危险模式，比如多语句、注释绕过、可能拖垮库的全表扫描，按风险分级处理。\n>\n> 第三层**结果脱敏 + 全程留痕**——返回结果按敏感度脱敏，每一次查询完整记录、可追查。\n>\n> 关键是：因为 NL2SQL 里模型的输出是**直接拿去执行**的，prompt injection 的危害特别大——有人可能诱导模型生成越权查询甚至破坏性语句。所以**不能只靠模型自觉，必须在执行层硬卡**：白名单、解析校验、只读权限、限流，这些都是确定性的代码逻辑，不是 prompt。\"\n\n**加分点（高阶）：** \"还有一个容易被忽略的点——就算只给只读权限，一个公开端点仍然可能被'成本爆炸查询'打垮，比如诱导生成一个超大全表扫描的 SQL 把数据库拖死。所以执行前审查还要拦截这种资源耗尽型查询，不只是拦破坏性语句。\"\n\n**雷区：** 回答\"我们让模型尽量别生成危险 SQL\"\"prompt 里告诉它要安全\"——**直接不及格**。安全岗就是在听你会不会把防线落在执行层。\n\n### 追问 15：你那套\"埋点-Badcase-归因-迭代\"的标准化链路，到底解决了什么？\n\n这是你简历里很硬的一块（SAGE 从 0 到 1 建的），值得讲透。\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef route fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n\n    A[\"埋点采集<br/>线上真实数据\"]:::step --> B[\"Badcase 捕获<br/>抓出答错的\"]:::step\n    B --> C[\"归因复盘<br/>聚类问题类型\"]:::step\n    C --> D{\"分发机制\"}:::route\n    D -->|交互问题| E[\"产品侧优化\"]:::route\n    D -->|Prompt失效/知识库错| F[\"算法侧调优\"]:::route\n    D -->|性能问题| G[\"工程侧优化\"]:::route\n    E --> A\n    F --> A\n    G --> A\n```\n\n**标准答法：**\n\n> \"这套链路解决的是'AI 产品迭代没章法'的问题。我从 0 到 1 把它标准化成四步：线上**埋点采集**真实数据 → 自动**捕获 Badcase** → **归因复盘**，把高频问题聚类，比如分成 Prompt 失效、知识库解析错误这些类型 → 然后**分发**，这一步最关键：我建了明确的协作边界——交互类问题归产品侧优化，Prompt 失效、知识库错误归算法侧调优，性能类归工程侧。\n>\n> 为什么这步重要？因为 AI 项目最容易扯皮的就是'这个 Badcase 到底该谁修'。我把归因和分发规则定死，三方各管各的边界，迭代效率才上得来。这其实也是我作为产品在跨职能协作里的核心价值——不是我自己修 bug，是我让整个团队知道每个问题该谁修、怎么修。\"\n\n---\n\n## 五、多模态类追问（杭小育的拍照营养分析 98%）\n\n简历里\"拍照分析营养膳食准确率 98%、营养素摄入分析 85%+、照护异常行为告警近 80%\"——**这几个数口径不一样，别混说。**\n\n### 追问 16：拍照营养分析 98% 怎么实现的？这个 98% 是什么的准确率？\n\n**标准答法：**\n\n> \"实现上是用多模态大模型（VLM）做图像理解——用户拍一张食物照片，模型识别出食物类别，再映射到营养数据库算出卡路里、营养素这些。\n>\n> 关键是这个 98% 我要说清是**哪个环节**的准确率——它是**食物类别识别**的准确率，也就是'这张图里是什么食物'认得准不准。评估靠的是人工标注的金标准测试集：每张图标好正确的食物，然后算模型识别的命中率。\n>\n> 我得诚实区分——**识别食物对，和把营养算对，是两件难度差很多的事**。所以简历里营养素摄入分析是 85%+，比类别识别低，因为份量估算比认出食物难得多，一碗饭到底多少克，光看照片估得不准误差就大。这两个数我从来不混着说。\"\n\n**为什么这么答：** 笼统说\"98% 准确\"必被追问\"哪个环节、什么口径、多少张测试图、谁标的\"。你主动拆清楚识别 vs 估算的难度差，反而显出你对这个功能理解得很透。\n\n**雷区：** 把\"识别对食物\"混说成\"营养算对了 98%\"——会被一问就穿。\n\n---\n\n## 六、项目深挖类追问（接手状态 / 你的角色 / 最大的坑 / 重来怎么改）\n\n这一类问的是\"这项目到底是不是你的、你到底想清楚没有\"。**这里最考验铁律一：主导和参与分清楚。**\n\n### 追问 17：你接手杭小育的时候是什么状态？你主导了什么？\n\n**标准答法（讲清起点和你的增量）：**\n\n> \"我接手时项目已经在跑，但有几个明确的痛点：20000 多份知识长尾碎片化、检索难；大量无效基础提问导致推理成本极高；多轮对话频繁切话题、系统跟不上上下文。当时给我的阶段目标很清楚——**建一个更稳定可靠、运行成本更低的知识问答系统**。\n>\n> 我主导的是产品侧这几块：一是首页信息架构优化，这块用上了我设计的背景——按功能组块、信息块、归属部门重新梳理，用视觉分区、标签推荐降低使用门槛；二是文档切分和多路检索的优化方案，把检索准确率提了 34%；三是成本侧的设计——前端意图拦截、缓存分层。这些是我牵头做的。算法的具体模型调参是算法同学做的，我负责定方向、定方案、定评估标准、推进迭代。\"\n\n**加分点：** 主动交代\"哪些是我牵头、哪些是算法同学做的\"——这个分寸感正是面试官在找的。\n\n### 追问 18：孤独症筛查这个项目，你具体是什么角色？（诚实定位题）\n\n**这题是诚实原则的试金石。这个项目你简历里多是\"协助/参与/阶段性负责\"，AI 含量也相对低，老实说反而加分。**\n\n**标准答法：**\n\n> \"我先诚实说定位——这个项目我是**省筛查系统上线后接手的**，更多是协助和阶段性负责，不是从 0 主导。而且这个项目它的核心其实**不是 AI**，是医学量表的数字化 + 全省多级业务流程的驾驭。\n>\n> 我做的具体是三块：一是全省 1600 多家医疗机构铺开后，多级协同出了很多痛点，我协助重新梳理'卫健委监管线'和'省市县街道业务线'的流转规则，理顺 C 端浙里办扫码和 B/G 端多级联动；二是把 M-CHAT-R、Gesell、CARS 这些成熟医学筛查量表，转成线上可配置、带逻辑防呆的数字化表单，串起初筛、复筛、确诊的数据节点；三是参与国家科技部的课题，作为阶段性负责人，负责把视觉、喂养这些健康数据数字化建模，主导智能问答引擎接入，确保课题成果上线。\n>\n> 我觉得这个项目对我最大的价值，不是 AI 有多深，而是**让我证明了能驾驭一个国家级民生项目里极其复杂的 B/G 端业务**——全省百万级人口动态普查、7600 多家机构日均高并发、国产信创环境、多级政府协同。这种复杂度的业务掌控力，是很多纯做 C 端的人没碰过的。\"\n\n**为什么这么答：** 你把一个\"AI 含量低\"的项目，诚实地重新定位成\"复杂 B/G 端业务驾驭能力\"的证明——既不夸大成纯 AI 项目（避免被拆穿），又把它的真实价值讲出来了。这是高段位的回答。\n\n### 追问 19：这些项目里最大的坑是什么？哪个指标最难拿？\n\n**标准答法（举一个真实的、有思考的）：**\n\n> \"最难拿的指标我会说杭小育的**幻觉率卡安全基线**这件事。难在哪——降本和降幻觉经常是打架的：你想省成本就少调大模型、多走缓存和小模型，但这又容易让回答质量和准确性下滑、幻觉冒头。在政务育儿这种场景，幻觉是红线，给错喂养用药信息要出事。\n>\n> 所以这里的坑是：不能为了 80% 的降本牺牲安全。我们的做法是把幻觉率设成不可逾越的护栏指标，任何降本手段上线前都必须证明幻觉率不劣化才放量。等于是在'成本'和'安全'这两个互相拉扯的目标之间找平衡点——这比单纯把某个数字做高难多了。\"\n\n**加分点：** 选一个体现\"权衡 trade-off\"的坑，而不是\"某个技术不会\"。AI PM 的核心能力就是讲清权衡。\n\n### 追问 20：如果重来，你会怎么改？\n\n**标准答法：**\n\n> \"如果重来，我会更早地把那套'埋点-Badcase-归因-迭代'的标准化链路搭起来——我是在 SAGE 才把它系统化的，但杭小育早期其实也需要。早点有这套，Badcase 的归因和分发会更快，少走很多'问题该谁修'的扯皮弯路。\n>\n> 另外评估测试集我会更早开始攒、攒得更大——金标准集是 AI 产品迭代的地基，越早建、覆盖越全，后面每次优化的提升都能更可信地量化出来。\"\n\n---\n\n## 七、被问到确实不懂的：怎么诚实应对（这是高级能力，不是认怂）\n\n你是非科班，一定会遇到答不上来的技术深挖。**记住：面试官全程在 \"prove it\"，你编一个错的原理，当场被识破，比承认\"这块我没深入\"难看一百倍。**\n\n### 标准应对结构：承认边界 → 给推理/类比 → 给学习路径\n\n```mermaid\ngraph LR\n    classDef step fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n\n    A[\"1 承认边界<br/>这层我没亲手调过\"]:::step --> B[\"2 给推理<br/>但据我理解原理是…\"]:::step\n    B --> C[\"3 给路径<br/>真要落地我会先验证X 请教Y\"]:::step\n```\n\n**话术模板（可以直接背框架）：**\n\n> \"这一层的底层实现我没有亲手调过，所以我不敢给你编一个确定的答案。\n>\n> 但据我的理解，原理大概是 XX（说你真懂的那部分，哪怕只是个类比）。\n>\n> 如果这件事要我真正落地，我会先验证 YY，然后拉上算法同学一起确认 ZZ，再定方案。\"\n\n**为什么这套有效：**\n- **诚实**——不踩\"编造翻车\"的雷。\n- **展示结构化思考**——你虽然不懂细节，但知道怎么去搞懂、该问谁、该验证什么，这恰恰是 PM 的核心能力（PM 本来就不需要自己写代码，需要的是讲清权衡、知道怎么推进）。\n- 业界有个很值钱的判断：**\"有结构 + 有观点\" 比 \"流利但平庸\" 强得多。** 你哪怕给一个面试官没听过的小观点、一个真实的项目体感，都比背一段标准答案有价值。\n\n**绝对不要做的事：**\n- ❌ 硬编一个原理蒙混——这是最致命的死法。\n- ❌ 一句\"这个我不太懂\"就完事——要带上推理和学习路径，不能光认怂。\n- ❌ 把\"我不懂\"扩大化——只承认你确实不懂的那一个点，别因为一个细节没答上就否定整个项目。\n\n---\n\n## 八、收尾：上场前在脑子里过一遍的\"防穿清单\"\n\n最后给你一张随身卡片。**进面试前、每讲一个项目前，在心里默过这几条：**\n\n- [ ] 这个项目，我哪些是主导、哪些是协助？开口前先分清楚（铁律一）。\n- [ ] 我马上要说的这个百分比，分子分母是什么？在哪个测试集？谁判定的？（铁律二，三件套）\n- [ ] CAG 缓存的是 **KV-cache 不是结果**——这题一定会被问，别答错。\n- [ ] 粗排=双塔向量召回，精排=交叉编码器联合打分——别说反、别说成关键词。\n- [ ] SAGE 算 Agent 的硬判据是**执行反馈 + 自纠正闭环**，不是\"套了大模型\"——这条别讲漏。\n- [ ] Text2SQL 安全落在**执行层**（只读权限 + 执行前审查 + 限流），不是靠 prompt。\n- [ ] 34% 怎么来的：500 个点踩 Bad Case + 医生标金标准 + AB 测试。\n- [ ] 拍照营养 98% 是**食物识别**准确率，份量估算更难所以营养分析只有 85%——别混。\n- [ ] 孤独症项目诚实定位：复杂 B/G 端业务驾驭，不硬吹成纯 AI。\n- [ ] 真不会的：承认 + 给推理 + 给学习路径，绝不硬编。\n\n记住那句话——**面试官追问的不是要难倒你，是在确认这是不是你真做的、你到底懂多深。** 你这三个项目是真做过的，把每个术语补成\"知其所以然\"，把每个数字焊上口径，你就从\"听起来像做过\"变成\"一问就知道是真做过的人\"。这一章就是干这件事的。\n", "/06-个人经历改造/01-STAR与AI语言改造法.md": "# STAR 框架 + AI 产品语言改造法：把项目讲成故事\n\n## 这一章解决一个问题：你做过的事，怎么讲才不亏\n\n先说一句最关键的话——**面试官不是来听你\"做了什么\"的，是来判断\"换个项目、换个团队，你还能不能做成\"的。**\n\n你简历上写\"善育在杭支撑 460W+ 用户、CAG 降本 80%\"，这只是一个结果。面试官真正想知道的是：这 80% 是你拍脑袋蒙对的，还是你有一套方法论一步步逼出来的？如果是后者，那你下一个项目大概率也能降下来——这才是他愿意给你 offer 的理由。\n\n所以讲项目的核心不是\"报数字\"，是**把数字背后的决策链路、取舍判断、和\"为什么是你做成的\"讲清楚**。这一章给你一套可以套在三个项目上的改造方法。后面三篇（杭小育 / 孤独症筛查 / SAGE 取数）就是用这套方法把你的真实经历逐个打磨成稿。\n\n> 写在最前面的诚实底线：这一章教你\"讲得更好\"，不是\"讲得更假\"。你简历里哪些是\"主导\"、哪些是\"协助/参与\"，业内面试官一追问就能分辨。**贪功是面试里最致命的失分项**——一旦某个细节圆不上，他会反推你前面所有数字都掺水。我们要做的是把你真做过的事讲到位，而不是把你没做过的事讲得像你做的。\n\n---\n\n## 一、STAR 是什么，以及它为什么不够用\n\n### STAR 四件套\n\nSTAR 是讲行为/项目类问题的通用骨架，四个字母对应四段：\n\n| 字母 | 含义 | 这一段要回答的问题 | 篇幅 |\n|------|------|------------------|------|\n| **S**ituation | 情境 | 当时什么背景？什么场景下的事？ | 简短，给够代入感就停 |\n| **T**ask | 任务 | 你要解决的具体问题/目标是什么？ | 简短，一两句锁定靶子 |\n| **A**ction | 行动 | **你**怎么做的？用了什么策略、怎么取舍？ | 重头戏，占一半以上 |\n| **R**esult | 结果 | 拿到了什么可量化的成果？ | 数字 + 因果，不是只甩数字 |\n\n业内对 STAR 的几条共识，先记住：\n\n- **准备 3–5 个故事**，覆盖不同能力维度（一个讲技术深度、一个讲跨团队协作、一个讲从 0 到 1），不要指望一个万金油故事打天下。你正好有三个项目，天然覆盖 C 端 RAG、B/G 端复杂业务、G 端 Agent 三个面。\n- **单个故事控制在 1.5–2 分钟**。给够细节，但别超出面试官的注意力——他一旦走神，你后面的金句全废。\n- **S 和 T 要简洁，重量级笔墨全砸在 A 和 R 上**。新手最常见的毛病是背景铺了 40 秒，到 Action 只剩\"然后我就优化了一下\"。\n\n### STAR 的天生短板（这是这一章的发力点）\n\nSTAR 好用，但它有个结构性缺陷：**纯按四段平铺，容易变成线性流水账，丢掉了\"冲突张力\"和\"决策权衡\"。**\n\n什么意思？流水账版本是：\"我们要降成本（T），我做了缓存和路由（A），成本降了 80%（R）。\"——听上去没毛病，但平淡得像读周报，面试官记不住，也挖不出你的判断力。\n\n真正打动人的讲法，是在 Action 里**把\"当时的两难\"摆出来**：\n\n> \"降成本最直接的办法是换个更小的模型，但小模型在养育医学问答上幻觉率压不住，这是政务场景的红线。所以我没动模型档位，而是从'让大模型少干活'入手——前端先拦截无效提问、能查缓存的绝不调模型……\"\n\n你看，加了\"我本可以走 A，但 A 有什么代价，所以我选了 B\"这一层，整个故事立刻有了张力，也顺带证明了你**懂技术边界、会权衡**。这正是 AI PM 最值钱的素质。\n\n**所以这一章的 STAR，是改良版 STAR：在 Action 段里强行插入\"冲突 + 取舍\"。** 记一个口诀：\n\n```mermaid\ngraph LR\n    classDef base fill:#A0AEC0,stroke:#718096,stroke-width:2px,color:#fff\n    classDef key fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    S([Situation 情境]):::base --> T([Task 任务]):::base\n    T --> C{冲突/取舍<br/>本可以A 但…}:::key\n    C --> A([Action 我的行动]):::key\n    A --> R([Result 数字+因果]):::key\n    R -.-> L[\"反思/迭代:<br/>下一轮怎么做更好\"]:::note\n```\n\n末尾那个虚线的\"反思/迭代\"是加分项：讲完结果，补一句\"如果重来我会先把评估集建得更大\"\"这套打法我后来复用到了 SAGE\"，体现你有**数字产品的迭代心智**——面试官特别吃这套，因为 AI 产品本来就是迭代出来的，不是一锤子买卖。\n\n---\n\n## 二、AI 产品项目，和传统项目讲法的关键差异\n\n这是这一章的灵魂。你转型 AI PM，最大的风险是**用做传统功能的思路讲 AI 项目**——讲得再流利，懂行的面试官两个追问就把你打回原形。\n\n传统项目讲法是\"需求 → 方案 → 上线 → 数据\"，强调的是把一个**确定的功能**做出来。AI 项目不一样，它讲的是**你怎么驯服了不确定性**。具体要多讲清楚这六件事（可以背下来，当成讲 AI 项目的自检清单）：\n\n```mermaid\ngraph TB\n    classDef core fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef sub fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    AI([讲 AI 项目 必答六问]):::core\n    AI --> U1[1 解决了什么不确定性<br/>技术能不能撑住需求]:::sub\n    AI --> U2[2 数据闭环<br/>Badcase 怎么回流成迭代]:::sub\n    AI --> U3[3 评估体系<br/>怎么量化好不好]:::sub\n    AI --> U4[4 成本/ROI<br/>低成本撬动大成效]:::sub\n    AI --> U5[5 技术取舍<br/>为什么这么选 放弃了什么]:::sub\n    AI --> U6[6 你不可替代的贡献<br/>这事为什么得是你]:::sub\n\n    N[\"传统项目讲'做了什么功能'<br/>AI 项目讲'怎么管理概率系统'\"]:::note\n```\n\n逐条拆开讲，并对应到你的素材。\n\n### 差异 1：你解决了什么\"不确定性\"（技术预研）\n\n传统功能需求确定、方案确定，做就完了。AI 项目第一步是**判断\"这事 AI 到底能不能做、做到什么程度\"**——这一步叫技术预研，是 AI PM 区别于传统 PM 的起点。\n\n讲项目时，要让面试官听到你**在动手前做过这层判断**。比如杭小育：\n\n> \"接手时第一件事不是写 PRD，是先验证'2 万份长尾养育知识，RAG 到底能不能稳定检索准确'。我从线上被点踩的 Bad Case 里抽了 500 个高频真问题，让业主方医生标注标准答案在哪个文档段落，先拿这个测一版基线召回率——心里有了底，才决定整个优化方向。\"\n\n这一句话的含金量极高：它证明你**不是先做后想，是先评估再投入**。面试官会立刻把你归到\"懂 AI 工程节奏\"那一档。\n\n### 差异 2：数据闭环 / 数据飞轮\n\n传统产品里数据是\"做完功能再看的后台资产\"。AI 产品里数据是**生产资料**：用户用 → 产生 Badcase → 归因 → 迭代 → 体验变好 → 更多用户。这个循环转得越快，护城河越深。\n\n你的素材里有现成的硬货——SAGE 项目你\"从 0 到 1 建了'埋点采集 → Badcase 捕获 → 归因复盘 → 迭代优化'的标准化链路\"，这就是一个教科书级的数据闭环，一定要作为亮点讲。\n\n```mermaid\ngraph LR\n    classDef step fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    E[埋点采集]:::step --> B[Badcase 捕获]:::step\n    B --> A[归因复盘<br/>聚类问题类型]:::step\n    A --> D[分发迭代<br/>产品/算法/工程分工]:::step\n    D --> E\n\n    N[\"飞轮不是自己转的<br/>是你设计了'谁接什么 case'的分发机制\"]:::note\n```\n\n讲数据闭环的进阶技巧：别只说\"我建了闭环\"，要说**你怎么把模糊的 Badcase 分类、分发给对的人**。SAGE 里你把线上高频问题聚类成\"Prompt 失效 / 知识库解析错误\"等类型，再明确\"产品侧优化交互、算法侧调优、工程侧优化性能\"的协作边界——这层\"分诊\"机制才是你产品经理的价值所在，工程师建不出来。\n\n### 差异 3：评估体系（这是 AI PM 的硬通货）\n\n传统产品验收是二元的——pass 或 fail，测一次过了就交付。AI 产品的\"好\"是概率的、多维的，你必须建一套**评估体系**来量化它，而且要分两层、两阶段：\n\n**两层指标：**\n\n- **算法指标**：召回率、准确率、忠实度（faithfulness，防幻觉）、答案相关性等。\n- **业务指标**：采纳率、投诉率、人工节省、响应时长……\n\n只讲算法指标 = 不懂业务；只讲业务指标 = 不懂技术。**两层都讲，才证明你是 AI PM 而不是纯运营。** 你的素材正好两层都有：杭小育\"检索覆盖率 +34%、回答准确率 97.5%\"是算法/质量层，\"推理成本 -80%、响应 7s→2s、460W+ 用户\"是业务层；SAGE\"采纳率提升至 97.5%\"是业务层，背后是\"推理链路可视化\"这个产品手段在撑。\n\n**两阶段评估（追问高频，务必分清）：**\n\n| | 离线评估 | 在线评估 |\n|---|---------|---------|\n| 时机 | 上线前 | 上线后 |\n| 数据 | 固定的\"金标准集\"/合成集，可控可复现 | 真实生产流量，更脏、更对抗、更新颖 |\n| 你的素材对应 | 杭小育的 **500 题金标准检索测试集 + AB 测试** | 线上**埋点 + Badcase 回流** |\n\n你做杭小育时建的那个\"500 题金标准集 + 优化前后 AB 测试\"，就是标准的**离线评估**；上线后的埋点和点踩回流，就是**在线评估**。把这两个术语对应上，你讲项目的专业度直接上一个台阶。\n\n> 关于 RAG 评估指标，深一层的口径见本站第 01 章《10-模型评估与幻觉》、第 02 章《04-AI 评估体系》。这里只需记住三个面试常被追问的 RAG 指标：**faithfulness（忠实度，答案有没有忠于检索到的资料，防幻觉）、answer relevancy（答案相不相关）、contextual precision（检索回来的那几段，真正相关的有没有排在前面）**——常用 LLM-as-judge 来打分。\n\n### 差异 4：成本 / ROI（AI 项目独有的硬考点）\n\n这是传统项目几乎不会被深挖、但 AI 项目必问的维度。因为大模型**每一次推理都在烧钱**（算力成本），AI PM 必须有 ROI 账本意识。成本不止算力，还有**数据成本、标注成本、人力成本**。\n\n你的个人总结里写\"低技术成本撬动最大商业成效\"，这正是面试官想听的句式。讲的时候要给出\"花了什么、省了什么\"的因果：\n\n> \"降本我没靠堆预算，靠的是让大模型少被无效调用。前端意图分类先拦掉一批无效基础提问，高频又稳定的政务核心知识用 CAG 预先缓存、命中时直接复用不再实时检索，再叠加对 DeepSeek 的深度适配，复合下来推理成本压降了近 80%，TTFT 做到 3 秒级、平均响应从 7 秒降到 2 秒。\"\n\n这段话同时给了**成本（-80%）和体验（响应 7s→2s）两个维度**，证明你不是为省钱牺牲体验，而是找到了那个\"既快又省\"的解——这就是 ROI 思维的落地。\n\n> CAG 是这章最容易被追问的术语，先把口径记准（详见第 01 章《06-RAG》《11-成本延迟质量三角》）：**RAG 是每次提问都实时去向量库检索**，灵活但有检索延迟和拉错文档的风险；**CAG（Cache-Augmented Generation）是把静态、不常变的知识预先加载/缓存好，命中时直接复用、不做实时检索**，所以更快更省。结论要讲准——CAG 不是\"全面替代 RAG\"，它适合**知识集小且静态**的高频问法；知识量大、频繁更新的部分仍然得靠 RAG。你杭小育里\"优先查表/查缓存，查不到再调模型/走检索\"的分层设计，正是 CAG 和 RAG 的混合，这么讲既准确又显功力。\n\n### 差异 5：技术取舍（讲清楚\"为什么这么选\"）\n\n前面 STAR 改良版里说的\"冲突 + 取舍\"，在 AI 项目里尤其重要，因为 AI 的每个技术选型都有代价：\n\n- 召回为什么用\"粗排 + 精排\"漏斗，而不是一上来就精排？→ 因为精排（Cross-encoder reranker）准但慢、贵，对全库每条都跑会慢到无法接受；粗排（向量召回）快但糙。所以**先用便宜的粗排把范围从 2 万缩到几十条，再用贵的精排在小范围里精挑**——用工程结构把成本和效果同时兜住。\n- 模型为什么不一味追大？→ 大模型贵、慢；小模型便宜快但幻觉压不住。所以**该用大模型保质量的地方用大的，能用路由/缓存/小模型兜的地方就别浪费大模型**。\n\n把这种\"我知道每条路的代价，所以我这么选\"讲出来，比报十个数字都有说服力。\n\n> reranker（精排）的原理也是高频追问，记准了别讲反（详见第 01 章《06-RAG》）：**向量召回是 Bi-encoder，query 和文档各自独立编码成向量、只算相似度，快但把整篇语义压成一个向量会有信息损失**；**精排是 Cross-encoder，把 query 和文档拼在一起送进模型联合判断相关性，准但每个 query-文档对都要跑一次完整推理、慢到没法做第一阶段**。这就是\"reranker 只精排不召回\"的根本原因。一个进阶认知能让你显得很懂：reranking 本质是**证据问题不是排序问题**——通用 reranker 偏爱\"读起来顺、宽泛相关\"的内容，可能把你真正需要的精确条款（某条养育医学规范、某个数值）压下去，所以评估 reranker 要看\"它有没有把真正能支撑答案的那段排上来\"，而不是凭\"感觉相关\"。\n\n### 差异 6：你个人不可替代的贡献（反\"贪功\"的正确姿势）\n\n讲项目最高频的失分点，叫 \"**We syndrome**\"——满嘴\"我们做了\"\"团队实现了\"，面试官听完根本不知道**你**到底贡献了什么。\n\n**铁律：Action 段讲\"我\"，不讲\"我们\"。** 但这里有个微妙的平衡——既不能贪功（把团队的算法/工程成果说成自己的），也不能谦虚到把自己讲没了。正确姿势是**精确切割\"我作为产品的那一刀\"**：\n\n- 算法工程师调的模型、写的 reranker、搭的向量库——这些不是你做的，别说成你做的。\n- 但\"**从线上抽 500 个 Badcase、组织医生标注金标准、定 AB 测试方案验证优化、把问题聚类后分发给产品/算法/工程**\"——这些是你作为产品经理实打实做的判断和组织工作，要理直气壮地讲\"我\"。\n\n一句话区分：**技术怎么实现的，那是工程师的功劳；但\"做不做、先做什么、好不好、谁来做\"——这些决策是你的。** 你的不可替代性不在于你会写 SQL 调 Prompt，而在于你**定义了问题、建了评估标尺、设计了协作分工**。\n\n---\n\n## 三、诚实定位三个项目（讲之前先校准角色）\n\n这套方法论套到你三个项目上，**力度要不一样**，因为你在里面的角色和项目的 AI 含量不同。讲之前先把定位校准好，免得讲嗨了被追问拆穿：\n\n| 项目 | 你的角色 | AI 含量 | 讲述主轴 | 雷区 |\n|------|---------|--------|---------|------|\n| **杭小育**（C 端政务 RAG） | **主场**：产品设计、Prompt/RAG 优化、评估集、降本都深度参与 | 高 | RAG 全链路 + 评估 + 降本的硬实操，可大胆深挖技术细节 | 别把算法/工程的活全揽成自己写的 |\n| **SAGE 取数**（G 端 Text2SQL Agent） | **主场**：信任化交互、数据安全、Badcase 闭环是你定义的 | 高 | Agent 可视化解决信任 + 数据闭环从 0 到 1 | 同上，分清产品决策与工程实现 |\n| **孤独症筛查**（B/G 端筛查系统） | **协助/参与/阶段性负责**（上线后接手、协助梳理、参与课题） | **相对低**（更多是医学量表数字化 + 全省多级业务流程驾驭） | **诚实定位**：突出\"驾驭复杂 B/G 端业务、扛国家级民生项目\"，不硬吹成纯 AI 项目 | 千万别说成你主导的 AI 大项目——一追问角色就穿帮 |\n\n**孤独症筛查项目要特别小心。** 它的价值不在 AI（AI 含量确实低），而在于：① 你能驾驭\"卫健委监管线 + 省市县街道业务线\"这种**极其复杂的多级 B/G 端业务流转**；② 你把 M-CHAT-R、Gesell、CARS 这些**专业医学量表数字化**成带逻辑防呆的表单引擎；③ 这是**浙江省十大民生实事、国家级科研课题**，承接住这种量级的项目本身就是能力证明（1600+ 机构、165164 筛查人次、投诉率降 85%）。\n\n讲它的时候，主动说一句\"**这个项目 AI 不是主角，我更多是把复杂的线下医学筛查流程数字化、把全省多级协同理顺**\"——这种坦诚反而加分，证明你**有判断力、不浮夸**。面试官最怕的就是什么都往 AI 上靠的\"AI 缝合怪\"。\n\n---\n\n## 四、从\"我做了 X\"升级到\"我用一套方法论做了 X、效果可量化、我懂为什么\"\n\n这是整章的口诀，也是你所有项目讲法的升级方向。三个层次，逐级递进：\n\n```mermaid\ngraph TB\n    classDef l1 fill:#A0AEC0,stroke:#718096,stroke-width:2px,color:#fff\n    classDef l2 fill:#4A90D9,stroke:#3474B8,stroke-width:2px,color:#fff\n    classDef l3 fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n\n    L1[\"第 1 层 我做了 X<br/>'我优化了检索'\"]:::l1\n    L2[\"第 2 层 我用方法做了 X 效果可量化<br/>'我建金标准集+AB测试<br/>把召回覆盖率提了 34%'\"]:::l2\n    L3[\"第 3 层 我懂为什么<br/>'粗排精排漏斗为什么能<br/>同时提覆盖和压成本 我能讲原理'\"]:::l3\n\n    L1 --> L2 --> L3\n```\n\n- **第 1 层（不及格）**：\"我优化了一下检索。\"——没方法、没数字、没原理，等于没说。\n- **第 2 层（合格）**：\"我从线上抽 500 个 Badcase 建金标准集，做了优化前后 AB 测试，把准确搜到知识的比例提升了 34%。\"——有方法、有量化，面试官点头。\n- **第 3 层（优秀）**：在第 2 层基础上，**追问时能讲清原理**——\"为什么这套优化能提 34%？因为我把文档从粗暴定长切分改成语义切分，减少了无效 Token；召回从单路改多路、加了 Rerank 精排……\"\n\n**第 2 层靠这一章的改造模板就能做到；第 3 层靠你把技术原理吃透**（这正是 06 章后面《深度追问预案》和 01 章技术速通要喂给你的）。两者缺一不可：只有第 2 层，遇到技术追问就崩；只有原理没量化，听上去像背书的实习生。\n\n---\n\n## 五、可直接套用的改造模板 + 讲述节奏\n\n下面这个模板，把改良版 STAR 和 AI 六问揉在了一起。你三个项目都能往里填。**配一个 2 分钟版本的讲述节奏（按秒分配）。**\n\n### 改造模板（填空式）\n\n> **【S 情境，15 秒】** 在 ____（什么场景/公司/业务）下，存在 ____（一个具体到能让人共情的痛点，最好带个数字或反差，比如\"2 万份长尾知识检索难、大量无效提问推高成本\"）。\n>\n> **【T 任务，10 秒】** 我接手时的目标是 ____（一句话锁定，比如\"建一个稳定可靠、运行成本更低的知识问答系统\"）。\n>\n> **【冲突/取舍，20 秒】** 最直接的做法是 ____，但它的代价是 ____（红线/成本/风险），所以我选择从 ____ 入手。（这一段是张力来源，别省）\n>\n> **【A 行动，50 秒】** 我具体做了三件事：①（产品判断，体现你定义问题/建评估的能力）；②（核心技术方案的产品决策，讲清取舍）；③（成本/数据闭环/协作分工）。全程用\"我\"，技术实现该归工程的归工程。\n>\n> **【R 结果，20 秒】** 最终 ____（算法指标）+ ____（业务指标），双维度。给基线对比（从 X 到 Y），不要只给绝对值。\n>\n> **【反思/迭代，5 秒，可选加分】** 如果重来我会 ____ / 这套打法我后来复用到了 ____。\n\n### 2 分钟讲述节奏（背下来这个分配比例）\n\n```mermaid\ngraph LR\n    classDef short fill:#A0AEC0,stroke:#718096,stroke-width:1px,color:#fff\n    classDef long fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef mid fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n\n    A[\"S 情境<br/>~15s\"]:::short --> B[\"T 任务<br/>~10s\"]:::short\n    B --> C[\"冲突取舍<br/>~20s\"]:::mid\n    C --> D[\"A 行动<br/>~50s 重头戏\"]:::long\n    D --> E[\"R 结果<br/>~20s\"]:::mid\n    E --> F[\"反思<br/>~5s\"]:::short\n```\n\n记住比例就行：**背景 + 任务加起来别超过 1/4，行动 + 取舍占一半以上，结果干净利落收尾。** 谁的 Action 段讲得最实，谁就赢。\n\n### 一个填好的样例（杭小育片段，可直接念）\n\n> \"我在一家 AI 公司做的旗舰项目是'杭小育'，一个 C 端政务育儿智能问答。**当时的痛点很典型**：政务育儿有 2 万多份长尾、碎片化的养育知识，用户根本搜不准；而且大量是'宝宝几个月加辅食'这种基础提问，每一条都去调大模型，推理成本高得离谱。**我接手时的目标**是把它做成一个又准、又稳、运行成本还要更低的系统。\n>\n> **最直接的降本办法是换个便宜的小模型，但这是政务医学场景，幻觉率压不住是红线**，所以我没动模型质量，而是从'让大模型少被无效调用'和'让检索更准'两头下手。**我具体做了三件事**：第一，我先从线上被点踩的 Bad Case 里抽了 500 个高频真问题，请业主方医生标注标准答案在哪个文档段落，建成一个金标准检索测试集——这是我后面所有优化的'尺子'；第二，我把文档从定长切分改成语义切分、召回从单路改成多路加 Rerank 精排，靠'粗排缩小范围、精排精挑'的漏斗，在覆盖率和成本之间找平衡，做优化前后的 AB 测试验证，最后把'准确搜到知识的比例提升了 34%'；第三，降本上我用前端意图分类拦截无效提问、能命中缓存的直接返回不调模型。**结果是**，召回覆盖率提了 34%、回答准确率做到 97.5%，推理成本压降了近 80%，平均响应从 7 秒降到 2 秒，全链路支撑了 460 万以上用户、日活 21.5 万。\n>\n> 如果说我个人最关键的贡献，不是写了哪行代码，而是**建了那把'尺子'（金标准评估集）、定了优化的优先级、把降本和质量的取舍想清楚了**——没有这把尺子，团队连'优化到底有没有用'都说不清。\"\n\n这一段就是第 3 层水平：有方法（金标准集 + AB 测试）、有量化（34% / 97.5% / -80% / 7s→2s）、有取舍（不动模型动调用）、有\"我\"的不可替代贡献（建尺子、定优先级），追问任何一个技术点都接得住。\n\n---\n\n## 六、讲项目的五大雷区（每条都附自检）\n\n最后给你一张\"红线表\"。每讲完一个项目，自己过一遍——命中任意一条，重讲。\n\n| # | 雷区 | 症状 | 怎么改 |\n|---|------|------|--------|\n| 1 | **只报数字不讲逻辑** | \"成本降了 80%、准确率 97.5%\"一串数字砸过去，没说怎么来的 | 每个数字后面跟一句\"靠 ____ 做到的\"，建立因果链 |\n| 2 | **贪功 / We syndrome** | 满嘴\"我们\"\"团队\"，或把工程/算法的活揽成自己写的 | Action 用\"我\"，但精确切割产品决策 vs 技术实现，孤独症项目老实说\"协助/参与\" |\n| 3 | **技术细节讲不清/讲错原理** | 一问\"reranker 为什么放后面\"\"CAG 和普通缓存啥区别\"就卡壳或乱编 | 把第 01 章 RAG/评估/成本三篇吃透，重灾区是 reranker、CAG、Text2SQL 指标，宁可说\"这块是工程同学主导，我理解的原理是……\"也别瞎编 |\n| 4 | **没有冲突张力** | 四段平铺像读周报，没有\"两难 → 取舍\" | 在 Action 前插一句\"本可以 A，但代价是 B，所以我选 C\" |\n| 5 | **背景铺太长** | S/T 讲了一分钟，Action 只剩\"然后我优化了一下\" | 严守节奏比例：背景任务 < 1/4，行动取舍 > 1/2 |\n\n补一条针对你的专项提醒：**Text2SQL（SAGE）被追问\"准确率怎么测\"时别只会说\"准确率\"。** 业内主指标是 **Execution Accuracy（EX，把生成的 SQL 真跑一遍、比对结果集对不对）**，比 **Exact Match（EM，SQL 字符串完全一致）** 可信——因为 EM 会误杀\"写法不同但结果等价\"的 SQL。你能甩出\"我们更看执行结果而不是 SQL 字面是否一致\"，专业度立刻拉满。**如果面试官反将一军问\"EX 没有缺陷吗\"，老实接住**：EX 也会误判——两条语义不同的 SQL 偶尔结果集相同（比如都返回空），会被算成对，所以严谨做法是 EX 为主、配人工采纳率兜底，这正是 SAGE 用\"采纳率\"做北极星的原因。（详见第 01 章《10-模型评估与幻觉》）\n\n---\n\n## 一句话收尾\n\n> **面试官不为你的数字买单，为你\"凭什么拿到这个数字\"的判断力买单。** 把每个项目讲成\"我看清了一个不确定性 → 建了一把尺子量它 → 在取舍中选了一条又准又省的路 → 拿到可量化的结果 → 我还懂为什么\"，你就赢了。\n\n下一篇起，我们用这套方法把杭小育、孤独症筛查、SAGE 三个项目逐个改造成可直接背的稿子，并配一句话 / 30 秒 / 2 分钟三档版本。\n", "/06-个人经历改造/02-项目1-杭小育.md": "# 项目1 ·「杭小育」智能体（C 端 RAG 旗舰，主打这个）\n\n这是你最强的一张牌——一个真实跑在 460W+ 用户身上的 C 端政务育儿 RAG 问答系统。面试里大概率会让你\"挑一个最有代表性的项目讲讲\"，**首选就是它**。原因很简单：它同时具备四个面试官最想看的东西——\n\n- **C 端真实规模**：460W+ 用户、日活 21.5W+，不是 demo、不是 PPT 项目；\n- **RAG 工程化全链路**：从文档切分、多路召回、粗排+精排到 Rerank，你每一环都实操过；\n- **评估体系**：金标准测试集 + AB 测试，把\"准确率\"这种话从口号变成可量化的工程结果；\n- **降本意识**：CAG 把推理成本压降约 80%——这是 C 端 AI PM 区别于纯算法岗的核心视角。\n\n这一篇的目标只有一个：**把这个项目打磨到你能张口就来。** 三档话术（一句话 / 30 秒 / 2 分钟）全部写成可以直接背的口语稿，后面再拆每一个数字、每一个技术决策背后的\"为什么\"，让它经得起深挖。\n\n---\n\n## 一、先把故事讲对：接手状态 → 我的判断 → 我做的事 → 量化结果\n\n讲项目最容易翻车的地方，是上来就报一堆数字、一堆技术名词，面试官听完只觉得\"你背得很熟\"，但不知道**你到底解决了什么、你的判断好在哪**。所以先把整个故事的骨架立住，这条故事弧贯穿后面所有话术：\n\n```mermaid\ngraph LR\n    classDef state fill:#A0AEC0,stroke:#718096,stroke-width:2px,color:#fff\n    classDef judge fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef action fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef result fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    S[\"接手状态<br/>2万+碎片知识检索难<br/>推理成本高<br/>多轮上下文断裂\"]:::state\n    J[\"我的判断<br/>先把'搜得准'立住<br/>再用评估量化<br/>最后系统性降本\"]:::judge\n    A[\"我做的事<br/>信息架构优化<br/>RAG检索改造<br/>金标准集+AB<br/>CAG+路由降本\"]:::action\n    R[\"量化结果<br/>检索覆盖+34%<br/>准确率97.5%<br/>成本降约80%<br/>响应7s到2s\"]:::result\n\n    S ==> J ==> A ==> R\n```\n\n### 接手时是什么状态（Situation + Task，诚实交代）\n\n你不是从 0 搭起的人，你是 **2.0 阶段接手** 的——这点要讲清楚，不贪从零起盘的功，反而更可信。接手时摆在面前的是三个真实痛点：\n\n1. **知识又多又碎、检索难**：政务育儿领域 2 万多份文档，长尾、碎片化，用户问一句话，系统经常搜不到对的那一段；\n2. **推理成本高得离谱**：大量\"宝宝几个月能吃盐\"这类无效基础提问，每一条都实打实地去调一次大模型，烧钱；\n3. **多轮对话理解不了上下文**：用户聊着聊着就切话题，系统跟不上。\n\n你接手时的阶段目标（这就是 Task）：**建立一个稳定可靠、而且运行成本更低的知识问答系统和智能交互终端。** 一句话——既要答得准，又要花得省。\n\n> 讲述要点：把 Situation 和 Task 压在 15 秒内说完，别恋战。面试官真正想听的是 Action 和你的判断。\n\n---\n\n## 二、三档话术（直接背）\n\n下面三档，按场合选。**注意：不要把 STAR 当成四个空格来填**——面试官一眼能看出\"S…T…A…R…\"那种生硬贴标签的痕迹，反而扣分。下面的稿子全部写成\"讲故事\"的口吻，有起伏、有\"人味\"，你顺着念就行。\n\n### 一句话版（被问\"做过什么项目\"时甩出来）\n\n> \"我在 2.0 阶段接手优化过一个 C 端政务育儿的 RAG 智能问答产品『杭小育』，撑着 460 万用户、日活 21.5 万，我主要负责把检索准确率提上去、同时用缓存策略把推理成本压下来。\"\n\n一句话里要素齐：**角色（2.0 接手优化、负责提质 + 降本）+ 场景（C 端政务育儿 RAG）+ 规模（460W/21.5W）+ 你解决的两件事（提质 + 降本）。** 注意角色措辞——你是 2.0 阶段接手优化的，不是从 0 主导整个产品，所以说\"接手优化\"\"我负责\"，别说\"我主导了这个产品\"，免得后面被深挖时和你的真实角色对不上。它的作用是\"勾住\"面试官，让他追问\"具体怎么做的\"，你就自然过渡到 30 秒版。\n\n### 30 秒版（自我介绍里带一句，或被追问\"展开说说\"）\n\n> \"杭小育是我接手 2.0 阶段做的，一个政务育儿的智能问答智能体，服务全市 95 万育儿家长。\n>\n> 我接手时三个痛点：两万多份育儿政策知识又碎又难搜、大量无效提问把推理成本拉得很高、多轮对话理不清上下文。\n>\n> 我主要做了三件事：一是定了 RAG 检索链路的优化方案、推动工程一起落地——优化文档切分、上多路召回加粗排精排的 Rerank 漏斗，把『搜得准的比例』提升了 34%；二是我自己建了一套金标准评估集加 AB 测试，让每次优化都有据可依，最后准确率做到 97.5%；三是我设计了 CAG 缓存加前端路由拦截的降本策略，把推理成本压降了约 80%，平均响应从 7 秒降到 2 秒。\n>\n> 简单说就是：又准、又便宜、又快。\"\n\n这一档是你的\"主力弹药\"。结构清晰但不贴标签：**接手状态 → 三件事 → 各自带量化结果。** 背熟它，大部分场合够用了。\n\n### 2 分钟版（项目深挖、终面、或被点名详细讲）\n\n这一档要有完整的故事弧。我按\"接手状态 → 我的判断 → 我做的事 → 量化结果\"四段来写，但念的时候是连贯的一段话，不要报段落名：\n\n> **【接手状态】**\n> \"杭小育是『善育在杭』2.0 阶段的核心智能体，C 端政务育儿问答，服务全市 95 万育儿家长、3000 多家托育机构。我是 2.0 接手进来优化的。\n>\n> 接手时这个系统有三个很现实的问题。第一，知识库有两万多份养育、发育、医育、食育的文档，又长又碎，用户问一句话经常搜不到对的那一段，答非所问。第二，C 端用户里有大量很基础的重复提问，比如『宝宝几个月能加辅食』，这种问题每来一次都去调一次大模型，推理成本高得不合理。第三，用户多轮对话频繁切话题，系统理解不了上下文。\n>\n> **【我的判断】**\n> \"我当时判断，不能眉毛胡子一把抓。优先级应该是：先把『搜得准』这件最根本的事立住——检索不准，后面再强的模型也是在错的材料上瞎答；然后必须建一套评估体系，不然『准不准』全凭感觉，没法迭代；最后再系统性地降本，因为 460 万用户的体量，成本敏感度极高，省下来的每一分都是真金白银。\n>\n> **【我做的事】**\n> \"所以我做了三块。\n>\n> 第一块是 RAG 检索链路的优化，这是核心，方案是我定的、工程一起落地的。我们先把两万多份数据清洗结构化，做语义段落切分、建起 23 万多条向量索引；检索上我定的策略是不只用向量，而是多路召回——向量负责语义近似、关键词负责精确术语，再走『粗排加精排』的漏斗：先低成本多路召回把范围缩小，再针对性地用 Rerank 精排，只留最相关的几条喂给模型。这样既提覆盖率、又把单次推理成本压到很低。这一块的产出，是『准确搜到知识的比例』提升了 34%。\n>\n> 第二块是评估体系。我从线上被用户点踩的 Bad Case 里抽了 500 个高频、有代表性的真实问题，请业主方的医生标注每个问题的标准答案在哪一份文档的哪一段，作为金标准检索测试集；然后做优化前后的 AB 测试来验证。那个 34% 就是在这套金标准集上、AB 测出来的，不是拍脑袋。在这套评估机制兜底下，整体回答准确率最终做到了 97.5%。\n>\n> 第三块是降本，策略是我定的。我们用了 CAG 缓存策略，把高频、稳定的政务知识预先缓存起来，命中时直接复用，绕开重复检索和重复生成；再加前端路由拦截和意图分类，把无效的基础提问在到达大模型之前就拦下来、或者优先查表；工程侧还做了 DeepSeek 的深度适配。这套组合拳下来，推理成本在我们这个稳定知识库场景下压降了约 80%。\n>\n> **【量化结果】**\n> \"最后这个系统全链路支撑了 460 万用户、日活 21.5 万，检索覆盖提升 34%、准确率 97.5%、成本降约 80%、平均响应从 7 秒降到 2 秒、首字延迟做到 3 秒级，幻觉率卡在可用的安全业务基线内。它现在服务全市 95 万育儿家长。我觉得这个项目最大的价值，是证明了在 C 端大体量、强成本约束下，RAG 这条路是能做到又准又省的。\"\n\n> 念这一档大约 2 分钟。关键是**让\"我的判断\"那一段站出来**——那段是在展示你的产品 sense（优先级排序、权衡取舍），比单纯报技术名词值钱得多。面试官真正在评估的，是你\"能不能把复杂问题想清楚、讲明白\"，这本身就是 PM 核心能力的现场演示。\n\n---\n\n## 三、主导 vs 参与：哪些是\"我拍板\"，哪些是\"我推动\"（防贪功）\n\n这一节关系到你会不会被深挖拆穿。**措辞上把动词分级**，是最自然、不刺眼的防贪功方式：\n\n| 这件事 | 你的真实角色 | 该用的动词 | 别用的动词 |\n|--------|------------|-----------|-----------|\n| 首页信息架构优化 | **主导**（你的设计背景，亲自做的） | 我梳理 / 我重做 / 我设计 | —— |\n| 文档切分 + 多路检索策略 | **主导设计**（产品侧定方案） | 我优化 / 我定的策略 | \"我写的算法\"（会被追问代码） |\n| 金标准测试集 + AB 测试 | **主导**（你抽的 case、你定的评估方法） | 我建的 / 我抽的 / 我设计的验证 | —— |\n| 向量化、Rerank 模型的工程实现 | **参与/协同**（工程做实现，你定需求） | 我推动 / 我和工程对齐 / 我们一起 | \"我训的模型\" |\n| CAG 缓存、路由拦截策略 | **主导产品策略**（怎么拦、拦什么你定） | 我设计的策略 | \"我搭的缓存中间件\" |\n\n**一句话原则**：凡是\"判断、设计、定策略、定评估标准\"的，大方说\"我主导/我定的\"；凡是\"底层代码实现、模型训练\"的，说\"我推动工程做了/我和开发一起\"。这样既不丢功劳，又经得起\"那这块具体代码是你写的吗\"这种追问——你可以坦然说\"实现是工程同学落地的，我负责定方案、定验收标准、用 Badcase 驱动它迭代\"，这恰恰是 PM 该干的活，不丢人。\n\n> 善育在杭里有另一个项目（孤独症筛查）是你\"协助/参与/阶段性负责\"的，**别和杭小育混着吹**。杭小育是你主场，可以重点讲硬实操；那个项目的诚实定位在 `03-项目2-孤独症筛查.md` 里单独讲。\n\n---\n\n## 四、把每个数字、每个决策的\"为什么\"备好（深挖预案）\n\n面试官一定会顺着你的 Action 往下挖。下面把最高频的几个追问点，连同\"为什么这么选 + 当时的权衡 + 限制\"一起备好。**每个量化结果背后都预埋一层逻辑**，这比话术本身更决定你的深度分。\n\n### 追问 1：「34% 覆盖率提升，是怎么测出来的？」\n\n> \"这是我专门建了金标准集、用 AB 测出来的，不是估的。具体说：我从线上被用户点踩的 Bad Case 里，抽了 500 个高频、有代表性的真实问题，请业主方的医生给每个问题标注『标准答案在哪份文档的哪一段』，这就是金标准——相关文档段落是确定的。然后我跑优化前后两套检索配置，在同一套 500 题上，看『系统召回的内容里到底有没有命中那个标准段落』，命中的比例就是检索覆盖率，优化后比优化前提升了 34%。关键是金标准必须由领域专家标，不能让模型自己生成标准答案，那是循环论证。\"\n\n**为什么这答法站得住**：它把\"34%\"还原成了一个**可复现的测量过程**——题目固定、标准答案由人标、新旧配置同集对比。这正是评估体系成熟度的标志。（呼应 `01-AI技术速通/10-模型评估与幻觉.md` 的金标准集口径。）\n\n> **口径小心**：你简历写的是\"提升了 34%\"，没写是\"34 个百分点\"还是\"相对提升 34%\"。被追到\"从多少提到多少\"时，**别现编一个绝对基线数字**——你可以诚实说\"我记的是这套金标准集上命中率的相对提升幅度，具体两端的绝对值我得回去查埋点，现在不敢给你报错\"。给不出准确基线时，承认\"要查\"远比编一个数被反查穿帮安全。\n\n**加分点（显评估深度，谨慎用）**：业内有个共识——\"检索指标变好不等于答案变好\"。你可以补一句：\"所以我没只盯着这个 34% 的检索覆盖率，最终还是要看用户侧的回答准确率和点踩率有没有真降下来——检索准只是答得准的必要条件，不是充分条件。\"这一句直接显出你**产品视角压过单一工程指标**，是很强的加分表述。\n\n### 追问 2：「为什么要粗排+精排两段？直接召回不行吗？为什么 Rerank 更准？」\n\n这是 Rerank 最高频的追问点，**原理答错会扣硬分**，务必说清 cross-encoder 和 bi-encoder 的区别：\n\n> \"因为召回和精排是两种性价比不同的活，分开做最划算。\n>\n> 召回阶段我用的是向量加关键词的多路召回，它快、便宜，能在 23 万条索引里秒级捞回一批候选，目标是『别漏』，把覆盖率拉满。但它有个天生短板：向量召回是 bi-encoder，query 和文档是各自独立编码成向量再算距离的，模型没有『同时看到这两者』，所以会漏掉一些『字面近但答得对』或者『字面远但语义对』的情况，误召回也多。\n>\n> 所以第二阶段上 Rerank，它用的是 cross-encoder——把 query 和每个候选『拼在一起』送进模型联合打分。因为它同时看到了问题和候选答案，判断相关性的能力远强于各自编码的向量。代价是它贵、慢，不可能对 23 万条全做。所以只对召回回来的那一小批候选做精排，挑出最相关的几条喂给模型。\n>\n> 一句话：**召回保覆盖、重排保精度，两段式是性价比最高的提质手段。** 而且这个设计本身就是降本——又贵又准的重排只用在少量候选上，不浪费。\"\n\n**加分点**（显工程理解，但别把没核实的数字说成自己项目的实测）：行业里 rerank 一般只对召回回来的 top 20~50 候选做，工程上还会跨多个 query 批处理来提 GPU 利用率。**说这个时用『一般会』『常规做法是』的口吻**，表明你懂这套工程权衡；**不要把具体阈值说成『我们就是 top X』**——除非你真记得自己项目的实际值，否则被追问『你们到底召回几条、rerank 几条』时会卡。讲清『为什么要砍到少量候选才做精排』这个逻辑，比报一个数字更稳。\n\n### 追问 3：「CAG 降本 80%，和普通缓存有什么区别？为什么不全用 CAG、把 RAG 扔了？」\n\n这是必考点，两个子问题都要答上：\n\n**先讲 CAG vs 普通缓存的区别：**\n> \"普通缓存是『背答案』——把问过的问题和答案存起来，下次同样的问题命中就直接返回，但用户换个问法、问个新问题就抓瞎。CAG 是『背知识』——它在用户提问之前，就把整个精选知识库预先编码进模型的 KV 缓存里，相当于让模型提前把整本资料背进脑子。所以哪怕用户问一个全新的问题，模型也能基于这份背熟的知识直接答，不用再实时检索。降本来源是：省掉了每次交互都要跑的 embedding 和向量检索那道工序，首字延迟也降下来了。\"\n\n**再答\"为什么不全用 CAG\"（这题答不上就露怯）：**\n> \"因为 CAG 有个硬约束——整个知识源得塞得进模型的上下文窗口/KV 缓存，所以它只适合『相对稳定、规模可控』的知识。我们的政务育儿核心知识恰好是这种：政策相对稳定、高频问题集中。但知识库里也有长尾的、会动态更新的部分，那些塞不进缓存、也不该缓存。\n>\n> 所以我们其实是**混合架构**：核心稳定、高频的知识走 CAG 缓存降本，长尾和动态的知识还是走 RAG 实时检索。CAG 不是替代 RAG，是在 RAG 之上对高频稳定部分做的一层降本优化。那个 80% 是我们这个特定的稳定知识库场景下实测出来的复合降本——CAG 缓存加前端路由拦截无效提问、再加 DeepSeek 适配，几个手段叠加的结果。\"\n\n**为什么这样答稳**：① CAG vs 缓存的\"背知识 vs 背答案\"是站得住的本质区别（呼应 `01-AI技术速通/11-成本延迟质量三角.md`）；② 主动框定 80% 为\"特定场景实测的复合降本\"，而不是甩一个通用数字——公开文献给出的量级是最高约 70%，所以你必须把它框成\"我们这个场景的复合结果\"，这样面试官追问\"哪来的 80%\"时你不慌；③ 主动说出\"混合架构、不替代 RAG\"，直接显出架构判断力，把\"为什么不全用\"这个坑提前填了。\n\n### 追问 4：「准确率 97.5% 和幻觉率，是一回事吗？」\n\n> \"不是，这是两个独立的轴，我会分开讲。先说清楚口径：我建的那套医生标注的金标准集，严格说是『检索金标准』——标的是每道题的标准答案落在哪份文档哪一段，所以它直接量的是检索覆盖率，也就是那个 34%。回答准确率 97.5% 是更靠后、更整体的一个验收口径：答得对不对要看检索对没对、模型有没有照着检索内容答、有没有跑偏，我们在评估集上抽样人工判对错统计出来的。我特意把这两个数分开说，是因为它们量的不是一回事——检索准是答得准的前提，但检索准不等于最终答得准。\n>\n> 幻觉率又是另一根轴——我抽样系统的真实回答，逐条判它有没有说源材料里没有的、或与事实不符的内容。一个系统可能准确率高、幻觉率也高，那是『自信地瞎说』，在育儿这种高风险场景是责任隐患。所以我宁可让它拒答也不能瞎编，幻觉率必须卡在可用的安全业务基线内。RAG 本身就是降幻觉的抓手——答案接地在检索到的文档上、带来源引用，编不出来。\"\n\n**口径提醒**：这里有个产品方法论里叫 faithfulness（忠实度）的概念——答案是否忠于检索到的上下文，低分就是模型在编。你可以把\"幻觉率\"和\"faithfulness\"挂上：\"我们盯幻觉，本质就是在盯答案对检索内容的忠实度。\"这样显得你评估口径专业，但别硬塞术语，自然带出即可（呼应 `02-AI产品方法论/04-AI评估体系（方法论视角）.md`）。\n\n### 追问 5：「你设计背景，在这个 AI 项目里到底有什么用？」\n\n这是你的**真差异化**，别当附加项轻描淡写：\n\n> \"用处很直接，在两个地方。一是首页信息架构——我按功能组块、信息块、入口、归属部门去重新梳理，复盘了数据和用户反馈、用象限法判优先级，再用视觉分区、组合预期、标签推荐这些手段降低用户的使用门槛，这是设计的老本行。二是更关键的，文档切分本质上也是个信息结构问题。RAG 里 chunk 怎么切，直接决定召回质量：切太碎，语义断裂，搜回来是半句话；切太大，混入无关主题，注意力被稀释。切分若做坏，后面再强的 Rerank 也救不回来。我做结构化拆分、按层级组织文档的时候，设计训练出来的『信息怎么分块、怎么组织层级』的直觉，是真用上了。所以我不觉得设计是包袱，它是我做 RAG 时一个别人没有的视角。\"\n\n---\n\n## 五、数据闭环：让\"34% / 97.5% / 80%\"成体系，不是孤立数字\n\n面试官最怕你报一串互相没关系的数字。其实你的数字是一个**飞轮**——Badcase 进来、归因、优化、回灌评估集，转一圈系统就好一点。把它画出来、讲出来，数字立刻成体系：\n\n```mermaid\ngraph TB\n    classDef online fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef eval fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef opt fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Online[\"线上 460W 用户<br/>真实提问 + 点踩反馈\"]:::online\n    Bad[\"抽 500 高频 Bad Case<br/>医生标注金标准段落\"]:::eval\n    Gold[(\"金标准测试集\")]:::eval\n    AB[\"优化前后 AB 测试<br/>同集同判分器\"]:::eval\n    Opt[\"归因到优化<br/>切分/召回/Rerank/缓存\"]:::opt\n    Metric[\"量化结果<br/>覆盖+34% 准确97.5% 降本80%\"]:::opt\n\n    Online ==> Bad ==> Gold\n    Gold ==> AB\n    Opt ==> AB\n    AB ==>|验证有效| Metric\n    Metric -.->|回灌新坏例| Gold\n    Opt -.->|上线| Online\n\n    N[\"飞轮一句话：坏例进来→归因→优化→回灌评估集→系统持续变好\"]:::note\n```\n\n讲这张图的口播：\n\n> \"我这套数字不是孤立的，是一个闭环转出来的。线上 460 万用户每天产生真实提问和点踩，我从点踩的坏例里抽高频代表性的 500 题，请医生标金标准，建成评估集；每次改切分、改召回、改缓存，都在这套金标准上跑 AB，验证有效才上线；上线后新的坏例再回灌进评估集。所以 34%、97.5%、80% 这些数，本质是同一个飞轮在不同环节的产出——这个闭环我让它一直转着，系统才会越来越好。错误分析驱动迭代，这正是 PM 在 AI 项目里最该干的核心工作。\"\n\n---\n\n## 六、可量化成效清单（背一遍，随时能调取）\n\n按\"规模 / 提质 / 降本 / 多模态扩展\"四组记，讲的时候挑相关的报，别一口气全念完（会像背简历）：\n\n- **规模**：全链路支撑 460W+ 用户、日活 21.5W+；服务全市 95W+ 育儿家长、3000+ 托育机构。\n- **提质**：检索覆盖率 +34%；回答准确率 97.5%；幻觉率卡在可用安全业务基线内；TTFT 3 秒级、平均响应 7s→2s。\n- **降本**：CAG 缓存 + 前端路由拦截 + DeepSeek 适配，推理成本复合压降约 80%。\n- **知识资产 / 多模态**：标签 2500+、向量索引 231000+、多模态知识库 5000+；拍照分析营养膳食准确率 98%、营养素摄入分析 85%+；照护异常行为分析告警准确率近 80%。\n\n> **口径纪律**：报 80% 时永远带上\"在我们这个稳定知识库场景下的复合降本\"；报 34% 时永远能接出\"检索金标准集 + AB 测出来的、量的是检索覆盖率\"；报 97.5% 时记住它是更整体的回答准确率口径（不是金标准集那个检索数），且能接出\"和幻觉率是两个独立的轴\"。**数字 + 口径 + 一句为什么，三件套绑死**，这样无论怎么追问都不慌。\n\n---\n\n## 七、本篇 takeaway\n\n1. **这是你最强的牌，三档话术都背到能脱口而出**——尤其 2 分钟版那段\"我的判断\"，是你产品 sense 的高光时刻。\n2. **STAR 别贴标签**，讲成有起伏的故事；面试官识破生硬 STAR 是公认扣分点。\n3. **主导 vs 参与靠动词分级**：判断/设计/定策略说\"我主导\"，底层实现说\"我推动工程做了\"——既不丢功又不会被拆穿。\n4. **每个数字都预埋\"为什么 + 权衡 + 限制\"，且口径不能含糊**：34% 是检索金标准集上 AB 测出来的检索覆盖率、97.5% 是更整体的回答准确率（两者别混成一个）、Rerank 为什么准（cross-encoder vs bi-encoder）、80% 怎么算且为什么不全用 CAG（混合架构）、准确率和幻觉率为什么是两个轴。\n5. **设计背景是真差异化**，在信息架构和文档切分上是别人没有的视角，大方讲。\n", "/06-个人经历改造/07-自我介绍脚本.md": "# 自我介绍脚本：1 分钟 / 3 分钟多版本（可直接念）\n\n自我介绍是整场面试里**唯一一段你能 100% 提前写好、提前练熟**的内容。它的价值远不止\"开个场\"——它是你给面试官埋的**追问素材库**：你主动提到什么，他大概率就顺着挖什么。所以这一篇的核心原则只有一条——\n\n> **自我介绍里只放\"你最想让他知道、且你接得住追问\"的东西。** 凡是你心里发虚、怕被深挖的点，一个字都别主动提。\n\n你的天然牌面其实很好，只是得讲对：\n\n- **设计转产品**，不是短板，是差异化卖点——用户体验和信息架构的敏感度，是科班产品经理也不一定有的；\n- **工作一年多**，不讲\"年限\"讲\"密度\"——这一年多你跑通了 C / B / G 三端、健康民生垂直深度、RAG + Agent + 评估 + 降本全链路，这个密度很多三年经验的人都没有；\n- **三个真实项目**天然覆盖三种能力面：杭小育（C 端 RAG 旗舰）、孤独症筛查（B/G 端复杂业务驾驭）、SAGE（G 端取数 Agent）。\n\n这一篇给你：1 分钟版、3 分钟版可直接念的脚本，开场怎么抓注意力、怎么自然引到最强的杭小育、求职动机怎么讲，按面试官类型怎么换档，最后附上\"自我介绍后最可能被接的问题 + 引导话术\"。\n\n---\n\n## 一、先想清楚：自我介绍在评估什么\n\n面试官听你自我介绍，脑子里其实在并行跑三件事：\n\n```mermaid\ngraph LR\n    classDef intro fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef eval fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    I[\"你的自我介绍\"]:::intro\n    E1[\"这人靠不靠谱<br/>表达清不清楚\"]:::eval\n    E2[\"经历和岗位<br/>匹不匹配\"]:::eval\n    E3[\"我等下<br/>该挖哪里\"]:::eval\n    N[\"所以：结构清晰 + 主动埋钩子<br/>把追问引到你最强的地方\"]:::note\n\n    I ==> E1\n    I ==> E2\n    I ==> E3\n    E3 -.-> N\n```\n\n这就决定了三个写作纪律：\n\n1. **结构要让他一耳朵就拎得清**——教育/背景 → 工作经历主线 → 一句话最强亮点 → 为什么来。别东一榔头西一棒子。\n2. **主动埋你接得住的钩子**——比如\"杭小育撑了 460 万用户\"这种带数字的句子，就是故意让他追问的,因为你后面整篇都准备好了。\n3. **不给自己挖坑**——孤独症筛查项目 AI 含量相对低、你的角色偏协助/参与,自我介绍里**带一句定位就够,别展开吹**,免得他顺着挖到你的弱区。\n\n---\n\n## 二、1 分钟版（最常用,HR 面 / 自我介绍环节默认用这个）\n\n1 分钟版的任务是**四件事说清楚**:你是谁(教育+背景)、你在做什么(工作经历)、你最牛的一件事(一句话亮点)、你为什么来(求职动机)。不展开技术细节,展开是后面追问的事。\n\n下面这版**可以直接背、直接念**,顺着说就行,我标了停顿和重音提示:\n\n> \"面试官好,我叫【你的名字】。\n>\n> 我本科是设计专业,现在在一家 AI 公司做 AI 产品经理,到现在一年多,深耕的是健康民生这个垂直方向,C 端、B 端、G 端的 AI 项目都完整做过。\n>\n> 我自己觉得有个不太一样的地方是——我是**设计背景转产品**的。这让我对用户体验、对信息架构这种『东西怎么摆用户才用得顺』的事,会比一般人更敏感;同时这一年我又是实打实地在做 AI 落地,所以技术那一侧我也不虚,RAG、智能体、模型评估、推理降本这些我都是亲手推过来的。\n>\n> 如果只让我讲一个项目,那是『杭小育』——一个 C 端政务育儿的 RAG 智能问答产品,我在 2.0 阶段接手做提质和降本,现在它撑着 460 万用户、日活 21.5 万,回答准确率做到 97.5%,推理成本压降了大概 80%。\n>\n> 我来面 AI 产品,是因为这一年我越做越确定:我喜欢、也擅长把一个模型能力,真正落成几百万人用得上的产品。而大厂 C 端的体量和工程化深度,正是我想去验证和打磨自己判断力的地方。\"\n\n念完大约 55–65 秒,刚好卡 1 分钟。\n\n### 这版为什么这么排\n\n| 句子 | 作用 | 暗藏的钩子 |\n|------|------|-----------|\n| 设计专业 + 一年多 AI 产品 | 30 字交代清教育和年限,不躲不藏 | —— |\n| 健康民生 + C/B/G 三端 | 把\"一年\"翻译成\"密度\":垂直深度 + 全端覆盖 | \"三端怎么都做了?\" |\n| 设计转产品 + 技术不虚 | **主动把\"短板\"先讲成优势**,堵住对方\"你设计出身懂技术吗\"的疑虑 | \"设计背景具体怎么帮到产品?\" |\n| 杭小育一句话 + 三个数字 | 甩出最强牌,带数字勾追问 | \"97.5% 怎么测的\"\"80% 怎么降的\" |\n| 求职动机 | 落到\"把模型能力落成几百万人用的产品\",自洽不空喊 | \"为什么是大厂 C 端?\" |\n\n每一个钩子,你后面 `02`~`06` 章都备好了答法。这就是自我介绍的本质——**你在主动给面试官画一张地图,引他往你最熟的路走。**\n\n### 1 分钟版的两个变体\n\n**变体 A:专业面 / 业务面用(把技术含量再压实一点)**\n\n把\"设计转产品\"那句缩短,把杭小育那句的技术词放出来一点:\n\n> \"……这一年我做的都是 AI 落地的硬活。最有代表性的是『杭小育』,一个 C 端政务育儿 RAG 问答,我接手 2.0 做提质和降本——优化检索链路把搜得准的比例提了 34%、建了金标准评估集加 AB 测试让每次优化有据可依、回答准确率最终做到 97.5%、用 CAG 缓存加路由拦截把推理成本压了大概 80%。460 万用户、日活 21.5 万在跑。\"\n\n专业面试官爱听\"金标准集\"\"CAG\"\"路由拦截\"这些词,因为它们是真做过的人才说得出的。\n\n**变体 B:HR 面 / 综合面用(把稳定性和动机再托一托)**\n\n把杭小育那句压缩,动机那句加重:\n\n> \"……我做 AI 产品这一年,从一个 RAG 问答,到全省民生筛查系统,再到取数智能体,跨度挺大但我都跟下来了,我自己挺享受这种『把新技术快速吃透、落成真东西』的节奏。我现在想找的是一个能长期深耕 C 端 AI 的地方——前面这些项目验证了我能做成,接下来我想在更大的体量、更成熟的团队里,把这件事做得更深。\"\n\nHR 关心的是\"动机真不真、会不会很快跑\",这版把\"我享受这个节奏\"\"想长期深耕\"这两个稳定性信号顶上去。\n\n---\n\n## 三、3 分钟版(终面 / 总监面 / 对方说\"详细介绍下自己\")\n\n3 分钟版的任务不一样:它要**展开三个项目的主线**,并借此立起你的**能力画像**。但注意——展开不等于报流水账,而是**用三个项目讲出一条成长线**:从 C 端规模化、到 B/G 端复杂业务、到 G 端 Agent,层层递进,最后收到能力总结和动机。\n\n结构是这样的:\n\n```mermaid\ngraph LR\n    classDef open fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef proj fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef close fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    O[\"开场<br/>教育+背景+差异化\"]:::open\n    P1[\"杭小育<br/>C端RAG规模化\"]:::proj\n    P2[\"孤独症筛查<br/>B/G端复杂业务\"]:::proj\n    P3[\"SAGE<br/>G端取数Agent\"]:::proj\n    C[\"收尾<br/>能力画像+求职动机\"]:::close\n\n    O ==> P1 ==> P2 ==> P3 ==> C\n```\n\n下面是**可直接念的完整脚本**。念的时候是连贯的一段,我用小标题只是帮你看清结构,实际开口时不要报标题:\n\n> **【开场:30 秒】**\n> \"面试官好,我叫【你的名字】。我本科是设计专业,现在在一家 AI 公司做 AI 产品经理,做了一年多,方向是健康民生。\n>\n> 我背景上有个不太常见的地方:我是设计转的产品。这给了我两个底子——一个是对用户体验和信息架构特别敏感,知道东西怎么摆、流程怎么设计,用户才用得顺;另一个是这一年我做的全是 AI 落地的硬活,RAG、智能体、评估、降本我都是亲手推过来的,所以技术那侧我也接得住。这一年我做了三个项目,正好覆盖了 C 端、B/G 端和 G 端,我快速过一下。\n>\n> **【项目一:杭小育,C 端 RAG,约 50 秒】**\n> \"第一个也是我最主力的,是『杭小育』,一个 C 端政务育儿的 RAG 智能问答,我在 2.0 阶段接手做提质和降本。接手时三个痛点:两万多份育儿政策知识又碎又难搜、大量无效提问把推理成本拉得很高、多轮对话理不清上下文。\n>\n> 我主要做了三块:一是定了检索链路的优化方案——优化文档切分、上多路召回加粗排精排的 Rerank 漏斗,把搜得准的比例提了 34%;二是我自己建了一套金标准评估集加 AB 测试,让每次优化有据可依,准确率最终做到 97.5%;三是我设计了 CAG 缓存加前端路由拦截的降本策略,推理成本压降大概 80%,平均响应从 7 秒降到 2 秒。现在这个系统撑着 460 万用户、日活 21.5 万,服务全市 95 万育儿家长。\n>\n> **【项目二:孤独症筛查,B/G 端,约 40 秒】**\n> \"第二个是浙江省儿童心理行为发育数字化管理系统,这是浙江省十大民生实事之一、全省 0–6 岁儿童孤独症筛查的数字化底座。这个项目我得诚实说,它 AI 含量不算最高,核心是把复杂的 B/G 端业务驾驭住——我是上线后接手的,主要做了两件事:一是协助梳理卫健委监管线和省市县街道业务线的流转规则,把 1600 多家医疗机构的多级协同理顺;二是把 M-CHAT-R、Gesell 这些成熟医学量表,转成线上可配置、带逻辑防呆的数字化表单引擎。后来基层工单投诉率降了 85%,单例初筛效率提了 63%。这个项目最锻炼我的,是在一个国家级民生项目里,把极其复杂的多方协同和监管规则给捋顺、落地。\n>\n> **【项目三:SAGE,G 端 Agent,约 30 秒】**\n> \"第三个是 SAGE,一个 G 端的 Text2SQL 取数智能体,把过去要三天的人工取数缩短到分钟级。这里我做的最核心的一件事,是解决用户对 AI 的信任问题——我定义了一套透明化交互,把 SQL 生成、思维链、工具调用这些推理步骤全部在前端可视化,让决策可追溯、可校验。靠这个,数据分析结果的业务采纳率提到了 97.5%。我还从 0 到 1 建了一套埋点采集到 Badcase 复盘的标准化迭代链路。\n>\n> **【收尾:能力画像 + 动机,约 30 秒】**\n> \"把这三个项目串起来看,我自己的能力画像是这样的:我能从用户体验和信息架构入手把产品做得好用,又能把 RAG、智能体、评估、降本这些 AI 工程化的事真正落地,还能在复杂的 B/G 端多方协同里把事推成。\n>\n> 我来面 AI 产品,是因为这一年越做越确定,我喜欢也擅长把模型能力落成几百万人真正用得上的产品。我现在想去大厂 C 端,一是那个用户体量和工程深度,是检验和打磨产品判断力最好的地方;二是我前面这些都是在相对资源受限的环境里做成的,我想看看在一个更成熟、更体系化的团队里,我能把这件事做到什么高度。\"\n\n念完约 2 分 40 秒到 3 分钟。\n\n### 3 分钟版的三个讲述要点\n\n1. **三个项目要有\"轻重\"**——杭小育讲到三块行动,孤独症讲两件事且**主动说\"AI 含量不算最高\"**,SAGE 只突出\"信任可视化\"一个点。这种轻重本身就在传递信号:你知道自己哪个项目最硬、哪个该诚实定位。\n2. **孤独症那句\"我得诚实说\"是加分而非减分**——主动承认一个项目的边界,反而让面试官信你**其他项目没掺水**。这是反向取信。(详见 `03-项目2-孤独症筛查.md` 的诚实定位法。)\n3. **收尾的能力画像要\"收口\"**——别让三个项目散着结束,用一句话把它们拧成一股(好用 + AI 落地 + 复杂协同),面试官记住的就是这个画像,而不是三堆零散的事。\n\n---\n\n## 四、把两个\"短板\"讲成优势(必练)\n\n这两点你大概率会被正面问到(\"你设计出身,做产品有优势吗?\"\"你工作才一年,经验够吗?\"),自我介绍里先埋伏笔、被追问时正面接住。\n\n### 短板一:设计转产品\n\n**核心句**(背下来):\n\n> \"设计训练给我的不是画图,是**两种产品直觉**:一个是空间和信息架构的直觉——一个界面里功能怎么分区、信息怎么分层、用户视线先落哪、入口放哪儿点击率最高,这些我是有方法论的,不是凭感觉;另一个是用户体验的同理心——设计本来就是『为人解决问题』。这两点正好是 C 端产品最吃的能力。\"\n\n**实证锚点**(让它不空):\n\n> \"比如杭小育的首页信息架构,就是我亲手重做的——我按功能组块、信息块、入口、归属部门把内容重新梳理,结合数据和用户反馈用象限法划优先级,再用视觉分区和标签推荐降低使用门槛。一个两万多份知识的政务产品,要让普通育儿家长一眼找到要的东西,这件事设计背景帮了我大忙。\"\n\n这就把\"设计转产品\"从一个需要解释的疑点,变成一个带项目实证的卖点。\n\n### 短板二:工作约一年\n\n**核心句**(背下来,关键是把\"时长\"换成\"密度\"):\n\n> \"我不回避我工作时间不长。但我想说的是密度——这一年我不是在一个项目上重复做一年,而是完整跑了三个不同形态的 AI 产品:C 端百万级 RAG 问答、全省民生筛查系统、G 端取数智能体。从需求调研、Prompt 调优、RAG 语料体系、PRD 输出,到模型选型、评估集、推理降本,这条 AI 产品的完整链路我都亲手走过一遍。我觉得衡量经验,密度和完整度有时候比单纯的年头更说明问题。\"\n\n**配一句格局收尾**(可选,显成熟):\n\n> \"当然我也清楚一年的局限——大体量协作、长周期的版本节奏、更复杂的商业化考量,这些我还需要在更大的平台上补。这也是我想来大厂的原因之一。\"\n\n主动认局限 + 给出补的路径,比硬撑\"我经验很够\"成熟得多,也堵死了面试官继续在这点上施压的空间。\n\n---\n\n## 五、求职动机:为什么 AI 产品、为什么大厂 C 端\n\n动机题面试官是用来**区分\"想清楚的人\"和\"投机的人\"**的——前者有具体的、自洽的初心叙事;后者只会空喊\"我热爱 AI\"\"AI 是风口\"。后者一追就穿。所以你的动机必须**落到具体的事实和经历上**,不能飘。\n\n### 为什么做 AI 产品\n\n不要说\"AI 是趋势\"\"我对 AI 很感兴趣\"——这是投机者话术。要落到你的真实经历:\n\n> \"其实不是我先想做 AI 才入行的,是我这一年真做下来,越做越确定这是我想长期干的事。最打动我的一个瞬间,是杭小育——一个模型能力,经过我们对检索、对评估、对成本的一轮轮打磨,最后真的有 460 万个家长在用它问『我家孩子该怎么养』。那种『把一个技术变成几百万人日常依赖的工具』的成就感,是我在别的事上没体会过的。所以我做 AI 产品的初心很具体:我喜欢、也擅长当这个『把模型能力翻译成产品价值』的人。\"\n\n这版的好处:**它是从经历里长出来的,不是喊出来的**。面试官追问\"具体哪个瞬间打动你\",你答得出;追问\"那你觉得 AI PM 和普通 PM 区别在哪\",你也接得住(成本视角、技术边界感、评估意识——见 `04` 章)。\n\n### 为什么大厂 C 端\n\n要给出**两条具体理由**,不要笼统说\"大厂平台好\":\n\n> \"第一,C 端体量是检验产品判断力最狠的地方。我在杭小育做过 460 万用户,尝到了规模下成本和体验的真实张力——但大厂 C 端是上亿级的,那个量级的取舍、灰度、数据驱动,是我现在最想去学和验证的。\n>\n> 第二,我前面三个项目,都是在相对资源受限、偏政务民生的环境里做成的。我证明了自己在有限条件下能把事做成;接下来我想去一个工程更成熟、体系更完整、数据更丰富的团队里,看看自己能把 AI 产品做到什么深度。说白了,前面是『从 0 把事做成』,接下来我想『在高水位上把事做精』。\"\n\n> 动机这块的底线:**别贬低现在的公司、别说\"小公司没前途\"**——那会让面试官觉得你不忠诚、爱抱怨。统一口径是\"我证明了能从 0 做成,现在想去更大平台做深\",积极向上,不踩前东家。\n\n---\n\n## 六、按面试官类型换档(同一套素材,三种讲法)\n\n自我介绍不是死稿,要看人下菜。三类面试官关注点完全不同:\n\n| 面试官类型 | 最关注 | 重音放在 | 弱化处理 | 用哪版 |\n|-----------|--------|---------|---------|--------|\n| **专业面 / 业务面** | 你真做过吗、技术细节扛不扛得住 | 杭小育/SAGE 的硬实操:金标准集、CAG、Rerank、可视化信任 | 设计背景一句带过、动机一句带过 | 1 分钟变体 A,或 3 分钟版 |\n| **HR 面 / 综合面** | 动机真不真、稳不稳定、会不会跑 | 求职动机自洽、\"享受节奏\"\"想长期深耕\" | 技术名词压到最少,别让 HR 听不懂 | 1 分钟变体 B |\n| **总监面 / 终面** | 判断力、格局、选型 sense | 你的\"判断\"——优先级排序、RAG vs CAG 按场景选、诚实定位 | 不堆执行细节,讲思路和取舍 | 3 分钟版,收尾加重格局句 |\n\n**给总监面的格局加料**(自我介绍收尾可换成这句):\n\n> \"做这三个项目我最大的体会是:AI 产品最难的不是用什么技术,是判断在什么场景下用什么、以及不用什么。比如杭小育的知识库是相对稳定的政务文档,我才敢上 CAG 缓存来换成本——如果知识天天变,那 CAG 就是错的,得老老实实走 RAG。这种『按场景做技术选型』的判断,我觉得是 AI PM 比纯执行更值钱的地方,也是我接下来最想在更大平台上磨练的能力。\"\n\n> 这段为什么对总监管用:它展示的不是\"我会用 CAG\",而是\"我知道**什么时候不该用** CAG\"——边界感和取舍判断,正是高 level 面试官在找的东西。技术口径准确(CAG 适合静态小语料、动态知识用 RAG),不会翻车。\n\n---\n\n## 七、自我介绍后最可能被接的问题 + 引导话术\n\n自我介绍一结束,面试官几乎一定会顺着你埋的钩子追第一个问题。**这些追问你全部能预测**,因为钩子是你自己埋的。提前备好,让对话流向你最熟的区域。\n\n```mermaid\ngraph TB\n    classDef intro fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef q fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef go fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n\n    I[\"自我介绍埋的钩子\"]:::intro\n    Q1[\"挑个项目<br/>详细讲讲\"]:::q\n    Q2[\"设计背景<br/>怎么帮到产品\"]:::q\n    Q3[\"一年经验<br/>够吗\"]:::q\n    Q4[\"为什么<br/>来大厂C端\"]:::q\n\n    G1[\"引向杭小育<br/>2分钟版\"]:::go\n    G2[\"首页信息架构<br/>实证\"]:::go\n    G3[\"密度叙事\"]:::go\n    G4[\"两条具体理由\"]:::go\n\n    I ==> Q1 ==> G1\n    I ==> Q2 ==> G2\n    I ==> Q3 ==> G3\n    I ==> Q4 ==> G4\n```\n\n### 预案 1:「挑一个最有代表性的项目,详细讲讲」(最高频)\n\n**怎么引导**:毫不犹豫地选杭小育——它是你最强、准备最足的牌。\n\n> \"那我讲杭小育吧,这个项目最有代表性。\"\n\n然后直接切到 `02-项目1-杭小育.md` 的 2 分钟版。**不要犹豫\"讲哪个好\",犹豫本身就显得你对自己的项目没数。**\n\n### 预案 2:「你设计背景,做产品到底有什么优势?」\n\n切到本篇第四节\"设计转产品\"的核心句 + 杭小育首页信息架构的实证锚点。一句方法论 + 一个项目实例,稳稳接住。\n\n### 预案 3:「你才工作一年,经验够吗?」\n\n切到第四节\"工作约一年\"的密度叙事 + 主动认局限的格局收尾。**不要辩解、不要心虚**,把\"时长\"换成\"密度\",再坦然认一年的局限并指向大厂作为补足路径。\n\n### 预案 4:「为什么不继续在现在的方向做,要来大厂 C 端?」\n\n切到第五节\"为什么大厂 C 端\"的两条理由。核心是**积极叙事**:不是逃离,是想从\"做成\"到\"做深\"。绝不踩前东家。\n\n### 预案 5:「你那个 97.5% 准确率 / 80% 降本,是怎么做到的?」\n\n这是技术深挖的入口,切到 `02` 章和 `05-深度追问预案.md`。**简要口径先垫一句,等他追细节再展开**:\n\n> 准确率:\"它背后是一套评估机制兜的。我先从线上点踩的 Bad Case 抽了 500 个真实问题、请医生标注标准答案段落,建成金标准检索集——这套集子直接量的是『检索覆盖率』,也就是那个 34%,优化前后 AB 测出来的、不是估的。97.5% 是更整体的回答准确率,口径更靠后:答得对不对要看检索对没对、模型有没有照检索内容答,我们在评估集上抽样人工判对错统计的。我特意把这两个数分开说,因为检索准是答得准的前提,但不等于最终答得准。\"\n>\n> 降本:\"主要靠 CAG 缓存策略——高频稳定的政务知识预先缓存、命中直接复用,绕开重复检索和重复生成;再加前端路由拦截把无效基础提问在到达大模型前就拦下来。组合下来在我们这个稳定知识库场景压降了大概 80%。\"\n\n> 技术口径一定要准:CAG 是把静态语料预加载、复用缓存绕开重复检索/生成,不是普通的\"问答结果缓存\";它只适合**语料小且稳定**的场景,知识频繁更新就得用 RAG。这个边界讲清楚才显专业,具体见 `01-AI技术速通` 相关篇与 `05-深度追问预案.md`。\n\n---\n\n## 八、临场提醒(开口前再扫一眼)\n\n- **背熟但别像背书**——脚本是骨架,语气要像真人聊天,有停顿、有\"其实\"\"说白了\"这种口语连接词。念得太溜反而假。\n- **数字一定报准**——460 万、日活 21.5 万、97.5%、约 80%、34%、165164 人次、85% 投诉率降幅,这几个是你的核心弹药,张口就要对。\n- **时间线和简历对死**——你简历上 AI 产品的岗位是 2025 年 3 月入职、到现在一年出头,本科 2024 年 6 月毕业。所以**别说成\"毕业后一直在做 AI 产品\"**(那等于把 2024.06→2025.03 这段也算进 AI 经验,面试官一对简历日期就发现对不上)。统一口径:\"做 AI 产品一年多\"。毕业到入职这段空档若被问到(\"你 2024 年毕业,怎么 2025 年 3 月才入职?\"),提前想好一句**真实、简短、不心虚**的解释(求职过渡 / 自学转型 / 其他经历都行),别临场支吾——这道题大厂 HR 几乎必问。\n- **角色动词分级**——主导的事说\"我定的/我建的/我设计的\",参与的事说\"我推动/我协助/我们一起\"。杭小育、SAGE 是主场可以重,孤独症诚实说协助/参与。(详见 `02` 章主导 vs 参与表。)\n- **时间卡点**——1 分钟版别超 70 秒,3 分钟版别超 3 分 15 秒。超时面试官会走神,你后面的金句全废。\n- **结尾别虎头蛇尾**——很多人开头说得好,到求职动机就含糊了。**动机句要和开头一样有力**,这是面试官最后记住的一句。\n- **每个钩子都接得住才埋**——自我介绍里提到的每一件事,都要能往下挖两层。挖不动的,自我介绍里就别提。\n", "/02-AI产品方法论/09-从0到1与1到N.md": "# AI 产品从 0 到 1 与 1 到 N：怎么落地与规模化\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-09-0to1-1ton.png\" alt=\"小黑配图：样品房 vs 交付小区\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义\n\n**0 到 1 是回答\"该不该做、做得出来吗\"——判断真伪 AI 需求、找真痛点、用最低成本做一个可验证的 demo 跑通 PMF；1 到 N 是回答\"撑不撑得住、稳不稳\"——把 demo 工程化成能扛规模、控成本、保质量的生产系统。** 这两段用的是两套完全不同的肌肉：0 到 1 拼的是判断力和速度，1 到 N 拼的是可靠性工程。\n\n电梯说法：「AI 产品最危险的错觉是 demo 跑通就以为快上线了。Thoughtworks 有句话我很认同——利益相关方看到 demo 以为做完了 90%，实际只完成了 10%。我做杭小育和 SAGE，恰好把这两段都走完了：0 到 1 验证需求该不该用 AI、快速搭原型，1 到 N 把它扛到 460 万用户、做成本和可靠性工程。」\n\n## 直觉解释：从样品房到交付小区\n\n0 到 1 像盖**样品房**：只需要在一个理想户型里把\"住得舒服\"演示出来，地段、配套、施工质量都可以先不管。它证明的是\"这个设计有人买单\"。\n\n1 到 N 是把样品房变成**真正交付的小区**：上千户同时用水用电（成本与并发）、不同户型不同需求（数据多样性）、风雨地震要扛得住（稳定性与安全）、物业要能长期维护（可观测与治理）。样品房漂亮不代表小区能交付——很多 AI 项目就死在这一步。MIT Project NANDA 在 2025 年 7 月那份《GenAI Divide：State of AI in Business 2025》里发现，企业砸了 300-400 亿美元，**95% 的生成式 AI 试点没有产生可衡量的 P&L 回报**，根因不是模型不行，而是没能嵌入并适配真实业务流程——也就是样品房盖得挺好，小区交付不了。\n\n## 方法论框架\n\n我把落地与规模化拆成一条主线、两个阶段、四道关卡。\n\n```mermaid\ngraph TB\n    classDef phase fill:#1A365D,stroke:#0F2440,stroke-width:2px,color:#fff\n    classDef gate fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef sub fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph Zero2One[\"0 到 1：能不能做、值不值得做\"]\n        G1{真伪 AI 需求判断}:::gate\n        G2(快速可验证 demo):::sub\n        G3(小步验证 PMF):::sub\n        G1 -->|是真需求| G2\n        G2 --> G3\n    end\n\n    subgraph One2N[\"1 到 N：撑不撑得住、稳不稳\"]\n        G4(成本与并发):::sub\n        G5(可靠性工程化):::sub\n        G6(数据飞轮与治理):::sub\n        G4 --> G5 --> G6\n    end\n\n    G3 ==>|PMF 验证通过| G4\n    N1[\"伪需求在这里被砍掉<br/>不进下一关\"]:::note\n    G1 -.-> N1\n    N2[\"从 POC 到生产<br/>真正的工程量在这一段\"]:::note\n    G5 -.-> N2\n```\n\n### 关卡一（0 到 1）：判断真伪 AI 需求\n\n这是 PM 最该守住的第一道闸，也是我认为产品经理最核心的价值之一——**敢于质疑\"加个 AI 赋能\"的伪需求**。判据很简单：\n\n- **真 AI 需求**：规则模糊、动态演进、变量海量、依赖人类经验。比如\"家长用大白话问育儿问题，答案要权威且个性化\"——写不出 if-else。\n- **伪 AI 需求**：能用规则引擎、状态机、阈值告警解决的。比如订单状态流转、库存低于阈值报警——上大模型只是徒增成本和不确定性。\n\n一句更狠的准绳（有 MIT 报告背书）：**这个能力是否需要\"学习/适配特定工作流\"才有价值？** 通用大模型已经能直接解决的，不构成差异化的真 AI 需求；真正的护城河恰恰在\"能不能嵌进真实业务流程\"。\n\n### 关卡二（0 到 1）：用最低成本做可验证 demo\n\n工具选型上，我的原则是**验证期绝不堆研发资源**。Coze、Dify 这类拖拽式低代码平台是\"搭积木\"，核心价值是快速验证 idea：Coze 绑死字节生态、一键发布，适合 C 端交互机器人快速试水；Dify 把智能体场景拆成问答、写作、工作流等几类，帮你快速定位需求形态。配合 vibe coding，一个产品经理一两天就能把一个 idea 变成能点能聊的原型。\n\n但**必须守住边界**：低代码平台是\"合适场景下 POC 验证的最优解\"，不是\"把所有功能盲目堆到生产\"的方案。Coze/Dify 这两年热度回落，正是因为企业级落地有能力天花板。demo 用它，生产别指望它。\n\n### 关卡三（0 到 1）：小步验证 PMF\n\n不要一上来做大而全。先圈一个最痛的窄场景、一小撮种子用户，看三件事：**用户愿不愿意反复用、答得对不对、有没有人愿意推荐**。验证通过再扩。这一步省下来的，是后面 1 到 N 阶段几十倍的工程成本。\n\n### 关卡四（1 到 N）：成本、可靠性、数据飞轮\n\n进入规模化，三座大山：\n\n1. **成本**：Agent 系统贵在\"每个动作 = 至少一次大模型调用\"，链式编排几十步时 token 成本随用户线性累积、还被放大数倍。0 到 1 看不见这笔账（demo 没流量），一上量就压垮商业模式——尤其国内 C 端订阅跑不通（2026 年中豆包首次推付费版后 MAU 单月跌 1.81%、约 607 万，是个标志性事件），只能靠广告+电商抽佣硬扛推理成本。所以**降本对国内 C 端 AI 不是优化项，是生死项**。（怎么算这笔账、降本六板斧、CAG 机制，见《AI 产品的成本账》一篇；这里只把它当 1 到 N 的第一座山。）\n\n2. **可靠性工程化**（最硬核的一节）：可靠性来自架构，不是更好的 prompt。生产 AI 测试有个标准三件套——离线 evals（用 golden dataset 挡退步）、运行时 guardrails（输入输出双侧拦截）、生产端 tracing + drift 告警（evals 这套怎么驱动迭代，见《AI 评估体系》一篇，这里只作为 1 到 N 的一环点到）。优化效果的顺序也有纪律：**先穷尽 prompt → RAG → few-shot，最后才动 fine-tuning**——不是因为微调没用，而是它最重、最贵、还有灾难性遗忘风险，把它当默认解就是给规模化埋成本（三条路线怎么选见《微调 vs RAG vs Prompt》）。还有个反直觉的数据：Stanford 与 Carnegie Mellon 2025 年 11 月《How Do AI Agents Do Human Work?》实测发现，人主导判断、Agent 干可程序化部分的混合团队，整体表现比全自主 Agent 高约 68.7%，所以规模化早期别迷信全自主，留人在环里。\n\n3. **数据飞轮与治理**：用户反馈数据持续回流，形成\"用得越多、越好用、越多人用\"的循环——这是 AI 产品后期最难被复制的竞争位置。把人留在环里（Agent-in-the-loop）做标注与纠错，能把再训练周期从数月压到数周（飞轮怎么搭、怎么冷启动，见《数据飞轮与冷启动》）。\n\n## 落到产品的取舍\n\n- **速度 vs 严谨**：0 到 1 阶段，速度优先，允许脏、允许糙，目标是尽快证伪。1 到 N 阶段反过来，严谨压倒速度，任何不确定性都要被 guardrail 和 eval 兜住。两个阶段用同一套标准，要么慢死要么炸。\n- **效果 vs 成本**：模型不是越强越好。能用小模型+RAG 解决的，别上最贵的旗舰模型推理——Galileo 用 Luna-2 小模型做监控，成本直接降 97%。我在杭小育用 CAG 缓存把成本降了 80%，就是这个思路。\n- **自主 vs 可控**：越是高风险、高声誉成本的场景（医疗、政务、取数），越要把人留在环里、把执行前审查和审计做厚，宁可牺牲一点\"全自动的炫\"。\n\n## 你简历里的这些，就是这套方法论\n\n- **SAGE-AI 取数**是一个完整的 0 到 1：从零判断\"3 天人工取数\"是不是真 AI 需求（规则模糊、依赖经验、Text2SQL，是真的）→ 搭出取数智能体 → 用推理链路可视化解决信任、把采纳率做到 97.5%、3 天压到分钟级。权限分层+执行前审查+脱敏+审计，正是 1 到 N 的可靠性工程化；Badcase 标准化闭环就是你的数据飞轮雏形。\n- **杭小育**是一个完整的 1 到 N：从接手到扛住 460 万用户、日活 21.5 万。CAG 缓存降本 80% 是成本工程，准确率 97.5%、覆盖率 +34% 背后是 evals 和 Badcase 闭环这套可靠性体系。\n- **诚实说短板**：你的实操偏垂直（健康、政务、G 端），通用 C 端的商业化 sense 偏弱——比如订阅留存、广告变现这类。面试别硬凹，主动认，然后用具体认知证明你在补：知道 AI 应用\"转化好但留存差\"（RevenueCat 2026 报告：AI 应用年度订阅留存约 21.1%，明显低于非 AI 的约 30.7%）、知道中美变现分裂（美国靠订阅、国内转广告+电商）。能把短板讲出门道，反而加分。\n\n## 面试怎么说（30 秒口播）\n\n「AI 产品我习惯拆成两段。0 到 1 我先做一件事——判断这到底是不是真 AI 需求：规则模糊、靠人经验的才用 AI，能 if-else 的坚决不上，避免为 AI 而 AI。是真需求就用 Coze/Dify 这类低代码快速搭原型、小步验 PMF。SAGE 取数就是这么从零做起来的。1 到 N 我关注三件事：成本、可靠性、数据飞轮。杭小育扛 460 万用户时，我用 CAG 把成本降了 80%，用 evals 和 Badcase 闭环把准确率做到 97.5%。我最深的体会是 Thoughtworks 那句话——demo 跑通只完成了 10%，从 POC 到生产那剩下的 90% 才是产品经理真正的活。」\n\n## 可能的追问及答法\n\n**Q1：你怎么判断一个需求该不该用 AI？**\nA：一句话准绳——能用规则引擎、状态机、阈值解决的，坚决不上 AI；只有规则模糊、动态演进、变量海量、依赖人类经验的才用。再加一条 MIT 报告给的判据：这个能力是否需要学习、适配特定工作流才有价值？通用大模型已经能直接解决的，不算差异化真需求。比如订单状态流转是伪需求，家长用大白话问个性化育儿问题就是真需求。我的价值之一就是敢砍掉\"加个 AI 赋能\"的伪需求。\n\n**Q2：AI 产品从 demo 到上线，最大的坎是什么？**\nA：最大的坎是认知错位——大家看到 demo 以为做完 90%，其实只完成 10%。具体三道坎：一是非确定性，同样的输入输出会变，传统 QA 和精确功能规格直接失效；二是数据，demo 用的是小而干净的数据集，生产是跨系统、实时、脏的真实数据；三是成本，token 账随用户线性涨、链式调用还把每个动作放大数倍，大流量下直接压垮商业模式。这三个在 demo 阶段全是隐形的，一上量全爆出来。Gartner 预测到 2027 年底 40% 以上的 agentic AI 项目会被取消，卡的就是成本、价值不清和风控。\n\n**Q3：怎么避免\"为了 AI 而 AI\"？**\nA：启动任何 AI 功能前先逼自己回答一句——这个 AI 是为解决什么核心问题而存在？它必须是用户体验或商业闭环里不可或缺的一环，不是孤立的技术演示。我会用\"技术可行性 × 业务价值 × 用户覆盖\"三维打分，任何一维太低就砍。MIT 那个 95% 零回报就是反面教材——跟风上 AI，最后做出没人用的功能。这道闸是产品经理的活，工程不会帮你守。\n\n**Q4：从 POC 到生产，要补哪些东西？**\nA：核心一句——2026 年赢家不是拼模型最大，是拼测试框架、数据管道、明确工作流和治理，可靠性压倒炒作。具体我补三件套：离线 evals 用 golden dataset 挡退步、运行时 guardrails 双侧拦截、生产端 tracing 加 drift 告警。优化效果也有纪律：先穷尽 prompt、RAG、few-shot，最后才动 fine-tuning——它最重最贵、还有灾难性遗忘风险，当默认解就是埋成本。一句话定调：可靠性来自模块化架构和确定性 guardrail，不是靠调 prompt。落到我自己——SAGE 里的权限分层、执行前审查、脱敏、审计加 Badcase 闭环，就是我在生产环节补的这套。\n\n**Q5：低代码平台（Coze/Dify）能直接撑生产吗？**\nA：不能，这是个常见误解。它们是 POC 验证的最优解——快速、低成本、适合验 idea，Coze 还适合 C 端机器人快速发布。但能力边界很清晰，企业级落地有天花板，这也是它们这两年热度回落的原因。我的用法是：验证期用它快速试错，验证通过后该上自研工程的上自研。把所有功能盲目堆到低代码平台上生产，是给自己埋雷。\n\n**Q6：规模化时，你会优先上全自主 Agent 吗？**\nA：早期不会。有个反直觉但很实在的数据——Stanford 和 CMU 2025 年那篇《How Do AI Agents Do Human Work?》实测，人主导判断、Agent 干可程序化部分的混合团队，整体比全自主 Agent 高约 68.7%，全自主在部署期反而容易拉胯。所以我先把人留在环里：某些项目达到 75-80% 准确率就配人工反馈环先上线，让真实数据反哺，再逐步提高自主度。尤其政务、医疗、取数这种高声誉成本场景，可控永远优先于全自动的炫。这也是为什么很多团队部署时内部工具优先于外部——先在低风险场景压幻觉、快迭代。\n", "/02-AI产品方法论/06-人机协同与信任设计.md": "# 人机协同与信任设计：让用户敢用、会用、放心用\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-06-trust-brake.png\" alt=\"小黑配图：副驾握刹车\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n> 本篇讲**人和 AI 怎么分工、控制权怎么交还**，是一套协同方法论。注意和邻篇切干净，别讲重了：第 02 章第 05 篇《幻觉与安全治理》讲的是\"给概率系统装护栏\"（执行前审查、脱敏、审计、红线指标）——那是**安全侧**；本篇讲的是\"谁拍板、自动化停哪档、怎么让人放心交权\"——这是**协同与信任心理侧**。同样一个 SAGE，05 篇把它当安全护栏案例（权限+审查+脱敏），本篇把它当信任设计案例（可解释让用户从操作者变监督者）。被同时问到时这么切：护栏工程引 05 篇，分工与交权落本篇。\n\n## 一句话定义（电梯说法）\n\n人机协同设计，是决定\"哪些事 AI 给建议、哪些事人来拍板、哪些事 AI 直接执行\"，并通过**可控、可解释、可纠错、可溯源**四道保险，让用户在不同风险的场景里**敢用、会用、放心用**。一句话：**信任建立在\"可见\"，而不是\"盲信\"——AI 越能替用户行动，越要把控制权设计得明明白白。**\n\n## 直觉解释：副驾驶、自动驾驶，和那个能踩的刹车\n\n把 AI 和人的关系想成开车。\n\n- **Copilot（副驾驶）**：AI 帮你看路、提醒你\"前面要并线了\"，但方向盘在你手里，你说了算。\n- **Autopilot（自动驾驶）**：你设定目的地，AI 自己开，只有遇到异常才叫醒你。\n\n很多产品经理的直觉是\"自动化程度越高越好，最好全自动\"。但真实的用户研究（arXiv《Do It For Me vs. Do It With Me》）发现：**多数人在复杂、重要的任务上，反而想保留控制权**，只在重复琐碎的步骤上才愿意全交给 AI。\"陪我做\"在很多场景下打败\"替我做\"。\n\n为什么？因为开自动驾驶的人，真正在意的不是车开得多顺，而是\"**我随时能踩到那个刹车**\"。信任不来自 AI 多聪明，而来自**用户知道自己还握着方向盘**。这就是人机协同设计的全部出发点。\n\n## 方法论框架：从分工谱系到信任四要素\n\n我把这套方法论拆成三层：先定分工（谁拍板）、再定档位（自动化停在哪）、最后上保险（信任四要素）。\n\n```mermaid\ngraph TB\n    classDef stage fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef item fill:#4A90D9,stroke:#3474B8,stroke-width:1px,color:#fff\n    classDef trust fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    subgraph S1[\"第一层 分工谱系 谁来拍板\"]\n        A1(AI 建议 人决策):::item\n        A2(人设目标 AI 执行):::item\n        A3(AI 自主 异常叫人):::item\n    end\n\n    subgraph S2[\"第二层 自动化滑块 停在哪一档\"]\n        B1{风险高低 + 可逆与否}:::stage\n        B2(高风险停 copilot):::item\n        B3(低风险走 autopilot):::item\n    end\n\n    subgraph S3[\"第三层 信任四要素 上四道保险\"]\n        C1(可控):::trust\n        C2(可解释):::trust\n        C3(可纠错):::trust\n        C4(可溯源):::trust\n    end\n\n    A1 --> B1\n    A2 --> B1\n    A3 --> B1\n    B1 -->|风险高| B2\n    B1 -->|风险低| B3\n    B2 ==> S3\n    B3 ==> S3\n\n    N1[\"越往自主走 ROI 越高 但需要的信任也越高\"]:::note\n    B1 -.-> N1\n```\n\n### 第一层：分工谱系（谁来拍板）\n\n经典的 Sheridan & Verplank 十级自动化（1978）是这套思路的鼻祖，但对产品经理来说，简化成三档就够用：\n\n1. **AI 建议、人决策**：AI 出方案，人审批后才生效。适合高风险、不可逆的动作。\n2. **人设目标、AI 执行**：人给一个高层目标，AI 自己拆解执行。适合流程明确、可监督的任务。\n3. **AI 自主、异常叫人**：AI 全程跑，只有出问题才把人拉回来。适合低风险、高频、可回滚的场景。\n\n关键提醒：Sheridan 本人后来公开反对把\"自动化越高、人控制越少\"当成铁律——**这不是零和**。好的设计可以同时做到\"AI 很自主\"和\"人很有掌控感\"，秘诀就在第三层的四要素。\n\n### 第二层：自动化滑块（该停在哪一档）\n\n不是每个场景都该冲到全自动。决定停在哪一档，只看两个变量：**风险高不高、动作可不可逆**。\n\n- **高价值 / 高风险 / 不可逆** 的时刻（转账、删除、对外发布、医疗判断），停在 copilot——AI 辅助、人主导、人最终点确认。\n- **低风险 / 高频 / 可回滚** 的动作（整理、归类、草稿生成），可以滑到 autopilot——AI 自主跑，人事后抽查。\n\n记住这条决策心法：**从 copilot 往 autopilot 滑，效率和体验更好，但要求的信任也更高，且必须留一个\"紧急把控制权踢回给人\"的机制。** 没有那个紧急刹车，就不该往上滑。\n\n### 第三层：信任四要素（四道保险）\n\n无论停在哪一档，让用户放心的底座永远是这四个：\n\n| 要素 | 用户的潜台词 | 产品上怎么落 |\n|------|------------|------------|\n| **可控** | \"我随时能停、能改、能接管\" | Human-in-the-loop、一键暂停、接管入口 |\n| **可解释** | \"我知道它为什么这么做\" | 推理过程可见、引用来源、说清能力边界 |\n| **可纠错** | \"做错了我能撤回，且后果可逆\" | 默认安全可逆、执行前预览、一键撤销 |\n| **可溯源** | \"事后能查清谁在什么时候做了什么\" | 全程审计日志、时间戳、操作留痕 |\n\n这四个不是锦上添花，是\"放心用\"的地基。少任何一个，用户的信任都会在第一次出错时崩塌。\n\n## 落到产品的取舍：Agent 能行动后，风险陡增\n\n这是当下最该讲清楚的一点。a16z 在《Agency by design：在\"后界面时代\"保住用户控制权》（a16z crypto，2025 年 12 月）里的判断很犀利：当 AI 从\"给推荐\"升级到\"替你行动\"，**用户从操作者变成了编排者（orchestrator）**——你不再亲手点每一步，而是把意图交给机器去解读和执行。风险就藏在这个\"解读\"里：\n\n- **静默失败**：Agent 出错了却不报警，你蒙在鼓里。\n- **模糊授权**：你一句含糊的指令，触发了一长串没料到的动作。\n- **签名复用**：你点了一次\"同意\"，结果授权了一连串你从没逐项看过的下游操作。\n\n数据印证了用户的警惕，而且任务风险越高、交权意愿越低。以 Bain & Company 2025 年的美国消费者调查（口径：购物 / 消费场景）为例：约 **70% 的人愿意让 AI 帮忙比价、找优惠**，但真到\"替我下单付钱\"这一步，**只有约 24% 的人**觉得能放心交给 AI。一句话——**越靠近\"花钱、不可逆\"的动作，用户越不肯松手**。更扎心的现实是：**企业部署 Agent 的速度，远快于用户愿意信任它的速度**。\n\n为什么\"界面层\"靠不住？因为只要授权或界面被钻空子，Agent 哪怕自身逻辑毫无故障，也可能被诱导着做出完全违背用户真实意图的动作——控制权一旦只挂在 UI 提示这层君子协定上，就形同虚设。所以 a16z 那句话值得背下来：\"**主权不是一个 UI 功能，而是一个系统层问题（Sovereignty isn't a UI feature — it's a systems question）。**\" 控制权必须强制在系统底层兜住，而不是靠界面上一句\"确认吗\"。\n\n落到产品取舍上，这套\"控制权交还\" checklist 直接可用：\n\n1. **默认值审计**：Agent 的默认行为是否安全、可逆、对用户友好？\n2. **可验证性**：用户能不能随时核实\"它到底替我做了什么\"？\n3. **权限模型**：授权能不能限定范围、随时撤销，并在系统底层强制执行（而不是靠界面上提示一句就算数）？\n4. **执行前模拟**：高风险动作能不能先\"预演结果\"再让用户批准（dry-run / 预览）？\n\n注意一个反面：信任不是越多越好，要**校准**。用户从操作者变监督者后，如果过度信任 AI（automation bias，自动化偏见），会盲目采纳错误输出（misuse）；如果完全不信，又会弃用（disuse）。所以\"可解释、可纠错\"不只是为了让人**敢用**，也是为了防止人**盲信**——这正是\"会用\"这一维的关键。\n\n## 你简历里的 SAGE，就是这个\n\nSAGE-AI 取数智能体（G 端 Text2SQL）是你最硬的信任设计案例，而且踩的是**最高风险的 G 端政务取数场景**——这是你的强项，面试一定要打出去。\n\n把它映射到四要素，你会发现你早就做对了：\n\n- **可解释**：这是 SAGE 的题眼。\"推理链路可视化\"——AI 怎么理解问题、怎么拆解、生成了什么 SQL 全程可见。它是\"信任建立在可见而非盲信\"的教科书级实现，关键作用是把用户从被动的\"操作者\"安全地变成主动的\"监督者\"——用户看得懂，才审得动、才敢点确认。\n- **可控**：执行前审查（人确认 SQL 再跑）= 自觉把高风险取数停在 copilot 档，没有为了讲\"全自动\"的故事冒进滑到 autopilot。这是\"自动化滑块\"心法的真实落地。\n- **可纠错**：执行前人能改 SQL 是当下纠错，Badcase 标准化闭环是长期纠错——错了能改、还能让系统下次不再错。\n- **可溯源**：权限分层 + 操作审计，让\"谁在什么时候取了什么数\"事后可查。\n- （脱敏、审查这些**护栏工程的细节**在《幻觉与安全治理》篇展开；本篇只取它\"让用户放心交权\"这一面。）\n\n结果也证明了——**采纳率 97.5%，取数从 3 天压缩到分钟级**。这句话的潜台词正是本章的主题：**正因为可见、可控、可溯源，用户才敢把取数这件事交给 AI**。同理，\"杭小育\"用 Badcase 闭环持续纠错、用准确率 97.5% 撑住信任，也是同一套方法论在 C 端的另一种落地。\n\n短板要诚实补：你的信任设计经验集中在 G/B 端高风险垂直场景，**通用 C 端的信任设计逻辑略有不同**——C 端用户更看重\"轻、快、不打扰\"，过度的确认弹窗反而劝退。所以 C 端的取舍是\"默认值要更安全、把确认收敛到真正高风险的那一步\"，而不是把 G 端那套审批流原样搬过来。这一点想清楚，就能把短板讲成\"我懂得分场景\"。\n\n## 面试怎么说（30 秒口播）\n\n> \"我理解的人机协同，核心是分三层。第一层定分工：哪些 AI 建议、人拍板，哪些人设目标、AI 执行。第二层是自动化滑块——按风险和可逆性决定停在哪一档，高风险停在副驾驶模式让人确认，低风险才放手让 AI 自主跑。第三层是信任四要素：可控、可解释、可纠错、可溯源。我做 SAGE 取数智能体时，最高风险的政务取数场景，我用推理链路可视化解决可解释，执行前审查解决可控，权限分层加审计解决可溯源——核心是一句话，**信任建立在可见，而不是盲信**，最后采纳率做到了 97.5%。当 AI 从推荐升级到替用户行动，风险是陡增的，所以控制权怎么交、怎么收回，是产品经理必须设计的东西。\"\n\n## 可能的追问及答法\n\n**Q1：你会怎么设计人和 AI 的协作？**\nA：先问两个问题——这个动作风险多高、可不可逆。高风险不可逆的（转账、删除、对外发布），停在 copilot，AI 出方案人点确认；低风险可回滚的，可以放到 autopilot。然后无论哪一档，都上信任四要素：可控（随时能停能接管）、可解释（过程可见）、可纠错（默认可逆、能撤销）、可溯源（全程留痕）。SAGE 就是这么设计的：取数是高风险，所以执行前必须人审查 SQL，但 SQL 怎么来的我用推理链路可视化让人看得懂，降低审查成本。\n\n**Q2：Agent 能替用户操作了，怎么让人放心交权？**\nA：a16z 有个判断我很认同——**当 AI 在\"行动\"而不是\"推荐\"时，风险陡增**，因为结果取决于机器对你意图的解读。让人放心交权，我会做四件事：一是默认值安全可逆，宁可保守；二是高风险动作执行前给\"预演结果\"再批准，比如转账前先展示\"将向 X 转 Y 元，确认吗\"；三是权限可限定范围、可随时撤销，不是点一次同意就永久放权；四是全程审计，事后能查清它替我做了什么。说白了，**主权不是一个确认弹窗，是整套系统层的设计**。数据上看，消费场景里愿意让 AI 帮忙比价的有七成，但敢让它直接下单付钱的只有两成多（Bain 2025 调查口径），所以交权一定是渐进的——先让它做小事、做可逆的事，攒够信任再放大权限。\n\n**Q3：自动化程度怎么把握？停在哪一档你怎么判断？**\nA：就看风险和可逆性这两个变量。我会先把场景里的动作拆开分类：读取、整理、生成草稿这类低风险可回滚的，可以高度自动化；涉及钱、涉及对外、涉及不可撤销后果的，必须停在人确认那一档。还有一条铁律：**往自主滑可以，但一定要留一个紧急把控制权踢回给人的机制**，没有这个刹车就不该滑上去。而且自动化不是越高越好——用户研究表明，复杂任务上人反而想保留控制权，\"陪我做\"常常比\"替我做\"体验更好。\n\n**Q4：一个需求该不该上 Agent（让 AI 能自主行动）你怎么判断？**\nA：分两步。第一步先判断该不该上 AI——能用 if-else、规则引擎、阈值告警解决的（订单状态流转、库存预警）是伪 AI 需求，硬塞 AI 只是徒增成本和不可控；规则模糊、变量海量、依赖经验的才是真 AI 需求（这条展开在《AI 产品 vs 传统产品》那篇）。第二步，决定该不该让它\"自主行动\"，我就回到本章这套框架加一层风险评估：这个动作可逆吗、能审计吗、用户愿意交权吗。高风险不可逆又拿不到用户信任的，就停在\"AI 出建议、人确认\"，别为了讲故事硬把它做成全自主 Agent。Gartner 预测到 2027 年底超四成 Agent 项目会被取消，主因就是上得太急、价值不清、风控不足——产品经理的价值之一，就是敢叫停\"加个 AI 赋能\"的伪需求，也敢拦住\"什么都要做成 Agent\"的冒进。\n\n**Q5：可解释会不会让产品变重、变慢，影响 C 端体验？**\nA：会，所以可解释要分场景做\"颗粒度\"。G 端高风险场景，我把推理链路全展开，因为用户愿意为正确性花时间审查。但 C 端用户要的是轻快，全展开反而劝退。C 端的做法是\"默认折叠、按需展开\"——平时只给结论和一句话依据（比如\"根据你上传的体检报告\"），用户想深究再点开看完整推理。核心是把\"可解释\"做成可选的信任凭证，而不是强制的阅读负担。这也是我从 G 端经验迁移到 C 端时，必须调整的取舍。\n", "/02-AI产品方法论/08-AI产品的成本账.md": "# AI 产品的成本账：一个功能的钱怎么算、怎么省\n\n<img src=\"https://cdn.archeruuu.com/images/docsify/ai-pm-interview/ch2-08-cost-taxi.png\" alt=\"小黑配图：出租车计价器飞涨\" style=\"display:block;margin:1.4em auto;max-width:600px;width:100%;border-radius:12px;\" />\n\n\n## 一句话定义（电梯说法）\n\nAI 产品的成本账，就是把一个 AI 功能\"算清楚单次花多少钱、放大到百万用户花多少钱、还能砍掉多少\"的一套方法论。它的核心不是省钱本身，而是用成本意识反推产品设计：**在效果够用的前提下，让每一次调用都尽可能便宜**。\n\n传统软件的成本是\"一次开发、无限复制\"，多一个用户的边际成本几乎为零；AI 产品不是——**每一次调用都在真金白银地烧推理算力**，用户越多、用得越深，账单越长。所以 AI PM 必须比传统 PM 多一项硬技能：**会算成本账**。\n\n## 直觉解释：AI 功能像\"按次计费的出租车\"，不是\"包月的地铁卡\"\n\n传统 SaaS 像地铁卡：服务器建好了，第一百万个用户和第一个用户用起来，公司的边际成本几乎一样。\n\nAI 功能像出租车：**每跑一趟都要烧油（推理算力）**，跑得越远（生成的内容越长）、绕路越多（重试、多步调用）、用的车越豪华（大模型），单趟越贵。一个用户问一句，你就打一次表；他用得越爽、问得越多，你亏得越多。\n\n这就引出了 AI 商业化最反直觉的一句话：**很多 AI 产品是\"用户越活跃、公司越亏钱\"**。所以成本账不是财务的事，是产品设计的事——你怎么设计这个功能，直接决定每趟车多贵。\n\n## 方法论框架一：一个 AI 功能的钱花在哪（五项成本）\n\n别只盯着\"调 API 的钱\"。一个 AI 功能的完整成本由五项构成，后两项最容易被 PM 严重低估：\n\n```mermaid\ngraph TB\n    classDef main fill:#2B6CB0,stroke:#1E5090,stroke-width:2px,color:#fff\n    classDef token fill:#48BB78,stroke:#38A169,stroke-width:2px,color:#fff\n    classDef hidden fill:#ED8936,stroke:#C66A32,stroke-width:2px,color:#fff\n    classDef note fill:#EDF2F7,stroke:#A0AEC0,stroke-width:1px,color:#4A5568,stroke-dasharray:5 5\n\n    Cost([\"一个 AI 功能的总成本\"]):::main\n\n    Cost --> T1[\"Token 成本<br/>输入 token + 输出 token\"]:::token\n    Cost --> T2[\"推理算力成本<br/>自托管时按 GPU 小时计\"]:::token\n    Cost --> T3[\"调用次数 / 流量<br/>请求量 × 单次成本\"]:::token\n    Cost --> T4[\"重试与编排损耗<br/>超时 / 重试 / Agent 多步\"]:::hidden\n    Cost --> T5[\"人工成本<br/>标注 / 人工兜底 / 质检\"]:::hidden\n\n    N1[\"前三项是账面成本<br/>后两项是隐性放大器<br/>常被低估\"]:::note\n    T4 -.-> N1\n    T5 -.-> N1\n```\n\n- **Token 成本**：调大模型 API 的主体开销。约 4 个字符（或 0.75 个英文词）= 1 token；单次成本 = 输入 token + 输出 token，每次调用都计。\n- **推理算力成本**：自己托管模型时，账单从\"按 token\"变成\"按 GPU 小时\"，逻辑一样——都是算力的钱。\n- **调用次数 / 流量**：这是把单次成本放大成规模成本的乘数，也是从\"能跑\"到\"能扛\"的分水岭。\n- **重试与编排损耗**：超时重试、Agent 多步调用会成倍放大账单。**业界经验是：对理想路径的裸 token 成本乘 1.7–2.0 倍**，才接近真实账单。只算理想路径，是 PM 最常见的算错。\n- **人工成本**：数据标注、RLHF、人工兜底、质检。这部分常常是最大且最被低估的开销，尤其在冷启动期。\n\n## 方法论框架二：怎么估算单位成本和规模成本\n\n这是可以直接背下来、面试现场推演给面试官看的硬框架。\n\n**第一步，算单次成本**（一次调用多少钱）：\n\n> 单次成本 =（输入 token ÷ 100 万 × 输入单价）+（输出 token ÷ 100 万 × 输出单价）\n\n**第二步，放大到月度规模成本**（百万用户多少钱）：\n\n> 月总成本 = 单次成本 × 日请求数 × 30\n\n**现场可以这样推演给面试官看**（数字随口报、逻辑要稳）：假设一次问答输入 2000 toke
